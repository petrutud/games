<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geometry Dash — Neon Edition</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-wrap">
    <div id="level-select" class="level-select">
      <h1>GEOMETRY DASH</h1>
      <p class="level-select-hint">Neon Edition — Select a level</p>
      <div class="btn-row">
        <button type="button" class="btn" id="btn-sound" title="Toggle sound">Sound: ON</button>
      </div>
      <div id="level-buttons" class="level-buttons">
        <button type="button" class="btn level-btn" data-level="1">Level 1</button>
        <button type="button" class="btn level-btn" data-level="2">Level 2</button>
        <button type="button" class="btn level-btn" data-level="3">Level 3</button>
        <button type="button" class="btn level-btn" data-level="4">Level 4</button>
        <button type="button" class="btn level-btn" data-level="5">Level 5</button>
        <button type="button" class="btn level-btn" data-level="6">Level 6</button>
        <button type="button" class="btn level-btn" data-level="7">Level 7</button>
        <button type="button" class="btn level-btn" data-level="8">Level 8</button>
        <button type="button" class="btn level-btn" data-level="9">Level 9</button>
        <button type="button" class="btn level-btn" data-level="10">Level 10</button>
        <button type="button" class="btn level-btn" data-level="11">Level 11</button>
        <button type="button" class="btn level-btn" data-level="12">Level 12</button>
        <button type="button" class="btn level-btn" data-level="13">Level 13</button>
        <button type="button" class="btn level-btn" data-level="14">Level 14</button>
        <button type="button" class="btn level-btn" data-level="15">Level 15</button>
        <button type="button" class="btn level-btn" data-level="16">Level 16</button>
        <button type="button" class="btn level-btn" data-level="17">Level 17</button>
        <button type="button" class="btn level-btn" data-level="18">Level 18</button>
        <button type="button" class="btn level-btn" data-level="19">Level 19</button>
        <button type="button" class="btn level-btn" data-level="20">Level 20</button>
        <button type="button" class="btn level-btn" data-level="21">Level 21</button>
        <button type="button" class="btn level-btn" data-level="22">Level 22</button>
        <button type="button" class="btn level-btn" data-level="23">Level 23</button>
        <button type="button" class="btn level-btn" data-level="24">Level 24</button>
        <button type="button" class="btn level-btn" data-level="25">Level 25</button>
        <button type="button" class="btn level-btn" data-level="26">Level 26</button>
        <button type="button" class="btn level-btn" data-level="27">Level 27</button>
        <button type="button" class="btn level-btn" data-level="28">Level 28</button>
        <button type="button" class="btn level-btn" data-level="29">Level 29</button>
        <button type="button" class="btn level-btn" data-level="30">Level 30</button>
        <button type="button" class="btn level-btn" data-level="31">Level 31</button>
        <button type="button" class="btn level-btn" data-level="32">Level 32</button>
        <button type="button" class="btn level-btn" data-level="33">Level 33</button>
        <button type="button" class="btn level-btn" data-level="34">Level 34</button>
        <button type="button" class="btn level-btn" data-level="35">Level 35</button>
        <button type="button" class="btn level-btn" data-level="36">Level 36</button>
        <button type="button" class="btn level-btn" data-level="37">Level 37</button>
        <button type="button" class="btn level-btn" data-level="38">Level 38</button>
        <button type="button" class="btn level-btn" data-level="39">Level 39</button>
        <button type="button" class="btn level-btn" data-level="40">Level 40</button>
        <button type="button" class="btn level-btn" data-level="41">Level 41</button>
        <button type="button" class="btn level-btn" data-level="42">Level 42</button>
        <button type="button" class="btn level-btn" data-level="43">Level 43</button>
        <button type="button" class="btn level-btn" data-level="44">Level 44</button>
        <button type="button" class="btn level-btn" data-level="45">Level 45</button>
        <button type="button" class="btn level-btn" data-level="46">Level 46</button>
        <button type="button" class="btn level-btn" data-level="47">Level 47</button>
        <button type="button" class="btn level-btn" data-level="48">Level 48</button>
        <button type="button" class="btn level-btn" data-level="49">Level 49</button>
        <button type="button" class="btn level-btn" data-level="50">Level 50</button>
        <button type="button" class="btn level-btn" data-level="51">Level 51</button>
      </div>
      <div style="margin-top:1rem;">
        <button type="button" class="btn btn-editor" id="btn-editor">✏️ Level Editor</button>
      </div>
    </div>

    <div id="editor-area" class="editor-area hidden">
      <h1>LEVEL EDITOR</h1>
      <div class="editor-toolbar">
        <span class="editor-tool-label">Tool:</span>
        <div class="editor-tools" id="editor-tools">
          <button class="btn tool-btn active" data-tool="spike" title="Spike">▲</button>
          <button class="btn tool-btn" data-tool="block" title="Block">■</button>
          <button class="btn tool-btn" data-tool="pillar" title="Pillar">▐</button>
          <button class="btn tool-btn" data-tool="orb" title="Orb">★</button>
          <button class="btn tool-btn" data-tool="portal_gravity" title="Gravity Flip">↕</button>
          <button class="btn tool-btn" data-tool="portal_speed_up" title="Speed Up">»</button>
          <button class="btn tool-btn" data-tool="portal_speed_dn" title="Speed Down">«</button>
          <button class="btn tool-btn" data-tool="portal_mini" title="Mini">▾</button>
          <button class="btn tool-btn" data-tool="portal_big" title="Big">▴</button>
          <button class="btn tool-btn" data-tool="portal_teleport" title="Teleport">⊕</button>
          <button class="btn tool-btn" data-tool="portal_jump_boost" title="Jump Boost">⇑</button>
          <button class="btn tool-btn" data-tool="portal_jump_pad" title="Jump Pad">⬆</button>
          <button class="btn tool-btn tool-eraser" data-tool="eraser" title="Eraser">✕</button>
        </div>
      </div>
      <div class="editor-settings">
        <label>Speed: <input type="range" id="editor-speed" min="2" max="6" step="0.2" value="3.0"><span id="editor-speed-val">3.0</span></label>
        <label>Color: <input type="color" id="editor-color" value="#00f0ff"></label>
      </div>
      <div class="editor-canvas-wrap">
        <canvas id="editor-canvas" width="2000" height="400"></canvas>
      </div>
      <p class="hint">Click to place, right-click to remove. Scroll horizontally to extend the level.</p>
      <div class="editor-actions">
        <button class="btn" id="btn-editor-play">▶ Play Level</button>
        <button class="btn" id="btn-editor-clear">Clear All</button>
        <button class="btn" id="btn-editor-save">Save</button>
        <button class="btn" id="btn-editor-load">Load</button>
        <button class="btn" id="btn-editor-back">← Back</button>
      </div>
    </div>

    <div id="game-area" class="game-area hidden">
      <h1>GEOMETRY DASH</h1>
      <p class="score-line">Score: <strong id="score">0</strong> <span class="pct" id="pct">0%</span> / <span id="level-name"></span></p>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <canvas id="game-canvas" width="700" height="400"></canvas>
      <p class="hint">Space / Click / Up to jump &nbsp;|&nbsp; Portals change gravity, speed &amp; size</p>
      <div id="overlay" class="overlay hidden">
        <p id="overlay-msg" class="overlay-msg"></p>
        <div id="overlay-buttons" class="overlay-buttons"></div>
      </div>
    </div>
  </div>
  <script src="js/game.js"></script>
</body>
</html>
