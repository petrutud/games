<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Tycoon</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-container">
    <header class="header">
      <h1>Business Tycoon</h1>
      <div id="event-banner" class="event-banner" aria-live="polite"></div>
      <div class="stats">
        <div class="stat balance">
          <span class="label">Balance</span>
          <span id="money" class="value">$0</span>
        </div>
        <div class="stat income">
          <span class="label">Income/tick</span>
          <span id="income-display" class="value">$0</span>
        </div>
        <div class="stat costs">
          <span class="label">Costs/tick</span>
          <span id="costs-display" class="value">$0</span>
        </div>
        <div class="stat">
          <span class="label">Level</span>
          <span id="level-display" class="value">Level 0</span>
        </div>
        <div class="stat prestige-stat">
          <span class="label">Prestige</span>
          <span id="prestige-display" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">Reverts</span>
          <span id="revert-count-display" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">High score</span>
          <span id="high-score-display" class="value">$0</span>
        </div>
      </div>
      <div class="header-actions">
        <span class="speed-control">
          <span class="label">Speed</span>
          <button id="speed-05" class="btn btn-mute" type="button">0.5x</button>
          <button id="speed-1" class="btn btn-buy" type="button">1x</button>
          <button id="speed-2" class="btn btn-mute" type="button">2x</button>
          <span id="speed-display">1x</span>
        </span>
        <span class="slot-control">
          <span class="label">Slot</span>
          <button id="slot1" class="btn btn-mute" type="button">1</button>
          <button id="slot2" class="btn btn-mute" type="button">2</button>
          <button id="slot3" class="btn btn-mute" type="button">3</button>
        </span>
        <button id="undo-btn" class="btn btn-mute" type="button" title="Undo last buy, sell, hire, fire or upgrade">Undo</button>
        <button id="revert-btn" class="btn btn-mute" type="button">Revert</button>
        <button id="stats-btn" class="btn btn-mute" type="button">Stats</button>
        <button id="export-btn" class="btn btn-mute" type="button">Export</button>
        <button id="import-btn" class="btn btn-mute" type="button">Import</button>
        <button id="mute-btn" class="btn btn-mute" type="button">Mute</button>
        <button id="prestige-btn" class="btn btn-prestige" type="button">Prestige</button>
      </div>
      <div class="options-row">
        <label>Theme <select id="theme-select"></select></label>
        <label><input type="checkbox" id="sound-tick"> Tick</label>
        <label><input type="checkbox" id="sound-buy"> Buy</label>
        <label><input type="checkbox" id="sound-milestone"> Milestone</label>
      </div>
      <div id="tick-feedback" class="tick-feedback" aria-live="polite"></div>
    </header>

    <main class="main">
      <section class="panel buildings-panel">
        <h2>Buildings</h2>
        <div id="buildings-list" class="list"></div>
        <div id="building-purchases" class="purchases"></div>
      </section>

      <section class="panel employees-panel">
        <h2>Employees</h2>
        <div id="employees-list" class="list"></div>
        <div id="employee-purchases" class="purchases"></div>
      </section>

      <section class="panel contract-panel">
        <h2>Contract</h2>
        <p id="contract-text" class="contract-text">—</p>
      </section>

      <section class="panel upgrades-panel">
        <h2>Upgrades</h2>
        <p class="panel-hint">Permanent +income. One-time purchase.</p>
        <div id="upgrades-list" class="purchases"></div>
      </section>

      <section class="panel map-panel">
        <h2>Mini map</h2>
        <p class="panel-hint">Your buildings and workers at a glance.</p>
        <div class="minimap-wrap">
          <canvas id="minimap" width="360" height="220" aria-label="Mini map of buildings and workers"></canvas>
        </div>
      </section>

      <section class="panel log-panel">
        <h2>Activity log</h2>
        <div id="log" class="log"></div>
      </section>
    </main>
  </div>

  <div id="tutorial-overlay" class="tutorial-overlay" aria-live="polite">
    <div class="tutorial-card">
      <p id="tutorial-text" class="tutorial-text"></p>
      <div class="tutorial-buttons">
        <button id="tutorial-next" class="btn btn-buy" type="button">Next</button>
        <button id="tutorial-skip" class="btn btn-mute" type="button">Skip</button>
      </div>
    </div>
  </div>

  <div id="stats-panel" class="stats-overlay">
    <div class="stats-card">
      <h2>Statistics</h2>
      <div id="stats-body"></div>
      <button id="stats-close" class="btn btn-mute" type="button">Close</button>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
