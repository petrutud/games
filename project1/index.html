<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>
<style>
:root {
  --bg: #1a1d29;
  --surface: #252936;
  --surface-hover: #2e3344;
  --text: #e8eaed;
  --text-muted: #9aa0a6;
  --accent: #7caf5e;
  --accent-hover: #8fc76a;
  --danger: #d9655c;
  --gold: #e8c547;
  --radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* Navbar */
.navbar {
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 1rem 1.5rem;
  box-shadow: var(--shadow);
  position: sticky;
  top: 0;
  z-index: 100;
}

.navbar-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.logo {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: 1px;
  color: var(--gold);
  text-decoration: none;
}

.logo span { color: var(--accent); }

.search-box {
  flex: 1;
  max-width: 350px;
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 0.5rem 1rem 0.5rem 2.4rem;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}

.search-box input:focus { border-color: var(--accent); }

.search-box::before {
  content: "\1F50D";
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.85rem;
}

.game-count {
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Category Filter */
.filters {
  max-width: 1200px;
  margin: 1.5rem auto 0;
  padding: 0 1.5rem;
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 0.4rem 1rem;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  background: transparent;
  color: var(--text-muted);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 600; }

/* Grid */
.container {
  max-width: 1200px;
  margin: 1.5rem auto;
  padding: 0 1.5rem;
}

.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.25rem;
}

/* Game Card */
.game-card {
  background: var(--surface);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
}

.game-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.card-thumb {
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  position: relative;
  overflow: hidden;
}

.card-thumb .icon { z-index: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }

.card-body {
  padding: 0.8rem 1rem 1rem;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.card-body h3 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
}

.card-body .tag {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.15rem 0.5rem;
  border-radius: 10px;
  margin-bottom: 0.4rem;
  width: fit-content;
}

.tag-action   { background: rgba(217,101,92,0.2); color: var(--danger); }
.tag-strategy { background: rgba(107,140,206,0.2); color: #6b8cce; }
.tag-puzzle   { background: rgba(124,175,94,0.2); color: var(--accent); }
.tag-board    { background: rgba(232,197,71,0.2); color: var(--gold); }
.tag-arcade   { background: rgba(170,85,255,0.2); color: #aa55ff; }
.tag-sim      { background: rgba(88,200,220,0.2); color: #58c8dc; }
.tag-card     { background: rgba(232,150,71,0.2); color: #e89647; }
.tag-rpg      { background: rgba(200,100,180,0.2); color: #c864b4; }
.tag-new      { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }

.card-body p {
  font-size: 0.8rem;
  color: var(--text-muted);
  flex: 1;
}

.play-btn {
  display: block;
  margin-top: 0.6rem;
  padding: 0.45rem;
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  transition: background 0.15s;
}

.play-btn:hover { background: var(--accent-hover); }

/* Responsive */
@media (max-width: 640px) {
  .game-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.75rem; }
  .card-thumb { height: 100px; font-size: 2.2rem; }
  .navbar-inner { flex-wrap: wrap; }
  .search-box { max-width: 100%; order: 3; }
}

/* No results */
.no-results {
  text-align: center;
  padding: 3rem;
  color: var(--text-muted);
  grid-column: 1 / -1;
}
</style>
</head>

const categories = {
  all: "All Games",
  arcade: "Arcade",
  action: "Action",
  strategy: "Strategy",
  puzzle: "Puzzle",
  board: "Board",
  sim: "Simulation",
  card: "Card",
  rpg: "RPG"
};

const catTagClass = {
  arcade: "tag-arcade",
  action: "tag-action",
  strategy: "tag-strategy",
  puzzle: "tag-puzzle",
  board: "tag-board",
  sim: "tag-sim",
  card: "tag-card",
  rpg: "tag-rpg"
};

let currentCat = 'all';

// Build filters
const filtersEl = document.getElementById('filters');
Object.entries(categories).forEach(([key, label]) => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (key === 'all' ? ' active' : '');
  btn.textContent = label;
  btn.dataset.cat = key;
  btn.onclick = () => {
    currentCat = key;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  };
  filtersEl.appendChild(btn);
});

function renderGrid() {
  const grid = document.getElementById('grid');
  const query = document.getElementById('search').value.toLowerCase().trim();
  let filtered = games.filter(g => {
    const matchesCat = currentCat === 'all' || g.cat === currentCat;
    const matchesSearch = !query || g.name.toLowerCase().includes(query) || g.desc.toLowerCase().includes(query) || g.cat.includes(query);
    return matchesCat && matchesSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No games found. Try a different search or category.</div>';
    document.getElementById('gameCount').textContent = '0 games';
    return;
  }

  grid.innerHTML = filtered.map(g => {
    const tagClass = catTagClass[g.cat] || 'tag-arcade';
    const catLabel = categories[g.cat] || g.cat;
    const newTag = (g.tags && g.tags.includes('new')) ? '<span class="tag tag-new">NEW</span> ' : '';
    return `<a href="${g.href}" class="game-card">
      <div class="card-thumb" style="background:${g.bg}">
        <span class="icon">${g.icon}</span>
      </div>
      <div class="card-body">
        ${newTag}<span class="tag ${tagClass}">${catLabel}</span>
        <h3>${g.name}</h3>
        <p>${g.desc}</p>
        <div class="play-btn">PLAY</div>
      </div>
    </a>`;
  }).join('');

  document.getElementById('gameCount').textContent = filtered.length + ' game' + (filtered.length !== 1 ? 's' : '');
}

document.getElementById('search').addEventListener('input', renderGrid);
renderGrid();
</script>
