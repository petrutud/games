<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Defense</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-wrap">
    <header class="hud">
      <div class="hud-left">
        <span class="hud-title">Tower Defense</span>
        <span class="hud-item">Gold: <strong id="gold">0</strong></span>
        <span class="hud-item">Lives: <strong id="lives">0</strong></span>
        <span class="hud-item">Score: <strong id="score">0</strong></span>
        <span class="hud-item">Wave: <strong id="wave">0</strong>/<span id="wave-total">0</span></span>
      </div>
      <div class="hud-right">
        <button id="btn-sound" class="btn" type="button" title="Toggle sound effects">Sound: ON</button>
        <button id="btn-speed" class="btn" type="button">1x</button>
        <button id="btn-pause" class="btn" type="button">Pause</button>
        <button id="btn-angles-mod" class="btn" type="button" title="Show tower aim lines">Angles mod: OFF</button>
        <button id="btn-shop" class="btn btn-shop" type="button" title="Buy buffs between waves">Shop</button>
        <button id="btn-super" class="btn btn-super" type="button" title="Deal 500 damage to all enemies. Recharges every 1 min.">Super (ready)</button>
        <button id="btn-auto-wave" class="btn" type="button" title="When ON, next wave starts automatically when all enemies are cleared">Auto wave: OFF</button>
        <button id="btn-wave" class="btn btn-wave" type="button" disabled>Start wave</button>
      </div>
    </header>
    <div class="main-row">
      <aside class="tower-panel">
        <h2>Towers</h2>
        <div id="tower-list" class="tower-list"></div>
        <div id="tower-info" class="tower-info hidden">Select a tower</div>
        <div id="selected-cell" class="selected-cell hidden">
          <button id="btn-upgrade" class="btn" type="button">Upgrade</button>
          <button id="btn-sell" class="btn btn-sell" type="button">Sell</button>
        </div>
      </aside>
      <div class="canvas-wrap">
        <canvas id="game-canvas"></canvas>
        <div id="screen-overlay" class="screen-overlay hidden">
          <div id="screen-content" class="screen-content"></div>
        </div>
        <div id="shop-overlay" class="screen-overlay hidden">
          <div id="shop-content" class="screen-content shop-content">
            <h3>Shop</h3>
            <p class="shop-gold">Gold: <strong id="shop-gold">0</strong></p>
            <div id="shop-items" class="shop-items"></div>
            <button id="btn-shop-close" class="btn btn-wave" type="button">Close</button>
          </div>
        </div>
      </div>
    </div>
    <div class="level-select-wrap">
      <h2>Levels</h2>
      <div id="level-buttons" class="level-buttons"></div>
    </div>
    <div class="theme-select-wrap">
      <h2>Theme</h2>
      <div id="theme-buttons" class="theme-buttons">
        <button type="button" class="btn theme-btn active" data-theme="default">Default</button>
        <button type="button" class="btn theme-btn" data-theme="ocean">Ocean</button>
        <button type="button" class="btn theme-btn" data-theme="sunset">Sunset</button>
        <button type="button" class="btn theme-btn" data-theme="forest">Forest</button>
        <button type="button" class="btn theme-btn" data-theme="purple">Purple</button>
        <button type="button" class="btn theme-btn" data-theme="light">Light</button>
        <button type="button" class="btn theme-btn" data-theme="red">Red</button>
        <button type="button" class="btn theme-btn" data-theme="rainbow">Rainbow</button>
      </div>
    </div>
  </div>
  <script src="js/levels.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/towers.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
