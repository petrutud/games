<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last Stand</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
#gc{position:relative;user-select:none}
canvas{display:block;cursor:crosshair}
#hud{position:absolute;top:0;left:0;width:100%;pointer-events:none;padding:8px 14px;display:flex;justify-content:space-between;align-items:flex-start}
#hud-left{display:flex;flex-direction:column;gap:4px}
#hud-right{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.hbar{display:flex;align-items:center;gap:6px}
.hbar-label{color:#aaa;font-size:11px;min-width:40px;text-shadow:0 1px 2px #000}
.hbar-track{width:140px;height:10px;background:rgba(0,0,0,0.7);border-radius:5px;border:1px solid rgba(255,255,255,0.15);overflow:hidden}
.hbar-fill{height:100%;border-radius:5px;transition:width 0.2s}
.stat{color:#ddd;font-size:13px;font-weight:bold;text-shadow:0 1px 3px #000}
.stat span{color:#FFD700}
#weapon-bar{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    display:flex;gap:3px;pointer-events:auto;background:rgba(0,0,0,0.7);
    padding:5px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);
}
.wslot{
    width:52px;height:56px;border:2px solid #444;border-radius:6px;
    background:rgba(20,20,30,0.9);display:flex;flex-direction:column;
    align-items:center;justify-content:center;cursor:pointer;position:relative;
    transition:all 0.15s;
}
.wslot:hover{border-color:#aaa}
.wslot.active{border-color:#FFD700;box-shadow:0 0 10px rgba(255,215,0,0.4)}
.wslot .w-icon{font-size:20px}
.wslot .w-ammo{font-size:9px;color:#FFD700;position:absolute;bottom:2px;right:4px;text-shadow:0 0 3px #000}
.wslot .w-name{font-size:7px;color:#888}
.wslot .w-key{position:absolute;top:1px;left:4px;font-size:8px;color:#666}

#day-panel{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.92);display:none;justify-content:center;align-items:center;
    flex-direction:column;pointer-events:auto;backdrop-filter:blur(3px);
}
#day-panel h1{color:#FFD700;font-size:36px;margin-bottom:8px;text-shadow:0 0 20px rgba(255,215,0,0.3)}
#day-panel .sub{color:#aaa;font-size:14px;margin-bottom:20px}
#day-sections{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.day-section{
    background:rgba(30,20,10,0.9);border:1px solid #554422;border-radius:10px;
    padding:14px;min-width:200px;max-width:240px;
}
.day-section h3{color:#c8a060;font-size:13px;margin-bottom:8px;border-bottom:1px solid #443322;padding-bottom:4px}
.shop-item{
    display:flex;align-items:center;gap:8px;padding:5px;margin:3px 0;
    background:rgba(255,255,255,0.03);border-radius:6px;cursor:pointer;
    transition:background 0.15s;border:1px solid transparent;
}
.shop-item:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.1)}
.shop-item.cant{opacity:0.35;cursor:default}
.shop-item .si-icon{font-size:22px}
.shop-item .si-info{flex:1}
.shop-item .si-name{color:#ddd;font-size:11px}
.shop-item .si-desc{color:#888;font-size:9px}
.shop-item .si-cost{color:#FFD700;font-size:12px;font-weight:bold}
#search-bar{
    background:rgba(30,20,10,0.9);border:1px solid #554422;border-radius:10px;
    padding:14px;min-width:300px;text-align:center;margin-bottom:15px;
}
#search-bar h3{color:#c8a060;font-size:13px;margin-bottom:6px}
#search-alloc{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.alloc-btn{
    padding:6px 14px;background:rgba(139,105,20,0.3);border:1px solid #8B6914;
    border-radius:6px;color:#ddd;font-size:11px;cursor:pointer;transition:all 0.15s;
}
.alloc-btn:hover{background:rgba(139,105,20,0.6)}
.alloc-btn.selected{background:rgba(139,105,20,0.7);border-color:#FFD700;color:#FFD700}
#search-result{color:#aaa;font-size:11px;margin-top:8px}
.proceed-btn{
    padding:12px 40px;font-size:18px;background:linear-gradient(180deg,#c62828,#8b0000);
    color:#fff;border:2px solid #ff6b6b;border-radius:20px;font-weight:bold;
    cursor:pointer;transition:all 0.2s;text-shadow:0 1px 2px #000;
}
.proceed-btn:hover{background:linear-gradient(180deg,#e53935,#c62828);transform:scale(1.05)}

#go-screen,#win-screen{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;
    flex-direction:column;pointer-events:auto;
}
#go-screen h1{color:#f44;font-size:44px;margin-bottom:10px}
#win-screen h1{color:#4f4;font-size:44px;margin-bottom:10px}
.go-stat{color:#aaa;font-size:14px;margin:3px}
.obtn{padding:12px 32px;font-size:18px;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:15px;font-weight:bold}
.obtn-r{background:linear-gradient(180deg,#c62828,#7b0000)}
.obtn-g{background:linear-gradient(180deg,#388E3C,#1B5E20)}
</style>
</head>
<body>
<div id="gc">
<canvas id="C" width="960" height="600"></canvas>
<div id="hud">
    <div id="hud-left">
        <div class="hbar"><span class="hbar-label">❤️ HP</span><div class="hbar-track"><div class="hbar-fill" id="hp-bar" style="width:100%;background:linear-gradient(90deg,#c62828,#f44336)"></div></div><span class="stat" id="hp-text">100/100</span></div>
        <div class="hbar"><span class="hbar-label">🛡️ Wall</span><div class="hbar-track"><div class="hbar-fill" id="wall-bar" style="width:100%;background:linear-gradient(90deg,#5D4037,#8D6E63)"></div></div><span class="stat" id="wall-text">100/100</span></div>
    </div>
    <div id="hud-right">
        <div class="stat">🌙 Night <span id="night-num">1</span></div>
        <div class="stat">💀 Kills <span id="kills">0</span></div>
        <div class="stat">🔎 Survivors <span id="survivors">0</span></div>
    </div>
</div>
<div id="weapon-bar"></div>
<div id="day-panel"></div>
<div id="go-screen"><h1>YOU HAVE FALLEN</h1><p class="go-stat" id="go-stats"></p><button class="obtn obtn-r" onclick="restart()">Try Again</button></div>
<div id="win-screen"><h1>YOU SURVIVED!</h1><p class="go-stat">You held out for 20 nights!</p><p class="go-stat" id="win-stats"></p><button class="obtn obtn-g" onclick="restart()">Play Again</button></div>
</div>

<script>
const C = document.getElementById('C');
const ctx = C.getContext('2d');
const W = 960, H = 600;

// ==================== WEAPONS ====================
const WEAPONS = {
    pistol:    {name:'Pistol',     icon:'🔫', dmg:15, rate:12, spread:0.04, ammo:Infinity, auto:false, projSpeed:14, sound:'pistol', knockback:2},
    shotgun:   {name:'Shotgun',    icon:'💥', dmg:8,  rate:35, spread:0.2,  ammo:0, auto:false, projSpeed:12, pellets:6, sound:'shotgun', knockback:5},
    smg:       {name:'SMG',        icon:'🔫', dmg:8,  rate:5,  spread:0.1,  ammo:0, auto:true,  projSpeed:13, sound:'smg', knockback:1},
    rifle:     {name:'Rifle',      icon:'🎯', dmg:45, rate:40, spread:0.01, ammo:0, auto:false, projSpeed:18, sound:'rifle', knockback:4, pierce:2},
    rpg:       {name:'RPG',        icon:'🚀', dmg:80, rate:90, spread:0.02, ammo:0, auto:false, projSpeed:8,  sound:'rpg', explosive:60, knockback:8},
    flamer:    {name:'Flamer',     icon:'🔥', dmg:3,  rate:2,  spread:0.15, ammo:0, auto:true,  projSpeed:7,  sound:'flame', flame:true, knockback:0},
    sniper:    {name:'Sniper',     icon:'🔭', dmg:120,rate:70, spread:0,    ammo:0, auto:false, projSpeed:25, sound:'sniper', pierce:5, knockback:3},
    minigun:   {name:'Minigun',    icon:'⚡', dmg:6,  rate:3,  spread:0.12, ammo:0, auto:true,  projSpeed:14, sound:'minigun', knockback:1},
};

const WEAPON_ORDER = ['pistol','shotgun','smg','rifle','rpg','flamer','sniper','minigun'];

// ==================== SHOP ITEMS ====================
const SHOP = {
    // Weapons
    shotgun_unlock: {name:'Shotgun',     icon:'💥', desc:'Close range devastation', cost:200, type:'weapon', weapon:'shotgun', ammo:20},
    smg_unlock:     {name:'SMG',         icon:'🔫', desc:'Full auto spray',         cost:300, type:'weapon', weapon:'smg', ammo:120},
    rifle_unlock:   {name:'Hunting Rifle',icon:'🎯',desc:'Piercing long range',     cost:400, type:'weapon', weapon:'rifle', ammo:15},
    rpg_unlock:     {name:'RPG',         icon:'🚀', desc:'Explosive rockets',       cost:600, type:'weapon', weapon:'rpg', ammo:5},
    flamer_unlock:  {name:'Flamethrower',icon:'🔥', desc:'Burn them all',           cost:500, type:'weapon', weapon:'flamer', ammo:200},
    sniper_unlock:  {name:'Sniper',      icon:'🔭', desc:'One shot one kill',       cost:700, type:'weapon', weapon:'sniper', ammo:8},
    minigun_unlock: {name:'Minigun',     icon:'⚡', desc:'Wall of lead',            cost:800, type:'weapon', weapon:'minigun', ammo:300},
    // Ammo
    shotgun_ammo:   {name:'Shotgun Shells',icon:'🔶', desc:'+12 shells',    cost:60,  type:'ammo', weapon:'shotgun', ammo:12},
    smg_ammo:       {name:'SMG Ammo',     icon:'🔶', desc:'+80 rounds',    cost:50,  type:'ammo', weapon:'smg', ammo:80},
    rifle_ammo:     {name:'Rifle Ammo',   icon:'🔶', desc:'+10 rounds',    cost:80,  type:'ammo', weapon:'rifle', ammo:10},
    rpg_ammo:       {name:'Rockets',      icon:'🔶', desc:'+3 rockets',    cost:120, type:'ammo', weapon:'rpg', ammo:3},
    flamer_ammo:    {name:'Fuel',         icon:'🔶', desc:'+100 fuel',     cost:60,  type:'ammo', weapon:'flamer', ammo:100},
    sniper_ammo:    {name:'Sniper Rounds',icon:'🔶', desc:'+5 rounds',     cost:100, type:'ammo', weapon:'sniper', ammo:5},
    minigun_ammo:   {name:'Belt Ammo',    icon:'🔶', desc:'+200 rounds',   cost:80,  type:'ammo', weapon:'minigun', ammo:200},
    // Upgrades
    wall_repair:    {name:'Repair Wall',  icon:'🔧', desc:'Restore wall HP',       cost:80,  type:'repair'},
    wall_upgrade:   {name:'Reinforce Wall',icon:'🧱',desc:'+50 max wall HP',       cost:150, type:'wall_up'},
    hp_kit:         {name:'Med Kit',      icon:'💊', desc:'Heal 40 HP',             cost:60,  type:'heal', amount:40},
    max_hp:         {name:'Vitality',     icon:'❤️', desc:'+25 max HP',             cost:200, type:'max_hp', amount:25},
    trap_spikes:    {name:'Spike Trap',   icon:'📌', desc:'Damages zombies on ground', cost:100, type:'trap', trapType:'spikes'},
    trap_fire:      {name:'Fire Trap',    icon:'🔥', desc:'Burns zombies in area',    cost:150, type:'trap', trapType:'fire'},
    trap_slow:      {name:'Barbed Wire',  icon:'🪤', desc:'Slows zombies',            cost:80,  type:'trap', trapType:'slow'},
    companion:      {name:'Survivor',     icon:'🧑', desc:'Fires pistol from wall',  cost:250, type:'companion'},
};

// ==================== ZOMBIE TYPES ====================
const ZOMBIE_TYPES = {
    walker:   {hp:40,  speed:0.5, dmg:5,  color:'#5a7a50', w:12, h:24, reward:5,  name:'Walker'},
    runner:   {hp:25,  speed:1.4, dmg:8,  color:'#7a6a50', w:10, h:22, reward:8,  name:'Runner'},
    brute:    {hp:150, speed:0.3, dmg:15, color:'#4a5a3a', w:18, h:28, reward:15, name:'Brute'},
    crawler:  {hp:30,  speed:0.8, dmg:4,  color:'#6a5a4a', w:14, h:10, reward:6,  name:'Crawler'},
    spitter:  {hp:35,  speed:0.4, dmg:0,  color:'#5a8a4a', w:12, h:24, reward:10, name:'Spitter', ranged:true, projDmg:12},
    armored:  {hp:250, speed:0.25,dmg:20, color:'#3a3a3a', w:18, h:28, reward:20, name:'Armored'},
    exploder: {hp:60,  speed:0.7, dmg:0,  color:'#8a4a3a', w:14, h:22, reward:12, name:'Exploder', explode:true, explodeDmg:40, explodeR:50},
    screamer: {hp:50,  speed:0.6, dmg:3,  color:'#7a5a7a', w:12, h:24, reward:10, name:'Screamer', buff:true},
    giant:    {hp:600, speed:0.15,dmg:35, color:'#2a3a2a', w:26, h:36, reward:40, name:'Giant', boss:true},
    horde:    {hp:15,  speed:1.0, dmg:3,  color:'#6a7a5a', w:10, h:20, reward:3,  name:'Horde'},
};

// ==================== GAME STATE ====================
let player, wall, night, kills, zombiesKilled, money;
let zombies, projectiles, particles, traps, companions, drops;
let nightActive, nightTimer, maxNightTime, spawnTimer, spawnQueue;
let mouseX, mouseY, mouseDown, keys;
let gameOver, victory, dayPhase;
let searchHours, screenShake;

function init() {
    player = {
        hp: 100, maxHp: 100,
        x: W/2, y: H - 100,
        weapons: {pistol: {unlocked:true, ammo:Infinity}},
        currentWeapon: 'pistol',
        cooldown: 0,
        angle: 0,
        iFrames: 0,
        companions: [],
    };
    wall = {hp: 100, maxHp: 100, x: 0, y: H - 140, w: W, h: 20};
    night = 0;
    kills = 0;
    money = 0;
    zombies = [];
    projectiles = [];
    particles = [];
    traps = [];
    companions = [];
    drops = [];
    nightActive = false;
    nightTimer = 0;
    spawnTimer = 0;
    spawnQueue = [];
    gameOver = false;
    victory = false;
    dayPhase = true;
    searchHours = 0;
    screenShake = 0;
    keys = {};
    mouseDown = false;

    document.getElementById('go-screen').style.display = 'none';
    document.getElementById('win-screen').style.display = 'none';
    showDayPanel();
}

// ==================== INPUT ====================
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    const num = parseInt(e.key);
    if (num >= 1 && num <= 8) {
        const wName = WEAPON_ORDER[num-1];
        if (player.weapons[wName]?.unlocked) player.currentWeapon = wName;
    }
    if (e.code === 'KeyR' && dayPhase) showDayPanel();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
C.addEventListener('mousemove', e => {
    const r = C.getBoundingClientRect();
    mouseX = (e.clientX - r.left) * (W / r.width);
    mouseY = (e.clientY - r.top) * (H / r.height);
});
C.addEventListener('mousedown', e => { mouseDown = true; e.preventDefault(); });
C.addEventListener('mouseup', () => { mouseDown = false; });
C.addEventListener('contextmenu', e => e.preventDefault());

// ==================== DAY PHASE ====================
function showDayPanel() {
    dayPhase = true;
    nightActive = false;
    const panel = document.getElementById('day-panel');
    panel.style.display = 'flex';
    searchHours = 8;

    let html = `<h1>☀️ Day ${night + 1}</h1>`;
    html += `<div class="sub">Night ${night} survived | 💰 ${money} | Allocate ${searchHours} hours of search time, then prepare for the night.</div>`;

    // Search allocation
    html += `<div id="search-bar"><h3>🔎 Search Parties (${searchHours}h remaining)</h3>`;
    html += `<div id="search-alloc">`;
    html += `<div class="alloc-btn" onclick="allocSearch('survivors')">🧑 Survivors</div>`;
    html += `<div class="alloc-btn" onclick="allocSearch('weapons')">🔫 Weapons</div>`;
    html += `<div class="alloc-btn" onclick="allocSearch('supplies')">📦 Supplies</div>`;
    html += `<div class="alloc-btn" onclick="allocSearch('materials')">🧱 Materials</div>`;
    html += `</div><div id="search-result"></div></div>`;

    // Shop sections
    html += `<div id="day-sections">`;

    // Weapons shop
    html += `<div class="day-section"><h3>🔫 Weapons & Ammo</h3>`;
    for (const [id, item] of Object.entries(SHOP)) {
        if (item.type !== 'weapon' && item.type !== 'ammo') continue;
        if (item.type === 'weapon' && player.weapons[item.weapon]?.unlocked) continue;
        if (item.type === 'ammo' && !player.weapons[item.weapon]?.unlocked) continue;
        const can = money >= item.cost;
        html += `<div class="shop-item${can?'':' cant'}" onclick="${can?`buyItem('${id}')`:''}">`
            + `<div class="si-icon">${item.icon}</div><div class="si-info"><div class="si-name">${item.name}</div>`
            + `<div class="si-desc">${item.desc}</div></div><div class="si-cost">💰${item.cost}</div></div>`;
    }
    html += `</div>`;

    // Upgrades
    html += `<div class="day-section"><h3>🛡️ Defenses & Upgrades</h3>`;
    for (const [id, item] of Object.entries(SHOP)) {
        if (item.type === 'weapon' || item.type === 'ammo') continue;
        const can = money >= item.cost;
        html += `<div class="shop-item${can?'':' cant'}" onclick="${can?`buyItem('${id}')`:''}">`
            + `<div class="si-icon">${item.icon}</div><div class="si-info"><div class="si-name">${item.name}</div>`
            + `<div class="si-desc">${item.desc}</div></div><div class="si-cost">💰${item.cost}</div></div>`;
    }
    html += `</div>`;
    html += `</div>`;

    html += `<button class="proceed-btn" onclick="startNight()">⚔️ Survive the Night</button>`;
    panel.innerHTML = html;
}

window.allocSearch = function(type) {
    if (searchHours <= 0) return;
    searchHours -= 2;
    let result = '';
    const luck = Math.random();

    if (type === 'survivors') {
        if (luck < 0.4) {
            companions.push({x: W/2 + (Math.random()-0.5)*200, y: H-110, cooldown:0, hp:30, maxHp:30});
            result = '🧑 Found a survivor! They will help defend.';
        } else {
            result = '😔 No survivors found...';
        }
    } else if (type === 'weapons') {
        const found = Math.floor(50 + luck * 150);
        money += found;
        result = `🔫 Found weapon parts worth 💰${found}!`;
        if (luck > 0.8) {
            const bonus = Math.floor(100 + Math.random()*200);
            money += bonus;
            result += ` And a stash worth 💰${bonus}!`;
        }
    } else if (type === 'supplies') {
        const heal = Math.floor(20 + luck * 40);
        player.hp = Math.min(player.maxHp, player.hp + heal);
        const found = Math.floor(30 + luck * 80);
        money += found;
        result = `📦 Found supplies: +${heal} HP and 💰${found}`;
    } else if (type === 'materials') {
        const repair = Math.floor(20 + luck * 50);
        wall.hp = Math.min(wall.maxHp, wall.hp + repair);
        const found = Math.floor(20 + luck * 60);
        money += found;
        result = `🧱 Found materials: +${repair} wall repair and 💰${found}`;
    }

    document.getElementById('search-result').innerHTML = result;
    showDayPanel();
};

window.buyItem = function(id) {
    const item = SHOP[id];
    if (!item || money < item.cost) return;
    money -= item.cost;

    if (item.type === 'weapon') {
        player.weapons[item.weapon] = {unlocked:true, ammo:item.ammo};
    } else if (item.type === 'ammo') {
        player.weapons[item.weapon].ammo += item.ammo;
    } else if (item.type === 'repair') {
        wall.hp = wall.maxHp;
    } else if (item.type === 'wall_up') {
        wall.maxHp += 50;
        wall.hp = wall.maxHp;
    } else if (item.type === 'heal') {
        player.hp = Math.min(player.maxHp, player.hp + item.amount);
    } else if (item.type === 'max_hp') {
        player.maxHp += item.amount;
        player.hp = Math.min(player.maxHp, player.hp + item.amount);
    } else if (item.type === 'trap') {
        const tx = 100 + Math.random() * (W - 200);
        const ty = wall.y - 40 - Math.random() * (H - wall.y - 100);
        traps.push({type:item.trapType, x:tx, y:ty, life:1, radius:item.trapType==='fire'?50:40});
    } else if (item.type === 'companion') {
        companions.push({x: W/2 + (Math.random()-0.5)*300, y: H-110, cooldown:0, hp:50, maxHp:50});
    }

    showDayPanel();
};

function startNight() {
    dayPhase = false;
    document.getElementById('day-panel').style.display = 'none';
    night++;
    nightActive = true;
    nightTimer = 0;
    maxNightTime = 1200 + night * 180; // longer nights
    spawnTimer = 0;

    // Generate spawn queue
    spawnQueue = [];
    const budget = 5 + night * 8 + Math.floor(Math.pow(night, 1.5) * 2);
    let rem = budget;
    const avail = [];
    avail.push({type:'walker', cost:1});
    avail.push({type:'horde', cost:1});
    if (night >= 2) avail.push({type:'runner', cost:2});
    if (night >= 3) avail.push({type:'crawler', cost:1});
    if (night >= 4) avail.push({type:'brute', cost:4});
    if (night >= 5) avail.push({type:'spitter', cost:3});
    if (night >= 6) avail.push({type:'exploder', cost:3});
    if (night >= 7) avail.push({type:'screamer', cost:3});
    if (night >= 8) avail.push({type:'armored', cost:6});
    if (night >= 10) avail.push({type:'giant', cost:15});

    while (rem > 0) {
        const pick = avail[Math.floor(Math.random() * avail.length)];
        if (pick.cost <= rem) {
            spawnQueue.push(pick.type);
            rem -= pick.cost;
        } else rem--;
    }
    // Boss every 5 nights
    if (night % 5 === 0 && night >= 5) {
        for (let i = 0; i < Math.floor(night/5); i++) spawnQueue.push('giant');
    }
    // Shuffle
    for (let i = spawnQueue.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [spawnQueue[i],spawnQueue[j]] = [spawnQueue[j],spawnQueue[i]];
    }

    updateUI();
    buildWeaponBar();
}
window.startNight = startNight;
window.restart = function() { init(); };

// ==================== UI ====================
function updateUI() {
    document.getElementById('hp-bar').style.width = (player.hp/player.maxHp*100)+'%';
    document.getElementById('hp-text').textContent = `${Math.ceil(player.hp)}/${player.maxHp}`;
    document.getElementById('wall-bar').style.width = (Math.max(0,wall.hp)/wall.maxHp*100)+'%';
    document.getElementById('wall-text').textContent = `${Math.ceil(Math.max(0,wall.hp))}/${wall.maxHp}`;
    document.getElementById('night-num').textContent = night;
    document.getElementById('kills').textContent = kills;
    document.getElementById('survivors').textContent = companions.filter(c=>c.hp>0).length;
}

function buildWeaponBar() {
    const bar = document.getElementById('weapon-bar');
    bar.innerHTML = '';
    WEAPON_ORDER.forEach((wName, i) => {
        const pw = player.weapons[wName];
        if (!pw || !pw.unlocked) return;
        const info = WEAPONS[wName];
        const active = player.currentWeapon === wName;
        const slot = document.createElement('div');
        slot.className = 'wslot' + (active ? ' active' : '');
        slot.innerHTML = `<div class="w-key">${i+1}</div><div class="w-icon">${info.icon}</div><div class="w-name">${info.name}</div>`
            + (pw.ammo !== Infinity ? `<div class="w-ammo">${pw.ammo}</div>` : '');
        slot.onclick = () => { player.currentWeapon = wName; buildWeaponBar(); };
        bar.appendChild(slot);
    });
}

// ==================== SHOOTING ====================
function shoot() {
    const wName = player.currentWeapon;
    const info = WEAPONS[wName];
    const pw = player.weapons[wName];
    if (!pw || pw.ammo <= 0) return;
    if (player.cooldown > 0) return;

    player.cooldown = info.rate;
    if (pw.ammo !== Infinity) pw.ammo--;

    const pellets = info.pellets || 1;
    for (let i = 0; i < pellets; i++) {
        const spread = (Math.random()-0.5) * info.spread * 2;
        const angle = player.angle + spread;
        const p = {
            x: player.x, y: player.y - 15,
            vx: Math.cos(angle) * info.projSpeed,
            vy: Math.sin(angle) * info.projSpeed,
            dmg: info.dmg, life: 60,
            explosive: info.explosive || 0,
            pierce: info.pierce || 0,
            flame: info.flame || false,
            knockback: info.knockback || 0,
            color: info.flame ? '#FF6D00' : info.explosive ? '#FF5722' : '#FFD700',
        };
        projectiles.push(p);
    }

    // Muzzle flash
    const mx = player.x + Math.cos(player.angle)*20;
    const my = player.y - 15 + Math.sin(player.angle)*20;
    for (let i = 0; i < 4; i++) {
        particles.push({
            x:mx, y:my, vx:Math.cos(player.angle)*3+(Math.random()-0.5)*2, vy:Math.sin(player.angle)*3+(Math.random()-0.5)*2,
            life:8+Math.random()*5, color:'#FFD700', size:2+Math.random()*2
        });
    }
    screenShake = Math.min(screenShake + (info.explosive ? 5 : info.knockback * 0.5), 10);
}

// ==================== UPDATE ====================
let frame = 0;
function update() {
    if (gameOver || victory || dayPhase) return;
    frame++;

    // Night timer
    nightTimer++;
    if (nightTimer >= maxNightTime && zombies.length === 0 && spawnQueue.length === 0) {
        // Night survived
        if (night >= 20) {
            victory = true;
            document.getElementById('win-stats').textContent = `Total kills: ${kills} | Survivors: ${companions.filter(c=>c.hp>0).length}`;
            document.getElementById('win-screen').style.display = 'flex';
            return;
        }
        // Reward money
        money += 50 + night * 20;
        showDayPanel();
        return;
    }

    // Spawn zombies
    if (spawnQueue.length > 0) {
        spawnTimer--;
        if (spawnTimer <= 0) {
            const type = spawnQueue.shift();
            const info = ZOMBIE_TYPES[type];
            const side = Math.random();
            let sx, sy;
            if (side < 0.6) {
                // Top
                sx = 30 + Math.random() * (W-60);
                sy = -10 - Math.random() * 30;
            } else if (side < 0.8) {
                // Left
                sx = -10;
                sy = Math.random() * (wall.y - 50);
            } else {
                // Right
                sx = W + 10;
                sy = Math.random() * (wall.y - 50);
            }
            const hpScale = 1 + (night - 1) * 0.15;
            zombies.push({
                type, x:sx, y:sy,
                hp: Math.floor(info.hp * hpScale), maxHp: Math.floor(info.hp * hpScale),
                speed: info.speed, dmg: info.dmg, color: info.color,
                w: info.w, h: info.h, reward: info.reward,
                vx:0, vy:0, attackCd:0, animT: Math.random()*100,
                ranged: info.ranged||false, projDmg:info.projDmg||0, shootCd:0,
                explode: info.explode||false, explodeDmg:info.explodeDmg||0, explodeR:info.explodeR||0,
                buff: info.buff||false, buffCd:0, boss:info.boss||false,
                burning: 0, slowed: 0, stunned: 0,
            });
            spawnTimer = Math.max(8, 30 - night);
        }
    }

    // Player aim
    player.angle = Math.atan2(mouseY - (player.y - 15), mouseX - player.x);

    // Player movement
    const moveSpeed = 2.5;
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= moveSpeed;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += moveSpeed;
    player.x = Math.max(30, Math.min(W-30, player.x));

    if (player.cooldown > 0) player.cooldown--;
    if (player.iFrames > 0) player.iFrames--;

    // Shooting
    const wInfo = WEAPONS[player.currentWeapon];
    if (mouseDown && (wInfo.auto || player.cooldown <= 0)) {
        shoot();
    }

    // Screen shake
    if (screenShake > 0) screenShake *= 0.9;
    if (screenShake < 0.3) screenShake = 0;

    // Companions shoot
    companions.forEach(c => {
        if (c.hp <= 0) return;
        c.cooldown--;
        if (c.cooldown <= 0 && zombies.length > 0) {
            // Find closest zombie
            let closest = null, cd = Infinity;
            zombies.forEach(z => {
                const d = Math.sqrt((z.x-c.x)**2+(z.y-c.y)**2);
                if (d < 300 && d < cd) { cd = d; closest = z; }
            });
            if (closest) {
                c.cooldown = 25 + Math.floor(Math.random()*10);
                const angle = Math.atan2(closest.y - c.y, closest.x - c.x);
                projectiles.push({
                    x:c.x, y:c.y-10, vx:Math.cos(angle)*12, vy:Math.sin(angle)*12,
                    dmg:10, life:40, color:'#FF9800', pierce:0, knockback:1, explosive:0, flame:false,
                });
            }
        }
    });

    // Zombie update
    zombies.forEach(z => {
        z.animT++;
        if (z.stunned > 0) { z.stunned--; return; }
        if (z.burning > 0) {
            z.burning--;
            if (frame % 10 === 0) {
                z.hp -= 3;
                particles.push({x:z.x, y:z.y-z.h/2, vx:(Math.random()-0.5)*2, vy:-Math.random()*2,
                    life:15, color:'#FF6D00', size:3});
            }
        }

        const speed = z.slowed > 0 ? z.speed * 0.4 : z.speed;
        if (z.slowed > 0) z.slowed--;

        // Buff nearby
        if (z.buff) {
            z.buffCd--;
            if (z.buffCd <= 0) {
                z.buffCd = 120;
                zombies.forEach(oz => {
                    if (oz !== z && Math.abs(oz.x-z.x)<80 && Math.abs(oz.y-z.y)<80) {
                        oz.speed *= 1.15;
                    }
                });
                // Scream effect
                particles.push({x:z.x, y:z.y, vx:0, vy:0, life:20, color:'rgba(200,100,200,0.3)', size:40, ring:true});
            }
        }

        // Movement towards wall/player
        let tx, ty;
        if (wall.hp > 0) {
            tx = z.x; ty = wall.y;
        } else {
            tx = player.x; ty = player.y;
        }
        const dx = tx - z.x, dy = ty - z.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        // Ranged zombies stop at distance
        if (z.ranged && dist < 200) {
            z.shootCd--;
            if (z.shootCd <= 0) {
                z.shootCd = 90;
                const a = Math.atan2(player.y - z.y, player.x - z.x);
                projectiles.push({
                    x:z.x, y:z.y, vx:Math.cos(a)*5, vy:Math.sin(a)*5,
                    dmg:z.projDmg, life:80, color:'#4CAF50', enemy:true,
                    pierce:0, knockback:0, explosive:0, flame:false,
                });
                particles.push({x:z.x, y:z.y-z.h/2, vx:0, vy:-1, life:15, color:'#4CAF50', size:5});
            }
        } else if (dist > 8) {
            z.x += (dx/dist) * speed;
            z.y += (dy/dist) * speed;
        }

        // Attack wall
        if (wall.hp > 0 && z.y >= wall.y - z.h/2 - 5) {
            z.y = wall.y - z.h/2 - 5;
            z.attackCd--;
            if (z.attackCd <= 0) {
                z.attackCd = 40;
                wall.hp -= z.dmg;
                screenShake = Math.max(screenShake, z.dmg * 0.2);
                // Exploder
                if (z.explode) {
                    wall.hp -= z.explodeDmg;
                    // Damage nearby
                    const px = player.x, py = player.y;
                    if (Math.sqrt((px-z.x)**2+(py-z.y)**2) < z.explodeR) {
                        damagePlayer(z.explodeDmg * 0.5);
                    }
                    // Explosion effect
                    screenShake = 8;
                    for (let i = 0; i < 20; i++) {
                        const a = Math.random()*Math.PI*2, s = Math.random()*5+2;
                        particles.push({x:z.x, y:z.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
                            life:25+Math.random()*15, color:['#FF6D00','#FF5722','#FFC107'][Math.floor(Math.random()*3)],
                            size:3+Math.random()*4});
                    }
                    z.hp = 0;
                }
                if (wall.hp <= 0) wall.hp = 0;
            }
        }

        // Attack player (if wall down)
        if (wall.hp <= 0) {
            const pdist = Math.sqrt((player.x-z.x)**2+(player.y-z.y)**2);
            if (pdist < 25) {
                z.attackCd--;
                if (z.attackCd <= 0) {
                    z.attackCd = 30;
                    damagePlayer(z.dmg);
                    if (z.explode) {
                        damagePlayer(z.explodeDmg);
                        screenShake = 8;
                        for (let i = 0; i < 15; i++) {
                            const a = Math.random()*Math.PI*2, s = Math.random()*4+2;
                            particles.push({x:z.x, y:z.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
                                life:20, color:'#FF5722', size:3+Math.random()*3});
                        }
                        z.hp = 0;
                    }
                }
            }
        }

        // Knockback
        z.x += z.vx; z.y += z.vy;
        z.vx *= 0.85; z.vy *= 0.85;
        z.x = Math.max(5, Math.min(W-5, z.x));
        z.y = Math.max(-20, z.y);
    });

    // Traps
    traps.forEach(t => {
        zombies.forEach(z => {
            if (Math.abs(z.x-t.x) < t.radius && Math.abs(z.y-t.y) < t.radius) {
                if (t.type === 'spikes' && frame % 20 === 0) {
                    z.hp -= 8;
                } else if (t.type === 'fire' && frame % 15 === 0) {
                    z.burning = 120;
                } else if (t.type === 'slow') {
                    z.slowed = 60;
                }
            }
        });
    });

    // Projectiles
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += p.vx; p.y += p.vy;
        p.life--;

        if (p.flame) {
            p.life = Math.min(p.life, 15);
            p.vx *= 0.96; p.vy *= 0.96;
            particles.push({x:p.x+(Math.random()-0.5)*8, y:p.y+(Math.random()-0.5)*8,
                vx:(Math.random()-0.5)*1, vy:-Math.random()*1,
                life:10+Math.random()*5, color:Math.random()>0.5?'#FF6D00':'#FFC107', size:2+Math.random()*3});
        }

        // Out of bounds
        if (p.x < -20 || p.x > W+20 || p.y < -30 || p.y > H+20) { projectiles.splice(i, 1); continue; }

        // Enemy projectile hits player
        if (p.enemy) {
            if (Math.abs(p.x - player.x) < 15 && Math.abs(p.y - player.y) < 20) {
                damagePlayer(p.dmg);
                projectiles.splice(i, 1);
                continue;
            }
            continue;
        }

        // Player projectile hits zombie
        let hit = false;
        for (const z of zombies) {
            if (Math.abs(p.x - z.x) < z.w && Math.abs(p.y - z.y) < z.h) {
                z.hp -= p.dmg;
                if (p.flame) z.burning = 90;
                // Knockback
                const ka = Math.atan2(z.y - p.y, z.x - p.x);
                z.vx += Math.cos(ka) * p.knockback;
                z.vy += Math.sin(ka) * p.knockback;

                // Hit particles
                for (let j = 0; j < 3; j++) {
                    particles.push({x:p.x, y:p.y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3,
                        life:10+Math.random()*5, color:z.color, size:2});
                }

                // Explosion
                if (p.explosive > 0) {
                    screenShake = 6;
                    zombies.forEach(oz => {
                        if (oz !== z && Math.sqrt((oz.x-p.x)**2+(oz.y-p.y)**2) < p.explosive) {
                            oz.hp -= Math.floor(p.dmg * 0.6);
                            const ka2 = Math.atan2(oz.y-p.y, oz.x-p.x);
                            oz.vx += Math.cos(ka2)*4; oz.vy += Math.sin(ka2)*4;
                        }
                    });
                    for (let j = 0; j < 15; j++) {
                        const a = Math.random()*Math.PI*2, s = Math.random()*5+2;
                        particles.push({x:p.x, y:p.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
                            life:20+Math.random()*10, color:['#FF5722','#FF9800','#FFC107','#fff'][Math.floor(Math.random()*4)],
                            size:3+Math.random()*4});
                    }
                }

                if (p.pierce > 0) { p.pierce--; p.dmg = Math.floor(p.dmg * 0.7); }
                else { hit = true; }
                break;
            }
        }
        if (hit) projectiles.splice(i, 1);
        if (p.life <= 0) projectiles.splice(i, 1);
    }

    // Remove dead zombies
    zombies = zombies.filter(z => {
        if (z.hp <= 0) {
            kills++;
            money += z.reward;
            // Death particles
            const count = z.boss ? 25 : 10;
            for (let i = 0; i < count; i++) {
                particles.push({x:z.x, y:z.y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5 - 2,
                    life:20+Math.random()*15, color:z.color, size:2+Math.random()*3});
            }
            if (z.boss) screenShake = 10;
            // Drop
            if (Math.random() < 0.15) {
                drops.push({x:z.x, y:z.y, type:Math.random()<0.5?'hp':'money',
                    amount: Math.random()<0.5 ? 10 : Math.floor(z.reward*0.5), life:600});
            }
            return false;
        }
        return true;
    });

    // Drops
    drops.forEach(d => {
        d.life--;
        const dx = player.x - d.x, dy = player.y - d.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 40) {
            if (d.type === 'hp') player.hp = Math.min(player.maxHp, player.hp + d.amount);
            else money += d.amount;
            d.life = 0;
        }
    });
    drops = drops.filter(d => d.life > 0);

    // Companion damage from zombies
    companions.forEach(c => {
        if (c.hp <= 0) return;
        zombies.forEach(z => {
            if (Math.abs(z.x-c.x)<20 && Math.abs(z.y-c.y)<20 && z.attackCd <= 0) {
                c.hp -= z.dmg * 0.3;
                z.attackCd = 30;
            }
        });
    });

    // Particles
    particles.forEach(p => {
        if (!p.ring) { p.x += p.vx; p.y += p.vy; p.vy += 0.05; }
        p.life--; p.size *= 0.97;
    });
    particles = particles.filter(p => p.life > 0);
    if (particles.length > 800) particles.splice(0, particles.length - 800);

    updateUI();
    buildWeaponBar();
}

function damagePlayer(dmg) {
    if (player.iFrames > 0) return;
    player.hp -= dmg;
    player.iFrames = 20;
    screenShake = Math.max(screenShake, dmg * 0.3);
    for (let i = 0; i < 6; i++) {
        particles.push({x:player.x, y:player.y, vx:(Math.random()-0.5)*4, vy:-Math.random()*3,
            life:15, color:'#E53935', size:2+Math.random()*2});
    }
    if (player.hp <= 0) {
        player.hp = 0;
        gameOver = true;
        document.getElementById('go-stats').textContent = `Survived ${night} nights | ${kills} kills`;
        document.getElementById('go-screen').style.display = 'flex';
    }
}

// ==================== DRAW ====================
function draw() {
    ctx.save();
    if (screenShake > 0.5) {
        ctx.translate((Math.random()-0.5)*screenShake*2, (Math.random()-0.5)*screenShake*2);
    }

    // Sky
    const nightProgress = nightActive ? Math.min(1, nightTimer / 300) : 0;
    const skyDark = dayPhase ? 0.3 : 0.05 + nightProgress * 0.05;
    const grd = ctx.createLinearGradient(0,0,0,H);
    if (dayPhase) {
        grd.addColorStop(0, '#354070');
        grd.addColorStop(1, '#506080');
    } else {
        grd.addColorStop(0, '#0a0a15');
        grd.addColorStop(0.6, '#151520');
        grd.addColorStop(1, '#1a1a25');
    }
    ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);

    // Stars
    if (!dayPhase) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        for (let i = 0; i < 60; i++) {
            const sx = (i*197+50)%W, sy = (i*131+10)%(H*0.3);
            const twinkle = Math.sin(frame*0.02+i*5)*0.3+0.7;
            ctx.globalAlpha = twinkle; ctx.fillRect(sx,sy,1.5,1.5);
        }
        ctx.globalAlpha = 1;
        // Moon
        ctx.fillStyle = 'rgba(200,200,220,0.15)';
        ctx.beginPath(); ctx.arc(780, 60, 40, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(220,220,240,0.8)';
        ctx.beginPath(); ctx.arc(780, 60, 25, 0, Math.PI*2); ctx.fill();
    }

    // Background buildings
    ctx.fillStyle = '#151518';
    for (let i = 0; i < 15; i++) {
        const bx = (i*73+20)%W - 20, bw = 40+((i*37)%40);
        const bh = 60+((i*53)%80);
        ctx.fillRect(bx, wall.y - bh - 20, bw, bh + 20);
        // Windows
        ctx.fillStyle = Math.random()>0.7 ? 'rgba(255,200,50,0.15)' : 'rgba(50,50,80,0.3)';
        for (let wy = wall.y-bh-10; wy < wall.y-30; wy += 15) {
            for (let wx = bx+5; wx < bx+bw-5; wx += 12) {
                ctx.fillRect(wx,wy,6,8);
            }
        }
        ctx.fillStyle = '#151518';
    }

    // Ground
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, wall.y + wall.h, W, H - wall.y - wall.h);
    ctx.fillStyle = '#252525';
    ctx.fillRect(0, H - 40, W, 40);

    // Traps
    traps.forEach(t => {
        ctx.globalAlpha = 0.6;
        if (t.type === 'spikes') {
            ctx.fillStyle = '#9E9E9E';
            for (let i = -3; i <= 3; i++) {
                ctx.beginPath(); ctx.moveTo(t.x+i*8, t.y+5); ctx.lineTo(t.x+i*8-3, t.y-8);
                ctx.lineTo(t.x+i*8+3, t.y-8); ctx.closePath(); ctx.fill();
            }
        } else if (t.type === 'fire') {
            ctx.fillStyle = 'rgba(255,100,0,0.3)';
            ctx.beginPath(); ctx.arc(t.x, t.y, t.radius, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#FF6D00'; ctx.lineWidth = 1;
            ctx.stroke();
        } else if (t.type === 'slow') {
            ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath();
                ctx.moveTo(t.x-t.radius, t.y+i*8);
                ctx.lineTo(t.x+t.radius, t.y+i*8);
                ctx.stroke();
            }
        }
        ctx.globalAlpha = 1;
    });

    // Wall (barricade)
    if (wall.hp > 0) {
        const dmgPct = 1 - wall.hp / wall.maxHp;
        // Barricade base
        ctx.fillStyle = '#5D4037';
        ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
        // Planks
        ctx.fillStyle = '#795548';
        for (let x = 0; x < W; x += 24) {
            ctx.fillRect(x, wall.y+2, 20, wall.h-4);
        }
        // Top spikes
        ctx.fillStyle = '#4E342E';
        for (let x = 0; x < W; x += 16) {
            ctx.beginPath(); ctx.moveTo(x+8, wall.y-6); ctx.lineTo(x+2, wall.y); ctx.lineTo(x+14, wall.y);
            ctx.closePath(); ctx.fill();
        }
        // Damage cracks
        if (dmgPct > 0.3) {
            ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2;
            for (let i = 0; i < Math.floor(dmgPct * 10); i++) {
                const cx = (i*137+50)%W;
                ctx.beginPath(); ctx.moveTo(cx, wall.y); ctx.lineTo(cx+(Math.random()-0.5)*15, wall.y+wall.h); ctx.stroke();
            }
        }
        // Nails
        ctx.fillStyle = '#9E9E9E';
        for (let x = 10; x < W; x += 24) {
            ctx.fillRect(x, wall.y+wall.h/2-1, 2, 2);
        }
        // HP glow when low
        if (dmgPct > 0.7) {
            ctx.fillStyle = `rgba(255,0,0,${Math.sin(frame*0.1)*0.1+0.1})`;
            ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
        }
    } else {
        // Destroyed wall debris
        ctx.fillStyle = '#3E2723';
        for (let x = 0; x < W; x += 30) {
            const h = 3 + Math.random()*5;
            ctx.fillRect(x, wall.y+wall.h-h, 15+Math.random()*10, h);
        }
    }

    // Drops
    drops.forEach(d => {
        const bob = Math.sin(frame*0.08+d.x)*3;
        ctx.fillStyle = 'rgba(255,255,200,0.15)';
        ctx.beginPath(); ctx.arc(d.x, d.y+bob, 10, 0, Math.PI*2); ctx.fill();
        ctx.font = '12px serif'; ctx.textAlign = 'center';
        ctx.fillText(d.type==='hp'?'💊':'💰', d.x, d.y+bob+4);
    });

    // Zombies
    zombies.forEach(z => {
        const info = ZOMBIE_TYPES[z.type];
        const bob = Math.sin(z.animT * 0.08) * 1.5;

        ctx.save();
        ctx.translate(z.x, z.y + bob);

        // Burning overlay
        if (z.burning > 0) {
            ctx.fillStyle = 'rgba(255,100,0,0.2)';
            ctx.beginPath(); ctx.arc(0, 0, z.w+3, 0, Math.PI*2); ctx.fill();
        }
        // Slow overlay
        if (z.slowed > 0) {
            ctx.fillStyle = 'rgba(100,100,255,0.15)';
            ctx.beginPath(); ctx.arc(0, 0, z.w+2, 0, Math.PI*2); ctx.fill();
        }

        if (z.type === 'crawler') {
            ctx.fillStyle = z.color;
            ctx.beginPath(); ctx.ellipse(0, 2, z.w/2, z.h/2, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FF5722'; ctx.fillRect(-3, 0, 2, 2); ctx.fillRect(2, 0, 2, 2);
        } else if (z.type === 'giant') {
            // Boss
            ctx.fillStyle = z.color;
            ctx.fillRect(-z.w/2, -z.h/2, z.w, z.h);
            ctx.fillStyle = '#1a2a1a';
            ctx.fillRect(-z.w/2-4, -z.h/2+5, z.w+8, z.h*0.4);
            // Head
            ctx.fillStyle = z.color;
            ctx.beginPath(); ctx.arc(0, -z.h/2-5, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FF5722'; ctx.fillRect(-5, -z.h/2-8, 4, 3); ctx.fillRect(2, -z.h/2-8, 4, 3);
            // Boss label
            ctx.fillStyle = '#F44336'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('GIANT', 0, -z.h/2-15);
        } else if (z.type === 'exploder') {
            ctx.fillStyle = z.color;
            ctx.beginPath(); ctx.ellipse(0, 0, z.w/2, z.h/2, 0, 0, Math.PI*2); ctx.fill();
            // Glowing belly
            const glow = Math.sin(z.animT*0.15)*0.3+0.5;
            ctx.fillStyle = `rgba(255,100,0,${glow})`;
            ctx.beginPath(); ctx.arc(0, 2, 6, 0, Math.PI*2); ctx.fill();
        } else if (z.type === 'spitter') {
            ctx.fillStyle = z.color;
            ctx.fillRect(-z.w/2, -z.h/2, z.w, z.h);
            ctx.fillStyle = z.color;
            ctx.fillRect(-4, -z.h/2-5, 8, 6);
            // Acid mouth
            ctx.fillStyle = '#76FF03';
            ctx.fillRect(-3, -z.h/2+1, 6, 3);
        } else if (z.type === 'screamer') {
            ctx.fillStyle = z.color;
            ctx.fillRect(-z.w/2, -z.h/2, z.w, z.h);
            ctx.fillStyle = z.color;
            ctx.fillRect(-4, -z.h/2-5, 8, 6);
            // Open mouth
            ctx.fillStyle = '#E91E63';
            ctx.beginPath(); ctx.arc(0, -z.h/2+2, 4, 0, Math.PI); ctx.fill();
        } else {
            // Standard humanoid
            ctx.fillStyle = z.color;
            ctx.fillRect(-z.w/2, -z.h/2, z.w, z.h);
            // Head
            ctx.fillStyle = z.type === 'armored' ? '#555' : z.color;
            ctx.fillRect(-5, -z.h/2-6, 10, 7);
            if (z.type === 'armored') {
                ctx.fillStyle = '#444'; ctx.fillRect(-z.w/2-2, -z.h/2, z.w+4, z.h*0.6);
            }
            // Eyes
            ctx.fillStyle = z.type === 'runner' ? '#FF5722' : '#FFEB3B';
            ctx.fillRect(-3, -z.h/2-4, 2, 2); ctx.fillRect(2, -z.h/2-4, 2, 2);
            // Arms
            const armA = Math.sin(z.animT*0.1)*0.3;
            ctx.fillStyle = z.color;
            ctx.save(); ctx.translate(-z.w/2-1, -z.h/4); ctx.rotate(-0.5+armA); ctx.fillRect(-2,0,4,12); ctx.restore();
            ctx.save(); ctx.translate(z.w/2+1, -z.h/4); ctx.rotate(0.5-armA); ctx.fillRect(-2,0,4,12); ctx.restore();
            // Legs
            const legA = Math.sin(z.animT*0.12)*3;
            ctx.fillRect(-4, z.h/2, 3, 6+legA);
            ctx.fillRect(1, z.h/2, 3, 6-legA);
        }

        // HP bar
        if (z.hp < z.maxHp) {
            const bw = Math.max(z.w, 14);
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(-bw/2, -z.h/2-3, bw, 2);
            const hpPct = z.hp/z.maxHp;
            ctx.fillStyle = hpPct>0.5?'#4CAF50':hpPct>0.25?'#FF9800':'#F44336';
            ctx.fillRect(-bw/2, -z.h/2-3, bw*hpPct, 2);
        }

        ctx.restore();
    });

    // Projectiles
    projectiles.forEach(p => {
        if (p.flame) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = 0.7;
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        } else if (p.explosive) {
            ctx.fillStyle = '#555';
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255,100,0,0.4)';
            ctx.beginPath(); ctx.arc(p.x-2, p.y-2, 3, 0, Math.PI*2); ctx.fill();
        } else if (p.enemy) {
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.fillStyle = p.color;
            ctx.save(); ctx.translate(p.x, p.y);
            ctx.rotate(Math.atan2(p.vy, p.vx));
            ctx.fillRect(-4, -1, 8, 2);
            ctx.restore();
        }
    });

    // Companions
    companions.forEach(c => {
        if (c.hp <= 0) return;
        ctx.save(); ctx.translate(c.x, c.y);
        // Body
        ctx.fillStyle = '#1565C0';
        ctx.fillRect(-4, -10, 8, 14);
        // Head
        ctx.fillStyle = '#FFCC80';
        ctx.fillRect(-3, -16, 6, 7);
        // Gun
        ctx.fillStyle = '#555';
        ctx.fillRect(4, -8, 8, 3);
        // HP
        if (c.hp < c.maxHp) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-8, -19, 16, 2);
            ctx.fillStyle = '#4CAF50'; ctx.fillRect(-8, -19, 16*(c.hp/c.maxHp), 2);
        }
        ctx.restore();
    });

    // Player
    const flash = player.iFrames > 0 && Math.floor(player.iFrames/2)%2;
    if (!flash) {
        ctx.save();
        ctx.translate(player.x, player.y);

        // Legs
        ctx.fillStyle = '#37474F';
        const legA = Math.abs(keys['KeyA']||keys['KeyD']||keys['ArrowLeft']||keys['ArrowRight'] ? Math.sin(frame*0.15)*3 : 0);
        ctx.fillRect(-4, 4, 3, 10+legA);
        ctx.fillRect(1, 4, 3, 10-legA);

        // Body
        ctx.fillStyle = '#455A64';
        ctx.fillRect(-6, -12, 12, 17);

        // Head
        ctx.fillStyle = '#FFCC80';
        ctx.fillRect(-4, -20, 8, 9);
        // Helmet
        ctx.fillStyle = '#37474F';
        ctx.fillRect(-5, -22, 10, 5);

        // Eyes
        const eyeDir = player.angle < -Math.PI/2 || player.angle > Math.PI/2 ? -1 : 1;
        ctx.fillStyle = '#fff';
        ctx.fillRect(eyeDir > 0 ? 0 : -3, -17, 3, 2);
        ctx.fillStyle = '#333';
        ctx.fillRect(eyeDir > 0 ? 1 : -2, -17, 1.5, 2);

        // Gun arm
        ctx.save();
        ctx.translate(0, -8);
        ctx.rotate(player.angle);
        ctx.fillStyle = '#FFCC80';
        ctx.fillRect(0, -2, 12, 4);
        // Gun
        const wInfo = WEAPONS[player.currentWeapon];
        ctx.fillStyle = '#333';
        ctx.fillRect(10, -3, 14, 5);
        if (player.currentWeapon === 'shotgun') { ctx.fillRect(10, -4, 16, 7); }
        else if (player.currentWeapon === 'rpg') { ctx.fillRect(8, -5, 20, 9); ctx.fillStyle='#555'; ctx.fillRect(26,-3,4,5); }
        else if (player.currentWeapon === 'sniper') { ctx.fillRect(10,-2,22,4); ctx.fillStyle='#666'; ctx.fillRect(18,-5,6,3); }
        else if (player.currentWeapon === 'minigun') { ctx.fillRect(10,-4,18,8); ctx.fillStyle='#555'; for(let i=0;i<3;i++) ctx.fillRect(26, -3+i*3, 6, 2); }
        else if (player.currentWeapon === 'flamer') { ctx.fillRect(10,-3,16,6); ctx.fillStyle='#FF6D00'; ctx.fillRect(24,-2,4,4); }

        // Muzzle flash
        if (player.cooldown > WEAPONS[player.currentWeapon].rate - 3) {
            ctx.fillStyle = 'rgba(255,200,50,0.6)';
            ctx.beginPath(); ctx.arc(28, 0, 6, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();

        ctx.restore();
    }

    // Particles
    particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life / 20);
        if (p.ring) {
            ctx.strokeStyle = p.color; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (1 - p.life/20), 0, Math.PI*2); ctx.stroke();
        } else {
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.size), 0, Math.PI*2); ctx.fill();
        }
    });
    ctx.globalAlpha = 1;

    // Night progress bar
    if (nightActive) {
        const pct = Math.min(1, nightTimer / maxNightTime);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(W/2-150, H-28, 300, 8);
        const barGrd = ctx.createLinearGradient(W/2-150,0,W/2+150,0);
        barGrd.addColorStop(0,'#1a237e'); barGrd.addColorStop(pct,'#FF9800'); barGrd.addColorStop(1,'#1a237e');
        ctx.fillStyle = barGrd;
        ctx.fillRect(W/2-150, H-28, 300*pct, 8);
        ctx.fillStyle = '#fff'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(pct < 1 ? 'Survive the night...' : 'Dawn approaches!', W/2, H-18);
        // Zombie count
        ctx.fillStyle = '#aaa'; ctx.font = '10px sans-serif';
        ctx.fillText(`💀 ${zombies.length} remaining  |  📋 ${spawnQueue.length} incoming`, W/2, H-6);
    }

    // Vignette
    const vig = ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.8);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(0,0,0,0.4)');
    ctx.fillStyle = vig; ctx.fillRect(0,0,W,H);

    // Damage flash
    if (player.iFrames > 15) {
        ctx.fillStyle = `rgba(255,0,0,${(player.iFrames-15)*0.02})`;
        ctx.fillRect(0,0,W,H);
    }

    ctx.restore();
}

// ==================== LOOP ====================
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

init();
gameLoop();
</script>
</body>
</html>
