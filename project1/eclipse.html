// Tiles: . = empty, # = solid, ^ = spike, S = shard, E = exit, P = player start, M = moving platform

function makeLevel(lightStr, shadowStr, spawnCol, spawnRow, exitCol, exitRow, shardList, dialogueList, movingList) {
  const parse = (str) => {
    const rows = str.trim().split('\n').map(r => r.trim());
    const grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        const ch = rows[r] ? rows[r][c] : '.';
        if (ch === '#') grid[r][c] = SOLID;
        else if (ch === '^') grid[r][c] = SPIKE;
        else grid[r][c] = EMPTY;
      }
    }
    return grid;
  };
  return {
    light: parse(lightStr), shadow: parse(shadowStr),
    spawn: [spawnCol, spawnRow], exit: [exitCol, exitRow],
    shards: shardList || [], dialogue: dialogueList || [], moving: movingList || []
  };
}

// Generate remaining levels procedurally for chapters 2-5
function generateProceduralLevel(chapterIdx, levelIdx) {
  const ch = chapterIdx + 1;
  const difficulty = chapterIdx * 9 + levelIdx;
  const light = [], shadow = [];

  for (let r = 0; r < ROWS; r++) {
    light[r] = []; shadow[r] = [];
    for (let c = 0; c < COLS; c++) { light[r][c] = EMPTY; shadow[r][c] = EMPTY; }
  }

  // Ground/ceiling borders
  for (let c = 0; c < COLS; c++) {
    light[ROWS-1][c] = SOLID; light[ROWS-2][c] = SOLID;
    shadow[0][c] = SOLID; shadow[1][c] = SOLID;
  }

  // === BUILD A GUARANTEED PATH ===
  // Place stepping stone platforms from left to right, alternating worlds
  // Player must flip between them to cross

  const numSteps = 6 + Math.min(Math.floor(difficulty * 0.3), 8);
  const stepWidth = Math.max(2, 4 - Math.floor(difficulty * 0.1)); // platforms get smaller
  const path = []; // track platform positions for shard placement

  // Start platform in light world
  for (let c = 0; c < 5; c++) light[ROWS-3][c] = SOLID;

  // End platform in light world
  for (let c = COLS-5; c < COLS; c++) light[ROWS-3][c] = SOLID;

  let curX = 4;
  let curInShadow = false;

  for (let i = 0; i < numSteps; i++) {
    // Move right
    let gap = 3 + Math.floor(Math.random() * 3);
    curX = Math.min(curX + gap, COLS - 8);

    // Alternate worlds, sometimes stay in same
    if (Math.random() < 0.6 + difficulty * 0.005) curInShadow = !curInShadow;

    // Pick a height — in light: platforms near bottom half, in shadow: near top half (inverted gravity)
    let platRow;
    if (curInShadow) {
      platRow = 2 + Math.floor(Math.random() * 4); // rows 2-5 in shadow (ceiling side)
    } else {
      platRow = ROWS - 5 - Math.floor(Math.random() * 4); // rows 11-14 in light (floor side)
    }

    const w = Math.max(2, stepWidth + Math.floor(Math.random() * 2));
    const grid = curInShadow ? shadow : light;
    for (let j = 0; j < w; j++) {
      if (curX + j < COLS && platRow >= 0 && platRow < ROWS) {
        grid[platRow][curX + j] = SOLID;
      }
    }
    path.push({ x: curX + Math.floor(w/2), y: platRow, world: curInShadow ? 'shadow' : 'light' });
  }

  // === EXTRA DECORATIVE PLATFORMS (not on main path) ===
  const numExtra = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < numExtra; i++) {
    const w = 2 + Math.floor(Math.random() * 3);
    const c = 2 + Math.floor(Math.random() * (COLS - w - 4));
    const isLight = Math.random() < 0.5;
    const grid = isLight ? light : shadow;
    const r = isLight ? (4 + Math.floor(Math.random() * (ROWS - 8))) : (2 + Math.floor(Math.random() * (ROWS - 6)));
    for (let j = 0; j < w; j++) {
      if (c+j < COLS && r >= 0 && r < ROWS) grid[r][c+j] = SOLID;
    }
  }

  // === SPIKES (only in later chapters, never on the main path) ===
  if (ch >= 2) {
    const numSpikes = Math.min(2 + chapterIdx, 6);
    for (let i = 0; i < numSpikes; i++) {
      const c = 3 + Math.floor(Math.random() * (COLS - 6));
      const isLight = Math.random() < 0.5;
      const grid = isLight ? light : shadow;
      // Place spike above ground (light) or below ceiling (shadow)
      const r = isLight ? ROWS - 3 : 2;
      // Only place if not near a path platform
      const nearPath = path.some(p => Math.abs(p.x - c) < 3);
      if (!nearPath) grid[r][c] = SPIKE;
    }
  }

  // === SHARDS — place on or near path platforms ===
  const shardList = [];
  const numShards = 2 + Math.floor(Math.random() * 2);
  const usedPaths = new Set();
  for (let i = 0; i < numShards && path.length > 0; i++) {
    let pi;
    do { pi = Math.floor(Math.random() * path.length); } while (usedPaths.has(pi) && usedPaths.size < path.length);
    usedPaths.add(pi);
    const p = path[pi];
    // Place shard above/below the platform
    const shardRow = p.world === 'shadow' ? p.y + 1 : p.y - 1;
    shardList.push([p.x, Math.max(1, Math.min(ROWS-2, shardRow)), p.world]);
  }

  // === MOVING PLATFORMS (ch >= 2) ===
  const movList = [];
  if (ch >= 2) {
    const numMov = Math.min(1 + Math.floor(difficulty * 0.1), 3);
    for (let i = 0; i < numMov; i++) {
      const mp = path[Math.floor(Math.random() * path.length)];
      if (mp) {
        movList.push({
          x: mp.x, y: mp.y, w: 3, world: mp.world === 'shadow' ? 'shadow' : 'light',
          dx: (Math.random() < 0.5 ? 1 : -1) * (0.3 + Math.random() * 0.3), dy: 0,
          minX: Math.max(2, mp.x - 5), maxX: Math.min(COLS - 5, mp.x + 5)
        });
      }
    }
  }

  // Dialogue for chapter starts
  let dlg = [];
  if (levelIdx === 0) {
    if (ch === 3) dlg = [{ speaker:'Umbrus', text:'Shadow creatures roam here. They can only be avoided in the light.', color:'#a0a' }];
    if (ch === 4) dlg = [{ speaker:'Umbrus', text:'The worlds are destabilizing. They shift on their own now... be ready.', color:'#a0a' }];
    if (ch === 5) dlg = [{ speaker:'Umbrus', text:'The Fracture... it\'s ahead. Both worlds collide here. This is the end, Lumen.', color:'#a0a' },
                         { speaker:'Solara', text:'Lumen! Umbrus speaks true. We were both wrong. Heal the rift... for all of us.', color:'#ffd700' }];
  }

  return { light, shadow, spawn: [2, ROWS-3], exit: [COLS-3, ROWS-3],
    shards: shardList, dialogue: dlg, moving: movList };
}

// Fill remaining levels
while (LEVELS.length < 45) {
  const ch = Math.floor(LEVELS.length / 9);
  const lv = LEVELS.length % 9;
  LEVELS.push(generateProceduralLevel(ch, lv));
}

// ══════════════════════ PLAYER ══════════════════════
function createPlayer(x, y) {
  return { x: x * TILE + TILE/2, y: y * TILE + TILE/2, vx: 0, vy: 0, w: 20, h: 20, onGround: false, alive: true };
}

// ══════════════════════ LEVEL LOADING ══════════════════════
let collectedShards = {};

function loadLevel(idx) {
  if (idx >= LEVELS.length) idx = LEVELS.length - 1;
  const lvl = LEVELS[idx];
  levelLight = lvl.light.map(r => [...r]);
  levelShadow = lvl.shadow.map(r => [...r]);
  player = createPlayer(lvl.spawn[0], lvl.spawn[1]);
  exitPos = { x: lvl.exit[0] * TILE + TILE/2, y: lvl.exit[1] * TILE + TILE/2 };
  totalShards = lvl.shards.length;
  shards = 0;
  collectedShards = {};
  inShadow = false;
  gravityDir = 1;
  meter = 0.5;
  meterStuck = 0;
  flipTransition = 0;
  levelComplete = false;
  deathAnim = 0;
  particles = [];
  trailParticles = [];
  movingPlatforms = (lvl.moving || []).map(m => ({ ...m, startX: m.x }));

  currentChapter = Math.floor(idx / 9);
  currentLevel = idx % 9;
  document.getElementById('chapter-label').textContent = `Chapter ${currentChapter + 1}`;
  document.getElementById('level-label').textContent = currentLevel === 8 ? 'Boss' : `Level ${currentLevel + 1}`;
  document.getElementById('shard-count').textContent = '0';
  document.getElementById('shard-total').textContent = totalShards;

  if (lvl.dialogue && lvl.dialogue.length > 0) {
    dialogueQueue = [...lvl.dialogue];
    showNextDialogue();
  } else {
    dialogueQueue = [];
    dialogue = null;
    document.getElementById('dialogue').style.display = 'none';
  }
}

function showNextDialogue() {
  if (dialogueQueue.length === 0) {
    dialogue = null;
    document.getElementById('dialogue').style.display = 'none';
    return;
  }
  dialogue = dialogueQueue.shift();
  document.getElementById('dialogue').style.display = 'block';
  document.getElementById('dlg-speaker').textContent = dialogue.speaker;
  document.getElementById('dlg-speaker').style.color = dialogue.color || '#ffd700';
  document.getElementById('dlg-text').textContent = dialogue.text;
}

// ══════════════════════ INPUT ══════════════════════
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'Space' || e.code === 'Enter') && dialogue) { showNextDialogue(); e.preventDefault(); }
  if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight' || e.code === 'KeyF') && !dialogue && gameRunning && player?.alive && meterStuck <= 0) {
    doFlip();
  }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function doFlip() {
  inShadow = !inShadow;
  gravityDir *= -1;
  player.vy = -player.vy * 0.5; // partially reverse velocity
  flipTransition = FLIP_TRANSITION_TIME;
  meter = Math.max(0, Math.min(1, meter + (inShadow ? -0.15 : 0.15)));

  // Flip particles
  for (let i = 0; i < 15; i++) {
    particles.push({
      x: player.x + (Math.random()-0.5)*30, y: player.y + (Math.random()-0.5)*30,
      vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
      life: 20 + Math.random()*15, color: inShadow ? '#a040ff' : '#ffe080',
      size: 2 + Math.random()*3
    });
  }
}

// ══════════════════════ COLLISION ══════════════════════
function getGrid() { return inShadow ? levelShadow : levelLight; }

function tileAt(grid, col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return SOLID; // walls
  return grid[row][col];
}

function isOnMovingPlatform(px, py, pw, ph) {
  for (const mp of movingPlatforms) {
    const mpWorld = mp.world === 'shadow' ? true : false;
    if (mpWorld !== inShadow) continue;
    const mpX = mp.x * TILE, mpY = mp.y * TILE;
    const mpW = mp.w * TILE, mpH = TILE;
    if (gravityDir === 1) {
      if (py + ph/2 >= mpY && py + ph/2 <= mpY + 6 && px + pw/2 > mpX && px - pw/2 < mpX + mpW) return mp;
    } else {
      if (py - ph/2 <= mpY + mpH && py - ph/2 >= mpY + mpH - 6 && px + pw/2 > mpX && px - pw/2 < mpX + mpW) return mp;
    }
  }
  return null;
}

// ══════════════════════ UPDATE ══════════════════════
function update() {
  if (!gameRunning || dialogue || levelComplete) return;
  frame++;

  if (deathAnim > 0) {
    deathAnim--;
    if (deathAnim <= 0) {
      const lvl = LEVELS[currentChapter * 9 + currentLevel];
      player = createPlayer(lvl.spawn[0], lvl.spawn[1]);
      inShadow = false; gravityDir = 1; meter = 0.5; meterStuck = 0;
    }
    return;
  }

  if (!player || !player.alive) return;

  // ── Meter ──
  if (inShadow) {
    meter += METER_RATE;
  } else {
    meter -= METER_RATE;
  }
  meter = Math.max(0, Math.min(1, meter));
  if (meter <= 0 || meter >= 1) {
    if (meterStuck <= 0) meterStuck = METER_STUCK_TIME;
  }
  if (meterStuck > 0) meterStuck--;

  document.getElementById('meter-fill').style.width = (meter * 100) + '%';
  document.getElementById('meter-fill').style.background = meter > 0.7 ? 'linear-gradient(90deg,#a040ff,#6a0dad)' :
    meter < 0.3 ? 'linear-gradient(90deg,#ffe080,#fff)' : 'linear-gradient(90deg,#fff,#ffd700)';

  // ── Movement ──
  let mx = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) mx = -MOVE_SPEED;
  if (keys['ArrowRight'] || keys['KeyD']) mx = MOVE_SPEED;
  if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.onGround && !dialogue) {
    player.vy = JUMP_FORCE * gravityDir;
    player.onGround = false;
  }

  player.vx = mx;
  player.vy += GRAVITY * gravityDir;
  player.vy = Math.max(-15, Math.min(15, player.vy));

  // Moving platforms
  movingPlatforms.forEach(mp => {
    mp.x += mp.dx / TILE;
    if (mp.x <= mp.minX || mp.x >= mp.maxX) mp.dx *= -1;
  });

  // Ride moving platform
  const ridingPlatform = isOnMovingPlatform(player.x, player.y, player.w, player.h);
  if (ridingPlatform) {
    player.x += ridingPlatform.dx;
  }

  // ── Horizontal collision ──
  player.x += player.vx;
  const grid = getGrid();
  const halfW = player.w / 2, halfH = player.h / 2;

  // Check horizontal
  const checkCol = player.vx > 0 ? Math.floor((player.x + halfW) / TILE) : Math.floor((player.x - halfW) / TILE);
  const rowTop = Math.floor((player.y - halfH + 2) / TILE);
  const rowBot = Math.floor((player.y + halfH - 2) / TILE);
  for (let r = rowTop; r <= rowBot; r++) {
    const t = tileAt(grid, checkCol, r);
    if (t === SOLID) {
      if (player.vx > 0) player.x = checkCol * TILE - halfW;
      else player.x = (checkCol + 1) * TILE + halfW;
      player.vx = 0;
      break;
    }
  }

  // ── Vertical collision ──
  player.y += player.vy;
  player.onGround = false;

  const checkRow = (gravityDir === 1 ? (player.vy >= 0) : (player.vy <= 0))
    ? (gravityDir === 1 ? Math.floor((player.y + halfH) / TILE) : Math.floor((player.y - halfH) / TILE))
    : (gravityDir === 1 ? Math.floor((player.y - halfH) / TILE) : Math.floor((player.y + halfH) / TILE));

  const colL = Math.floor((player.x - halfW + 2) / TILE);
  const colR = Math.floor((player.x + halfW - 2) / TILE);

  for (let c = colL; c <= colR; c++) {
    const t = tileAt(grid, c, checkRow);
    if (t === SOLID) {
      if (gravityDir === 1) {
        if (player.vy > 0) { player.y = checkRow * TILE - halfH; player.onGround = true; }
        else { player.y = (checkRow + 1) * TILE + halfH; }
      } else {
        if (player.vy < 0) { player.y = (checkRow + 1) * TILE + halfH; player.onGround = true; }
        else { player.y = checkRow * TILE - halfH; }
      }
      player.vy = 0;
      break;
    }
  }

  // Moving platform landing
  if (!player.onGround) {
    const mp = isOnMovingPlatform(player.x, player.y, player.w, player.h);
    if (mp) { player.onGround = true; player.vy = 0; }
  }

  // ── Spike check ──
  const pc = Math.floor(player.x / TILE);
  const pr = Math.floor(player.y / TILE);
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const t = tileAt(grid, pc+dc, pr+dr);
      if (t === SPIKE) {
        const sx = (pc+dc) * TILE, sy = (pr+dr) * TILE;
        if (player.x + halfW > sx + 4 && player.x - halfW < sx + TILE - 4 &&
            player.y + halfH > sy + 4 && player.y - halfH < sy + TILE - 4) {
          killPlayer();
          return;
        }
      }
    }
  }

  // ── Shard collection ──
  const lvl = LEVELS[currentChapter * 9 + currentLevel];
  lvl.shards.forEach((s, i) => {
    if (collectedShards[i]) return;
    const sw = s[2] === 'shadow';
    if (sw !== inShadow) return;
    const sx = s[0] * TILE + TILE/2, sy = s[1] * TILE + TILE/2;
    if (Math.abs(player.x - sx) < 20 && Math.abs(player.y - sy) < 20) {
      collectedShards[i] = true;
      shards++;
      document.getElementById('shard-count').textContent = shards;
      for (let j = 0; j < 12; j++) {
        particles.push({ x: sx, y: sy, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
          life: 25, color: '#ffd700', size: 3 + Math.random()*3 });
      }
    }
  });

  // ── Exit check ──
  if (Math.abs(player.x - exitPos.x) < 20 && Math.abs(player.y - exitPos.y) < 20) {
    levelComplete = true;
    for (let i = 0; i < 30; i++) {
      particles.push({ x: exitPos.x, y: exitPos.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
        life: 30, color: '#ffd700', size: 3+Math.random()*4 });
    }
    setTimeout(() => {
      const nextIdx = currentChapter * 9 + currentLevel + 1;
      if (nextIdx < LEVELS.length) {
        loadLevel(nextIdx);
      } else {
        // Game complete
        dialogue = { speaker: 'The Fracture', text: 'Light and Shadow are one again. The world is healed. Thank you, Lumen.', color: '#ffd700' };
        document.getElementById('dialogue').style.display = 'block';
        document.getElementById('dlg-speaker').textContent = dialogue.speaker;
        document.getElementById('dlg-text').textContent = dialogue.text;
      }
    }, 800);
  }

  // ── Out of bounds ──
  if (player.y < -50 || player.y > H + 50) killPlayer();

  // ── Trail particles ──
  if (frame % 2 === 0) {
    trailParticles.push({
      x: player.x, y: player.y,
      life: 15, color: inShadow ? '#6a0dad' : '#ffd700', size: 3
    });
  }

  // Update particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--; p.size *= 0.96; });
  particles = particles.filter(p => p.life > 0);
  trailParticles.forEach(p => { p.life--; p.size *= 0.92; });
  trailParticles = trailParticles.filter(p => p.life > 0);

  // Ambient particles
  if (frame % 8 === 0) {
    ambientParticles.push({
      x: Math.random() * W, y: inShadow ? -5 : H + 5,
      vx: (Math.random()-0.5)*0.5, vy: inShadow ? 0.3 + Math.random()*0.5 : -0.3 - Math.random()*0.5,
      life: 80 + Math.random()*60, color: inShadow ? '#6a0dad44' : '#ffd70044', size: 2 + Math.random()*3
    });
  }
  ambientParticles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  ambientParticles = ambientParticles.filter(p => p.life > 0);

  if (flipTransition > 0) flipTransition--;
}

function killPlayer() {
  if (!player.alive) return;
  player.alive = false;
  deaths++;
  deathAnim = 45;
  for (let i = 0; i < 20; i++) {
    particles.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
      life: 25, color: inShadow ? '#a040ff' : '#fff', size: 3+Math.random()*3 });
  }
  // Flash
  let flash = document.getElementById('death-flash');
  flash.style.opacity = '0.5';
  setTimeout(() => { flash.style.opacity = '0'; }, 150);
}

// ══════════════════════ DRAW ══════════════════════
function draw() {
  ctx.save();

  // ── Background ──
  if (inShadow) {
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#0a0015'); grd.addColorStop(1, '#1a0530');
    ctx.fillStyle = grd;
  } else {
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#e8e0f0'); grd.addColorStop(1, '#f5f0ff');
    ctx.fillStyle = grd;
  }
  ctx.fillRect(0, 0, W, H);

  // ── Flip transition effect ──
  if (flipTransition > 0) {
    let t = flipTransition / FLIP_TRANSITION_TIME;
    ctx.fillStyle = `rgba(255,215,0,${t * 0.3})`;
    ctx.fillRect(0, 0, W, H);
  }

  // ── Ambient particles (behind everything) ──
  ambientParticles.forEach(p => {
    ctx.globalAlpha = (p.life / 100) * 0.4;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  const grid = getGrid();
  const lvl = LEVELS[currentChapter * 9 + currentLevel];

  // ── Tiles ──
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = grid[r][c];
      const x = c * TILE, y = r * TILE;
      if (t === SOLID) {
        if (inShadow) {
          ctx.fillStyle = '#2a1540';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeStyle = '#3d2060';
          ctx.lineWidth = 1;
          ctx.strokeRect(x+0.5, y+0.5, TILE-1, TILE-1);
        } else {
          ctx.fillStyle = '#d0c8e0';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeStyle = '#b8b0cc';
          ctx.lineWidth = 1;
          ctx.strokeRect(x+0.5, y+0.5, TILE-1, TILE-1);
        }
      } else if (t === SPIKE) {
        ctx.fillStyle = inShadow ? '#ff2060' : '#ff4060';
        // Draw triangle spikes
        const isFloor = r < ROWS-1 && grid[r+1] && grid[r+1][c] === SOLID;
        ctx.beginPath();
        if (isFloor || gravityDir === 1) {
          ctx.moveTo(x+2, y+TILE); ctx.lineTo(x+TILE/2, y+4); ctx.lineTo(x+TILE-2, y+TILE);
        } else {
          ctx.moveTo(x+2, y); ctx.lineTo(x+TILE/2, y+TILE-4); ctx.lineTo(x+TILE-2, y);
        }
        ctx.fill();
      }
    }
  }

  // ── Moving platforms ──
  movingPlatforms.forEach(mp => {
    const mpWorld = mp.world === 'shadow';
    if (mpWorld !== inShadow) return;
    const mpX = mp.x * TILE, mpY = mp.y * TILE;
    ctx.fillStyle = inShadow ? '#4a2070' : '#a090c0';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 6;
    ctx.fillRect(mpX, mpY, mp.w * TILE, TILE);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 1;
    ctx.strokeRect(mpX, mpY, mp.w * TILE, TILE);
  });

  // ── Shards ──
  if (lvl) {
    lvl.shards.forEach((s, i) => {
      if (collectedShards[i]) return;
      const sw = s[2] === 'shadow';
      if (sw !== inShadow) return;
      const sx = s[0] * TILE + TILE/2, sy = s[1] * TILE + TILE/2;
      const bob = Math.sin(frame * 0.06 + i * 2) * 4;
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(sx, sy + bob, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx - 2, sy + bob - 2, 3, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    });
  }

  // ── Exit portal ──
  if (exitPos) {
    const pulse = Math.sin(frame * 0.08) * 4;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 20 + pulse;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(exitPos.x, exitPos.y, 14 + pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = `rgba(255,215,0,${0.15 + Math.sin(frame*0.1)*0.1})`;
    ctx.beginPath(); ctx.arc(exitPos.x, exitPos.y, 12 + pulse, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ── Trail ──
  trailParticles.forEach(p => {
    ctx.globalAlpha = p.life / 15 * 0.5;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ── Player (Lumen) ──
  if (player && player.alive && deathAnim <= 0) {
    const px = player.x, py = player.y;
    // Outer glow
    ctx.shadowColor = inShadow ? '#6a0dad' : '#ffd700';
    ctx.shadowBlur = 15;
    // Body
    ctx.fillStyle = inShadow ? '#1a0030' : '#fff';
    ctx.beginPath(); ctx.arc(px, py, 10, 0, Math.PI*2); ctx.fill();
    // Inner glow
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2); ctx.fill();
    // Eye direction
    const eyeX = px + (keys['ArrowRight'] || keys['KeyD'] ? 3 : keys['ArrowLeft'] || keys['KeyA'] ? -3 : 0);
    const eyeY = py - 1;
    ctx.fillStyle = inShadow ? '#a040ff' : '#fff';
    ctx.beginPath(); ctx.arc(eyeX, eyeY, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Stuck indicator
    if (meterStuck > 0) {
      ctx.strokeStyle = '#f44';
      ctx.lineWidth = 2;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.arc(px, py, 16, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Inverted gravity indicator
    if (gravityDir === -1) {
      ctx.fillStyle = 'rgba(160,64,255,0.4)';
      ctx.beginPath();
      ctx.moveTo(px - 6, py - 14); ctx.lineTo(px, py - 20); ctx.lineTo(px + 6, py - 14);
      ctx.fill();
    }
  }

  // ── Particles ──
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 30;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = p.size * 2;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.size), 0, Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // ── World label ──
  ctx.fillStyle = inShadow ? 'rgba(160,64,255,0.3)' : 'rgba(255,215,0,0.2)';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(inShadow ? 'SHADOW WORLD' : 'LIGHT WORLD', W - 10, H - 8);

  // ── Vignette ──
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.35, W/2, H/2, H*0.8);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, inShadow ? 'rgba(0,0,0,0.5)' : 'rgba(0,0,0,0.15)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  ctx.restore();
}

// ══════════════════════ GAME LOOP ══════════════════════
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ══════════════════════ START ══════════════════════
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('start-btn').blur();
  canvas.focus();
  gameRunning = true;
  loadLevel(0);
  loop();
});
canvas.setAttribute('tabindex', '0');
canvas.addEventListener('click', () => {
  if (dialogue) showNextDialogue();
});
</script>
</body>
