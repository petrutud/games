<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human: Fall Flat</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-wrap">
    <h1>Human: Fall Flat</h1>
    <p class="hint">WASD move · Hold LEFT mouse to grab with left hand · Hold RIGHT mouse to grab with right hand · Pull to climb!</p>
    <div class="canvas-wrap">
      <canvas id="game" width="900" height="500"></canvas>
      <div id="overlay" class="overlay hidden">
        <p id="overlay-msg" class="overlay-msg"></p>
        <button type="button" class="btn" id="btn-again">Play again</button>
      </div>
    </div>
  </div>
  <script src="js/game.js"></script>
</body>
</html>
