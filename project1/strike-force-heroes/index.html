<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strike Force Heroes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-wrap">
    <div id="menu" class="menu">
      <h1>Strike Force Heroes</h1>
      <p class="sub">WASD move · Mouse aim · Click to shoot</p>
      <div class="class-select">
        <button type="button" class="class-btn active" data-class="commando">Commando</button>
        <button type="button" class="class-btn" data-class="medic">Medic</button>
        <button type="button" class="class-btn" data-class="tank">Tank</button>
        <button type="button" class="class-btn" data-class="assassin">Assassin</button>
      </div>
      <button type="button" class="btn start-btn" id="start-btn">Start Mission</button>
    </div>
    <div id="game" class="game-area hidden">
      <div class="hud">
        <span class="hud-health">HP: <strong id="hp">100</strong></span>
        <span class="hud-wave">Wave <strong id="wave">1</strong></span>
        <span class="hud-kills">Kills: <strong id="kills">0</strong></span>
        <span class="hud-class" id="hud-class">Commando</span>
      </div>
      <canvas id="canvas" width="960" height="540"></canvas>
      <div id="overlay" class="overlay hidden">
        <h2 id="overlay-title" class="overlay-title"></h2>
        <p id="overlay-msg" class="overlay-msg"></p>
        <div class="overlay-btns">
          <button type="button" class="btn" id="btn-retry">Retry</button>
          <button type="button" class="btn" id="btn-menu">Menu</button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/game.js"></script>
</body>
</html>
