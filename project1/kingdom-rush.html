<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kingdom Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#1a0a00;width:100%;height:100%;overflow:hidden;touch-action:none}
body{display:flex;justify-content:center;align-items:center;font-family:'Segoe UI',sans-serif}
#game-container{position:relative;user-select:none;-webkit-user-select:none;touch-action:none;max-width:100vw;max-height:100vh}
canvas{display:block;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,0.7);max-width:100vw;max-height:100vh;touch-action:none}
#ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#top-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:6px 10px;pointer-events:auto;
    background:linear-gradient(180deg,rgba(40,20,0,0.9),rgba(40,20,0,0.5));
    border-radius:8px 8px 0 0;flex-wrap:wrap;gap:4px;
}
.stat{display:flex;align-items:center;gap:3px;color:#FFD700;font-weight:bold;font-size:14px;text-shadow:0 1px 3px #000}
.stat .label{font-size:10px;color:#c8a060;font-weight:normal}
#wave-btn{
    padding:8px 20px;background:linear-gradient(180deg,#c62828,#8b0000);color:#fff;border:2px solid #ff6b6b;
    border-radius:20px;font-size:14px;font-weight:bold;cursor:pointer;transition:all 0.2s;
    text-shadow:0 1px 2px #000;pointer-events:auto;min-height:40px;
}
#wave-btn:hover{background:linear-gradient(180deg,#e53935,#c62828);transform:scale(1.05)}
#wave-btn.active{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 5px #f44}50%{box-shadow:0 0 20px #f44}}

.speed-btn{
    background:#555;border:1px solid #888;color:#fff;padding:4px 12px;border-radius:4px;
    cursor:pointer;font-size:12px;pointer-events:auto;min-height:36px;min-width:36px;
}

#tower-menu{
    position:absolute;display:none;pointer-events:auto;z-index:10;
}
.tower-ring{position:relative;width:180px;height:180px}
.tower-opt{
    position:absolute;width:56px;height:56px;border-radius:50%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;transition:all 0.15s;border:2px solid rgba(255,255,255,0.3);
    font-size:10px;color:#fff;text-shadow:0 1px 2px #000;
}
.tower-opt:hover,.tower-opt:active{transform:scale(1.15);z-index:2}
.tower-opt.cant{opacity:0.4;cursor:default}
.tower-opt .t-icon{font-size:22px}
.tower-opt .t-cost{font-size:9px;color:#FFD700}
.sell-btn{
    position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);
    padding:6px 16px;background:rgba(200,0,0,0.8);color:#fff;border:1px solid #f66;
    border-radius:10px;font-size:12px;cursor:pointer;white-space:nowrap;min-height:36px;
}
.sell-btn:hover,.sell-btn:active{background:rgba(255,0,0,0.9)}

#upgrade-menu{
    position:absolute;display:none;pointer-events:auto;z-index:10;
    background:rgba(20,10,0,0.95);border:2px solid #8B6914;border-radius:10px;
    padding:10px;min-width:170px;text-align:center;
}
#upgrade-menu h4{color:#FFD700;font-size:13px;margin-bottom:6px}
.upg-btn{
    display:block;width:100%;padding:8px;margin:3px 0;background:rgba(139,105,20,0.4);
    border:1px solid #8B6914;border-radius:6px;color:#fff;font-size:12px;cursor:pointer;
    transition:background 0.15s;text-align:left;min-height:38px;
}
.upg-btn:hover,.upg-btn:active{background:rgba(139,105,20,0.7)}
.upg-btn.cant{opacity:0.4;cursor:default}
.upg-btn .cost{color:#FFD700;float:right}

.overlay-screen{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;
    flex-direction:column;pointer-events:auto;border-radius:8px;backdrop-filter:blur(3px);
    padding:20px;
}
.overlay-screen h1{font-size:clamp(28px,6vw,42px);margin-bottom:10px;text-shadow:0 0 20px currentColor}
.overlay-screen p{color:#ccc;font-size:clamp(13px,3vw,16px);margin-bottom:8px;text-align:center}
#game-over h1{color:#f44}
#victory h1{color:#4f4}
.obtn{padding:12px 30px;font-size:18px;color:#fff;border:none;border-radius:8px;cursor:pointer;margin:4px;font-weight:bold;min-height:44px}
.obtn-g{background:linear-gradient(180deg,#4CAF50,#2E7D32)}
.obtn-g:hover,.obtn-g:active{background:linear-gradient(180deg,#66BB6A,#4CAF50)}
.obtn-r{background:linear-gradient(180deg,#f44336,#c62828)}
.obtn-r:hover,.obtn-r:active{background:linear-gradient(180deg,#ef5350,#f44336)}

#level-select{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:rgba(10,5,0,0.95);display:flex;justify-content:center;align-items:center;
    flex-direction:column;pointer-events:auto;border-radius:8px;overflow-y:auto;
    padding:15px;
}
#level-select h1{color:#FFD700;font-size:clamp(22px,5vw,32px);margin-bottom:10px;text-shadow:0 0 15px rgba(255,215,0,0.3)}
#level-grid{display:flex;flex-wrap:wrap;gap:8px;max-width:560px;justify-content:center;padding:10px}
.lvl-btn{
    width:58px;height:58px;border:2px solid #8B6914;border-radius:8px;
    background:rgba(139,105,20,0.2);color:#fff;font-size:14px;font-weight:bold;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:all 0.15s;
}
.lvl-btn:hover,.lvl-btn:active{background:rgba(139,105,20,0.5);transform:scale(1.08)}
.lvl-btn.locked{opacity:0.3;cursor:default;border-color:#333}
.lvl-btn .stars{font-size:10px;color:#FFD700}

@media (max-width:700px) {
    .stat{font-size:11px}
    .stat .label{font-size:9px}
    #wave-btn{padding:6px 14px;font-size:12px}
    .tower-opt{width:50px;height:50px}
    .tower-opt .t-icon{font-size:20px}
    .lvl-btn{width:50px;height:50px;font-size:12px}
    #top-bar{padding:4px 6px}
}
</style>
</head>
<body>
<div id="game-container">
<canvas id="C" width="960" height="600"></canvas>
<div id="ui-overlay">
    <div id="top-bar">
        <div class="stat">&#10084;&#65039; <span id="lives">20</span></div>
        <div class="stat">&#128176; <span id="gold">400</span></div>
        <div class="stat"><span class="label">Wave</span> <span id="wave-num">0</span>/<span id="wave-total">10</span></div>
        <button id="wave-btn" onclick="startNextWave()">&#9654; Send Wave</button>
        <div class="stat"><span class="label">&#9889;Speed</span> <span id="speed-label">1x</span>
            <button class="speed-btn" onclick="toggleSpeed()">Toggle</button>
        </div>
    </div>
</div>
<div id="tower-menu"><div class="tower-ring" id="tower-ring"></div></div>
<div id="upgrade-menu"></div>
<div class="overlay-screen" id="game-over"><h1>DEFEAT</h1><p>The kingdom has fallen!</p><button class="obtn obtn-r" onclick="goMenu()">Menu</button></div>
<div class="overlay-screen" id="victory"><h1>VICTORY!</h1><p id="v-text">You defended the realm!</p><p id="v-stars" style="font-size:30px"></p><button class="obtn obtn-g" onclick="goMenu()">Continue</button></div>
<div id="level-select"></div>
</div>

<script>
const C = document.getElementById('C');

const W = 960, H = 600;

// ==================== RESPONSIVE CANVAS ====================
function resizeCanvas() {
    const container = document.getElementById('game-container');
    const maxW = window.innerWidth;
    const maxH = window.innerHeight;
    const ratio = W / H;
    let cw, ch;
    if (maxW / maxH > ratio) {
        ch = maxH;
        cw = ch * ratio;
    } else {
        cw = maxW;
        ch = cw / ratio;
    }
    C.style.width = cw + 'px';
    C.style.height = ch + 'px';
    container.style.width = cw + 'px';
    container.style.height = ch + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ==================== PATH HELPERS ====================
function getPathLength() {
    let len = 0;
    for (let i = 1; i < path.length; i++) {
        const dx = path[i].x - path[i-1].x, dy = path[i].y - path[i-1].y;
        len += Math.sqrt(dx*dx + dy*dy);
    }
    return len;
}

function getPosOnPath(dist) {
    let remaining = dist;
    for (let i = 1; i < path.length; i++) {
        const dx = path[i].x - path[i-1].x, dy = path[i].y - path[i-1].y;
        const segLen = Math.sqrt(dx*dx + dy*dy);
        if (remaining <= segLen) {
            const t = remaining / segLen;
            return { x: path[i-1].x + dx*t, y: path[i-1].y + dy*t, angle: Math.atan2(dy, dx) };
        }
        remaining -= segLen;
    }
    return { x: path[path.length-1].x, y: path[path.length-1].y, angle: 0 };
}

// ==================== WAVES ====================
let waveActive = false, waveSpawnTimer = 0, waveSpawnQueue = [];

function startNextWave() {
    if (waveActive || gameOver || victory) return;
    if (waveNum >= totalWaves) return;
    const wave = levelData.waves[waveNum];
    waveSpawnQueue = [...wave];
    for (let i = waveSpawnQueue.length - 1; i > 0; i--) {
        if (Math.random() < 0.3) {
            const j = Math.floor(Math.random() * (i+1));
            [waveSpawnQueue[i], waveSpawnQueue[j]] = [waveSpawnQueue[j], waveSpawnQueue[i]];
        }
    }
    waveNum++;
    waveActive = true;
    waveSpawnTimer = 0;
    updateUI();
}
window.startNextWave = startNextWave;

function toggleSpeed() { gameSpeed = gameSpeed === 1 ? 2 : gameSpeed === 2 ? 3 : 1; updateUI(); }
window.toggleSpeed = toggleSpeed;

// ==================== TOUCH/CLICK HANDLING ====================
function getGameCoords(e) {
    const rect = C.getBoundingClientRect();
    let clientX, clientY;
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else if (e.changedTouches && e.changedTouches.length > 0) {
        clientX = e.changedTouches[0].clientX;
        clientY = e.changedTouches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    return {
        mx: (clientX - rect.left) * (W / rect.width),
        my: (clientY - rect.top) * (H / rect.height),
        sx: clientX - rect.left,
        sy: clientY - rect.top,
    };
}

function handleGameClick(e) {
    if (gameOver || victory || document.getElementById('level-select').style.display === 'flex') return;
    e.preventDefault();
    const {mx, my, sx, sy} = getGameCoords(e);

    document.getElementById('tower-menu').style.display = 'none';
    document.getElementById('upgrade-menu').style.display = 'none';
    selectedSpot = null;
    selectedTower = null;

    for (const t of towers) {
        if (Math.abs(mx - t.x) < 28 && Math.abs(my - t.y) < 28) {
            selectedTower = t;
            showUpgradeMenu(t, sx, sy);
            return;
        }
    }

    for (const s of spots) {
        if (s.tower) continue;
        if (Math.abs(mx - s.x) < 28 && Math.abs(my - s.y) < 28) {
            selectedSpot = s;
            showBuildMenu(s, sx, sy);
            return;
        }
    }
}

C.addEventListener('click', handleGameClick);
C.addEventListener('touchend', handleGameClick);

// Prevent default touch behaviors on canvas
C.addEventListener('touchstart', e => e.preventDefault(), {passive:false});
C.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

function showBuildMenu(spot, sx, sy) {
    const menu = document.getElementById('tower-menu');
    const ring = document.getElementById('tower-ring');
    ring.innerHTML = '';

    const types = ['archer','mage','barracks','cannon'];
    const positions = [
        {x:64, y:0}, {x:128, y:64}, {x:64, y:128}, {x:0, y:64}
    ];

    types.forEach((type, i) => {
        const info = TOWER_TYPES[type];
        const canAfford = gold >= info.cost;
        const btn = document.createElement('div');
        btn.className = 'tower-opt' + (canAfford ? '' : ' cant');
        btn.style.left = positions[i].x + 'px';
        btn.style.top = positions[i].y + 'px';
        btn.style.background = `radial-gradient(circle, ${info.color}dd, ${info.color}88)`;
        btn.innerHTML = `<div class="t-icon">${info.icon}</div><div class="t-cost">&#128176;${info.cost}</div>`;
        if (canAfford) {
            const handler = (e) => { e.stopPropagation(); e.preventDefault(); buildTower(spot, type); };
            btn.onclick = handler;
            btn.addEventListener('touchend', handler);
        }
        ring.appendChild(btn);
    });

    const cRect = C.getBoundingClientRect();
    const scale = cRect.width / W;
    menu.style.display = 'block';
    menu.style.left = Math.min(cRect.width - 200, Math.max(0, sx - 90)) + 'px';
    menu.style.top = Math.min(cRect.height - 200, Math.max(0, sy - 90)) + 'px';
}

function showUpgradeMenu(tower, sx, sy) {
    const menu = document.getElementById('upgrade-menu');
    const info = TOWER_TYPES[tower.type];

    let html = `<h4>${info.icon} ${info.name} (Lv${tower.level + 1})</h4>`;

    if (tower.level < info.upgrades.length) {
        const upg = info.upgrades[tower.level];
        const can = gold >= upg.cost;
        html += `<div class="upg-btn${can ? '' : ' cant'}" onclick="${can ? `upgradeTower(${towers.indexOf(tower)})` : ''}">${upg.name} <span class="cost">&#128176;${upg.cost}</span></div>`;
    } else {
        html += `<div style="color:#888;font-size:11px;padding:4px">Max Level</div>`;
    }

    html += `<div class="sell-btn" onclick="sellTower(${towers.indexOf(tower)})">Sell &#128176;${Math.floor(tower.totalCost * 0.6)}</div>`;

    menu.innerHTML = html;
    const cRect = C.getBoundingClientRect();
    menu.style.display = 'block';
    menu.style.left = Math.min(cRect.width - 180, Math.max(0, sx - 80)) + 'px';
    menu.style.top = Math.min(cRect.height - 150, Math.max(0, sy - 60)) + 'px';
}

function buildTower(spot, type) {
    const info = TOWER_TYPES[type];
    if (gold < info.cost) return;
    gold -= info.cost;

    const tower = {
        type, x: spot.x, y: spot.y,
        level: 0, totalCost: info.cost,
        range: info.range, rate: info.rate, dmg: info.dmg,
        cooldown: 0, angle: 0, target: null,
        multi: false, chain: 0, cluster: false, splash: info.splash || 0,
        soldierCount: info.soldierCount || 0,
        soldierHp: info.soldierHp || 0,
        soldierDmg: info.soldierDmg || 0,
        soldiers: [],
    };

    towers.push(tower);
    spot.tower = tower;

    if (type === 'barracks') spawnSoldiers(tower);

    document.getElementById('tower-menu').style.display = 'none';
    selectedSpot = null;

    for (let i = 0; i < 15; i++) {
        particles.push({
            x: spot.x, y: spot.y,
            vx: (Math.random()-0.5)*5, vy: -Math.random()*4-1,
            life: 30, color: info.color, size: 3+Math.random()*4, glow: true
        });
    }
    updateUI();
}

function upgradeTower(idx) {
    const tower = towers[idx];
    const info = TOWER_TYPES[tower.type];
    if (tower.level >= info.upgrades.length) return;
    const upg = info.upgrades[tower.level];
    if (gold < upg.cost) return;
    gold -= upg.cost;
    tower.totalCost += upg.cost;
    tower.level++;

    if (upg.dmg) tower.dmg += upg.dmg;
    if (upg.range) tower.range += upg.range;
    if (upg.rate) tower.rate += upg.rate;
    if (upg.splash) tower.splash += upg.splash;
    if (upg.multi) tower.multi = true;
    if (upg.chain) tower.chain = upg.chain;
    if (upg.cluster) tower.cluster = true;
    if (upg.soldierHp) tower.soldierHp += upg.soldierHp;
    if (upg.soldierDmg) tower.soldierDmg += upg.soldierDmg;
    if (upg.soldierCount) { tower.soldierCount += upg.soldierCount; spawnSoldiers(tower); }

    for (let i = 0; i < 20; i++) {
        particles.push({
            x: tower.x, y: tower.y, vx: (Math.random()-0.5)*6, vy: -Math.random()*5,
            life: 35, color: '#FFD700', size: 2+Math.random()*4, glow: true
        });
    }

    document.getElementById('upgrade-menu').style.display = 'none';
    selectedTower = null;
    updateUI();
}
window.upgradeTower = upgradeTower;

function sellTower(idx) {
    const tower = towers[idx];
    gold += Math.floor(tower.totalCost * 0.6);
    soldiers = soldiers.filter(s => s.tower !== tower);
    const spot = spots.find(s => s.tower === tower);
    if (spot) spot.tower = null;
    towers.splice(idx, 1);
    document.getElementById('upgrade-menu').style.display = 'none';
    selectedTower = null;
    updateUI();
}
window.sellTower = sellTower;

// ==================== SOLDIERS ====================
function spawnSoldiers(tower) {
    soldiers = soldiers.filter(s => s.tower !== tower);
    const info = TOWER_TYPES[tower.type];
    const count = tower.soldierCount || info.soldierCount;
    const hp = tower.soldierHp || info.soldierHp;
    const dmg = tower.soldierDmg || info.soldierDmg;

    for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        soldiers.push({
            tower, x: tower.x + Math.cos(angle) * 30, y: tower.y + Math.sin(angle) * 30,
            hp, maxHp: hp, dmg, speed: info.soldierSpeed || 1.5,
            target: null, attackCd: 0, rallyX: tower.x + Math.cos(angle) * 40, rallyY: tower.y + Math.sin(angle) * 40,
            respawnTimer: 0,
        });
    }
}

// ==================== UPDATE ====================
function update() {
    if (gameOver || victory) return;

    for (let sp = 0; sp < gameSpeed; sp++) {
        frame++;
        if (screenShake > 0) screenShake--;

        // Ambient particles
        if (frame % 8 === 0 && levelData) {
            const theme = levelData.theme;
            if (theme === 'ice') {
                ambientParticles.push({x:Math.random()*W, y:-5, vx:(Math.random()-0.5)*0.5, vy:0.3+Math.random()*0.5, life:300, color:'rgba(200,230,255,0.4)', size:2+Math.random()*2});
            } else if (theme === 'hell') {
                ambientParticles.push({x:Math.random()*W, y:H+5, vx:(Math.random()-0.5)*1, vy:-0.5-Math.random()*1, life:150, color:'rgba(255,100,0,0.3)', size:2+Math.random()*3});
            } else if (theme === 'dark') {
                if (Math.random()<0.3) ambientParticles.push({x:Math.random()*W, y:Math.random()*H, vx:0, vy:-0.2, life:100, color:'rgba(100,50,200,0.2)', size:1+Math.random()*2});
            } else if (theme === 'swamp') {
                ambientParticles.push({x:Math.random()*W, y:H+5, vx:(Math.random()-0.5)*0.3, vy:-0.3-Math.random()*0.4, life:200, color:'rgba(100,255,0,0.15)', size:2+Math.random()*2});
                if (Math.random()<0.4) ambientParticles.push({x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-0.5)*0.2, vy:-0.1, life:120, color:'rgba(80,120,40,0.12)', size:3+Math.random()*4});
            } else if (theme === 'celestial') {
                if (Math.random()<0.5) ambientParticles.push({x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-0.5)*0.3, vy:-0.1-Math.random()*0.2, life:200, color:'rgba(255,255,255,0.2)', size:1+Math.random()*1.5});
            } else if (theme === 'volcanic') {
                ambientParticles.push({x:Math.random()*W, y:H+5, vx:(Math.random()-0.5)*1.5, vy:-1-Math.random()*2, life:120, color:'rgba(255,80,0,0.35)', size:2+Math.random()*3});
                if (Math.random()<0.3) ambientParticles.push({x:Math.random()*W, y:H+5, vx:(Math.random()-0.5)*0.5, vy:-0.5-Math.random(), life:80, color:'rgba(255,200,0,0.2)', size:1+Math.random()*2});
            } else if (theme === 'void') {
                if (Math.random()<0.4) ambientParticles.push({x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4, life:150, color:'rgba(150,0,255,0.15)', size:1+Math.random()*2});
                if (Math.random()<0.2) ambientParticles.push({x:Math.random()*W, y:Math.random()*H, vx:0, vy:0, life:60, color:'rgba(200,100,255,0.25)', size:1+Math.random()});
            } else if (theme === 'siege') {
                ambientParticles.push({x:Math.random()*W, y:-5, vx:(Math.random()-0.5)*0.5, vy:0.5+Math.random()*0.8, life:200, color:'rgba(100,50,50,0.2)', size:1+Math.random()*2});
                if (Math.random()<0.3) ambientParticles.push({x:Math.random()*W, y:H+5, vx:(Math.random()-0.5)*1, vy:-1-Math.random()*1.5, life:100, color:'rgba(255,60,0,0.25)', size:2+Math.random()*3});
            }
        }
        ambientParticles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
        ambientParticles = ambientParticles.filter(p => p.life > 0);

        // Spawn enemies
        if (waveActive && waveSpawnQueue.length > 0) {
            waveSpawnTimer--;
            if (waveSpawnTimer <= 0) {
                const type = waveSpawnQueue.shift();
                const info = ENEMY_TYPES[type];
                const hpScale = 1 + currentLevel * 0.12;
                enemies.push({
                    type, dist: 0, hp: Math.floor(info.hp * hpScale), maxHp: Math.floor(info.hp * hpScale),
                    speed: info.speed, armor: info.armor, reward: info.reward,
                    color: info.color, w: info.w, h: info.h,
                    slowed: 0, stunned: 0, x: 0, y: 0, angle: 0,
                    fly: info.fly || false, boss: info.boss || false,
                    regen: info.regen || 0, healer: info.healer || false,
                    summon: info.summon || false, stealth: info.stealth || false,
                    explode: info.explode || false, poison: info.poison || false,
                    healCd: 0, summonCd: 0, blocked: false, blockedBy: null,
                    animT: Math.random() * 100, stealthAlpha: 1,
                });
                waveSpawnTimer = 25 + Math.floor(Math.random() * 15);
            }
        }
        if (waveSpawnQueue.length === 0 && enemies.length === 0 && waveActive) {
            waveActive = false;
            if (waveNum < totalWaves) {
                gold += 10 + waveNum;
            }
        }

        // Check victory
        if (waveNum >= totalWaves && enemies.length === 0 && !waveActive) {
            victory = true;
            const stars = lives >= 18 ? 3 : lives >= 10 ? 2 : 1;
            document.getElementById('v-stars').textContent = '\u2B50'.repeat(stars) + '\u2606'.repeat(3 - stars);
            document.getElementById('v-text').textContent = `${levelData.name} completed!`;
            document.getElementById('victory').style.display = 'flex';
            if (currentLevel + 1 >= unlockedLevel) {
                unlockedLevel = Math.min(LEVELS.length, currentLevel + 2);
                try { localStorage.setItem('kr_unlock', unlockedLevel); } catch(e) {}
            }
            updateUI();
            return;
        }

        // Update enemies
        enemies.forEach(e => {
            e.animT++;
            if (e.stunned > 0) { e.stunned--; return; }
            if (e.slowed > 0) e.slowed--;

            // Regen
            if (e.regen && frame % 60 === 0) e.hp = Math.min(e.maxHp, e.hp + e.regen);

            // Stealth - become visible when attacked
            if (e.stealth) {
                e.stealthAlpha = Math.max(0.15, e.stealthAlpha - 0.005);
                if (e.hp < e.maxHp) e.stealthAlpha = Math.min(1, e.stealthAlpha + 0.1);
            }

            // Healer
            if (e.healer) {
                e.healCd--;
                if (e.healCd <= 0) {
                    e.healCd = 120;
                    enemies.forEach(other => {
                        if (other !== e && Math.abs(other.dist - e.dist) < 80) {
                            other.hp = Math.min(other.maxHp, other.hp + 20);
                            // Heal effect
                            particles.push({x:other.x,y:other.y-10,vx:0,vy:-1,life:20,color:'#76FF03',size:4,glow:true});
                        }
                    });
                }
            }

            // Summoner (necromancer)
            if (e.summon) {
                e.summonCd--;
                if (e.summonCd <= 0) {
                    e.summonCd = 300;
                    const sInfo = ENEMY_TYPES['skeleton'];
                    const hpScale = 1 + currentLevel * 0.12;
                    enemies.push({
                        type:'skeleton', dist:Math.max(0,e.dist-20), hp:Math.floor(sInfo.hp*hpScale), maxHp:Math.floor(sInfo.hp*hpScale),
                        speed:sInfo.speed, armor:sInfo.armor, reward:sInfo.reward,
                        color:sInfo.color, w:sInfo.w, h:sInfo.h,
                        slowed:0, stunned:0, x:e.x, y:e.y, angle:e.angle,
                        fly:false, boss:false, regen:sInfo.regen||0, healer:false, summon:false, stealth:false, explode:false, poison:false,
                        healCd:0, summonCd:0, blocked:false, blockedBy:null, animT:Math.random()*100, stealthAlpha:1,
                    });
                    for (let i = 0; i < 8; i++) {
                        particles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*3,vy:-Math.random()*2,life:20,color:'#9C27B0',size:3,glow:true});
                    }
                }
            }

            // Blocked by soldier
            if (e.blocked && e.blockedBy) {
                if (e.blockedBy.hp <= 0) { e.blocked = false; e.blockedBy = null; }
                else return;
            }

            const speed = e.slowed > 0 ? e.speed * 0.4 : e.speed;
            e.dist += speed;
            const pos = getPosOnPath(e.dist);
            e.x = pos.x; e.y = pos.y; e.angle = pos.angle;

            // Reached end
            if (e.dist >= getPathLength()) {
                lives -= (e.boss ? 5 : 1);
                e.hp = 0;
                screenShake = 10;
                if (lives <= 0) {
                    lives = 0;
                    gameOver = true;
                    document.getElementById('game-over').style.display = 'flex';
                }
                updateUI();
            }
        });

        // Fire imp explosion on death
        enemies.forEach(e => {
            if (e.hp <= 0 && e.explode) {
                // Damage nearby soldiers
                soldiers.forEach(s => {
                    if (s.hp > 0 && Math.sqrt((s.x-e.x)**2+(s.y-e.y)**2) < 40) {
                        s.hp -= 15;
                    }
                });
                screenShake = 5;
                for (let i = 0; i < 12; i++) {
                    particles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:25,color:'#FF6D00',size:4+Math.random()*4,glow:true});
                }
            }
        });

        enemies = enemies.filter(e => e.hp > 0);

        // Update towers
        towers.forEach(tower => {
            const info = TOWER_TYPES[tower.type];
            if (tower.type === 'barracks') return;

            tower.cooldown--;

            let target = null;
            let bestDist = 0;
            enemies.forEach(e => {
                if (e.fly && tower.type !== 'mage' && tower.type !== 'archer') return;
                // Stealth enemies are harder to target unless revealed
                if (e.stealth && e.stealthAlpha < 0.5 && tower.type !== 'mage') return;
                const dx = e.x - tower.x, dy = e.y - tower.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                if (d <= tower.range && e.dist > bestDist) {
                    bestDist = e.dist;
                    target = e;
                }
            });

            tower.target = target;
            if (target) {
                tower.angle = Math.atan2(target.y - tower.y, target.x - tower.x);

                if (tower.cooldown <= 0) {
                    tower.cooldown = tower.rate;

                    const shoot = (tgt) => {
                        projectiles.push({
                            x: tower.x, y: tower.y - 15,
                            tx: tgt.x, ty: tgt.y,
                            dmg: tower.dmg, speed: info.projSpeed || 5,
                            color: info.projColor || '#fff',
                            splash: tower.splash, magic: info.magic || false,
                            chain: tower.chain, cluster: tower.cluster,
                            target: tgt, life: 120,
                        });
                    };

                    shoot(target);

                    if (tower.multi) {
                        const others = enemies.filter(e => {
                            const d = Math.sqrt((e.x-tower.x)**2 + (e.y-tower.y)**2);
                            return d <= tower.range && e !== target;
                        });
                        if (others.length > 0) shoot(others[0]);
                    }
                }
            }
        });

        // Update soldiers
        soldiers.forEach(s => {
            if (s.hp <= 0) {
                s.respawnTimer--;
                if (s.respawnTimer <= 0) {
                    s.hp = s.maxHp;
                    s.x = s.tower.x;
                    s.y = s.tower.y;
                }
                return;
            }

            s.attackCd--;

            if (!s.target || s.target.hp <= 0) {
                s.target = null;
                let closest = Infinity;
                enemies.forEach(e => {
                    if (e.fly || e.blocked) return;
                    const d = Math.sqrt((e.x-s.tower.x)**2 + (e.y-s.tower.y)**2);
                    if (d < s.tower.range + 30 && d < closest) {
                        closest = d; s.target = e;
                    }
                });
            }

            if (s.target && s.target.hp > 0) {
                const dx = s.target.x - s.x, dy = s.target.y - s.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                if (d > 12) {
                    s.x += (dx/d) * s.speed * 1.5;
                    s.y += (dy/d) * s.speed * 1.5;
                } else {
                    s.target.blocked = true;
                    s.target.blockedBy = s;
                    if (s.attackCd <= 0) {
                        s.attackCd = 30;
                        const dmg = s.dmg;
                        s.target.hp -= dmg;
                        // Poison from spiders
                        if (s.target.poison && Math.random() < 0.3) {
                            s.hp -= 5;
                            particles.push({x:s.x,y:s.y,vx:0,vy:-1,life:15,color:'#76FF03',size:3});
                        }
                        const eDmg = Math.max(1, (ENEMY_TYPES[s.target.type]?.speed || 1) * 5);
                        s.hp -= eDmg;
                        if (s.target.hp <= 0) {
                            gold += s.target.reward;
                            for (let i = 0; i < 10; i++) {
                                particles.push({x:s.target.x,y:s.target.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,life:25,color:s.target.color,size:2+Math.random()*3});
                            }
                        }
                        if (s.hp <= 0) {
                            s.respawnTimer = 180;
                            if (s.target) { s.target.blocked = false; s.target.blockedBy = null; }
                            s.target = null;
                        }
                        // Hit spark
                        particles.push({x:s.x+4,y:s.y,vx:Math.random()*2,vy:-1,life:8,color:'#fff',size:2});
                    }
                }
            } else {
                const dx = s.rallyX - s.x, dy = s.rallyY - s.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                if (d > 3) {
                    s.x += (dx/d) * s.speed;
                    s.y += (dy/d) * s.speed;
                }
            }
        });

        // Update projectiles
        projectiles.forEach(p => {
            const tgt = p.target;
            const tx = tgt && tgt.hp > 0 ? tgt.x : p.tx;
            const ty = tgt && tgt.hp > 0 ? tgt.y : p.ty;
            const dx = tx - p.x, dy = ty - p.y;
            const d = Math.sqrt(dx*dx + dy*dy);

            if (d < 8) {
                if (tgt && tgt.hp > 0) {
                    const dmg = Math.max(1, p.dmg - (p.magic ? 0 : tgt.armor));
                    tgt.hp -= dmg;
                    if (p.magic) tgt.slowed = 60;
                    // Reveal stealth
                    if (tgt.stealth) tgt.stealthAlpha = 1;

                    if (tgt.hp <= 0) {
                        gold += tgt.reward;
                        for (let i = 0; i < 10; i++) {
                            particles.push({ x:tgt.x, y:tgt.y, vx:(Math.random()-0.5)*5, vy:-Math.random()*4,
                                life:25+Math.random()*10, color:tgt.color, size:2+Math.random()*3 });
                        }
                        if (tgt.boss) {
                            screenShake = 20;
                            for (let i = 0; i < 30; i++) {
                                particles.push({ x:tgt.x, y:tgt.y, vx:(Math.random()-0.5)*10, vy:-Math.random()*8,
                                    life:40+Math.random()*25, color:'#FFD700', size:4+Math.random()*5, glow:true });
                            }
                            for (let i = 0; i < 20; i++) {
                                particles.push({ x:tgt.x, y:tgt.y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8,
                                    life:30, color:tgt.color, size:3+Math.random()*4, glow:true });
                            }
                        }
                    }

                    // Splash
                    if (p.splash > 0) {
                        enemies.forEach(e => {
                            if (e !== tgt && Math.abs(e.x-tgt.x) < p.splash && Math.abs(e.y-tgt.y) < p.splash) {
                                e.hp -= Math.max(1, Math.floor(p.dmg * 0.5) - (p.magic ? 0 : e.armor));
                            }
                        });
                        for (let i = 0; i < 8; i++) {
                            particles.push({ x:tgt.x, y:tgt.y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4,
                                life:18, color:'#FF6D00', size:4+Math.random()*4, glow:true });
                        }
                    }

                    // Chain lightning
                    if (p.chain > 0) {
                        let lastX = tgt.x, lastY = tgt.y;
                        let chainTargets = enemies.filter(e => e !== tgt && e.hp > 0);
                        for (let c = 0; c < p.chain && chainTargets.length > 0; c++) {
                            let closest = null, cd = Infinity;
                            chainTargets.forEach(e => {
                                const dd = Math.sqrt((e.x-lastX)**2 + (e.y-lastY)**2);
                                if (dd < 80 && dd < cd) { cd = dd; closest = e; }
                            });
                            if (closest) {
                                closest.hp -= Math.floor(p.dmg * 0.6);
                                for (let i = 0; i < 6; i++) {
                                    const t = i / 6;
                                    particles.push({
                                        x: lastX + (closest.x-lastX)*t + (Math.random()-0.5)*12,
                                        y: lastY + (closest.y-lastY)*t + (Math.random()-0.5)*12,
                                        vx:0, vy:0, life:12, color:'#7C4DFF', size:3, glow:true
                                    });
                                }
                                lastX = closest.x; lastY = closest.y;
                                chainTargets = chainTargets.filter(e => e !== closest);
                            }
                        }
                    }

                    // Cluster bomb
                    if (p.cluster) {
                        for (let i = 0; i < 4; i++) {
                            const a = (i/4)*Math.PI*2 + Math.random()*0.5;
                            projectiles.push({
                                x: tgt.x, y: tgt.y,
                                tx: tgt.x + Math.cos(a)*40, ty: tgt.y + Math.sin(a)*40,
                                dmg: Math.floor(p.dmg*0.4), speed: 3, color:'#FF6D00',
                                splash: 20, magic:false, chain:0, cluster:false,
                                target:null, life:30,
                            });
                        }
                    }
                }
                p.life = 0;
            } else {
                p.x += (dx/d) * p.speed;
                p.y += (dy/d) * p.speed;
            }
            p.life--;
        });
        projectiles = projectiles.filter(p => p.life > 0);

        // Particles
        particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--; p.size *= 0.97; });
        particles = particles.filter(p => p.life > 0);

        // Auto-send wave
        if (!waveActive && waveNum < totalWaves && enemies.length === 0 && frame > 200 && frame % 600 === 0) {
            startNextWave();
        }

        updateUI();
    }
}

// ==================== DRAW ====================
function draw() {
    const theme = levelData ? levelData.theme : 'forest';

    ctx.save();
    // Screen shake
    if (screenShake > 0) {
        ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
    }

    // Background
    if (theme === 'forest') {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0, '#87CEEB');
        grd.addColorStop(0.4, '#a8d8a0');
        grd.addColorStop(1, '#4a7c3f');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
    } else if (theme === 'desert') {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0, '#87CEEB');
        grd.addColorStop(0.3, '#d4a060');
        grd.addColorStop(1, '#a07030');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
    } else if (theme === 'ice') {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0, '#B3E5FC');
        grd.addColorStop(0.3, '#E0F7FA');
        grd.addColorStop(0.7, '#B2EBF2');
        grd.addColorStop(1, '#80DEEA');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
    } else if (theme === 'hell') {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0, '#1a0000');
        grd.addColorStop(0.3, '#4a0000');
        grd.addColorStop(0.7, '#2a0000');
        grd.addColorStop(1, '#0a0000');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        // Lava cracks
        for (let i = 0; i < 10; i++) {
            const lx = (i * 137 + frame*0.2) % W;
            const ly = H - 30 + Math.sin(i*3+frame*0.01)*20;
            ctx.fillStyle = `rgba(255,${80+Math.sin(frame*0.02+i)*40},0,${0.2+Math.sin(frame*0.03+i)*0.1})`;
            ctx.beginPath(); ctx.arc(lx, ly, 8+Math.sin(frame*0.05+i)*3, 0, Math.PI*2); ctx.fill();
        }
    } else if (theme === 'swamp') {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0, '#1a2e1a');
        grd.addColorStop(0.3, '#2a3e1a');
        grd.addColorStop(0.6, '#1a3020');
        grd.addColorStop(1, '#0a1a08');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        // Poison bubbles
        for (let i = 0; i < 8; i++) {
            const bx = (i * 157 + frame*0.3) % W;
            const by = H - 40 + Math.sin(i*2+frame*0.02)*15;
            ctx.fillStyle = `rgba(100,255,0,${0.1+Math.sin(frame*0.03+i)*0.06})`;
            ctx.beginPath(); ctx.arc(bx, by, 6+Math.sin(frame*0.04+i)*3, 0, Math.PI*2); ctx.fill();
        }
        // Fog layer
        for (let i = 0; i < 5; i++) {
            const fx = (i * 230 + frame*0.5) % (W+200) - 100;
            ctx.fillStyle = `rgba(50,80,30,${0.08+Math.sin(frame*0.01+i)*0.03})`;
            ctx.beginPath(); ctx.ellipse(fx, H*0.6+Math.sin(frame*0.008+i)*20, 120, 30, 0, 0, Math.PI*2); ctx.fill();
        }
    } else if (theme === 'celestial') {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0, '#1a3a5c');
        grd.addColorStop(0.2, '#4a8ab0');
        grd.addColorStop(0.5, '#87CEEB');
        grd.addColorStop(0.8, '#E0F0FF');
        grd.addColorStop(1, '#f0f8ff');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        // Clouds
        for (let i = 0; i < 12; i++) {
            const cx = (i * 167 + frame*0.2) % (W+150) - 75;
            const cy = 60 + (i * 89) % (H*0.4);
            ctx.fillStyle = `rgba(255,255,255,${0.15+Math.sin(frame*0.01+i)*0.05})`;
            ctx.beginPath(); ctx.ellipse(cx, cy, 50+i*3, 18+i, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx+30, cy-5, 35, 14, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx-25, cy+3, 30, 12, 0, 0, Math.PI*2); ctx.fill();
        }
        // Sun rays
        ctx.fillStyle = 'rgba(255,220,100,0.04)';
        for (let i = 0; i < 6; i++) {
            const a = i*Math.PI/3 + frame*0.002;
            ctx.beginPath(); ctx.moveTo(W*0.8, 50);
            ctx.lineTo(W*0.8+Math.cos(a)*600, 50+Math.sin(a)*600);
            ctx.lineTo(W*0.8+Math.cos(a+0.15)*600, 50+Math.sin(a+0.15)*600);
            ctx.closePath(); ctx.fill();
        }
    } else if (theme === 'volcanic') {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0, '#1a0000');
        grd.addColorStop(0.2, '#3a0800');
        grd.addColorStop(0.5, '#5a1000');
        grd.addColorStop(0.8, '#3a0500');
        grd.addColorStop(1, '#1a0000');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        // Lava pools
        for (let i = 0; i < 12; i++) {
            const lx = (i * 147 + frame*0.15) % W;
            const ly = H - 25 + Math.sin(i*3+frame*0.015)*18;
            const pulse = 0.15+Math.sin(frame*0.025+i)*0.08;
            ctx.fillStyle = `rgba(255,${60+Math.sin(frame*0.02+i)*30},0,${pulse})`;
            ctx.beginPath(); ctx.arc(lx, ly, 10+Math.sin(frame*0.04+i)*4, 0, Math.PI*2); ctx.fill();
        }
        // Rising heat distortion
        for (let i = 0; i < 6; i++) {
            const hx = (i * 180 + 50);
            const hy = H - 60 - (frame*0.5+i*40)%200;
            ctx.fillStyle = `rgba(255,100,0,${0.03+Math.sin(frame*0.02+i)*0.02})`;
            ctx.beginPath(); ctx.ellipse(hx, hy, 20, 40, 0, 0, Math.PI*2); ctx.fill();
        }
    } else if (theme === 'void') {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0, '#050010');
        grd.addColorStop(0.3, '#0a0020');
        grd.addColorStop(0.6, '#100030');
        grd.addColorStop(1, '#050010');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        // Stars / cosmic dust
        for (let i = 0; i < 50; i++) {
            const sx = (i*173+50)%W, sy = (i*97+20)%H;
            const twinkle = 0.2 + Math.sin(frame*0.04+i*1.7)*0.3;
            const colors = ['rgba(200,150,255,','rgba(100,200,255,','rgba(255,200,255,'];
            ctx.fillStyle = colors[i%3] + twinkle + ')';
            ctx.beginPath(); ctx.arc(sx, sy, 0.8+Math.sin(frame*0.03+i)*0.5, 0, Math.PI*2); ctx.fill();
        }
        // Nebula swirls
        for (let i = 0; i < 4; i++) {
            const nx = W*0.3 + Math.cos(frame*0.003+i*1.5)*100;
            const ny = H*0.4 + Math.sin(frame*0.004+i*1.2)*80;
            ctx.fillStyle = `rgba(100,0,200,${0.03+Math.sin(frame*0.01+i)*0.015})`;
            ctx.beginPath(); ctx.ellipse(nx, ny, 100+Math.sin(frame*0.005+i)*20, 60, frame*0.001+i, 0, Math.PI*2); ctx.fill();
        }
        // Void rifts
        for (let i = 0; i < 3; i++) {
            const rx = (i*320+160);
            const ry = H*0.5+Math.sin(frame*0.006+i*2)*50;
            ctx.strokeStyle = `rgba(180,0,255,${0.15+Math.sin(frame*0.02+i)*0.08})`;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.ellipse(rx, ry, 15+Math.sin(frame*0.03+i)*5, 30+Math.sin(frame*0.02+i)*8, frame*0.005, 0, Math.PI*2); ctx.stroke();
        }
    } else if (theme === 'siege') {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0, '#0a0008');
        grd.addColorStop(0.2, '#1a0010');
        grd.addColorStop(0.5, '#200008');
        grd.addColorStop(0.7, '#100005');
        grd.addColorStop(1, '#080002');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        // Burning sky
        for (let i = 0; i < 8; i++) {
            const fx = (i * 143 + frame*0.4) % (W+100) - 50;
            const fy = 30 + (i * 67) % 80;
            ctx.fillStyle = `rgba(255,${40+Math.sin(frame*0.02+i)*20},0,${0.06+Math.sin(frame*0.015+i)*0.03})`;
            ctx.beginPath(); ctx.ellipse(fx, fy, 60, 20, 0, 0, Math.PI*2); ctx.fill();
        }
        // Ground fires
        for (let i = 0; i < 10; i++) {
            const gx = (i * 103 + 30) % W;
            const gy = H - 20 + Math.sin(i*5+frame*0.02)*10;
            ctx.fillStyle = `rgba(255,${80+Math.sin(frame*0.03+i)*40},0,${0.12+Math.sin(frame*0.025+i)*0.06})`;
            ctx.beginPath(); ctx.arc(gx, gy, 8+Math.sin(frame*0.04+i)*3, 0, Math.PI*2); ctx.fill();
        }
        // Lightning flashes
        if (Math.sin(frame*0.1) > 0.98) {
            ctx.fillStyle = 'rgba(200,150,255,0.05)';
            ctx.fillRect(0,0,W,H);
        }
    } else {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0, '#1a0a2e');
        grd.addColorStop(0.5, '#2a1a3e');
        grd.addColorStop(1, '#1a1a2e');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        // Stars
        for (let i = 0; i < 30; i++) {
            const sx = (i*173+50)%W, sy = (i*97+20)%(H*0.4);
            const twinkle = 0.3 + Math.sin(frame*0.03+i)*0.3;
            ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
            ctx.beginPath(); ctx.arc(sx, sy, 1+Math.random()*0.5, 0, Math.PI*2); ctx.fill();
        }
    }

    // Decorative elements
    if (theme === 'forest') {
        for (let i = 0; i < 20; i++) {
            const tx = (i * 173 + 50) % W, ty = 100 + (i * 97) % (H - 200);
            ctx.fillStyle = '#2E7D32';
            ctx.beginPath(); ctx.moveTo(tx, ty - 20); ctx.lineTo(tx-12, ty+10); ctx.lineTo(tx+12, ty+10); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#1B5E20';
            ctx.beginPath(); ctx.moveTo(tx, ty - 14); ctx.lineTo(tx-8, ty+4); ctx.lineTo(tx+8, ty+4); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#5D4037'; ctx.fillRect(tx-2, ty+10, 4, 8);
        }
    } else if (theme === 'desert') {
        for (let i = 0; i < 8; i++) {
            const cx = (i * 211 + 80) % W, cy = 120 + (i * 131) % (H - 200);
            ctx.fillStyle = '#2E7D32';
            ctx.fillRect(cx-2, cy-15, 4, 30);
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath(); ctx.arc(cx, cy-15, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx-8, cy-5, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx+8, cy-5, 5, 0, Math.PI*2); ctx.fill();
        }
    } else if (theme === 'ice') {
        for (let i = 0; i < 12; i++) {
            const rx = (i * 157 + 60) % W, ry = 100 + (i * 113) % (H - 200);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath(); ctx.moveTo(rx, ry-15); ctx.lineTo(rx-10, ry+8); ctx.lineTo(rx+10, ry+8); ctx.closePath(); ctx.fill();
        }
    } else if (theme === 'hell') {
        for (let i = 0; i < 10; i++) {
            const rx = (i * 193 + 40) % W, ry = 120 + (i * 127) % (H - 200);
            ctx.fillStyle = '#3E2723';
            ctx.beginPath(); ctx.moveTo(rx, ry-20); ctx.lineTo(rx-8, ry+10); ctx.lineTo(rx+8, ry+10); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#4E342E';
            ctx.beginPath(); ctx.moveTo(rx-3, ry-12); ctx.lineTo(rx-10, ry+5); ctx.lineTo(rx+2, ry+5); ctx.closePath(); ctx.fill();
        }
    } else if (theme === 'swamp') {
        // Dead trees and mushrooms
        for (let i = 0; i < 15; i++) {
            const tx = (i * 163 + 40) % W, ty = 110 + (i * 107) % (H - 210);
            // Dead tree trunk
            ctx.fillStyle = '#2E2E1E';
            ctx.fillRect(tx-2, ty, 4, 18);
            // Crooked branches
            ctx.strokeStyle = '#3E3E2E'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(tx, ty+4); ctx.lineTo(tx-10, ty-8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(tx, ty+8); ctx.lineTo(tx+8, ty-4); ctx.stroke();
            // Mushrooms nearby
            if (i % 2 === 0) {
                ctx.fillStyle = '#8BC34A';
                ctx.beginPath(); ctx.arc(tx+12, ty+16, 5, Math.PI, 0); ctx.fill();
                ctx.fillStyle = '#558B2F';
                ctx.fillRect(tx+11, ty+16, 3, 5);
            }
        }
        // Lily pads
        for (let i = 0; i < 8; i++) {
            const lx = (i * 131 + 70) % W, ly = 160 + (i * 83) % (H - 250);
            ctx.fillStyle = 'rgba(76,175,80,0.25)';
            ctx.beginPath(); ctx.ellipse(lx, ly, 12, 8, i*0.5, 0, Math.PI*1.7); ctx.fill();
        }
    } else if (theme === 'celestial') {
        // Floating stone pillars
        for (let i = 0; i < 10; i++) {
            const px = (i * 179 + 60) % W, py = 130 + (i * 101) % (H - 230);
            const bob = Math.sin(frame*0.01+i*0.8)*3;
            ctx.fillStyle = 'rgba(200,210,230,0.4)';
            ctx.fillRect(px-6, py+bob, 12, 20);
            ctx.fillStyle = 'rgba(220,230,245,0.5)';
            ctx.fillRect(px-8, py-3+bob, 16, 4);
            // Sparkle
            if ((frame+i*17)%40 < 5) {
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath(); ctx.arc(px, py-5+bob, 2, 0, Math.PI*2); ctx.fill();
            }
        }
    } else if (theme === 'volcanic') {
        // Obsidian spires and lava rocks
        for (let i = 0; i < 12; i++) {
            const rx = (i * 171 + 50) % W, ry = 120 + (i * 113) % (H - 220);
            ctx.fillStyle = '#1a0800';
            ctx.beginPath(); ctx.moveTo(rx, ry-22); ctx.lineTo(rx-7, ry+8); ctx.lineTo(rx+7, ry+8); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#2a1000';
            ctx.beginPath(); ctx.moveTo(rx+2, ry-16); ctx.lineTo(rx-4, ry+5); ctx.lineTo(rx+8, ry+5); ctx.closePath(); ctx.fill();
            // Lava glow at base
            ctx.fillStyle = `rgba(255,80,0,${0.15+Math.sin(frame*0.03+i)*0.08})`;
            ctx.beginPath(); ctx.arc(rx, ry+8, 5, 0, Math.PI*2); ctx.fill();
        }
    } else if (theme === 'void') {
        // Floating crystals
        for (let i = 0; i < 10; i++) {
            const cx = (i * 181 + 40) % W, cy = 100 + (i * 109) % (H - 200);
            const bob = Math.sin(frame*0.015+i*1.1)*4;
            const pulse = 0.3+Math.sin(frame*0.02+i)*0.15;
            ctx.fillStyle = `rgba(150,0,255,${pulse})`;
            ctx.beginPath();
            ctx.moveTo(cx, cy-12+bob); ctx.lineTo(cx-5, cy+bob); ctx.lineTo(cx, cy+12+bob); ctx.lineTo(cx+5, cy+bob);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = `rgba(200,100,255,${pulse*0.5})`;
            ctx.beginPath(); ctx.arc(cx, cy+bob, 8, 0, Math.PI*2); ctx.fill();
        }
    } else if (theme === 'siege') {
        // Ruined walls and debris
        for (let i = 0; i < 10; i++) {
            const wx = (i * 187 + 30) % W, wy = 110 + (i * 121) % (H - 210);
            ctx.fillStyle = '#2a1a1a';
            ctx.fillRect(wx-8, wy, 16, 20);
            ctx.fillStyle = '#3a2020';
            ctx.fillRect(wx-10, wy-3, 20, 4);
            // Cracks
            ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(wx-3, wy+2); ctx.lineTo(wx+2, wy+12); ctx.stroke();
            // Fire on top
            if (i % 3 === 0) {
                ctx.fillStyle = `rgba(255,100,0,${0.3+Math.sin(frame*0.05+i)*0.15})`;
                ctx.beginPath(); ctx.arc(wx, wy-5, 4+Math.sin(frame*0.06+i)*2, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    // Ambient particles (behind path)
    ambientParticles.forEach(p => {
        ctx.globalAlpha = Math.min(1, p.life / 50);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    if (!levelData) { ctx.restore(); return; }

    // Draw path
    const pathColors = {
        forest: ['#8B7355','#A09070','#B8A888'],
        desert: ['#8B6914','#A07D30','#C0A060'],
        dark:   ['#3a2a2a','#4a3a3a','#5a4a4a'],
        ice:    ['#546E7A','#78909C','#90A4AE'],
        hell:   ['#4E342E','#5D4037','#6D4C41'],
        swamp:  ['#2E3E1E','#3E4E2E','#4E5E3E'],
        celestial: ['#8090A0','#A0B0C8','#C0D0E8'],
        volcanic: ['#3A1500','#5A2000','#7A3000'],
        void:   ['#1A0030','#2A0050','#3A0070'],
        siege:  ['#2A1010','#3A1818','#4A2525'],
    };
    const pc = pathColors[theme] || pathColors.dark;

    ctx.strokeStyle = pc[0];
    ctx.lineWidth = 34;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();

    ctx.strokeStyle = pc[1];
    ctx.lineWidth = 28;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();

    ctx.strokeStyle = pc[2];
    ctx.lineWidth = 2; ctx.setLineDash([8, 12]);
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Entry/exit markers
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\u25B6', path[0].x, path[0].y);

    ctx.fillStyle = '#F44336';
    const ep = path[path.length-1];
    ctx.beginPath(); ctx.arc(ep.x, ep.y, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif';
    ctx.fillText('\uD83C\uDFF0', ep.x, ep.y);

    // Tower spots
    spots.forEach(s => {
        if (s.tower) return;
        const pulse = 0.3 + Math.sin(frame * 0.04) * 0.1;
        ctx.strokeStyle = `rgba(255,255,255,${pulse + 0.1})`;
        ctx.lineWidth = 2;
        ctx.fillStyle = `rgba(100,80,40,${pulse + 0.2})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, 20, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = `rgba(255,255,255,${pulse + 0.2})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(s.x-7, s.y); ctx.lineTo(s.x+7, s.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(s.x, s.y-7); ctx.lineTo(s.x, s.y+7); ctx.stroke();
    });

    // Range indicator for selected
    if (selectedTower) {
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(selectedTower.x, selectedTower.y, selectedTower.range, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
    }

    // Towers
    towers.forEach(tower => {
        const info = TOWER_TYPES[tower.type];
        const x = tower.x, y = tower.y;

        // Base shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.ellipse(x, y+8, 22, 8, 0, 0, Math.PI*2); ctx.fill();

        // Base
        ctx.fillStyle = 'rgba(80,60,30,0.8)';
        ctx.beginPath(); ctx.arc(x, y+5, 20, 0, Math.PI*2); ctx.fill();

        if (tower.type === 'archer') {
            ctx.fillStyle = '#5D4037';
            ctx.fillRect(x-12, y-20, 24, 25);
            ctx.fillStyle = '#4E342E';
            ctx.fillRect(x-14, y-22, 28, 4);
            for (let i = 0; i < 3; i++) ctx.fillRect(x-14+i*10, y-28, 6, 8);
            ctx.fillStyle = '#2E7D32';
            ctx.fillRect(x-4, y-18, 8, 10);
            ctx.fillStyle = '#FFD700'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
            for (let i = 0; i < tower.level; i++) ctx.fillText('\u2605', x-8+i*8, y+12);

        } else if (tower.type === 'mage') {
            ctx.fillStyle = '#3949AB';
            ctx.beginPath(); ctx.moveTo(x, y-32); ctx.lineTo(x-14, y+2); ctx.lineTo(x+14, y+2); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#5C6BC0';
            ctx.fillRect(x-10, y-5, 20, 10);
            const orbPulse = Math.sin(frame * 0.08) * 2;
            // Glow
            ctx.fillStyle = `rgba(124,77,255,${0.15+Math.sin(frame*0.05)*0.1})`;
            ctx.beginPath(); ctx.arc(x, y-20, 14+orbPulse, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = `rgba(124,77,255,${0.3+Math.sin(frame*0.05)*0.2})`;
            ctx.beginPath(); ctx.arc(x, y-20, 8+orbPulse, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#B388FF';
            ctx.beginPath(); ctx.arc(x, y-20, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FFD700'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
            for (let i = 0; i < tower.level; i++) ctx.fillText('\u2605', x-8+i*8, y+15);

        } else if (tower.type === 'barracks') {
            ctx.fillStyle = '#B71C1C';
            ctx.beginPath(); ctx.moveTo(x, y-22); ctx.lineTo(x-16, y+4); ctx.lineTo(x+16, y+4); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#C62828';
            ctx.beginPath(); ctx.moveTo(x, y-22); ctx.lineTo(x, y+4); ctx.lineTo(x+16, y+4); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#F44336';
            ctx.fillRect(x-1, y-30, 2, 12);
            // Animated flag
            const flagWave = Math.sin(frame*0.1)*2;
            ctx.fillRect(x+1, y-30+flagWave*0.5, 8, 5);
            ctx.fillStyle = '#FFD700'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
            for (let i = 0; i < tower.level; i++) ctx.fillText('\u2605', x-8+i*8, y+14);

        } else if (tower.type === 'cannon') {
            ctx.fillStyle = '#5D4037';
            ctx.fillRect(x-14, y-8, 28, 14);
            ctx.fillStyle = '#3E2723';
            ctx.fillRect(x-16, y-10, 32, 4);
            ctx.save();
            ctx.translate(x, y-5);
            ctx.rotate(tower.angle);
            ctx.fillStyle = '#333';
            ctx.fillRect(0, -4, 22, 8);
            ctx.fillStyle = '#555';
            ctx.fillRect(18, -5, 6, 10);
            ctx.restore();
            ctx.fillStyle = '#4E342E';
            ctx.beginPath(); ctx.arc(x-8, y+4, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x+8, y+4, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FFD700'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
            for (let i = 0; i < tower.level; i++) ctx.fillText('\u2605', x-8+i*8, y+16);
        }

        // Shooting animation with glow
        if (tower.cooldown > tower.rate - 5 && tower.target) {
            const glowColor = tower.type === 'mage' ? 'rgba(124,77,255,' : tower.type === 'cannon' ? 'rgba(255,100,0,' : 'rgba(255,200,0,';
            ctx.fillStyle = glowColor + '0.2)';
            ctx.beginPath(); ctx.arc(x, y-15, 20, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = glowColor + '0.4)';
            ctx.beginPath(); ctx.arc(x, y-15, 10, 0, Math.PI*2); ctx.fill();
        }
    });

    // Soldiers
    soldiers.forEach(s => {
        if (s.hp <= 0) return;
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.fillStyle = '#C62828';
        ctx.fillRect(-4, -8, 8, 12);
        ctx.fillStyle = '#FFCC80';
        ctx.fillRect(-3, -12, 6, 5);
        ctx.fillStyle = '#9E9E9E';
        ctx.fillRect(-4, -13, 8, 3);
        ctx.fillStyle = '#B71C1C';
        ctx.fillRect(-7, -6, 3, 8);
        ctx.fillStyle = '#BDBDBD';
        ctx.fillRect(4, -8, 2, 10);
        if (s.hp < s.maxHp) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-8, -16, 16, 3);
            ctx.fillStyle = '#4CAF50'; ctx.fillRect(-8, -16, 16*(s.hp/s.maxHp), 3);
        }
        ctx.restore();
    });

    // Enemies
    enemies.forEach(e => {
        const info = ENEMY_TYPES[e.type];
        const bob = e.fly ? Math.sin(e.animT * 0.1) * 4 : 0;

        ctx.save();
        ctx.translate(e.x, e.y + bob);

        // Stealth alpha
        if (e.stealth) ctx.globalAlpha = e.stealthAlpha;

        // Shadow
        if (e.fly) {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath(); ctx.ellipse(0, 15, e.w*0.7, 4, 0, 0, Math.PI*2); ctx.fill();
        }

        // Slow effect
        if (e.slowed > 0) {
            ctx.fillStyle = 'rgba(100,100,255,0.25)';
            ctx.beginPath(); ctx.arc(0, 0, e.w+5, 0, Math.PI*2); ctx.fill();
        }

        // Body drawing based on type
        if (e.type === 'goblin' || e.type === 'bandit' || e.type === 'skeleton' || e.type === 'dark_knight' || e.type === 'shaman' || e.type === 'necromancer' || e.type === 'shadow') {
            if (e.type === 'shadow') {
                // Shadow enemy - dark with wispy edges
                ctx.fillStyle = 'rgba(20,20,20,0.7)';
                ctx.beginPath(); ctx.arc(0, 0, e.w*0.7, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = e.color;
                ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
                // Wispy effect
                for (let i = 0; i < 3; i++) {
                    const wx = (Math.random()-0.5)*8, wy = (Math.random()-0.5)*8;
                    ctx.fillStyle = 'rgba(50,50,50,0.3)';
                    ctx.beginPath(); ctx.arc(wx, wy, 4, 0, Math.PI*2); ctx.fill();
                }
                ctx.fillStyle = '#F44336';
                ctx.fillRect(-3, -4, 2, 2); ctx.fillRect(1, -4, 2, 2);
            } else {
                ctx.fillStyle = e.color;
                ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
                ctx.fillStyle = e.type === 'skeleton' ? '#E0E0E0' : '#FFCC80';
                ctx.fillRect(-4, -e.h/2-5, 8, 6);
                if (e.type === 'dark_knight') {
                    ctx.fillStyle = '#37474F'; ctx.fillRect(-5, -e.h/2-6, 10, 3);
                }
                if (e.type === 'shaman' || e.type === 'necromancer') {
                    ctx.fillStyle = e.type === 'necromancer' ? '#311B92' : '#4A148C';
                    ctx.fillRect(e.w/2, -e.h/2, 2, e.h);
                    const glow = Math.sin(e.animT*0.1)*2;
                    ctx.fillStyle = `rgba(156,39,176,${0.5+Math.sin(e.animT*0.08)*0.3})`;
                    ctx.beginPath(); ctx.arc(e.w/2+1, -e.h/2-3, 4+glow, 0, Math.PI*2); ctx.fill();
                    if (e.type === 'necromancer') {
                        // Extra skull effect
                        ctx.fillStyle = 'rgba(200,200,200,0.6)';
                        ctx.beginPath(); ctx.arc(-e.w/2-3, -2, 3, 0, Math.PI*2); ctx.fill();
                    }
                }
                const legA = Math.sin(e.animT * 0.15) * 2;
                ctx.fillStyle = e.color;
                ctx.fillRect(-4, e.h/2, 3, 4+legA);
                ctx.fillRect(1, e.h/2, 3, 4-legA);
            }
        } else if (e.type === 'orc' || e.type === 'troll' || e.type === 'demon' || e.type === 'golem') {
            ctx.fillStyle = e.color;
            ctx.beginPath(); ctx.ellipse(0, 0, e.w/2, e.h/2, 0, 0, Math.PI*2); ctx.fill();
            if (e.type === 'golem') {
                // Rocky texture
                ctx.fillStyle = '#78909C';
                ctx.fillRect(-4, -6, 8, 12);
                ctx.fillStyle = '#546E7A';
                ctx.fillRect(-6, -3, 3, 6);
                ctx.fillRect(3, -3, 3, 6);
                ctx.fillStyle = '#FF9800';
                ctx.fillRect(-3, -3, 2, 2); ctx.fillRect(2, -3, 2, 2);
            } else {
                ctx.fillStyle = e.type === 'demon' ? '#FF5722' : '#FFEB3B';
                ctx.fillRect(-4, -4, 3, 3); ctx.fillRect(2, -4, 3, 3);
            }
            if (e.type === 'demon') {
                ctx.fillStyle = '#4a0000';
                ctx.fillRect(-6, -e.h/2-4, 3, 6); ctx.fillRect(3, -e.h/2-4, 3, 6);
                // Fire aura
                if (frame % 3 === 0) {
                    particles.push({x:e.x+(Math.random()-0.5)*10,y:e.y-e.h/2,vx:(Math.random()-0.5)*1,vy:-1-Math.random(),life:12,color:'#FF6D00',size:2+Math.random()*2,glow:true});
                }
            }
        } else if (e.type === 'wolf' || e.type === 'warg') {
            ctx.fillStyle = e.color;
            ctx.beginPath(); ctx.ellipse(0, 0, e.w/2, e.h/2, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = e.color;
            const hx = Math.cos(e.angle) * e.w/2;
            const hy = Math.sin(e.angle) * e.h/2;
            ctx.beginPath(); ctx.arc(hx, hy-2, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#F44336'; ctx.fillRect(hx+3, hy-1, 3, 2);
            if (e.type === 'warg') {
                ctx.fillStyle = '#4E342E';
                ctx.fillRect(-4, -e.h/2-8, 8, 8);
                ctx.fillStyle = '#FFCC80'; ctx.fillRect(-3, -e.h/2-12, 6, 5);
            }
            const la = Math.sin(e.animT*0.2)*3;
            ctx.fillStyle = e.color;
            ctx.fillRect(-e.w/3, e.h/2-2, 3, 4+la); ctx.fillRect(e.w/3-3, e.h/2-2, 3, 4-la);
        } else if (e.type === 'bat') {
            ctx.fillStyle = e.color;
            ctx.beginPath(); ctx.ellipse(0, 0, 5, 4, 0, 0, Math.PI*2); ctx.fill();
            const wingA = Math.sin(e.animT*0.3)*0.5;
            ctx.save(); ctx.rotate(wingA);
            ctx.fillRect(-12, -2, 9, 3); ctx.restore();
            ctx.save(); ctx.rotate(-wingA);
            ctx.fillRect(3, -2, 9, 3); ctx.restore();
            ctx.fillStyle = '#F44336'; ctx.fillRect(-2, 0, 1.5, 1.5); ctx.fillRect(1, 0, 1.5, 1.5);
        } else if (e.type === 'spider') {
            ctx.fillStyle = e.color;
            ctx.beginPath(); ctx.ellipse(0, 0, e.w/2, e.h/2, 0, 0, Math.PI*2); ctx.fill();
            // Legs
            for (let i = 0; i < 4; i++) {
                const la = Math.sin(e.animT*0.2+i*1.5)*3;
                ctx.strokeStyle = e.color; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(-2, -2+i*2); ctx.lineTo(-e.w/2-4-la, -4+i*3); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(2, -2+i*2); ctx.lineTo(e.w/2+4+la, -4+i*3); ctx.stroke();
            }
            ctx.fillStyle = '#F44336';
            ctx.fillRect(-3, -2, 2, 2); ctx.fillRect(1, -2, 2, 2);
        } else if (e.type === 'fire_imp') {
            ctx.fillStyle = e.color;
            ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
            ctx.fillStyle = '#FFEB3B';
            ctx.fillRect(-3, -e.h/2-4, 6, 4);
            ctx.fillStyle = '#FF5722';
            ctx.fillRect(-2, -2, 1.5, 1.5); ctx.fillRect(1, -2, 1.5, 1.5);
            // Fire head
            if (frame % 4 === 0) {
                particles.push({x:e.x+(Math.random()-0.5)*4,y:e.y-e.h/2-4,vx:(Math.random()-0.5)*0.5,vy:-0.5-Math.random()*0.5,life:8,color:'#FF6D00',size:2+Math.random()});
            }
        } else if (e.type === 'frost_wyrm') {
            ctx.fillStyle = e.color;
            ctx.beginPath(); ctx.ellipse(0, 0, e.w/2, e.h/2, 0, 0, Math.PI*2); ctx.fill();
            // Ice wings
            const wingA = Math.sin(e.animT*0.08)*0.3;
            ctx.fillStyle = '#4DD0E1';
            ctx.save(); ctx.rotate(wingA);
            ctx.beginPath(); ctx.moveTo(-5,-5); ctx.lineTo(-22,-12); ctx.lineTo(-5,5); ctx.closePath(); ctx.fill();
            ctx.restore();
            ctx.save(); ctx.rotate(-wingA);
            ctx.beginPath(); ctx.moveTo(5,-5); ctx.lineTo(22,-12); ctx.lineTo(5,5); ctx.closePath(); ctx.fill();
            ctx.restore();
            ctx.fillStyle = '#E0F7FA';
            ctx.fillRect(e.w/2-3, -3, 6, 4);
            ctx.fillStyle = '#00BCD4';
            ctx.fillRect(e.w/2, -2, 2, 2);
            // Ice breath
            if (e.animT % 50 < 12) {
                ctx.fillStyle = `rgba(0,188,212,${0.2+Math.random()*0.2})`;
                ctx.beginPath(); ctx.arc(e.w/2+8, 0, 6+Math.random()*3, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = '#00BCD4'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('WYRM', 0, -e.h/2-10);
        } else if (e.type === 'lich_king') {
            // Lich King boss
            ctx.fillStyle = e.color;
            ctx.beginPath(); ctx.ellipse(0, 0, e.w/2, e.h/2, 0, 0, Math.PI*2); ctx.fill();
            // Crown
            ctx.fillStyle = '#FFD600';
            ctx.fillRect(-8, -e.h/2-4, 16, 4);
            ctx.fillRect(-8, -e.h/2-8, 3, 5);
            ctx.fillRect(-1, -e.h/2-10, 3, 7);
            ctx.fillRect(6, -e.h/2-8, 3, 5);
            // Eyes
            ctx.fillStyle = '#76FF03';
            ctx.fillRect(-4, -4, 3, 3); ctx.fillRect(2, -4, 3, 3);
            // Staff
            ctx.fillStyle = '#4A148C';
            ctx.fillRect(e.w/2+2, -e.h/2, 3, e.h+4);
            const sGlow = Math.sin(frame*0.06)*3;
            ctx.fillStyle = `rgba(118,255,3,${0.4+Math.sin(frame*0.05)*0.2})`;
            ctx.beginPath(); ctx.arc(e.w/2+3, -e.h/2-4, 6+sGlow, 0, Math.PI*2); ctx.fill();
            // Dark aura
            ctx.strokeStyle = `rgba(100,0,200,${0.2+Math.sin(frame*0.03)*0.1})`;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, e.w/2+8+Math.sin(frame*0.04)*3, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = '#76FF03'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('LICH KING', 0, -e.h/2-14);
            // Summon particles
            if (frame % 5 === 0) {
                particles.push({x:e.x+(Math.random()-0.5)*20,y:e.y+(Math.random()-0.5)*20,vx:0,vy:-0.5,life:15,color:'#7C4DFF',size:2,glow:true});
            }
        } else if (e.type === 'dragon') {
            ctx.fillStyle = e.color;
            ctx.beginPath(); ctx.ellipse(0, 0, e.w/2, e.h/2, 0, 0, Math.PI*2); ctx.fill();
            const wingA = Math.sin(e.animT*0.08)*0.3;
            ctx.fillStyle = '#AD1457';
            ctx.save(); ctx.rotate(wingA);
            ctx.beginPath(); ctx.moveTo(-5,-5); ctx.lineTo(-25,-15); ctx.lineTo(-5,5); ctx.closePath(); ctx.fill();
            ctx.restore();
            ctx.save(); ctx.rotate(-wingA);
            ctx.beginPath(); ctx.moveTo(5,-5); ctx.lineTo(25,-15); ctx.lineTo(5,5); ctx.closePath(); ctx.fill();
            ctx.restore();
            ctx.fillStyle = e.color;
            ctx.beginPath(); ctx.arc(e.w/2-2, -2, 7, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FFD600';
            ctx.fillRect(e.w/2, -4, 3, 3);
            if (e.animT % 60 < 15) {
                ctx.fillStyle = `rgba(255,100,0,${0.3+Math.random()*0.3})`;
                ctx.beginPath(); ctx.arc(e.w/2+10, 0, 8+Math.random()*4, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = '#FFD600'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('DRAGON', 0, -e.h/2-10);
        }

        // HP bar
        if (e.hp < e.maxHp) {
            const bw = Math.max(e.w, 18);
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(-bw/2, -e.h/2-5, bw, 3);
            const hpPct = e.hp/e.maxHp;
            ctx.fillStyle = hpPct > 0.5 ? '#4CAF50' : hpPct > 0.25 ? '#FF9800' : '#F44336';
            ctx.fillRect(-bw/2, -e.h/2-5, bw*hpPct, 3);
        }

        // Boss HP bar (bigger)
        if (e.boss) {
            const bw = 40;
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(-bw/2, -e.h/2-9, bw, 4);
            ctx.fillStyle = '#F44336'; ctx.fillRect(-bw/2, -e.h/2-9, bw*(e.hp/e.maxHp), 4);
            ctx.strokeStyle = '#FFD600'; ctx.lineWidth = 0.5;
            ctx.strokeRect(-bw/2, -e.h/2-9, bw, 4);
        }

        ctx.globalAlpha = 1;
        ctx.restore();
    });

    // Projectiles
    projectiles.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        if (p.magic) {
            // Glow
            ctx.fillStyle = p.color + '22';
            ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = p.color + '66';
            ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(0, 0, 3.5, 0, Math.PI*2); ctx.fill();
        } else if (p.splash > 15) {
            ctx.fillStyle = '#333';
            ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255,100,0,0.4)';
            ctx.beginPath(); ctx.arc(-3, -2, 5, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.rotate(Math.atan2((p.target?.y||p.ty)-p.y, (p.target?.x||p.tx)-p.x));
            ctx.fillStyle = '#8D6E63';
            ctx.fillRect(-6, -1, 12, 2);
            ctx.fillStyle = '#9E9E9E';
            ctx.beginPath(); ctx.moveTo(6,0); ctx.lineTo(3,-2.5); ctx.lineTo(3,2.5); ctx.closePath(); ctx.fill();
        }
        // Trail
        if (Math.random() < 0.7) {
            particles.push({ x:p.x, y:p.y, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5,
                life:10, color:p.color, size:1.5 });
        }
        ctx.restore();
    });

    // Particles with glow support
    particles.forEach(p => {
        const alpha = Math.max(0, p.life / 30);
        ctx.globalAlpha = alpha;
        if (p.glow) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = alpha * 0.3;
            ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.size*2), 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = alpha;
        }
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.size), 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Wave announcement
    if (waveActive && waveSpawnTimer > 20 && waveSpawnQueue.length === levelData.waves[waveNum-1]?.length) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(W/2-100, 60, 200, 30);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`Wave ${waveNum}/${totalWaves}`, W/2, 81);
    }

    ctx.restore(); // end screen shake
}

// ==================== LEVEL SELECT ====================
function showMenu() {
    hideAllOverlays();
    const ls = document.getElementById('level-select');
    ls.style.display = 'flex';

    const themeIcons = {forest:'\uD83C\uDF32', desert:'\uD83C\uDFDC\uFE0F', dark:'\uD83C\uDF11', ice:'\u2744\uFE0F', hell:'\uD83D\uDD25', swamp:'\uD83E\uDDA0', celestial:'\u2601\uFE0F', volcanic:'\uD83C\uDF0B', void:'\uD83C\uDF0C', siege:'\u2694\uFE0F'};
    const themeNames = {forest:'Forest', desert:'Desert', dark:'Shadow', ice:'Frozen', hell:'Inferno', swamp:'Cursed Swamp', celestial:'Celestial Peaks', volcanic:'Volcanic Core', void:'Void Realm', siege:'Final Siege'};

    ls.innerHTML = `<h1 style="color:#FFD700;margin-bottom:5px">\u2694\uFE0F Kingdom Rush \u2694\uFE0F</h1>
        <p style="color:#c8a060;margin-bottom:15px">Defend the realm across ${LEVELS.length} levels!</p>
        <div id="level-grid" style="display:flex;flex-wrap:wrap;gap:8px;max-width:560px;justify-content:center"></div>`;

    const grid = document.getElementById('level-grid');
    let lastTheme = '';
    for (let i = 0; i < LEVELS.length; i++) {
        const theme = LEVELS[i].theme;
        // Section divider for new themes
        if (theme !== lastTheme) {
            lastTheme = theme;
            const div = document.createElement('div');
            div.style.cssText = 'width:100%;text-align:center;color:#c8a060;font-size:12px;margin:6px 0 2px;border-top:1px solid #4a3520;padding-top:6px';
            div.textContent = `${themeIcons[theme]||''} ${themeNames[theme]||theme} Realm`;
            grid.appendChild(div);
        }
        const btn = document.createElement('button');
        const unlocked = i < unlockedLevel;
        btn.className = 'lvl-btn' + (unlocked ? '' : ' locked');
        btn.innerHTML = `${i+1}<div class="stars" style="font-size:9px">${unlocked ? (themeIcons[theme]||'\uD83C\uDFAE') : '\uD83D\uDD12'}</div>`;
        if (unlocked) btn.onclick = () => { initLevel(i); };
        grid.appendChild(btn);
    }
}
window.goMenu = showMenu;

// ==================== GAME LOOP ====================
function gameLoop() {
    if (document.getElementById('level-select').style.display === 'flex') {
        const grd = ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0,'#1a0a00'); grd.addColorStop(1,'#0a0500');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        // Animated background for menu
        const t = Date.now() * 0.001;
        for (let i = 0; i < 15; i++) {
            const x = (i * 137 + t * 20) % W;
            const y = (i * 97 + Math.sin(t + i) * 30) % H;
            ctx.fillStyle = `rgba(139,105,20,${0.05+Math.sin(t+i)*0.03})`;
            ctx.beginPath(); ctx.arc(x, y, 20+Math.sin(t*0.5+i)*10, 0, Math.PI*2); ctx.fill();
        }
    } else if (levelData) {
        update();
        draw();
    }
    requestAnimationFrame(gameLoop);
}

showMenu();
gameLoop();
</script>
</body>
</html>
