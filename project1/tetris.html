<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tetris</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Orbitron', sans-serif; color: #ccc; overflow: hidden; }
  #bg-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  #game-wrap { display: flex; gap: 24px; align-items: flex-start; z-index: 1; position: relative; }
  canvas { border-radius: 6px; }
  #board { border: 2px solid rgba(100,100,255,0.2); box-shadow: 0 0 30px rgba(80,80,200,0.15), inset 0 0 30px rgba(0,0,0,0.5); }
  #side { display: flex; flex-direction: column; gap: 16px; min-width: 140px; }
  #side .panel { background: rgba(15,15,30,0.8); border: 1px solid rgba(100,100,255,0.15); border-radius: 8px; padding: 12px 16px; backdrop-filter: blur(4px); }
  #side h2 { font-size: 10px; color: #557; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 4px; }
  #side .stat { font-size: 24px; color: #fff; text-shadow: 0 0 10px rgba(100,150,255,0.5); }
  #next-canvas { background: transparent; display: block; margin-top: 4px; }
  #controls { color: #446; font-size: 10px; line-height: 2; letter-spacing: 1px; }
  #controls span { color: #88a; }
  #bg-btn, #pause-btn, #undo-btn { background: rgba(40,40,70,0.8); color: #aac; border: 1px solid rgba(100,100,255,0.2); border-radius: 4px; padding: 5px 12px; font-size: 10px; cursor: pointer; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; margin-top: 4px; }
  #bg-btn:hover, #pause-btn:hover, #undo-btn:hover { background: rgba(60,60,100,0.8); }
</style>
</head>
<body>
<canvas id="bg-stars"></canvas>
<div id="game-wrap">
  <canvas id="board" width="300" height="600"></canvas>
  <div id="side">
    <div class="panel">
      <h2>Score</h2>
      <div class="stat" id="score-val">0</div>
    </div>
    <div class="panel">
      <h2>Level</h2>
      <div class="stat" id="level-val">1</div>
    </div>
    <div class="panel">
      <h2>Lines</h2>
      <div class="stat" id="lines-val">0</div>
    </div>
    <div class="panel">
      <h2>Next</h2>
      <canvas id="next-canvas" width="120" height="120"></canvas>
    </div>
    <div class="panel" id="controls">
      <span>Left/Right</span> Move<br>
      <span>Up</span> Rotate<br>
      <span>Down</span> Soft drop<br>
      <span>Enter</span> Hard drop<br>
      <span>Space</span> Pause<br>
      <span>B</span> Background<br>
      <span>Z</span> Undo
    </div>
    <button id="undo-btn">Undo</button>
    <button id="pause-btn">Pause</button>
    <button id="bg-btn">Background</button>
  </div>
</div>
<script>
// --- Backgrounds (same as breakout) ---
const BACKGROUNDS = ['stars','#000','#1a1a2e','#0f3460','#16213e','#1b262c','#0a3d62','#1e272e','#2c2c54','#5c1010','#3b0058','rainbow'];
let bgIndex = 0;

document.getElementById('bg-btn').addEventListener('click', () => {
  bgIndex = (bgIndex + 1) % BACKGROUNDS.length;
});

document.getElementById('undo-btn').addEventListener('click', () => {
  undo();
});

document.getElementById('pause-btn').addEventListener('click', () => {
  if (gameOver) { init(); return; }
  paused = !paused;
});

// --- Star background ---
const starCanvas = document.getElementById('bg-stars');
const sCtx = starCanvas.getContext('2d');
starCanvas.width = window.innerWidth;
starCanvas.height = window.innerHeight;
const stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * starCanvas.width,
    y: Math.random() * starCanvas.height,
    size: Math.random() * 1.5 + 0.5,
    speed: Math.random() * 0.3 + 0.05,
    brightness: Math.random()
  });
}
function drawStars() {
  const bg = BACKGROUNDS[bgIndex];
  if (bg === 'stars') {
    sCtx.fillStyle = '#0a0a12';
    sCtx.fillRect(0, 0, starCanvas.width, starCanvas.height);
    for (const s of stars) {
      s.y += s.speed;
      s.brightness += (Math.random() - 0.5) * 0.05;
      s.brightness = Math.max(0.2, Math.min(1, s.brightness));
      if (s.y > starCanvas.height) { s.y = 0; s.x = Math.random() * starCanvas.width; }
      sCtx.globalAlpha = s.brightness * 0.6;
      sCtx.fillStyle = '#aac';
      sCtx.beginPath();
      sCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      sCtx.fill();
    }
    sCtx.globalAlpha = 1;
    document.body.style.background = '#0a0a12';
  } else {
    const pageBg = bg === 'rainbow' ? '#111' : bg;
    document.body.style.background = pageBg;
    sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  }
}

// --- Game ---
const boardCanvas = document.getElementById('board');
const bCtx = boardCanvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nCtx = nextCanvas.getContext('2d');

const COLS = 10, ROWS = 20, CELL = 30;
const COLORS = [
  '',
  '#00f0f0', // I - cyan
  '#4040ff', // J - blue
  '#f0a000', // L - orange
  '#f0f000', // O - yellow
  '#00f000', // S - green
  '#c040ff', // T - purple
  '#f04040', // Z - red
];
const GLOW_COLORS = [
  '',
  'rgba(0,240,240,0.4)',
  'rgba(64,64,255,0.4)',
  'rgba(240,160,0,0.4)',
  'rgba(240,240,0,0.4)',
  'rgba(0,240,0,0.4)',
  'rgba(192,64,255,0.4)',
  'rgba(240,64,64,0.4)',
];

const SHAPES = [
  [[1,1,1,1]],
  [[2,0,0],[2,2,2]],
  [[0,0,3],[3,3,3]],
  [[4,4],[4,4]],
  [[0,5,5],[5,5,0]],
  [[0,6,0],[6,6,6]],
  [[7,7,0],[0,7,7]],
];

let board = [];
let current, currentX, currentY;
let nextPiece;
let score = 0, lines = 0, level = 1;
let dropInterval, dropTimer;
let paused = false, gameOver = false;
let lockDelay = 0;
let particles = [];
let flashLines = []; // lines currently flashing
let flashTimer = 0;
let shakeTimer = 0, shakeIntensity = 0;
let lastTime = 0;
let hardDropTrail = [];
let gameOverTimer = 0;
let gameOverBlocks = []; // falling blocks animation
let gameOverFlash = 0;
let undoStack = []; // stores previous states for undo
const MAX_UNDOS = 10;

function createBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) board.push(new Array(COLS).fill(0));
}

function randomPiece() {
  return JSON.parse(JSON.stringify(SHAPES[Math.floor(Math.random() * SHAPES.length)]));
}

function rotate(piece) {
  const rows = piece.length, cols = piece[0].length;
  const rotated = [];
  for (let c = 0; c < cols; c++) {
    rotated.push([]);
    for (let r = rows - 1; r >= 0; r--) {
      rotated[c].push(piece[r][c]);
    }
  }
  return rotated;
}

function collides(piece, px, py) {
  for (let r = 0; r < piece.length; r++) {
    for (let c = 0; c < piece[r].length; c++) {
      if (!piece[r][c]) continue;
      const nx = px + c, ny = py + r;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
      if (ny >= 0 && board[ny][nx]) return true;
    }
  }
  return false;
}

function saveState() {
  undoStack.push({
    board: board.map(r => [...r]),
    score, lines, level,
    current: JSON.parse(JSON.stringify(current)),
    nextPiece: JSON.parse(JSON.stringify(nextPiece)),
    currentX, currentY
  });
  if (undoStack.length > MAX_UNDOS) undoStack.shift();
}

function undo() {
  if (undoStack.length === 0 || gameOver) return;
  const state = undoStack.pop();
  board = state.board;
  score = state.score;
  lines = state.lines;
  level = state.level;
  current = state.current;
  nextPiece = state.nextPiece;
  // Put piece back at the top so you can replay it
  currentX = Math.floor((COLS - current[0].length) / 2);
  currentY = -current.length;
  lockDelay = 0;
  dropTimer = 0;
  updateHUD();
  drawNext();
  flashTimer = 5;
  shakeTimer = 3; shakeIntensity = 2;
}

function lock() {
  saveState();
  // Spawn landing particles
  for (let r = 0; r < current.length; r++) {
    for (let c = 0; c < current[r].length; c++) {
      if (!current[r][c]) continue;
      const ny = currentY + r;
      if (ny < 0) { triggerGameOver(); return; }
      board[ny][currentX + c] = current[r][c];
      spawnParticles((currentX + c) * CELL + CELL / 2, ny * CELL + CELL, COLORS[current[r][c]], 3);
    }
  }
  shakeTimer = 3; shakeIntensity = 2;
  clearLines();
  spawn();
}

function clearLines() {
  let cleared = 0;
  const linesToClear = [];
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c !== 0)) {
      linesToClear.push(r);
      for (let c = 0; c < COLS; c++) {
        spawnParticles(c * CELL + CELL / 2, r * CELL + CELL / 2, COLORS[board[r][c]], 8);
      }
      board.splice(r, 1);
      board.unshift(new Array(COLS).fill(0));
      cleared++;
      r++;
    }
  }
  if (cleared > 0) {
    const pts = [0, 100, 300, 500, 800];
    score += (pts[cleared] || 800) * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    shakeTimer = 5 + cleared * 3;
    shakeIntensity = 2 + cleared * 2;
    flashTimer = 12;
    updateHUD();
  }
}

function spawn() {
  current = nextPiece || randomPiece();
  nextPiece = randomPiece();
  currentX = Math.floor((COLS - current[0].length) / 2);
  currentY = -current.length;
  lockDelay = 0;
  if (collides(current, currentX, 0)) triggerGameOver();
  drawNext();
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y, dx: Math.cos(angle) * speed, dy: Math.sin(angle) * speed - 2,
      life: 30 + Math.random() * 20, color, size: 2 + Math.random() * 4
    });
  }
}

function triggerGameOver() {
  gameOver = true;
  gameOverTimer = 0;
  gameOverFlash = 15;
  shakeTimer = 30; shakeIntensity = 10;
  gameOverBlocks = [];
  // Turn all board blocks into falling physics blocks
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) {
        gameOverBlocks.push({
          x: c * CELL, y: r * CELL,
          dx: (Math.random() - 0.5) * 4,
          dy: -(Math.random() * 5 + 2),
          rot: 0, dRot: (Math.random() - 0.5) * 0.2,
          size: CELL - 2,
          color: COLORS[board[r][c]],
          delay: r * 2 + Math.random() * 4 // top rows fall first
        });
      }
    }
  }
}

function getDropSpeed() {
  return Math.max(50, 500 - (level - 1) * 45);
}

function ghostY() {
  let gy = currentY;
  while (!collides(current, currentX, gy + 1)) gy++;
  return gy;
}

function updateHUD() {
  document.getElementById('score-val').textContent = score.toLocaleString();
  document.getElementById('level-val').textContent = level;
  document.getElementById('lines-val').textContent = lines;
}

function drawBlock(ctx, x, y, colorIdx, ghost) {
  const color = COLORS[colorIdx];
  const px = x * CELL, py = y * CELL;

  if (ghost) {
    ctx.strokeStyle = color;
    ctx.globalAlpha = 0.2;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(px + 2, py + 2, CELL - 4, CELL - 4);
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
    return;
  }

  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;

  // Main block
  const grad = ctx.createLinearGradient(px, py, px, py + CELL);
  grad.addColorStop(0, lightenColor(color, 30));
  grad.addColorStop(0.4, color);
  grad.addColorStop(1, darkenColor(color, 40));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(px + 1, py + 1, CELL - 2, CELL - 2, 3);
  ctx.fill();

  ctx.shadowBlur = 0;

  // Inner shine
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(px + 3, py + 2, CELL - 6, CELL / 3.5);

  // Inner shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(px + 2, py + CELL - 6, CELL - 4, 4);
}

function lightenColor(hex, pct) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (num >> 16) + pct);
  const g = Math.min(255, ((num >> 8) & 0xff) + pct);
  const b = Math.min(255, (num & 0xff) + pct);
  return `rgb(${r},${g},${b})`;
}

function darkenColor(hex, pct) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, (num >> 16) - pct);
  const g = Math.max(0, ((num >> 8) & 0xff) - pct);
  const b = Math.max(0, (num & 0xff) - pct);
  return `rgb(${r},${g},${b})`;
}

function drawBoard() {
  bCtx.save();

  // Shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity;
    const sy = (Math.random() - 0.5) * shakeIntensity;
    bCtx.translate(sx, sy);
  }

  // Background
  const bg = BACKGROUNDS[bgIndex];
  if (bg === 'rainbow') {
    const grad = bCtx.createLinearGradient(0, 0, boardCanvas.width, boardCanvas.height);
    grad.addColorStop(0, '#e74c3c');
    grad.addColorStop(0.17, '#e67e22');
    grad.addColorStop(0.33, '#f1c40f');
    grad.addColorStop(0.5, '#2ecc71');
    grad.addColorStop(0.67, '#3498db');
    grad.addColorStop(0.83, '#9b59b6');
    grad.addColorStop(1, '#e91e63');
    bCtx.fillStyle = grad;
  } else if (bg === 'stars') {
    const bgGrad = bCtx.createLinearGradient(0, 0, 0, boardCanvas.height);
    bgGrad.addColorStop(0, '#08081a');
    bgGrad.addColorStop(1, '#0e0e24');
    bCtx.fillStyle = bgGrad;
  } else {
    bCtx.fillStyle = bg;
  }
  bCtx.fillRect(-10, -10, boardCanvas.width + 20, boardCanvas.height + 20);

  // Grid dots
  bCtx.fillStyle = 'rgba(60,60,100,0.2)';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      bCtx.beginPath();
      bCtx.arc(c * CELL + CELL / 2, r * CELL + CELL / 2, 1, 0, Math.PI * 2);
      bCtx.fill();
    }
  }

  // Line flash
  if (flashTimer > 0) {
    bCtx.fillStyle = `rgba(255,255,255,${flashTimer / 30})`;
    bCtx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
  }

  // Hard drop trail
  for (let i = hardDropTrail.length - 1; i >= 0; i--) {
    const t = hardDropTrail[i];
    t.life--;
    bCtx.globalAlpha = t.life / 10;
    bCtx.fillStyle = GLOW_COLORS[t.colorIdx] || 'rgba(255,255,255,0.2)';
    bCtx.fillRect(t.x * CELL, t.y * CELL, CELL, CELL);
    if (t.life <= 0) hardDropTrail.splice(i, 1);
  }
  bCtx.globalAlpha = 1;

  // Locked blocks
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawBlock(bCtx, c, r, board[r][c]);
    }
  }

  if (!gameOver && current) {
    // Ghost
    const gy = ghostY();
    for (let r = 0; r < current.length; r++) {
      for (let c = 0; c < current[r].length; c++) {
        if (!current[r][c]) continue;
        if (gy + r >= 0) drawBlock(bCtx, currentX + c, gy + r, current[r][c], true);
      }
    }

    // Current piece
    for (let r = 0; r < current.length; r++) {
      for (let c = 0; c < current[r].length; c++) {
        if (!current[r][c]) continue;
        if (currentY + r >= 0) drawBlock(bCtx, currentX + c, currentY + r, current[r][c]);
      }
    }
  }

  // Particles
  for (const p of particles) {
    bCtx.globalAlpha = Math.max(0, p.life / 40);
    bCtx.shadowColor = p.color;
    bCtx.shadowBlur = 6;
    bCtx.fillStyle = p.color;
    bCtx.beginPath();
    bCtx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
    bCtx.fill();
  }
  bCtx.globalAlpha = 1;
  bCtx.shadowBlur = 0;

  // Game Over
  if (gameOver) {
    gameOverTimer++;

    // White flash at start
    if (gameOverFlash > 0) {
      bCtx.fillStyle = `rgba(255,255,255,${gameOverFlash / 15 * 0.6})`;
      bCtx.fillRect(-10, -10, boardCanvas.width + 20, boardCanvas.height + 20);
      gameOverFlash--;
    }

    // Falling blocks animation
    for (const fb of gameOverBlocks) {
      if (gameOverTimer < fb.delay) continue;
      fb.dy += 0.25; // gravity
      fb.x += fb.dx;
      fb.y += fb.dy;
      fb.rot += fb.dRot;
      fb.size *= 0.998;

      if (fb.y < boardCanvas.height + 50) {
        bCtx.save();
        bCtx.translate(fb.x + CELL / 2, fb.y + CELL / 2);
        bCtx.rotate(fb.rot);
        bCtx.globalAlpha = Math.max(0, 1 - (fb.y / (boardCanvas.height + 50)));
        bCtx.shadowColor = fb.color;
        bCtx.shadowBlur = 6;
        bCtx.fillStyle = fb.color;
        bCtx.fillRect(-fb.size / 2, -fb.size / 2, fb.size, fb.size);
        bCtx.shadowBlur = 0;
        bCtx.restore();
      }
    }
    bCtx.globalAlpha = 1;

    // Dark overlay fades in
    const overlayAlpha = Math.min(0.8, gameOverTimer / 80);
    bCtx.fillStyle = `rgba(5,5,15,${overlayAlpha})`;
    bCtx.fillRect(-10, -10, boardCanvas.width + 20, boardCanvas.height + 20);

    // Text appears after blocks start falling
    if (gameOverTimer > 30) {
      const textAlpha = Math.min(1, (gameOverTimer - 30) / 30);
      const cx = boardCanvas.width / 2;
      const cy = boardCanvas.height / 2;

      // Glitch offset
      const glitch = gameOverTimer < 60 ? (Math.random() - 0.5) * (60 - gameOverTimer) * 0.3 : 0;

      // GAME OVER title
      bCtx.globalAlpha = textAlpha;
      bCtx.fillStyle = '#e74c3c';
      bCtx.shadowColor = '#e74c3c';
      bCtx.shadowBlur = 30 + Math.sin(gameOverTimer * 0.05) * 10;
      bCtx.font = 'bold 36px Orbitron, sans-serif';
      bCtx.textAlign = 'center';
      bCtx.fillText('GAME OVER', cx + glitch, cy - 60);

      // Red line decoration
      bCtx.shadowBlur = 0;
      bCtx.fillStyle = '#e74c3c';
      bCtx.globalAlpha = textAlpha * 0.5;
      bCtx.fillRect(cx - 100, cy - 35, 200, 1);

      bCtx.globalAlpha = textAlpha;

      // Stats
      bCtx.fillStyle = '#fff';
      bCtx.shadowColor = '#fff';
      bCtx.shadowBlur = 8;
      bCtx.font = 'bold 28px Orbitron, sans-serif';
      bCtx.fillText(score.toLocaleString(), cx, cy + 5);
      bCtx.shadowBlur = 0;

      bCtx.fillStyle = '#557';
      bCtx.font = '10px Orbitron, sans-serif';
      bCtx.fillText('SCORE', cx, cy - 18);

      // Level and Lines side by side
      bCtx.fillStyle = '#88a';
      bCtx.font = '16px Orbitron, sans-serif';
      bCtx.fillText(`LVL ${level}`, cx - 50, cy + 40);
      bCtx.fillText(`${lines} Lines`, cx + 50, cy + 40);

      // Restart prompt (blinks)
      if (gameOverTimer > 90) {
        const blink = Math.sin(gameOverTimer * 0.08) > 0;
        if (blink) {
          bCtx.fillStyle = '#445';
          bCtx.font = '11px Orbitron, sans-serif';
          bCtx.fillText('Press Space to restart', cx, cy + 80);
        }
      }

      bCtx.textAlign = 'start';
      bCtx.globalAlpha = 1;
      bCtx.shadowBlur = 0;
    }
  }

  // Pause
  if (paused && !gameOver) {
    bCtx.fillStyle = 'rgba(5,5,15,0.7)';
    bCtx.fillRect(-10, -10, boardCanvas.width + 20, boardCanvas.height + 20);
    bCtx.fillStyle = '#aac';
    bCtx.shadowColor = '#aac';
    bCtx.shadowBlur = 15;
    bCtx.font = 'bold 28px Orbitron, sans-serif';
    bCtx.textAlign = 'center';
    bCtx.fillText('PAUSED', boardCanvas.width / 2, boardCanvas.height / 2);
    bCtx.shadowBlur = 0;
    bCtx.textAlign = 'start';
  }

  bCtx.restore();
}

function drawNext() {
  nCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!nextPiece) return;
  const offX = (4 - nextPiece[0].length) / 2;
  const offY = (4 - nextPiece.length) / 2;
  for (let r = 0; r < nextPiece.length; r++) {
    for (let c = 0; c < nextPiece[r].length; c++) {
      if (!nextPiece[r][c]) continue;
      const color = COLORS[nextPiece[r][c]];
      const px = (offX + c) * 30, py = (offY + r) * 30;

      nCtx.shadowColor = color;
      nCtx.shadowBlur = 8;
      const grad = nCtx.createLinearGradient(px, py, px, py + 28);
      grad.addColorStop(0, lightenColor(color, 30));
      grad.addColorStop(0.4, color);
      grad.addColorStop(1, darkenColor(color, 40));
      nCtx.fillStyle = grad;
      nCtx.beginPath();
      nCtx.roundRect(px + 1, py + 1, 26, 26, 3);
      nCtx.fill();
      nCtx.shadowBlur = 0;

      nCtx.fillStyle = 'rgba(255,255,255,0.2)';
      nCtx.fillRect(px + 3, py + 2, 22, 8);
    }
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'b' || e.key === 'B') {
    bgIndex = (bgIndex + 1) % BACKGROUNDS.length;
    return;
  }
  if (e.key === 'z' || e.key === 'Z') {
    undo();
    return;
  }
  if (e.key === 'Enter' && gameOver) { init(); return; }
  if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
    e.preventDefault();
    if (gameOver) { init(); return; }
    paused = !paused; return;
  }
  if (paused || gameOver) return;

  if (e.key === 'ArrowLeft') {
    if (!collides(current, currentX - 1, currentY)) currentX--;
  }
  if (e.key === 'ArrowRight') {
    if (!collides(current, currentX + 1, currentY)) currentX++;
  }
  if (e.key === 'ArrowDown') {
    if (!collides(current, currentX, currentY + 1)) {
      currentY++;
      score += 1;
      updateHUD();
    }
  }
  if (e.key === 'ArrowUp') {
    const rotated = rotate(current);
    const kicks = [0, -1, 1, -2, 2];
    for (const kick of kicks) {
      if (!collides(rotated, currentX + kick, currentY)) {
        current = rotated;
        currentX += kick;
        break;
      }
    }
  }
  if (e.key === 'Enter') {
    let dropped = 0;
    // Leave trail
    const startY = currentY;
    while (!collides(current, currentX, currentY + 1)) { currentY++; dropped++; }
    // Create trail effect
    for (let r = 0; r < current.length; r++) {
      for (let c = 0; c < current[r].length; c++) {
        if (!current[r][c]) continue;
        for (let ty = Math.max(0, startY + r); ty < currentY + r; ty++) {
          hardDropTrail.push({ x: currentX + c, y: ty, life: 8, colorIdx: current[r][c] });
        }
      }
    }
    score += dropped * 2;
    updateHUD();
    shakeTimer = 5; shakeIntensity = 4;
    lock();
  }
});

function init() {
  createBoard();
  score = 0; lines = 0; level = 1;
  gameOver = false; paused = false;
  particles = []; hardDropTrail = []; gameOverBlocks = []; undoStack = [];
  shakeTimer = 0; flashTimer = 0; gameOverTimer = 0; gameOverFlash = 0;
  nextPiece = randomPiece();
  spawn();
  updateHUD();
  dropTimer = 0;
}

function gameLoop(time) {
  const dt = time - lastTime;
  lastTime = time;

  drawStars();

  if (!paused && !gameOver) {
    dropTimer += dt;
    if (dropTimer >= getDropSpeed()) {
      dropTimer = 0;
      if (!collides(current, currentX, currentY + 1)) {
        currentY++;
      } else {
        lockDelay++;
        if (lockDelay >= 2) lock();
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.dx; p.y += p.dy; p.dy += 0.08;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  if (shakeTimer > 0) shakeTimer--;
  if (flashTimer > 0) flashTimer--;

  drawBoard();
  requestAnimationFrame(gameLoop);
}

init();
requestAnimationFrame(gameLoop);
</script>
