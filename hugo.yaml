baseURL: "/"
languageCode: "en-us"
title: "Petru Tudorica"
theme: hugo-profile

enableRobotsTXT: true

params:
  title: "Petru Tudorica"
  description: "JS/HTML browser games - play in your browser, no download required"
  favicon: "/favicon.svg"

  navbar:
    disableSearch: true

  theme:
    defaultTheme: "dark"
    navbar:
      brandName: "Browser Games"
      menus:
        disableAbout: true
        disableExperience: true
        disableEducation: true
        disableProjects: false
        disableAchievements: true
        disableContact: true

  # Hero section - games-focused intro
  hero:
    enable: true
    intro: "Welcome to"
    title: "My Browser Games"
    subtitle: "Play directly in your browser"
    content: "A collection of JS / HTML games I've imagined. No installation required — just click play!"
    image: "/images/petru-site.png"
    bottomImage:
      enable: false
    button:
      enable: true
      name: "Play Business Tycoon"
      url: "/games/bisnes-tycoon/"
      download: false
      newPage: false
    socialLinks:
      fontAwesomeIcons: []
      customIcons: []

  # Hide other sections - we only want games
  about:
    enable: false
  experience:
    enable: false
  education:
    enable: false
  achievements:
    enable: false
  contact:
    enable: false

  # Games section (using projects)
  projects:
    enable: true
    title: "Games"
    items:
      - title: "Business Tycoon"
        content: "Build your empire from a single office! Buy buildings, hire employees, complete contracts, prestige, and chase the high score."
        image: "/images/games/business-tycoon.svg"
        badges:
          - "HTML5"
          - "JavaScript"
          - "Idle"
        featured:
          name: Play Game
          link: /games/bisnes-tycoon/

      - title: "Strike Force Heroes"
        content: "A wave-based shooter with 4 classes — Commando, Medic, Tank, Assassin. Survive 25 waves of enemies!"
        image: "/images/games/strike-force-heroes.svg"
        badges:
          - "HTML5"
          - "Canvas"
          - "Shooter"
        featured:
          name: Play Game
          link: /games/strike-force-heroes/

      - title: "Boss Flip"
        content: "You are the boss! A canvas-based action game with multiple phases, abilities, and epic boss battles."
        image: "/images/games/boss-game.svg"
        badges:
          - "HTML5"
          - "Canvas"
          - "Action"
        featured:
          name: Play Game
          link: /games/boss-game/

      - title: "Chess"
        content: "A fully-featured chess game with move validation, castling, en passant, and check/checkmate detection."
        image: "/images/games/chess.svg"
        badges:
          - "HTML5"
          - "JavaScript"
          - "Canvas"
        featured:
          name: Play Game
          link: /games/chess/

      - title: "Space Shooter"
        content: "A classic arcade-style space shooter. Dodge asteroids and blast enemies in this fast-paced game."
        image: "/images/games/space-shooter.svg"
        badges:
          - "HTML5"
          - "Canvas"
        featured:
          name: Play Game
          link: /games/space-shooter/

      - title: "Snake"
        content: "The timeless Snake game. Eat dots, grow longer, and avoid hitting yourself!"
        image: "/images/games/snake.svg"
        badges:
          - "HTML5"
          - "JavaScript"
        featured:
          name: Play Game
          link: /games/snake/

      - title: "Puzzle Blocks"
        content: "Match the blocks and clear the board in this addictive puzzle game."
        image: "/images/games/puzzle-blocks.svg"
        badges:
          - "HTML5"
        featured:
          name: Play Game
          link: /games/puzzle-blocks/

      - title: "Battle Simulator"
        content: "Place your army and watch them clash! A tactical battle simulator with unit types, abilities, and team budgets."
        image: "/images/games/battle-simulator.svg"
        badges:
          - "HTML5"
