baseURL: "/"
languageCode: "en-us"
title: "Petru Tudorica"
theme: hugo-profile

enableRobotsTXT: true

params:
  title: "Petru Tudorica"
  description: "JS/HTML browser games - play in your browser, no download required"
  favicon: "/favicon.svg"

  navbar:
    disableSearch: true

  theme:
    defaultTheme: "dark"
    navbar:
      brandName: "Browser Games"
      menus:
        disableAbout: true
        disableExperience: true
        disableEducation: true
        disableProjects: false
        disableAchievements: true
        disableContact: true

  # Hero section - games-focused intro
  hero:
    enable: true
    intro: "Welcome to"
    title: "My Browser Games"
    subtitle: "Play directly in your browser"
    content: "A collection of JS / HTML games and tools I've built. No installation required — just click play! Try Petru AI, my own intelligent assistant."
    image: "/images/petru-site.png"
    bottomImage:
      enable: false
    button:
      enable: true
      name: "Open Petru AI"
      url: "/games/petru-ai/"
      download: false
      newPage: false
    socialLinks:
      fontAwesomeIcons: []
      customIcons: []

  # Hide other sections - we only want games
  about:
    enable: false
  experience:
    enable: false
  education:
    enable: false
  achievements:
    enable: false
  contact:
    enable: false

  # Games section (using projects)
  projects:
    enable: true
    title: "Games"
    items:
      - title: "Petru AI"
        content: "Your own AI assistant — 13 Opus models, voice chat, image generation, 12 languages, Extended Thinking & DeepSeek modes. Ask about coding, math, science, history, or just chat. Built entirely from scratch."
        image: "/images/games/petru-ai.svg"
        badges:
          - "AI Assistant"
          - "Voice Chat"
          - "13 Models"
          - "12 Languages"
          - "Image Gen"
        featured:
          name: Open Petru AI
          link: /games/petru-ai/

