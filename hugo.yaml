baseURL: "/"
languageCode: "en-us"
title: "Petru Tudorica"
theme: hugo-profile

enableRobotsTXT: true

params:
  title: "Petru Tudorica"
  description: "JS/HTML browser games - play in your browser, no download required"
  favicon: "/favicon.svg"

  navbar:
    disableSearch: true

  theme:
    defaultTheme: "dark"
    navbar:
      brandName: "Browser Games"
      menus:
        disableAbout: true
        disableExperience: true
        disableEducation: true
        disableProjects: false
        disableAchievements: true
        disableContact: true

  # Hero section - games-focused intro
  hero:
    enable: true
    intro: "Welcome to"
    title: "My Browser Games"
    subtitle: "Play directly in your browser"
    content: "A collection of JS / HTML games I've imagined. No installation required — just click play!"
    image: "/images/petru-site.png"
    bottomImage:
      enable: false
    button:
      enable: false
    socialLinks:
      fontAwesomeIcons: []
      customIcons: []

  # Hide other sections - we only want games
  about:
    enable: false
  experience:
    enable: false
  education:
    enable: false
  achievements:
    enable: false
  contact:
    enable: false

  # Games section (using projects)
  projects:
    enable: true
    title: "Games"
    items:
      - title: "Boss Flip"
        content: "You are the boss! A canvas-based action game with multiple phases, abilities, and epic boss battles."
        image: "/images/games/boss-game.svg"
        badges:
          - "HTML5"
          - "Canvas"
          - "Action"
        featured:
          name: Play Game
          link: /games/boss-game/

      - title: "Chess"
        content: "A fully-featured chess game with move validation, castling, en passant, and check/checkmate detection."
        image: "/images/games/chess.svg"
        badges:
          - "HTML5"
          - "JavaScript"
          - "Canvas"
        featured:
          name: Play Game
          link: /games/chess/

      - title: "Space Shooter"
        content: "A classic arcade-style space shooter. Dodge asteroids and blast enemies in this fast-paced game."
        image: "/images/games/space-shooter.svg"
        badges:
          - "HTML5"
          - "Canvas"
        featured:
          name: Play Game
          link: /games/space-shooter/

      - title: "Snake"
        content: "The timeless Snake game. Eat dots, grow longer, and avoid hitting yourself!"
        image: "/images/games/snake.svg"
        badges:
          - "HTML5"
          - "JavaScript"
        featured:
          name: Play Game
          link: /games/snake/

      - title: "Puzzle Blocks"
        content: "Match the blocks and clear the board in this addictive puzzle game."
        image: "/images/games/puzzle-blocks.svg"
        badges:
          - "HTML5"
        featured:
          name: Play Game
          link: /games/puzzle-blocks/

      - title: "Battle Simulator"
        content: "Place your army and watch them clash! A tactical battle simulator with unit types, abilities, and team budgets."
        image: "/images/games/battle-simulator.svg"
        badges:
          - "HTML5"
          - "Canvas"
          - "Strategy"
        featured:
          name: Play Game
          link: /games/battle-simulator/

      - title: "Backgammon"
        content: "The classic board game with AI opponents. Roll dice, move checkers, and bear off before your opponent!"
        image: "/images/games/backgammon.svg"
        badges:
          - "HTML5"
          - "Canvas"
          - "Board Game"
        featured:
          name: Play Game
          link: /games/backgammon/

      - title: "Bubble Pop!"
        content: "Pop colorful bubbles in this arcade puzzle shooter! 30 levels of increasing difficulty with combos and effects."
        image: "/images/games/bubble-pop.svg"
        badges:
          - "HTML5"
          - "Canvas"
          - "Puzzle"
        featured:
          name: Play Game
          link: /games/bubble-pop/

      - title: "Tetris"
        content: "The classic block-stacking puzzle. Rotate and drop tetrominoes, clear lines, and chase high scores with undo support!"
        image: "/images/games/tetris.svg"
        badges:
          - "HTML5"
          - "Canvas"
          - "Puzzle"
        featured:
          name: Play Game
          link: /games/tetris/

      - title: "Block Blast"
        content: "Drag and drop blocks to fill rows and columns on an 8x8 grid. Features combos, rewind, screwdriver tool, and 10 themes!"
        image: "/images/games/block-blast.svg"
        badges:
          - "HTML5"
          - "JavaScript"
          - "Puzzle"
        featured:
          name: Play Game
          link: /games/block-blast/

      - title: "Geometry Dash"
        content: "Jump, flip gravity, and dodge obstacles through 11 neon-themed levels with portals, orbs, and increasing difficulty!"
        image: "/images/games/geometry-dash.svg"
        badges:
          - "HTML5"
          - "Canvas"
          - "Platformer"
        featured:
          name: Play Game
          link: /games/geometry-dash/

      - title: "Kingdom Rush"
        content: "Build archer, mage, barracks, and cannon towers to defend the realm across 15 levels with 12 enemy types and boss fights!"
        image: "/images/games/kingdom-rush.svg"
        badges:
          - "HTML5"
          - "Canvas"
          - "Tower Defense"
        featured:
          name: Play Game
          link: /games/kingdom-rush/

      - title: "Tic-Tac-Toe"
        content: "The classic X and O game. Play against a friend or challenge the computer in this simple but timeless strategy game."
        image: "/images/games/tic-tac-toe.svg"
        badges:
          - "HTML5"
          - "JavaScript"
        featured:
          name: Play Game
          link: /games/tic-tac-toe/
