{kw:['api:6','what is api:10','explain api:10','rest:4','http method:6','endpoint:5'],short:"API = way for programs to talk to each other. GET/POST/PUT/DELETE.",long:"**API** — programs talking to each other.\n\n```\nGET    /api/users     → list users\nPOST   /api/users     → create user\nPUT    /api/users/1   → update user\nDELETE /api/users/1   → delete user\n```\n\nStatus: 200 OK, 201 Created, 404 Not Found, 500 Error",full:"**API (Application Programming Interface)**\n\n| Method | Purpose |\n|--------|--------|\n| GET | Read data |\n| POST | Create |\n| PUT | Full update |\n| PATCH | Partial update |\n| DELETE | Remove |\n\n```\nGET    /api/users       → list all\nGET    /api/users/42    → get one\nPOST   /api/users       → create\nPUT    /api/users/42    → update\nDELETE /api/users/42    → delete\n```\n\n**Status codes:** 200 OK, 201 Created, 400 Bad Request, 401 Unauthorized, 404 Not Found, 500 Server Error\n\n```javascript\n// Fetch example\nconst users = await fetch('/api/users').then(r=>r.json());\n\nconst newUser = await fetch('/api/users', {\n  method:'POST',\n  headers:{'Content-Type':'application/json'},\n  body: JSON.stringify({name:'Petru'})\n}).then(r=>r.json());\n```"},

{kw:['git:6','version control:8','commit:4','branch:4','merge:4','git basics:10'],short:"`git add .` → `git commit -m 'msg'` → `git push`",long:"```bash\ngit init; git add .; git commit -m 'Initial'\ngit branch feature; git checkout feature\ngit push -u origin main\ngit log --oneline\n```",full:"```bash\ngit init                    # new repo\ngit clone <url>             # clone\ngit status                  # see changes\ngit add file.py             # stage\ngit commit -m 'Add feature' # commit\ngit push                    # push\ngit pull                    # pull\n\ngit branch feature          # create branch\ngit checkout -b feature     # create + switch\ngit merge feature           # merge\ngit branch -d feature       # delete branch\n\ngit stash                   # save WIP\ngit stash pop               # restore WIP\ngit reset --soft HEAD~1     # undo last commit (keep changes)\ngit log --oneline --graph --all  # visual history\ngit diff                    # see changes\ngit blame file.py           # who changed what\n```\n\n**Workflow:** main → feature branch → commits → push → PR → merge"},

{kw:['data structure:8','linked list:8','tree:4','heap:5','stack:4','queue:4'],short:"Arrays, stacks, queues, hash maps, trees, graphs — each with different tradeoffs.",long:"| Structure | Access | Insert | Use Case |\n|-----------|--------|--------|----------|\n| Array | O(1) | O(n) | Random access |\n| Stack | O(n) | O(1) | Undo, recursion |\n| Queue | O(n) | O(1) | BFS, scheduling |\n| HashMap | O(1) | O(1) | Key-value |\n| BST | O(log n) | O(log n) | Sorted data |",full:"| Structure | Access | Search | Insert | Delete |\n|-----------|--------|--------|--------|--------|\n| Array | O(1) | O(n) | O(n) | O(n) |\n| Linked List | O(n) | O(n) | O(1) | O(1) |\n| Stack | O(n) | O(n) | O(1) | O(1) |\n| Queue | O(n) | O(n) | O(1) | O(1) |\n| HashMap | — | O(1) | O(1) | O(1) |\n| BST | O(log n) | O(log n) | O(log n) | O(log n) |\n| Heap | O(1) top | O(n) | O(log n) | O(log n) |\n\n```python\n# Linked List\nclass Node:\n    def __init__(self,data): self.data=data; self.next=None\n\nclass LinkedList:\n    def __init__(self): self.head=None\n    def append(self,data):\n        node=Node(data)\n        if not self.head: self.head=node; return\n        cur=self.head\n        while cur.next: cur=cur.next\n        cur.next=node\n    def display(self):\n        cur=self.head\n        while cur: print(cur.data,end=' -> '); cur=cur.next\n        print('None')\n\nll=LinkedList(); ll.append(1); ll.append(2); ll.append(3)\nll.display()  # 1 -> 2 -> 3 -> None\n```"},

{kw:['big o:8','time complexity:10','space complexity:8','complexity:6','o notation:8'],short:"O(1) < O(log n) < O(n) < O(n log n) < O(n²) < O(2ⁿ)",long:"| Big O | Name | Example |\n|-------|------|--------|\n| O(1) | Constant | Array access |\n| O(log n) | Log | Binary search |\n| O(n) | Linear | Loop |\n| O(n log n) | Linearithmic | Merge sort |\n| O(n²) | Quadratic | Nested loops |\n| O(2ⁿ) | Exponential | Naive recursion |",full:"| Big O | Name | Example |\n|-------|------|--------|\n| O(1) | Constant | Array[i], hash lookup |\n| O(log n) | Logarithmic | Binary search |\n| O(n) | Linear | Single loop |\n| O(n log n) | Linearithmic | Merge sort |\n| O(n²) | Quadratic | Nested loops |\n| O(2ⁿ) | Exponential | Recursive fib |\n| O(n!) | Factorial | Permutations |\n\n```python\n# O(1)\ndef first(arr): return arr[0]\n\n# O(n)\ndef find_max(arr):\n    m=arr[0]\n    for x in arr:\n        if x>m: m=x\n    return m\n\n# O(n²) → optimize to O(n)!\ndef has_dup_slow(arr):  # O(n²)\n    for i in range(len(arr)):\n        for j in range(i+1,len(arr)):\n            if arr[i]==arr[j]: return True\n    return False\n\ndef has_dup_fast(arr):  # O(n) with set!\n    seen=set()\n    for x in arr:\n        if x in seen: return True\n        seen.add(x)\n    return False\n```"},

{kw:['quadratic:8','quadratic formula:10','solve equation:8'],short:"x = (-b ± √(b²-4ac)) / 2a",long:"**Quadratic:** x = (-b ± √(b²-4ac)) / 2a\n\n```python\nimport math\ndef solve(a,b,c):\n    d=b**2-4*a*c\n    if d>0: return (-b+math.sqrt(d))/(2*a), (-b-math.sqrt(d))/(2*a)\n    elif d==0: return -b/(2*a)\n    else: return f'{-b/(2*a)} ± {math.sqrt(abs(d))/(2*a)}i'\n\nprint(solve(1,-5,6))  # (3.0, 2.0)\n```",full:"**Quadratic Formula:** x = (-b ± √(b²-4ac)) / 2a\n\n```python\nimport math\n\ndef solve_quadratic(a, b, c):\n    d = b**2 - 4*a*c\n    print(f'{a}x² + {b}x + {c} = 0')\n    print(f'Discriminant: {d}')\n    if d > 0:\n        x1 = (-b + math.sqrt(d)) / (2*a)\n        x2 = (-b - math.sqrt(d)) / (2*a)\n        print(f'Two roots: x₁={x1:.4f}, x₂={x2:.4f}')\n    elif d == 0:\n        print(f'One root: x={-b/(2*a):.4f}')\n    else:\n        r, i = -b/(2*a), math.sqrt(abs(d))/(2*a)\n        print(f'Complex: {r:.4f} ± {i:.4f}i')\n\nsolve_quadratic(1, -5, 6)   # x=3, x=2\nsolve_quadratic(1, 2, 5)    # complex\n```"},

{kw:['derivative:6','calculus:6','integral:6','limit:4'],short:"d/dx(xⁿ) = nxⁿ⁻¹. ∫xⁿdx = xⁿ⁺¹/(n+1) + C",long:"**Derivatives:** f(x)=x² → f'(x)=2x\n**Integrals:** ∫x²dx = x³/3 + C\n\n**Rules:** Power: nxⁿ⁻¹, Product: f'g+fg', Chain: f'(g(x))·g'(x)",full:"**Derivatives:**\n```\nf(x)=xⁿ → f'(x)=nxⁿ⁻¹\nf(x)=sin(x) → f'(x)=cos(x)\nf(x)=eˣ → f'(x)=eˣ\nf(x)=ln(x) → f'(x)=1/x\n```\nRules: Power, Product(f'g+fg'), Chain(f'(g)·g')\n\n**Integrals:**\n```\n∫xⁿdx = xⁿ⁺¹/(n+1)+C\n∫sin(x)dx = -cos(x)+C\n∫eˣdx = eˣ+C\n```\n\n```python\ndef derivative(f, x, h=1e-7):\n    return (f(x+h)-f(x-h))/(2*h)\n\ndef integral(f, a, b, n=1000):\n    h=(b-a)/n; s=f(a)+f(b)\n    for i in range(1,n): s+=(4 if i%2 else 2)*f(a+i*h)\n    return s*h/3\n\nimport math\nprint(derivative(math.sin, 0))     # ≈1.0\nprint(integral(lambda x:x**2,0,1)) # ≈0.333\n```"},

// ── SCIENCE ──
{kw:['internet:4','how internet works:10','how does internet work:10','tcp:4','dns:4','network:4'],short:"DNS → TCP connect → HTTP request → server responds → browser renders.",long:"**Internet:** You type URL → DNS finds IP → TCP connects → HTTP requests page → server sends HTML → browser renders.\n\nProtocols: IP(addressing), TCP(delivery), HTTP(web), DNS(names).",full:"**How the Internet Works:**\n\n1. **Type URL** → browser asks DNS for IP\n2. **DNS** → example.com → 93.184.216.34\n3. **TCP handshake** → SYN, SYN-ACK, ACK\n4. **HTTP request** → GET /index.html\n5. **Server responds** → 200 OK + HTML/CSS/JS\n6. **Browser renders** → DOM → paint\n\n**Protocols:** IP(addressing), TCP(reliable delivery), UDP(fast/gaming), HTTP/HTTPS(web), DNS(name→IP), WebSocket(real-time)\n\n**Ports:** HTTP=80, HTTPS=443, SSH=22, DNS=53"},

{kw:['gravity:6','gravitational:6','newton:4'],short:"F = G × m₁m₂/r². On Earth: g = 9.8 m/s².",long:"**Gravity:** F = G × (m₁×m₂)/r²\n- G = 6.674×10⁻¹¹\n- Earth: 9.8 m/s²\n\nEinstein: Gravity = curvature of spacetime.",full:"**Newton:** F = G × (m₁×m₂)/r², G=6.674×10⁻¹¹\n\n**Einstein:** Gravity = spacetime curvature. Mass bends space.\n\n```python\ndef grav_force(m1,m2,r):\n    G=6.674e-11\n    return G*m1*m2/r**2\n\nearth=5.972e24; r=6.371e6\nprint(f'{grav_force(earth,70,r):.1f} N')  # ≈686 N (your weight!)\n```\n\nGPS corrects for time dilation (~38 μs/day)."},

{kw:['dna:6','genetics:6','biology:4','cell:4','evolution:5'],short:"DNA = blueprint of life. 4 bases: A,T,G,C. A-T, G-C pairs.",long:"**DNA:** double helix, 4 bases (A-T, G-C)\nDNA → RNA → Protein\nHumans: ~3 billion base pairs, ~20,000 genes",full:"**DNA** — blueprint of life:\n- Double helix, 4 bases: A-T, G-C pairing\n- Human genome: ~3 billion base pairs, ~20,000 genes\n- DNA → (transcription) → RNA → (translation) → Protein\n\n```python\ndef complement(dna):\n    pairs={'A':'T','T':'A','G':'C','C':'G'}\n    return ''.join(pairs[b] for b in dna)\n\ndef transcribe(dna): return dna.replace('T','U')\n\nprint(complement('ATCGGA'))  # TAGCCT\nprint(transcribe('ATCGGA'))  # AUCGGA\n```"},

{kw:['quantum:6','quantum mechanics:10','quantum computing:8','qubit:6','superposition:6'],short:"Quantum: particles in multiple states at once until observed.",long:"**Quantum Mechanics:**\n- **Superposition** — multiple states at once\n- **Entanglement** — linked particles\n- **Uncertainty** — can't know position AND momentum precisely\n\n**Quantum Computing:** qubit = 0 AND 1 simultaneously. n qubits = 2ⁿ states.",full:"**Quantum Mechanics:**\n- **Superposition** — particle in multiple states until observed\n- **Entanglement** — measuring one instantly affects the other\n- **Wave-particle duality** — light is wave AND particle\n- **Uncertainty** (Heisenberg) — position OR momentum, not both\n\n**Quantum Computing:**\n- Bit: 0 OR 1 → Qubit: 0 AND 1\n- n qubits = 2ⁿ states simultaneously\n- 300 qubits > atoms in universe\n- Applications: cryptography, drug discovery, optimization, AI\n\n**Double-slit experiment:** fire particles one at a time → interference pattern (wave). Observe which slit → pattern vanishes (particle). Observation changes reality!"},

{kw:['world war:8','ww1:8','ww2:8','world war 1:10','world war 2:10','first world war:10','second world war:10'],
 short:"WW1: 1914-1918. WW2: 1939-1945.",
 long:"**World War I (1914-1918):** Started by assassination of Archduke Franz Ferdinand. Trench warfare. 17 million dead. Led to Treaty of Versailles.\n\n**World War II (1939-1945):** Started by Nazi Germany invading Poland. Holocaust. Atomic bombs on Hiroshima & Nagasaki. 70-85 million dead. Led to the UN and Cold War.",
 full:"**World War I (1914-1918):**\n- **Trigger:** Assassination of Archduke Franz Ferdinand of Austria\n- **Sides:** Allies (France, UK, Russia, USA) vs Central Powers (Germany, Austria-Hungary, Ottoman Empire)\n- **Features:** Trench warfare, poison gas, first tanks & planes in war\n- **Deaths:** ~17 million\n- **Result:** Treaty of Versailles, fall of 4 empires, set stage for WWII\n\n**World War II (1939-1945):**\n- **Trigger:** Nazi Germany invades Poland\n- **Sides:** Allies (UK, USSR, USA, France) vs Axis (Germany, Japan, Italy)\n- **Key events:** Blitzkrieg, Holocaust (6 million Jews), D-Day, Stalingrad, Pearl Harbor, atomic bombs\n- **Deaths:** 70-85 million (deadliest conflict in history)\n- **Result:** United Nations created, Cold War begins, decolonization wave\n\n**Key figures:** Hitler, Churchill, Roosevelt, Stalin, Eisenhower, Mussolini, Hirohito"},

{kw:['ancient egypt:10','pharaoh:6','pyramid:6','egypt:4','sphinx:5','cleopatra:6','tutankhamun:6'],
 short:"Ancient Egypt: pyramids, pharaohs, hieroglyphics. 3100 BC - 30 BC.",
 long:"**Ancient Egypt (3100 BC - 30 BC):**\n- Built the pyramids of Giza (~2560 BC)\n- Pharaohs were considered gods\n- Invented hieroglyphics writing\n- Mummification to preserve the dead\n- Famous pharaohs: Tutankhamun, Cleopatra, Ramesses II",
 full:"**Ancient Egypt (3100 BC - 30 BC):**\n\n**Achievements:**\n- **Great Pyramid of Giza** — 2.3 million blocks, 146m tall, built ~2560 BC\n- **Sphinx** — half-human, half-lion statue\n- **Hieroglyphics** — picture-based writing system (decoded via Rosetta Stone)\n- **Mummification** — preserved bodies for the afterlife\n- **Papyrus** — early form of paper\n- **Calendar** — 365-day solar calendar\n- **Medicine** — first known surgical procedures\n\n**Famous Pharaohs:**\n- **Khufu** — built the Great Pyramid\n- **Tutankhamun** — boy king, famous golden tomb\n- **Ramesses II** — greatest builder, ruled 66 years\n- **Cleopatra VII** — last pharaoh, allied with Rome\n- **Hatshepsut** — one of few female pharaohs\n\n**Society:** Pharaoh → Priests → Nobles → Scribes → Craftsmen → Farmers → Slaves\n\n**Religion:** Ra (sun god), Osiris (afterlife), Isis (magic), Anubis (death), Horus (sky)"},

{kw:['roman empire:10','rome:6','ancient rome:10','julius caesar:8','gladiator:6','colosseum:6'],
 short:"Roman Empire: 27 BC - 476 AD. Latin, roads, aqueducts, gladiators.",
 long:"**Roman Empire (27 BC - 476 AD):**\n- Largest empire in Europe's history\n- Built roads, aqueducts, the Colosseum\n- Latin language → French, Spanish, Italian, Portuguese, Romanian\n- Julius Caesar, Augustus, Nero, Marcus Aurelius\n- Gladiator fights, chariot races\n- Fell in 476 AD (Western Roman Empire)",
 full:"**Roman Empire (27 BC - 476 AD):**\n\n**Key facts:**\n- Population: ~70 million at peak\n- Covered most of Europe, North Africa, Middle East\n- Official language: Latin (ancestor of Romance languages)\n- Engineering: roads, aqueducts, concrete, arches, the Colosseum\n\n**Famous Romans:**\n- **Julius Caesar** — conquerer, dictator, assassinated 44 BC (\"Et tu, Brute?\")\n- **Augustus** — first emperor, Pax Romana (200 years of peace)\n- **Nero** — infamous, Rome burned during his reign\n- **Marcus Aurelius** — philosopher-emperor, wrote *Meditations*\n- **Constantine** — legalized Christianity\n\n**Daily life:** Gladiator fights, public baths, forums, chariot races, toga fashion\n\n**Why it fell:** Military overextension, economic troubles, corruption, barbarian invasions, split into East/West\n\n**Legacy:** Law systems, architecture, Latin/Romance languages, Christianity spread, calendar (July=Julius, August=Augustus)"},

{kw:['dinosaur:8','dinosaurs:8','t-rex:8','jurassic:6','prehistoric:6','extinction:4'],
 short:"Dinosaurs ruled Earth for 165 million years. Went extinct 66 million years ago.",
 long:"**Dinosaurs (230 - 66 million years ago):**\n- Ruled Earth for 165 million years\n- T-Rex, Triceratops, Velociraptor, Brachiosaurus\n- Went extinct from asteroid impact (Chicxulub, Mexico)\n- Birds are living descendants of dinosaurs!",
 full:"**Dinosaurs (230 - 66 million years ago):**\n\n**Eras:**\n- **Triassic** (230-200 mya) — first dinosaurs, small\n- **Jurassic** (200-145 mya) — giants appear, Brachiosaurus, Stegosaurus\n- **Cretaceous** (145-66 mya) — T-Rex, Triceratops, largest diversity\n\n**Famous dinosaurs:**\n- **T-Rex** — 12m long, 6-ton predator, tiny arms, bone-crushing bite\n- **Triceratops** — 3 horns, frill, herbivore\n- **Velociraptor** — actually turkey-sized with feathers (not like Jurassic Park)\n- **Brachiosaurus** — 26m tall, long-necked herbivore\n- **Spinosaurus** — larger than T-Rex, semi-aquatic\n- **Pteranodon** — flying reptile (not technically a dinosaur)\n\n**Extinction (66 mya):**\n- 10km asteroid hit Chicxulub, Mexico\n- Global fires, \"nuclear winter\" blocked sunlight\n- 75% of all species died\n- Mammals survived and eventually evolved into us!\n\n**Fun fact:** Birds ARE dinosaurs — they're the only surviving lineage of theropod dinosaurs."},

{kw:['medieval:6','middle ages:8','knight:6','castle:5','feudal:6','king:3','kingdom:3','crusade:6'],
 short:"Middle Ages: 500-1500 AD. Knights, castles, feudalism, crusades.",
 long:"**Middle Ages (500-1500 AD):**\n- Feudal system: King → Lords → Knights → Peasants\n- Castles, cathedrals, knights in armor\n- The Crusades (1095-1291) — wars for the Holy Land\n- Black Death (1347-1351) killed 1/3 of Europe\n- End: Renaissance began in Italy ~1400",
 full:"**Middle Ages (500-1500 AD):**\n\n**Feudal System:**\nKing → Nobles/Lords → Knights → Peasants/Serfs\n\n**Key events:**\n- **Fall of Rome** (476) — start of the \"Dark Ages\"\n- **Charlemagne** (800) — crowned Holy Roman Emperor\n- **Viking Age** (793-1066) — Norse raiders & explorers\n- **Crusades** (1095-1291) — 9 wars for Jerusalem\n- **Magna Carta** (1215) — limited king's power, foundation of democracy\n- **Black Death** (1347-1351) — bubonic plague killed 25-50 million (1/3 of Europe)\n- **Hundred Years' War** (1337-1453) — England vs France, Joan of Arc\n\n**Daily life:** Castles, cathedrals, farming, guilds, tournaments, no running water\n\n**Legacy:** Universities founded, Gothic architecture, common law, banking systems"},

{kw:['renaissance:8','leonardo:6','da vinci:8','michelangelo:6','mona lisa:6'],
 short:"Renaissance: 1400-1600. Rebirth of art, science, and learning in Europe.",
 long:"**Renaissance (1400-1600):**\n- \"Rebirth\" of art, science, and classical learning\n- Started in Florence, Italy\n- Leonardo da Vinci, Michelangelo, Raphael, Galileo\n- Mona Lisa, Sistine Chapel, printing press (Gutenberg, 1440)",
 full:"**Renaissance (1400-1600) — \"Rebirth\":**\n\n**Started in Florence, Italy** — spread across Europe\n\n**Key figures:**\n- **Leonardo da Vinci** — Mona Lisa, Last Supper, inventor, anatomist, engineer (\"Renaissance Man\")\n- **Michelangelo** — Sistine Chapel ceiling, David sculpture\n- **Galileo** — telescope, \"Earth orbits the Sun\" (controversial!)\n- **Gutenberg** — printing press (1440) — revolutionized knowledge\n- **Shakespeare** — greatest English writer\n- **Copernicus** — heliocentric model of solar system\n- **Machiavelli** — *The Prince* (political philosophy)\n\n**What changed:**\n- Art: perspective, realism, human anatomy\n- Science: observation & experiment over religion\n- Education: return to Greek & Roman classics\n- Technology: printing press, better ships, gunpowder\n- Thinking: humanism — focus on human potential\n\n**Why it happened:** Fall of Constantinople (1453) → Greek scholars fled to Italy with ancient texts, wealth of Italian city-states, Black Death reduced population → higher wages → more leisure"},

{kw:['country:4','countries:4','biggest country:8','smallest country:8','largest country:8','world:3'],

{kw:['capital:5','capital city:8','capitals:6','what is the capital:10'],

 long:"**The Oceans:**\n- **Pacific** — largest (165M km²), deepest (Mariana Trench 10,994m)\n- **Atlantic** — 2nd largest, most traveled\n- **Indian** — warmest ocean\n- **Southern** — surrounds Antarctica\n- **Arctic** — smallest, mostly frozen",
 full:"**The 5 Oceans:**\n\n| Ocean | Area | Deepest Point |\n|-------|------|---------------|\n| Pacific | 165M km² | Mariana Trench (10,994m) |\n| Atlantic | 106M km² | Puerto Rico Trench (8,376m) |\n| Indian | 70M km² | Java Trench (7,725m) |\n| Southern | 22M km² | South Sandwich Trench (7,235m) |\n| Arctic | 14M km² | Molloy Deep (5,669m) |\n\n**Ocean facts:**\n- Oceans cover **71%** of Earth's surface\n- Contain **97%** of all water on Earth\n- Average depth: **3,688 meters**\n- We've explored less than **5%** of the ocean floor\n- The deep sea is home to bioluminescent creatures, giant squid, and hydrothermal vents\n- The Great Barrier Reef (Australia) is visible from space\n- Oceans produce **50-80%** of Earth's oxygen (via phytoplankton)"},

{kw:['planet:6','planets:6','solar system:10','mercury:4','venus:4','mars:5','jupiter:5','saturn:5','neptune:4','uranus:4'],
 short:"8 planets: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune.",
 long:"**Solar System:**\n- **Mercury** — closest to Sun, no atmosphere\n- **Venus** — hottest planet (462°C), spins backwards\n- **Earth** — the only known life\n- **Mars** — the red planet, has the tallest volcano (Olympus Mons)\n- **Jupiter** — largest, Great Red Spot storm\n- **Saturn** — famous rings\n- **Uranus** — tilted on its side\n- **Neptune** — windiest planet, farthest",
 full:"**The Solar System:**\n\n| Planet | Distance from Sun | Size (Earth=1) | Fun Fact |\n|--------|-------------------|----------------|----------|\n| Mercury | 58M km | 0.38 | No atmosphere, extreme temps |\n| Venus | 108M km | 0.95 | Hottest (462°C), spins backwards |\n| Earth | 150M km | 1.0 | Only known life |\n| Mars | 228M km | 0.53 | Red planet, tallest volcano |\n| Jupiter | 778M km | 11.2 | Largest, 95 moons |\n| Saturn | 1.4B km | 9.4 | Famous rings (ice & rock) |\n| Uranus | 2.9B km | 4.0 | Tilted 98° on its side |\n| Neptune | 4.5B km | 3.9 | Windiest (2,100 km/h) |\n\n**Other objects:**\n- **Sun** — 99.86% of solar system's mass, surface 5,500°C\n- **Moon** — Earth's only natural satellite, causes tides\n- **Pluto** — dwarf planet since 2006\n- **Asteroid Belt** — between Mars and Jupiter\n- **Kuiper Belt** — beyond Neptune (Pluto lives here)"},

{kw:['black hole:10','black holes:8','event horizon:6','singularity:5'],
 short:"Black hole = gravity so strong even light can't escape.",
 long:"**Black Holes:**\n- Form when massive stars collapse\n- Gravity so strong even light can't escape\n- **Event horizon** — point of no return\n- **Singularity** — infinite density at the center\n- Supermassive black holes exist at galaxy centers (Sagittarius A* in Milky Way = 4 million solar masses)",
 full:"**Black Holes:**\n\n**What:** Region of spacetime where gravity is so extreme that nothing — not even light — can escape.\n\n**Types:**\n- **Stellar** — 3-100 solar masses (from collapsed stars)\n- **Supermassive** — millions to billions of solar masses (galaxy centers)\n- **Intermediate** — in between (rare)\n- **Primordial** — theoretical, from early universe\n\n**Anatomy:**\n- **Singularity** — center, infinite density\n- **Event horizon** — boundary, point of no return\n- **Accretion disk** — orbiting matter, super hot, emits X-rays\n- **Jets** — matter blasted out at near light speed\n\n**Mind-bending facts:**\n- Time slows down near a black hole (gravitational time dilation)\n- Spaghettification — you'd be stretched into a string falling in\n- First photo of a black hole: 2019 (M87, 55 million light-years away)\n- Milky Way's black hole: **Sagittarius A*** (4 million solar masses)\n- Hawking Radiation — black holes slowly evaporate (theoretical)"},

{kw:['star:4','stars:4','sun:4','supernova:6','nebula:5','constellation:5'],
 short:"Stars are giant balls of hydrogen fusing into helium. Our Sun is a medium star.",
 long:"**Stars:**\n- Giant balls of hot gas (hydrogen → helium via nuclear fusion)\n- Our **Sun** is a medium yellow dwarf star\n- Biggest known star: **UY Scuti** (~1,700x Sun's radius)\n- When big stars die: **supernova** → neutron star or black hole\n- **Nebula** — cloud of gas where new stars are born",
 full:"**Stars — Life Cycle:**\n\n```\nNebula → Protostar → Main Sequence → Red Giant → ...\n  Small star: → White Dwarf → Black Dwarf\n  Large star: → Supernova → Neutron Star or Black Hole\n```\n\n**Types (by color/temperature):**\n- **Blue** — hottest (>30,000K) — O-type\n- **White** — hot (7,500-10,000K) — A-type\n- **Yellow** — medium (5,200-6,000K) — G-type (our Sun!)\n- **Orange** — cool (3,700-5,200K) — K-type\n- **Red** — coolest (2,400-3,700K) — M-type (most common)\n\n**Fun facts:**\n- Sun's age: 4.6 billion years (halfway through its life)\n- Nearest star: **Proxima Centauri** (4.24 light-years)\n- There are ~200-400 billion stars in the Milky Way\n- A supernova can outshine an entire galaxy for weeks\n- Neutron stars are so dense: 1 teaspoon = 6 billion kg"},

{kw:['moon:5','lunar:5','moon landing:8','apollo:6','neil armstrong:6'],
 short:"First moon landing: Apollo 11, 1969. Neil Armstrong first to walk on Moon.",
 long:"**The Moon:**\n- Distance: 384,400 km from Earth\n- Causes tides on Earth\n- No atmosphere\n- **Apollo 11 (1969):** Neil Armstrong & Buzz Aldrin first to walk on Moon\n- \"That's one small step for man, one giant leap for mankind\"",
 full:"**The Moon:**\n\n**Facts:**\n- Distance: 384,400 km\n- Diameter: 3,474 km (27% of Earth's)\n- Gravity: 1/6 of Earth's\n- Temperature: -173°C to 127°C\n- Age: ~4.5 billion years\n- Always shows the same face to Earth (tidal locking)\n- Slowly moving away from Earth (~3.8 cm/year)\n\n**Moon landings:**\n- **Apollo 11** (1969) — Neil Armstrong & Buzz Aldrin (first humans on Moon)\n- Armstrong: *\"That's one small step for man, one giant leap for mankind\"*\n- 12 total humans have walked on the Moon (all American, all men)\n- Last visit: Apollo 17 (1972)\n- **Artemis program** — NASA plans to return humans to Moon\n\n**Moon's effects on Earth:**\n- Causes ocean tides\n- Stabilizes Earth's axial tilt\n- Slows Earth's rotation (days are getting longer)"},

{kw:['animal:5','animals:5','fastest animal:8','biggest animal:8','strongest animal:8','animal fact:8','creature:3'],

 full:"**Animal Records:**\n\n| Record | Animal | Detail |\n|--------|--------|--------|\n| Fastest (air) | Peregrine Falcon | 390 km/h dive |\n| Fastest (land) | Cheetah | 120 km/h |\n| Fastest (water) | Sailfish | 110 km/h |\n| Largest | Blue Whale | 30m, 180 tons |\n| Tallest | Giraffe | 5.5m |\n| Strongest (relative) | Dung Beetle | 1,141x body weight |\n| Longest lived | Greenland Shark | 400+ years |\n| Most venomous | Box Jellyfish | Can kill in minutes |\n| Smartest | Dolphin/Crow/Octopus | Tool use, problem solving |\n| Most legs | Millipede | Up to 750 legs |\n| Loudest | Sperm Whale | 230 decibels |\n\n**Incredible facts:**\n- Octopuses have 3 hearts, blue blood, and can change color instantly\n- Tardigrades (water bears) survive in space, boiling water, and radiation\n- Axolotls can regenerate limbs, heart, and brain tissue\n- Crows can recognize human faces and hold grudges\n- Mantis shrimp punch at 80 km/h — can break aquarium glass"},

{kw:['recipe:6','cook:5','cooking:5','food:4','how to make:6','bake:4','meal:3','dish:3','ingredient:4'],
 short:"I know recipes! Ask about a specific dish — from sarmale to sushi!",
 long:"**I can help with cooking!** Ask me about:\n- **Romanian:** Sarmale, mici, ciorbă, mămăligă, cozonac, papanași\n- **International:** Pasta, pizza, steak, pancakes, sushi, tacos\n- Healthy meals, quick dinners, baking tips\n- Cuisine types (Romanian, Italian, Mexican, Japanese, etc.)\n\nWhat would you like to cook?",
 full:"**Cooking Guide:**\n\n**Romanian classics:**\n- **Sarmale** — stuffed cabbage rolls, slow-cooked (3-4 hours)\n- **Mici** — grilled skinless sausages with mustard (10 min)\n- **Ciorbă de perișoare** — meatball sour soup (45 min)\n- **Mămăligă cu brânză** — polenta with cheese & sour cream (30 min)\n- **Papanași** — fried cheese doughnuts with jam (20 min)\n\n**Quick international meals:**\n- **Pasta aglio e olio** — garlic, olive oil, chili flakes, pasta (15 min)\n- **Stir fry** — any veggies + soy sauce + rice (20 min)\n- **Omelette** — eggs, cheese, veggies (10 min)\n- **Tacos** — ground meat, spices, toppings (20 min)\n\n**Essential techniques:**\n- **Sauté** — high heat, small amount of oil, toss frequently\n- **Roast** — oven, 200°C, for meats & veggies\n- **Boil → Simmer** — bring to boil then reduce heat\n- **Season** — salt during cooking, not just at the end\n\n**Kitchen tips:**\n- Sharp knives are safer than dull ones\n- Let meat rest after cooking (5-10 min)\n- Taste as you go\n- Salt pasta water until it \"tastes like the sea\"\n- Room temperature eggs bake better\n\nAsk me for a specific recipe! Try: *sarmale, mici, cozonac, ciorbă*"},

{kw:['pancake:8','pancakes:8','how to make pancakes:10'],
 short:"Mix flour, egg, milk, sugar, baking powder. Cook on medium heat.",
 long:"**Pancake Recipe:**\n- 1 cup flour, 1 egg, 1 cup milk, 2 tbsp sugar, 1 tsp baking powder, pinch of salt, butter for pan\n- Mix dry, mix wet, combine (don't overmix!)\n- Medium heat, pour batter, flip when bubbles form\n- Serve with maple syrup, berries, or Nutella!",
 full:"**Perfect Pancakes:**\n\n**Ingredients:**\n- 1½ cups (190g) all-purpose flour\n- 1 egg\n- 1¼ cups (300ml) milk\n- 2 tablespoons sugar\n- 1½ teaspoons baking powder\n- ½ teaspoon salt\n- 2 tablespoons melted butter + more for cooking\n- *Optional: vanilla extract, cinnamon*\n\n**Steps:**\n1. Mix flour, sugar, baking powder, and salt in a bowl\n2. In another bowl, whisk egg, milk, and melted butter\n3. Pour wet into dry — stir until JUST combined (lumps are OK!)\n4. Let batter rest 5 minutes\n5. Heat pan on medium, add butter\n6. Pour ¼ cup batter per pancake\n7. Cook until bubbles form on surface (~2 min)\n8. Flip — cook 1-2 more minutes until golden\n9. Serve with: maple syrup, berries, whipped cream, Nutella, banana, honey\n\n**Tips:** Don't overmix (makes tough pancakes). Don't press down after flipping. Keep warm in 90°C oven while making more.\n\nMakes ~8 pancakes. Prep: 5 min. Cook: 15 min."},

{kw:['pizza:6','how to make pizza:10','pizza dough:8'],
 short:"Pizza: dough (flour, yeast, water, salt, oil), sauce, mozzarella, toppings, bake at max heat.",
 long:"**Pizza Recipe:**\n1. **Dough:** 500g flour, 7g yeast, 325ml warm water, 1 tsp salt, 2 tbsp olive oil. Knead 10 min, rise 1 hour.\n2. **Sauce:** Crushed tomatoes, garlic, basil, salt, olive oil\n3. **Assembly:** Stretch dough, add sauce, mozzarella, toppings\n4. **Bake:** Highest oven temp (250°C+), 10-12 min",
 full:"**Homemade Pizza:**\n\n**Dough:**\n- 500g flour, 7g instant yeast, 325ml warm water\n- 1 tsp salt, 2 tbsp olive oil, 1 tsp sugar\n- Mix, knead 10 min until smooth, cover, rise 1 hour\n\n**Sauce:**\n- 400g crushed tomatoes, 2 cloves garlic (minced)\n- 1 tbsp olive oil, 1 tsp dried basil/oregano, salt to taste\n- Simmer 15 min (or use raw for Neapolitan style)\n\n**Assembly:**\n1. Preheat oven to MAX (250°C / 480°F) with baking sheet inside\n2. Stretch dough on floured surface (don't use rolling pin!)\n3. Add thin layer of sauce\n4. Top with fresh mozzarella\n5. Add toppings: pepperoni, mushrooms, olives, peppers, onions, basil\n6. Bake 10-12 min until crust is golden and cheese bubbles\n\n**Pro tips:**\n- Less is more with toppings (overloading = soggy)\n- Fresh mozzarella > shredded\n- A pizza stone gives the best crust\n- For crispy base: preheat pan/stone\n\nMakes 2 large pizzas."},

{kw:['sarmale:10','sarma:8','cabbage roll:10','cabbage rolls:10','stuffed cabbage:10','romanian food:8','romanian recipe:8','romanian dish:8'],
 short:"Sarmale — Romanian stuffed cabbage rolls with minced meat, rice & spices, slow-cooked in sauerkraut!",
 long:"**Sarmale (Romanian Cabbage Rolls):**\n\n**Filling:** minced pork (or pork+beef), rice, sautéed onion, salt, pepper, thyme, dill\n**Wrap:** fermented/sour cabbage leaves (varză murată)\n**Cook:** layer in a pot with sauerkraut, tomato sauce, smoked pork (ciolan), bay leaves. Slow-cook 3-4 hours.\n\n**Serve with:** smălțuială, polenta (mămăligă), sour cream (smântână), hot peppers.",
 full:"**Sarmale — Traditional Romanian Cabbage Rolls**\n\nThe most beloved Romanian dish, served at Christmas, Easter, weddings, and every family gathering!\n\n**Ingredients (40-50 sarmale):**\n- 1 kg minced pork (or 500g pork + 500g beef)\n- 200g rice (unwashed)\n- 2 large onions, finely diced\n- 2 heads of fermented cabbage (varză murată)\n- 300g sauerkraut (for layering)\n- 200ml tomato sauce or paste\n- 1 smoked pork knuckle (ciolan afumat) or smoked ribs\n- 3 bay leaves, 1 tsp thyme, 1 tsp black pepper\n- Fresh dill, salt to taste\n- 2 tbsp oil or lard (untură)\n\n**Steps:**\n1. **Onion:** Sauté diced onion in oil until golden\n2. **Filling:** Mix meat, rice, cooled onion, salt, pepper, thyme, dill\n3. **Cabbage:** Carefully separate leaves, remove thick veins, cut large leaves in half\n4. **Roll:** Place 1 tbsp filling on each leaf, tuck sides in, roll tight\n5. **Layer pot:** Shredded sauerkraut on bottom → sarmale packed tightly → more sauerkraut → smoked meat → tomato sauce → bay leaves\n6. **Cook:** Add water to cover. Bring to boil, then LOW heat for 3-4 hours (or oven at 160°C for 4-5 hours)\n7. **Rest:** Even better the next day!\n\n**Serving:** With mămăligă (polenta), smântână (sour cream), and hot peppers (ardei iute)\n\n**Tips:**\n- The best sarmale use fermented cabbage (not fresh!)\n- Small, tight rolls cook better\n- Smoked meat gives the authentic flavor\n- Cook them the day before — they taste better reheated\n- Grandma's secret: a little bors (fermented wheat bran) in the pot"},

{kw:['mici:10','mititei:10','romanian grill:8','romanian bbq:8','romanian sausage:8'],
 short:"Mici (mititei) — Romanian grilled skinless sausages made with beef, garlic & spices!",
 long:"**Mici (Mititei) — Romanian Grilled Sausages:**\n\n**Ingredients:** ground beef (or beef+pork), garlic, baking soda, black pepper, thyme, cumin, paprika, beef broth\n**Shape:** small cylinders (~8cm long)\n**Grill:** on charcoal BBQ until charred outside, juicy inside\n\n**Serve with:** mustard (muștar), bread, cold beer! A Romanian summer essential.",
 full:"**Mici (Mititei) — Romania's Favorite BBQ**\n\nNo Romanian summer is complete without mici on the grill!\n\n**Ingredients (30 mici):**\n- 1 kg ground beef (fatty cut)\n- 500g ground pork\n- 6-8 cloves garlic, crushed\n- 1 tsp baking soda\n- 1 tsp black pepper\n- 1 tsp thyme\n- 1 tsp cumin (chimion)\n- 1 tsp paprika\n- 100ml beef broth or mineral water\n- Salt to taste\n\n**Steps:**\n1. Mix all meats and spices thoroughly\n2. Add baking soda dissolved in broth — this makes them fluffy!\n3. Rest in fridge for at least 4 hours (overnight is best)\n4. Shape into cylinders ~8cm long, 2cm thick\n5. Grill on charcoal BBQ on high heat, turning frequently\n6. Done when charred outside, juicy inside (~10-12 min)\n\n**Serve with:** muștar (mustard), fresh bread, cold beer, and French fries or salată de murături (pickles)\n\n**Tips:**\n- The baking soda is the secret — it makes them puff up on the grill\n- Must rest overnight for the best flavor\n- Charcoal grill is essential — not the same on a pan\n- Romanians typically eat 5-10 per person!"},

{kw:['mamaliga:10','mămăligă:10','polenta:6','romanian polenta:10','mamaliguta:8'],
 short:"Mămăligă — Romanian polenta made from cornmeal, the traditional side dish for sarmale!",
 long:"**Mămăligă (Romanian Polenta):**\n\n**Ingredients:** cornmeal (mălai), water, salt, butter\n**Cook:** Boil water with salt, add cornmeal slowly while stirring constantly, cook 20-30 min\n**Serve:** flip onto a wooden board, cut with a string/thread\n\n**Great with:** sarmale + sour cream, tocăniță, brânză (cheese), eggs.",
 full:"**Mămăligă — Traditional Romanian Polenta**\n\n**Ingredients:**\n- 300g fine cornmeal (mălai)\n- 1L water\n- 1 tsp salt\n- 1 tbsp butter or lard\n\n**Steps:**\n1. Bring water with salt to a boil in a cast-iron pot\n2. Slowly pour cornmeal in a stream while stirring with a wooden spoon\n3. Stir constantly for 20-30 minutes (must not have lumps!)\n4. When it pulls away from the sides of the pot, it's done\n5. Turn upside down onto a wooden board\n6. Traditionally cut with a thread or string (not a knife!)\n\n**Ways to serve:**\n- With **sarmale + smântână** (sour cream)\n- With **brânză** (cheese) and smântână — \"mămăligă cu brânză\"\n- With **tocăniță** (meat stew) and a fried egg\n- Fried in slices the next day (mămăligă prăjită)\n- With **jumări** (pork cracklings)\n\n**Tips:**\n- Use fine cornmeal for creamy, coarse for rustic\n- Stir in one direction only!\n- The longer you cook it, the better it gets"},

{kw:['ciorba:8','ciorbă:8','romanian soup:8','ciorba de burta:10','tripe soup:8','ciorba de perisoare:10','ciorba de legume:8'],
 short:"Ciorbă — traditional Romanian sour soup! Try ciorbă de burtă, de perișoare, or de legume.",
 long:"**Ciorbă — Romanian Sour Soups:**\n\n- **Ciorbă de burtă** — tripe soup with sour cream & garlic (hangover cure!)\n- **Ciorbă de perișoare** — meatball soup with lovage & sour cream\n- **Ciorbă de legume** — vegetable soup soured with borș/lemon\n- **Ciorbă de fasole** — bean soup with smoked meat\n- **Ciorbă rădăuțeană** — chicken soup with sour cream & garlic\n\nAll soured with **borș** (fermented wheat bran) or lemon.",
 full:"**Ciorbă — Traditional Romanian Sour Soups**\n\n**What makes it \"ciorbă\"?** The sour element! Romanian soups are soured with **borș** (fermented wheat bran liquid), lemon juice, or sauerkraut juice.\n\n**Most popular ciorbe:**\n\n**1. Ciorbă de burtă (Tripe Soup)**\n- Boiled beef tripe in bone broth\n- Soured with borș, enriched with egg yolk + sour cream\n- Served with: garlic sauce, vinegar, hot peppers\n- Known as the best hangover cure!\n\n**2. Ciorbă de perișoare (Meatball Soup)**\n- Small pork meatballs with rice\n- Tomato-based broth with vegetables\n- Fresh lovage (leuștean) on top\n- Soured with borș\n\n**3. Ciorbă rădăuțeană**\n- Chicken soup thickened with sour cream\n- Heavy garlic flavor\n- From Rădăuți, Bucovina region\n\n**4. Ciorbă de fasole (Bean Soup)**\n- Smoked pork + beans + vegetables\n- Often served in a bread bowl (\"în pâine\")\n\n**5. Ciorbă de legume (Vegetable Soup)**\n- Seasonal vegetables, soured with borș\n- Light and refreshing\n\n**Essential tip:** Always add borș at the END, after removing from heat, to keep the sour flavor fresh!"},

{kw:['cozonac:10','romanian bread:8','romanian cake:6','romanian christmas:8','romanian easter:8','romanian pastry:8','papanasi:8','papanași:8','romanian dessert:8'],
 short:"Cozonac — Romanian sweet bread with walnuts & cocoa, a Christmas & Easter must-have!",
 long:"**Romanian Desserts:**\n\n- **Cozonac** — sweet bread with walnut/cocoa filling (Christmas & Easter)\n- **Papanași** — fried cheese doughnuts with sour cream & jam\n- **Clătite** — thin crepes with jam, Nutella, or cheese\n- **Prăjitură cu mere** — apple cake\n- **Saraigle** — walnut rolled pastry with syrup\n- **Colivă** — boiled wheat with sugar & walnuts (memorial dish)",
 full:"**Romanian Desserts & Baked Goods**\n\n**Cozonac (Sweet Bread):**\n- Flour, eggs (lots!), sugar, butter, milk, yeast\n- Filling: ground walnuts + cocoa + sugar + rum essence\n- Knead dough for 30+ min (must be elastic!)\n- Rise 2 hours, fill, roll, rise again, bake at 170°C for 45 min\n- Tip: the secret is LOTS of kneading and patience with the rise\n\n**Papanași (Cheese Doughnuts):**\n- Fresh cow cheese (brânză de vaci) + flour + eggs + semolina\n- Shape into doughnuts with a small ball on top\n- Deep fry until golden\n- Serve with: sour cream (smântână) + blueberry/forest fruit jam\n- The #1 Romanian restaurant dessert!\n\n**Clătite (Crepes):**\n- Thin pancakes filled with:\n  - Gem de prune (plum jam)\n  - Nutella\n  - Brânză dulce (sweet cheese) + raisins\n  - Baked \"clătite la cuptor\" with cheese filling\n\n**Prăjitură cu mere (Apple Cake):**\n- Simple sponge cake layered with grated apples, cinnamon, sugar\n- Every Romanian grandma's specialty!\n\n**Colivă:**\n- Boiled wheat berries + sugar + ground walnuts + cocoa + rum\n- Decorated with powdered sugar crosses\n- Traditional memorial/funeral dish"},

{kw:['romanian:5','romania:5','romanian cuisine:10','romanian traditional:8','mancare romaneasca:10','bucatarie romaneasca:10','traditii romanesti:8'],
 short:"Romanian cuisine is rich — sarmale, mici, ciorbă, mămăligă, cozonac, and so much more!",
 long:"**Romanian Cuisine Highlights:**\n\n**Main dishes:** Sarmale, mici, tocăniță, ciorbă de burtă, ciorbă de perișoare\n**Sides:** Mămăligă, salată de vinete (eggplant salad), zacuscă\n**Desserts:** Cozonac, papanași, clătite, prăjitură cu mere\n**Drinks:** Țuică (plum brandy), pălincă, vin (wine from Dealu Mare, Recaș)\n\nAsk me about any Romanian dish!",
 full:"**Romanian Cuisine — A Complete Guide**\n\n**Soups (Ciorbe):**\n- Ciorbă de burtă, de perișoare, rădăuțeană, de fasole, de legume\n\n**Main Dishes:**\n- **Sarmale** — stuffed cabbage rolls (the national dish)\n- **Mici/Mititei** — grilled skinless sausages\n- **Tocăniță** — meat stew with onion sauce\n- **Pomana porcului** — fresh pork feast (at pig slaughter)\n- **Drob de miel** — lamb haggis (Easter)\n- **Jumări** — pork cracklings\n- **Tochitura** — pork stew with mămăligă, egg & cheese\n\n**Sides & Salads:**\n- **Mămăligă** — cornmeal polenta\n- **Salată de vinete** — smoky eggplant salad\n- **Zacuscă** — roasted vegetable spread\n- **Salată de boeuf** — Russian salad, Romanian style\n- **Murături** — pickled vegetables\n\n**Desserts:**\n- Cozonac, papanași, clătite, colivă, prăjitură cu mere, saraigle\n\n**Drinks:**\n- **Țuică / Pălincă** — plum brandy (40-60% alcohol!)\n- **Wine** — Fetească Neagră, Tămâioasă, Busuioacă de Bohotin\n\n**Food culture:**\n- Sunday lunch with family is sacred\n- Christmas = sarmale + cozonac + ciorbă\n- Easter = drob de miel + pască + ouă roșii\n- Summer = mici la grătar + beer\n- Always too much food — \"Mai ia o dată!\" (Take some more!)"},

{kw:['carbonara:10','pasta carbonara:10','spaghetti carbonara:10'],
 short:"Carbonara — spaghetti with eggs, pecorino, guanciale & black pepper. No cream!",
 long:"**Pasta Carbonara (authentic Italian):**\n\n**Ingredients:** spaghetti, guanciale (or pancetta), egg yolks + 1 whole egg, pecorino Romano, black pepper\n**Steps:** Cook pasta, fry guanciale until crispy, mix eggs + cheese + pepper, toss hot pasta with guanciale off heat, add egg mixture, toss fast.\n\n**Rule #1:** NEVER add cream. Real carbonara has no cream!",
 full:"**Authentic Pasta Carbonara**\n\n**Ingredients (2 servings):**\n- 200g spaghetti (or rigatoni)\n- 150g guanciale (cured pork cheek) — or pancetta\n- 3 egg yolks + 1 whole egg\n- 80g Pecorino Romano, finely grated\n- Fresh black pepper (lots!)\n- Salt for pasta water only\n\n**Steps:**\n1. Boil pasta in well-salted water until al dente\n2. Cut guanciale into strips, fry in a cold pan on medium heat — let the fat render out slowly until crispy (5-7 min)\n3. In a bowl, mix egg yolks + whole egg + most of the pecorino + generous pepper\n4. When pasta is done, save 1 cup pasta water, drain the rest\n5. **OFF THE HEAT:** Add pasta to the guanciale pan\n6. Pour egg mixture over, toss FAST — the residual heat cooks the eggs into a creamy sauce\n7. Add splashes of pasta water if too thick\n8. Top with remaining pecorino and pepper\n\n**Critical rules:**\n- NO cream — ever! The creaminess comes from eggs + cheese + pasta water\n- Take pan OFF heat before adding eggs — or you get scrambled eggs\n- Use pecorino, NOT parmesan (or mix both)\n- Guanciale > pancetta > bacon (in order of authenticity)"},

{kw:['sushi:8','sushi roll:10','maki:8','how to make sushi:10','japanese food:6','sashimi:6'],
 short:"Sushi — vinegared rice + fresh fish + nori. Master the rice and you master sushi!",
 long:"**Sushi at Home:**\n\n**Sushi rice:** short-grain rice + rice vinegar + sugar + salt\n**For maki rolls:** nori sheets, rice, fillings (salmon, tuna, avocado, cucumber)\n**Tools:** bamboo rolling mat, sharp knife\n\n**Key:** The rice is everything — season it properly and let it cool to room temperature.",
 full:"**How to Make Sushi at Home**\n\n**Sushi Rice (most important!):**\n- 2 cups short-grain Japanese rice\n- 2 cups water\n- 3 tbsp rice vinegar + 1 tbsp sugar + 1 tsp salt (mix together)\n- Wash rice 4-5 times until water runs clear\n- Cook in rice cooker or pot (bring to boil, low heat 15 min, rest 10 min)\n- Fold in vinegar mixture while rice is hot, fan to cool\n\n**Maki Rolls:**\n1. Place nori (shiny side down) on bamboo mat\n2. Spread thin layer of rice, leave 2cm at the top\n3. Add fillings in a line: salmon/tuna + avocado + cucumber\n4. Roll tightly using the mat, wet the top edge to seal\n5. Cut with a wet, sharp knife into 6-8 pieces\n\n**Popular fillings:**\n- **Salmon** (sake) — the most popular\n- **Tuna** (maguro) — classic\n- **Shrimp** (ebi) — cooked\n- **Avocado + cream cheese** — California roll\n- **Cucumber** (kappa maki) — vegetarian\n\n**Serve with:** soy sauce, wasabi, pickled ginger (gari)\n\n**Tips:**\n- Wet your hands when handling rice\n- Don't overfill rolls\n- Use the freshest fish possible (sushi-grade)\n- Sharp knife = clean cuts"},

{kw:['burger:8','hamburger:8','smash burger:10','cheeseburger:8','how to make burger:10'],
 short:"Smash burger — thin, crispy-edged patties with melted cheese. The best homemade burger!",
 long:"**Smash Burger Recipe:**\n\n**Meat:** ground beef (80/20 fat ratio), loosely shaped into balls\n**Technique:** smash the ball flat on a screaming-hot skillet, season with salt & pepper\n**Build:** toasted bun, patty + melted cheese, pickles, onion, sauce\n\nThe key is HIGH heat and don't touch it until it's crusted!",
 full:"**The Perfect Smash Burger**\n\n**Ingredients (4 burgers):**\n- 400g ground beef (80/20 lean-to-fat ratio)\n- Salt & pepper\n- 4 slices American cheese (or cheddar)\n- 4 brioche buns, toasted\n- Butter for buns\n\n**Toppings:** pickles, sliced onion, lettuce, tomato\n**Sauce:** mayo + ketchup + mustard + pickle juice (mix together)\n\n**Steps:**\n1. Divide meat into 4 balls (~100g each) — DON'T season yet\n2. Heat a cast-iron skillet on HIGH until smoking\n3. Place ball on skillet, SMASH flat with a sturdy spatula (press hard!)\n4. Season with salt & pepper immediately\n5. Cook 2-3 min — don't touch! Let the crust form\n6. Flip, add cheese on top, cook 1 more minute\n7. Toast buttered buns on the same pan\n8. Build: bottom bun → sauce → patty → pickles → onion → lettuce → top bun\n\n**Secrets:**\n- 80/20 fat ratio — leaner = dry burger\n- Smash ONCE, hard, within 30 seconds of placing on heat\n- Don't press down after smashing (squeezes out juices)\n- Cast iron > grill for smash burgers\n- Season the meat on the pan, not before (keeps it loose)\n- Double stack for extra indulgence!"},

{kw:['steak:8','how to cook steak:10','medium rare:8','ribeye:6','fillet:5','sirloin:5'],
 short:"Perfect steak — room temp, screaming hot pan, sear 3-4 min per side, rest 5 min. Done!",
 long:"**How to Cook the Perfect Steak:**\n\n1. Take steak out of fridge 30 min before cooking\n2. Pat dry, season generously with salt & pepper\n3. Screaming hot cast-iron pan + oil with high smoke point\n4. Sear 3-4 min per side (for medium-rare)\n5. Add butter, garlic, thyme — baste for 1 min\n6. **REST 5 minutes** before cutting!\n\n**Internal temps:** Rare 50°C, Medium-Rare 55°C, Medium 60°C, Well-Done 70°C",
 full:"**The Perfect Steak Guide**\n\n**Choosing your cut:**\n| Cut | Flavor | Tenderness | Best For |\n|-----|--------|------------|----------|\n| Ribeye | Rich, marbled | Very tender | Pan sear |\n| Filet mignon | Mild, buttery | Most tender | Pan sear |\n| NY Strip | Beefy, balanced | Tender | Pan or grill |\n| T-Bone | Best of both | Mixed | Grill |\n| Sirloin | Lean, beefy | Moderate | Grill |\n\n**Steps:**\n1. **Prep:** Remove from fridge 30-45 min before cooking\n2. **Dry:** Pat completely dry with paper towels (wet = no crust)\n3. **Season:** Generous salt + pepper (or just salt)\n4. **Heat:** Cast-iron pan on HIGH heat until smoking, add high smoke-point oil\n5. **Sear:** Place steak, DON'T MOVE for 3-4 min\n6. **Flip:** Once, cook another 3-4 min\n7. **Baste:** Add 2 tbsp butter + 2 crushed garlic cloves + thyme sprig, tilt pan and spoon melted butter over steak for 1 min\n8. **Rest:** Remove to cutting board, rest 5 min minimum\n\n**Doneness (internal temp):**\n- Rare: 48-52°C (cool red center)\n- Medium-Rare: 54-57°C (warm red center) ← **RECOMMENDED**\n- Medium: 60-63°C (pink center)\n- Medium-Well: 65-68°C (slight pink)\n- Well-Done: 71°C+ (gray throughout)\n\n**Pro tips:**\n- A meat thermometer is your best friend\n- The steak continues cooking while resting (+3-5°C)\n- Butter basting = restaurant-quality flavor\n- Let it rest or all the juices run out when you cut"},

{kw:['chocolate cake:10','cake recipe:8','how to make cake:8','birthday cake:8','brownie:6'],
 short:"Chocolate cake — rich, moist, and easy to make! Cocoa, butter, eggs, flour, sugar.",
 long:"**Easy Chocolate Cake:**\n\n**Dry:** 200g flour, 200g sugar, 75g cocoa, 1 tsp baking soda, 1 tsp baking powder, salt\n**Wet:** 2 eggs, 240ml milk, 120ml oil, 2 tsp vanilla, 240ml hot coffee (or water)\n**Mix, pour into 2 pans, bake 175°C for 30-35 min.**\n\n**Frosting:** 200g butter + 400g powdered sugar + 100g cocoa + milk + vanilla.",
 full:"**Best Chocolate Cake Recipe**\n\n**Ingredients:**\n- 200g all-purpose flour\n- 200g sugar\n- 75g unsweetened cocoa powder\n- 1 tsp baking soda, 1 tsp baking powder\n- 1 tsp salt\n- 2 large eggs\n- 240ml whole milk\n- 120ml vegetable oil\n- 2 tsp vanilla extract\n- 240ml hot coffee (makes it extra rich — or use hot water)\n\n**Chocolate Frosting:**\n- 200g softened butter\n- 400g powdered sugar\n- 100g cocoa powder\n- 60ml milk\n- 2 tsp vanilla\n\n**Steps:**\n1. Preheat oven to 175°C. Grease two 9-inch round pans\n2. Mix all dry ingredients in a large bowl\n3. Add eggs, milk, oil, vanilla — beat 2 minutes\n4. Stir in hot coffee (batter will be thin — that's OK!)\n5. Divide between pans, bake 30-35 min (toothpick test)\n6. Cool completely before frosting\n7. **Frosting:** Beat butter until fluffy, add sugar + cocoa gradually, add milk + vanilla until smooth\n8. Frost between layers, then top and sides\n\n**Tips:**\n- Hot coffee enhances chocolate flavor (you won't taste coffee)\n- Don't overmix the batter\n- Cool COMPLETELY before frosting or it melts off\n- Add a pinch of espresso powder for even deeper chocolate flavor"},

{kw:['tacos:8','taco:8','mexican food:8','burrito:6','quesadilla:6','guacamole:8'],
 short:"Tacos — seasoned meat, fresh toppings, warm tortillas. Mexican perfection!",
 long:"**Easy Tacos:**\n\n**Meat:** ground beef + cumin, paprika, chili powder, garlic, onion, salt\n**Build:** warm tortillas + meat + lettuce + cheese + salsa + sour cream + lime\n**Guacamole:** mash avocado + lime juice + salt + cilantro + diced onion + jalapeño\n\nCorn tortillas for authentic, flour for soft tacos.",
 full:"**Tacos & Mexican Favorites**\n\n**Taco Seasoning (homemade):**\n- 1 tbsp chili powder, 1 tsp cumin, 1 tsp paprika\n- ½ tsp garlic powder, ½ tsp onion powder\n- ½ tsp oregano, ¼ tsp cayenne\n- Salt & pepper to taste\n\n**Beef Tacos:**\n1. Brown 500g ground beef, drain fat\n2. Add seasoning + 80ml water, simmer 5 min\n3. Warm tortillas (corn = authentic, flour = soft)\n4. Build: meat → lettuce → cheese → salsa → sour cream → lime squeeze\n\n**Guacamole:**\n- 3 ripe avocados, mashed\n- 1 lime, juiced\n- ½ red onion, finely diced\n- 1 jalapeño, minced (seeds out for mild)\n- Fresh cilantro, chopped\n- Salt to taste\n- *Optional: diced tomato*\n\n**Quick Quesadilla:** Tortilla + cheese + leftover taco meat, fold, pan-fry both sides until crispy.\n\n**Burrito:** Large flour tortilla + rice + beans + meat + cheese + salsa + sour cream, wrap tight.\n\n**Tips:**\n- Double-stack corn tortillas (they break easily)\n- Warm tortillas in a dry hot pan, not microwave\n- Lime on everything!"},

{kw:['curry:8','indian food:8','chicken curry:10','tikka masala:10','butter chicken:10','naan:6'],
 short:"Butter chicken — creamy tomato curry with tender chicken. The king of Indian food!",
 long:"**Easy Butter Chicken:**\n\n**Marinate:** chicken thighs in yogurt + garam masala + turmeric + chili (1 hour)\n**Sauce:** butter + onion + garlic + ginger + tomato passata + cream + garam masala + fenugreek\n**Cook:** grill/fry chicken, simmer in sauce 20 min\n\n**Serve with:** basmati rice or naan bread.",
 full:"**Butter Chicken (Murgh Makhani)**\n\n**Marinade (1 hour min):**\n- 600g chicken thighs, cubed\n- 150g yogurt\n- 1 tbsp garam masala, 1 tsp turmeric, 1 tsp chili powder\n- 2 cloves garlic, crushed + 1 tbsp ginger, grated\n- Salt, lemon juice\n\n**Sauce:**\n- 2 tbsp butter + 1 tbsp oil\n- 1 large onion, finely diced\n- 3 cloves garlic + 1 tbsp ginger\n- 400g tomato passata (or canned tomatoes, blended)\n- 1 tbsp garam masala, 1 tsp cumin, 1 tsp paprika\n- 1 tsp dried fenugreek leaves (kasoori methi) — the secret ingredient!\n- 120ml heavy cream\n- 1 tbsp sugar, salt to taste\n\n**Steps:**\n1. Marinate chicken for at least 1 hour (overnight = best)\n2. Cook chicken in hot pan until charred (don't fully cook through)\n3. In same pan: melt butter, cook onion until soft\n4. Add garlic + ginger, cook 1 min\n5. Add spices, cook 30 sec\n6. Add tomato passata, simmer 15 min\n7. Add cream, sugar, fenugreek, stir\n8. Add chicken pieces, simmer 10 min until cooked through\n9. Finish with a knob of butter\n\n**Serve with:** basmati rice, naan bread, or both!\n\n**Tip:** Fenugreek leaves are what makes it taste like a restaurant. Don't skip them!"},

{kw:['fried rice:8','chinese food:8','stir fry:8','wok:6','noodles:6','ramen:8'],
 short:"Fried rice — day-old rice + soy sauce + eggs + veggies, stir-fried on high heat!",
 long:"**Easy Fried Rice:**\n\n**Must use:** day-old cold rice (fresh rice = mushy)\n**Ingredients:** rice, 2 eggs, soy sauce, sesame oil, garlic, green onion, vegetables\n**Technique:** HIGH heat wok, cook eggs first, then rice, add soy sauce at the end\n\nThe secret is high heat and not overcrowding the wok!",
 full:"**Perfect Fried Rice**\n\n**Ingredients (2 servings):**\n- 3 cups day-old cooked rice (cold from fridge!)\n- 2 eggs, beaten\n- 3 tbsp soy sauce\n- 1 tbsp sesame oil\n- 2 tbsp vegetable oil\n- 3 cloves garlic, minced\n- 1 cup mixed vegetables (peas, corn, diced carrot)\n- 3 green onions, sliced\n- *Optional: diced chicken, shrimp, or tofu*\n\n**Steps:**\n1. Heat wok/large pan on HIGH with vegetable oil\n2. Add beaten eggs, scramble quickly, remove and set aside\n3. Add more oil if needed, cook garlic 30 seconds\n4. Add vegetables (and protein if using), cook 2-3 min\n5. Add cold rice — press it flat against the wok, let it sear\n6. Add soy sauce and sesame oil, toss everything\n7. Add scrambled eggs back, toss with green onions\n\n**Why day-old rice?**\nFresh rice has too much moisture → steams instead of frying → mushy result. Day-old rice from the fridge is dry and fries perfectly!\n\n**Variations:**\n- **Kimchi fried rice** — add kimchi + gochujang\n- **Pineapple fried rice** — Thai style with curry powder\n- **Garlic fried rice** — extra garlic, simple and delicious"},

{kw:['exercise:6','workout:6','fitness:6','gym:5','muscle:4','strength:4','training:4','push up:6','squat:5','bench press:6'],
 short:"Exercise basics: cardio, strength training, flexibility. Consistency is key!",
 long:"**Beginner workout:**\n- **Push-ups** — chest, shoulders, triceps\n- **Squats** — legs, glutes\n- **Planks** — core\n- **Lunges** — legs, balance\n- **Pull-ups** — back, biceps\n\nStart 3x/week, increase gradually.",
 full:"**Beginner Full-Body Workout:**\n\n**Warm-up (5 min):** Jumping jacks, arm circles, leg swings\n\n**Workout (3 sets each):**\n| Exercise | Reps | Muscles |\n|----------|------|---------|\n| Push-ups | 10-15 | Chest, shoulders, triceps |\n| Squats | 15-20 | Quads, glutes, hamstrings |\n| Plank | 30-60s | Core, abs |\n| Lunges | 10/leg | Legs, balance |\n| Pull-ups/rows | 5-10 | Back, biceps |\n| Burpees | 8-12 | Full body, cardio |\n| Dips | 8-12 | Triceps, chest |\n\n**Schedule:** 3-4 days/week, rest between sessions\n\n**Nutrition basics:**\n- Protein: 1.6-2.2g per kg of body weight for muscle growth\n- Eat enough calories (slight surplus to build, slight deficit to lose fat)\n- Stay hydrated (2-3L water/day)\n- Sleep 7-9 hours (muscles grow during sleep!)\n\n**Progressive overload:** Gradually increase reps, weight, or difficulty each week."},

{kw:['vitamin:6','vitamins:6','nutrition:6','healthy:4','diet:4','protein:4','calorie:5','nutrient:5'],
 short:"Key vitamins: A, B, C, D, E, K. Eat varied fruits, veggies, and proteins.",
 long:"**Essential Nutrients:**\n- **Protein** — muscles, repair (meat, eggs, beans, nuts)\n- **Carbs** — energy (rice, bread, fruit, oats)\n- **Fats** — brain, hormones (avocado, olive oil, nuts)\n- **Vitamins** — A (eyes), C (immune), D (bones), B12 (energy)\n- **Water** — 2-3L per day",
 full:"**Nutrition Guide:**\n\n**Macronutrients:**\n| Macro | Purpose | Sources | Daily |\n|-------|---------|---------|-------|\n| Protein | Muscle, repair | Meat, eggs, beans, tofu | 0.8-2g/kg |\n| Carbs | Energy | Rice, bread, fruit, oats | 45-65% calories |\n| Fat | Brain, hormones | Avocado, olive oil, nuts | 20-35% calories |\n\n**Key Vitamins:**\n| Vitamin | Purpose | Sources |\n|---------|---------|--------|\n| A | Vision, immune | Carrots, sweet potato |\n| B12 | Energy, nerves | Meat, eggs, dairy |\n| C | Immune, skin | Citrus, peppers, berries |\n| D | Bones, mood | Sunlight, fish, fortified milk |\n| E | Antioxidant | Nuts, seeds, spinach |\n| K | Blood clotting | Leafy greens, broccoli |\n| Iron | Oxygen transport | Red meat, spinach, beans |\n\n**Tips:** Eat colorful (varied fruits/veggies), drink 2-3L water, limit processed food/sugar, don't skip breakfast."},

{kw:['language:5','languages:5','most spoken:6','how many languages:8','spoken language:6','translate:4'],
 short:"Most spoken: English, Mandarin, Hindi, Spanish. ~7,000 languages exist.",
 long:"**Most spoken languages (total speakers):**\n1. English — ~1.5 billion\n2. Mandarin Chinese — ~1.1 billion\n3. Hindi — ~600 million\n4. Spanish — ~550 million\n5. French — ~310 million\n6. Arabic — ~310 million\n\nThere are ~7,000 languages worldwide. One dies every 2 weeks.",
 full:"**World Languages:**\n\n**Most spoken (total speakers):**\n| Rank | Language | Total Speakers | Native |\n|------|----------|---------------|--------|\n| 1 | English | ~1.5 billion | 380M |\n| 2 | Mandarin | ~1.1 billion | 920M |\n| 3 | Hindi | ~600 million | 345M |\n| 4 | Spanish | ~550 million | 485M |\n| 5 | French | ~310 million | 80M |\n| 6 | Arabic | ~310 million | 310M |\n| 7 | Bengali | ~270 million | 230M |\n| 8 | Portuguese | ~260 million | 230M |\n| 9 | Russian | ~255 million | 150M |\n| 10 | Japanese | ~125 million | 125M |\n\n**Fun facts:**\n- ~7,000 languages exist today\n- A language dies every ~2 weeks\n- Papua New Guinea has the most languages (840+)\n- Mandarin has the most native speakers\n- English is the most learned second language\n- Korean has the most recently invented alphabet (Hangul, 1443)\n- Basque (Spain/France) is unrelated to any other language"},

{kw:['hello in:6','say hello:6','greetings in:6','how to say:6','languages hello:8'],
 short:"Hello: Hola (Spanish), Bonjour (French), Hallo (German), Ciao (Italian), こんにちは (Japanese)",

 full:"**\"Hello\" around the world:**\n\n| Language | Hello | Pronunciation |\n|----------|-------|---------------|\n| Spanish | Hola | OH-lah |\n| French | Bonjour | bon-ZHOOR |\n| German | Hallo | HAH-lo |\n| Italian | Ciao | CHOW |\n| Portuguese | Olá | oh-LAH |\n| Japanese | こんにちは | kon-NEE-chee-wah |\n| Korean | 안녕하세요 | an-nyeong-ha-SE-yo |\n| Chinese | 你好 | nee-HOW |\n| Arabic | مرحبا | mar-HA-ba |\n| Russian | Привет | pree-VYET |\n| Hindi | नमस्ते | na-ma-STAY |\n| Romanian | Bună | BOO-nah |\n| Turkish | Merhaba | mer-HA-ba |\n| Thai | สวัสดี | sa-wat-DEE |\n| Swahili | Jambo | JAM-bo |\n| Hawaiian | Aloha | ah-LO-ha |\n| Zulu | Sawubona | sa-wu-BO-na |"},

{kw:['philosophy:6','philosopher:5','meaning of life:10','purpose:4','existence:4','think:3','wisdom:4'],
 short:"Philosophy = love of wisdom. Big questions: What is real? What is right? Why are we here?",
 long:"**Philosophy — Big Questions:**\n- **What is real?** (Metaphysics)\n- **How do we know things?** (Epistemology)\n- **What is right/wrong?** (Ethics)\n- **What is beautiful?** (Aesthetics)\n\n**Famous philosophers:** Socrates, Plato, Aristotle, Descartes, Kant, Nietzsche",
 full:"**Philosophy — The Big Questions:**\n\n**Branches:**\n- **Metaphysics** — What is the nature of reality?\n- **Epistemology** — How do we know what we know?\n- **Ethics** — What is right and wrong?\n- **Logic** — What makes a valid argument?\n- **Aesthetics** — What is beauty?\n\n**Key philosophers:**\n- **Socrates** — \"I know that I know nothing\" (questioned everything)\n- **Plato** — Theory of Forms, *The Republic*, Allegory of the Cave\n- **Aristotle** — logic, ethics, \"father of Western philosophy\"\n- **Descartes** — \"I think, therefore I am\" (Cogito ergo sum)\n- **Kant** — morality from duty, categorical imperative\n- **Nietzsche** — \"God is dead\", will to power, eternal recurrence\n- **Existentialists** (Sartre, Camus) — life has no inherent meaning, you create your own\n\n**The meaning of life?**\nDifferent answers: 42 (Douglas Adams), happiness (Aristotle), serving others (religion), creating meaning (existentialism), there is none (nihilism), asking the question IS the point (Socrates)"},

{kw:['psychology:6','mental health:8','anxiety:5','depression:5','therapy:5','stress:5','mindfulness:5','meditation:5','self care:6'],
 short:"Mental health is as important as physical health. Talk to someone if you're struggling.",
 long:"**Mental Health Tips:**\n- **Exercise** — releases endorphins, reduces stress\n- **Sleep** — 7-9 hours, consistent schedule\n- **Talk** — to friends, family, or a therapist\n- **Mindfulness** — meditation, deep breathing\n- **Limit** social media and news when overwhelmed\n- **Routine** — structure helps when things feel chaotic",
 full:"**Mental Health & Wellbeing:**\n\n**Daily habits that help:**\n- **Exercise** — even 20 min/day reduces anxiety & depression\n- **Sleep** — 7-9 hours, consistent bedtime\n- **Social connection** — talk to people you trust\n- **Mindfulness/Meditation** — start with 5 min of deep breathing\n- **Limit screens** — especially before bed\n- **Nature** — sunlight and fresh air boost mood\n- **Gratitude** — write 3 things you're grateful for daily\n- **Routine** — structure provides stability\n\n**When to seek help:**\n- Persistent sadness for 2+ weeks\n- Difficulty functioning at work/school\n- Withdrawal from friends/activities\n- Changes in sleep/appetite\n- Thoughts of self-harm\n\n**Types of therapy:**\n- **CBT** (Cognitive Behavioral Therapy) — change thought patterns\n- **DBT** — emotional regulation, distress tolerance\n- **Talk therapy** — explore feelings and patterns\n- **Mindfulness-based** — meditation and awareness\n\n**Remember:** Asking for help is strength, not weakness. Mental health is as important as physical health."},

{kw:['weather:5','rain:3','cloud:4','storm:4','tornado:6','hurricane:6','thunder:4','lightning:5','climate:4'],
 short:"Weather = short-term atmosphere. Climate = long-term patterns.",
 long:"**Weather phenomena:**\n- **Rain** — water evaporates, forms clouds, condenses, falls\n- **Lightning** — electrical discharge (30,000°C — 5x hotter than Sun's surface!)\n- **Tornado** — rotating column of air (up to 500 km/h)\n- **Hurricane** — massive rotating storm over warm ocean\n- **Snow** — ice crystals form in clouds (each snowflake is unique)",
 full:"**Weather & Atmosphere:**\n\n**How rain works:**\n1. Sun heats water → evaporation\n2. Water vapor rises → cools → condenses into clouds\n3. Droplets grow → fall as rain\n\n**Extreme weather:**\n| Phenomenon | Speed/Power | Fun Fact |\n|------------|-------------|----------|\n| Lightning | 30,000°C | 5x Sun's surface, 300M V |\n| Tornado | up to 500 km/h | F5 destroys everything |\n| Hurricane | up to 300 km/h | Can be 1,000 km wide |\n| Hailstone | up to 180 km/h | Largest: 20cm diameter |\n| Blizzard | 56+ km/h wind | Can bury cars in hours |\n\n**Cloud types:**\n- **Cumulus** — puffy, fair weather\n- **Stratus** — flat layers, overcast\n- **Cirrus** — wispy, high altitude\n- **Cumulonimbus** — thunderstorm clouds (tall!)\n\n**Climate vs Weather:**\n- Weather = what's happening now\n- Climate = average weather over 30+ years"},

{kw:['volcano:6','volcanic:5','eruption:5','lava:5','magma:4'],
 short:"Volcanoes form where tectonic plates meet. Lava can reach 1,200°C.",
 long:"**Volcanoes:**\n- Form where tectonic plates collide or separate\n- **Magma** underground → **lava** when it erupts\n- **Ring of Fire** — 75% of volcanoes are around the Pacific\n- Famous: Vesuvius (destroyed Pompeii), Krakatoa, Mt. St. Helens\n- Yellowstone is a supervolcano that could erupt (but probably won't soon)",
 full:"**Volcanoes:**\n\n**How they work:**\nMagma (molten rock) rises from Earth's mantle through cracks in the crust. When pressure builds up → eruption! Magma becomes lava at the surface (up to 1,200°C).\n\n**Types:**\n- **Shield** — gentle slopes, runny lava (Hawaii)\n- **Stratovolcano** — steep, explosive (Mt. Fuji, Vesuvius)\n- **Cinder cone** — small, short eruptions\n- **Supervolcano** — catastrophic, rare (Yellowstone, Toba)\n\n**Famous eruptions:**\n- **Vesuvius (79 AD)** — buried Pompeii, preserved in ash\n- **Krakatoa (1883)** — heard 4,800 km away, global cooling\n- **Mt. St. Helens (1980)** — lateral blast, destroyed 600 km²\n- **Eyjafjallajökull (2010)** — disrupted European air travel for weeks\n\n**Ring of Fire:** Circle around Pacific Ocean with 75% of world's active volcanoes and 90% of earthquakes."},

{kw:['earthquake:8','tectonic:6','richter:5','seismic:5','fault line:6'],
 short:"Earthquakes: tectonic plates shifting. Measured on Richter scale.",
 long:"**Earthquakes:**\n- Caused by tectonic plates shifting along fault lines\n- Measured on Richter scale (logarithmic — each number is 10x stronger)\n- Magnitude 5+ = damaging, 7+ = major, 9+ = catastrophic\n- **San Andreas Fault** (California) is a famous fault line\n- Strongest recorded: Chile 1960 (magnitude 9.5)",
 full:"**Earthquakes:**\n\n**How they work:** Earth's crust is made of tectonic plates floating on the mantle. When plates grind, collide, or separate → seismic waves → earthquake.\n\n**Richter Scale (logarithmic):**\n| Magnitude | Effect |\n|-----------|--------|\n| < 3.0 | Not felt |\n| 3.0-3.9 | Minor shaking |\n| 4.0-4.9 | Light, noticed indoors |\n| 5.0-5.9 | Moderate, some damage |\n| 6.0-6.9 | Strong, destructive |\n| 7.0-7.9 | Major, widespread damage |\n| 8.0+ | Great, catastrophic |\n| 9.0+ | Near total destruction |\n\n**Biggest earthquakes:**\n1. Chile 1960 — magnitude **9.5** (strongest ever)\n2. Alaska 1964 — magnitude **9.2**\n3. Sumatra 2004 — magnitude **9.1** (caused Indian Ocean tsunami)\n4. Japan 2011 — magnitude **9.1** (Fukushima disaster)\n\n**Safety:** Drop, cover, hold on. Doorways are NOT safer (myth). Get under sturdy furniture."},

{kw:['riddle:8','brain teaser:8','puzzle:4','challenge me:6','trick question:6'],

 full:"**Brain teasers:**\n\n**Easy:**\n1. *What has hands but can't clap?* → **A clock**\n2. *What has a head and a tail but no body?* → **A coin**\n3. *What gets wetter the more it dries?* → **A towel**\n\n**Medium:**\n4. *I speak without a mouth and hear without ears. I have no body but come alive with wind.* → **An echo**\n5. *The more you take, the more you leave behind.* → **Footsteps**\n6. *What can travel around the world while staying in a corner?* → **A stamp**\n\n**Hard:**\n7. *I have cities but no houses, mountains but no trees, water but no fish.* → **A map**\n8. *What comes once in a minute, twice in a moment, but never in a thousand years?* → **The letter M**\n9. *A man pushes his car to a hotel and tells the owner he's bankrupt. Why?* → **He's playing Monopoly**\n\n**Math riddle:** If you have me, you want to share me. If you share me, you don't have me. What am I? → **A secret**"},

 short:"Chess: 6 piece types, goal is checkmate the king. Want openings or strategy?",
 long:"**Chess Basics:**\n\n**Pieces & movement:**\n- **King** ♔ — 1 square any direction (most important!)\n- **Queen** ♕ — any direction, any distance (most powerful)\n- **Rook** ♖ — horizontal/vertical, any distance\n- **Bishop** ♗ — diagonal, any distance\n- **Knight** ♞ — L-shape (2+1), can jump over pieces\n- **Pawn** ♟ — forward 1 (or 2 from start), captures diagonally\n\n**Special moves:** Castling, en passant, pawn promotion\n**Goal:** Checkmate — attack the king with no escape\n\nWant openings, strategy, or famous games?",
 full:"**Chess Complete Guide:**\n\n**Pieces & Values:**\n| Piece | Symbol | Movement | Value |\n|-------|--------|----------|-------|\n| King | ♔ | 1 square any direction | ∞ |\n| Queen | ♕ | Any direction, any distance | 9 |\n| Rook | ♖ | Horizontal/vertical | 5 |\n| Bishop | ♗ | Diagonal | 3 |\n| Knight | ♞ | L-shape (jumps!) | 3 |\n| Pawn | ♟ | Forward 1 (2 from start) | 1 |\n\n**Special moves:**\n- **Castling** — king moves 2 squares toward rook, rook jumps over (must be first move for both)\n- **En passant** — capture a pawn that just moved 2 squares, as if it moved 1\n- **Promotion** — pawn reaches the end → becomes any piece (usually queen)\n\n**Best openings for beginners:**\n1. **Italian Game** — 1.e4 e5 2.Nf3 Nc6 3.Bc4 (control center, develop pieces)\n2. **London System** — 1.d4 2.Bf4 (solid, easy to learn)\n3. **Sicilian Defense** — 1.e4 c5 (most popular response to e4)\n4. **Queen's Gambit** — 1.d4 d5 2.c4 (offer pawn for center control)\n\n**Strategy tips:**\n- **Control the center** (e4, d4, e5, d5 squares)\n- **Develop pieces early** (knights and bishops before queen)\n- **Castle early** (protect your king!)\n- **Don't move the same piece twice** in the opening\n- **Connect your rooks** (clear back rank)\n- **Think about your opponent's threats** before your own plan\n\n**Famous games:**\n- **Immortal Game** (1851) — Anderssen sacrifices almost everything for checkmate\n- **Game of the Century** (1956) — 13-year-old Bobby Fischer's brilliant queen sacrifice\n- **Kasparov vs Deep Blue** (1997) — first computer to beat world champion\n\n**World Champions:** Steinitz, Capablanca, Fischer, Kasparov, Carlsen\n\n**Want to improve?** Play on chess.com or lichess.org, solve puzzles daily, study endgames!"},

// ═══════════════════════════════════════════════════════
//  SMART MATCHING + MODEL-AWARE RESPONSES
// ═══════════════════════════════════════════════════════
function normalizeInput(t){return t.toLowerCase().replace(/['']/g,"'").replace(/[""]/g,'"').replace(/[^\p{L}\p{N}\s\+\-\*\/\(\)\.\^%#@]/gu,' ').replace(/\s+/g,' ').trim()}

// Fuzzy match — allows 1-2 typos
function fuzzyMatch(a, b) {
  if (a === b) return 1;
  if (a.length < 2 || b.length < 2) return a === b ? 1 : 0;
  // Check if one starts with the other
  if (a.startsWith(b) || b.startsWith(a)) return 0.85;
  // Levenshtein distance
  const la = a.length, lb = b.length;
  if (Math.abs(la - lb) > 2) return 0;
  const matrix = Array.from({length: la+1}, (_,i) => {
    const row = Array(lb+1).fill(0);
    row[0] = i;
    return row;
  });
  for (let j = 0; j <= lb; j++) matrix[0][j] = j;
  for (let i = 1; i <= la; i++)
    for (let j = 1; j <= lb; j++) {
      const cost = a[i-1] === b[j-1] ? 0 : 1;
      matrix[i][j] = Math.min(matrix[i-1][j]+1, matrix[i][j-1]+1, matrix[i-1][j-1]+cost);
    }
  const dist = matrix[la][lb];
  const maxLen = Math.max(la, lb);
  if (dist === 0) return 1;
  if (dist === 1 && maxLen >= 3) return 0.8;
  if (dist === 2 && maxLen >= 5) return 0.5;
  return 0;
}

function scoreTopic(input, topic) {
  const n = normalizeInput(input), words = n.split(' ');
  let score = 0;
  for (const kw of topic.kw) {
    const [phrase, w] = kw.includes(':') ? [kw.slice(0,kw.lastIndexOf(':')), parseInt(kw.slice(kw.lastIndexOf(':')+1))] : [kw, 3];
    const p = phrase.toLowerCase();
    // Exact phrase match
    if (n.includes(p)) { score += w * 3; if (p.includes(' ')) score += w * 2; }
    else {
      const kwWords = p.split(' ');
      let matched = 0;
      for (const k of kwWords) {
        let bestFuzz = 0;
        for (const word of words) {
          const f = fuzzyMatch(word, k);
          if (f > bestFuzz) bestFuzz = f;
        }
        if (bestFuzz >= 0.5) matched += bestFuzz;
      }
      if (matched > 0) score += w * (matched / kwWords.length) * 2;
    }
  }
  return score;
}

function getTopicResponse(topic){
  const tier=currentModel.tier;
  if(tier<=2) return topic.short;
  if(tier<=5) return topic.long;
  return topic.full;
}

function calculate(expr){
  try{
    expr=expr.replace(/\^/g,'**').replace(/×/g,'*').replace(/÷/g,'/').replace(/[^0-9+\-*/().%\s]/g,'');
    if(!expr.trim())return null;
    const r=Function('"use strict";return('+expr+')')();
    if(typeof r==='number'&&isFinite(r)){const d=Number.isInteger(r)?r:parseFloat(r.toFixed(8));return`**Calculating:** \`${expr.trim()}\`\n\n**Result: ${d}**`}
    return null;
  }catch{return null}
}

function pick(a){return a[Math.floor(Math.random()*a.length)]}

    {re:/(\d+\.?\d*)\s*°?\s*(f|fahrenheit)\s*(to|in)\s*°?\s*(c|celsius|centigrade)/i, fn:'f_c', from:'°F', to:'°C'},
    {re:/(\d+\.?\d*)\s*(cm|centimeters?|centimetres?)\s*(to|in)\s*(in|inches?)/i, fn:'cm_inches', from:'cm', to:'inches'},
    {re:/(\d+\.?\d*)\s*(in|inches?)\s*(to|in)\s*(cm|centimeters?|centimetres?)/i, fn:'inches_cm', from:'inches', to:'cm'},
    {re:/(\d+\.?\d*)\s*(m|meters?|metres?)\s*(to|in)\s*(ft|feet|foot)/i, fn:'m_feet', from:'m', to:'feet'},
    {re:/(\d+\.?\d*)\s*(ft|feet|foot)\s*(to|in)\s*(m|meters?|metres?)/i, fn:'feet_m', from:'feet', to:'m'},

  for (const p of patterns) {
    const m = lower.match(p.re);

// Math word problems
function tryMathWord(input) {
  const lower = input.toLowerCase();
  let m;
  // "what is X% of Y"
  m = lower.match(/what\s*is\s*(\d+\.?\d*)%?\s*(?:percent\s*)?(?:of)\s*(\d+\.?\d*)/);
  if (m) { const r = (parseFloat(m[1])/100*parseFloat(m[2])); return `**${m[1]}% of ${m[2]}** = **${r}**`; }
  // "X plus/minus/times/divided by Y"
  m = lower.match(/(\d+\.?\d*)\s*(plus|minus|times|multiplied by|divided by|x)\s*(\d+\.?\d*)/);
  if (m) {
    const a=parseFloat(m[1]), b=parseFloat(m[3]), op=m[2];
    let r;
    if(op==='plus') r=a+b;
    else if(op==='minus') r=a-b;
    else if(op==='times'||op==='multiplied by'||op==='x') r=a*b;
    else if(op==='divided by') r=b!==0?a/b:'undefined (division by zero)';
    return `**${a} ${op} ${b}** = **${typeof r==='number'?parseFloat(r.toFixed(8)):r}**`;
  }
  // "square root of X"
  m = lower.match(/(?:square\s*root|sqrt)\s*(?:of)?\s*(\d+\.?\d*)/);
  if (m) { return `**√${m[1]}** = **${Math.sqrt(parseFloat(m[1])).toFixed(6)}**`; }
  // "X squared / cubed"
  m = lower.match(/(\d+\.?\d*)\s*(squared|cubed|to the power of\s*\d+)/);
  if (m) {
    const v=parseFloat(m[1]);
    if(m[2]==='squared') return `**${v}²** = **${v*v}**`;
    if(m[2]==='cubed') return `**${v}³** = **${v*v*v}**`;
    const p=m[2].match(/(\d+)/); if(p) return `**${v}^${p[1]}** = **${Math.pow(v,parseInt(p[1]))}**`;
  }
  // "how many X in Y"
  m = lower.match(/how\s*many\s*(seconds?|minutes?|hours?|days?|weeks?|months?|years?)\s*(?:in|are in)\s*(?:a|an|one)?\s*(seconds?|minutes?|hours?|days?|weeks?|months?|years?)/);
  if (m) {
    const conversions = {
      'second_minute':60,'minute_hour':60,'hour_day':24,'day_week':7,'day_month':30.44,'day_year':365.25,
      'week_month':4.348,'week_year':52.177,'month_year':12,
      'second_hour':3600,'second_day':86400,'second_week':604800,'second_year':31557600,
      'minute_day':1440,'minute_week':10080,'minute_year':525960,
      'hour_week':168,'hour_month':730,'hour_year':8766,
    };
    const a=m[1].replace(/s$/,''), b=m[2].replace(/s$/,'');
    const key=`${a}_${b}`;
    const keyR=`${b}_${a}`;
    if(conversions[key]) return `**1 ${b}** = **${conversions[key]} ${a}s**`;
    if(conversions[keyR]) return `**1 ${b}** contains **${conversions[keyR]} ${a}s**... wait, that's the other way around!\n\nThere are **${conversions[keyR]} ${a}s** in 1 **${b}**.`;
  }
  return null;
}

function tryDefinition(input) {
  const lower = input.toLowerCase().trim();
  const m = lower.match(/(?:what\s*(?:is|are)\s*(?:a|an|the)?\s*|define\s*|meaning\s*of\s*|explain\s*(?:what\s*)?(?:is\s*)?(?:a|an|the)?\s*)(.+?)[\?\.]*$/);
  if (!m) return null;
  const term = m[1].trim().toLowerCase();
  // Direct match
  if (definitions[term]) return `**${term.charAt(0).toUpperCase()+term.slice(1)}:** ${definitions[term]}`;
  // Fuzzy match
  for (const [key, val] of Object.entries(definitions)) {
    if (fuzzyMatch(term, key) >= 0.8) return `**${key.charAt(0).toUpperCase()+key.slice(1)}:** ${val}`;
  }
  return null;
}

// Follow-up detection
function tryFollowUp(input) {

}

    return "I'm here and ready! Ask me anything — a question, a coding task, a recipe, a fun fact, or just say hello in any of 40 languages!";
  }

  // Final fallback — still try to engage with the actual topic
  return `**${subject.charAt(0).toUpperCase() + subject.slice(1)}** — interesting topic!\n\n` +
    `I'll do my best to help. Here's what I can tell you:\n\n` +
    `While this specific topic isn't in my built-in knowledge base, I have deep expertise in:\n\n` +
    `- **Programming** — Python, JavaScript, HTML, and 15+ languages\n` +
    `- **Science** — physics, chemistry, biology, space, quantum mechanics\n` +
    `- **Math** — calculations, algebra, statistics, conversions\n` +
    `- **Cooking** — 15+ recipes including sarmale, mici, pasta, sushi, steak\n` +
    `- **History** — Egypt, Rome, World Wars, Renaissance\n` +
    `- **Languages** — chat in 40 languages\n` +
    `- **Fun** — jokes, riddles, chess, fun facts, motivation\n\n` +
    `💡 **For unlimited knowledge**, click ⚙️ and connect a free AI API (Groq is free!). Then I can answer **anything** — just like ChatGPT!`;
}

function getResponse(input){
  const trimmed = input.trim();
  if (!trimmed) return "Please type a message!";

  // Save to context
  conversationContext.push({role:'user', text:trimmed, time:Date.now()});
  if (conversationContext.length > 20) conversationContext.shift();

  const lower = trimmed.toLowerCase();

  // 1. Pure math expression
  if (/^[\d\s\+\-\*\/\(\)\.\^%×÷]+$/.test(trimmed) && /\d/.test(trimmed)) {
    const c = calculate(trimmed);
    if (c) return c;
  }

  // 2. Unit conversion ("100 km to miles")
  const conv = tryUnitConversion(trimmed);
  if (conv) return conv;

  // 3. Math word problems ("what is 15% of 200")
  const mathWord = tryMathWord(trimmed);
  if (mathWord) return mathWord;

  // 4. Follow-ups ("tell me more", "explain that")
  const followUp = tryFollowUp(trimmed);
  if (followUp) return followUp;

  // 5. Definition lookup ("what is an algorithm")
  const def = tryDefinition(trimmed);
  if (def) return def;

  // 6. Topic matching (main knowledge base)
  let best = 0, bestT = null;
  for (const t of topics) {
    const s = scoreTopic(trimmed, t);
    if (s > best) { best = s; bestT = t; }
  }
  if (best >= 6 && bestT) {
    lastTopicMatched = bestT;
    return getTopicResponse(bestT);
  }

  // 7. Help keyword
  if (lower.includes('help')) {
    return "I'm here to help! Here's what I can do:\n\n" +
      "- **\"What is [term]?\"** — 60+ built-in definitions\n" +
      "- **\"100 km to miles\"** — unit conversions\n" +
      "- **\"What is 20% of 350?\"** — math word problems\n" +
      "- **\"Tell me more\"** — expand on last answer\n" +
      "- **Code** in 15+ languages with download\n" +
      "- **Science, history, math, sports, music, animals, space, food & Romanian cuisine**\n" +
      "- **40 languages** — Spanish, French, German, Italian, Romanian, Dutch, Polish, Swedish, Norwegian, Greek, Czech, Hungarian, Japanese, Chinese, Korean, Arabic, Hindi, Thai, Vietnamese, and many more\n\n" +
      "💡 **Tip:** Click ⚙️ to connect a free AI API for unlimited intelligence!\n\nJust ask!";
  }

  // 8. Smart fallback — build a contextual response
  return buildSmartResponse(trimmed);
}

  text=text.replace(/\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)*)/g,(m,h,b)=>{

  });
  text=text.replace(/^- (.+)$/gm,'<li>$1</li>');
