<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe — Petru Tudorica</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: 'Roboto', system-ui, sans-serif;
    background: #1a1d29;
    color: #e8eaed;
    display: flex;
    flex-direction: column;
  }

  /* Site navbar */
  .site-nav {
    background: rgba(26,29,41,0.85);
    backdrop-filter: blur(10px);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 500;
    position: relative;
    flex-shrink: 0;
  }
  .site-nav a { color: #ccc; text-decoration: none; font-size: 14px; transition: color 0.2s; }
  .site-nav a:hover { color: #fff; }
  .site-nav .brand { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 16px; }
  .site-nav .brand img { width: 28px; height: 28px; }
  .site-nav .nav-links { display: flex; gap: 20px; align-items: center; }
  .site-nav .nav-links a:hover { color: #7caf5e; }

  .game-area { flex: 1; display: flex; align-items: center; justify-content: center; }

  .game-wrap { text-align: center; padding: 1rem; }

  h1 { margin: 0 0 1.5rem; font-size: 1.75rem; font-weight: 600; }

  .screen { margin: 0 auto; }
  .screen.hidden { display: none; }
  .screen p { margin: 0 0 1rem; color: #9aa0a6; }

  .turn-msg { margin-bottom: 1rem; font-weight: 500; }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    width: min(90vw, 280px);
    aspect-ratio: 1;
    margin: 0 auto 1rem;
    background: #252936;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  .cell {
    background: #1e2433;
    border: 2px solid rgba(255, 255, 255, 0.08);
    color: #e8eaed;
    font-size: 2rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cell:hover:not(:disabled) { background: #2e3344; }
  .cell:disabled { cursor: default; }
  .cell.x { color: #7caf5e; }
  .cell.o { color: #e8c547; }

  .btn-row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }

  .btn {
    padding: 0.5rem 1rem;
    font-size: 1rem;
    font-family: inherit;
    background: #252936;
    color: #e8eaed;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #2e3344; }

  .result { margin-bottom: 1rem; font-size: 1.25rem; font-weight: 600; }
  .result.hidden { display: none; }
  .result.win-x { color: #7caf5e; }
  .result.win-o { color: #e8c547; }
  .result.tie { color: #9aa0a6; }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="/" class="brand">
    <img src="/favicon.svg" alt="Home">
    Petru Tudorica
  </a>
  <div class="nav-links">
    <a href="/#projects">Games</a>
  </div>
</nav>

<div class="game-area">
<div class="game-wrap">
  <h1>Tic-Tac-Toe</h1>
  <div id="mode-screen" class="screen">
    <p>Two players or vs computer?</p>
    <div class="btn-row">
      <button type="button" class="btn" data-mode="2p">Two players</button>
      <button type="button" class="btn" data-mode="cpu">Vs computer</button>
    </div>
  </div>
  <div id="game-screen" class="screen hidden">
    <p id="turn-msg" class="turn-msg"></p>
    <div id="board" class="board" aria-label="Tic-tac-toe board">
      <button type="button" class="cell" data-idx="0"></button>
      <button type="button" class="cell" data-idx="1"></button>
      <button type="button" class="cell" data-idx="2"></button>
      <button type="button" class="cell" data-idx="3"></button>
      <button type="button" class="cell" data-idx="4"></button>
      <button type="button" class="cell" data-idx="5"></button>
      <button type="button" class="cell" data-idx="6"></button>
      <button type="button" class="cell" data-idx="7"></button>
      <button type="button" class="cell" data-idx="8"></button>
    </div>
    <div id="result" class="result hidden"></div>
    <div id="again-row" class="btn-row hidden">
      <button type="button" class="btn" id="btn-again">Play again</button>
      <button type="button" class="btn" id="btn-change-mode">Change mode</button>
    </div>
  </div>
</div>
</div>

<script>
(function () {
  'use strict';

  const LINES = [
    [0, 1, 2], [3, 4, 5], [6, 7, 8],
    [0, 3, 6], [1, 4, 7], [2, 5, 8],
    [0, 4, 8], [2, 4, 6]
  ];

  let board = ['', '', '', '', '', '', '', '', ''];
  let current = 'X';
  let vsComputer = false;
  let gameOver = false;

  const modeScreen = document.getElementById('mode-screen');
  const gameScreen = document.getElementById('game-screen');
  const turnMsg = document.getElementById('turn-msg');
  const boardEl = document.getElementById('board');
  const resultEl = document.getElementById('result');
  const againRow = document.getElementById('again-row');

  function getEmptyCells() {
    return board.map(function (c, i) { return c ? -1 : i; }).filter(function (i) { return i >= 0; });
  }

  function checkWinner() {
    for (var i = 0; i < LINES.length; i++) {
      var a = LINES[i][0], b = LINES[i][1], c = LINES[i][2];
      if (board[a] && board[a] === board[b] && board[b] === board[c]) return board[a];
    }
    return null;
  }

  function renderBoard() {
    var cells = boardEl.querySelectorAll('.cell');
    for (var i = 0; i < 9; i++) {
      var cell = cells[i];
      cell.textContent = board[i];
      cell.disabled = !!board[i] || gameOver;
      cell.className = 'cell' + (board[i] ? ' ' + board[i].toLowerCase() : '');
    }
  }

  function updateTurnMsg() {
    if (gameOver) return;
    if (current === 'X') {
      turnMsg.textContent = "Player X's turn";
    } else if (vsComputer) {
      turnMsg.textContent = "Computer (O) is thinking...";
    } else {
      turnMsg.textContent = "Player O's turn";
    }
  }

  function showResult(winner) {
    gameOver = true;
    resultEl.classList.remove('hidden');
    againRow.classList.remove('hidden');
    if (winner) {
      resultEl.textContent = winner + ' wins!';
      resultEl.className = 'result win-' + winner.toLowerCase();
    } else {
      resultEl.textContent = "It's a tie!";
      resultEl.className = 'result tie';
    }
    renderBoard();
  }

  function computerMove() {
    var empty = getEmptyCells();
    if (empty.length === 0) return;
    var idx = empty[Math.floor(Math.random() * empty.length)];
    board[idx] = 'O';
    afterMove();
  }

  function afterMove() {
    var winner = checkWinner();
    var empty = getEmptyCells();
    renderBoard();
    if (winner) { showResult(winner); return; }
    if (empty.length === 0) { showResult(null); return; }
    current = current === 'X' ? 'O' : 'X';
    updateTurnMsg();
    if (vsComputer && current === 'O') {
      setTimeout(computerMove, 400);
    }
  }

  function startGame(mode) {
    vsComputer = mode === 'cpu';
    board = ['', '', '', '', '', '', '', '', ''];
    current = 'X';
    gameOver = false;
    resultEl.classList.add('hidden');
    againRow.classList.add('hidden');
    resultEl.textContent = '';
    resultEl.className = 'result';
    modeScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
    updateTurnMsg();
    renderBoard();
  }

  function backToMode() {
    gameScreen.classList.add('hidden');
    modeScreen.classList.remove('hidden');
  }

  modeScreen.querySelectorAll('[data-mode]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      startGame(btn.getAttribute('data-mode'));
    });
  });

  boardEl.addEventListener('click', function (e) {
    var cell = e.target.closest('.cell');
    if (!cell || gameOver) return;
    var idx = parseInt(cell.getAttribute('data-idx'), 10);
    if (board[idx]) return;
    board[idx] = current;
    afterMove();
  });

  document.getElementById('btn-again').addEventListener('click', function () {
    startGame(vsComputer ? 'cpu' : '2p');
  });

  document.getElementById('btn-change-mode').addEventListener('click', backToMode);
})();
</script>
</body>
</html>
