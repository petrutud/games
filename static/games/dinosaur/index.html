<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinosaur Jump</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f7f7; font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  #wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  canvas { border: 3px solid #000; background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.2); display: block; }
  #info { font-size: 18px; font-weight: bold; text-align: center; }
  .back { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.5); color: #fff; text-decoration: none; padding: 8px 14px; border-radius: 6px; font-size: 14px; }
  .back:hover { background: rgba(0,0,0,0.7); }
  @media (max-width: 720px) {
    canvas { max-width: 100%; height: auto; }
  }
</style>
</head>
<body>
<a href="/" class="back">← Back</a>
<div id="wrap">
  <canvas id="gameCanvas" width="1200" height="400"></canvas>
  <div id="info">
    <div>SCORE: <span id="score">0</span> | HIGH: <span id="hiScore">0</span></div>
    <div style="font-size: 14px; margin-top: 8px; color: #666;">Press SPACE or TAP to jump</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const GROUND_Y = H - 80;

let score = 0;
let hiScore = localStorage.getItem('dino-hi') || 0;
let gameRunning = true;
let speed = 8;

const dino = { x: 100, y: GROUND_Y - 50, w: 40, h: 50, vy: 0, jumping: false };
let cacti = [];
let gameSpeed = 8;

document.getElementById('hiScore').textContent = hiScore;

function draw() {
  // Background
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();

  // Ground pattern
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 2;
  for (let x = (score / 2) % 30; x < W; x += 30) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(x + 15, GROUND_Y);
    ctx.stroke();
  }

  // Draw dinosaur
  drawDino();

  // Draw cacti
  for (let c of cacti) {
    drawCactus(c.x, c.y);
  }
}

function drawDino() {
  ctx.fillStyle = '#2d2d2d';
  // Body
  ctx.fillRect(dino.x + 8, dino.y + 15, 24, 28);
  // Head
  ctx.fillRect(dino.x + 18, dino.y, 22, 18);
  // Eye
  ctx.fillStyle = '#fff';
  ctx.fillRect(dino.x + 25, dino.y + 4, 6, 6);
  ctx.fillStyle = '#000';
  ctx.fillRect(dino.x + 27, dino.y + 5, 2, 4);
  // Legs
  ctx.fillStyle = '#2d2d2d';
  ctx.fillRect(dino.x + 10, dino.y + 43, 6, 18);
  ctx.fillRect(dino.x + 22, dino.y + 43, 6, 18);
  // Tail
  ctx.fillRect(dino.x, dino.y + 25, 10, 6);
  // Arms
  ctx.fillRect(dino.x + 8, dino.y + 23, 4, 10);
  ctx.fillRect(dino.x + 30, dino.y + 23, 4, 10);
}

function drawCactus(x, y) {
  ctx.fillStyle = '#6b8e23';
  ctx.fillRect(x + 8, y, 9, 40);
  ctx.fillRect(x + 2, y + 10, 8, 5);
  ctx.fillRect(x + 15, y + 10, 8, 5);
  ctx.fillRect(x + 1, y + 25, 7, 4);
  ctx.fillStyle = '#4a6b1a';
  for (let j = 0; j < 4; j++) {
    ctx.fillRect(x + 7, y + j * 10, 11, 2);
  }
}

function update() {
  // Physics
  dino.vy += 0.8;
  if (dino.vy > 20) dino.vy = 20;
  dino.y += dino.vy;

  // Ground collision
  if (dino.y + dino.h >= GROUND_Y) {
    dino.y = GROUND_Y - dino.h;
    dino.vy = 0;
    dino.jumping = false;
  }

  // Spawn cacti
  if (Math.random() < 0.02) {
    cacti.push({ x: W, y: GROUND_Y - 40, w: 25, h: 40 });
  }

  // Update cacti
  for (let i = cacti.length - 1; i >= 0; i--) {
    cacti[i].x -= gameSpeed;

    // Passed obstacle
    if (cacti[i].x + 25 < 0) {
      cacti.splice(i, 1);
      score += 10;
      document.getElementById('score').textContent = score;
      gameSpeed = Math.min(16, 8 + score / 1000);
      continue;
    }

    // Collision
    if (hitTest(dino, cacti[i])) {
      gameRunning = false;
      if (score > hiScore) {
        hiScore = score;
        localStorage.setItem('dino-hi', hiScore);
        document.getElementById('hiScore').textContent = hiScore;
      }
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2);
      ctx.font = 'bold 32px Arial';
      ctx.fillText('Score: ' + score, W / 2, H / 2 + 60);
      ctx.font = '18px Arial';
      ctx.fillText('Reload page to play again', W / 2, H / 2 + 110);
      return false;
    }
  }

  return true;
}

function hitTest(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function gameLoop() {
  draw();
  if (gameRunning) {
    if (update()) {
      requestAnimationFrame(gameLoop);
    }
  }
}

// Jump on space or click
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && gameRunning && !dino.jumping) {
    e.preventDefault();
    dino.vy = -16;
    dino.jumping = true;
  }
});

canvas.addEventListener('click', () => {
  if (gameRunning && !dino.jumping) {
    dino.vy = -16;
    dino.jumping = true;
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameRunning && !dino.jumping) {
    dino.vy = -16;
    dino.jumping = true;
  }
});

gameLoop();
</script>
</body>
</html>
