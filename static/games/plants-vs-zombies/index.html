            ctx.fillStyle = '#FF6F00'; ctx.beginPath(); ctx.arc(0,-20,5,0,Math.PI*2); ctx.fill();
        }
    } else if (t === 'threepeater') {
        ctx.fillStyle = '#33691E'; ctx.fillRect(-3, 5, 6, 22);
        for (let dy of [-12, 0, 12]) {
            ctx.fillStyle = '#558B2F'; ctx.beginPath(); ctx.arc(0, dy, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#33691E'; ctx.fillRect(8, dy-3, 10, 6);
        }
    } else if (t === 'spikeweed') {
        ctx.fillStyle = '#757575';
        for (let i = -2; i <= 2; i++) {
            ctx.beginPath(); ctx.moveTo(i*10, 10); ctx.lineTo(i*10-4, 25); ctx.lineTo(i*10+4, 25); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(i*10, -5); ctx.lineTo(i*10-4, -18); ctx.lineTo(i*10+4, -18); ctx.closePath(); ctx.fill();
        }
    } else if (t === 'torchwood') {
        ctx.fillStyle = '#5D4037'; ctx.fillRect(-8, -5, 16, 30);
        ctx.fillStyle = '#3E2723'; ctx.fillRect(-10, 20, 20, 8);
        // Flame
        const flicker = Math.sin(frame * 0.2) * 3;
        ctx.fillStyle = '#FF6F00'; ctx.beginPath(); ctx.arc(0, -10+flicker, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFAB00'; ctx.beginPath(); ctx.arc(0, -14+flicker, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFF176'; ctx.beginPath(); ctx.arc(0, -16+flicker, 3, 0, Math.PI*2); ctx.fill();
    } else if (t === 'cob') {
        ctx.fillStyle = '#33691E'; ctx.fillRect(-4, 5, 8, 20);
        ctx.fillStyle = '#F9A825'; ctx.beginPath(); ctx.ellipse(0, -2, 14, 22, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#F57F17';
        for (let r = -3; r <= 3; r++) for (let c = -1; c <= 1; c++) {
            ctx.fillRect(c*8-2, r*5-1, 5, 4);
        }
        ctx.fillStyle = '#33691E';
        ctx.beginPath(); ctx.moveTo(-6,-22); ctx.lineTo(0,-28); ctx.lineTo(6,-22); ctx.closePath(); ctx.fill();
    } else if (t === 'wintermelon') {
        ctx.fillStyle = '#2E7D32'; ctx.fillRect(-3, 10, 6, 16);
        ctx.fillStyle = '#43A047'; ctx.beginPath(); ctx.ellipse(0, 0, 20, 16, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#1B5E20'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-10,-5); ctx.lineTo(10,-5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-10,5); ctx.lineTo(10,5); ctx.stroke();
        // Ice cap
        ctx.fillStyle = 'rgba(100,200,255,0.5)'; ctx.beginPath(); ctx.arc(0,-8,12,Math.PI,0); ctx.fill();
    }
}

function drawZombie(z) {
    const isSlowed = z.slowed > 0;
    const bodyColor = isSlowed ? '#4FC3F7' : z.color;
    const headColor = isSlowed ? '#81D4FA' : (z.boss ? '#8B0000' : '#8B9B7A');

    // Body
    ctx.fillStyle = bodyColor; ctx.fillRect(-10, -5, 20, 30);
    // Head
    ctx.fillStyle = headColor; ctx.beginPath(); ctx.arc(0, -12, 13, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = z.enraged || z.boss ? '#F44336' : '#FFEB3B';
    ctx.beginPath(); ctx.arc(-5,-14,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-14,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-5,-14,1.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-14,1.8,0,Math.PI*2); ctx.fill();
    // Mouth
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0,-6,4,0,Math.PI); ctx.stroke();

    // Type decorations
    if (z.type === 'cone') {
        ctx.fillStyle = '#E65100';
        ctx.beginPath(); ctx.moveTo(0,-28); ctx.lineTo(-9,-10); ctx.lineTo(9,-10); ctx.closePath(); ctx.fill();
    } else if (z.type === 'bucket') {
        ctx.fillStyle = '#9E9E9E'; ctx.fillRect(-10,-26,20,16);
        ctx.fillStyle = '#757575'; ctx.fillRect(-12,-11,24,3);
    } else if (z.type === 'flag') {
        ctx.fillStyle = '#795548'; ctx.fillRect(7,-33,2,28);
        ctx.fillStyle = '#F44336'; ctx.fillRect(9,-33,14,9);
    } else if (z.type === 'newspaper' && !z.enraged) {
        ctx.fillStyle = '#E0E0E0'; ctx.fillRect(-14,-4,7,18);
    } else if (z.type === 'screen') {
        ctx.fillStyle = '#546E7A'; ctx.strokeStyle = '#37474F'; ctx.lineWidth = 2;
        ctx.strokeRect(-16,-24,12,38); ctx.strokeRect(-16,-12,12,12);
    } else if (z.type === 'football') {
        ctx.fillStyle = '#1B5E20'; ctx.fillRect(-13,-26,26,16); // helmet
        ctx.fillStyle = '#BDBDBD'; ctx.fillRect(-14,-14,28,3); // faceguard
        // Shoulder pads
        ctx.fillStyle = '#2E7D32'; ctx.fillRect(-16,-2,32,8);
    } else if (z.type === 'dancer') {
        ctx.fillStyle = '#CE93D8'; ctx.fillRect(-12,-26,24,3); // afro band
        ctx.fillStyle = '#7B1FA2';
        ctx.beginPath(); ctx.arc(0,-28,10,0,Math.PI*2); ctx.fill(); // afro
    } else if (z.type === 'digger') {
        ctx.fillStyle = '#FF6F00'; ctx.fillRect(-9,-28,18,5); // hardhat
        ctx.fillStyle = '#E65100'; ctx.beginPath(); ctx.arc(0,-28,4,0,Math.PI*2); ctx.fill(); // light
    } else if (z.type === 'pogo') {
        ctx.fillStyle = '#00897B';
        ctx.fillRect(-2, 25, 4, 20); // pogo stick
        ctx.fillRect(-8, 43, 16, 3);
    } else if (z.garg) {
        // Bigger arms
        ctx.fillStyle = headColor;
        ctx.fillRect(-18, -2, 8, 24); ctx.fillRect(10, -2, 8, 24);
        if (z.type === 'zombie_king') {
            // Crown
            ctx.fillStyle = '#FFD700';
            ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 8;
            ctx.beginPath(); ctx.moveTo(-10,-26); ctx.lineTo(-8,-20); ctx.lineTo(-4,-26);
            ctx.lineTo(0,-20); ctx.lineTo(4,-26); ctx.lineTo(8,-20); ctx.lineTo(10,-26);
            ctx.lineTo(10,-20); ctx.lineTo(-10,-20); ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0;
            // Cape
            ctx.fillStyle = '#B71C1C';
            ctx.fillRect(-14, -5, 28, 35);
            // Scepter
            ctx.fillStyle = '#FFD700'; ctx.fillRect(14, -5, 3, 30);
            ctx.fillStyle = '#E040FB'; ctx.beginPath(); ctx.arc(15.5, -8, 5, 0, Math.PI*2); ctx.fill();
        }
        if (z.type === 'zombot') {
            // Mech suit — Dr Zomboss
            ctx.fillStyle = '#546E7A'; ctx.fillRect(-20, -10, 40, 40); // mech body
            ctx.fillStyle = '#37474F'; ctx.fillRect(-24, -5, 8, 30); ctx.fillRect(16, -5, 8, 30); // mech arms
            // Glowing eyes
            ctx.fillStyle = '#f44'; ctx.shadowColor = '#f00'; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(-5, -18, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(5, -18, 4, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            // Antenna
            ctx.fillStyle = '#78909C'; ctx.fillRect(-1, -32, 2, 10);
            ctx.fillStyle = '#f44'; ctx.beginPath(); ctx.arc(0, -33, 3, 0, Math.PI*2); ctx.fill();
            // Exhaust
            if (frame % 10 < 5) {
                ctx.fillStyle = 'rgba(100,100,100,0.4)';
                ctx.beginPath(); ctx.arc(-20 - Math.random()*5, 25, 4+Math.random()*3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(20 + Math.random()*5, 25, 4+Math.random()*3, 0, Math.PI*2); ctx.fill();
            }
        }
        if (z.type === 'zombie_dragon') {
            // Dragon — wings, tail, fire eyes
            ctx.fillStyle = '#6A1B9A';
            // Wings
            let wingFlap = Math.sin(frame * 0.08) * 8;
            ctx.beginPath(); ctx.moveTo(-12, -5);
            ctx.lineTo(-30, -15 + wingFlap); ctx.lineTo(-25, 5 + wingFlap); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(12, -5);
            ctx.lineTo(30, -15 - wingFlap); ctx.lineTo(25, 5 - wingFlap); ctx.closePath(); ctx.fill();
            // Horns
            ctx.fillStyle = '#4A148C';
            ctx.beginPath(); ctx.moveTo(-6, -22); ctx.lineTo(-10, -34); ctx.lineTo(-2, -24); ctx.fill();
            ctx.beginPath(); ctx.moveTo(6, -22); ctx.lineTo(10, -34); ctx.lineTo(2, -24); ctx.fill();
            // Fire eyes
            ctx.fillStyle = '#FF6D00'; ctx.shadowColor = '#f60'; ctx.shadowBlur = 8;
            ctx.beginPath(); ctx.arc(-5, -18, 3.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(5, -18, 3.5, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            // Tail
            ctx.strokeStyle = '#4A148C'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, 25);
            ctx.quadraticCurveTo(15, 35 + Math.sin(frame*0.05)*5, 25, 30 + Math.sin(frame*0.07)*4);
            ctx.stroke();
            // Mouth fire
            if (frame % 40 < 10) {
                ctx.fillStyle = `rgba(255,100,0,${0.5+Math.random()*0.3})`;
                ctx.beginPath(); ctx.arc(0, -10, 6+Math.random()*3, 0, Math.PI*2); ctx.fill();
            }
        }
        if (z.type === 'zombie_giant') {
            // Just bigger garg with darker color
            ctx.fillStyle = '#263238';
            ctx.fillRect(-20, -3, 9, 26); ctx.fillRect(11, -3, 9, 26);
        }
    }

    // Arms (non-garg)
    if (!z.garg) {
        const armA = z.eating ? Math.sin(frame*0.1)*0.3 : 0;
        ctx.fillStyle = isSlowed ? '#81D4FA' : headColor;
        ctx.save(); ctx.translate(-11,2); ctx.rotate(-0.3+armA); ctx.fillRect(-2.5,0,5,16); ctx.restore();
        ctx.save(); ctx.translate(11,2); ctx.rotate(0.3-armA); ctx.fillRect(-2.5,0,5,16); ctx.restore();
    }

    // Legs
    ctx.fillStyle = '#4E342E';
    const legA = Math.sin(frame * 0.06 + z.animOffset) * 4;
    ctx.fillRect(-7, 25, 5, 13+legA); ctx.fillRect(2, 25, 5, 13-legA);
}

// ==================== MOUSE TRACKING ====================
let hoverCol = -1, hoverRow = -1, mouseX = 0, mouseY = 0;
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
    hoverCol = Math.floor((mouseX - GRID_X) / CELL_W);
    hoverRow = Math.floor((mouseY - GRID_Y) / CELL_H);
});

// ==================== MENU ====================
function buildMenu() {
    loadProgress();
    const grid = document.getElementById('level-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= 80; i++) {
        const btn = document.createElement('button');
        const t = getTheme(i);
        const unlocked = i <= unlockedLevels;
        const isBoss = i % 10 === 0;
        btn.style.cssText = `width:36px; height:36px; border:2px solid ${unlocked ? (isBoss ? '#F44336' : '#4CAF50') : '#333'};
            border-radius:4px; background:${unlocked ? (isBoss ? 'rgba(244,67,54,0.2)' : 'rgba(76,175,80,0.15)') : 'rgba(0,0,0,0.5)'};
            color:${unlocked ? '#fff' : '#555'}; cursor:${unlocked ? 'pointer' : 'default'};
            font-size:11px; font-weight:bold; transition:all 0.15s;`;
        btn.textContent = i;
        if (unlocked) {
            btn.onmouseover = () => { btn.style.transform = 'scale(1.15)'; btn.style.borderColor = '#FFD700'; };
            btn.onmouseout = () => { btn.style.transform = 'scale(1)'; btn.style.borderColor = isBoss ? '#F44336' : '#4CAF50'; };
            btn.onclick = () => startFromLevel(i);
        }
        grid.appendChild(btn);
    }
    hideAllScreens();
    document.getElementById('menu-screen').style.display = 'flex';
}

function getNextUnlocked() { return Math.min(unlockedLevels, 80); }
window.getNextUnlocked = getNextUnlocked;

function startFromLevel(lvl) {
    hideAllScreens();
    initLevel(lvl);
}
window.startFromLevel = startFromLevel;

function restartLevel() { startFromLevel(currentLevel); }
window.restartLevel = restartLevel;

function nextLevel() {
    if (currentLevel >= 80) { buildMenu(); return; }
    startFromLevel(currentLevel + 1);
}
window.nextLevel = nextLevel;

function goToMenu() { buildMenu(); }
window.goToMenu = goToMenu;

// ==================== GAME LOOP ====================
let playing = false;
function gameLoop() {
    if (document.getElementById('menu-screen').style.display !== 'flex') {
        update();
        draw();
    }
    requestAnimationFrame(gameLoop);
}

loadProgress();
buildMenu();
gameLoop();
</script>
</div><!-- end game-area-wrapper -->
</body>
