<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Pop! — Petru Tudorica</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&family=Roboto:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: #050816;
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    user-select: none;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Site navbar */
  .site-nav {
    background: rgba(5,8,22,0.85);
    backdrop-filter: blur(10px);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 500;
    position: relative;
    flex-shrink: 0;
  }
  .site-nav a {
    color: #ccc;
    text-decoration: none;
    font-family: 'Roboto', sans-serif;
    font-size: 14px;
    transition: color 0.2s;
  }
  .site-nav a:hover { color: #fff; }
  .site-nav .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
    font-size: 16px;
  }
  .site-nav .brand img {
    width: 28px;
    height: 28px;
  }
  .site-nav .nav-links {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .site-nav .nav-links a:hover { color: #ff6bc1; }

  /* Game area */
  .game-area {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
  }

  #game-wrapper {
    position: relative;
    width: 480px;
    height: calc(100vh - 44px);
    max-height: 720px;
    background: linear-gradient(180deg, rgba(8,10,40,0.9) 0%, rgba(15,10,50,0.85) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(120,60,255,0.25), 0 0 200px rgba(255,80,180,0.1), inset 0 0 60px rgba(0,0,0,0.5);
    z-index: 1;
  }

  canvas#game {
    display: block;
    width: 100%;
    height: 100%;
  }

  #hud {
    position: absolute;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
    z-index: 10;
    gap: 8px;
  }

  #hud h1 {
    font-family: 'Fredoka One', cursive;
    color: #fff;
    font-size: 22px;
    background: linear-gradient(135deg, #ff6bc1, #7c5cfc, #4ac4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 12px rgba(255,100,200,0.6));
  }

  .stat {
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-shadow: 0 0 10px rgba(100,200,255,0.5);
  }

  #level-display, #score-display, #shots-display {
    background: rgba(255,255,255,0.08);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  #shots-display.low {
    border-color: rgba(255,80,80,0.4);
    background: rgba(255,40,40,0.15);
    animation: shotPulse 0.8s ease-in-out infinite;
  }

  @keyframes shotPulse {
    0%, 100% { box-shadow: 0 0 0 rgba(255,60,60,0); }
    50% { box-shadow: 0 0 12px rgba(255,60,60,0.4); }
  }

  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(5,8,22,0.85);
    backdrop-filter: blur(12px);
    z-index: 20;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    animation: overlayIn 0.4s ease-out;
  }

  @keyframes overlayIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .overlay.active { display: flex; }

  .overlay h2 {
    font-family: 'Fredoka One', cursive;
    color: #fff;
    font-size: 46px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ff6bc1, #ffd700, #4ac4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(255,100,200,0.5));
  }

  .overlay p {
    color: #c0c0d0;
    font-size: 18px;
    margin-bottom: 6px;
    font-weight: 700;
  }

  .overlay .big-score {
    font-family: 'Fredoka One', cursive;
    font-size: 32px;
    color: #ffd700;
    text-shadow: 0 0 25px rgba(255,215,0,0.6), 0 0 50px rgba(255,215,0,0.2);
    margin: 10px 0;
  }

  .overlay .sub-info {
    font-size: 14px;
    color: #999;
    margin-top: 4px;
  }

  #win-stars {
    font-size: 40px;
    margin: 10px 0;
    animation: starBounce 1.5s ease-in-out infinite;
    filter: drop-shadow(0 0 15px rgba(255,215,0,0.6));
  }

  @keyframes starBounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  #game-over h2 {
    background: linear-gradient(135deg, #ff4a6e, #ff8844);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(255,74,110,0.5));
  }

  #you-win h2 {
    font-size: 52px;
    background: linear-gradient(135deg, #ffd700, #ff6bc1, #4ac4ff, #50e87e);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: winGradient 3s ease infinite;
    filter: drop-shadow(0 0 25px rgba(255,215,0,0.5));
  }

  @keyframes winGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  #you-win button, #game-over button {
    font-size: 22px;
    padding: 16px 60px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .overlay button {
    margin-top: 22px;
    padding: 15px 50px;
    font-size: 18px;
    font-family: 'Fredoka One', cursive;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff6bc1, #7c5cfc);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 25px rgba(255,100,200,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 1px;
  }

  .overlay button:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 35px rgba(255,100,200,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
  }

  .pop-text {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    pointer-events: none;
    text-shadow: 0 0 12px currentColor;
    animation: popFloat 0.9s ease-out forwards;
    z-index: 15;
  }

  @keyframes popFloat {
    0% { opacity: 1; transform: translateY(0) scale(0.5); }
    20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-70px) scale(0.8); }
  }

  .combo-text {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    font-size: 36px;
    pointer-events: none;
    left: 50%;
    top: 45%;
    transform: translate(-50%, -50%) scale(0.5);
    text-shadow: 0 0 30px currentColor;
    animation: comboIn 1.2s ease-out forwards;
    z-index: 15;
  }

  @keyframes comboIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(-10deg); }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(3deg); }
    30% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -60%) scale(0.9); }
  }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="/" class="brand">
    <img src="/favicon.svg" alt="Home">
    Petru Tudorica
  </a>
  <div class="nav-links">
    <a href="/#projects">Games</a>
  </div>
</nav>

<div class="game-area">
<canvas id="bg-canvas"></canvas>

<div id="game-wrapper">
  <div id="hud">
    <h1>Bubble Pop!</h1>
    <span class="stat" id="level-display">Lv 1/30</span>
    <span class="stat" id="shots-display">Shots: 20</span>
    <span class="stat" id="score-display">Score: 0</span>
  </div>

  <canvas id="game"></canvas>

  <div class="overlay" id="level-complete">
    <h2>Level Clear!</h2>
    <p id="lc-score" class="big-score"></p>
    <p id="lc-next"></p>
    <p id="lc-info" style="font-size:14px; color:#888;"></p>
    <button id="next-btn">Next Level</button>
  </div>

  <div class="overlay" id="game-over">
    <h2>Game Over</h2>
    <p id="go-reason"></p>
    <p id="go-score" class="big-score"></p>
    <button id="retry-btn">Restart</button>
  </div>

  <div class="overlay" id="you-win">
    <h2>Champion!</h2>
    <p>You cleared all 30 levels!</p>
    <p id="win-score" class="big-score"></p>
    <div id="win-stars"></div>
    <button id="replay-btn">Restart</button>
  </div>
</div>
</div>

<script>
// Background Starfield
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let stars = [];

function initBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      r: Math.random() * 1.8 + 0.3,
      speed: Math.random() * 0.3 + 0.05,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.01 + Math.random() * 0.03
    });
  }
}

function drawBg() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  const t = Date.now() * 0.0002;
  const grd1 = bgCtx.createRadialGradient(
    bgCanvas.width * 0.3 + Math.sin(t) * 50, bgCanvas.height * 0.4, 0,
    bgCanvas.width * 0.3, bgCanvas.height * 0.4, bgCanvas.width * 0.4
  );
  grd1.addColorStop(0, 'rgba(100,30,180,0.08)');
  grd1.addColorStop(1, 'rgba(0,0,0,0)');
  bgCtx.fillStyle = grd1;
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

  const grd2 = bgCtx.createRadialGradient(
    bgCanvas.width * 0.7 + Math.cos(t * 1.3) * 40, bgCanvas.height * 0.6, 0,
    bgCanvas.width * 0.7, bgCanvas.height * 0.6, bgCanvas.width * 0.35
  );
  grd2.addColorStop(0, 'rgba(255,50,120,0.06)');
  grd2.addColorStop(1, 'rgba(0,0,0,0)');
  bgCtx.fillStyle = grd2;
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

  for (const s of stars) {
    s.y -= s.speed;
    s.twinkle += s.twinkleSpeed;
    if (s.y < -2) { s.y = bgCanvas.height + 2; s.x = Math.random() * bgCanvas.width; }
    const alpha = 0.4 + Math.sin(s.twinkle) * 0.35;
    bgCtx.globalAlpha = alpha;
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.fillStyle = '#fff';
    bgCtx.fill();
  }
  bgCtx.globalAlpha = 1;
}

initBg();
window.addEventListener('resize', initBg);

// Game
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('game-wrapper');

const scoreEl = document.getElementById('score-display');
const levelEl = document.getElementById('level-display');
const shotsEl = document.getElementById('shots-display');
const lcOverlay = document.getElementById('level-complete');
const goOverlay = document.getElementById('game-over');
const winOverlay = document.getElementById('you-win');

const COLS = 12;
const MAX_LEVEL = 30;
const HUD_HEIGHT = 48;

let W, H, R;
let grid = [];
let flyingBubbles = [];
let particles = [];
let fallingBubbles = [];
let score = 0;
let level = 1;
let shooterAngle = -Math.PI / 2;
let currentColor = 0;
let nextColor = 0;
let canShoot = true;
let gameActive = false;
let dangerLineY = 0;
let frameCount = 0;
let shakeX = 0, shakeY = 0, shakePower = 0;
let comboCount = 0;
let shotsLeft = 0;
let maxShots = 0;

const COLORS_HSL = [
  { h: 345, s: 100, l: 65 },
  { h: 200, s: 100, l: 65 },
  { h: 145, s: 80,  l: 55 },
  { h: 45,  s: 100, l: 60 },
  { h: 270, s: 80,  l: 70 },
  { h: 20,  s: 100, l: 62 },
];

function hsl(h, s, l, a) {
  return a !== undefined ? `hsla(${h},${s}%,${l}%,${a})` : `hsl(${h},${s}%,${l}%)`;
}

function resize() {
  const rect = wrapper.getBoundingClientRect();
  W = canvas.width = rect.width;
  H = canvas.height = rect.height;
  R = Math.floor(W / (COLS * 2));
  dangerLineY = H - R * 5;
}
resize();
window.addEventListener('resize', resize);

function bubbleX(row, col) { return R + col * R * 2 + ((row % 2 === 1) ? R : 0); }
function bubbleY(row) { return HUD_HEIGHT + R + row * R * 1.73; }
function colCount(row) { return (row % 2 === 1) ? COLS - 1 : COLS; }

function initGrid() {
  grid = [];
  const numColors = Math.min(3 + Math.floor((level - 1) / 5), COLORS_HSL.length);
  const startRows = Math.min(3 + Math.floor((level - 1) * 0.33), 12);
  for (let r = 0; r < 20; r++) {
    grid[r] = [];
    const cc = colCount(r);
    for (let c = 0; c < cc; c++) {
      if (r < startRows) {
        if (level >= 15 && Math.random() < 0.08) grid[r][c] = -1;
        else grid[r][c] = Math.floor(Math.random() * numColors);
      } else {
        grid[r][c] = -1;
      }
    }
  }
}

function getActiveColors() {
  const s = new Set();
  for (let r = 0; r < grid.length; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r] && grid[r][c] >= 0) s.add(grid[r][c]);
  return [...s];
}

function pickColor() {
  const active = getActiveColors();
  return active.length === 0 ? 0 : active[Math.floor(Math.random() * active.length)];
}

function getNeighbors(row, col) {
  const n = [];
  const even = row % 2 === 0;
  if (even) {
    n.push([row,col-1],[row,col+1],[row-1,col-1],[row-1,col],[row+1,col-1],[row+1,col]);
  } else {
    n.push([row,col-1],[row,col+1],[row-1,col],[row-1,col+1],[row+1,col],[row+1,col+1]);
  }
  return n.filter(([r, c]) => r >= 0 && r < grid.length && c >= 0 && c < colCount(r));
}

function findCluster(row, col, color) {
  const visited = new Set();
  const stack = [[row, col]];
  const cluster = [];
  while (stack.length) {
    const [r, c] = stack.pop();
    const key = r + ',' + c;
    if (visited.has(key)) continue;
    visited.add(key);
    if (!grid[r] || grid[r][c] !== color) continue;
    cluster.push([r, c]);
    for (const [nr, nc] of getNeighbors(r, c))
      if (!visited.has(nr + ',' + nc)) stack.push([nr, nc]);
  }
  return cluster;
}

function findFloating() {
  const visited = new Set();
  const queue = [];
  for (let c = 0; c < colCount(0); c++) {
    if (grid[0] && grid[0][c] >= 0) { queue.push([0, c]); visited.add('0,' + c); }
  }
  while (queue.length) {
    const [r, c] = queue.shift();
    for (const [nr, nc] of getNeighbors(r, c)) {
      const key = nr + ',' + nc;
      if (!visited.has(key) && grid[nr] && grid[nr][nc] >= 0) { visited.add(key); queue.push([nr, nc]); }
    }
  }
  const floating = [];
  for (let r = 0; r < grid.length; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r] && grid[r][c] >= 0 && !visited.has(r + ',' + c)) floating.push([r, c]);
  return floating;
}

function snapToGrid(x, y) {
  let bestR = 0, bestC = 0, bestDist = Infinity;
  for (let r = 0; r < 18; r++) {
    const cc = colCount(r);
    for (let c = 0; c < cc; c++) {
      if (grid[r] && grid[r][c] >= 0) continue;
      const d = Math.hypot(x - bubbleX(r, c), y - bubbleY(r));
      if (d < bestDist) { bestDist = d; bestR = r; bestC = c; }
    }
  }
  return [bestR, bestC];
}

function spawnParticles(x, y, colorIdx, count) {
  const c = COLORS_HSL[colorIdx];
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1, r: 1.5 + Math.random() * 3.5, life: 1, h: c.h, s: c.s, l: c.l, type: 'circle' });
  }
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI * 2 / 6) * i;
    particles.push({ x: x + Math.cos(a) * R * 0.5, y: y + Math.sin(a) * R * 0.5, vx: Math.cos(a) * 1.5, vy: Math.sin(a) * 1.5, r: 1, life: 0.7, h: 0, s: 0, l: 100, type: 'star' });
  }
}

function spawnFallingBubble(x, y, colorIdx) {
  fallingBubbles.push({ x, y, vx: (Math.random() - 0.5) * 3, vy: -2 - Math.random() * 3, r: R * 0.9, colorIdx, life: 1, rot: 0, rotSpeed: (Math.random() - 0.5) * 0.2 });
}

function showPopText(x, y, text, colorIdx) {
  const c = COLORS_HSL[colorIdx];
  const el = document.createElement('div');
  el.className = 'pop-text';
  el.textContent = text;
  el.style.left = (x / W * 100) + '%';
  el.style.top = (y / H * 100) + '%';
  el.style.color = hsl(c.h, c.s, c.l);
  wrapper.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function showCombo(count) {
  const labels = ['', '', '', 'Nice!', 'Great!', 'Amazing!', 'INCREDIBLE!', 'UNSTOPPABLE!'];
  const text = count >= labels.length ? 'GODLIKE!' : labels[count];
  if (!text) return;
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.textContent = text;
  const hue = (count * 40) % 360;
  el.style.color = hsl(hue, 100, 70);
  wrapper.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function triggerShake(power) { shakePower = power; }

function shoot() {
  if (!canShoot || !gameActive || shotsLeft <= 0) return;
  canShoot = false;
  shotsLeft--;
  updateShotsDisplay();
  const sx = W / 2;
  const sy = H - R * 2.5;
  const speed = 13;
  flyingBubbles.push({ x: sx, y: sy, vx: Math.cos(shooterAngle) * speed, vy: Math.sin(shooterAngle) * speed, color: currentColor, r: R * 0.9, trail: [] });
  currentColor = nextColor;
  nextColor = pickColor();
}

function isBoardClear() {
  for (let r = 0; r < grid.length; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r] && grid[r][c] >= 0) return false;
  return true;
}

function isBoardTooLow() {
  for (let r = 0; r < grid.length; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r] && grid[r][c] >= 0 && bubbleY(r) > dangerLineY) return true;
  return false;
}

function calcMaxShots() {
  let bubbleCount = 0;
  for (let r = 0; r < grid.length; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r] && grid[r][c] >= 0) bubbleCount++;
  const generosity = 1.0 - (level - 1) * 0.012;
  return Math.max(10, Math.ceil(bubbleCount * generosity * 0.5));
}

function updateShotsDisplay() {
  shotsEl.textContent = 'Shots: ' + shotsLeft;
  if (shotsLeft <= 5) shotsEl.classList.add('low');
  else shotsEl.classList.remove('low');
}

function startLevel() {
  initGrid();
  flyingBubbles = [];
  particles = [];
  fallingBubbles = [];
  canShoot = true;
  gameActive = true;
  comboCount = 0;
  maxShots = calcMaxShots();
  shotsLeft = maxShots;
  currentColor = pickColor();
  nextColor = pickColor();
  levelEl.textContent = 'Lv ' + level + '/' + MAX_LEVEL;
  updateShotsDisplay();
  lcOverlay.classList.remove('active');
  goOverlay.classList.remove('active');
  winOverlay.classList.remove('active');
}

function startGame() {
  score = 0;
  level = 1;
  scoreEl.textContent = 'Score: 0';
  startLevel();
}

document.getElementById('next-btn').addEventListener('click', () => { level++; startLevel(); });
document.getElementById('retry-btn').addEventListener('click', startGame);
document.getElementById('replay-btn').addEventListener('click', startGame);

function aimAt(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const mx = (clientX - rect.left) * (W / rect.width);
  const my = (clientY - rect.top) * (H / rect.height);
  let angle = Math.atan2(my - (H - R * 2.5), mx - W / 2);
  angle = Math.max(-Math.PI + 0.15, Math.min(-0.15, angle));
  shooterAngle = angle;
}

canvas.addEventListener('mousemove', (e) => aimAt(e.clientX, e.clientY));
canvas.addEventListener('click', (e) => { aimAt(e.clientX, e.clientY); shoot(); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); aimAt(e.changedTouches[0].clientX, e.changedTouches[0].clientY); });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); aimAt(e.changedTouches[0].clientX, e.changedTouches[0].clientY); });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); shoot(); });

function update() {
  frameCount++;
  if (shakePower > 0) {
    shakeX = (Math.random() - 0.5) * shakePower;
    shakeY = (Math.random() - 0.5) * shakePower;
    shakePower *= 0.85;
    if (shakePower < 0.3) { shakePower = 0; shakeX = 0; shakeY = 0; }
  }
  if (!gameActive) return;

  for (let i = flyingBubbles.length - 1; i >= 0; i--) {
    const b = flyingBubbles[i];
    b.x += b.vx;
    b.y += b.vy;
    b.trail.push({ x: b.x, y: b.y, life: 1 });
    if (b.trail.length > 8) b.trail.shift();
    if (b.x - b.r < 0) { b.x = b.r; b.vx *= -1; }
    if (b.x + b.r > W) { b.x = W - b.r; b.vx *= -1; }
    if (b.y - b.r < HUD_HEIGHT) { b.y = HUD_HEIGHT + b.r; placeBubble(b, i); continue; }
    let hit = false;
    for (let r = 0; r < grid.length && !hit; r++) {
      for (let c = 0; c < colCount(r) && !hit; c++) {
        if (!grid[r] || grid[r][c] < 0) continue;
        if (Math.hypot(b.x - bubbleX(r, c), b.y - bubbleY(r)) < R * 1.8) { hit = true; placeBubble(b, i); }
      }
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.022;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = fallingBubbles.length - 1; i >= 0; i--) {
    const f = fallingBubbles[i];
    f.x += f.vx; f.y += f.vy; f.vy += 0.25; f.rot += f.rotSpeed; f.life -= 0.015;
    if (f.life <= 0 || f.y > H + 50) fallingBubbles.splice(i, 1);
  }
}

function placeBubble(b, index) {
  flyingBubbles.splice(index, 1);
  const [r, c] = snapToGrid(b.x, b.y);
  if (!grid[r]) { grid[r] = []; for (let i = 0; i < colCount(r); i++) grid[r][i] = -1; }
  grid[r][c] = b.color;
  const cluster = findCluster(r, c, b.color);
  let popped = 0;
  if (cluster.length >= 3) {
    comboCount++;
    for (const [cr, cc] of cluster) {
      const bx = bubbleX(cr, cc); const by = bubbleY(cr);
      spawnParticles(bx, by, grid[cr][cc], 10);
      grid[cr][cc] = -1; popped++;
    }
    const floating = findFloating();
    for (const [fr, fc] of floating) {
      const bx = bubbleX(fr, fc); const by = bubbleY(fr);
      spawnFallingBubble(bx, by, grid[fr][fc]);
      spawnParticles(bx, by, grid[fr][fc], 5);
      grid[fr][fc] = -1; popped++;
    }
    const pts = popped * 10 + (popped > 3 ? (popped - 3) * 15 : 0) + (comboCount > 1 ? comboCount * 20 : 0);
    score += pts;
    scoreEl.textContent = 'Score: ' + score;
    showPopText(bubbleX(r, c), bubbleY(r), '+' + pts, b.color);
    if (popped >= 5) showCombo(Math.min(popped, 8));
    triggerShake(Math.min(popped * 2, 12));
  } else { comboCount = 0; }

  if (isBoardClear()) {
    gameActive = false;
    score += level * 100;
    scoreEl.textContent = 'Score: ' + score;
    triggerShake(15);
    for (let i = 0; i < 60; i++) {
      particles.push({ x: Math.random() * W, y: H * 0.5, vx: (Math.random() - 0.5) * 8, vy: -3 - Math.random() * 8, r: 2 + Math.random() * 3, life: 1.2, h: Math.random() * 360, s: 100, l: 70, type: 'circle' });
    }
    if (level >= MAX_LEVEL) {
      document.getElementById('win-score').textContent = 'Score: ' + score;
      document.getElementById('win-stars').textContent = '\u2b50\u2b50\u2b50';
      setTimeout(() => winOverlay.classList.add('active'), 800);
    } else {
      document.getElementById('lc-score').textContent = 'Score: ' + score;
      document.getElementById('lc-next').textContent = 'Get ready for Level ' + (level + 1) + '!';
      const nc = Math.min(3 + Math.floor(level / 5), COLORS_HSL.length);
      const nr = Math.min(3 + Math.floor(level * 0.33), 12);
      const shotsUsed = maxShots - shotsLeft;
      document.getElementById('lc-info').textContent = nc + ' colors \u2022 ' + nr + ' rows \u2022 Used ' + shotsUsed + '/' + maxShots + ' shots';
      setTimeout(() => lcOverlay.classList.add('active'), 600);
    }
    return;
  }
  if (isBoardTooLow()) {
    gameActive = false;
    document.getElementById('go-reason').textContent = 'Bubbles reached the danger zone!';
    document.getElementById('go-score').textContent = 'Score: ' + score;
    triggerShake(10);
    setTimeout(() => goOverlay.classList.add('active'), 500);
    return;
  }
  if (shotsLeft <= 0 && !isBoardClear()) {
    gameActive = false;
    document.getElementById('go-reason').textContent = 'Out of shots!';
    document.getElementById('go-score').textContent = 'Score: ' + score;
    triggerShake(8);
    setTimeout(() => goOverlay.classList.add('active'), 500);
    return;
  }
  canShoot = true;
}

function drawBubble(x, y, colorIdx, radius, alpha) {
  const c = COLORS_HSL[colorIdx];
  if (!c) return;
  alpha = alpha || 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  const glowGrad = ctx.createRadialGradient(x, y, radius * 0.3, x, y, radius * 1.6);
  glowGrad.addColorStop(0, hsl(c.h, c.s, c.l, 0.15));
  glowGrad.addColorStop(1, hsl(c.h, c.s, c.l, 0));
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(x, y, radius * 1.6, 0, Math.PI * 2); ctx.fill();
  const grad = ctx.createRadialGradient(x - radius * 0.25, y - radius * 0.3, radius * 0.1, x, y, radius);
  grad.addColorStop(0, hsl(c.h, c.s, Math.min(c.l + 25, 90), 0.95));
  grad.addColorStop(0.5, hsl(c.h, c.s, c.l, 0.85));
  grad.addColorStop(1, hsl(c.h, c.s, Math.max(c.l - 15, 30), 0.9));
  ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();
  ctx.lineWidth = 1.5; ctx.strokeStyle = hsl(c.h, c.s, c.l + 15, 0.5); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x - radius * 0.2, y - radius * 0.35, radius * 0.35, radius * 0.18, -0.3, 0, Math.PI * 2);
  const shineGrad = ctx.createRadialGradient(x - radius * 0.2, y - radius * 0.35, 0, x - radius * 0.2, y - radius * 0.35, radius * 0.35);
  shineGrad.addColorStop(0, 'rgba(255,255,255,0.55)');
  shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shineGrad; ctx.fill();
  ctx.beginPath(); ctx.arc(x + radius * 0.25, y + radius * 0.2, radius * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(shakeX, shakeY);

  ctx.save(); ctx.globalAlpha = 0.03;
  for (let r = 0; r < 18; r++) {
    for (let c = 0; c < colCount(r); c++) {
      ctx.beginPath(); ctx.arc(bubbleX(r, c), bubbleY(r), R * 0.4, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.5; ctx.stroke();
    }
  }
  ctx.restore();

  const dangerGrad = ctx.createLinearGradient(0, dangerLineY - 20, 0, dangerLineY + 10);
  dangerGrad.addColorStop(0, 'rgba(255,40,40,0)');
  dangerGrad.addColorStop(1, 'rgba(255,40,40,0.08)');
  ctx.fillStyle = dangerGrad;
  ctx.fillRect(0, dangerLineY - 20, W, H - dangerLineY + 20);
  ctx.save();
  const dangerPulse = 0.2 + Math.sin(frameCount * 0.05) * 0.15;
  ctx.setLineDash([10, 8]);
  ctx.lineDashOffset = -frameCount * 0.5;
  ctx.strokeStyle = `rgba(255,60,60,${dangerPulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, dangerLineY); ctx.lineTo(W, dangerLineY); ctx.stroke();
  ctx.restore();

  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < colCount(r); c++) {
      if (grid[r] && grid[r][c] >= 0) {
        const wobble = Math.sin(frameCount * 0.03 + r * 0.5 + c * 0.3) * 0.8;
        drawBubble(bubbleX(r, c), bubbleY(r) + wobble, grid[r][c], R * 0.9);
      }
    }
  }

  for (const f of fallingBubbles) {
    ctx.save(); ctx.globalAlpha = f.life; ctx.translate(f.x, f.y); ctx.rotate(f.rot);
    drawBubble(0, 0, f.colorIdx, f.r * f.life); ctx.restore();
  }

  for (const b of flyingBubbles) {
    for (let t = 0; t < b.trail.length; t++) {
      const tr = b.trail[t]; tr.life -= 0.12;
      if (tr.life > 0) {
        const c = COLORS_HSL[b.color];
        ctx.globalAlpha = tr.life * 0.3;
        ctx.beginPath(); ctx.arc(tr.x, tr.y, b.r * tr.life * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = hsl(c.h, c.s, c.l); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    drawBubble(b.x, b.y, b.color, b.r);
  }

  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    if (p.type === 'star') {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(frameCount * 0.1);
      ctx.beginPath();
      for (let i = 0; i < 4; i++) { const a = (Math.PI / 2) * i; ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a) * p.r * 3, Math.sin(a) * p.r * 3); }
      ctx.strokeStyle = hsl(p.h, p.s, p.l); ctx.lineWidth = 1; ctx.stroke(); ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = hsl(p.h, p.s, p.l); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  const sx = W / 2;
  const sy = H - R * 2.5;
  const platGrad = ctx.createRadialGradient(sx, sy + R * 1.5, 0, sx, sy + R * 1.5, R * 4);
  platGrad.addColorStop(0, 'rgba(120,80,255,0.12)');
  platGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = platGrad;
  ctx.fillRect(0, sy - R, W, H - sy + R);

  ctx.save();
  ctx.beginPath();
  ctx.ellipse(sx, H - R * 0.3, W * 0.35, R * 1.2, 0, Math.PI, 0);
  const arcGrad = ctx.createLinearGradient(sx - W * 0.35, 0, sx + W * 0.35, 0);
  arcGrad.addColorStop(0, 'rgba(100,60,200,0)');
  arcGrad.addColorStop(0.5, 'rgba(100,60,200,0.15)');
  arcGrad.addColorStop(1, 'rgba(100,60,200,0)');
  ctx.fillStyle = arcGrad; ctx.fill(); ctx.restore();

  ctx.save();
  const aimLen = 180;
  const dotCount = 12;
  for (let i = 1; i <= dotCount; i++) {
    const t = i / dotCount;
    const dx = sx + Math.cos(shooterAngle) * aimLen * t;
    const dy = sy + Math.sin(shooterAngle) * aimLen * t;
    ctx.globalAlpha = (1 - t) * 0.4;
    ctx.beginPath(); ctx.arc(dx, dy, 2.5 - t * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
  }
  ctx.restore();

  ctx.save(); ctx.translate(sx, sy); ctx.rotate(shooterAngle);
  ctx.beginPath(); ctx.roundRect(-4, -6, R * 1.8, 12, 4);
  const barrelGrad = ctx.createLinearGradient(0, -6, 0, 6);
  barrelGrad.addColorStop(0, 'rgba(180,160,220,0.5)');
  barrelGrad.addColorStop(0.5, 'rgba(100,80,160,0.6)');
  barrelGrad.addColorStop(1, 'rgba(60,40,100,0.5)');
  ctx.fillStyle = barrelGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(200,180,255,0.3)'; ctx.lineWidth = 1; ctx.stroke(); ctx.restore();

  ctx.save();
  ctx.beginPath(); ctx.arc(sx, sy, R * 1.15, 0, Math.PI * 2);
  const baseGrad = ctx.createRadialGradient(sx, sy - R * 0.3, 0, sx, sy, R * 1.15);
  baseGrad.addColorStop(0, 'rgba(150,120,255,0.25)');
  baseGrad.addColorStop(1, 'rgba(80,50,150,0.15)');
  ctx.fillStyle = baseGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(200,180,255,0.2)'; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();

  if (gameActive) {
    drawBubble(sx, sy, currentColor, R * 0.85);
    drawBubble(sx - R * 3, sy + R * 0.3, nextColor, R * 0.55, 0.5);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '600 10px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('NEXT', sx - R * 3, sy + R * 0.3 + R + 6);
    const dotR = 3;
    const maxDots = Math.min(shotsLeft, 20);
    const dotStartX = sx + R * 3;
    const dotStartY = sy + R * 0.8;
    for (let i = 0; i < maxDots; i++) {
      const col = Math.floor(i / 5);
      const row = i % 5;
      const dx = dotStartX + col * (dotR * 3);
      const dy = dotStartY - row * (dotR * 3);
      ctx.globalAlpha = shotsLeft <= 5 ? 0.5 + Math.sin(frameCount * 0.1 + i) * 0.3 : 0.5;
      ctx.beginPath(); ctx.arc(dx, dy, dotR, 0, Math.PI * 2);
      ctx.fillStyle = shotsLeft <= 5 ? '#ff4a6e' : '#4ac4ff'; ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (shotsLeft > 20) {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = '600 9px Nunito, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('+' + (shotsLeft - 20), dotStartX + Math.ceil(20 / 5) * dotR * 3 + 2, dotStartY);
    }
  }

  ctx.restore();
}

function loop() {
  drawBg();
  update();
  draw();
  requestAnimationFrame(loop);
}

startGame();
loop();
</script>
