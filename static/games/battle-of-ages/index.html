body{background:#0a0a0f;color:#fff;font-family:'Rajdhani','Segoe UI',sans-serif;

.site-nav a{color:#ccc;text-decoration:none;font-family:'Roboto',sans-serif;font-size:14px;transition:color 0.2s}

.site-nav .brand{display:flex;align-items:center;gap:10px;font-weight:500;font-size:16px}
.site-nav .brand img{width:28px;height:28px}
.site-nav .nav-links{display:flex;gap:20px;align-items:center}
.site-nav .nav-links a:hover{color:#ffd700}

#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

.site-footer a{color:rgba(255,255,255,0.5);text-decoration:none}
.site-footer a:hover{color:#fff}

.age-title{font-family:'Cinzel',serif;font-size:20px;font-weight:900;letter-spacing:1px;

.era-label{font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase}
.gold-display{font-size:22px;color:#ffd700;font-weight:700;text-shadow:0 0 10px rgba(255,215,0,0.4)}
.progress-wrap{width:120px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin-top:4px;overflow:hidden}

.progress-text{font-size:10px;color:#777;text-align:center;margin-top:2px}

.hp-wrap.left{left:16px}.hp-wrap.right{right:16px;flex-direction:row-reverse}
.hp-icon{font-size:18px}
.hp-outer{width:180px;height:18px;background:rgba(0,0,0,0.7);border-radius:9px;border:1px solid rgba(255,255,255,0.15);overflow:hidden;position:relative}

.hp-inner.player{background:linear-gradient(90deg,#1565C0,#42A5F5);box-shadow:inset 0 1px 0 rgba(255,255,255,0.3)}
.hp-inner.enemy{background:linear-gradient(90deg,#C62828,#EF5350);box-shadow:inset 0 1px 0 rgba(255,255,255,0.3)}

.hp-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;text-shadow:0 1px 3px #000;z-index:1}

#bottom-panel{position:absolute;bottom:0;left:0;width:100%;display:flex;justify-content:center;gap:12px;padding:10px 16px;
  background:linear-gradient(0deg,rgba(0,0,0,0.92),rgba(0,0,0,0.5));border-top:1px solid rgba(255,215,0,0.15)}

.ubtn{width:155px;padding:10px 8px 8px;border:2px solid rgba(255,255,255,0.1);border-radius:12px;
  background:linear-gradient(135deg,rgba(15,15,40,0.95),rgba(25,25,60,0.8));cursor:pointer;text-align:center;
  transition:all 0.15s;position:relative;overflow:hidden;user-select:none}
.ubtn::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent)}
.ubtn:hover:not(.off){border-color:#ffd700;transform:translateY(-3px);
  box-shadow:0 6px 25px rgba(255,215,0,0.15),inset 0 0 20px rgba(255,215,0,0.04)}
.ubtn:active:not(.off){transform:scale(0.95)!important;transition:transform 0.05s}
.ubtn.off{opacity:0.3;cursor:not-allowed;filter:grayscale(0.5)}
.ubtn.pop{animation:btnPop 0.3s ease-out}
@keyframes btnPop{0%{transform:scale(0.9);border-color:#ffd700}50%{transform:scale(1.04);border-color:#ffd700}100%{transform:scale(1);border-color:rgba(255,255,255,0.1)}}
.ubtn .emoji{font-size:32px;display:block;margin-bottom:2px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))}
.ubtn .uname{font-size:12px;font-weight:700;color:#eee;letter-spacing:0.5px}
.ubtn .ucost{font-size:14px;color:#ffd700;margin-top:2px;font-weight:700}
.ubtn .utype{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px}
.ubtn .ustats{font-size:9px;color:#555;margin-top:2px}

#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;

#overlay h1{font-family:'Cinzel',serif;font-size:48px;margin-bottom:4px;
  background:linear-gradient(135deg,#ffd700,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 8px rgba(255,215,0,0.3))}
#overlay h2{font-size:22px;margin-bottom:20px;color:#999;font-weight:500}
#overlay p{font-size:15px;margin-bottom:6px;color:#bbb}
.obtn{margin-top:20px;padding:14px 48px;font-size:18px;font-weight:700;border:none;border-radius:10px;
  cursor:pointer;color:#fff;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;
  transition:all 0.15s;position:relative;overflow:hidden}
.obtn::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.15),transparent);border-radius:10px 10px 0 0}

.tower-card:hover{border-color:rgba(224,64,251,0.4);background:rgba(224,64,251,0.06)}
.tower-card.owned{border-color:rgba(76,175,80,0.3);background:rgba(76,175,80,0.05);cursor:default}
.tower-card.cant{opacity:0.4;cursor:not-allowed}
.tower-card .tc-icon{font-size:32px;width:44px;text-align:center;flex-shrink:0}
.tower-card .tc-info{flex:1}
.tower-card .tc-name{font-size:14px;font-weight:700;color:#eee}
.tower-card .tc-desc{font-size:11px;color:#888;margin-top:2px}
.tower-card .tc-stats{font-size:10px;color:#666;margin-top:2px}
.tower-card .tc-price{font-size:14px;font-weight:700;color:#e040fb;white-space:nowrap}
.tower-card .tc-price.got{color:#4CAF50}
.tower-card .tc-slot{font-size:10px;color:#555;margin-top:1px}
#shop-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:22px;

let ac;
function snd(t){
  if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);const n=ac.currentTime;g.gain.setValueAtTime(0.07,n);
  if(t==='sp'){o.type='sine';o.frequency.setValueAtTime(500,n);o.frequency.exponentialRampToValueAtTime(800,n+0.06);g.gain.exponentialRampToValueAtTime(0.001,n+0.1);o.start(n);o.stop(n+0.1)}
  else if(t==='h'){o.type='sawtooth';o.frequency.setValueAtTime(180,n);o.frequency.exponentialRampToValueAtTime(60,n+0.05);g.gain.exponentialRampToValueAtTime(0.001,n+0.07);o.start(n);o.stop(n+0.07)}
  else if(t==='k'){o.type='square';o.frequency.setValueAtTime(250,n);o.frequency.exponentialRampToValueAtTime(80,n+0.12);g.gain.exponentialRampToValueAtTime(0.001,n+0.18);o.start(n);o.stop(n+0.18)}
  else if(t==='v'){o.type='sine';o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+0.12);o.frequency.setValueAtTime(784,n+0.25);g.gain.exponentialRampToValueAtTime(0.001,n+0.4);o.start(n);o.stop(n+0.4)}
  else if(t==='d'){o.type='sine';o.frequency.setValueAtTime(350,n);o.frequency.exponentialRampToValueAtTime(80,n+0.4);g.gain.exponentialRampToValueAtTime(0.001,n+0.5);o.start(n);o.stop(n+0.5)}
}

// ======================== SAVE / LOAD ========================
const SAVE_KEY='battleOfAges_save';
function saveGame(){
  const data={age,gems,retries,towers:ownedTowers.map(t=>t?{id:t.id,lvl:t.lvl}:null)};
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(data))}catch(e){}
}
function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(typeof d.age==='number')age=d.age;
    if(typeof d.gems==='number')gems=d.gems;
    if(typeof d.retries==='number')retries=d.retries;
    if(Array.isArray(d.towers)){
      for(let i=0;i<3;i++){
        if(d.towers[i]&&d.towers[i].id){
          ownedTowers[i]={id:d.towers[i].id,lvl:d.towers[i].lvl||0,at:0,flash:0};
        }
      }
    }
    return true;
  }catch(e){return false}
}
function clearSave(){try{localStorage.removeItem(SAVE_KEY)}catch(e){}}

// ======================== SCALING ========================
function pBaseHP(a){return Math.floor(600*(1+a*0.38))}
function eBaseHP(a){return Math.floor(600*(1+a*0.43))}
function pIncome(a){return 9+a*0.55}
function eIncome(a){return 8+a*0.75}
function startGold(a){return 120+a*14}
function uStats(a,t){
  const s=1+a*0.35;
  if(t===0)return{hp:Math.floor(45*s),atk:Math.floor(9*s),spd:2.0,rng:30,as:0.7,cost:Math.floor(30+a*4),cd:1.0};
  if(t===1)return{hp:Math.floor(32*s),atk:Math.floor(13*s),spd:1.3,rng:160,as:1.1,cost:Math.floor(55+a*7),cd:1.8};
  return{hp:Math.floor(130*s),atk:Math.floor(16*s),spd:0.75,rng:38,as:1.4,cost:Math.floor(100+a*12),cd:3.5};
}

// ======================== UNIT ========================
function mkUnit(side,type,x){
  const st=uStats(age,type);
  // Heights: melee=32, ranged=30, tank=40
  const h=type===2?40:(type===0?32:30);
  return{side,type,x,y:GY,hp:st.hp,mhp:st.hp,atk:st.atk,spd:st.spd,
    rng:st.rng,as:st.as,at:0,alive:true,h,
    // animation state
    walk:Math.random()*Math.PI*2, // walk cycle phase
    atkAnim:0, // 0-1 attack animation progress
    flash:0, spawn:1.0, // spawn pop-in
    moving:false, // is currently walking
    armAngle:0, // for arm swing
    legPhase:Math.random()*Math.PI*2,
  };
}

// ======================== MATCH ========================
function initMatch(){
  pGold=startGold(age);pHP=pBaseHP(age);pMaxHP=pHP;eHP=eBaseHP(age);eMaxHP=eHP;
  pUnits=[];eUnits=[];projs=[];parts=[];gFloats=[];dust=[];
  cds=[0,0,0];gTimer=0;aiT=0;aiG=startGold(age)*0.5;mTime=0;shake=0;gs='playing';
  updUI();
}

// ======================== AI ========================
function aiUpd(dt){
  aiG+=eIncome(age)*dt;aiT+=dt;
  const iv=Math.max(0.6,2.8-age*0.02);
  if(aiT<iv)return;aiT=0;
  const sts=[0,1,2].map(t=>uStats(age,t));
  const pc=pUnits.length,ec=eUnits.length;
  let pk=-1;
  if(age<10){const r=Math.random();pk=r<0.5?0:r<0.82?1:2}
  else if(age<40){if(pc>ec+3&&aiG>=sts[2].cost)pk=2;else{const r=Math.random();pk=r<0.4?0:r<0.75?1:2}}
  else{if(ec<3&&aiG>=sts[0].cost)pk=0;else if(pc>ec+2&&aiG>=sts[2].cost)pk=2;else{const r=Math.random();pk=r<0.35?0:r<0.7?1:2}}
  if(pk>=0&&aiG>=sts[pk].cost){aiG-=sts[pk].cost;eUnits.push(mkUnit('enemy',pk,W-BW-40))}
}

// ======================== FX ========================
function burst(x,y,col,n,pow){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=(30+Math.random()*80)*(pow||1);
    parts.push({x,y:y-5,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-50,col,life:0.3+Math.random()*0.4,ml:0.7,sz:2+Math.random()*4})}
}
function gFloat(x,y,a){gFloats.push({x,y:y-20,a,life:1.5,ml:1.5})}
function mkDust(x,y,s){dust.push({x,y:y+2,vx:(s==='player'?-1:1)*(8+Math.random()*12),life:0.25+Math.random()*0.15,sz:2+Math.random()*3})}

// ======================== DAMAGE ========================
function dmgUnit(tgt,dmg,aSide){
  tgt.hp-=dmg;tgt.flash=0.12;tgt.atkAnim=0; // interrupt
  if(tgt.hp<=0){
    tgt.alive=false;
    const g=uStats(age,tgt.type).cost*0.4;
    if(aSide==='player'){pGold+=g;gFloat(tgt.x,tgt.y,Math.floor(g))}else aiG+=g;
    burst(tgt.x,tgt.y-tgt.h*0.5,tgt.side==='player'?'#4488ff':'#ff4444',14,1.3);
    snd('k');shake=Math.max(shake,4);
  }else{
    burst(tgt.x,tgt.y-tgt.h*0.3,aSide==='player'?'#ff8888':'#8888ff',3,0.4);
    snd('h');
  }
}
function dmgBase(side,dmg){
  if(side==='enemy'){eHP-=dmg;burst(W-BW,GY-BH*0.4,'#ff4444',5,1)}
  else{pHP-=dmg;burst(BW,GY-BH*0.4,'#4488ff',5,1)}
  shake=Math.max(shake,5);
}

// ======================== UPDATE ========================
function update(dt){
  mTime+=dt;gTimer+=dt;
  if(gTimer>=1){gTimer-=1;pGold+=pIncome(age)}
  for(let i=0;i<3;i++)cds[i]=Math.max(0,cds[i]-dt);
  shake=Math.max(0,shake-dt*14);
  shX=(Math.random()-0.5)*shake*2;shY=(Math.random()-0.5)*shake*2;
  for(let c of clouds){c.x+=c.v*dt;if(c.x>1.3)c.x=-0.3}

  aiUpd(dt);
  updTowers(dt);
  updSide(pUnits,eUnits,'player',dt);
  updSide(eUnits,pUnits,'enemy',dt);

  // Projectiles
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    p.trail.push({x:p.x,y:p.y,life:0.12});
    if(p.life<=0){projs.splice(i,1);continue}
    const tgts=p.side==='player'?eUnits:pUnits;
    let hit=false;
    for(let t of tgts){if(!t.alive)continue;if(Math.abs(p.x-t.x)<15&&Math.abs(p.y-(t.y-t.h*0.5))<t.h*0.7){dmgUnit(t,p.dmg,p.side);hit=true;break}}
    if(!hit){
      if(p.side==='player'&&p.x>W-BW-10){dmgBase('enemy',p.dmg);hit=true}
      else if(p.side==='enemy'&&p.x<BW+10){dmgBase('player',p.dmg);hit=true}
    }
    if(hit){burst(p.x,p.y,p.col,4,0.6);projs.splice(i,1)}
  }
  for(let p of projs)p.trail=p.trail.filter(t=>{t.life-=dt;return t.life>0});

  pUnits=pUnits.filter(u=>u.alive);eUnits=eUnits.filter(u=>u.alive);

  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=350*dt;p.life-=dt;if(p.life<=0)parts.splice(i,1)}
  for(let i=gFloats.length-1;i>=0;i--){gFloats[i].y-=40*dt;gFloats[i].life-=dt;if(gFloats[i].life<=0)gFloats.splice(i,1)}
  for(let i=dust.length-1;i>=0;i--){const d=dust[i];d.x+=d.vx*dt;d.y-=10*dt;d.life-=dt;if(d.life<=0)dust.splice(i,1)}

  if(eHP<=0){
    eHP=0;gs=age>=99?'won':'victory';
    const gemReward=5+Math.floor(age*0.5);
    gems+=gemReward;lastGemReward=gemReward;
    snd('v');showOvl();saveGame();
  }
  if(pHP<=0){
    pHP=0;gs='defeat';retries++;
    const consolation=1+Math.floor(age*0.1);
    gems+=consolation;lastGemReward=consolation;
    snd('d');showOvl();saveGame();
  }
  updUI();
}

function updSide(units,enemies,side,dt){
  const dir=side==='player'?1:-1;
  const bx=side==='player'?W-BW:BW;
  for(let u of units){
    if(!u.alive)continue;
    u.legPhase+=dt*10;u.walk+=dt*6;
    u.at=Math.max(0,u.at-dt);u.flash=Math.max(0,u.flash-dt);
    u.spawn=Math.max(0,u.spawn-dt*4);
    if(u.atkAnim>0)u.atkAnim=Math.max(0,u.atkAnim-dt*4);

    let near=null,nd=Infinity;
    for(let e of enemies){if(!e.alive)continue;const d=Math.abs(u.x-e.x);if(d<nd){nd=d;near=e}}
    const bd=Math.abs(u.x-bx);
    const inR=near&&nd<=u.rng+20;
    const bInR=bd<=u.rng+30;

    if(inR||bInR){
      u.moving=false;
      if(u.at<=0){
        u.at=u.as;u.atkAnim=1.0;
        if(u.rng>60){
          const tx=inR?near.x:bx,ty=inR?near.y-near.h*0.5:GY-BH*0.4;
          const dx=tx-u.x,dy=ty-(u.y-u.h*0.6);
          const len=Math.sqrt(dx*dx+dy*dy)||1;
          const speed=300+age*1.5;
          projs.push({x:u.x+dir*12,y:u.y-u.h*0.6,vx:dx/len*speed,vy:dy/len*speed,
            side:u.side,dmg:u.atk,life:1.2,col:side==='player'?'#66ccff':'#ff6666',
            glow:side==='player'?'rgba(100,200,255,0.25)':'rgba(255,100,100,0.25)',trail:[]});
        }else{
          if(inR&&near)dmgUnit(near,u.atk,side);
          else if(bInR)dmgBase(side==='player'?'enemy':'player',u.atk);
        }
      }
    }else{
      u.moving=true;u.x+=dir*u.spd*60*dt;
      if(Math.random()<dt*4)mkDust(u.x,u.y,side);
    }
    u.x=Math.max(BW+30,Math.min(W-BW-30,u.x));
  }
}

// ======================== RENDER ========================
function render(){
  ctx.save();ctx.translate(shX,shY);
  const era=Math.floor(age/10),th=ERA_T[Math.min(era,9)];
  drawBG(era,th);drawBases(th);
  drawTowers();

  // Dust
  for(let d of dust){ctx.globalAlpha=d.life*3;ctx.fillStyle='rgba(180,160,130,0.5)';
    ctx.beginPath();ctx.arc(d.x,d.y,d.sz,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;

  // Units sorted by x for overlap
  const all=[...pUnits,...eUnits];
  for(let u of all)drawUnit(u);

  // Projectiles
  for(let p of projs){
    for(let t of p.trail){ctx.globalAlpha=t.life*5;ctx.fillStyle=p.glow;ctx.beginPath();ctx.arc(t.x,t.y,6,0,Math.PI*2);ctx.fill()}
    ctx.globalAlpha=1;
    ctx.fillStyle=p.glow;ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);ctx.fill();
  }

  // Particles
  for(let p of parts){ctx.globalAlpha=Math.min(1,p.life/p.ml*2);ctx.fillStyle=p.col;
    const s=p.sz*(p.life/p.ml);ctx.fillRect(p.x-s/2,p.y-s/2,s,s)}
  ctx.globalAlpha=1;

  // Gold floats
  ctx.textAlign='center';ctx.font='bold 16px Rajdhani,sans-serif';
  for(let g of gFloats){ctx.globalAlpha=Math.min(1,g.life/g.ml*3);
    ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=3;ctx.fillStyle='#ffd700';
    ctx.strokeText(`+${g.a}`,g.x,g.y);ctx.fillText(`+${g.a}`,g.x,g.y)}
  ctx.globalAlpha=1;ctx.restore();
}

// ======================== DRAW UNIT (full body) ========================
function drawUnit(u){
  const isP=u.side==='player';
  const dir=isP?1:-1;
  const x=u.x,h=u.h;
  const footY=u.y; // feet on ground

  // Color palettes per side and type
  const skinCol=u.flash>0?'#fff':(isP?'#d4a574':'#c4957a');
  const bodyCol=isP?
    (u.type===0?'#1565C0':u.type===1?'#1B5E20':'#0D47A1'):
    (u.type===0?'#C62828':u.type===1?'#8B0000':'#880E4F');
  const bodyLt=isP?
    (u.type===0?'#1E88E5':u.type===1?'#2E7D32':'#1565C0'):
    (u.type===0?'#E53935':u.type===1?'#B71C1C':'#AD1457');
  const pantsCol=isP?'#0D47A1':'#7B1A1A';

  // Spawn animation
  const sp=1-u.spawn*0.6;
  ctx.save();
  ctx.translate(x,footY);ctx.scale(sp,sp);ctx.translate(-x,-footY);

  // Scale factor (tank units are bigger)
  const sc=u.type===2?1.3:(u.type===1?1.0:0.95);

  // Animation values
  const legSwing=u.moving?Math.sin(u.legPhase)*0.5:0;
  const armSwing=u.moving?Math.sin(u.legPhase+Math.PI)*0.4:0;
  const breathe=Math.sin(u.walk)*1;
  const atkProg=u.atkAnim; // 1 = just attacked, 0 = idle
  const atkSwing=atkProg>0?Math.sin(atkProg*Math.PI)*1.2:0;

  const headR=5*sc;
  const bodyLen=h*0.35*sc;
  const legLen=h*0.3*sc;
  const armLen=h*0.28*sc;

  const headY=footY-h*sc+breathe;
  const shoulderY=headY+headR+2;
  const hipY=shoulderY+bodyLen;

  ctx.lineCap='round';ctx.lineJoin='round';

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(x,footY+2,12*sc,3,0,0,Math.PI*2);ctx.fill();

  // --- LEGS ---
  ctx.strokeStyle=pantsCol;ctx.lineWidth=4*sc;
  // Left leg
  const lFootX=x-5*sc*dir+Math.sin(u.legPhase)*8*sc*(u.moving?1:0);
  const lFootY=footY;
  const lKneeX=x-3*sc*dir+Math.sin(u.legPhase)*4*sc*(u.moving?1:0);
  const lKneeY=hipY+legLen*0.5;
  ctx.beginPath();ctx.moveTo(x-3*dir,hipY);ctx.quadraticCurveTo(lKneeX,lKneeY,lFootX,lFootY);ctx.stroke();
  // Right leg
  const rFootX=x+5*sc*dir+Math.sin(u.legPhase+Math.PI)*8*sc*(u.moving?1:0);
  const rFootY=footY;
  const rKneeX=x+3*sc*dir+Math.sin(u.legPhase+Math.PI)*4*sc*(u.moving?1:0);
  const rKneeY=hipY+legLen*0.5;
  ctx.beginPath();ctx.moveTo(x+3*dir,hipY);ctx.quadraticCurveTo(rKneeX,rKneeY,rFootX,rFootY);ctx.stroke();

  // Boots
  ctx.fillStyle=u.type===2?'#333':'#4a3a2a';
  ctx.beginPath();ctx.ellipse(lFootX+dir*2,lFootY,4*sc,2.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(rFootX+dir*2,rFootY,4*sc,2.5,0,0,Math.PI*2);ctx.fill();

  // --- BODY / TORSO ---
  // Torso shape
  ctx.fillStyle=bodyCol;
  ctx.beginPath();
  ctx.moveTo(x-7*sc,shoulderY);
  ctx.lineTo(x+7*sc,shoulderY);
  ctx.lineTo(x+5*sc,hipY+2);
  ctx.lineTo(x-5*sc,hipY+2);
  ctx.closePath();ctx.fill();

  // Torso highlight
  ctx.fillStyle=bodyLt;
  ctx.beginPath();
  ctx.moveTo(x-2*sc,shoulderY+1);
  ctx.lineTo(x+5*sc,shoulderY+1);
  ctx.lineTo(x+4*sc,shoulderY+bodyLen*0.5);
  ctx.lineTo(x-1*sc,shoulderY+bodyLen*0.5);
  ctx.closePath();ctx.fill();

  // Belt
  ctx.fillStyle='#5a4a30';
  ctx.fillRect(x-6*sc,hipY-2,12*sc,3);
  if(u.type===2){
    // Armor plate on tank
    ctx.fillStyle='rgba(200,200,200,0.25)';
    ctx.fillRect(x-6*sc,shoulderY+2,12*sc,bodyLen*0.6);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
    ctx.strokeRect(x-6*sc,shoulderY+2,12*sc,bodyLen*0.6);
  }

  // --- BACK ARM (behind body) ---
  const backArmAngle=armSwing*0.5;
  ctx.save();
  ctx.translate(x-dir*5*sc,shoulderY+2);
  ctx.rotate(backArmAngle);
  ctx.strokeStyle=bodyCol;ctx.lineWidth=3.5*sc;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,armLen*0.9);ctx.stroke();
  // Hand
  ctx.fillStyle=skinCol;
  ctx.beginPath();ctx.arc(0,armLen*0.9,2.5*sc,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // --- FRONT ARM + WEAPON ---
  ctx.save();
  ctx.translate(x+dir*5*sc,shoulderY+2);

  if(u.type===0){
    // MELEE: sword arm swings on attack
    const swordRot=dir*(0.3+atkSwing*1.5);
    ctx.rotate(swordRot-armSwing*0.3);
    // Arm
    ctx.strokeStyle=bodyLt;ctx.lineWidth=3.5*sc;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(dir*4,armLen*0.7);ctx.stroke();
    // Hand
    ctx.fillStyle=skinCol;
    ctx.beginPath();ctx.arc(dir*4,armLen*0.7,2.5*sc,0,Math.PI*2);ctx.fill();
    // Sword blade
    ctx.strokeStyle='#ccd0d8';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(dir*4,armLen*0.7);ctx.lineTo(dir*(8+atkSwing*8),armLen*0.3-atkSwing*10);ctx.stroke();
    // Hilt crossguard
    ctx.strokeStyle='#8B7355';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(dir*2,armLen*0.72);ctx.lineTo(dir*6,armLen*0.68);ctx.stroke();
  } else if(u.type===1){
    // RANGED: bow/gun, recoil on attack
    const recoil=atkSwing*3;
    ctx.rotate(dir*0.2);
    // Arm
    ctx.strokeStyle=bodyLt;ctx.lineWidth=3.5*sc;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(dir*(8-recoil),armLen*0.4);ctx.stroke();
    // Hand
    ctx.fillStyle=skinCol;
    ctx.beginPath();ctx.arc(dir*(8-recoil),armLen*0.4,2.5*sc,0,Math.PI*2);ctx.fill();
    // Weapon (bow shape for early ages, gun for later)
    const era=Math.floor(age/10);
    if(era<5){
      // Bow
      ctx.strokeStyle='#8B6914';ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(dir*(12-recoil),armLen*0.2,12*sc,dir>0?-0.8:Math.PI-0.8+1.6,dir>0?0.8:Math.PI+0.8-1.6);
      ctx.stroke();
      // Bowstring
      ctx.strokeStyle='#aaa';ctx.lineWidth=0.8;
      ctx.beginPath();
      ctx.moveTo(dir*(12-recoil)+Math.cos(dir>0?-0.8:Math.PI+0.8)*12*sc,armLen*0.2+Math.sin(dir>0?-0.8:Math.PI+0.8)*12*sc);
      ctx.lineTo(dir*(12-recoil)+Math.cos(dir>0?0.8:Math.PI-0.8)*12*sc,armLen*0.2+Math.sin(dir>0?0.8:Math.PI-0.8)*12*sc);
      ctx.stroke();
    }else{
      // Gun barrel
      ctx.strokeStyle='#666';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(dir*(8-recoil),armLen*0.38);ctx.lineTo(dir*(22-recoil),armLen*0.3);ctx.stroke();
      // Stock
      ctx.strokeStyle='#5a3a1a';ctx.lineWidth=3.5;
      ctx.beginPath();ctx.moveTo(dir*(6-recoil),armLen*0.42);ctx.lineTo(dir*1,armLen*0.55);ctx.stroke();
      // Muzzle flash on attack
      if(atkProg>0.7){
        ctx.fillStyle='rgba(255,200,50,0.6)';
        ctx.beginPath();ctx.arc(dir*(24-recoil),armLen*0.28,5+Math.random()*3,0,Math.PI*2);ctx.fill();
      }
    }
  } else {
    // TANK: shield + mace/hammer
    const hammerSwing=atkSwing*1.0;
    ctx.rotate(dir*0.2+hammerSwing*dir*0.5);
    // Arm
    ctx.strokeStyle=bodyLt;ctx.lineWidth=4*sc;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(dir*5,armLen*0.65);ctx.stroke();
    // Hand
    ctx.fillStyle=skinCol;
    ctx.beginPath();ctx.arc(dir*5,armLen*0.65,3*sc,0,Math.PI*2);ctx.fill();
    // Hammer/mace handle
    ctx.strokeStyle='#6a4a2a';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(dir*5,armLen*0.65);ctx.lineTo(dir*(10+hammerSwing*6),armLen*0.2-hammerSwing*8);ctx.stroke();
    // Hammer head
    ctx.fillStyle='#888';
    ctx.beginPath();ctx.arc(dir*(10+hammerSwing*6),armLen*0.2-hammerSwing*8,4*sc,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // Shield for tank (on opposite side)
  if(u.type===2){
    ctx.save();
    ctx.translate(x-dir*8*sc,shoulderY+bodyLen*0.3);
    // Shield shape
    ctx.fillStyle=isP?'#1565C0':'#8B0000';
    ctx.beginPath();
    ctx.ellipse(0,0,7*sc,10*sc,0,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle=isP?'#42A5F5':'#EF5350';ctx.lineWidth=1.5;
    ctx.stroke();
    // Shield emblem
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.beginPath();ctx.moveTo(0,-5*sc);ctx.lineTo(3*sc,0);ctx.lineTo(0,5*sc);ctx.lineTo(-3*sc,0);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  // --- HEAD ---
  // Neck
  ctx.strokeStyle=skinCol;ctx.lineWidth=3*sc;
  ctx.beginPath();ctx.moveTo(x,shoulderY);ctx.lineTo(x,headY+headR);ctx.stroke();

  // Head circle
  ctx.fillStyle=skinCol;
  ctx.beginPath();ctx.arc(x,headY,headR,0,Math.PI*2);ctx.fill();

  // Hair/helmet
  if(u.type===2||Math.floor(age/10)>=2){
    // Helmet
    ctx.fillStyle=isP?'#1565C0':'#880E4F';
    ctx.beginPath();ctx.arc(x,headY-1,headR+1,Math.PI,0);ctx.fill();
    // Visor slit
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillRect(x-headR*0.6,headY-1.5,headR*1.2,2);
  }else{
    // Hair
    ctx.fillStyle=isP?'#4a3020':'#2a1a10';
    ctx.beginPath();ctx.arc(x,headY-1.5,headR+0.5,Math.PI*1.1,Math.PI*-0.1);ctx.fill();
  }

  // Eyes
  const eyeX=x+dir*headR*0.3;
  const eyeY=headY-0.5;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(eyeX,eyeY,2.2,1.8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(eyeX+dir*0.5,eyeY,1,0,Math.PI*2);ctx.fill();

  // --- HP BAR ---
  if(u.hp<u.mhp){
    const bw=h*1.2,bh=3,by=headY-headR-6;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(x-bw/2-1,by-1,bw+2,bh+2);
    const pct=u.hp/u.mhp;
    ctx.fillStyle=pct>0.5?`rgb(${Math.floor(255-pct*200)},${Math.floor(100+pct*155)},50)`:`rgb(255,${Math.floor(pct*200)},50)`;
    ctx.fillRect(x-bw/2,by,bw*pct,bh);
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(x-bw/2,by,bw*pct,1);
  }

  ctx.restore();
}

// ======================== BACKGROUNDS ========================
function drawBG(era,th){
  const grad=ctx.createLinearGradient(0,0,0,GY);
  grad.addColorStop(0,th[0]);grad.addColorStop(1,th[1]);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  if(era>=8){const t=mTime*0.3;for(let s of stars){ctx.globalAlpha=(0.3+0.7*Math.abs(Math.sin(t+s.b*10)))*0.7;ctx.fillStyle='#fff';ctx.fillRect(s.x*W,s.y*GY,s.s,s.s)}ctx.globalAlpha=1;
    if(era===9){const g1=ctx.createRadialGradient(W*0.3,GY*0.3,0,W*0.3,GY*0.3,150);g1.addColorStop(0,'rgba(100,50,200,0.12)');g1.addColorStop(1,'transparent');ctx.fillStyle=g1;ctx.fillRect(0,0,W,GY);
      const g2=ctx.createRadialGradient(W*0.7,GY*0.5,0,W*0.7,GY*0.5,120);g2.addColorStop(0,'rgba(50,100,200,0.1)');g2.addColorStop(1,'transparent');ctx.fillStyle=g2;ctx.fillRect(0,0,W,GY)}}
  if(era<8){for(let c of clouds){ctx.globalAlpha=0.07;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(c.x*W,c.y*GY,c.s,c.s*0.4,0,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}

  const gG=ctx.createLinearGradient(0,GY,0,H);gG.addColorStop(0,th[2]);gG.addColorStop(1,th[3]);
  ctx.fillStyle=gG;ctx.fillRect(0,GY,W,H-GY);
  ctx.strokeStyle=th[5];ctx.lineWidth=2;ctx.globalAlpha=0.25;ctx.beginPath();ctx.moveTo(0,GY);ctx.lineTo(W,GY);ctx.stroke();ctx.globalAlpha=1;
  drawDecor(era,th);
  ctx.fillStyle=th[4];ctx.fillRect(0,0,W,H);
}

function drawDecor(era){
  ctx.globalAlpha=0.2;
  if(era===0){for(let i=0;i<6;i++){const x=W*0.13+i*W*0.14;ctx.fillStyle='#3a2010';ctx.fillRect(x-4,GY-42,8,42);ctx.fillStyle='#1a5a0a';ctx.beginPath();ctx.arc(x,GY-52,26,0,Math.PI*2);ctx.fill()}
    ctx.fillStyle='#6a3010';ctx.beginPath();ctx.moveTo(W*0.5-60,GY);ctx.lineTo(W*0.5,GY-100);ctx.lineTo(W*0.5+60,GY);ctx.fill();ctx.fillStyle='rgba(255,100,0,0.3)';ctx.beginPath();ctx.arc(W*0.5,GY-105,12,0,Math.PI*2);ctx.fill()}
  else if(era===1){for(let i=0;i<3;i++){const x=W*0.28+i*W*0.18,s=30+i*20;ctx.fillStyle='#c4a040';ctx.beginPath();ctx.moveTo(x-s,GY);ctx.lineTo(x,GY-s*1.3);ctx.lineTo(x+s,GY);ctx.fill()}}
  else if(era===2){for(let i=0;i<5;i++){const x=W*0.18+i*W*0.16;ctx.fillStyle='#c8c0b0';ctx.fillRect(x-5,GY-70,10,70);ctx.fillRect(x-10,GY-75,20,7);ctx.fillRect(x-10,GY-2,20,4)}}
  else if(era===3){for(let i=0;i<3;i++){const x=W*0.22+i*W*0.24;ctx.fillStyle='#444';ctx.fillRect(x-22,GY-65,44,65);ctx.fillRect(x-27,GY-74,13,14);ctx.fillRect(x+14,GY-74,13,14)}}
  else if(era===4){for(let i=0;i<4;i++){const x=W*0.15+i*W*0.22;ctx.fillStyle='#555';ctx.fillRect(x-25,GY-80,50,80);ctx.fillRect(x-30,GY-90,14,16);ctx.fillRect(x+16,GY-90,14,16);ctx.fillStyle='#666';ctx.beginPath();ctx.moveTo(x-25,GY-80);ctx.lineTo(x,GY-95);ctx.lineTo(x+25,GY-80);ctx.fill()}}
  else if(era===5){for(let i=0;i<2;i++){const x=W*0.32+i*W*0.35;ctx.fillStyle='#6a4a1a';ctx.beginPath();ctx.moveTo(x-30,GY-12);ctx.lineTo(x+30,GY-12);ctx.lineTo(x+22,GY+4);ctx.lineTo(x-22,GY+4);ctx.fill();ctx.fillRect(x-2,GY-55,4,43);ctx.fillStyle='#ddd';ctx.fillRect(x+2,GY-55,18,12)}}
  else if(era===6){for(let i=0;i<4;i++){const x=W*0.18+i*W*0.18;ctx.fillStyle='#555';ctx.fillRect(x-8,GY-80,16,80);ctx.fillStyle='#777';ctx.fillRect(x-12,GY-85,24,8);ctx.fillStyle='rgba(150,150,150,0.12)';const sy=GY-90-Math.sin(mTime+i)*12;ctx.beginPath();ctx.arc(x+Math.sin(mTime*0.5+i*2)*6,sy,10+Math.sin(mTime+i)*3,0,Math.PI*2);ctx.fill()}}
  else if(era===7){for(let i=0;i<8;i++){const x=W*0.08+i*W*0.11;const h=30+Math.abs(Math.sin(i*2.7))*40;ctx.fillStyle='#444';ctx.fillRect(x-16,GY-h,32,h);ctx.fillStyle='rgba(255,200,100,0.15)';for(let j=0;j<Math.floor(h/16);j++){ctx.fillRect(x-8,GY-h+6+j*16,5,5);ctx.fillRect(x+3,GY-h+6+j*16,5,5)}}}
  else if(era===8){ctx.strokeStyle=ERA_T[8][5];ctx.lineWidth=1;ctx.globalAlpha=0.1;for(let i=0;i<=12;i++){ctx.beginPath();ctx.moveTo(i*W/12,GY);ctx.lineTo(i*W/12,H);ctx.stroke()}for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(0,GY+i*18);ctx.lineTo(W,GY+i*18);ctx.stroke()}}
  else if(era===9){ctx.fillStyle='#334';ctx.beginPath();ctx.arc(W*0.2,GY*0.6,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#443';ctx.beginPath();ctx.arc(W*0.75,GY*0.35,28,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(200,200,255,0.12)';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(W*0.75,GY*0.35,42,8,0.3,0,Math.PI*2);ctx.stroke()}
  ctx.globalAlpha=1;
}

function drawBases(th){drawBase(BW,GY,'player');drawBase(W-BW,GY,'enemy')}
function drawBase(cx,gy,side){
  const isP=side==='player';
  const c1=isP?'#1a4a9a':'#8a1a1a',c2=isP?'#2962CC':'#BB2222',c3=isP?'#4488ee':'#ee4444';
  const hp=isP?pHP:eHP,mhp=isP?pMaxHP:eMaxHP;
  const bw=BW,bh=BH,d=hp/mhp;

  ctx.save();
  const gl=ctx.createRadialGradient(cx,gy-bh*0.4,bw*0.3,cx,gy-bh*0.4,bw*2.5);
  gl.addColorStop(0,isP?'rgba(33,150,243,0.06)':'rgba(244,67,54,0.06)');gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;ctx.fillRect(cx-bw*2,gy-bh*2,bw*4,bh*3);

  ctx.fillStyle=c1;
  ctx.beginPath();ctx.moveTo(cx-bw/2+3,gy);ctx.lineTo(cx-bw/2,gy-bh);ctx.lineTo(cx+bw/2,gy-bh);ctx.lineTo(cx+bw/2-3,gy);ctx.fill();

  ctx.fillStyle=c2;ctx.beginPath();ctx.moveTo(cx-bw/2-10,gy-bh);ctx.lineTo(cx,gy-bh-bw*0.5);ctx.lineTo(cx+bw/2+10,gy-bh);ctx.fill();

  ctx.fillStyle='rgba(255,220,100,0.25)';ctx.fillRect(cx-bw*0.22,gy-bh*0.65,bw*0.14,bw*0.14);ctx.fillRect(cx+bw*0.08,gy-bh*0.65,bw*0.14,bw*0.14);

  ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(cx,gy-10,8,Math.PI,0);ctx.fillRect(cx-8,gy-10,16,10);ctx.fill();

  ctx.fillStyle='#777';ctx.fillRect(cx-1,gy-bh-bw*0.5,2,-22);
  ctx.fillStyle=c3;ctx.beginPath();ctx.moveTo(cx+1,gy-bh-bw*0.5-22);ctx.lineTo(cx+18,gy-bh-bw*0.5-16);ctx.lineTo(cx+1,gy-bh-bw*0.5-10);ctx.fill();

  if(d<0.5){ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx-bw*0.25,gy-bh*0.7);ctx.lineTo(cx+bw*0.05,gy-bh*0.35);ctx.lineTo(cx-bw*0.15,gy-bh*0.15);ctx.stroke()}
  if(d<0.25){ctx.fillStyle='rgba(80,80,80,0.12)';const sy=gy-bh-15-Math.sin(mTime*2)*8;ctx.beginPath();ctx.arc(cx+Math.sin(mTime)*6,sy,8,0,Math.PI*2);ctx.fill()}
  ctx.restore();
}

// ======================== TOWERS ========================
function getTowerPos(slot){
  // 3 slots stacked above the player base
  const x=BW;
  const baseTop=GY-BH;
  const y=baseTop-12-slot*28;
  return{x,y};
}

function getTowerData(id){return TOWERS.find(t=>t.id===id)}

function getTowerLvlStats(id,lvl){
  const td=getTowerData(id);
  if(!td)return null;
  const l=td.lvls[Math.min(lvl,td.lvls.length-1)];
  // Scale with age
  const sc=1+age*0.3;
  return{atk:Math.floor(l.atk*sc),rng:l.rng,as:l.as,projCol:td.projCol};
}

function updTowers(dt){
  for(let i=0;i<3;i++){
    const tw=ownedTowers[i];
    if(!tw)continue;
    tw.at=Math.max(0,tw.at-dt);
    const st=getTowerLvlStats(tw.id,tw.lvl);
    if(!st)continue;
    if(tw.at>0)continue;

    const pos=getTowerPos(i);
    // Find nearest enemy in range
    let near=null,nd=Infinity;
    for(let e of eUnits){
      if(!e.alive)continue;
      const d=Math.abs(pos.x-e.x);
      if(d<nd&&d<=st.rng){nd=d;near=e}
    }
    // Also check if enemy base in range
    const baseDist=Math.abs(pos.x-(W-BW));

    if(near||baseDist<=st.rng){
      tw.at=st.as;tw.flash=0.15;
      const tx=near?near.x:W-BW;
      const ty=near?near.y-near.h*0.5:GY-BH*0.4;
      const dx=tx-pos.x,dy=ty-pos.y;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const speed=350;
      // Convert hex to rgba for glow
      const hc=st.projCol;
      let glowCol='rgba(200,200,100,0.25)';
      if(hc&&hc[0]==='#'){
        const r=parseInt(hc.slice(1,3),16),g=parseInt(hc.slice(3,5),16),b=parseInt(hc.slice(5,7),16);
        glowCol=`rgba(${r},${g},${b},0.3)`;
      }
      projs.push({x:pos.x+10,y:pos.y,vx:dx/len*speed,vy:dy/len*speed,
        side:'player',dmg:st.atk,life:1.5,col:st.projCol,glow:glowCol,trail:[]});
    }
  }
}

function drawTowers(){
  for(let i=0;i<3;i++){
    const tw=ownedTowers[i];
    const pos=getTowerPos(i);
    // Draw slot marker even if empty
    ctx.globalAlpha=0.3;
    ctx.strokeStyle='#e040fb';ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.arc(pos.x,pos.y,10,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha=1;

    if(!tw)continue;

    const td=getTowerData(tw.id);
    if(!td)continue;

    const flash=tw.flash&&tw.flash>0;
    if(tw.flash)tw.flash=Math.max(0,tw.flash-0.016);

    // Tower base/platform
    ctx.fillStyle=flash?'#fff':'#555';
    ctx.fillRect(pos.x-12,pos.y+4,24,6);
    ctx.fillStyle=flash?'#ffd':'#444';
    ctx.fillRect(pos.x-10,pos.y-10,20,16);

    // Tower top shape by type
    ctx.fillStyle=flash?'#fff':'#888';
    ctx.beginPath();
    ctx.moveTo(pos.x-8,pos.y-10);
    ctx.lineTo(pos.x,pos.y-20);
    ctx.lineTo(pos.x+8,pos.y-10);
    ctx.fill();

    // Tower icon
    ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.fillText(td.icon,pos.x,pos.y-2);

    // Level dots
    for(let l=0;l<=tw.lvl;l++){
      ctx.fillStyle='#e040fb';
      ctx.beginPath();ctx.arc(pos.x-6+l*6,pos.y+12,2,0,Math.PI*2);ctx.fill();
    }

    // Range indicator (faint)
    const st=getTowerLvlStats(tw.id,tw.lvl);
    if(st){
      ctx.globalAlpha=0.04;ctx.strokeStyle=td.lvls[0].projCol||'#aaa';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(pos.x,pos.y,st.rng,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;
    }
  }
}

// ======================== SHOP ========================
function toggleShop(){
  shopOpen=!shopOpen;
  document.getElementById('shop-panel').style.display=shopOpen?'block':'none';
  if(shopOpen)renderShop();
}

function renderShop(){
  const el=document.getElementById('shop-items');
  document.getElementById('shop-gems').innerHTML=`&#128142; ${gems} Gems`;
  let html='';
  for(let slot=0;slot<3;slot++){
    html+=`<div class="shop-section">Tower Slot ${slot+1}</div>`;
    const owned=ownedTowers[slot];
    const slotTowers=TOWERS.filter(t=>t.slot===slot);

    for(let td of slotTowers){
      const isOwned=owned&&owned.id===td.id;
      const otherOwned=owned&&owned.id!==td.id;

      if(isOwned){
        // Show owned + upgrade options
        const lvl=owned.lvl;
        const maxLvl=td.lvls.length-1;
        const st=getTowerLvlStats(td.id,lvl);
        html+=`<div class="tower-card owned">
          <div class="tc-icon">${td.icon}</div>
          <div class="tc-info">
            <div class="tc-name">${td.name} (Lv.${lvl+1})</div>
            <div class="tc-desc">${td.desc}</div>
            <div class="tc-stats">ATK ${st.atk} &middot; RNG ${st.rng} &middot; SPD ${st.as.toFixed(1)}s</div>
          </div>
          <div class="tc-price got">OWNED ✓</div>
        </div>`;

        // Upgrade button if not max
        if(lvl<maxLvl){
          const nextCost=td.lvls[lvl+1].cost;
          const canUp=gems>=nextCost;
          html+=`<div class="tower-card ${canUp?'':'cant'}" data-action="upgrade" data-id="${td.id}" data-slot="${slot}">
            <div class="tc-icon">⬆️</div>
            <div class="tc-info">
              <div class="tc-name">Upgrade to Lv.${lvl+2}</div>
              <div class="tc-stats">ATK ${getTowerLvlStats(td.id,lvl+1).atk} &middot; RNG ${td.lvls[lvl+1].rng} &middot; SPD ${td.lvls[lvl+1].as.toFixed(1)}s</div>
            </div>
            <div class="tc-price">&#128142; ${nextCost}</div>
          </div>`;
        }

        // Sell button
        const sellVal=Math.floor(td.cost*0.5);
        html+=`<div class="tower-card" data-action="sell" data-slot="${slot}" style="border-color:rgba(244,67,54,0.2)">
          <div class="tc-icon">🗑️</div>
          <div class="tc-info"><div class="tc-name" style="color:#ef5350">Sell Tower</div><div class="tc-desc">Get back ${sellVal} gems</div></div>
          <div class="tc-price" style="color:#ef5350">+&#128142; ${sellVal}</div>
        </div>`;

      } else if(!otherOwned){
        // Can buy this tower for this slot
        const canBuy=gems>=td.cost;
        const st=td.lvls[0];
        html+=`<div class="tower-card ${canBuy?'':'cant'}" data-action="buy" data-id="${td.id}" data-slot="${slot}">
          <div class="tc-icon">${td.icon}</div>
          <div class="tc-info">
            <div class="tc-name">${td.name}</div>
            <div class="tc-desc">${td.desc}</div>
            <div class="tc-stats">ATK ${st.atk} &middot; RNG ${st.rng} &middot; SPD ${st.as.toFixed(1)}s</div>
          </div>
          <div class="tc-price">&#128142; ${td.cost}</div>
        </div>`;
      }
      // If slot has a different tower, don't show other options (already shown via owned)
    }
  }
  el.innerHTML=html;

  // Attach click handlers
  el.querySelectorAll('.tower-card[data-action]').forEach(card=>{
    card.addEventListener('mousedown',function(e){
      e.preventDefault();
      const action=this.dataset.action;
      const slot=parseInt(this.dataset.slot);
      const id=this.dataset.id;
      if(action==='buy'){
        const td=getTowerData(id);
        if(td&&gems>=td.cost){
          gems-=td.cost;
          ownedTowers[slot]={id,lvl:0,at:0,flash:0};
          snd('sp');renderShop();updGemsUI();saveGame();
        }
      }else if(action==='upgrade'){
        const tw=ownedTowers[slot];
        if(tw){
          const td=getTowerData(tw.id);
          if(td&&tw.lvl<td.lvls.length-1){
            const cost=td.lvls[tw.lvl+1].cost;
            if(gems>=cost){gems-=cost;tw.lvl++;snd('sp');renderShop();updGemsUI();saveGame()}
          }
        }
      }else if(action==='sell'){
        const tw=ownedTowers[slot];
        if(tw){
          const td=getTowerData(tw.id);
          gems+=Math.floor(td.cost*0.5);
          ownedTowers[slot]=null;
          snd('k');renderShop();updGemsUI();saveGame();
        }
      }
    });
  });
}

function updGemsUI(){
  document.getElementById('gemsD').innerHTML=`&#128142; ${gems}`;
}

// ======================== UI ========================
let builtAge=-1; // track which age the buttons were built for

function updUI(){
  const a=AGES[age],era=Math.floor(age/10);
  document.getElementById('ageN').textContent=`Age ${age+1}: ${a.n}`;
  document.getElementById('eraN').textContent=ERA_NAMES[era];
  document.getElementById('goldD').innerHTML=`&#9878; ${Math.floor(pGold)}`;
  document.getElementById('progF').style.width=(age+1)+'%';
  document.getElementById('progT').textContent=`Age ${age+1} / 100`;
  document.getElementById('retriesD').textContent=`Retries: ${retries}`;
  document.getElementById('gemsD').innerHTML=`&#128142; ${gems}`;

  const pp=Math.max(0,pHP/pMaxHP*100),ep=Math.max(0,eHP/eMaxHP*100);
  document.getElementById('pHP').style.width=pp+'%';document.getElementById('eHP').style.width=ep+'%';
  document.getElementById('pHPt').textContent=`${Math.max(0,Math.floor(pHP))} / ${pMaxHP}`;
  document.getElementById('eHPt').textContent=`${Math.max(0,Math.floor(eHP))} / ${eMaxHP}`;

  // Only rebuild buttons when age changes
  if(builtAge!==age) buildBtns();
  // Update button states every frame (cheap DOM updates, no innerHTML)
  refreshBtns();
}

function buildBtns(){
  builtAge=age;
  const panel=document.getElementById('bottom-panel');
  const a=AGES[age],types=['MELEE','RANGED','TANK'],hk=['1','2','3'];
  let html='';
  for(let i=0;i<3;i++){
    const st=uStats(age,i);
    html+=`<div class="ubtn" id="ub${i}" data-idx="${i}">
      <span class="hk">${hk[i]}</span>
      <span class="emoji">${a.e[i]}</span>
      <span class="uname">${a.u[i]}</span>
      <span class="utype">${types[i]}</span>
      <span class="ucost" id="ucost${i}">&#9878; ${st.cost}</span>
      <span class="ustats">HP ${st.hp} &middot; ATK ${st.atk}</span>
      <div class="cd-fill" id="cdf${i}" style="height:0%"></div>
    </div>`;
  }
  panel.innerHTML=html;
  // Attach click listeners to the actual DOM elements
  for(let i=0;i<3;i++){
    document.getElementById('ub'+i).addEventListener('mousedown',function(e){e.preventDefault();spawn(i)});
    document.getElementById('ub'+i).addEventListener('touchstart',function(e){e.preventDefault();spawn(i)},{passive:false});
  }
}

function refreshBtns(){
  for(let i=0;i<3;i++){
    const btn=document.getElementById('ub'+i);
    if(!btn)continue;
    const st=uStats(age,i);
    const ok=pGold>=st.cost&&cds[i]<=0&&gs==='playing';
    if(ok) btn.classList.remove('off'); else btn.classList.add('off');
    const cdP=cds[i]>0?(cds[i]/st.cd)*100:0;
    document.getElementById('cdf'+i).style.height=cdP+'%';
  }
}

// ======================== PLAYER SPAWN ========================
function spawn(t){
  if(gs!=='playing')return;
  const st=uStats(age,t);
  if(pGold<st.cost||cds[t]>0)return;
  pGold-=st.cost;cds[t]=st.cd;
  pUnits.push(mkUnit('player',t,BW+40));
  snd('sp');
  // Button pop animation
  const btn=document.getElementById('ub'+t);
  if(btn){
    btn.classList.remove('pop');
    // Force reflow so animation restarts
    void btn.offsetWidth;
    btn.classList.add('pop');
  }
  // Immediately refresh button states so it feels responsive
  refreshBtns();
}

document.addEventListener('keydown',e=>{
  if(shopOpen&&e.key==='Escape'){toggleShop();return}
  if(shopOpen)return; // don't spawn units while shop is open
  if(e.key==='1')spawn(0);if(e.key==='2')spawn(1);if(e.key==='3')spawn(2);
  if(e.key===' '){e.preventDefault();
    if(gs==='menu')startG();else if(gs==='victory')nextAge();else if(gs==='defeat')retry()}
});

function toggleSpd(){spd=spd===1?2:spd===2?3:1;document.getElementById('spd-btn').innerHTML=`&#9654; ${spd}X`}

// ======================== OVERLAYS ========================
function showOvl(){
  const el=document.getElementById('overlay');el.style.display='flex';
  if(gs==='menu'){
    const saved=!!localStorage.getItem(SAVE_KEY);
    const si=saved?JSON.parse(localStorage.getItem(SAVE_KEY)):null;
    let btns=`<button class="obtn bg" onclick="startG()">`;
    btns+=saved?`CONTINUE &mdash; Age ${si.age+1}`:`START CAMPAIGN`;
    btns+=`</button>`;
    if(saved) btns+=`<button class="obtn br" style="margin-left:12px;padding:14px 24px;font-size:14px" onclick="if(confirm('Erase all progress?')){clearSave();age=0;gems=0;retries=0;ownedTowers=[null,null,null];showOvl()}">NEW GAME</button>`;
    el.innerHTML=`<h1>Battle of Ages</h1><h2 style="color:#888;font-weight:500">100 Ages of Warfare</h2>
      ${saved?`<p style="color:#e040fb;font-size:14px">&#128142; ${si.gems} Gems &middot; Age ${si.age+1}/100</p>`:''}
      <p style="max-width:420px;text-align:center;line-height:1.5">Spawn units to destroy the enemy base.<br>Conquer each age to evolve through history!<br>Earn <span style="color:#e040fb">&#128142; Gems</span> to buy <b>Towers</b> in the <span style="color:#e040fb">Shop</span>!</p>
      <p style="font-size:12px;color:#555;margin-top:12px">Keys 1, 2, 3 to spawn &mdash; SPACE to start</p>
      <div style="display:flex;gap:8px;justify-content:center">${btns}</div>`}
  else if(gs==='victory'){
    const nx=AGES[Math.min(age+1,99)],tp=['Melee','Ranged','Tank'];
    el.innerHTML=`<h1 style="font-size:36px">VICTORY</h1><h2>Age ${age+1} Conquered!</h2>
      <p style="color:#e040fb;font-size:16px">+&#128142; ${lastGemReward} Gems earned! (Total: ${gems})</p>
      <p style="color:#ffd700;font-size:18px;margin-top:8px">Advancing to Age ${age+2}: ${nx.n}</p>
      <div class="uprev">${nx.e.map((e,i)=>`<div class="uprev-card"><div class="emoji">${e}</div><div class="name">${nx.u[i]}</div><div class="type">${tp[i]}</div></div>`).join('')}</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:12px">
        <button class="obtn bg" onclick="nextAge()">NEXT AGE &rarr;</button>
        <button class="obtn" style="background:linear-gradient(135deg,#7B1FA2,#E040FB)" onclick="hideOvl();toggleShop()">&#128142; SHOP</button>
      </div>
      <p style="font-size:11px;color:#555;margin-top:8px">SPACE to continue</p>`}
  else if(gs==='defeat'){
    el.innerHTML=`<h1 style="-webkit-text-fill-color:#ef5350;filter:drop-shadow(0 2px 8px rgba(244,67,54,0.3))">DEFEAT</h1>
      <h2>Age ${age+1}: ${AGES[age].n}</h2><p>Your base was destroyed!</p>
      <p style="color:#e040fb;font-size:14px">+&#128142; ${lastGemReward} consolation gems (Total: ${gems})</p>
      <p style="font-size:12px;color:#666">Total retries: ${retries}</p>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:12px">
        <button class="obtn br" onclick="retry()">RETRY</button>
        <button class="obtn" style="background:linear-gradient(135deg,#7B1FA2,#E040FB)" onclick="hideOvl();toggleShop()">&#128142; SHOP</button>
      </div>
      <p style="font-size:11px;color:#555;margin-top:8px">SPACE to retry</p>`}
  else if(gs==='won'){
    const s=Math.floor((Date.now()-startT)/1000),m=Math.floor(s/60);
    el.innerHTML=`<h1 style="font-size:40px">ALL OF HISTORY CONQUERED!</h1>
      <h2 style="color:#ffd700">All 100 Ages Complete</h2>
      <p>Time: ${m}m ${s%60}s &mdash; Retries: ${retries}</p>
      <p style="color:#e040fb;font-size:16px">Total Gems: &#128142; ${gems}</p>
      <p style="font-size:16px;margin:16px 0;color:#aaa">From Amoeba to Omega Colossus</p>
      <button class="obtn bb" onclick="age=0;retries=0;startT=Date.now();startG()">PLAY AGAIN</button>`}
}
function hideOvl(){document.getElementById('overlay').style.display='none'}
function closeShop(){if(shopOpen){shopOpen=false;document.getElementById('shop-panel').style.display='none'}}
function startG(){if(!startT)startT=Date.now();hideOvl();closeShop();initMatch();saveGame()}
function nextAge(){age=Math.min(age+1,99);hideOvl();closeShop();initMatch();saveGame()}
function retry(){hideOvl();closeShop();initMatch()}

// ======================== GAME LOOP ========================
let lt=0;
function loop(t){
  const dt=Math.min((t-lt)/1000,0.05);lt=t;
  if(gs==='playing')update(dt*spd);
  render();
  requestAnimationFrame(loop);
}
const hasSave=loadGame();
gs='menu';showOvl();requestAnimationFrame(loop);
</script>
