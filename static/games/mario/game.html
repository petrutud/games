// ██  BACKGROUND DRAWING
// ═══════════════════════════════════════════════
function drawBackground(biome){
  if(!biome)return;
  // Sky
  ctx.fillStyle=biome.sky;ctx.fillRect(0,0,W,H);
  // Parallax elements based on biome
  const px=-cam.x*.2;
  const id=biome.id;
  if(id==='grasslands'||id==='jungle'){
    // Hills
    ctx.fillStyle=id==='jungle'?'#1a4818':'#2a8838';
    for(let i=0;i<6;i++){
      ctx.beginPath();ctx.arc(px+i*200+100,H-30,80+i*10,Math.PI,0);ctx.fill();
    }
    // Clouds
    ctx.fillStyle='rgba(255,255,255,.3)';
    for(let i=0;i<5;i++){
      const cx=px*.5+i*220+50;
      ctx.fillRect(cx,40+i*20,60,15);ctx.fillRect(cx+10,30+i*20,40,10);
    }
  }else if(id==='desert'){
    // Pyramids
    ctx.fillStyle='#c09840';
    ctx.beginPath();ctx.moveTo(px+200,H-60);ctx.lineTo(px+280,100);ctx.lineTo(px+360,H-60);ctx.fill();
    ctx.beginPath();ctx.moveTo(px+500,H-60);ctx.lineTo(px+560,140);ctx.lineTo(px+620,H-60);ctx.fill();
  }else if(id==='ice'){
    // Snow particles
    ctx.fillStyle='rgba(255,255,255,.5)';
    for(let i=0;i<30;i++){
      const sx=(G.totalTime*20+i*97+px*.3)%W;
      const sy=(G.totalTime*50+i*53)%H;
      ctx.fillRect(sx,sy,3,3);
    }
    // Mountains
    ctx.fillStyle='#90b0d0';
    ctx.beginPath();ctx.moveTo(px+100,H-60);ctx.lineTo(px+200,50);ctx.lineTo(px+300,H-60);ctx.fill();
    ctx.beginPath();ctx.moveTo(px+400,H-60);ctx.lineTo(px+480,80);ctx.lineTo(px+560,H-60);ctx.fill();
  }else if(id==='ocean'){
    // Underwater bubbles
    ctx.fillStyle='rgba(100,180,255,.3)';
    for(let i=0;i<20;i++){
      const bx=(G.totalTime*15+i*67+px*.2)%W;
      const by=H-(G.totalTime*40+i*83)%H;
      ctx.beginPath();ctx.arc(bx,by,3+i%3,0,Math.PI*2);ctx.fill();
    }
  }else if(id==='space'){
    // Stars
    for(let i=0;i<60;i++){
      const sx=(i*127+px*.1)%W;
      const sy=(i*89)%H;
      ctx.fillStyle=`rgba(255,255,255,${.3+Math.sin(G.totalTime+i)*.3})`;
      ctx.fillRect(sx,sy,2,2);
    }
    // Planets
    ctx.fillStyle='#804020';
    ctx.beginPath();ctx.arc(px*.3+300,100,40,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#a06030';
    ctx.beginPath();ctx.arc(px*.3+300,100,40,0,Math.PI,true);ctx.fill();
  }else if(id==='ghost'){
    // Fog
    ctx.fillStyle=`rgba(80,40,100,${.2+Math.sin(G.totalTime)*.1})`;
    ctx.fillRect(0,0,W,H);
    // Ghost particles
    ctx.fillStyle='rgba(200,180,220,.15)';
    for(let i=0;i<15;i++){
      const gx=(G.totalTime*10+i*111+px*.2)%W;
      const gy=(i*73+Math.sin(G.totalTime+i)*30)%H;
      ctx.beginPath();ctx.arc(gx,gy,10+i%5,0,Math.PI*2);ctx.fill();
    }
  }else if(id==='lavaFinal'||id==='lavaPreBoss'){
    // Lava glow
    ctx.fillStyle=`rgba(255,60,0,${.1+Math.sin(G.totalTime*2)*.05})`;
    ctx.fillRect(0,H/2,W,H/2);
    // Embers
    ctx.fillStyle='#ff6020';
    for(let i=0;i<20;i++){
      const ex=(G.totalTime*20+i*83+px*.2)%W;
      const ey=H-(G.totalTime*60+i*43)%H;
      ctx.fillRect(ex,ey,2,2);
    }
  }else if(id==='darkRuins'){
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(0,0,W,H);
    // Skull decorations
    ctx.fillStyle='rgba(200,180,160,.1)';
    for(let i=0;i<5;i++){
      ctx.beginPath();ctx.arc(px*.2+i*200+100,H-100,25,0,Math.PI*2);ctx.fill();
    }
  }else if(id==='sky'){
    // Cloud platforms in bg
    ctx.fillStyle='rgba(255,255,255,.2)';
    for(let i=0;i<8;i++){
      ctx.fillRect(px*.4+i*130,80+i*30+Math.sin(G.totalTime+i)*10,80,20);
    }
  }else if(id==='mountain'){
    ctx.fillStyle='#607080';
    ctx.beginPath();ctx.moveTo(px+50,H-50);ctx.lineTo(px+150,30);ctx.lineTo(px+250,H-50);ctx.fill();
    ctx.beginPath();ctx.moveTo(px+350,H-50);ctx.lineTo(px+420,60);ctx.lineTo(px+490,H-50);ctx.fill();
    // Mist
    ctx.fillStyle='rgba(150,160,170,.2)';ctx.fillRect(0,H-120,W,60);
  }
}

// ═══════════════════════════════════════════════
// ██  MAIN UPDATE & DRAW
// ═══════════════════════════════════════════════
function update(dt){
  G.totalTime+=dt;
  // Particles
  particles=particles.filter(p=>{
    p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=400*dt;
    return p.life>0;
  });
  floatTexts=floatTexts.filter(f=>{f.life-=dt;f.y-=40*dt;return f.life>0});
  shakeTimer=Math.max(0,shakeTimer-dt);
  if(shakeTimer<=0){shakeX=0;shakeY=0}

  switch(G.state){
    case 'TITLE':updateTitle(dt);break;
    case 'CUTSCENE':updateCutscene(dt);break;
    case 'WORLD_MAP':updateWorldMap(dt);break;
    case 'PLAYING':
    case 'BOSS':
      if(justDown('escape')){G.paused=!G.paused}
      // L = switch character, M = skill tree, N = map
      if(justDown('l')){switchCharacter()}
      if(justDown('m')){G.skillReturnState=G.state;G.state='SKILL_TREE';break}
      if(justDown('n')){G.state='WORLD_MAP';boss=null;shadowMario=null;break}
      if(G.paused){
        if(justDown('q')){G.paused=false;G.state='WORLD_MAP';boss=null;shadowMario=null}
        break;
      }
      updateMario(dt);
      updateEnemies(dt);
      updateProjectiles(dt);
      if(G.state==='BOSS')updateBoss(boss,dt);
      // Power-up physics
      level.powerUps.forEach(p=>{
        if(!p.active||p.collected)return;
        p.vy+=300*dt;p.y+=p.vy*dt;
        const ty=Math.floor((p.y+TILE)/TILE);
        if(isSolid(Math.floor(p.x/TILE),ty)){p.y=ty*TILE-TILE;p.vy=0}
      });
      break;
    case 'DIALOGUE':updateDialogue(dt);break;
    case 'SKILL_TREE':updateSkillTree(dt);break;
    case 'LEVEL_COMPLETE':
      G.lcTimer+=dt;
      if((justDown(' ')||justDown('enter')||justDown('x'))&&G.lcTimer>1){
        proceedAfterLevel();
      }
      break;
    case 'ENDING':break;
  }
  clearJust();
}

function draw(){
  ctx.save();
  if(shakeTimer>0){
    ctx.translate(
      (Math.random()-.5)*shakeX*2,
      (Math.random()-.5)*shakeY*2
    );
  }

  switch(G.state){
    case 'TITLE':
      drawTitle();break;
    case 'CUTSCENE':
      drawCutscene();break;
    case 'WORLD_MAP':
      drawWorldMap();break;
    case 'PLAYING':
    case 'BOSS':
      drawGame();break;
    case 'DIALOGUE':
      drawGame();drawDialogue();break;
    case 'SKILL_TREE':
      drawSkillTree();break;
    case 'LEVEL_COMPLETE':
      drawGame();drawLevelComplete();break;
    case 'ENDING':
      drawEnding();break;
  }

  // Floating texts (always on top)
  floatTexts.forEach(f=>{
    ctx.globalAlpha=f.life;
    ctx.fillStyle=f.col;ctx.font='bold 11px "Press Start 2P"';
    ctx.fillText(f.text,f.x-cam.x-ctx.measureText(f.text).width/2,f.y-cam.y);
    ctx.globalAlpha=1;
  });

  // Fade effect
  if(G.fadeAlpha>0){
    ctx.fillStyle=`rgba(0,0,0,${G.fadeAlpha})`;ctx.fillRect(0,0,W,H);
  }

  ctx.restore();
}

function drawGame(){
  drawBackground(G.biome);
  // Tiles
  const startTX=Math.max(0,Math.floor(cam.x/TILE));
  const endTX=Math.min(level.w,Math.ceil((cam.x+W)/TILE)+1);
  const startTY=Math.max(0,Math.floor(cam.y/TILE));
  const endTY=Math.min(level.h,Math.ceil((cam.y+H)/TILE)+1);
  for(let tx=startTX;tx<endTX;tx++){
    for(let ty=startTY;ty<endTY;ty++){
      drawTile(tx,ty,G.biome);
    }
  }
  // Coins
  level.coins.forEach(c=>{
    if(c.collected)return;
    drawCoin(c.x-cam.x,c.y-cam.y,G.totalTime);
  });
  // Power Star
  if(level.star&&!level.star.collected){
    level.star.anim+=FDT;
    drawStar(level.star.x-cam.x,level.star.y-cam.y,level.star.anim);
  }
  // Power-ups — unique item boxes per type
  const PU_ITEM_COL={fire:'#ff4020',ice:'#60c8ff',star:'#ffd700',
    spring:'#e0c020',bee:'#f0c020',ghost:'#a080d0',
    rock:'#808080',cloud:'#a0d0ff',rainbow:'#ff80ff',mega:'#ff4040'};
  const PU_ITEM_ICON={fire:'🔥',ice:'❄️',star:'⭐',spring:'🌀',
    bee:'🐝',ghost:'👻',rock:'🪨',cloud:'☁️',rainbow:'🌈',mega:'🍄'};
  level.powerUps.forEach(p=>{
    if(!p.active||p.collected)return;
    const px=p.x-cam.x,py=p.y-cam.y;
    const bob=Math.sin(G.totalTime*3+p.x*.01)*3;
    // Box glow
    const col=PU_ITEM_COL[p.type]||'#ffa';
    ctx.fillStyle=col+'40';
    ctx.beginPath();ctx.arc(px+16,py+16+bob,18,0,Math.PI*2);ctx.fill();
    // Box
    ctx.fillStyle=col;
    ctx.fillRect(px+4,py+4+bob,24,24);
    ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.fillRect(px+4,py+4+bob,24,4);
    // Icon
    ctx.font='14px sans-serif';
    ctx.fillText(PU_ITEM_ICON[p.type]||'?',px+6,py+22+bob);
    // Rainbow special sparkle
    if(p.type==='rainbow'){
      for(let i=0;i<4;i++){
        const a=G.totalTime*4+i*1.57,r=16;
        ctx.fillStyle=`hsl(${(G.totalTime*150+i*90)%360},100%,70%)`;
        ctx.fillRect(px+16+Math.cos(a)*r-2,py+16+bob+Math.sin(a)*r-2,4,4);
      }
    }
  });
  // Toads
  level.toads.forEach(t=>{
    if(!t.rescued)drawToad(t.x-cam.x,t.y-cam.y,false);
  });
  // Pipe piranha plants
  level.pipes.forEach(pipe=>{
    if(pipe.plantY<=0)return;
    const px=pipe.x-cam.x,py=pipe.y-cam.y;
    const rise=pipe.plantY;
    // Stem
    ctx.fillStyle='#20a020';
    ctx.fillRect(px-5,py-rise+16,10,rise);
    // Head — chomping animation
    const chomp=pipe.plantState==='biting'?Math.sin(G.totalTime*10)*6:0;
    // Top jaw
    ctx.fillStyle='#d03020';
    ctx.fillRect(px-14,py-rise-4+chomp,28,12);
    // Bottom jaw
    ctx.fillRect(px-14,py-rise+8-chomp,28,10);
    // White spots
    ctx.fillStyle='#f0f0f0';
    ctx.fillRect(px-10,py-rise-1+chomp,6,5);
    ctx.fillRect(px+4,py-rise-1+chomp,6,5);
    // Teeth
    ctx.fillStyle='#fff';
    for(let t=0;t<4;t++){
      ctx.fillRect(px-11+t*8,py-rise+6+chomp,4,4);
      ctx.fillRect(px-11+t*8,py-rise+8-chomp-3,4,4);
    }
    // Leaves
    ctx.fillStyle='#30a010';
    ctx.fillRect(px-18,py-rise+14,12,6);
    ctx.fillRect(px+6,py-rise+18,12,6);
    // Eyes
    ctx.fillStyle='#fff';
    ctx.fillRect(px-8,py-rise-8+chomp,6,5);ctx.fillRect(px+2,py-rise-8+chomp,6,5);
    ctx.fillStyle='#000';
    ctx.fillRect(px-6,py-rise-7+chomp,3,3);ctx.fillRect(px+4,py-rise-7+chomp,3,3);
  });
  // Enemies
  level.enemies.forEach(e=>{
    if(!e.alive)return;
    const ex=e.x-cam.x,ey=e.y-cam.y;
    if(ex<-40||ex>W+40)return;
    if(e.type==='goomba')drawGoomba(ex,ey,e);
    else if(e.type==='koopa')drawKoopa(ex,ey,e);
    else drawGenericEnemy(ex,ey,e);
  });
  // Shadow Mario
  if(shadowMario&&shadowMario.alive)drawShadowMario(shadowMario);
  // Mario
  if(!M.dead||M.deathTimer<2)drawMario(M.x-cam.x,M.y-cam.y);
  // Boss
  if(boss)drawBoss(boss);
  // Projectiles
  projectiles.forEach(p=>{
    ctx.fillStyle=p.col;
    ctx.globalAlpha=.8;
    ctx.beginPath();ctx.arc(p.x-cam.x,p.y-cam.y,p.size,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });
  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-cam.x,p.y-cam.y,p.size,p.size);
    ctx.globalAlpha=1;
  });
  // Ink clouds (Blooper boss)
  if(boss&&boss.ink){
    boss.ink.forEach(ink=>{
      ink.life-=FDT;
      ctx.fillStyle=`rgba(20,10,40,${Math.min(.7,ink.life*.3)})`;
      ctx.beginPath();ctx.arc(ink.x-cam.x,ink.y-cam.y,ink.r,0,Math.PI*2);ctx.fill();
    });
    boss.ink=boss.ink.filter(i=>i.life>0);
  }
  // Omega Bowser lava
  if(boss&&boss.type==='omegaBowser'&&boss.phase>=3&&boss.lavaY){
    ctx.fillStyle='rgba(255,60,0,.6)';
    ctx.fillRect(0,boss.lavaY-cam.y,W,H-(boss.lavaY-cam.y));
    ctx.fillStyle=`rgba(255,200,0,${.3+Math.sin(G.totalTime*4)*.2})`;
    ctx.fillRect(0,boss.lavaY-cam.y,W,8);
  }
  // HUD
  drawHUD();
  // Pause overlay
  if(G.paused){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='24px "Press Start 2P"';
    ctx.fillText('PAUSED',W/2-80,H/2-20);
    ctx.fillStyle='#aaa';ctx.font='11px "Press Start 2P"';
    ctx.fillText('Press ESC to resume',W/2-120,H/2+20);
    ctx.fillText('Press Q to quit to map',W/2-130,H/2+45);
  }
}

// ═══════════════════════════════════════════════
// ██  GAME LOOP
// ═══════════════════════════════════════════════
let lastTime=0;
function gameLoop(time){
  const dt=Math.min((time-lastTime)/1000,.05);
  lastTime=time;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// Init
resetMario(100,300);
applySkills();
requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
