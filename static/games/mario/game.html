.mc-btn.special{background:rgba(60,60,255,.25);border-color:rgba(60,60,255,.45)}

// ██  INPUT SYSTEM
// ═══════════════════════════════════════════════
const keys={},kdown={};
function kset(k,v){
  if(v&&!keys[k])kdown[k]=true;
  keys[k]=v;
}
document.addEventListener('keydown',e=>{kset(e.key.toLowerCase(),true);e.preventDefault()});
document.addEventListener('keyup',e=>{kset(e.key.toLowerCase(),false)});

// Mobile
const mmap={
  'btn-left':'arrowleft','btn-right':'arrowright',
  'btn-jump':' ','btn-attack':'x','btn-special':'c',
  'btn-down':'arrowdown','btn-switch':'l','btn-map':'n','btn-skills':'m'
};
Object.entries(mmap).forEach(([id,k])=>{
  const b=document.getElementById(id);
  if(!b)return;
  const on=()=>{kset(k,true);b.classList.add('active')};
  const off=()=>{kset(k,false);b.classList.remove('active')};
  b.addEventListener('touchstart',e=>{e.preventDefault();on()});
  b.addEventListener('touchend',e=>{e.preventDefault();off()});
  b.addEventListener('touchcancel',e=>{e.preventDefault();off()});
  b.addEventListener('mousedown',on);
  b.addEventListener('mouseup',off);
  b.addEventListener('mouseleave',off);
});

function justDown(k){return kdown[k]||false}
function clearJust(){for(let k in kdown)kdown[k]=false}

// ██  SAVE / LOAD (localStorage)
// ═══════════════════════════════════════════════
const SAVE_KEY='mario_ultimate_save';
function saveGame(){
  try{
    const data={
      stars:G.stars,coins:G.coins,lives:G.lives,
      rescued:{...G.rescued},
      completed:[...G.completed],
      helpedBJ:G.helpedBJ,
      skills:{...G.skills},
      skillPts:G.skillPts,
      difficulty:G.difficulty,
      shadowDefeats:G.shadowDefeats,
      character:G.character,
      ghostDevice:M.ghostDevice,
      mapCursor:G.mapCursor,
      totalTime:G.totalTime
    };
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));
  }catch(e){}
}
function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    G.stars=d.stars||0;G.coins=d.coins||0;G.lives=d.lives||5;
    G.rescued=d.rescued||{luigi:false,peach:false,daisy:false,rosalina:false,egadd:false,toad:false,toadsworth:false,yoshi:false,diddy:false,pauline:false,dk:false,lumas:false,kamek:false,toads:0};
    G.completed=d.completed||[];
    G.helpedBJ=d.helpedBJ||false;
    G.skills=d.skills||{atk:0,def:0,spd:0,spc:0};
    G.skillPts=d.skillPts||0;
    G.difficulty=d.difficulty||'normal';
    G.shadowDefeats=d.shadowDefeats||0;
    G.character=d.character||'mario';
    M.ghostDevice=d.ghostDevice||false;
    G.mapCursor=d.mapCursor||0;
    G.totalTime=d.totalTime||0;
    if(G.difficulty==='easy'){M.maxHp=150;M.hp=150}
    else if(G.difficulty==='hard'){M.maxHp=75;M.hp=75}
    else{M.maxHp=100;M.hp=100}
    applyRescueBonuses();
    return true;
  }catch(e){return false}
}
function hasSave(){
  try{return !!localStorage.getItem(SAVE_KEY)}catch(e){return false}
}
function deleteSave(){
  try{localStorage.removeItem(SAVE_KEY)}catch(e){}
}

// ██  AUDIO (simple synth)
// ═══════════════════════════════════════════════
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type='square',vol=.08){
  try{
    initAudio();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function sfxJump(){playTone(520,.12);setTimeout(()=>playTone(680,.1),50)}
function sfxCoin(){playTone(988,.08);setTimeout(()=>playTone(1319,.12),60)}
function sfxHit(){playTone(200,.15,'sawtooth',.1)}
function sfxBoss(){playTone(120,.3,'sawtooth',.12)}
function sfxPower(){playTone(523,.1);setTimeout(()=>playTone(659,.1),80);setTimeout(()=>playTone(784,.15),160)}
function sfxStar(){playTone(1047,.08);setTimeout(()=>playTone(1319,.08),60);setTimeout(()=>playTone(1568,.12),120)}

let level={tiles:[],enemies:[],coins:[],powerUps:[],toads:[],star:null,pipes:[],pipeTimer:0,w:0,h:17};
let cam={x:0,y:0};
let boss=null;
let projectiles=[];

function generateLevel(biomeId){
  const b=BIOMES.find(b=>b.id===biomeId);
  if(!b)return;
  const lw=b.levelLen;
  level.w=lw;level.h=17;
  level.tiles=[];level.enemies=[];level.coins=[];level.powerUps=[];level.toads=[];level.star=null;
  level.pipes=[];level.pipeTimer=0;
  projectiles=[];
  // Init tile grid
  for(let x=0;x<lw;x++){
    level.tiles[x]=[];
    for(let y=0;y<17;y++)level.tiles[x][y]=0;
  }
  // Ground
  const groundY=14;
  for(let x=0;x<lw;x++){
    for(let y=groundY;y<17;y++)level.tiles[x][y]=1;
  }
  // Platforms and gaps
  const rng=mulberry32(hashStr(biomeId));
  // Gaps
  for(let i=0;i<Math.floor(lw/15);i++){
    const gx=15+Math.floor(rng()*lw*.7);
    const gw=2+Math.floor(rng()*2);
    for(let dx=0;dx<gw;dx++){
      if(gx+dx<lw-20){
        for(let y=groundY;y<17;y++)level.tiles[gx+dx][y]=0;
        // Lava/water at bottom of gaps for certain biomes
        if(biomeId==='lavaFinal'||biomeId==='lavaPreBoss')level.tiles[gx+dx][16]=3; // lava
        if(biomeId==='ocean')level.tiles[gx+dx][16]=4; // water
      }
    }
  }
  // Floating platforms
  for(let i=0;i<Math.floor(lw/6);i++){
    const px=8+Math.floor(rng()*lw*.8);
    const py=7+Math.floor(rng()*5);
    const pw=2+Math.floor(rng()*3);
    for(let dx=0;dx<pw;dx++){
      if(px+dx<lw)level.tiles[px+dx][py]=2;
    }
    // Coins on platforms
    if(rng()>.3){
      for(let dx=0;dx<pw;dx++){
        if(rng()>.4)level.coins.push({x:(px+dx)*TILE+8,y:(py-1)*TILE,collected:false});
      }
    }
  }
  // Pipes — all biomes get 3-5 pipes, piranha plants emerge every 20s
  const numPipes=3+Math.floor(rng()*3);
  for(let i=0;i<numPipes;i++){
    const px=15+Math.floor(rng()*(lw-35));
    const ph=2+Math.floor(rng()*2);
    const topY=groundY-ph;
    // Make sure pipe area is clear
    let blocked=false;
    for(let dy=0;dy<ph;dy++){
      if(px>=lw-1||level.tiles[px][groundY-1-dy]!==0)blocked=true;
    }
    if(blocked)continue;
    for(let dy=0;dy<ph;dy++){
      if(px<lw)level.tiles[px][groundY-1-dy]=5;
      if(px+1<lw)level.tiles[px+1][groundY-1-dy]=5;
    }
    // Track pipe top position for piranha spawning
    level.pipes.push({x:px*TILE+TILE/2,y:topY*TILE,active:false,plantY:0,plantState:'hidden',plantTimer:0});
  }
  // Enemies
  for(let i=0;i<Math.floor(lw/8);i++){
    const ex=15+Math.floor(rng()*lw*.75);
    const etype=b.enemies[Math.floor(rng()*b.enemies.length)];
    level.enemies.push({type:etype,x:ex*TILE,y:(groundY-1)*TILE,vx:-40-rng()*30,
      hp:getEnemyHP(etype),maxHp:getEnemyHP(etype),alive:true,frame:0,frameT:0,
      startX:ex*TILE,patrol:80+rng()*60});
  }
  // Coins on ground
  for(let i=0;i<Math.floor(lw/4);i++){
    const cx=10+Math.floor(rng()*(lw-20));
    level.coins.push({x:cx*TILE+8,y:(groundY-1)*TILE,collected:false});
  }
  // ? blocks with power-ups (10 types, weighted rarity)
  // common: fire,ice,spring,rock  uncommon: star,bee,ghost,cloud,mega  rare: rainbow
  const puPool=[];
  for(let r=0;r<5;r++){puPool.push('fire','ice','spring','rock')} // common x5
  for(let r=0;r<3;r++){puPool.push('star','bee','ghost','cloud','mega')} // uncommon x3
  puPool.push('rainbow'); // rare x1
  for(let i=0;i<7;i++){
    const px=10+Math.floor(rng()*(lw-25));
    const py=8+Math.floor(rng()*4);
    if(px<lw)level.tiles[px][py]=6; // ? block
    const puType=puPool[Math.floor(rng()*puPool.length)];
    level.powerUps.push({x:px*TILE,y:py*TILE,type:puType,active:false,collected:false,vy:0,blockX:px,blockY:py});
  }
  // Toads to rescue
  for(let i=0;i<3;i++){
    const tx=20+Math.floor(rng()*(lw-30));
    level.toads.push({x:tx*TILE,y:(groundY-1)*TILE-8,rescued:false,frame:0});
  }
  // Power Star (hidden)
  const sx=Math.floor(lw*.6+rng()*lw*.2);
  const sy=5+Math.floor(rng()*3);
  level.star={x:sx*TILE,y:sy*TILE,collected:false,anim:0};
  // Boss arena: clear area at end
  for(let x=lw-25;x<lw;x++){
    for(let y=0;y<groundY;y++)level.tiles[x][y]=0;
    for(let y=groundY;y<17;y++)level.tiles[x][y]=1;
  }
  // walls around boss arena
  for(let y=0;y<17;y++){level.tiles[lw-1][y]=1;level.tiles[0][y]=1;}
  // Warp pipe — golden pipe near start that warps to boss area
  const wpx=6;
  for(let dy=0;dy<3;dy++){
    if(wpx<lw)level.tiles[wpx][groundY-1-dy]=7; // warp pipe tile
    if(wpx+1<lw)level.tiles[wpx+1][groundY-1-dy]=7;
  }
  level.warpPipe={x:wpx*TILE,y:(groundY-3)*TILE,targetX:(lw-20)*TILE};
  // Special biome features
  if(biomeId==='ice'){
    // slippery ground marker
    level.icy=true;
  }else level.icy=false;
  if(biomeId==='space'){
    level.lowGrav=true;
  }else level.lowGrav=false;
  if(biomeId==='ocean'){
    level.underwater=true;
  }else level.underwater=false;
}

function getEnemyHP(type){
  const hp={'goomba':1,'koopa':2,'pokey':2,'buzzy':3,'freezie':1,'mrblizzard':2,
    'piranha':2,'wiggly':3,'cheep':1,'urchin':2,'paratroopa':2,'lakitu':3,
    'monty':2,'thwomp':4,'ufo':2,'starbug':1,'boo':2,'dryBones':3,
    'magikoopa':3,'firebar':99,'podoboo':99,'hammer':2};
  return hp[type]||2;
}

// Seeded RNG
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t^=t+Math.imul(t^t>>>7,61|t);return((t^t>>>14)>>>0)/4294967296}}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return h}

// ██  COLLISION
// ═══════════════════════════════════════════════
function tileAt(tx,ty){
  if(tx<0||tx>=level.w||ty<0||ty>=level.h)return ty>=level.h?1:0;
  return level.tiles[tx][ty];
}
function isSolid(tx,ty){const t=tileAt(tx,ty);return t===1||t===2||t===5||t===6||t===7}
function rectOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function drawMario(x,y){
  const isMega=M.powerUp==='mega';
  const isGhost=M.powerUp==='ghost';
  const isRainbow=M.powerUp==='rainbow';
  const baseAlpha=isGhost?.55:1;
  const sc=M.inv>0&&Math.floor(G.totalTime*10)%2?0.5:baseAlpha;
  ctx.globalAlpha=sc;
  // Mega mushroom: scale up 2x
  if(isMega){
    ctx.save();
    ctx.translate(x+M.w/2,y+M.h);
    ctx.scale(2,2);
    ctx.translate(-(x+M.w/2),-(y+M.h));
  }
  const f=M.face;
  const cx=x+M.w/2, cy=y;

  // ── Mega glow ──
  if(isMega){
    ctx.fillStyle=`rgba(255,200,50,${.2+Math.sin(G.totalTime*4)*.1})`;
    ctx.beginPath();ctx.arc(cx,cy+20,35,0,Math.PI*2);ctx.fill();
    // Ground shake particles
    if(M.ground&&Math.abs(M.vx)>30){
      ctx.fillStyle='#a08040';
      ctx.fillRect(cx-20+Math.random()*40,cy+38,4+Math.random()*4,4);
    }
  }
  // ── Rock armor outline ──
  if(M.powerUp==='rock'){
    ctx.fillStyle='rgba(100,90,80,.4)';
    ctx.fillRect(cx-16,cy-12,32,56);
    ctx.fillStyle='#706860';
    ctx.fillRect(cx-14,cy+30,28,12); // heavy boots
  }
  // ── Bee wings ──
  if(M.powerUp==='bee'){
    ctx.fillStyle=`rgba(200,220,255,${.35+Math.sin(G.totalTime*25)*.2})`;
    const wy=Math.sin(G.totalTime*25)*3;
    ctx.fillRect(cx-20,cy+2+wy,14,18);
    ctx.fillRect(cx+8,cy+2-wy,14,18);
  }
  // ── Cloud wisps ──
  if(M.powerUp==='cloud'){
    ctx.fillStyle=`rgba(200,220,255,${.3+Math.sin(G.totalTime*3)*.15})`;
    ctx.beginPath();ctx.arc(cx,cy+42,14,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-10,cy+38,10,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+10,cy+38,10,0,Math.PI*2);ctx.fill();
  }

  // Shoes
  ctx.fillStyle=M.powerUp==='rock'?'#504840':M.powerUp==='spring'?'#c0a020':'#6B3410';
  ctx.fillRect(cx-12+f*2,cy+32,10,8);ctx.fillRect(cx+2+f*2,cy+32,10,8);
  // Spring coils under shoes
  if(M.powerUp==='spring'){
    ctx.fillStyle='#c8c8c8';
    for(let s=0;s<3;s++){
      ctx.fillRect(cx-10+s*3,cy+38+s*2,6,2);
      ctx.fillRect(cx+4+s*3,cy+38+s*2,6,2);
    }
  }
  // Overalls
  ctx.fillStyle=puOveralls();
  ctx.fillRect(cx-10,cy+16,20,18);
  // Bee stripes
  if(M.powerUp==='bee'){
    ctx.fillStyle='#302000';
    ctx.fillRect(cx-10,cy+20,20,3);ctx.fillRect(cx-10,cy+27,20,3);
  }
  // Buttons
  ctx.fillStyle=isRainbow?'#fff':'#ffd700';
  ctx.fillRect(cx-3,cy+20,3,3);ctx.fillRect(cx+2,cy+20,3,3);
  // Shirt
  ctx.fillStyle=puShirt();
  ctx.fillRect(cx-12,cy+10,24,12);
  // Arms
  ctx.fillStyle=isGhost?'#c0b8d8':'#f8c090';
  if(M.atk){
    ctx.fillRect(cx+f*14,cy+12,8*f,6);
  }else{
    ctx.fillRect(cx-14,cy+14,4,10);ctx.fillRect(cx+10,cy+14,4,10);
  }
  // Gloves
  ctx.fillStyle=M.powerUp==='rock'?'#808080':'#fff';
  if(M.atk){
    ctx.fillRect(cx+f*20,cy+10,6*f,8);
    if(M.atkTimer>.1){
      ctx.fillStyle=M.powerUp==='fire'?'rgba(255,100,20,.5)':M.powerUp==='ice'?'rgba(80,180,255,.5)':M.powerUp==='rock'?'rgba(160,140,120,.5)':'rgba(255,200,0,.5)';
      ctx.beginPath();ctx.arc(cx+f*26,cy+14,10+Math.sin(G.totalTime*20)*3,0,Math.PI*2);ctx.fill();
    }
  }else{
    ctx.fillRect(cx-16,cy+22,5,5);ctx.fillRect(cx+11,cy+22,5,5);
  }
  // Head
  ctx.fillStyle=isGhost?'#c0b8d8':M.powerUp==='bee'?'#f8d878':'#f8c090';
  ctx.fillRect(cx-8,cy-2,16,14);
  // Eyes
  ctx.fillStyle=isGhost?'#6040a0':'#000';
  ctx.fillRect(cx+f*2-1,cy+2,3,4);
  ctx.fillStyle=isGhost?'#c0a0ff':'#fff';
  ctx.fillRect(cx+f*2,cy+2,2,2);
  // Mustache
  ctx.fillStyle=isGhost?'#6050a0':'#4a2800';
  ctx.fillRect(cx-6,cy+8,12,3);
  // Hat
  ctx.fillStyle=puHat();
  ctx.fillRect(cx-10,cy-8,20,8);
  ctx.fillRect(cx+f*4-6,cy-10,16,4);
  // Bee antennae
  if(M.powerUp==='bee'){
    ctx.fillStyle='#302000';
    ctx.fillRect(cx-4,cy-14,2,6);ctx.fillRect(cx+4,cy-14,2,6);
    ctx.fillStyle='#f0c020';
    ctx.fillRect(cx-5,cy-16,3,3);ctx.fillRect(cx+4,cy-16,3,3);
  }
  // Hat emblem
  ctx.fillStyle='#fff';
  ctx.fillRect(cx-2,cy-7,6,5);
  ctx.fillStyle=M.powerUp==='ghost'?'#8060c0':puShirt();
  ctx.font='5px sans-serif';
  ctx.fillText(isLuigi()?'L':'M',cx-1,cy-3);

  // ── Star sparkle ──
  if(M.powerUp==='star'){
    ctx.fillStyle=`hsl(${G.totalTime*200%360},100%,70%)`;
    for(let i=0;i<5;i++){
      const a=G.totalTime*3+i*1.26,r=20+Math.sin(G.totalTime*5+i)*5;
      ctx.fillRect(cx+Math.cos(a)*r-2,cy+10+Math.sin(a)*r-2,4,4);
    }
  }
  // ── Rainbow aura ──
  if(isRainbow){
    for(let i=0;i<8;i++){
      const hue=(G.totalTime*150+i*45)%360;
      ctx.fillStyle=`hsla(${hue},100%,65%,.35)`;
      const a=G.totalTime*4+i*.785,r=24+Math.sin(G.totalTime*6+i)*6;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+14+Math.sin(a)*r,5,0,Math.PI*2);ctx.fill();
    }
    // Rainbow trail
    ctx.fillStyle=`hsla(${G.totalTime*200%360},100%,70%,.2)`;
    ctx.fillRect(cx-M.face*20-6,cy+5,12,30);
  }
  // ── Ghost transparency effect ──
  if(isGhost){
    ctx.fillStyle=`rgba(160,120,220,${.15+Math.sin(G.totalTime*4)*.1})`;
    ctx.beginPath();ctx.arc(cx,cy+16,22,0,Math.PI*2);ctx.fill();
  }
  // ── Spring bounce indicator ──
  if(M.powerUp==='spring'&&!M.ground){
    ctx.fillStyle='rgba(200,200,0,.3)';
    ctx.fillRect(cx-6,cy+40,12,4+Math.sin(G.totalTime*12)*3);
  }
  // ── Rock armor cracks ──
  if(M.powerUp==='rock'){
    ctx.strokeStyle='rgba(60,50,40,.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-6,cy+4);ctx.lineTo(cx-2,cy+14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+8,cy+6);ctx.lineTo(cx+4,cy+16);ctx.stroke();
  }

  // Ghost device
  if(M.ghostDevice&&G.biome&&G.biome.id==='ghost'){
    ctx.fillStyle='#80ff80';
    ctx.fillRect(cx-5,cy+28,10,6);
    ctx.fillStyle='#40a040';
    ctx.fillRect(cx-3,cy+24,6,6);
  }
  // Special attack effect
  if(M.spcActive){
    const col=M.powerUp==='fire'?'#ff4020':M.powerUp==='ice'?'#60c8ff':M.powerUp==='rainbow'?`hsl(${G.totalTime*300%360},100%,60%)`:'#ffa000';
    ctx.fillStyle=col;
    ctx.globalAlpha=.6;
    ctx.beginPath();ctx.arc(cx+M.face*30,cy+10,12+Math.sin(G.totalTime*15)*4,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  if(isMega)ctx.restore();
}

function drawTile(tx,ty,biome){
  const t=level.tiles[tx][ty];
  if(t===0)return;
  const x=tx*TILE-cam.x,y=ty*TILE-cam.y;
  if(x<-TILE||x>W||y<-TILE||y>H)return;
  if(t===1){
    ctx.fillStyle=ty===14?biome.ground:biome.groundDark;
    ctx.fillRect(x,y,TILE,TILE);
    if(ty===14){
      ctx.fillStyle=biome.ground;
      ctx.fillRect(x,y,TILE,4);
    }
    // texture
    ctx.fillStyle='rgba(0,0,0,.1)';
    ctx.fillRect(x+8,y+8,2,2);ctx.fillRect(x+20,y+16,2,2);
  }else if(t===2){
    ctx.fillStyle=biome.platCol;
    ctx.fillRect(x,y,TILE,TILE);
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.fillRect(x,y,TILE,4);
    ctx.fillStyle='rgba(0,0,0,.15)';
    ctx.fillRect(x,y+TILE-4,TILE,4);
  }else if(t===3){
    // lava
    ctx.fillStyle='#f04000';
    ctx.fillRect(x,y,TILE,TILE);
    ctx.fillStyle=`rgba(255,200,0,${.3+Math.sin(G.totalTime*3+tx)*.2})`;
    ctx.fillRect(x,y,TILE,8);
  }else if(t===4){
    // water
    ctx.fillStyle='#1848d0';
    ctx.fillRect(x,y,TILE,TILE);
    ctx.fillStyle=`rgba(100,180,255,${.2+Math.sin(G.totalTime*2+tx)*.15})`;
    ctx.fillRect(x,y,TILE,6);
  }else if(t===5){
    // pipe
    ctx.fillStyle='#20a020';
    ctx.fillRect(x,y,TILE,TILE);
    ctx.fillStyle='#40c840';
    ctx.fillRect(x+4,y,TILE-8,TILE);
    ctx.fillStyle='#60e060';
    ctx.fillRect(x+8,y,4,TILE);
  }else if(t===6){
    // ? block
    const bounce=Math.sin(G.totalTime*3+tx)*.5;
    ctx.fillStyle='#f0a020';
    ctx.fillRect(x,y+bounce,TILE,TILE);
    ctx.fillStyle='#f8c040';
    ctx.fillRect(x+2,y+2+bounce,TILE-4,TILE-4);
    ctx.fillStyle='#fff';
    ctx.font='bold 16px sans-serif';
    ctx.fillText('?',x+10,y+22+bounce);
  }else if(t===7){
    // Warp pipe — golden/glowing
    const glow=.7+Math.sin(G.totalTime*4)*.3;
    ctx.fillStyle=`rgba(220,180,20,${glow})`;
    ctx.fillRect(x,y,TILE,TILE);
    ctx.fillStyle='#f0d040';
    ctx.fillRect(x+4,y,TILE-8,TILE);
    ctx.fillStyle='#ffe870';
    ctx.fillRect(x+8,y,4,TILE);
    // Sparkle
    ctx.fillStyle='#fff';
    const sp=Math.sin(G.totalTime*6+tx+ty)*4;
    ctx.fillRect(x+10+sp,y+8,3,3);
    ctx.fillRect(x+18-sp,y+18,3,3);
    // Arrow hint on top tile
    if(ty<=13&&tileAt(tx,ty-1)!==7){
      ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';
      ctx.fillText('▼',x+8,y-2+Math.sin(G.totalTime*3)*3);
    }
  }
}

function drawBoss(b){
  if(!b||!b.alive)return;
  const x=b.x-cam.x,y=b.y-cam.y;
  const flash=b.hitFlash>0&&Math.floor(G.totalTime*20)%2;
  ctx.globalAlpha=flash?.5:1;

  switch(b.base||b.type){
    case 'goombaKing':
      // Giant goomba - 3x size
      ctx.fillStyle='#a05020';ctx.fillRect(x-10,y+10,80,50);
      ctx.fillStyle='#d08050';ctx.fillRect(x-14,y-15,88,35);
      ctx.fillStyle='#fff';ctx.fillRect(x+5,y+15,16,14);ctx.fillRect(x+40,y+15,16,14);
      ctx.fillStyle='#000';ctx.fillRect(x+9,y+19,8,8);ctx.fillRect(x+44,y+19,8,8);
      ctx.fillStyle='#604020';
      ctx.fillRect(x-5,y+55,25,15);ctx.fillRect(x+40,y+55,25,15);
      // Crown
      ctx.fillStyle='#ffd700';ctx.fillRect(x+10,y-25,40,15);
      ctx.fillStyle='#ff0000';ctx.fillRect(x+20,y-22,6,6);ctx.fillRect(x+34,y-22,6,6);
      break;
    case 'templeGuardian':
      // Stone golem
      ctx.fillStyle='#908878';ctx.fillRect(x,y,64,70);
      ctx.fillStyle='#a09888';ctx.fillRect(x+8,y+8,48,54);
      // eyes (glow)
      ctx.fillStyle=b.phase>=2?'#ff4040':'#40ff40';
      ctx.fillRect(x+16,y+20,10,8);ctx.fillRect(x+38,y+20,10,8);
      // runes
      ctx.fillStyle='#60e0a0';
      ctx.fillRect(x+24,y+40,16,4);ctx.fillRect(x+30,y+36,4,12);
      // arms
      ctx.fillStyle='#807868';
      ctx.fillRect(x-20,y+15,22,14);ctx.fillRect(x+62,y+15,22,14);
      break;
    case 'shadowDragon':
      // Dragon shape — dark shadow theme
      ctx.fillStyle='#302040';
      // body
      ctx.fillRect(x+10,y+15,50,35);
      // head
      ctx.fillRect(x+50,y,30,30);
      ctx.fillStyle='#4a2060';
      ctx.fillRect(x+55,y+5,20,20);
      // eyes
      ctx.fillStyle='#c020ff';ctx.fillRect(x+62,y+8,6,6);
      // wings
      ctx.fillStyle='#5a3080';
      const wingY=Math.sin(G.totalTime*4)*8;
      ctx.fillRect(x-10,y-15+wingY,30,20);ctx.fillRect(x+40,y-15-wingY,30,20);
      // tail
      ctx.fillStyle='#302040';
      ctx.fillRect(x-15,y+25,25,10);
      // shadow breath indicator
      if(b.state==='breathe'){
        ctx.fillStyle=`rgba(140,40,220,${.3+Math.sin(G.totalTime*10)*.2})`;
        ctx.fillRect(x+78,y+10,60+Math.sin(G.totalTime*8)*10,20);
      }
      break;
    case 'piranhaTitan':
      // Giant piranha plant
      ctx.fillStyle='#40a020';
      // stem
      ctx.fillRect(x+25,y+30,14,40);
      // head
      ctx.fillStyle='#d03020';
      const chomp=Math.sin(G.totalTime*6)*8;
      ctx.fillRect(x,y-10+chomp,64,25);
      ctx.fillRect(x,y+10-chomp,64,25);

      break;
    case 'rockTitan':
      ctx.fillStyle='#706860';ctx.fillRect(x,y,70,75);

      ctx.fillRect(x-10,y+25,15,20);ctx.fillRect(x+65,y+25,15,20);
      break;
    case 'bowserJr':
      // Clown car
      ctx.fillStyle='#d0d0d0';
      ctx.fillRect(x,y+25,60,30);
      ctx.fillStyle='#e0e0e0';ctx.fillRect(x+5,y+28,50,24);
      // Jr inside
      ctx.fillStyle='#e8c070';
      ctx.fillRect(x+15,y,30,30);
      // bandana
      ctx.fillStyle='#f0f0f0';ctx.fillRect(x+12,y+2,36,10);
      ctx.fillStyle='#000';
      // mouth drawing
      ctx.fillRect(x+20,y+18,20,6);

      ctx.fillStyle='#000';ctx.fillRect(x+22,y+10,5,5);ctx.fillRect(x+33,y+10,5,5);

      ctx.fillStyle='#000';
      ctx.fillRect(x+10,y+35,8,8);ctx.fillRect(x+42,y+35,8,8);
      ctx.fillStyle='#d03030';ctx.fillRect(x+25,y+40,10,10);
      // propeller
      const rot=G.totalTime*15;
      ctx.fillStyle='#888';
      ctx.fillRect(x+20+Math.sin(rot)*15,y+52,20,4);
      break;
    case 'kingBoo':
      // Giant ghost
      const alpha=.7+Math.sin(G.totalTime*2)*.2;
      ctx.globalAlpha=alpha*(flash?.5:1);
      ctx.fillStyle='#f0e8f8';
      ctx.beginPath();ctx.arc(x+35,y+30,35,0,Math.PI*2);ctx.fill();
      // Crown
      ctx.fillStyle='#c020c0';
      ctx.fillRect(x+15,y-10,40,15);
      ctx.fillStyle='#ff0000';ctx.fillRect(x+25,y-8,6,6);ctx.fillRect(x+39,y-8,6,6);

      ctx.fillRect(x+20,y+20,10,10);ctx.fillRect(x+40,y+20,10,10);
      ctx.fillStyle='#e020e0';
      ctx.fillRect(x+22,y+22,6,6);ctx.fillRect(x+42,y+22,6,6);
      // mouth
      ctx.fillStyle='#300830';
      ctx.fillRect(x+22,y+38,26,10);
      // tongue
      ctx.fillStyle='#d04080';
      ctx.fillRect(x+30,y+44,10,8);
      // illusion clones
      if(b.clones){
        ctx.globalAlpha=.3;
        b.clones.forEach(c=>{
          ctx.fillStyle='#f0e8f8';
          ctx.beginPath();ctx.arc(c.x-cam.x+35,c.y-cam.y+30,30,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#000';
          ctx.fillRect(c.x-cam.x+20,c.y-cam.y+20,8,8);
          ctx.fillRect(c.x-cam.x+40,c.y-cam.y+20,8,8);
        });
      }
      break;
    case 'dryBowser':
      // Skeleton bowser
      ctx.fillStyle='#d8d0b8';
      ctx.fillRect(x+5,y+10,55,45);
      ctx.fillStyle='#c0b8a0';ctx.fillRect(x+10,y+15,45,35);
      // Skull head
      ctx.fillStyle='#e0d8c0';
      ctx.fillRect(x+35,y-10,35,35);
      ctx.fillStyle='#000';
      ctx.fillRect(x+42,y-2,8,10);ctx.fillRect(x+56,y-2,8,10);
      // Jaw
      ctx.fillStyle='#d0c8b0';ctx.fillRect(x+40,y+15,28,10);
      // teeth
      ctx.fillStyle='#fff';
      for(let i=0;i<4;i++)ctx.fillRect(x+43+i*7,y+17,4,6);
      // Spikes on shell
      ctx.fillStyle='#908878';
      for(let i=0;i<4;i++)ctx.fillRect(x+10+i*13,y+5,8,10);
      // Bone arms
      ctx.fillStyle='#d0c8b0';
      ctx.fillRect(x-10,y+20,18,6);ctx.fillRect(x+57,y+20,18,6);
      // Blue fire aura
      ctx.fillStyle=`rgba(40,80,255,${.2+Math.sin(G.totalTime*4)*.1})`;
      ctx.beginPath();ctx.arc(x+32,y+30,45,0,Math.PI*2);ctx.fill();
      break;
    case 'magmaBeast':
      // Lava creature
      ctx.fillStyle='#f04000';
      ctx.fillRect(x+5,y+5,55,55);
      ctx.fillStyle='#ff6020';ctx.fillRect(x+10,y+10,45,45);
      // Lava drips
      ctx.fillStyle='#f08020';
      for(let i=0;i<5;i++){
        const drip=Math.sin(G.totalTime*2+i)*8;
        ctx.fillRect(x+8+i*10,y+55,8,10+drip);
      }
      // Eyes
      ctx.fillStyle='#fff';ctx.fillRect(x+15,y+18,12,10);ctx.fillRect(x+38,y+18,12,10);
      ctx.fillStyle='#ff0';ctx.fillRect(x+19,y+20,5,6);ctx.fillRect(x+42,y+20,5,6);
      // Mouth/crater
      ctx.fillStyle='#a02000';ctx.fillRect(x+20,y+38,25,12);
      break;
    case 'omegaBowser':
      // Massive bowser
      const sc2=b.phase>=2?1.3:1;
      ctx.save();
      if(sc2>1)ctx.translate(x+40,y+40);
      if(sc2>1)ctx.scale(sc2,sc2);
      if(sc2>1)ctx.translate(-(x+40),-(y+40));
      // Shell
      ctx.fillStyle='#308030';ctx.fillRect(x+5,y+15,70,50);
      ctx.fillStyle='#40a040';ctx.fillRect(x+10,y+20,60,40);
      // Spikes
      ctx.fillStyle='#d0d0d0';
      for(let i=0;i<5;i++){
        ctx.fillRect(x+12+i*12,y+8,8,14);
      }
      // Head
      ctx.fillStyle='#c8a030';ctx.fillRect(x+50,y-15,35,40);
      // Horns
      ctx.fillStyle='#e0d0a0';
      ctx.fillRect(x+52,y-25,8,15);ctx.fillRect(x+72,y-25,8,15);
      // Eyes (red for omega)
      ctx.fillStyle=b.phase>=2?'#ff0000':'#ff4020';
      ctx.fillRect(x+58,y-5,8,8);ctx.fillRect(x+72,y-5,8,8);
      ctx.fillStyle='#000';ctx.fillRect(x+60,y-3,4,4);ctx.fillRect(x+74,y-3,4,4);
      // Mouth
      ctx.fillStyle='#400';ctx.fillRect(x+56,y+10,26,12);
      // Fire breath
      if(b.state==='fireBreath'){
        ctx.fillStyle=b.phase>=2?'#4040ff':'#f04020';
        for(let i=0;i<8;i++){
          const fx=x+88+i*15+Math.sin(G.totalTime*10+i)*5;
          const fw=20-i*1.5;
          ctx.globalAlpha=.7-i*.06;
          ctx.fillRect(fx,y-5+Math.sin(G.totalTime*8+i)*3,fw,fw);
        }
        ctx.globalAlpha=1;
      }
      // Belly
      ctx.fillStyle='#e8c060';ctx.fillRect(x+20,y+30,40,30);
      // Arms/fists
      ctx.fillStyle='#c8a030';
      ctx.fillRect(x-15,y+20,20,15);ctx.fillRect(x+75,y+20,20,15);
      // Legs
      ctx.fillRect(x+15,y+60,18,15);ctx.fillRect(x+47,y+60,18,15);
      ctx.restore();
      // Phase 2+ aura
      if(b.phase>=2){
        ctx.fillStyle=`rgba(255,0,0,${.1+Math.sin(G.totalTime*3)*.05})`;
        ctx.beginPath();ctx.arc(x+40,y+35,60+Math.sin(G.totalTime*2)*10,0,Math.PI*2);ctx.fill();
      }
      // Phase 3 lava rising indicator
      if(b.phase>=3&&b.lavaY){
        ctx.fillStyle=`rgba(255,60,0,.6)`;
        ctx.fillRect(-cam.x,b.lavaY-cam.y,level.w*TILE,H);
        ctx.fillStyle=`rgba(255,200,0,${.3+Math.sin(G.totalTime*4)*.2})`;
        ctx.fillRect(-cam.x,b.lavaY-cam.y,level.w*TILE,8);
      }
      break;
  }
  ctx.globalAlpha=1;
  // HP bar
  if(b.alive){
    const bw=60;
    const hpPct=b.hp/b.maxHp;
    ctx.fillStyle='#000';ctx.fillRect(x+5,y-18,bw+2,8);
    ctx.fillStyle=hpPct>.5?'#40c040':hpPct>.25?'#e0a020':'#e02020';
    ctx.fillRect(x+6,y-17,bw*hpPct,6);
    ctx.fillStyle='#fff';ctx.font='8px "Press Start 2P"';
    ctx.fillText(b.name,x+5,y-22);
  }
}

function drawShadowMario(s){

  ctx.fillStyle='#200830';
  ctx.fillRect(x+2,y+32,10,8);ctx.fillRect(x+16,y+32,10,8);

  ctx.fillRect(x-2,y+10,32,12);
  ctx.fillRect(x+2,y-2,24,14);
  ctx.fillRect(x,y-8,28,8);

  ctx.fillStyle=`rgba(120,0,200,${.2+Math.sin(G.totalTime*5)*.15})`;

  ctx.fillStyle='#ff0040';
  ctx.fillRect(x+6,y+2,4,4);ctx.fillRect(x+16,y+2,4,4);

  ctx.fillRect(x+8,y-7,6,5);
  ctx.globalAlpha=1;

  ctx.fillStyle='#000';ctx.fillRect(x,y-16,bw+2,5);

// ═══════════════════════════════════════════════
// ██  BOSS INITIALIZATION
// ═══════════════════════════════════════════════
function initBoss(type,biome){
  const bx=(level.w-15)*TILE,by=12*TILE;
  const base={type,alive:true,hitFlash:0,timer:0,state:'idle',phase:1,
    x:bx,y:by,vx:0,vy:0,name:'',patterns:[],patIdx:0,patTimer:0};
  switch(type){
    case 'goombaKing':
      return {...base,name:'Goomba King',hp:40,maxHp:40,w:70,h:70,y:by-20,
        spawnTimer:0,chargeDir:0,dizzy:0};
    case 'templeGuardian':
      return {...base,name:'Stone Guardian',hp:50,maxHp:50,w:64,h:70,
        laserTimer:0,laserDir:0,crystals:[{hp:10,x:-20,y:10},{hp:10,x:40,y:-10},{hp:10,x:60,y:20}],puzzleHits:0};
    case 'shadowDragon':
      return {...base,name:'Shadow Dragon',hp:55,maxHp:55,w:70,h:50,y:by-40,
        breathTimer:0,icicleTimer:0,flyY:by-40};
    case 'piranhaTitan':
      return {...base,name:'Piranha Titan',hp:50,maxHp:50,w:64,h:65,
        vineTimer:0,spitTimer:0,spawnTimer:0};
    case 'giantBlooper':
      return {...base,name:'Giant Blooper',hp:45,maxHp:45,w:60,h:60,
        tentTimer:0,inkTimer:0,diveTimer:0,ink:[]};
    case 'thunderLakitu':
      return {...base,name:'Thunder Lakitu',hp:30,maxHp:30,w:60,h:45,
        boltTimer:0,spinyTimer:0,flyX:bx,flyY:by-80};
    case 'rockTitan':
      return {...base,name:'Rock Titan',hp:35,maxHp:35,w:70,h:75,
        boulderTimer:0,slamTimer:0,rollTimer:0};
    case 'bowserJr':
      return {...base,name:'Bowser Jr.',hp:50,maxHp:50,w:60,h:55,
        cannonTimer:0,chargeTimer:0,flyY:by-30};
    case 'kingBoo':
      return {...base,name:'King Boo',hp:55,maxHp:55,w:70,h:65,
        vanishTimer:0,visible:true,clones:[],puzzleTimer:0,
        catchPhase:false};
    case 'dryBowser':
      return {...base,name:'Dry Bowser',hp:60,maxHp:60,w:65,h:70,
        boneTimer:0,fireTimer:0,dashTimer:0};
    case 'magmaBeast':
      return {...base,name:'Magma Beast',hp:40,maxHp:40,w:60,h:65,
        waveTimer:0,fireTimer:0,submergeTimer:0,submerged:false};
    case 'omegaBowser':
      return {...base,name:'OMEGA BOWSER',hp:100,maxHp:100,w:80,h:80,
        fireTimer:0,chargeTimer:0,slamTimer:0,
        lavaY:H+100,lavaSpeed:0,arenaTimer:0};
    default:
      // Archetyped boss — reuse base type behavior with custom stats
      const arch=BOSS_ARCH[type];
      if(arch){
        const b2=initBoss(arch.base,biome);
        b2.type=type;b2.base=arch.base;b2.name=arch.name;
        b2.hp=arch.hp;b2.maxHp=arch.hp;
        b2.archCol1=arch.col1;b2.archCol2=arch.col2;
        return b2;
      }
      return base;
  }
}

// ═══════════════════════════════════════════════
// ██  BOSS UPDATE
// ═══════════════════════════════════════════════
function updateBoss(b,dt){
  if(!b||!b.alive)return;
  b.timer+=dt;
  b.hitFlash=Math.max(0,b.hitFlash-dt);
  // Phase transitions
  const hpPct=b.hp/b.maxHp;
  if(hpPct<.6&&b.phase===1){b.phase=2;sfxBoss();screenShake(8,.3)}
  if(hpPct<.25&&b.phase===2){b.phase=3;sfxBoss();screenShake(12,.5)}

  const arena={x:(level.w-25)*TILE,r:(level.w-1)*TILE};
  const mx=M.x,my=M.y;

  switch(b.base||b.type){
    case 'goombaKing':{
      if(b.dizzy>0){b.dizzy-=dt;break}
      b.patTimer+=dt;
      if(b.state==='idle'){
        // Walk toward mario
        b.vx=Math.sign(mx-b.x)*60*(b.phase>=2?1.5:1);
        b.x+=b.vx*dt;
        if(b.patTimer>2){b.state='charge';b.patTimer=0;b.chargeDir=Math.sign(mx-b.x)}
      }else if(b.state==='charge'){
        b.vx=b.chargeDir*300*(b.phase>=2?1.4:1);
        b.x+=b.vx*dt;
        if(b.x<=arena.x||b.x>=arena.r-b.w){
          b.dizzy=2;b.state='idle';b.patTimer=0;
          screenShake(6,.2);sfxHit();
          spawnBurst(b.x+35,b.y+35,'#a06030',8,150);
        }
        // Hit mario
        if(rectOverlap({x:b.x,y:b.y,w:b.w,h:b.h},{x:mx,y:my,w:M.w,h:M.h})){
          hurtMario(12+b.phase*3);
        }
      }
      // Spawn mini goombas
      b.spawnTimer+=dt;
      if(b.spawnTimer>4/b.phase){
        b.spawnTimer=0;
        level.enemies.push({type:'goomba',x:b.x+20,y:b.y-10,vx:-50+Math.random()*100,
          hp:1,maxHp:1,alive:true,frame:0,frameT:0,startX:b.x+20,patrol:100});
      }
      break;
    }
    case 'templeGuardian':{
      b.patTimer+=dt;
      // Slow movement
      b.x+=(mx>b.x?30:-30)*(b.phase>=2?1.3:1)*dt;
      // Laser attack
      b.laserTimer+=dt;
      if(b.laserTimer>3/b.phase){
        b.laserTimer=0;
        const angle=Math.atan2(my-b.y,mx-b.x);
        projectiles.push({x:b.x+32,y:b.y+25,vx:Math.cos(angle)*250,vy:Math.sin(angle)*250,
          col:'#40ff80',size:6,life:2,dmg:15,friendly:false});
        sfxHit();
      }
      // Crystal weak points
      if(b.crystals){
        b.crystals.forEach((c,i)=>{
          if(c.hp<=0)return;
          const cx=b.x+c.x,cy=b.y+c.y;
          // Draw crystal
          ctx.fillStyle='#40ff80';
          ctx.fillRect(cx-cam.x-4,cy-cam.y-4,8,8);
        });
      }
      break;
    }
    case 'shadowDragon':{
      // Fly around
      b.flyY+=(Math.sin(b.timer*1.5)*50-b.y+b.flyY)*dt;
      b.x+=(mx>b.x?40:-40)*(b.phase>=2?1.3:1)*dt;
      b.y+=(b.flyY-b.y)*2*dt;
      // Shadow breath
      b.breathTimer+=dt;
      if(b.breathTimer>3.5/b.phase){
        b.breathTimer=0;b.state='breathe';
        setTimeout(()=>{b.state='idle'},1500);
        for(let i=0;i<5;i++){
          setTimeout(()=>{
            if(!b.alive)return;
            const spread=(Math.random()-.5)*80;
            projectiles.push({x:b.x+60,y:b.y+15,vx:200,vy:spread,
              col:'#9030e0',size:8,life:2,dmg:12,friendly:false});
          },i*200);
        }
      }
      // Drop shadow bolts
      b.icicleTimer+=dt;
      if(b.icicleTimer>2/b.phase){
        b.icicleTimer=0;
        projectiles.push({x:mx+Math.random()*60-30,y:cam.y,vx:0,vy:300,
          col:'#7020c0',size:6,life:3,dmg:10,friendly:false});
      }
      break;
    }
    case 'piranhaTitan':{
      b.x+=(mx>b.x?50:-50)*(b.phase>=2?1.4:1)*dt;
      // Vine whips
      b.vineTimer+=dt;
      if(b.vineTimer>2/b.phase){
        b.vineTimer=0;
        const dir=Math.sign(mx-b.x);
        projectiles.push({x:b.x+32,y:b.y+30,vx:dir*350,vy:-50,
          col:'#40a020',size:5,life:1.5,dmg:14,friendly:false});
      }
      // Acid spit
      b.spitTimer+=dt;
      if(b.spitTimer>3){
        b.spitTimer=0;
        for(let i=0;i<3;i++){
          projectiles.push({x:b.x+32,y:b.y+10,vx:(Math.random()-.5)*200,vy:-200-Math.random()*100,
            col:'#80d020',size:4,life:2,dmg:10,friendly:false,grav:true});
        }
      }
      break;
    }
    case 'giantBlooper':{
      // Float and sway
      b.x+=Math.sin(b.timer*2)*80*dt;
      b.y+=Math.cos(b.timer*1.5)*40*dt;
      // Tentacle swipe
      b.tentTimer+=dt;
      if(b.tentTimer>2.5/b.phase){
        b.tentTimer=0;
        const dir=Math.sign(mx-b.x);
        projectiles.push({x:b.x+30,y:b.y+50,vx:dir*280,vy:30,
          col:'#d0c0e0',size:8,life:1.5,dmg:12,friendly:false});
      }
      // Ink clouds
      b.inkTimer+=dt;
      if(b.inkTimer>4){
        b.inkTimer=0;
        b.ink.push({x:mx,y:my-30,life:3,r:60});
      }
      break;
    }
    case 'thunderLakitu':{
      b.flyX+=(mx-b.flyX)*1.5*dt;
      b.flyY=-80+Math.sin(b.timer*2)*30;
      b.x+=(b.flyX-b.x)*3*dt;
      b.y=cam.y+100+b.flyY;
      // Lightning bolts
      b.boltTimer+=dt;
      if(b.boltTimer>2/b.phase){
        b.boltTimer=0;
        projectiles.push({x:mx,y:cam.y,vx:0,vy:400,
          col:'#ffe030',size:8,life:1,dmg:15,friendly:false});
        sfxHit();
      }
      break;
    }
    case 'rockTitan':{
      b.x+=(mx>b.x?35:-35)*dt;
      // Boulder throw
      b.boulderTimer+=dt;
      if(b.boulderTimer>3/b.phase){
        b.boulderTimer=0;
        const dx=mx-b.x,dy=my-b.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        projectiles.push({x:b.x+35,y:b.y,vx:dx/d*200,vy:dy/d*200-100,
          col:'#706060',size:12,life:3,dmg:18,friendly:false,grav:true});
      }
      // Ground slam
      b.slamTimer+=dt;
      if(b.slamTimer>5){
        b.slamTimer=0;
        screenShake(10,.4);
        if(M.ground&&Math.abs(mx-b.x)<150)hurtMario(15);
        spawnBurst(b.x+35,b.y+70,'#808080',12,200);
      }
      break;
    }
    case 'bowserJr':{
      b.x+=(mx>b.x?60:-60)*(b.phase>=2?1.3:1)*dt;
      b.y+=Math.sin(b.timer*2)*50*dt;
      // Cannonballs
      b.cannonTimer+=dt;
      if(b.cannonTimer>2.5/b.phase){
        b.cannonTimer=0;
        const dir=Math.sign(mx-b.x);
        projectiles.push({x:b.x+30,y:b.y+40,vx:dir*250,vy:0,
          col:'#303030',size:8,life:2.5,dmg:14,friendly:false});
      }
      // Charge attack
      b.chargeTimer+=dt;
      if(b.chargeTimer>5){
        b.chargeTimer=0;
        b.vx=Math.sign(mx-b.x)*400;
        setTimeout(()=>{b.vx=0},800);
      }
      b.x+=b.vx*dt;
      if(rectOverlap({x:b.x,y:b.y,w:b.w,h:b.h},{x:mx,y:my,w:M.w,h:M.h}))hurtMario(12);
      break;
    }
    case 'kingBoo':{
      // Vanish/appear
      b.vanishTimer+=dt;
      if(b.vanishTimer>3/b.phase){
        b.vanishTimer=0;
        b.visible=!b.visible;
        if(b.visible){
          b.x=mx+((Math.random()>.5)?100:-100);
          b.y=my-50;
        }
      }
      if(b.visible){
        b.x+=(mx>b.x?40:-40)*dt;
      }
      // Illusion clones
      if(b.phase>=2&&b.clones.length<3){
        b.puzzleTimer+=dt;
        if(b.puzzleTimer>4){
          b.puzzleTimer=0;
          for(let i=0;i<2;i++){
            b.clones.push({x:b.x+(Math.random()-.5)*200,y:b.y+(Math.random()-.5)*80,life:5});
          }
        }
      }
      if(b.clones){
        b.clones.forEach(c=>{c.life-=dt;c.x+=Math.sin(G.totalTime*3+c.life)*40*dt});
        b.clones=b.clones.filter(c=>c.life>0);
      }
      // Ghost projectiles
      if(b.visible){
        b.patTimer+=dt;
        if(b.patTimer>2){
          b.patTimer=0;
          const a=Math.atan2(my-b.y,mx-b.x);
          projectiles.push({x:b.x+35,y:b.y+30,vx:Math.cos(a)*180,vy:Math.sin(a)*180,
            col:'#c080ff',size:6,life:2,dmg:12,friendly:false});
        }
      }
      // Ghost catching mechanic - mario takes extra damage if no ghost device
      if(!M.ghostDevice){
        // Boss takes less damage
        b.defMod=.5;
      }else b.defMod=1;
      break;
    }
    case 'dryBowser':{
      // Very aggressive
      const spd=b.phase>=2?120:80;
      b.x+=(mx>b.x?spd:-spd)*dt;
      // Bone throw
      b.boneTimer+=dt;
      if(b.boneTimer>1.5/b.phase){
        b.boneTimer=0;
        const a=Math.atan2(my-b.y,mx-b.x);
        projectiles.push({x:b.x+32,y:b.y+20,vx:Math.cos(a)*300,vy:Math.sin(a)*300,
          col:'#d8d0b8',size:5,life:2,dmg:14,friendly:false});
      }
      // Blue fire
      b.fireTimer+=dt;
      if(b.fireTimer>3){
        b.fireTimer=0;
        for(let i=0;i<6;i++){
          const ang=Math.atan2(my-b.y,mx-b.x)+(i-3)*.15;
          projectiles.push({x:b.x+40,y:b.y+10,vx:Math.cos(ang)*220,vy:Math.sin(ang)*220,
            col:'#4060ff',size:5,life:2,dmg:10,friendly:false});
        }
      }
      // Dash
      b.dashTimer+=dt;
      if(b.dashTimer>4){
        b.dashTimer=0;b.vx=Math.sign(mx-b.x)*500;
        setTimeout(()=>{b.vx=0},500);
      }
      b.x+=(b.vx||0)*dt;
      if(rectOverlap({x:b.x,y:b.y,w:b.w,h:b.h},{x:mx,y:my,w:M.w,h:M.h}))hurtMario(15);
      break;
    }
    case 'magmaBeast':{
      // Submerge/emerge
      b.submergeTimer+=dt;
      if(b.submergeTimer>5){
        b.submergeTimer=0;
        b.submerged=!b.submerged;
        if(!b.submerged){
          b.x=mx-30;b.y=10*TILE;
          screenShake(6,.3);
          spawnBurst(b.x+30,b.y+30,'#f06020',10,200);
        }
      }
      if(!b.submerged){
        b.x+=(mx>b.x?50:-50)*dt;
        // Lava waves
        b.waveTimer+=dt;
        if(b.waveTimer>2.5){
          b.waveTimer=0;
          projectiles.push({x:b.x,y:b.y+50,vx:-150,vy:0,col:'#f06020',size:10,life:3,dmg:12,friendly:false});
          projectiles.push({x:b.x+60,y:b.y+50,vx:150,vy:0,col:'#f06020',size:10,life:3,dmg:12,friendly:false});
        }
        // Fire breath
        b.fireTimer+=dt;
        if(b.fireTimer>3){
          b.fireTimer=0;
          const a=Math.atan2(my-b.y,mx-b.x);
          for(let i=0;i<4;i++){
            projectiles.push({x:b.x+30,y:b.y+20,vx:Math.cos(a+(.2*i-.3))*250,vy:Math.sin(a+(.2*i-.3))*250,
              col:'#ff4000',size:6,life:2,dmg:10,friendly:false});
          }
        }
      }
      break;
    }
    case 'omegaBowser':{
      const spd2=b.phase>=3?100:b.phase>=2?70:50;
      b.x+=(mx>b.x?spd2:-spd2)*dt;
      // Fire breath
      b.fireTimer+=dt;
      const fireRate=b.phase>=3?1.5:b.phase>=2?2.5:3.5;
      if(b.fireTimer>fireRate){
        b.fireTimer=0;b.state='fireBreath';
        setTimeout(()=>{b.state='idle'},1200);
        for(let i=0;i<(3+b.phase*2);i++){
          setTimeout(()=>{
            if(!b.alive)return;
            const a=Math.atan2(my-b.y,mx-b.x)+(Math.random()-.5)*.4;
            projectiles.push({x:b.x+80,y:b.y+10,vx:Math.cos(a)*280,vy:Math.sin(a)*280,
              col:b.phase>=2?'#4040ff':'#f04020',size:8,life:2.5,dmg:15,friendly:false});
          },i*150);
        }
      }
      // Ground slam
      b.slamTimer+=dt;
      if(b.slamTimer>5/b.phase){
        b.slamTimer=0;
        screenShake(12,.5);
        if(M.ground&&Math.abs(mx-b.x)<200)hurtMario(20);
        spawnBurst(b.x+40,b.y+75,'#f0a020',15,250);
      }
      // Charge
      b.chargeTimer+=dt;
      if(b.chargeTimer>6/b.phase){
        b.chargeTimer=0;
        b.vx=Math.sign(mx-b.x)*450;
        setTimeout(()=>{b.vx=0},700);
      }
      b.x+=(b.vx||0)*dt;
      // Phase 2: grow & arena collapse
      if(b.phase>=2){
        b.arenaTimer+=dt;
        if(b.arenaTimer>8){
          b.arenaTimer=0;
          // Remove some platforms
          const rx=Math.floor(Math.random()*(level.w-28))+level.w-24;
          for(let dy=10;dy<14;dy++){
            if(rx<level.w)level.tiles[rx][dy]=0;
          }
          screenShake(5,.2);
        }
      }
      // Phase 3: lava rising
      if(b.phase>=3){
        if(!b.lavaSpeed)b.lavaSpeed=8;
        b.lavaY-=b.lavaSpeed*dt;
        if(b.lavaY<14*TILE)b.lavaY=14*TILE; // cap
        // Lava damage
        if(M.y+M.h>b.lavaY)hurtMario(25*dt);
      }
      if(rectOverlap({x:b.x,y:b.y,w:b.w,h:b.h},{x:mx,y:my,w:M.w,h:M.h}))hurtMario(10*dt);
      break;
    }
  }
  // Keep boss in arena
  b.x=Math.max((level.w-24)*TILE,Math.min(b.x,(level.w-2)*TILE-b.w));
}

function damageBoss(b,dmg){
  if(!b||!b.alive)return;
  const mod=b.defMod||1;
  const actualDmg=dmg*mod*M.dmgMult;
  b.hp-=actualDmg;
  b.hitFlash=.2;
  sfxHit();
  spawnBurst(b.x+b.w/2,b.y+b.h/2,'#ff0',6,120);
  floatText(b.x+b.w/2,b.y-10,'-'+Math.round(actualDmg),'#ff4040');
  if(b.hp<=0){
    b.alive=false;
    screenShake(15,.6);
    spawnBurst(b.x+b.w/2,b.y+b.h/2,'#ffa020',20,300);
    sfxStar();
    // Boss defeated
    setTimeout(()=>onBossDefeated(b),1500);
  }
}

// ═══════════════════════════════════════════════
// ██  BOSS DEFEATED HANDLER
// ═══════════════════════════════════════════════
function onBossDefeated(b){
  const biome=G.biome;
  if(!G.completed.includes(biome.id))G.completed.push(biome.id);
  G.skillPts+=2;
  G.stars++;
  // Regenerate health and lives on level clear
  M.hp=M.maxHp;
  G.lives+=1;
  // Show level complete panel
  G.levelComplete=true;
  G.lcTimer=0;
  G.lcBoss=b; // store for after panel
  G.state='LEVEL_COMPLETE';
  // Auto-save progress
  saveGame();
}
function proceedAfterLevel(){
  G.levelComplete=false;
  const b=G.lcBoss;
  const biome=G.biome;
  applyRescueBonuses();
  // Rescue character if applicable
  if(biome.rescue){
    G.rescued[biome.rescue]=true;
    if(biome.rescue==='egadd'){
      M.ghostDevice=true;
      showCutscene('rescueEgadd');
      return;
    }
    if(biome.rescue==='luigi'){showCutscene('rescueLuigi');return}
    if(biome.rescue==='daisy'){showCutscene('rescueDaisy');return}
    if(biome.rescue==='rosalina'){showCutscene('rescueRosalina');return}
    if(biome.rescue==='toad'){showCutscene('rescueToad');return}
    if(biome.rescue==='toadsworth'){showCutscene('rescueToadsworth');return}
    if(biome.rescue==='yoshi'){showCutscene('rescueYoshi');return}
    if(biome.rescue==='diddy'){showCutscene('rescueDiddy');return}
    if(biome.rescue==='pauline'){showCutscene('rescuePauline');return}
    if(biome.rescue==='dk'){showCutscene('rescueDK');return}
    if(biome.rescue==='lumas'){showCutscene('rescueLumas');return}
    if(biome.rescue==='kamek'){showCutscene('rescueKamek');return}
    if(biome.rescue==='peach'){
      determineEnding();
      return;
    }
  }
  // Bowser Jr choice
  if(b&&b.type==='bowserJr'){
    showDialogueChoice(
      'Bowser Jr.',
      'You beat me... My father has gone too far with that artifact. Will you... let me help you stop him?',
      [{text:'Accept his help',action:()=>{G.helpedBJ=true;showCutscene('bjHelp')}},
       {text:'Never trust a Bowser!',action:()=>{G.helpedBJ=false;showCutscene('bjRefuse')}}]
    );
    return;
  }
  // Auto-advance to next level or world map
  const curIdx=BIOMES.findIndex(b2=>b2.id===biome.id);
  const nextIdx=curIdx+1;
  if(nextIdx<BIOMES.length&&G.stars>=BIOMES[nextIdx].starReq){
    enterBiome(BIOMES[nextIdx]);
    G.mapCursor=nextIdx;
  }else{
    showCutscene('bossVictory');
  }
}

function determineEnding(){
  const r=G.rescued;
  const coreRescued=r.luigi&&r.peach&&r.daisy&&r.rosalina&&r.egadd;
  const allAllies=coreRescued&&r.toad&&r.toadsworth&&r.yoshi&&r.diddy&&r.pauline&&r.dk&&r.lumas&&r.kamek;
  if(coreRescued&&G.shadowDefeats>=2&&G.stars>=BIOMES.length){
    G.ending='secret';
  }else if(allAllies){
    G.ending='hero';
  }else if(coreRescued){
    G.ending='hero';
  }else{
    G.ending='balanced';
  }
  G.allAlliesSaved=allAllies;
  showCutscene('finale');
}

// ═══════════════════════════════════════════════
// ██  MARIO UPDATE
// ═══════════════════════════════════════════════
function updateMario(dt){
  if(M.dead){
    M.deathTimer+=dt;
    M.vy+=GRAVITY*dt;M.y+=M.vy*dt;
    if(M.deathTimer>2){
      G.lives--;
      if(G.lives<=0){showCutscene('gameOver');return}
      resetMario(100,300);
      cam.x=0;cam.y=0;
    }
    return;
  }
  M.inv=Math.max(0,M.inv-dt);
  M.atkCd=Math.max(0,M.atkCd-dt);
  M.spcCd=Math.max(0,M.spcCd-dt);
  M.comboTimer=Math.max(0,M.comboTimer-dt);
  if(M.comboTimer<=0)M.combo=0;
  M.frameT+=dt;
  if(M.frameT>.15){M.frameT=0;M.frame=(M.frame+1)%4}
  // Power-up timer
  if(M.puTimer>0){M.puTimer-=dt;if(M.puTimer<=0)M.powerUp=null}

  // Movement — modified by power-ups
  const pu=M.powerUp;
  const isIcy=level.icy||(pu==='ice');
  const isRock=pu==='rock';
  const isSpring=pu==='spring';
  const isRainbow=pu==='rainbow';
  const isCloud=pu==='cloud';
  const isBee=pu==='bee';
  const lg=isLuigi(); // Luigi: higher jump, slippery, faster run
  const spdMul=isRock?.6:isRainbow?1.6:isSpring?1.1:lg?1.08:1;
  const accel=(isIcy?800:1400)*spdMul*(lg?.85:1); // Luigi accelerates slower (slippy)
  const friction=isIcy?.97:lg?.92:.85; // Luigi slides more
  const maxSpd=250*(1+G.skills.spd*.1)*M.spdMult*spdMul*(lg?1.05:1);
  const gravMul=isCloud?.35:isBee?.55:isRock?1.15:isRainbow?.7:lg?.85:1; // Luigi floatier
  const grav=(level.lowGrav?GRAVITY*.4:level.underwater?GRAVITY*.35:GRAVITY)*gravMul;
  const isMega=pu==='mega';
  const jumpMul=isMega?1.5:isSpring?1.55:isRainbow?1.45:isRock?.65:isCloud?1.2:isBee?1.1:lg?1.2:1;
  const jumpForce=(level.lowGrav?-550:level.underwater?-450:-750)*jumpMul;

  if(keys['arrowleft']||keys['a']){M.vx-=accel*dt;M.face=-1}
  if(keys['arrowright']||keys['d']){M.vx+=accel*dt;M.face=1}
  if(!keys['arrowleft']&&!keys['a']&&!keys['arrowleft']&&!keys['d'])M.vx*=friction;
  M.vx=Math.max(-maxSpd,Math.min(maxSpd,M.vx));

  // Jump (variable height)
  const canJump=M.ground||level.underwater||(isBee&&M.beeFlap>0)||(isCloud&&M.cloudFloat>0);
  if((justDown(' ')||justDown('arrowup')||justDown('w'))&&canJump){
    M.vy=jumpForce;M.ground=false;M.jumpHeld=true;M.jumpTime=0;
    if(isBee&&!M.ground){M.beeFlap--;M.vy=jumpForce*.6;} // bee: smaller air flaps
    if(isCloud&&!M.ground){M.cloudFloat--;M.vy=jumpForce*.5;} // cloud: gentle float
    sfxJump();
  }
  if(M.jumpHeld&&(keys[' ']||keys['arrowup']||keys['w'])){
    M.jumpTime+=dt;
    if(M.jumpTime<.2)M.vy+=jumpForce*.8*dt;
  }else M.jumpHeld=false;
  // Cloud levitation — hold jump to float
  if(isCloud&&(keys[' ']||keys['arrowup']||keys['w'])&&M.vy>0){
    M.vy*=.9; // slow fall dramatically
  }
  // Bee hover — hold jump to slow descent
  if(isBee&&(keys[' ']||keys['arrowup']||keys['w'])&&M.vy>0){
    M.vy*=.92;
  }

  // Attack
  if((justDown('x')||justDown('z'))&&M.atkCd<=0){
    M.atk=true;M.atkTimer=.25;M.atkCd=.4;
    sfxHit();
  }
  if(M.atk){
    M.atkTimer-=dt;
    if(M.atkTimer<=0)M.atk=false;
  }

  // Special (C key) — changes based on power-up
  if(justDown('c')&&M.spcCd<=0){
    M.spcActive=true;M.spcCd=pu==='rainbow'?1:2;
    setTimeout(()=>{M.spcActive=false},300);
    const baseDmg=8*(1+G.skills.spc*.15)*M.dmgMult;
    if(pu==='fire'){
      // Fireball — bounces
      projectiles.push({x:M.x+M.w/2,y:M.y+M.h/2-5,vx:M.face*350,vy:-80,
        col:'#ff4020',size:7,life:1.5,dmg:baseDmg*1.2,friendly:true,grav:true});
      playTone(600,.1,'sawtooth',.06);
    }else if(pu==='ice'){
      // Ice shard — fast, freezing trail
      projectiles.push({x:M.x+M.w/2,y:M.y+M.h/2-5,vx:M.face*420,vy:0,
        col:'#80d8ff',size:6,life:1.2,dmg:baseDmg,friendly:true});
      projectiles.push({x:M.x+M.w/2,y:M.y+M.h/2+5,vx:M.face*380,vy:20,
        col:'#60c8ff',size:4,life:1,dmg:baseDmg*.5,friendly:true});
      playTone(1200,.08,'sine',.05);
    }else if(pu==='spring'){
      // Bounce bomb — arcs down, explodes
      projectiles.push({x:M.x+M.w/2,y:M.y,vx:M.face*250,vy:-300,
        col:'#e0c020',size:8,life:1.5,dmg:baseDmg*1.5,friendly:true,grav:true});
      playTone(300,.12,'square',.07);
    }else if(pu==='bee'){
      // Stinger burst — 3 small projectiles
      for(let i=-1;i<=1;i++){
        projectiles.push({x:M.x+M.w/2,y:M.y+M.h/2,vx:M.face*300,vy:i*80,
          col:'#f0c020',size:4,life:.8,dmg:baseDmg*.6,friendly:true});
      }
      playTone(900,.06,'sine',.05);
    }else if(pu==='ghost'){
      // Spectral wave — passes through everything, wide
      projectiles.push({x:M.x+M.w/2,y:M.y+M.h/2-5,vx:M.face*280,vy:0,
        col:'#a080d0',size:10,life:1.5,dmg:baseDmg*1.1,friendly:true});
      playTone(200,.15,'sine',.06);
    }else if(pu==='rock'){
      // Boulder — slow, heavy, big damage
      projectiles.push({x:M.x+M.w/2,y:M.y+M.h/2,vx:M.face*200,vy:-30,
        col:'#807060',size:12,life:2,dmg:baseDmg*2,friendly:true,grav:true});
      playTone(150,.2,'sawtooth',.08);
    }else if(pu==='mega'){
      // MEGA STOMP — ground pound shockwave, massive damage
      screenShake(10,.3);
      for(let i=-2;i<=2;i++){
        projectiles.push({x:M.x+M.w/2,y:M.y+M.h,vx:i*150,vy:-50,
          col:'#ff6020',size:14,life:1.5,dmg:baseDmg*3,friendly:true});
      }
      playTone(80,.3,'sawtooth',.12);setTimeout(()=>playTone(60,.2,'sawtooth',.1),100);
    }else if(pu==='cloud'){
      // Wind gust — pushes enemies, wide area
      for(let i=0;i<3;i++){
        projectiles.push({x:M.x+M.w/2+M.face*i*15,y:M.y+M.h/2-10+i*10,vx:M.face*320,vy:(i-1)*30,
          col:'#c0e0ff',size:6,life:1,dmg:baseDmg*.7,friendly:true});
      }
      playTone(500,.1,'sine',.04);
    }else if(pu==='rainbow'){
      // Rainbow beam — massive, many projectiles
      for(let i=0;i<5;i++){
        const hue=i*72;
        projectiles.push({x:M.x+M.w/2,y:M.y+M.h/2-5,vx:M.face*(380+i*20),vy:(i-2)*40,
          col:`hsl(${hue},100%,60%)`,size:7,life:1.2,dmg:baseDmg*.8,friendly:true});
      }
      playTone(800,.08);setTimeout(()=>playTone(1000,.08),40);setTimeout(()=>playTone(1200,.08),80);
    }else{
      // Default — basic energy ball
      projectiles.push({x:M.x+M.w/2,y:M.y+M.h/2-5,vx:M.face*350,vy:0,
        col:'#ffa000',size:6,life:1,dmg:baseDmg,friendly:true});
      sfxHit();
    }
  }

  // Physics
  M.vy+=grav*dt;
  if(level.underwater)M.vy=Math.min(M.vy,150);
  M.x+=M.vx*dt;
  M.y+=M.vy*dt;

  // Tile collision — ghost power-up passes through solid blocks (but not ground floor)
  const ghostPhase=pu==='ghost';
  M.ground=false;
  const txL=Math.floor(M.x/TILE),txR=Math.floor((M.x+M.w)/TILE);
  const tyT=Math.floor(M.y/TILE),tyB=Math.floor((M.y+M.h)/TILE);
  // Floor — ghost still collides with bottom ground row so you don't fall off
  for(let tx=txL;tx<=txR;tx++){
    const isFloor=tyB>=14; // ground level
    if(isSolid(tx,tyB)&&(!ghostPhase||isFloor)){
      M.y=tyB*TILE-M.h;M.vy=0;M.ground=true;
      if(pu==='bee')M.beeFlap=3; // refuel flaps on land
      if(pu==='cloud')M.cloudFloat=4; // refuel floats on land
    }
  }
  // Ceiling — ghost passes through, others collide + ? blocks
  for(let tx=txL;tx<=txR;tx++){
    if(isSolid(tx,tyT)){
      // ? blocks always activate even if ghost
      if(tileAt(tx,tyT)===6){
        level.tiles[tx][tyT]=2;
        sfxCoin();
        level.powerUps.forEach(p=>{
          if(p.blockX===tx&&p.blockY===tyT&&!p.collected){
            p.active=true;p.x=tx*TILE;p.y=tyT*TILE-TILE;p.vy=-200;
          }
        });
      }
      if(!ghostPhase){M.y=(tyT+1)*TILE;M.vy=0}
    }
  }
  // Walls — ghost passes through
  if(!ghostPhase){
    const tyT2=Math.floor((M.y+4)/TILE),tyB2=Math.floor((M.y+M.h-4)/TILE);
    for(let ty=tyT2;ty<=tyB2;ty++){
      if(isSolid(Math.floor(M.x/TILE),ty)){M.x=Math.floor(M.x/TILE)*TILE+TILE;M.vx=0}
      if(isSolid(Math.floor((M.x+M.w)/TILE),ty)){M.x=Math.floor((M.x+M.w)/TILE)*TILE-M.w;M.vx=0}
    }
  }

  // Fall into pits
  if(M.y>level.h*TILE+50)hurtMario(999);
  // Lava/water damage
  const bTile=tileAt(Math.floor((M.x+M.w/2)/TILE),Math.floor((M.y+M.h)/TILE));
  if(bTile===3)hurtMario(30*dt);

  // Attack collision with enemies
  if(M.atk){
    const atkBox={x:M.x+(M.face>0?M.w:-(20)),y:M.y,w:24,h:M.h};
    level.enemies.forEach(e=>{
      if(!e.alive)return;
      if(rectOverlap(atkBox,{x:e.x,y:e.y,w:28,h:24})){
        const dmg=(8+G.skills.atk*2)*M.dmgMult;
        e.hp-=dmg;
        e.x+=M.face*30;
        if(e.hp<=0){
          e.alive=false;
          M.combo++;M.comboTimer=2;
          G.coins+=2;
          spawnBurst(e.x+14,e.y+12,getEnemyColor(e.type),6,100);
          floatText(e.x,e.y-10,'+'+M.combo*2+' coins','#ffd700');
          sfxCoin();
          registerKill();
        }
      }
    });
    // Attack boss — all bosses can be hit anytime
    if(boss&&boss.alive){
      if(rectOverlap(atkBox,{x:boss.x,y:boss.y,w:boss.w||60,h:boss.h||60})){
        const dmg=(10+G.skills.atk*2)*M.dmgMult;
        damageBoss(boss,dmg);
      }
    }
    // Attack shadow mario
    if(shadowMario&&shadowMario.alive){
      if(rectOverlap(atkBox,{x:shadowMario.x,y:shadowMario.y,w:28,h:40})){
        shadowMario.hp-=(8+G.skills.atk*2)*M.dmgMult;
        shadowMario.hitFlash=.2;
        if(shadowMario.hp<=0){
          shadowMario.alive=false;
          G.shadowDefeats++;G.coins+=20;G.skillPts+=1;
          spawnBurst(shadowMario.x+14,shadowMario.y+20,'#8020c0',12,200);
          floatText(shadowMario.x,shadowMario.y-20,'Shadow Mario defeated!','#c040ff');
          sfxStar();
        }
      }
    }
  }
  // Stomp enemies
  if(M.vy>0&&!M.ground){
    level.enemies.forEach(e=>{
      if(!e.alive)return;
      if(M.x+M.w>e.x&&M.x<e.x+28&&M.y+M.h>e.y&&M.y+M.h<e.y+12){
        e.hp-=5;M.vy=-350;
        if(e.hp<=0){
          e.alive=false;G.coins+=2;
          spawnBurst(e.x+14,e.y+12,getEnemyColor(e.type),5,80);
          sfxCoin();
          registerKill();
        }else sfxHit();
      }
    });
  }
  // Stomp boss heads — landing on top deals big damage
  if(M.vy>0&&!M.ground&&boss&&boss.alive){
    const bx=boss.x,by=boss.y,bw=boss.w||60,bh=boss.h||60;
    if(M.x+M.w>bx&&M.x<bx+bw&&M.y+M.h>by&&M.y+M.h<by+16){
      const stompDmg=(15+G.skills.atk*3)*M.dmgMult;
      damageBoss(boss,stompDmg);
      M.vy=-500; // big bounce off boss head
      sfxJump();
      floatText(boss.x+bw/2,boss.y-20,'STOMP!','#ff8020');
      screenShake(6,.2);
    }
  }
  // Special attack hits
  if(M.spcActive){
    const spcBox={x:M.x+M.face*25,y:M.y-5,w:30,h:M.h+10};
    if(boss&&boss.alive&&rectOverlap(spcBox,{x:boss.x,y:boss.y,w:boss.w||60,h:boss.h||60})){
      damageBoss(boss,(12+G.skills.spc*3)*M.dmgMult);
    }
  }

  // Enemy collision — mega crushes enemies on contact
  level.enemies.forEach(e=>{
    if(!e.alive)return;
    if(rectOverlap({x:M.x,y:M.y,w:M.w,h:M.h},{x:e.x,y:e.y,w:28,h:24})){
      if(M.powerUp==='mega'){
        e.alive=false;G.coins+=3;
        spawnBurst(e.x+14,e.y+12,'#ff6020',8,150);
        sfxHit();screenShake(3,.1);
        registerKill();
      }else if(M.inv<=0){
        hurtMario(8);
      }
    }
  });

  // Collect coins
  level.coins.forEach(c=>{
    if(c.collected)return;
    if(Math.abs(M.x+M.w/2-c.x)<20&&Math.abs(M.y+M.h/2-c.y)<20){
      c.collected=true;G.coins++;sfxCoin();
      spawnPart(c.x,c.y,0,-60,'#ffd700',.4,3);
    }
  });

  // Collect power-ups — each type has unique duration & activation
  const PU_NAMES={fire:'FIRE FLOWER',ice:'ICE FLOWER',star:'SUPER STAR',
    spring:'SPRING SHROOM',bee:'BEE SUIT',ghost:'BOO MASK',
    rock:'ROCK SHROOM',cloud:'CLOUD FLOWER',rainbow:'RAINBOW STAR',mega:'MEGA MUSHROOM'};
  const PU_COLORS={fire:'#ff4020',ice:'#60c8ff',star:'#ffd700',
    spring:'#e0c020',bee:'#f0c020',ghost:'#a080d0',
    rock:'#808080',cloud:'#a0d0ff',rainbow:'#ff80ff',mega:'#ff4040'};
  const PU_DUR={fire:30,ice:25,star:10,spring:20,bee:20,ghost:15,rock:25,cloud:20,rainbow:8,mega:12};
  level.powerUps.forEach(p=>{
    if(!p.active||p.collected)return;
    if(rectOverlap({x:M.x,y:M.y,w:M.w,h:M.h},{x:p.x,y:p.y,w:TILE,h:TILE})){
      p.collected=true;
      M.powerUp=p.type;
      M.puTimer=PU_DUR[p.type]||20;
      sfxPower();
      const col=PU_COLORS[p.type]||'#ffa';
      floatText(p.x,p.y-20,PU_NAMES[p.type]||p.type.toUpperCase(),col);
      spawnBurst(p.x+16,p.y+16,col,10,150);
      // Per-type activation effects
      if(p.type==='star'){M.inv=10}
      if(p.type==='rainbow'){M.inv=8}
      if(p.type==='bee'){M.beeFlap=3}
      if(p.type==='cloud'){M.cloudFloat=4}
      if(p.type==='spring'){M.vy=-700;sfxJump()} // instant super jump on pickup
      if(p.type==='rock'){screenShake(4,.2)} // ground pound feel
      if(p.type==='mega'){M.inv=12;screenShake(8,.4);sfxBoss()} // GIANT MODE
    }
  });

  // Collect star
  if(level.star&&!level.star.collected){
    if(Math.abs(M.x+M.w/2-level.star.x-16)<24&&Math.abs(M.y+M.h/2-level.star.y-16)<24){
      level.star.collected=true;G.stars++;
      sfxStar();
      spawnBurst(level.star.x+16,level.star.y+16,'#ffd700',15,200);
      floatText(level.star.x,level.star.y-20,'POWER STAR!','#ffd700');
    }
  }

  // Rescue toads
  level.toads.forEach(t=>{
    if(t.rescued)return;
    if(Math.abs(M.x-t.x)<30&&Math.abs(M.y-t.y)<30){
      t.rescued=true;G.rescued.toads++;
      sfxPower();
      floatText(t.x,t.y-20,'Toad rescued!','#ff4040');
    }
  });

  // Warp pipe — press DOWN/S on the golden pipe to teleport to boss area
  if(level.warpPipe&&(justDown('arrowdown')||justDown('s'))&&M.ground){
    const wp=level.warpPipe;
    if(Math.abs(M.x-wp.x)<40&&Math.abs(M.y-wp.y)<60){
      M.x=wp.targetX;M.y=12*TILE;M.vx=0;M.vy=0;
      cam.x=M.x-W/2;
      spawnBurst(M.x+M.w/2,M.y+M.h/2,'#ffd700',12,200);
      sfxStar();
      floatText(M.x,M.y-30,'WARPED!','#ffd700');
    }
  }

  // Enter boss arena
  if(!boss&&M.x>(level.w-22)*TILE&&G.state==='PLAYING'){
    G.state='BOSS';

    boss=initBoss(G.biome.boss,G.biome);
    sfxBoss();
    screenShake(8,.4);
    floatText(M.x,M.y-40,G.biome.bossName+' appears!','#ff2020');
  }

  // Camera
  cam.x+=(M.x-W/2+M.w/2-cam.x)*.08;
  cam.y+=(M.y-H/2+M.h/2-cam.y)*.05;
  cam.x=Math.max(0,Math.min(cam.x,level.w*TILE-W));
  cam.y=Math.max(0,Math.min(cam.y,level.h*TILE-H));
}

function hurtMario(dmg){
  if(M.inv>0||M.dead)return;
  if(M.powerUp==='star'||M.powerUp==='rainbow'||M.powerUp==='mega')return; // invincible
  const rockMul=M.powerUp==='rock'?.4:1; // rock takes 60% less damage
  const actual=dmg*(1-G.skills.def*.08)*M.defMult*rockMul;
  M.hp-=actual;
  M.inv=1.5;
  const kb=M.powerUp==='rock'?.4:1; // rock barely knocked back
  M.vx=-M.face*200*kb;M.vy=-200*kb;
  screenShake(5,.2);
  spawnBurst(M.x+M.w/2,M.y+M.h/2,M.powerUp==='rock'?'#808080':'#ff0000',5,80);
  sfxHit();
  if(M.hp<=0){
    M.dead=true;M.deathTimer=0;M.vy=-400;
    sfxBoss();
  }
}

function getEnemyColor(type){
  const c={'goomba':'#a05020','koopa':'#20a020','boo':'#e0d8f0','piranha':'#d03020'};
  return c[type]||'#808080';
}
function registerKill(){
  G.killCount++;
  // Kill 21 minions = boss auto-dies
  if(G.killCount>=21&&boss&&boss.alive){
    floatText(boss.x+boss.w/2,boss.y-30,'21 KILLS! BOSS DOWN!','#ff4040');
    boss.hp=0;boss.alive=false;
    screenShake(15,.6);
    spawnBurst(boss.x+boss.w/2,boss.y+boss.h/2,'#ffa020',20,300);
    sfxStar();
    setTimeout(()=>onBossDefeated(boss),1500);
  }else if(G.killCount>=21&&!boss){
    floatText(M.x,M.y-40,'21 KILLS! Boss weakened!','#ffa040');
  }
}

// ██  ENEMY UPDATE
// ═══════════════════════════════════════════════
function updateEnemies(dt){
  // Pipe piranha plants — emerge every 20s
  level.pipeTimer+=dt;
  level.pipes.forEach(pipe=>{
    pipe.plantTimer+=dt;
    if(pipe.plantState==='hidden'){
      if(pipe.plantTimer>=20){
        // Don't emerge if Mario is right on top
        if(Math.abs(M.x-pipe.x)<40&&Math.abs(M.y-(pipe.y-40))<50)return;
        pipe.plantState='rising';
        pipe.plantTimer=0;
        pipe.plantY=0;
      }
    }else if(pipe.plantState==='rising'){
      pipe.plantY+=60*dt;
      if(pipe.plantY>=40){pipe.plantY=40;pipe.plantState='biting';pipe.plantTimer=0}
    }else if(pipe.plantState==='biting'){
      // Bite/snap animation for 3 seconds, damages Mario if close
      if(pipe.plantTimer>=3){pipe.plantState='sinking';pipe.plantTimer=0}
      // Hurt Mario if touching the plant head
      const px=pipe.x,py=pipe.y-pipe.plantY;
      if(Math.abs(M.x+M.w/2-px)<22&&Math.abs(M.y+M.h/2-py)<22){
        hurtMario(10);
      }
    }else if(pipe.plantState==='sinking'){
      pipe.plantY-=60*dt;
      if(pipe.plantY<=0){pipe.plantY=0;pipe.plantState='hidden';pipe.plantTimer=0}
    }
  });

  level.enemies.forEach(e=>{
    if(!e.alive)return;
    e.frameT+=dt;if(e.frameT>.2){e.frameT=0;e.frame=(e.frame+1)%2}
    // Simple patrol AI
    if(e.type!=='thwomp'&&e.type!=='firebar'&&e.type!=='podoboo'){
      // Gravity
      if(!e.evy)e.evy=0;
      e.evy+=800*dt;
      if(e.evy>500)e.evy=500;
      e.y+=e.evy*dt;
      // Ground check — snap feet to top of solid tile
      const ex1=Math.floor((e.x+4)/TILE);
      const ex2=Math.floor((e.x+24)/TILE);
      const feetRow=Math.floor((e.y+24)/TILE);
      let onGround=false;
      for(let cx=ex1;cx<=ex2;cx++){
        if(isSolid(cx,feetRow)){
          e.y=feetRow*TILE-24;
          e.evy=0;
          onGround=true;
          break;
        }
      }
      // Edge detection — turn around before walking off a cliff
      if(onGround){
        const lookAheadX=e.vx>0?e.x+28:e.x-4;
        const lookTX=Math.floor(lookAheadX/TILE);
        const belowFeetRow=Math.floor((e.y+26)/TILE);
        if(!isSolid(lookTX,belowFeetRow)){
          e.vx=-e.vx; // turn around at edge
        }
      }
      e.x+=e.vx*dt;
      if(Math.abs(e.x-e.startX)>e.patrol)e.vx=-e.vx;
      // Remove if fallen off map
      if(e.y>level.h*TILE+100)e.alive=false;
    }
    // Thwomp: drop when mario near
    if(e.type==='thwomp'){
      if(Math.abs(M.x-e.x)<60&&e.y<e.startX+10){
        e.y+=500*dt;
      }else if(e.y>e.startX){
        e.y-=40*dt;
      }
    }
  });
  // Shadow Mario AI
  if(shadowMario&&shadowMario.alive){
    const s=shadowMario;
    s.hitFlash=Math.max(0,s.hitFlash-dt);
    s.face=M.x>s.x?1:-1;
    s.x+=(M.x>s.x?120:-120)*dt;
    // Keep on ground
    const ty=Math.floor((s.y+42)/TILE);
    const tx=Math.floor((s.x+14)/TILE);
    if(!isSolid(tx,ty))s.y+=300*dt;
    else s.y=ty*TILE-40;
    // Attack
    s.atkTimer+=dt;
    if(s.atkTimer>1.5){
      s.atkTimer=0;
      const a=Math.atan2(M.y-s.y,M.x-s.x);
      projectiles.push({x:s.x+14,y:s.y+20,vx:Math.cos(a)*200,vy:Math.sin(a)*200,
        col:'#8020c0',size:5,life:1.5,dmg:10,friendly:false});
    }
    if(rectOverlap({x:s.x,y:s.y,w:28,h:40},{x:M.x,y:M.y,w:M.w,h:M.h})){
      hurtMario(8);
    }
  }
}

// ██  PROJECTILE UPDATE
// ═══════════════════════════════════════════════
function updateProjectiles(dt){
  projectiles=projectiles.filter(p=>{
    p.life-=dt;if(p.life<=0)return false;
    if(p.grav)p.vy+=GRAVITY*dt;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    // Friendly projectile hits
    if(p.friendly){
      level.enemies.forEach(e=>{
        if(!e.alive)return;
        if(Math.abs(p.x-e.x-14)<16&&Math.abs(p.y-e.y-12)<16){
          e.hp-=p.dmg;p.life=0;
          if(e.hp<=0){e.alive=false;G.coins+=2;spawnBurst(e.x+14,e.y+12,'#ff0',5,80);sfxCoin();registerKill()}
        }
      });
      if(boss&&boss.alive){
        if(Math.abs(p.x-boss.x-boss.w/2)<boss.w/2+5&&Math.abs(p.y-boss.y-boss.h/2)<boss.h/2+5){
          if(boss.type==='goombaKing'&&boss.dizzy<=0){}
          else{damageBoss(boss,p.dmg);p.life=0}
        }
      }
      if(shadowMario&&shadowMario.alive){
        if(Math.abs(p.x-shadowMario.x-14)<20&&Math.abs(p.y-shadowMario.y-20)<25){
          shadowMario.hp-=p.dmg;shadowMario.hitFlash=.15;p.life=0;
          if(shadowMario.hp<=0){
            shadowMario.alive=false;G.shadowDefeats++;G.coins+=20;G.skillPts+=1;
            spawnBurst(shadowMario.x+14,shadowMario.y+20,'#8020c0',12,200);
            sfxStar();
          }
        }
      }
    }else{
      // Enemy projectile hits Mario
      if(Math.abs(p.x-M.x-M.w/2)<18&&Math.abs(p.y-M.y-M.h/2)<22){
        hurtMario(p.dmg);p.life=0;
      }
    }
    return p.life>0;
  });
}

function showCutscene(id){
  G.state='CUTSCENE';
  G.cutscene=id;
  G.cutFrame=0;
  G.cutTimer=0;
}

function updateCutscene(dt){
  const scenes=CUTSCENES[G.cutscene];
  if(!scenes)return;
  G.cutTimer+=dt;
  if(G.cutTimer>scenes[G.cutFrame].dur||justDown(' ')||justDown('enter')||justDown('x')){
    G.cutFrame++;G.cutTimer=0;
    if(G.cutFrame>=scenes.length){
      // Cutscene done — go to appropriate state
      if(G.cutscene==='opening'){
        G.state='WORLD_MAP';
      }else if(G.cutscene==='gameOver'){
        // Restart
        deleteSave();
        Object.assign(G,{state:'TITLE',stars:0,coins:0,lives:5,
          rescued:{luigi:false,peach:false,daisy:false,rosalina:false,egadd:false,toad:false,toadsworth:false,yoshi:false,diddy:false,pauline:false,dk:false,lumas:false,kamek:false,toads:0},
          completed:[],skillPts:0,skills:{atk:0,def:0,spd:0,spc:0},
          ending:null,shadowDefeats:0,titleSel:0});
        M.ghostDevice=false;
      }else if(G.cutscene==='finale'){
        if(G.ending==='secret'){
          showCutscene('secretEnding');
          return;
        }
        G.state='ENDING';G.endTimer=0;
      }else if(G.cutscene==='secretEnding'){
        G.state='ENDING';G.endTimer=0;
      }else{
        // Return to world map after rescue/boss victory cutscenes
        G.state='WORLD_MAP';
        applyRescueBonuses();
      }
    }
  }
}

function drawCutscene(){
  const scenes=CUTSCENES[G.cutscene];
  if(!scenes||G.cutFrame>=scenes.length)return;
  const s=scenes[G.cutFrame];
  // Background
  ctx.fillStyle=s.bg;ctx.fillRect(0,0,W,H);
  // Cinematic bars
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,60);ctx.fillRect(0,H-60,W,60);
  // Speaker
  if(s.speaker){
    ctx.fillStyle='#ffd700';ctx.font='16px "Press Start 2P"';
    ctx.fillText(s.speaker,80,H/2-40);
    // Character icon
    if(s.speaker==='Mario'){
      ctx.fillStyle='#e02020';ctx.fillRect(30,H/2-55,40,40);
      ctx.fillStyle='#f8c090';ctx.fillRect(38,H/2-45,24,20);

    }else if(s.speaker==='Bowser Jr.'){

    }else if(s.speaker==='E. Gadd'){
      ctx.fillStyle='#e0e0e0';ctx.fillRect(30,H/2-55,40,40);

    }
  }
  // Text with typewriter effect
  const charCount=Math.floor(G.cutTimer*25);
  const displayText=s.text.substring(0,charCount);
  ctx.fillStyle='#fff';ctx.font='14px "Press Start 2P"';
  wrapText(ctx,displayText,80,H/2,W-160,22);
  // Skip hint
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='10px "Press Start 2P"';
  ctx.fillText('Press SPACE to continue',W/2-130,H-30);
  // Stars twinkling
  for(let i=0;i<20;i++){
    const sx=(hashStr(G.cutscene)+i*97)%W;
    const sy=(hashStr(G.cutscene)+i*53)%H;
    ctx.fillStyle=`rgba(255,255,255,${.2+Math.sin(G.totalTime*2+i)*.3})`;
    ctx.fillRect(sx,sy,2,2);
  }
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');
  let line='',ly=y;
  words.forEach(w=>{
    const test=line+w+' ';
    if(ctx.measureText(test).width>maxW&&line!==''){
      ctx.fillText(line,x,ly);ly+=lineH;line=w+' ';
    }else line=test;
  });
  ctx.fillText(line,x,ly);
}

// Generate map positions: serpentine path for 43 levels
const MAP_POS=[];
(function(){
  const cols=8,xGap=130,yGap=90,padX=100,padY=80;
  for(let i=0;i<BIOMES.length;i++){
    const row=Math.floor(i/cols);
    const col=i%cols;
    const flip=row%2===1;
    const cx=flip?(cols-1-col):col;
    MAP_POS.push({x:padX+cx*xGap,y:padY+row*yGap+Math.sin(i*.7)*15});
  }
})();
let mapCamX=0,mapCamY=0; // scrolling camera for world map

function updateWorldMap(dt){
  G.mapAnim+=dt;
  if(justDown('arrowright')||justDown('d')){
    G.mapCursor=(G.mapCursor+1)%BIOMES.length;
    playTone(440,.05);
  }
  if(justDown('arrowleft')||justDown('a')){
    G.mapCursor=(G.mapCursor-1+BIOMES.length)%BIOMES.length;
    playTone(440,.05);
  }
  // Enter biome — unlocked if you have enough stars OR it's the furthest you've reached
  if(justDown(' ')||justDown('enter')||justDown('x')){
    const b=BIOMES[G.mapCursor];
    const furthest=G.completed.length; // how many levels beaten
    const canEnter=G.stars>=b.starReq||G.mapCursor<=furthest;
    if(canEnter){
      enterBiome(b);
    }else{
      playTone(200,.2);
      floatText(W/2,H/2,'Need '+b.starReq+' stars!','#ff4040');
    }
  }
  // L = switch character
  if(justDown('l')){switchCharacter()}
  // Skill tree (S or M key)
  if(justDown('s')||justDown('m')){
    G.skillReturnState='WORLD_MAP';
    G.state='SKILL_TREE';
  }
  // Mid-game cutscene trigger
  if(G.completed.length===6&&!G.midCutscenePlayed){
    G.midCutscenePlayed=true;
    showCutscene('midGame');
  }
}

function drawWorldMap(){
  ctx.fillStyle='#1a3060';ctx.fillRect(0,0,W,H);
  // Scroll camera to selected node
  const tgt=MAP_POS[G.mapCursor];
  mapCamX+=(tgt.x-W/2+20-mapCamX)*.1;
  mapCamY+=(tgt.y-H/2+20-mapCamY)*.1;
  ctx.save();
  ctx.translate(-mapCamX,-mapCamY);
  // Stars bg
  for(let i=0;i<60;i++){
    const sx=(i*127+33)%1200+mapCamX*.2,sy=(i*83+17)%600+mapCamY*.2;
    ctx.fillStyle=`rgba(255,255,255,${.3+Math.sin(G.mapAnim+i)*.3})`;
    ctx.fillRect(sx,sy,2,2);
  }
  // Paths
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=3;ctx.setLineDash([8,4]);
  for(let i=0;i<BIOMES.length-1;i++){
    const a=MAP_POS[i],b2=MAP_POS[i+1];
    ctx.beginPath();ctx.moveTo(a.x+20,a.y+20);ctx.lineTo(b2.x+20,b2.y+20);ctx.stroke();
  }
  ctx.setLineDash([]);
  // Nodes
  BIOMES.forEach((b,i)=>{
    const p=MAP_POS[i];
    const completed=G.completed.includes(b.id);
    const locked=G.stars<b.starReq&&i>G.completed.length;
    const selected=i===G.mapCursor;
    const rad=selected?22+Math.sin(G.mapAnim*3)*3:16;
    ctx.fillStyle=locked?'#333':completed?'#ffd700':b.sky;
    ctx.beginPath();ctx.arc(p.x+20,p.y+20,rad,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=selected?'#fff':'rgba(255,255,255,.3)';ctx.lineWidth=selected?3:1;ctx.stroke();
    ctx.font='14px sans-serif';ctx.fillText(locked?'🔒':b.icon,p.x+10,p.y+26);
    if(completed){ctx.fillStyle='#40ff40';ctx.font='bold 16px sans-serif';ctx.fillText('✓',p.x+28,p.y+10)}
    if(locked){ctx.fillStyle='#ff8040';ctx.font='7px "Press Start 2P"';ctx.fillText('★'+b.starReq,p.x+6,p.y+44)}
    // Level number
    ctx.fillStyle=selected?'#fff':'rgba(255,255,255,.4)';ctx.font='7px "Press Start 2P"';
    ctx.fillText(''+(i+1),p.x+14,p.y-6);
  });
  ctx.restore();
  // ── HUD overlays (fixed on screen) ──
  const sel=BIOMES[G.mapCursor];
  // Info panel
  ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(10,H-160,330,110);
  ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.strokeRect(10,H-160,330,110);
  ctx.fillStyle='#ffd700';ctx.font='12px "Press Start 2P"';
  ctx.fillText((G.mapCursor+1)+'. '+sel.icon+' '+sel.name,22,H-138);
  ctx.fillStyle='#ccc';ctx.font='9px "Press Start 2P"';
  wrapText(ctx,sel.desc,22,H-115,310,14);
  ctx.fillStyle='#ff6040';ctx.font='8px "Press Start 2P"';
  ctx.fillText('Boss: '+sel.bossName,22,H-82);
  const selIdx=BIOMES.indexOf(sel);
  const selCanEnter=G.stars>=sel.starReq||selIdx<=G.completed.length;
  ctx.fillStyle=selCanEnter?'#40ff40':'#ff4040';ctx.font='9px "Press Start 2P"';
  ctx.fillText(selCanEnter?'PRESS SPACE TO ENTER':'Need '+sel.starReq+' Stars',22,H-60);
  if(G.completed.includes(sel.id)){ctx.fillStyle='#ffd700';ctx.fillText('COMPLETED',200,H-60)}
  // Stats
  ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(W-210,10,200,90);
  ctx.strokeStyle='#4080ff';ctx.lineWidth=1;ctx.strokeRect(W-210,10,200,90);
  ctx.fillStyle='#fff';ctx.font='9px "Press Start 2P"';
  ctx.fillText('★ '+G.stars+' Stars',W-200,30);
  ctx.fillText('🪙 '+G.coins+' Coins',W-200,48);
  ctx.fillText('❤️ '+G.lives+' Lives',W-200,66);
  ctx.fillText('LV '+(G.mapCursor+1)+'/'+BIOMES.length,W-200,84);
  // Progress bar
  ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(W-210,108,200,16);
  ctx.fillStyle='#ffd700';ctx.fillRect(W-208,110,196*(G.completed.length/BIOMES.length),12);
  ctx.fillStyle='#fff';ctx.font='7px "Press Start 2P"';
  ctx.fillText(G.completed.length+'/'+BIOMES.length+' cleared',W-200,120);
  // Controls
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='8px "Press Start 2P"';
  ctx.fillText('← → Select   SPACE Enter   M Skills',W/2-190,H-8);
}

function enterBiome(biome){
  G.biome=biome;

}

// ██  SKILL TREE
// ═══════════════════════════════════════════════
const SKILL_NAMES=['Attack','Defense','Speed','Special'];
const SKILL_KEYS=['atk','def','spd','spc'];
const SKILL_COLORS=['#ff4040','#4080ff','#40c040','#ffa040'];
const SKILL_DESC=[
  'Increase melee & stomp damage',
  'Reduce damage taken',
  'Move faster, jump higher',
  'Stronger special attacks'
];
let skillCursor=0;

function updateSkillTree(dt){
  if(justDown('arrowup')||justDown('w'))skillCursor=Math.max(0,skillCursor-1);
  if(justDown('arrowdown')||justDown('s'))skillCursor=Math.min(3,skillCursor+1);
  if(justDown(' ')||justDown('enter')||justDown('x')){
    const key=SKILL_KEYS[skillCursor];
    if(G.skillPts>0&&G.skills[key]<5){
      G.skills[key]++;G.skillPts--;
      sfxPower();
      applySkills();
    }else playTone(200,.15);
  }
  if(justDown('escape')||justDown('c')||justDown('m')){
    G.state=G.skillReturnState||'WORLD_MAP';
  }
}

function drawSkillTree(){
  ctx.fillStyle='#0a0a20';ctx.fillRect(0,0,W,H);
  // Title
  ctx.fillStyle='#ffd700';ctx.font='20px "Press Start 2P"';
  ctx.fillText('SKILL TREE',W/2-120,50);
  ctx.fillStyle='#aaa';ctx.font='12px "Press Start 2P"';
  ctx.fillText('Skill Points: '+G.skillPts,W/2-100,80);
  // Skills
  for(let i=0;i<4;i++){
    const y=130+i*90;
    const sel=i===skillCursor;
    ctx.fillStyle=sel?'rgba(255,255,255,.1)':'transparent';
    ctx.fillRect(100,y-10,W-200,75);
    if(sel){ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.strokeRect(100,y-10,W-200,75)}
    // Name
    ctx.fillStyle=SKILL_COLORS[i];ctx.font='14px "Press Start 2P"';
    ctx.fillText(SKILL_NAMES[i],130,y+15);
    // Level dots
    for(let j=0;j<5;j++){
      ctx.fillStyle=j<G.skills[SKILL_KEYS[i]]?SKILL_COLORS[i]:'#333';
      ctx.beginPath();ctx.arc(420+j*40,y+10,12,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.stroke();
    }
    ctx.fillStyle=`${SKILL_COLORS[i]}80`;ctx.font='12px "Press Start 2P"';
    ctx.fillText('Lv.'+G.skills[SKILL_KEYS[i]]+'/5',650,y+15);
    // Description
    ctx.fillStyle='#888';ctx.font='9px "Press Start 2P"';
    ctx.fillText(SKILL_DESC[i],130,y+45);
  }
  // Controls
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='9px "Press Start 2P"';
  ctx.fillText('↑↓ Select   SPACE Upgrade   ESC Back',W/2-200,H-30);
}

function applySkills(){
  M.maxHp=100+G.skills.def*15;
  if(M.hp>M.maxHp)M.hp=M.maxHp;
}

function applyRescueBonuses(){
  if(G.rescued.luigi)M.defMult=1.15;
  if(G.rescued.daisy)M.spdMult=1.15;
  if(G.rescued.rosalina)M.dmgMult=1.15;
  // New ally bonuses (stack with the originals)
  if(G.rescued.toad){M.maxHp=Math.max(M.maxHp,5);}
  if(G.rescued.toadsworth){G.coinMult=1.25;}
  if(G.rescued.yoshi){M.jumpMult=1.20;}
  if(G.rescued.diddy){M.spdMult=(M.spdMult||1)*1.08;}
  if(G.rescued.pauline){G.starMult=1.20;}
  if(G.rescued.dk){M.dmgMult=(M.dmgMult||1)*1.12;}
  if(G.rescued.lumas){M.defMult=(M.defMult||1)*1.08;}
  if(G.rescued.kamek){M.specCdMult=0.85;}
  if(G.helpedBJ)M.dmgMult*=1.1;
  applySkills();
}

      initAudio();

        G.state='WORLD_MAP';
        playTone(523,.15);setTimeout(()=>playTone(659,.15),100);setTimeout(()=>playTone(784,.2),200);

      }

      initAudio();
      showCutscene('opening');
      playTone(523,.15);setTimeout(()=>playTone(659,.15),100);setTimeout(()=>playTone(784,.2),200);

  }
  if(justDown('d')){

  }
}

function drawEnding(){

  ctx.fillRect(W/2-65,160,30,25);ctx.fillRect(W/2+35,160,30,25);
  ctx.fillRect(W/2-30,150,60,35);
  // Door
  ctx.fillStyle='#4a2800';ctx.fillRect(W/2-15,300,30,60);
  // Characters
  const chars=[];
  chars.push({col:'#e02020',name:'Mario'});
  if(G.rescued.luigi)chars.push({col:'#20a020',name:'Luigi'});
  if(G.rescued.peach)chars.push({col:'#f080a0',name:'Peach'});
  if(G.rescued.daisy)chars.push({col:'#f0a020',name:'Daisy'});
  if(G.rescued.rosalina)chars.push({col:'#60c8e8',name:'Rosalina'});
  if(G.rescued.toad)chars.push({col:'#e03030',name:'Toad'});
  if(G.rescued.toadsworth)chars.push({col:'#c8a060',name:'Toadsworth'});
  if(G.rescued.yoshi)chars.push({col:'#40b040',name:'Yoshi'});
  if(G.rescued.diddy)chars.push({col:'#a05020',name:'Diddy'});
  if(G.rescued.pauline)chars.push({col:'#d040d0',name:'Pauline'});
  if(G.rescued.dk)chars.push({col:'#704020',name:'DK'});
  if(G.rescued.lumas)chars.push({col:'#f0e040',name:'Lumas'});
  if(G.rescued.kamek)chars.push({col:'#5040a0',name:'Kamek'});
  // Spread characters evenly across the castle front
  const startX=W/2-(chars.length-1)*22;
  chars.forEach((c,i)=>{c.x=startX+i*44;});
  chars.forEach(c=>{
    const bob=Math.sin(G.endTimer*2+c.x*.05)*3;
    ctx.fillStyle=c.col;ctx.fillRect(c.x,340+bob,24,32);
    ctx.fillStyle='#f8c090';ctx.fillRect(c.x+4,330+bob,16,14);
  });

  // Ending title
  let title='',subtitle='',titleCol='#fff';
  if(G.ending==='hero'){
    title='THE HERO ENDING';subtitle='You saved everyone! The kingdom is at peace!';titleCol='#ffd700';
  }else if(G.ending==='balanced'){
    title='THE BALANCED ENDING';subtitle='Bowser is weakened but survives... for now.';titleCol='#80c0ff';
  }else if(G.ending==='secret'){
    title='★ THE SECRET ENDING ★';subtitle='True peace! The shadow is vanquished forever!';titleCol='#ff80ff';
  }
  ctx.fillStyle=titleCol;ctx.font='18px "Press Start 2P"';
  ctx.fillText(title,W/2-ctx.measureText(title).width/2,60);
  ctx.fillStyle='#ccc';ctx.font='11px "Press Start 2P"';
  ctx.fillText(subtitle,W/2-ctx.measureText(subtitle).width/2,90);
  // Stats
  ctx.fillStyle='#aaa';ctx.font='10px "Press Start 2P"';
  ctx.fillText('Stars: '+G.stars+'  Coins: '+G.coins+'  Toads: '+G.rescued.toads+'  Worlds: '+G.completed.length,W/2-250,130);
  // Thank you
  if(G.endTimer>3){
    ctx.fillStyle='#fff';ctx.font='14px "Press Start 2P"';
    ctx.fillText('THANK YOU FOR PLAYING!',W/2-180,H-60);
    ctx.fillStyle='#888';ctx.font='9px "Press Start 2P"';
    ctx.fillText('PRESS SPACE to return to title',W/2-160,H-30);
  }
  if(justDown(' ')&&G.endTimer>3){
    G.state='TITLE';G.endTimer=0;
  }
}
