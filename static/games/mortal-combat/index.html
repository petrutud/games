<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0a0a0e;color:#e0d8c8;font-family:'Inter',sans-serif;display:flex;flex-direction:column;overflow-x:hidden}
.site-nav{background:rgba(10,10,14,.85);backdrop-filter:blur(10px);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);z-index:500;position:relative}
.site-nav a{color:#999;text-decoration:none;font-size:14px;transition:color .2s}.site-nav a:hover{color:#fff}
.site-nav .brand{display:flex;align-items:center;gap:10px;font-weight:500;font-size:16px}
.site-nav .brand img{width:28px;height:28px}
.site-nav .nav-links{display:flex;gap:20px}.site-nav .nav-links a:hover{color:#d4a030}
.gw{flex:1;display:flex;align-items:center;justify-content:center}
.gc{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:8px}
canvas{display:block;border-radius:4px;border:2px solid #1a1a20;box-shadow:0 0 60px rgba(180,40,20,.1),0 8px 40px rgba(0,0,0,.6);max-width:100%;height:auto}
.sf{text-align:center;padding:10px;color:rgba(255,255,255,.2);font-size:11px;position:relative;z-index:1}
.ctrl-bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:8px 4px;max-width:820px;margin:0 auto;user-select:none;-webkit-user-select:none}
.ctrl-btn{background:#1a1a24;border:2px solid #2a2a38;border-radius:8px;color:#c8b890;font-family:'Inter',sans-serif;font-weight:700;font-size:13px;padding:10px 14px;min-width:52px;text-align:center;cursor:pointer;transition:all .1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active,.ctrl-btn.active{background:#d4a030;color:#0a0a0e;border-color:#f0c030;transform:scale(.95)}
.ctrl-btn .label{display:block;font-size:9px;color:#666;font-weight:500;margin-top:2px}
.ctrl-btn:active .label,.ctrl-btn.active .label{color:#0a0a0e}
.ctrl-sep{width:8px}
</style>
</head>
<body>
<nav class="site-nav"><a href="/" class="brand"><img src="/favicon.svg" alt="Home"> Petru Tudorica</a><div class="nav-links"><a href="/#projects">Games</a></div></nav>
<div class="gw"><div class="gc">
<canvas id="c" width="800" height="500"></canvas>
<div class="ctrl-bar">
  <button class="ctrl-btn" data-key="a">A<span class="label">Left</span></button>
  <button class="ctrl-btn" data-key="d">D<span class="label">Right</span></button>
  <button class="ctrl-btn" data-key="w">W<span class="label">Jump</span></button>
  <button class="ctrl-btn" data-key="s">S<span class="label">Block</span></button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn" data-key="j">J<span class="label">Punch</span></button>
  <button class="ctrl-btn" data-key="k">K<span class="label">Kick</span></button>
  <button class="ctrl-btn" data-key="l">L<span class="label">Special</span></button>
</div>
</div></div>
<footer class="sf">&copy; 2026 Petru Tudorica</footer>
<script>
(function(){'use strict';
const C=document.getElementById('c'),X=C.getContext('2d');
const W=800,H=500,FDT=1/60,FLOOR=430,G=2200;

// ══════ FIGHTERS ══════
// Each fighter now has body traits: build, headType, extras for unique look
const FIGHTERS=[
  {name:'Scorpion',color:'#d4a020',accent:'#f0c030',style:'Ninjutsu',
   skin:'#d4a020',color2:'#8a6810',
   hp:100,atk:10,spd:260,jumpF:-680,
   build:'muscular',headType:'mask',extras:['hood'],
   special:{name:'Spear Pull',dmg:15,range:300,cd:3,col:'#f0a020'},
   fatality:'Hellfire Breath'},
  {name:'Sub-Zero',color:'#2080d0',accent:'#40b0f0',style:'Cryomancy',
   skin:'#2080d0',color2:'#104870',
   hp:100,atk:9,spd:240,jumpF:-660,
   build:'muscular',headType:'mask',extras:['armor'],
   special:{name:'Ice Ball',dmg:12,range:250,cd:2.5,col:'#60c8f0'},
   fatality:'Frozen Shatter'},
  {name:'Liu Kang',color:'#c83020',accent:'#f05030',style:'Shaolin',
   skin:'#c8956a',color2:'#c83020',
   hp:95,atk:11,spd:280,jumpF:-700,
   build:'lean',headType:'headband',extras:['bare_chest'],
   special:{name:'Fireball',dmg:14,range:350,cd:2,col:'#f06030'},
   fatality:'Dragon Fire'},
  {name:'Raiden',color:'#6060d0',accent:'#8888f0',style:'Thunder God',
   skin:'#f0e8d0',color2:'#4040a0',
   hp:105,atk:10,spd:250,jumpF:-680,
   build:'tall',headType:'hat',extras:['cape'],
   special:{name:'Lightning',dmg:16,range:280,cd:3.5,col:'#a0a0ff'},
   fatality:'Electric Execution'},
  {name:'Kitana',color:'#3060a0',accent:'#5090d0',style:'Royal Assassin',
   skin:'#d4a888',color2:'#2050a0',
   hp:90,atk:12,spd:270,jumpF:-700,
   build:'slim',headType:'tiara',extras:['fan'],
   special:{name:'Fan Throw',dmg:13,range:320,cd:2,col:'#5090d0'},
   fatality:'Fan Slice'},
  {name:'Jade',color:'#20a050',accent:'#40d070',style:'Edenian',
   skin:'#8a6848',color2:'#186838',
   hp:95,atk:10,spd:275,jumpF:-690,
   build:'slim',headType:'mask',extras:['staff'],
   special:{name:'Razor-Rang',dmg:12,range:300,cd:2.5,col:'#40d070'},
   fatality:'Staff Impale'},
  {name:'Noob',color:'#2a2a3a',accent:'#5050a0',style:'Shadow',
   skin:'#1a1a28',color2:'#101018',
   hp:100,atk:11,spd:245,jumpF:-670,
   build:'muscular',headType:'hood',extras:['shadow'],
   special:{name:'Shadow Ball',dmg:14,range:280,cd:3,col:'#4040a0'},
   fatality:'Portal Rip'},
  {name:'Ermac',color:'#a02020',accent:'#d04040',style:'Telekinesis',
   skin:'#a02020',color2:'#601010',
   hp:100,atk:10,spd:250,jumpF:-680,
   build:'tall',headType:'wrap',extras:['glow'],
   special:{name:'Soul Lift',dmg:15,range:200,cd:3,col:'#40d040'},
   fatality:'Soul Tear'},
];

const ARENAS=[
  {name:'The Pit',bg1:'#0c0810',bg2:'#1a1020',floor:'#2a2028',accent:'#802020',sky:'#0a0610'},
  {name:'Shang Tsung\'s Throne',bg1:'#0e100a',bg2:'#1c2014',floor:'#2a3020',accent:'#408020',sky:'#080c06'},
  {name:'Dead Pool',bg1:'#100808',bg2:'#201010',floor:'#301818',accent:'#a03030',sky:'#0a0404'},
  {name:'Ice Temple',bg1:'#081018',bg2:'#102030',floor:'#182840',accent:'#3080c0',sky:'#060c14'},
  {name:'Thunder Dome',bg1:'#0a0a14',bg2:'#141428',floor:'#1e1e38',accent:'#5050a0',sky:'#060610'},
];

// ══════ STATE ══════
let st='menu';
let p1=null,p2=null,p1Def=null,p2Def=null;
let arena=null,round=1,p1Wins=0,p2Wins=0,maxRounds=3;
let projectiles=[],particles=[],shake={x:0,y:0};
let time=0,timer=99,announceText='',announceTimer=0;
let fatalityTimer=0,fatalityFlash=0,fatalityDrops=[];
let selectP1=-1,selectP2=-1,selectPhase=0;
let aiMode=true;
let keys={};

// ══════ AUDIO ══════
let ac=null;
function aud(){if(!ac)try{ac=new(window.AudioContext||window.webkitAudioContext)}catch(e){}return ac}
function beep(f,t,d,v,ty){const a=aud();if(!a)return;const o=a.createOscillator(),g=a.createGain();
o.type=ty||'triangle';o.frequency.setValueAtTime(f,a.currentTime+t);o.connect(g);g.connect(a.destination);
g.gain.setValueAtTime(v||.04,a.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+t+(d||.08));
o.start(a.currentTime+t);o.stop(a.currentTime+t+(d||.08)+.02)}
function sndPunch(){beep(150,0,.05,.07,'sawtooth');beep(80,.02,.06,.05,'square')}
function sndKick(){beep(120,0,.06,.08,'sawtooth');beep(200,.03,.04,.05)}
function sndSpecial(){beep(400,0,.08,.06);beep(600,.04,.08,.05);beep(800,.08,.06,.04)}
function sndBlock(){beep(300,0,.03,.05);beep(500,.02,.03,.04)}
function sndKO(){beep(200,0,.15,.08,'sawtooth');beep(100,.1,.2,.06,'sawtooth');beep(60,.2,.3,.05,'sawtooth')}
function sndWin(){beep(523,0,.1,.06);beep(659,.08,.1,.05);beep(784,.16,.12,.05);beep(1047,.28,.15,.04)}
function sndAnnounce(){beep(350,0,.06,.05);beep(440,.04,.06,.04)}

// ══════ HELPERS ══════
function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function rnd(a,b){return a+Math.random()*(b-a)}
function emitP(x,y,col,n,spd,life){
  for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(spd*.3,spd);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-rnd(20,60),life:rnd(life*.5,life),max:life,r:rnd(2,5),col})}}
function announce(txt,dur){announceText=txt;announceTimer=dur||1.5;sndAnnounce()}

// ══════ FIGHTER ENTITY ══════
function makeFighter(def,x,face){
  return{x,y:FLOOR-70,w:44,h:70,vx:0,vy:0,face,gr:true,
    hp:def.hp,maxHp:def.hp,def:def,
    state:'idle',stateT:0,
    blocking:false,crouching:false,
    hitstun:0,invuln:0,
    comboCount:0,comboTimer:0,
    specialCd:0,
    punchT:0,kickT:0,
    walkCycle:0,
    dead:false};
}

// ══════ PHYSICS ══════
function moveFighter(f,dt){
  f.vy+=G*dt;if(f.vy>1000)f.vy=1000;
  f.x+=f.vx*dt;f.y+=f.vy*dt;
  if(f.y+f.h>FLOOR){f.y=FLOOR-f.h;f.vy=0;f.gr=true}
  if(f.x<20)f.x=20;if(f.x+f.w>W-20)f.x=W-f.w-20;
  if(Math.abs(f.vx)>10&&f.gr)f.walkCycle+=dt*8;
}

// ══════ COMBAT ══════
function hitFighter(target,dmg,attacker,knockback){
  if(target.invuln>0||target.dead)return;
  if(target.blocking){sndBlock();
    emitP(target.x+target.w/2,target.y+target.h/3,'#aaa',4,40,.2);return}
  target.hp-=dmg;target.hitstun=.25;target.invuln=.3;
  target.vx=attacker.face*knockback;
  shake={x:rnd(-4,4),y:rnd(-3,3)};
  emitP(target.x+target.w/2,target.y+target.h/3,attacker.def.accent,8,80,.3);
  attacker.comboCount++;attacker.comboTimer=1;
  if(target.hp<=0){target.hp=0;target.dead=true;sndKO();
    emitP(target.x+target.w/2,target.y+target.h/2,attacker.def.accent,30,140,.6)}
}

function doSpecial(f,target){
  if(f.specialCd>0)return;
  f.specialCd=f.def.special.cd;
  sndSpecial();
  const sp=f.def.special;
  projectiles.push({x:f.x+f.face*f.w,y:f.y+f.h*.35,
    vx:f.face*400,vy:0,w:20,h:12,dmg:sp.dmg,owner:f,col:sp.col,life:1.5});
  emitP(f.x+f.face*20+f.w/2,f.y+f.h*.35,sp.col,10,60,.3);
}

// ══════ PLAYER INPUT ══════
function updateP1(dt){
  const f=p1;if(!f||f.dead)return;
  f.hitstun=Math.max(0,f.hitstun-dt);f.invuln=Math.max(0,f.invuln-dt);
  f.specialCd=Math.max(0,f.specialCd-dt);f.punchT=Math.max(0,f.punchT-dt);f.kickT=Math.max(0,f.kickT-dt);
  f.comboTimer=Math.max(0,f.comboTimer-dt);if(f.comboTimer<=0)f.comboCount=0;
  if(f.hitstun>0){f.vx*=.85;moveFighter(f,dt);return}
  f.vx=0;f.blocking=false;f.crouching=false;
  if(p2)f.face=p2.x>f.x?1:-1;
  if(keys.a||keys.ArrowLeft)f.vx=-f.def.spd;
  if(keys.d||keys.ArrowRight)f.vx=f.def.spd;
  if((keys.w||keys.ArrowUp||keys[' '])&&f.gr){f.vy=f.def.jumpF;f.gr=false}
  if(keys.s||keys.ArrowDown){f.blocking=true;f.crouching=true;f.vx*=.3}
  if(keys.j&&f.punchT<=0){
    f.punchT=.3;sndPunch();
    const hb={x:f.face>0?f.x+f.w:f.x-30,y:f.y+10,w:30,h:20};
    if(p2&&!p2.dead&&ov(hb,p2))hitFighter(p2,f.def.atk,f,200);
    emitP(f.x+f.face*30+f.w/2,f.y+20,f.def.accent,4,50,.2);
  }
  if(keys.k&&f.kickT<=0){
    f.kickT=.4;sndKick();
    const hb={x:f.face>0?f.x+f.w:f.x-35,y:f.y+25,w:35,h:25};
    if(p2&&!p2.dead&&ov(hb,p2))hitFighter(p2,Math.round(f.def.atk*1.3),f,280);
    emitP(f.x+f.face*35+f.w/2,f.y+35,f.def.accent,5,60,.2);
  }
  if(keys.l)doSpecial(f,p2);
  moveFighter(f,dt);
}

// ══════ AI ══════
let aiTimer=0,aiAction='idle';
function updateAI(dt){
  const f=p2;if(!f||f.dead||!p1||p1.dead)return;
  f.hitstun=Math.max(0,f.hitstun-dt);f.invuln=Math.max(0,f.invuln-dt);
  f.specialCd=Math.max(0,f.specialCd-dt);f.punchT=Math.max(0,f.punchT-dt);f.kickT=Math.max(0,f.kickT-dt);
  f.comboTimer=Math.max(0,f.comboTimer-dt);if(f.comboTimer<=0)f.comboCount=0;
  if(f.hitstun>0){f.vx*=.85;moveFighter(f,dt);return}
  f.face=p1.x>f.x?1:-1;
  f.blocking=false;f.crouching=false;
  const dx=p1.x-f.x,dist=Math.abs(dx);
  aiTimer-=dt;
  if(aiTimer<=0){
    aiTimer=rnd(.3,.8);
    if(dist<50)aiAction=Math.random()<.3?'block':Math.random()<.5?'punch':'kick';
    else if(dist<150)aiAction=Math.random()<.25?'special':Math.random()<.4?'approach':'jump';
    else aiAction=Math.random()<.3?'special':'approach';
  }
  f.vx=0;
  if(aiAction==='approach'){f.vx=f.face*f.def.spd*.8}
  else if(aiAction==='block'){f.blocking=true;f.crouching=true}
  else if(aiAction==='punch'&&f.punchT<=0){
    f.punchT=.35;sndPunch();
    const hb={x:f.face>0?f.x+f.w:f.x-30,y:f.y+10,w:30,h:20};
    if(!p1.dead&&ov(hb,p1))hitFighter(p1,f.def.atk,f,200);
    emitP(f.x+f.face*30+f.w/2,f.y+20,f.def.accent,4,50,.2);
  }else if(aiAction==='kick'&&f.kickT<=0){
    f.kickT=.4;sndKick();
    const hb={x:f.face>0?f.x+f.w:f.x-35,y:f.y+25,w:35,h:25};
    if(!p1.dead&&ov(hb,p1))hitFighter(p1,Math.round(f.def.atk*1.3),f,280);
    emitP(f.x+f.face*35+f.w/2,f.y+35,f.def.accent,5,60,.2);
  }else if(aiAction==='special'){doSpecial(f,p1);aiAction='idle'}
  else if(aiAction==='jump'&&f.gr){f.vy=f.def.jumpF;f.gr=false;f.vx=f.face*f.def.spd*.6}
  moveFighter(f,dt);
}

// ══════ UPDATE ══════
function fixedUpdate(){
  if(st!=='fight')return;
  const dt=FDT;
  timer-=dt;if(timer<=0){timer=0;
    if(p1.hp>p2.hp){p2.dead=true;sndKO()}
    else if(p2.hp>p1.hp){p1.dead=true;sndKO()}
    else{p1.dead=true;p2.dead=true}
  }
  updateP1(dt);
  if(aiMode)updateAI(dt);
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0||p.x<0||p.x>W){projectiles.splice(i,1);continue}
    const target=p.owner===p1?p2:p1;
    if(target&&!target.dead&&ov(p,target)){
      hitFighter(target,p.dmg,p.owner,150);projectiles.splice(i,1);
      emitP(target.x+target.w/2,target.y+target.h/3,p.col,10,80,.3)}
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;p.life-=dt;
    if(p.life<=0)particles.splice(i,1)}
  if(p1.dead||p2.dead){
    if(p1.dead&&!p2.dead){p2Wins++;announce(p2Def.name+' WINS',2)}
    else if(p2.dead&&!p1.dead){p1Wins++;announce(p1Def.name+' WINS',2)}
    else announce('DRAW',2);
    st='ko';
  }
  announceTimer=Math.max(0,announceTimer-dt);
  shake.x*=.85;shake.y*=.85;
}

function sndFatality(){beep(100,0,.2,.1,'sawtooth');beep(60,.1,.3,.08,'sawtooth');beep(200,.2,.1,.06);beep(80,.3,.4,.1,'square');beep(40,.5,.5,.08,'sawtooth')}

function nextRound(){
  if(p1Wins>=2||p2Wins>=2){
    st='victory';
    const winner=p1Wins>=2?p1Def:p2Def;
    announce('FINISH HIM!',2);
    sndKO();
    // after 2.5s go to fatality screen
    setTimeout(()=>{
      if(st!=='victory')return; // already reset, don't override
      st='fatality';fatalityTimer=0;fatalityFlash=1;fatalityDrops=[];
      for(let i=0;i<80;i++)fatalityDrops.push({x:rnd(0,W),y:rnd(-H,0),s:rnd(2,6),v:rnd(200,500),col:Math.random()<.5?'#a02020':'#601010'});
      sndFatality();
      announce(winner.name.toUpperCase()+' WINS!',99);
    },2500);
    return;
  }
  round++;timer=99;projectiles=[];particles=[];
  p1=makeFighter(p1Def,180,1);p2=makeFighter(p2Def,580,-1);
  announce('ROUND '+round,1.5);
  setTimeout(()=>{st='fight'},1500);
}

// ══════ FIGHTER DRAWING ══════
function drawFighter(f,isP2){
  if(!f)return;
  const a=f.invuln>0&&Math.sin(time*20)>.3?.4:1;
  X.globalAlpha=a;
  const def=f.def,col=def.color,acc=def.accent,skin=def.skin,col2=def.color2;
  const cx=f.x+f.w/2,baseY=f.y;
  const face=f.face;
  const walk=Math.sin(f.walkCycle)*0.3;
  const punching=f.punchT>0;
  const kicking=f.kickT>0;
  const bld=def.build; // muscular, lean, slim, tall

  // body dimensions based on build
  let torsoW,torsoH,legW,armW,headR,shoulderW;
  if(bld==='muscular'){torsoW=26;torsoH=22;legW=9;armW=8;headR=11;shoulderW=30}
  else if(bld==='lean'){torsoW=22;torsoH=20;legW=8;armW=7;headR=10;shoulderW=26}
  else if(bld==='slim'){torsoW=20;torsoH=20;legW=7;armW=6;headR=10;shoulderW=24}
  else{torsoW=24;torsoH=24;legW=8;armW=7;headR=11;shoulderW=28} // tall

  // positions
  const headY=baseY+headR+2;
  const shoulderY=headY+headR+2;
  const torsoY=shoulderY;
  const hipY=torsoY+torsoH;
  const legLen=f.h-hipY+baseY;

  // shadow
  if(f.gr){X.globalAlpha=a*.2;X.fillStyle='#000';X.beginPath();X.ellipse(cx,FLOOR+3,f.w*.7,4,0,0,Math.PI*2);X.fill()}
  X.globalAlpha=a;

  if(f.crouching){
    // crouching pose - compact
    const crY=baseY+f.h*.3;
    // legs bent under
    X.fillStyle=col2;
    X.fillRect(cx-12,crY+torsoH+4,10,14);
    X.fillRect(cx+2,crY+torsoH+4,10,14);
    // boots
    X.fillStyle=col;
    X.fillRect(cx-14,crY+torsoH+14,12,6);
    X.fillRect(cx+2,crY+torsoH+14,12,6);
    // torso
    X.fillStyle=col;
    X.fillRect(cx-torsoW/2,crY+6,torsoW,torsoH-2);
    // belt
    X.fillStyle=acc;X.fillRect(cx-torsoW/2,crY+torsoH+2,torsoW,3);
    // arms tucked
    X.fillStyle=col;
    X.fillRect(cx-torsoW/2-6,crY+8,armW,16);
    X.fillRect(cx+torsoW/2-2,crY+8,armW,16);
    // head ducked
    X.fillStyle=skin;
    X.beginPath();X.arc(cx,crY+4,headR-2,0,Math.PI*2);X.fill();
    drawHead(f,cx,crY+4,headR-2,face);
    // blocking shield
    if(f.blocking){
      X.globalAlpha=a*.25;X.fillStyle='#fff';
      X.beginPath();X.arc(cx+face*14,crY+torsoH/2,f.w*.55,0,Math.PI*2);X.fill();
      X.globalAlpha=a;
    }
  }else{
    // ── LEGS ──
    const legSway=f.gr?walk:0;
    const lLegX=cx-7,rLegX=cx+2;

    // left leg
    X.fillStyle=col2;
    X.save();
    X.translate(lLegX+legW/2,hipY);
    X.rotate(legSway*0.3);
    X.fillRect(-legW/2,0,legW,legLen-6);
    // boot
    X.fillStyle=col;
    X.fillRect(-legW/2-1,legLen-10,legW+4,10);
    X.restore();

    // right leg
    X.fillStyle=col2;
    X.save();
    X.translate(rLegX+legW/2,hipY);
    X.rotate(-legSway*0.3);
    if(kicking){
      // kick leg extends forward
      X.rotate(face*0.8);
      X.fillRect(-legW/2,0,legW,legLen+6);
      X.fillStyle=acc;
      X.fillRect(-legW/2-1,legLen,legW+6,10);
    }else{
      X.fillRect(-legW/2,0,legW,legLen-6);
      X.fillStyle=col;
      X.fillRect(-legW/2-1,legLen-10,legW+4,10);
    }
    X.restore();

    // ── TORSO ──
    X.fillStyle=col;
    // shoulders
    X.beginPath();
    X.moveTo(cx-shoulderW/2,shoulderY+2);
    X.lineTo(cx+shoulderW/2,shoulderY+2);
    X.lineTo(cx+torsoW/2,hipY);
    X.lineTo(cx-torsoW/2,hipY);
    X.closePath();X.fill();

    // chest detail for bare_chest
    if(def.extras.includes('bare_chest')){
      X.fillStyle=skin;
      X.fillRect(cx-torsoW/2+3,shoulderY+4,torsoW-6,torsoH-6);
    }

    // armor plates for armor extra
    if(def.extras.includes('armor')){
      X.fillStyle=acc;X.globalAlpha=a*.3;
      X.fillRect(cx-shoulderW/2,shoulderY+2,shoulderW,4);
      X.fillRect(cx-torsoW/2+2,shoulderY+8,torsoW-4,3);
      X.globalAlpha=a;
    }

    // belt
    X.fillStyle=acc;
    X.fillRect(cx-torsoW/2-1,hipY-3,torsoW+2,4);

    // ── ARMS ──
    // back arm
    X.fillStyle=col;
    const backArmX=cx+(-face)*shoulderW/2;
    X.save();
    X.translate(backArmX,shoulderY+4);
    X.rotate(-face*0.15+legSway*0.2);
    X.fillRect(-armW/2,0,armW,22);
    // hand/fist
    X.fillStyle=skin;
    X.beginPath();X.arc(0,24,armW/2+1,0,Math.PI*2);X.fill();
    X.restore();

    // front arm (punching arm)
    X.fillStyle=col;
    const frontArmX=cx+face*shoulderW/2;
    X.save();
    X.translate(frontArmX,shoulderY+4);
    if(punching){
      // arm extended forward
      X.rotate(face*(-0.3));
      X.fillRect(-armW/2,0,armW,28);
      X.fillStyle=acc;
      X.beginPath();X.arc(0,30,armW/2+2,0,Math.PI*2);X.fill();
    }else{
      X.rotate(face*0.15-legSway*0.2);
      X.fillRect(-armW/2,0,armW,22);
      // hand
      X.fillStyle=skin;
      X.beginPath();X.arc(0,24,armW/2+1,0,Math.PI*2);X.fill();
      // fan for Kitana
      if(def.extras.includes('fan')){
        X.fillStyle=acc;X.globalAlpha=a*.7;
        X.beginPath();X.moveTo(0,22);X.lineTo(-8,14);X.lineTo(8,14);X.closePath();X.fill();
        X.globalAlpha=a;
      }
      // staff for Jade
      if(def.extras.includes('staff')){
        X.fillStyle=acc;X.fillRect(-2,10,4,30);
      }
    }
    X.restore();

    // ── HEAD ──
    X.fillStyle=skin;
    X.beginPath();X.arc(cx,headY,headR,0,Math.PI*2);X.fill();
    drawHead(f,cx,headY,headR,face);

    // cape for Raiden
    if(def.extras.includes('cape')){
      X.fillStyle=col2;X.globalAlpha=a*.5;
      X.beginPath();
      X.moveTo(cx-shoulderW/2+2,shoulderY+2);
      X.lineTo(cx+shoulderW/2-2,shoulderY+2);
      X.lineTo(cx+(-face)*10,hipY+10);
      X.lineTo(cx+(-face)*16,hipY+14);
      X.closePath();X.fill();
      X.globalAlpha=a;
    }

    // shadow aura for Noob
    if(def.extras.includes('shadow')){
      X.globalAlpha=a*.15;X.fillStyle='#4040a0';
      X.beginPath();X.arc(cx-face*6,baseY+f.h/2,f.w*.8,0,Math.PI*2);X.fill();
      X.globalAlpha=a;
    }

    // glow for Ermac
    if(def.extras.includes('glow')){
      X.globalAlpha=a*(.1+Math.sin(time*4)*.05);X.fillStyle='#40d040';
      X.beginPath();X.arc(cx,baseY+f.h/2,f.w*.6,0,Math.PI*2);X.fill();
      X.globalAlpha=a;
    }
  }

  // name label
  X.globalAlpha=.6;X.fillStyle=acc;X.font='bold 10px Inter';X.textAlign='center';
  X.fillText(def.name,cx,baseY-10);
  X.globalAlpha=1;
}

function drawHead(f,hx,hy,hr,face){
  const def=f.def,col=def.color,acc=def.accent,skin=def.skin;
  const ht=def.headType;

  if(ht==='mask'){
    // ninja mask covers lower face
    X.fillStyle=col;
    X.beginPath();X.arc(hx,hy,hr,0.1*Math.PI,0.9*Math.PI);X.fill();
    X.fillRect(hx-hr,hy-2,hr*2,hr);
    // eyes
    X.fillStyle=f.dead?'#444':'#fff';
    X.fillRect(hx+face*2-3,hy-3,4,3);
    X.fillRect(hx+face*2+3,hy-3,4,3);
  }else if(ht==='headband'){
    // Liu Kang - open face with headband
    X.fillStyle=f.dead?'#444':'#fff';
    X.fillRect(hx+face*2-3,hy-2,3,3);
    X.fillRect(hx+face*2+3,hy-2,3,3);
    // eyebrows
    X.fillStyle='#333';
    X.fillRect(hx+face*2-4,hy-4,5,1);
    X.fillRect(hx+face*2+2,hy-4,5,1);
    // headband
    X.fillStyle=acc;
    X.fillRect(hx-hr-2,hy-hr+2,hr*2+4,4);
    // headband tail
    X.fillRect(hx-face*hr-2,hy-hr+2,3,10);
  }else if(ht==='hat'){
    // Raiden's conical hat
    X.fillStyle='#4a4060';
    X.beginPath();
    X.moveTo(hx,hy-hr-14);
    X.lineTo(hx-hr-8,hy-hr+4);
    X.lineTo(hx+hr+8,hy-hr+4);
    X.closePath();X.fill();
    X.fillStyle='#6060a0';
    X.fillRect(hx-hr-6,hy-hr+2,hr*2+12,3);
    // eyes (glowing)
    X.fillStyle=f.dead?'#444':'#a0a0ff';
    X.fillRect(hx+face*2-3,hy-2,4,3);
    X.fillRect(hx+face*2+3,hy-2,4,3);
  }else if(ht==='tiara'){
    // Kitana - tiara
    X.fillStyle=f.dead?'#444':'#fff';
    X.fillRect(hx+face*2-3,hy-2,3,3);
    X.fillRect(hx+face*2+3,hy-2,3,3);
    // mask over lower face
    X.fillStyle=col;
    X.fillRect(hx-hr+2,hy+2,hr*2-4,hr-2);
    // tiara
    X.fillStyle=acc;
    X.fillRect(hx-hr+1,hy-hr+1,hr*2-2,3);
    // gem
    X.fillStyle='#fff';
    X.beginPath();X.arc(hx,hy-hr+1,2,0,Math.PI*2);X.fill();
    // hair
    X.fillStyle='#1a1a2a';
    X.fillRect(hx-face*hr,hy-hr+4,4,hr*2-4);
  }else if(ht==='hood'){
    // Noob - full hood
    X.fillStyle='#101018';
    X.beginPath();X.arc(hx,hy,hr+3,0,Math.PI*2);X.fill();
    // just glowing eyes visible
    X.fillStyle=f.dead?'#222':'#5050a0';
    X.fillRect(hx+face*2-3,hy-2,4,2);
    X.fillRect(hx+face*2+3,hy-2,4,2);
  }else if(ht==='wrap'){
    // Ermac - bandage wrapped head
    X.fillStyle='#802020';
    X.beginPath();X.arc(hx,hy,hr+1,0,Math.PI*2);X.fill();
    // wrap lines
    X.strokeStyle='#601010';X.lineWidth=1;
    for(let i=-hr;i<hr;i+=4){
      X.beginPath();X.moveTo(hx-hr,hy+i);X.lineTo(hx+hr,hy+i);X.stroke();
    }
    // glowing eyes
    X.fillStyle=f.dead?'#444':'#40d040';
    X.fillRect(hx+face*2-3,hy-2,4,3);
    X.fillRect(hx+face*2+3,hy-2,4,3);
    // eye glow
    if(!f.dead){
      X.globalAlpha=.3;X.fillStyle='#40d040';
      X.beginPath();X.arc(hx+face*4,hy-1,8,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }
  }
}

function drawHPBar(f,x,w,isRight){
  const pct=f.hp/f.maxHp;
  X.fillStyle='#1a1a20';X.fillRect(x,16,w,18);
  const col=pct>.5?f.def.accent:pct>.25?'#d08020':'#d03030';
  if(isRight)X.fillRect(x+w*(1-pct),16,w*pct,18);
  else X.fillRect(x,16,w*pct,18);
  X.strokeStyle='rgba(255,255,255,.1)';X.lineWidth=1;X.strokeRect(x,16,w,18);
  const cdPct=f.specialCd/f.def.special.cd;
  X.fillStyle=cdPct>0?'#333':f.def.accent;
  X.fillRect(x,36,w*(1-cdPct),4);
}

function renderFatality(){
  const winner=p1Wins>=2?p1Def:p2Def;
  const loser=p1Wins>=2?p2Def:p1Def;
  const dt=1/60;
  fatalityTimer+=dt;
  fatalityFlash=Math.max(0,fatalityFlash-dt*1.5);

  // background - deep red/black with pulsing
  const pulse=Math.sin(fatalityTimer*3)*.1;
  X.fillStyle='#0a0206';X.fillRect(0,0,W,H);

  // blood rain
  fatalityDrops.forEach(d=>{
    d.y+=d.v*dt;
    if(d.y>H){d.y=-10;d.x=rnd(0,W)}
    X.fillStyle=d.col;X.globalAlpha=.6;
    X.fillRect(d.x,d.y,2,d.s*3);
  });
  X.globalAlpha=1;

  // red fog at bottom
  const fogG=X.createLinearGradient(0,H-120,0,H);
  fogG.addColorStop(0,'rgba(80,10,10,0)');fogG.addColorStop(1,'rgba(120,20,20,.3)');
  X.fillStyle=fogG;X.fillRect(0,H-120,W,120);

  // pulsing red vignette
  const vg=X.createRadialGradient(W/2,H/2,100,W/2,H/2,450);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(100,10,10,'+(0.4+pulse)+')');
  X.fillStyle=vg;X.fillRect(0,0,W,H);

  // white flash on entry
  if(fatalityFlash>0){
    X.globalAlpha=fatalityFlash;X.fillStyle='#fff';X.fillRect(0,0,W,H);X.globalAlpha=1;
  }

  // skull emblem in background
  X.globalAlpha=.06+Math.sin(fatalityTimer*2)*.02;
  X.fillStyle='#a02020';X.font='900 200px Cinzel';X.textAlign='center';
  X.fillText('\u2620',W/2,H/2+60);
  X.globalAlpha=1;

  // FATALITY text - shaking
  const shk=Math.sin(fatalityTimer*15)*2;
  X.fillStyle='#c83020';X.font='900 60px Cinzel';X.textAlign='center';
  X.shadowColor='#ff2020';X.shadowBlur=30;
  X.fillText('FATALITY',W/2+shk,160);
  X.shadowBlur=0;

  // winner name glowing
  X.fillStyle=winner.accent;X.font='900 36px Cinzel';
  X.shadowColor=winner.accent;X.shadowBlur=20;
  X.fillText(winner.name.toUpperCase()+' WINS!',W/2,230);
  X.shadowBlur=0;

  // fatality move name
  X.fillStyle='#d4a030';X.font='700 22px Cinzel';
  X.fillText(winner.fatality,W/2,275);

  // winner character - big, centered, triumphant
  const fakeWinner=makeFighter(winner,W/2-22,1);
  fakeWinner.y=FLOOR-90;fakeWinner.h=90;fakeWinner.w=56;
  fakeWinner.gr=true;fakeWinner.punchT=.5;
  // glow behind winner
  X.globalAlpha=.15+Math.sin(fatalityTimer*4)*.05;
  X.fillStyle=winner.accent;
  X.beginPath();X.arc(W/2,FLOOR-50,60,0,Math.PI*2);X.fill();
  X.globalAlpha=1;
  drawFighter(fakeWinner,false);

  // loser collapsed on ground
  const fakeLoser=makeFighter(loser,W/2+120,-1);
  fakeLoser.y=FLOOR-25;fakeLoser.h=25;fakeLoser.w=50;
  fakeLoser.dead=true;fakeLoser.crouching=true;fakeLoser.gr=true;
  X.globalAlpha=.5;
  drawFighter(fakeLoser,true);
  X.globalAlpha=1;

  // fire particles along the floor
  for(let i=0;i<W;i+=40){
    const flicker=Math.sin(fatalityTimer*6+i*.1)*.5+.5;
    X.globalAlpha=flicker*.15;
    X.fillStyle=i%80<40?'#f06020':'#d4a030';
    X.beginPath();X.arc(i,FLOOR-5,rnd(6,12),0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // floor
  X.fillStyle='#1a0808';X.fillRect(0,FLOOR,W,H-FLOOR);
  X.fillStyle='#a02020';X.globalAlpha=.2;X.fillRect(0,FLOOR,W,2);X.globalAlpha=1;

  // score
  X.fillStyle='#888';X.font='600 14px Inter';X.textAlign='center';
  X.fillText(p1Def.name+' '+p1Wins+' \u2014 '+p2Wins+' '+p2Def.name,W/2,FLOOR+30);

  // prompt
  const blink=Math.sin(fatalityTimer*4)>.0;
  if(blink){
    X.fillStyle='#c8b890';X.font='600 16px Inter';
    X.fillText('PRESS ENTER OR TAP TO CONTINUE',W/2,FLOOR+60);
  }
}

function renderSelect(){
  X.fillStyle='#0a0a0e';X.fillRect(0,0,W,H);
  X.fillStyle='#c83020';X.font='900 28px Cinzel';X.textAlign='center';
  X.fillText(selectPhase===0?'PLAYER 1 \u2014 CHOOSE YOUR FIGHTER':'CPU \u2014 CHOOSE FIGHTER',W/2,50);
  const cols=4,bw=160,bh=80,gap=16;
  const sx=(W-cols*(bw+gap)+gap)/2,sy=80;
  FIGHTERS.forEach((f,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    const bx=sx+col*(bw+gap),by=sy+row*(bh+gap);
    const sel=(selectPhase===0&&selectP1===i)||(selectPhase===1&&selectP2===i);
    X.fillStyle=sel?f.color:f.color+'30';X.globalAlpha=sel?1:.6;
    X.fillRect(bx,by,bw,bh);X.globalAlpha=1;
    X.strokeStyle=sel?f.accent:'#333';X.lineWidth=sel?3:1;X.strokeRect(bx,by,bw,bh);
    // mini fighter preview
    drawMiniChar(f,bx+14,by+12,sel);
    // text
    X.fillStyle='#fff';X.font='bold 14px Inter';X.textAlign='left';X.fillText(f.name,bx+35,by+28);
    X.fillStyle='#aaa';X.font='500 10px Inter';X.fillText(f.style,bx+35,by+42);
    X.fillStyle=f.accent;X.font='500 9px Inter';X.fillText('Special: '+f.special.name,bx+35,by+58);
    X.fillStyle='#888';X.fillText('HP:'+f.hp+' ATK:'+f.atk+' SPD:'+(f.spd/10|0),bx+35,by+70);
  });
  if(selectP1>=0){
    X.fillStyle=FIGHTERS[selectP1].accent;X.font='bold 14px Inter';X.textAlign='left';
    X.fillText('P1: '+FIGHTERS[selectP1].name,20,H-20);
  }
}

function drawMiniChar(def,mx,my,highlight){
  // mini character for select screen with unique look
  const col=def.color,acc=def.accent,skin=def.skin,col2=def.color2;
  // legs
  X.fillStyle=col2;
  X.fillRect(mx+2,my+32,5,16);X.fillRect(mx+11,my+32,5,16);
  // boots
  X.fillStyle=col;
  X.fillRect(mx+1,my+44,7,5);X.fillRect(mx+10,my+44,7,5);
  // torso
  X.fillStyle=col;
  X.beginPath();X.moveTo(mx,my+14);X.lineTo(mx+18,my+14);
  X.lineTo(mx+15,my+32);X.lineTo(mx+3,my+32);X.closePath();X.fill();
  // belt
  X.fillStyle=acc;X.fillRect(mx+2,my+30,14,2);
  // arms
  X.fillStyle=col;
  X.fillRect(mx-3,my+15,5,14);X.fillRect(mx+16,my+15,5,14);
  // hands
  X.fillStyle=skin;
  X.beginPath();X.arc(mx-1,my+30,3,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(mx+19,my+30,3,0,Math.PI*2);X.fill();
  // head
  X.fillStyle=skin;
  X.beginPath();X.arc(mx+9,my+8,8,0,Math.PI*2);X.fill();
  // head decoration based on type
  if(def.headType==='mask'){
    X.fillStyle=col;X.fillRect(mx+1,my+8,16,8);
    X.fillStyle='#fff';X.fillRect(mx+5,my+6,3,2);X.fillRect(mx+10,my+6,3,2);
  }else if(def.headType==='hat'){
    X.fillStyle='#4a4060';
    X.beginPath();X.moveTo(mx+9,my-6);X.lineTo(mx-2,my+4);X.lineTo(mx+20,my+4);X.closePath();X.fill();
    X.fillStyle='#a0a0ff';X.fillRect(mx+5,my+6,3,2);X.fillRect(mx+10,my+6,3,2);
  }else if(def.headType==='headband'){
    X.fillStyle=acc;X.fillRect(mx,my+2,18,3);
    X.fillStyle='#fff';X.fillRect(mx+5,my+6,3,2);X.fillRect(mx+10,my+6,3,2);
  }else if(def.headType==='tiara'){
    X.fillStyle=acc;X.fillRect(mx+1,my+1,16,2);
    X.fillStyle='#fff';X.beginPath();X.arc(mx+9,my+1,1.5,0,Math.PI*2);X.fill();
    X.fillStyle=col;X.fillRect(mx+2,my+10,14,5);
    X.fillStyle='#fff';X.fillRect(mx+5,my+6,3,2);X.fillRect(mx+10,my+6,3,2);
  }else if(def.headType==='hood'){
    X.fillStyle='#101018';X.beginPath();X.arc(mx+9,my+8,10,0,Math.PI*2);X.fill();
    X.fillStyle='#5050a0';X.fillRect(mx+5,my+6,3,2);X.fillRect(mx+10,my+6,3,2);
  }else if(def.headType==='wrap'){
    X.fillStyle='#802020';X.beginPath();X.arc(mx+9,my+8,9,0,Math.PI*2);X.fill();
    X.strokeStyle='#601010';X.lineWidth=.8;
    for(let i=-6;i<6;i+=3){X.beginPath();X.moveTo(mx+1,my+8+i);X.lineTo(mx+17,my+8+i);X.stroke()}
    X.fillStyle='#40d040';X.fillRect(mx+5,my+6,3,2);X.fillRect(mx+10,my+6,3,2);
  }
  // extras
  if(def.extras.includes('staff')){X.fillStyle=acc;X.fillRect(mx+20,my+10,2,38)}
  if(def.extras.includes('fan')){X.fillStyle=acc;X.globalAlpha=.7;
    X.beginPath();X.moveTo(mx+20,my+28);X.lineTo(mx+26,my+22);X.lineTo(mx+26,my+34);X.closePath();X.fill();X.globalAlpha=1}
  if(def.extras.includes('cape')){X.fillStyle=col2;X.globalAlpha=.4;
    X.fillRect(mx-2,my+14,3,22);X.globalAlpha=1}
  if(def.extras.includes('shadow')){X.fillStyle='#4040a0';X.globalAlpha=.15;
    X.beginPath();X.arc(mx+9,my+25,14,0,Math.PI*2);X.fill();X.globalAlpha=1}
  if(def.extras.includes('glow')){X.fillStyle='#40d040';X.globalAlpha=.12;
    X.beginPath();X.arc(mx+9,my+25,12,0,Math.PI*2);X.fill();X.globalAlpha=1}
}

// ══════ FULL RESET ══════
function resetToMenu(){
  st='menu';
  p1=null;p2=null;p1Def=null;p2Def=null;
  arena=null;round=1;p1Wins=0;p2Wins=0;
  projectiles=[];particles=[];shake={x:0,y:0};
  timer=99;announceText='';announceTimer=0;
  selectP1=-1;selectP2=-1;selectPhase=0;
  aiTimer=0;aiAction='idle';
  fatalityTimer=0;fatalityFlash=0;fatalityDrops=[];
  keys={};
}

// ══════ INPUT ══════
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;keys[e.key]=true;
  if(e.key===' ')e.preventDefault();
  if(e.key==='Enter'){
    if(st==='victory'||st==='fatality')resetToMenu();
  }
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;keys[e.key]=false});

// on-screen button input
document.querySelectorAll('.ctrl-btn').forEach(btn=>{
  const k=btn.dataset.key;
  function down(e){e.preventDefault();keys[k]=true;btn.classList.add('active')}
  function up(e){e.preventDefault();keys[k]=false;btn.classList.remove('active')}
  btn.addEventListener('mousedown',down);
  btn.addEventListener('mouseup',up);
  btn.addEventListener('mouseleave',up);
  btn.addEventListener('touchstart',down,{passive:false});
  btn.addEventListener('touchend',up,{passive:false});
  btn.addEventListener('touchcancel',up,{passive:false});
});

C.addEventListener('click',e=>{
  aud();
  if(st==='menu'){st='select';selectPhase=0;selectP1=-1;selectP2=-1;return}
  if(st==='victory'||st==='fatality'){resetToMenu();return}
  if(st==='select'){
    const rect=C.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height);
    const cols=4,bw=160,bh=80,gap=16;
    const sx=(W-cols*(bw+gap)+gap)/2,sy=80;
    FIGHTERS.forEach((f,i)=>{
      const col=i%cols,row=Math.floor(i/cols);
      const bx=sx+col*(bw+gap),by=sy+row*(bh+gap);
      if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh){
        if(selectPhase===0){selectP1=i;selectPhase=1;selectP2=Math.floor(Math.random()*FIGHTERS.length);
          setTimeout(()=>{startFight()},800)}
      }
    });
  }
});

function startFight(){
  if(selectP1<0)selectP1=0;if(selectP2<0)selectP2=1;
  p1Def=FIGHTERS[selectP1];p2Def=FIGHTERS[selectP2];
  arena=ARENAS[Math.floor(Math.random()*ARENAS.length)];
  round=1;p1Wins=0;p2Wins=0;timer=99;projectiles=[];particles=[];
  p1=makeFighter(p1Def,180,1);p2=makeFighter(p2Def,580,-1);
  announce('ROUND 1 \u2014 FIGHT!',1.5);
  st='fight';
}

// ══════ LOOP ══════
let lastT=0,acc=0;
function loop(ts){
  const dt=Math.min(.05,(ts-lastT)/1000);lastT=ts;time+=dt;
  if(st==='menu'){renderMenu();requestAnimationFrame(loop);return}
  if(st==='select'){renderSelect();requestAnimationFrame(loop);return}
  if(st==='fatality'){renderFatality();requestAnimationFrame(loop);return}
  acc+=dt;while(acc>=FDT){fixedUpdate();acc-=FDT}
  render();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
