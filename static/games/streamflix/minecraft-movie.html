<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft: The Legend of the Ender Dragon - StreamFlix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;width:100vw;user-select:none}
#cinema{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#letterbox-top,#letterbox-bottom{position:absolute;left:0;width:100%;background:#000;z-index:10;pointer-events:none}
#letterbox-top{top:0}
#letterbox-bottom{bottom:0}
canvas{display:block;z-index:1}
#controls{position:absolute;bottom:0;left:0;right:0;z-index:20;background:linear-gradient(transparent,rgba(0,0,0,.9));padding:12px 20px 18px;display:flex;flex-direction:column;gap:8px;opacity:0;transition:opacity .3s}
#cinema:hover #controls,#controls.show{opacity:1}
#progress-container{width:100%;height:6px;background:rgba(255,255,255,.2);border-radius:3px;cursor:pointer;position:relative}
#progress-container:hover{height:10px;margin-top:-2px}
#progress-bar{height:100%;background:linear-gradient(90deg,#4a7a2e,#9b59b6);border-radius:3px;width:0%;transition:width .1s linear;pointer-events:none}
#progress-buffer{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.1);border-radius:3px;pointer-events:none}
#btn-row{display:flex;align-items:center;gap:16px}
.ctrl-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:20px;padding:4px 8px;opacity:.85;transition:opacity .2s}
.ctrl-btn:hover{opacity:1}
#time-display{font-size:13px;color:#ccc;font-variant-numeric:tabular-nums}
#title-display{flex:1;text-align:center;font-size:14px;color:#aaa;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#back-btn{position:absolute;top:20px;left:20px;z-index:30;background:rgba(0,0,0,.6);border:none;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:14px;opacity:0;transition:opacity .3s;text-decoration:none;display:flex;align-items:center;gap:6px}
#cinema:hover #back-btn{opacity:.8}
#back-btn:hover{opacity:1;background:rgba(255,255,255,.15)}
#scene-indicator{position:absolute;top:20px;right:20px;z-index:30;color:#aaa;font-size:12px;opacity:0;transition:opacity .3s}
#cinema:hover #scene-indicator{opacity:.7}
#subtitle-bar{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:25;background:rgba(0,0,0,.75);padding:8px 24px;border-radius:6px;font-size:18px;text-align:center;max-width:80%;display:none;line-height:1.4;text-shadow:1px 1px 2px #000}
</style>
</head>
<body>
<div id="cinema">
  <div id="letterbox-top"></div>
  <canvas id="c"></canvas>
  <div id="letterbox-bottom"></div>
  <a href="/games/streamflix/" id="back-btn">&#9664; Back</a>
  <div id="scene-indicator"></div>
  <div id="subtitle-bar"></div>
  <div id="controls" class="show">
    <div id="progress-container"><div id="progress-buffer"></div><div id="progress-bar"></div></div>
    <div id="btn-row">
      <button class="ctrl-btn" id="play-btn">&#9654;</button>
      <span id="time-display">0:00 / 0:00</span>
      <span id="title-display">Minecraft: The Legend of the Ender Dragon</span>
      <button class="ctrl-btn" id="voice-btn" title="Toggle Voice Acting">&#128266;</button>
      <button class="ctrl-btn" id="fs-btn">&#x26F6;</button>
    </div>
  </div>
</div>

<script>
// ===== MOVIE ENGINE =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
canvas.width = W; canvas.height = H;

let playing = false, globalTime = 0, lastTimestamp = 0;
let currentScene = 0, sceneTime = 0;
let fadeAlpha = 0, fadeDir = 0;
let controlsTimeout;

const scenes = [
  {name:"Title", duration:15},
  {name:"A New World", duration:15},
  {name:"First Night", duration:15},
  {name:"Meeting Alex", duration:15},
  {name:"The Village", duration:15},
  {name:"Mining Montage", duration:12},
  {name:"Wolf Companion", duration:12},
  {name:"The Nether Portal", duration:15},
  {name:"Nether Fortress", duration:15},
  {name:"Piglin Trading", duration:12},
  {name:"Back to Overworld", duration:12},
  {name:"The Stronghold", duration:15},
  {name:"The End", duration:15},
  {name:"Boss Battle Begins", duration:18},
  {name:"Darkest Moment", duration:15},
  {name:"Final Stand", duration:18},
  {name:"Dragon Defeated", duration:15},
  {name:"The End Poem", duration:15},
  {name:"Home", duration:15},
  {name:"Ending + Credits", duration:20}
];
const TRANSITION_TIME = 1.5;
const totalDuration = scenes.reduce((s,sc)=>s+sc.duration,0);

// ===== AUDIO ENGINE =====
let audioCtx, masterGain;
let currentMusicNodes = [];
let currentMusicType = '';

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.2;
  masterGain.connect(audioCtx.destination);
}

function stopMusic(){
  currentMusicNodes.forEach(n=>{try{n.stop();}catch(e){}try{n.disconnect();}catch(e){}});
  currentMusicNodes = [];
  currentMusicType = '';
}

function playNote(freq, startTime, duration, type='sine', vol=0.15){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(vol, startTime+0.05);
  g.gain.setValueAtTime(vol, startTime+duration-0.1);
  g.gain.linearRampToValueAtTime(0, startTime+duration);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(startTime);
  osc.stop(startTime+duration);
  currentMusicNodes.push(osc);
  return osc;
}

function playMusic(type){
  if(type === currentMusicType) return;
  stopMusic();
  if(!audioCtx) return;
  currentMusicType = type;
  const now = audioCtx.currentTime;

  if(type === 'calm'){
    // C418-inspired calm ambient
    const notes = [261.63, 329.63, 392.00, 349.23, 293.66, 261.63, 329.63, 392.00];
    const loop = () => {
      if(currentMusicType !== 'calm') return;
      const t = audioCtx.currentTime;
      notes.forEach((n,i) => {
        playNote(n, t + i*1.2, 1.5, 'sine', 0.08);
        playNote(n*0.5, t + i*1.2, 1.8, 'sine', 0.04);
      });
      const tm = setTimeout(loop, notes.length*1200);
      currentMusicNodes._timer = tm;
    };
    loop();
    // Ambient pad
    const pad = audioCtx.createOscillator();
    const padG = audioCtx.createGain();
    pad.type = 'sine';
    pad.frequency.value = 130.81;
    padG.gain.value = 0.04;
    pad.connect(padG);
    padG.connect(masterGain);
    pad.start();
    currentMusicNodes.push(pad);
  } else if(type === 'tense'){
    const notes = [130.81, 138.59, 130.81, 123.47, 116.54, 123.47, 130.81, 138.59];
    const loop = () => {
      if(currentMusicType !== 'tense') return;
      const t = audioCtx.currentTime;
      notes.forEach((n,i) => {
        playNote(n, t + i*0.8, 1.0, 'sawtooth', 0.04);
        playNote(n*2, t + i*0.8 + 0.4, 0.3, 'square', 0.02);
      });
      setTimeout(loop, notes.length*800);
    };
    loop();
    // Deep rumble
    const rum = audioCtx.createOscillator();
    const rumG = audioCtx.createGain();
    rum.type = 'sawtooth';
    rum.frequency.value = 55;
    rumG.gain.value = 0.03;
    rum.connect(rumG);
    rumG.connect(masterGain);
    rum.start();
    currentMusicNodes.push(rum);
  } else if(type === 'nether'){
    // Dark, hellish ambience
    const notes = [73.42, 77.78, 82.41, 77.78, 73.42, 69.30, 73.42, 82.41];
    const loop = () => {
      if(currentMusicType !== 'nether') return;
      const t = audioCtx.currentTime;
      notes.forEach((n,i) => {
        playNote(n, t + i*1.0, 1.2, 'sawtooth', 0.03);
        playNote(n*3, t + i*1.0 + 0.2, 0.5, 'square', 0.015);
      });
      setTimeout(loop, notes.length*1000);
    };
    loop();
    const rum = audioCtx.createOscillator();
    const rumG = audioCtx.createGain();
    rum.type = 'sawtooth';
    rum.frequency.value = 40;
    rumG.gain.value = 0.035;
    rum.connect(rumG);
    rumG.connect(masterGain);
    rum.start();
    currentMusicNodes.push(rum);
  } else if(type === 'epic'){
    // Epic boss battle
    const notes = [146.83, 174.61, 196.00, 220.00, 246.94, 220.00, 196.00, 174.61, 146.83, 130.81, 146.83, 164.81];
    const loop = () => {
      if(currentMusicType !== 'epic') return;
      const t = audioCtx.currentTime;
      notes.forEach((n,i) => {
        playNote(n, t + i*0.5, 0.6, 'sawtooth', 0.06);
        playNote(n*0.5, t + i*0.5, 0.5, 'square', 0.03);
        if(i%2===0) playNote(n*2, t + i*0.5+0.25, 0.2, 'sine', 0.04);
      });
      setTimeout(loop, notes.length*500);
    };
    loop();
    // Driving bass
    const bass = audioCtx.createOscillator();
    const bassG = audioCtx.createGain();
    bass.type = 'square';
    bass.frequency.value = 73.42;
    bassG.gain.value = 0.04;
    bass.connect(bassG);
    bassG.connect(masterGain);
    bass.start();
    currentMusicNodes.push(bass);
  } else if(type === 'peaceful'){
    const notes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 261.63, 196.00, 261.63, 329.63];
    const loop = () => {
      if(currentMusicType !== 'peaceful') return;
      const t = audioCtx.currentTime;
      notes.forEach((n,i) => {
        playNote(n, t + i*1.5, 2.0, 'sine', 0.07);
        playNote(n*0.5, t + i*1.5 + 0.5, 1.5, 'triangle', 0.03);
      });
      setTimeout(loop, notes.length*1500);
    };
    loop();
    const pad = audioCtx.createOscillator();
    const padG = audioCtx.createGain();
    pad.type = 'sine';
    pad.frequency.value = 196.00;
    padG.gain.value = 0.03;
    pad.connect(padG);
    padG.connect(masterGain);
    pad.start();
    currentMusicNodes.push(pad);
  } else if(type === 'triumph'){
    const notes = [261.63, 329.63, 392.00, 523.25, 587.33, 523.25, 659.25, 523.25];
    const loop = () => {
      if(currentMusicType !== 'triumph') return;
      const t = audioCtx.currentTime;
      notes.forEach((n,i) => {
        playNote(n, t + i*0.8, 1.0, 'sine', 0.08);
        playNote(n*0.5, t + i*0.8, 1.2, 'triangle', 0.04);
        playNote(n*2, t + i*0.8 + 0.4, 0.4, 'sine', 0.03);
      });
      setTimeout(loop, notes.length*800);
    };
    loop();
  }
}

// ===== VOICE SYSTEM =====
let voiceEnabled = true;
let currentUtterance = null;
let spokenLines = new Set();

const voiceProfiles = {
  narrator: {pitch:1.0, rate:0.85},
  steve: {pitch:1.1, rate:1.0},
  alex: {pitch:1.5, rate:1.05},
  creeper: {pitch:1.8, rate:0.6},
  elder: {pitch:0.7, rate:0.75},
  golem: {pitch:0.3, rate:0.6},
  enderman: {pitch:0.5, rate:0.7},
  dragon: {pitch:0.3, rate:0.65},
  wolf: {pitch:1.9, rate:1.2},
  piglin: {pitch:0.8, rate:1.1}
};

const speakerColors = {
  narrator: '#ffd700',
  steve: '#5599ff',
  alex: '#ff8844',
  creeper: '#44cc44',
  elder: '#aa7744',
  golem: '#aaaaaa',
  enderman: '#aa44ff',
  dragon: '#bb44ff',
  wolf: '#ffffff',
  piglin: '#ffaa00'
};

function speak(text, character, lineId){
  if(!voiceEnabled) return;
  if(!window.speechSynthesis) return;
  if(lineId && spokenLines.has(lineId)) return;
  if(lineId) spokenLines.add(lineId);

  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const profile = voiceProfiles[character] || voiceProfiles.narrator;
  utter.pitch = profile.pitch;
  utter.rate = profile.rate;
  utter.volume = 0.9;

  // Try to get an English voice
  const voices = window.speechSynthesis.getVoices();
  const english = voices.find(v=>v.lang.startsWith('en'));
  if(english) utter.voice = english;

  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

function stopSpeech(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
}

// Preload voices
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ===== SUBTITLE SYSTEM =====
const subtitleEl = document.getElementById('subtitle-bar');
let currentSubtitle = '';
let subtitleTimeout = null;

function showSubtitle(speaker, text, color, duration){
  const displayName = speaker.charAt(0).toUpperCase() + speaker.slice(1);
  const c = color || speakerColors[speaker] || '#fff';
  subtitleEl.innerHTML = `<span style="color:${c};font-weight:bold">${displayName}:</span> ${text}`;
  subtitleEl.style.display = 'block';
  if(subtitleTimeout) clearTimeout(subtitleTimeout);
  subtitleTimeout = setTimeout(()=>{ subtitleEl.style.display = 'none'; }, (duration||4)*1000);
}

function hideSubtitle(){
  subtitleEl.style.display = 'none';
}

// ===== DIALOGUE SYSTEM =====
let dialogueQueue = [];
let lastDialogueTime = -999;

function queueDialogue(time, speaker, text, duration){
  dialogueQueue.push({time, speaker, text, duration: duration||4});
}

function checkDialogue(t, sceneIdx){
  const lineId = sceneIdx + '_' + Math.floor(t*10);
  for(let d of dialogueQueue){
    if(t >= d.time && t < d.time + 0.3 && !spokenLines.has(sceneIdx+'_'+d.time)){
      spokenLines.add(sceneIdx+'_'+d.time);
      showSubtitle(d.speaker, d.text, speakerColors[d.speaker], d.duration);
      speak(d.text, d.speaker, sceneIdx+'_'+d.time);
    }
  }
}

// ===== PARTICLE SYSTEM =====
let particles = [];

function addParticle(x, y, color, vx, vy, life, size){
  particles.push({x, y, color, vx: vx||(Math.random()-0.5)*3, vy: vy||(Math.random()-0.5)*3, life: life||1, maxLife: life||1, size: size||4});
}

function addExplosion(x, y, color, count){
  for(let i=0;i<(count||20);i++){
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*5+2;
    addParticle(x, y, color, Math.cos(angle)*speed, Math.sin(angle)*speed, 0.8+Math.random()*0.5, 3+Math.random()*4);
  }
}

function addXPOrbs(x, y, count){
  for(let i=0;i<(count||30);i++){
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*6+3;
    const c = Math.random()>0.3 ? '#7FFF00' : '#FFD700';
    addParticle(x, y, c, Math.cos(angle)*speed, Math.sin(angle)*speed-2, 1.5+Math.random(), 4+Math.random()*6);
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= dt;
    if(p.life <= 0) particles.splice(i,1);
  }
}

function drawParticles(){
  for(const p of particles){
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ===== DRAWING HELPERS =====
// Everything blocky! No curves!

function drawSky(topColor, bottomColor){
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, topColor);
  grad.addColorStop(1, bottomColor);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

function drawBlockySun(x, y, size){
  ctx.fillStyle = '#FFF44F';
  ctx.fillRect(x-size/2, y-size/2, size, size);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(x-size/2+4, y-size/2+4, size-8, size-8);
}

function drawSquareMoon(x, y, size){
  ctx.fillStyle = '#E8E8D0';
  ctx.fillRect(x-size/2, y-size/2, size, size);
  ctx.fillStyle = '#D0D0B8';
  ctx.fillRect(x-size/4, y-size/4, size/4, size/4);
  ctx.fillRect(x, y, size/5, size/5);
}

function drawSquareStars(t){
  const seed = 12345;
  for(let i=0;i<60;i++){
    const sx = ((seed*i*7+i*131)%W);
    const sy = ((seed*i*3+i*97)%300);
    const flicker = Math.sin(t*2+i)*0.3+0.7;
    ctx.globalAlpha = flicker;
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx, sy, 2+i%3, 2+i%3);
  }
  ctx.globalAlpha = 1;
}

function drawBlockyClouds(t, y){
  const y0 = y || 60;
  for(let i=0;i<5;i++){
    const cx = ((t*20 + i*300)%1500) - 100;
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx, y0+i*15, 80, 20);
    ctx.fillRect(cx+15, y0-10+i*15, 50, 20);
    ctx.fillRect(cx-10, y0+5+i*15, 30, 15);
  }
}

function drawGrassGround(groundY, layers){
  // Grass top
  ctx.fillStyle = '#5DA332';
  ctx.fillRect(0, groundY, W, 16);
  // Dirt
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(0, groundY+16, W, H-groundY-16);
  // Dirt texture
  ctx.fillStyle = '#7A5C12';
  for(let x=0; x<W; x+=32){
    for(let y=groundY+16; y<H; y+=32){
      if((x/32+y/32)%3===0){
        ctx.fillRect(x+4, y+4, 12, 12);
      }
    }
  }
  // Grass details
  ctx.fillStyle = '#4A8C28';
  for(let x=0; x<W; x+=16){
    if(x%48===0) ctx.fillRect(x, groundY-4, 8, 4);
  }
}

function drawOakTree(x, y){
  // Trunk
  ctx.fillStyle = '#6B4226';
  ctx.fillRect(x-8, y-60, 16, 60);
  ctx.fillStyle = '#5A3720';
  ctx.fillRect(x-4, y-60, 4, 60);
  // Leaves (blocky cube)
  ctx.fillStyle = '#2D8B2D';
  ctx.fillRect(x-32, y-100, 64, 48);
  ctx.fillRect(x-24, y-112, 48, 16);
  ctx.fillStyle = '#3DA33D';
  ctx.fillRect(x-28, y-96, 20, 20);
  ctx.fillRect(x+8, y-104, 16, 16);
}

function drawBirchTree(x, y){
  ctx.fillStyle = '#E8E0D0';
  ctx.fillRect(x-7, y-55, 14, 55);
  ctx.fillStyle = '#333';
  ctx.fillRect(x-5, y-40, 4, 6);
  ctx.fillRect(x+2, y-25, 3, 5);
  ctx.fillStyle = '#3DA33D';
  ctx.fillRect(x-28, y-90, 56, 40);
  ctx.fillRect(x-20, y-100, 40, 14);
}

function drawFlower(x, y, color){
  ctx.fillStyle = '#3A7A20';
  ctx.fillRect(x, y-10, 2, 10);
  ctx.fillStyle = color;
  ctx.fillRect(x-3, y-15, 8, 8);
}

// ===== CHARACTER DRAWING =====

function drawSteve(x, y, scale, options){
  const s = scale || 1;
  const opt = options || {};
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);

  // Legs
  const walkAngle = opt.walk ? Math.sin((globalTime||0)*8)*0.3 : 0;
  ctx.fillStyle = '#3333AA';
  ctx.fillRect(-8, 0, 7, 20 + walkAngle*5);
  ctx.fillRect(1, 0, 7, 20 - walkAngle*5);

  // Body (cyan/teal shirt)
  ctx.fillStyle = '#00AAAA';
  ctx.fillRect(-8, -24, 16, 24);
  // Belt
  ctx.fillStyle = '#3333AA';
  ctx.fillRect(-8, -4, 16, 4);

  // Arms
  if(opt.punch){
    // One arm extended
    ctx.fillStyle = '#C4A072';
    ctx.fillRect(8, -24, 8, 8);
    ctx.fillRect(16, -24, 12, 8);
    ctx.fillRect(-16, -24, 8, 20);
  } else if(opt.sword){
    ctx.fillStyle = '#C4A072';
    ctx.fillRect(8, -24, 8, 20);
    ctx.fillRect(-16, -24, 8, 20);
    // Sword in hand
    ctx.fillStyle = opt.swordColor || '#55FFFF';
    ctx.fillRect(16, -36, 4, 24);
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(14, -14, 8, 4);
  } else if(opt.highfive){
    ctx.fillStyle = '#C4A072';
    ctx.fillRect(8, -38, 8, 16);
    ctx.fillRect(-16, -24, 8, 20);
  } else {
    ctx.fillStyle = '#C4A072';
    const armSwing = opt.walk ? Math.sin((globalTime||0)*8)*10 : 0;
    ctx.fillRect(8, -24, 8, 20+armSwing);
    ctx.fillRect(-16, -24, 8, 20-armSwing);
  }

  // Head
  ctx.fillStyle = '#C4A072'; // skin
  ctx.fillRect(-8, -44, 16, 16);
  // Hair (brown)
  ctx.fillStyle = '#6B3A1F';
  ctx.fillRect(-8, -48, 16, 8);
  ctx.fillRect(-8, -44, 4, 4);
  ctx.fillRect(8, -44, 4, 4);
  // Eyes (blue)
  ctx.fillStyle = '#fff';
  ctx.fillRect(-5, -40, 4, 4);
  ctx.fillRect(2, -40, 4, 4);
  ctx.fillStyle = '#3355FF';
  ctx.fillRect(-4, -40, 2, 3);
  ctx.fillRect(3, -40, 2, 3);
  // Mouth
  ctx.fillStyle = '#8B6050';
  ctx.fillRect(-3, -34, 6, 2);

  // Diamond armor if equipped
  if(opt.armor){
    ctx.fillStyle = 'rgba(100,220,255,0.5)';

function drawPortalFrame(x, y, w, h, active){
  // Obsidian frame
  ctx.fillStyle = '#1A0A2E';
  ctx.fillRect(x, y, w, 16); // bottom
  ctx.fillRect(x, y-h, w, 16); // top
  ctx.fillRect(x, y-h, 16, h); // left
  ctx.fillRect(x+w-16, y-h, 16, h); // right
  // Purple texture
  ctx.fillStyle = '#2A1A3E';
  for(let bx=x;bx<x+w;bx+=16){
    ctx.fillRect(bx+2, y+2, 6, 6);
    ctx.fillRect(bx+2, y-h+2, 6, 6);
  }
  // Active portal
  if(active){
    ctx.fillStyle = `rgba(150,50,200,${0.5+Math.sin(globalTime*3)*0.2})`;
    ctx.fillRect(x+16, y-h+16, w-32, h-16);
    // Swirl effect
    for(let i=0;i<8;i++){
      const px = x+20 + Math.sin(globalTime*2+i)*((w-40)/2-10) + (w-40)/2;
      const py = y-h+20 + ((globalTime*30+i*20)%(h-20));
      ctx.fillStyle = `rgba(200,100,255,${0.3+Math.sin(globalTime*4+i)*0.2})`;
      ctx.fillRect(px, py, 6, 6);
    }
  }
}

function drawEndPortal(x, y, w){
  // End portal frame blocks
  ctx.fillStyle = '#D4C896';
  for(let i=0; i<5; i++){
    ctx.fillRect(x+i*(w/5), y, w/5-2, 16);
  }
  // Starry interior
  ctx.fillStyle = '#000011';
  ctx.fillRect(x+8, y+4, w-16, 40);
  for(let i=0;i<15;i++){
    ctx.fillStyle = `rgba(100,200,100,${0.3+Math.sin(globalTime*3+i)*0.3})`;
    ctx.fillRect(x+12+((i*37)%(w-28)), y+8+((i*13)%32), 3, 3);
  }
}

  ctx.fillRect(x, y, 32, 32);
  ctx.fillStyle = '#777';
  ctx.fillRect(x+2, y+2, 12, 12);
  ctx.fillRect(x+18, y+18, 10, 10);
  ctx.fillStyle = '#55FFFF';
  ctx.fillRect(x+8, y+10, 6, 6);
  ctx.fillRect(x+18, y+6, 6, 6);
  ctx.fillRect(x+12, y+20, 6, 6);
}

function drawGoldOre(x, y){
  ctx.fillStyle = '#888';
  ctx.fillRect(x, y, 32, 32);
  ctx.fillStyle = '#777';
  ctx.fillRect(x+4, y+4, 10, 10);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(x+8, y+8, 8, 8);
  ctx.fillRect(x+18, y+14, 6, 6);

}

function drawRedstoneOre(x, y){
  ctx.fillStyle = '#888';
  ctx.fillRect(x, y, 32, 32);
  ctx.fillStyle = '#FF2222';
  ctx.fillRect(x+6, y+6, 5, 5);
  ctx.fillRect(x+16, y+10, 5, 5);
  ctx.fillRect(x+10, y+20, 5, 5);
  ctx.fillRect(x+22, y+22, 4, 4);
}

function drawCoalOre(x, y){
  ctx.fillStyle = '#888';
  ctx.fillRect(x, y, 32, 32);
  ctx.fillStyle = '#222';
  ctx.fillRect(x+6, y+8, 8, 8);
  ctx.fillRect(x+16, y+14, 8, 8);
  ctx.fillRect(x+10, y+22, 6, 6);
}

function drawIronOre(x, y){
  ctx.fillStyle = '#888';
  ctx.fillRect(x, y, 32, 32);
  ctx.fillStyle = '#D4B896';
  ctx.fillRect(x+6, y+6, 7, 7);
  ctx.fillRect(x+18, y+12, 7, 7);
  ctx.fillRect(x+8, y+20, 7, 7);
}

function drawHouse(x, y, w, h, color){
  // Walls
  ctx.fillStyle = color || '#AA8844';
  ctx.fillRect(x, y-h, w, h);
  // Darker planks texture
  ctx.fillStyle = '#8B6914';
  for(let by=y-h;by<y;by+=16){
    ctx.fillRect(x, by, w, 1);
  }
  // Roof
  ctx.fillStyle = '#664422';
  ctx.fillRect(x-8, y-h-12, w+16, 14);
  ctx.fillRect(x+4, y-h-20, w-8, 10);
  // Door
  ctx.fillStyle = '#6B4226';
  ctx.fillRect(x+w/2-8, y-24, 16, 24);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(x+w/2+4, y-14, 3, 3);
  // Window
  ctx.fillStyle = '#88CCFF';
  ctx.fillRect(x+8, y-h+10, 12, 12);
  ctx.fillRect(x+w-20, y-h+10, 12, 12);
  // Window cross
  ctx.fillStyle = '#6B4226';
  ctx.fillRect(x+8, y-h+15, 12, 2);
  ctx.fillRect(x+13, y-h+10, 2, 12);
}

function drawVillageHouse(x, y, variant){
  const v = variant || 0;
  const colors = ['#D4AA70', '#C49960', '#AA8844'];
  drawHouse(x, y, 60+v*10, 45+v*5, colors[v%3]);
}

function drawWell(x, y){
  // Stone base
  ctx.fillStyle = '#888';
  ctx.fillRect(x-20, y-8, 40, 20);
  // Water
  ctx.fillStyle = '#3366FF';
  ctx.fillRect(x-14, y-6, 28, 12);
  // Pillars
  ctx.fillStyle = '#AA8844';
  ctx.fillRect(x-18, y-36, 4, 28);
  ctx.fillRect(x+14, y-36, 4, 28);
  // Roof
  ctx.fillStyle = '#664422';
  ctx.fillRect(x-22, y-40, 44, 6);
}

function drawEndCrystal(x, y, scale){
  const s = scale || 1;
  const bob = Math.sin(globalTime*2)*5;
  ctx.save();
  ctx.translate(x, y+bob);
  ctx.scale(s,s);
  // Base (bedrock)
  ctx.fillStyle = '#333';
  ctx.fillRect(-8, 10, 16, 6);
  // Crystal (pink/magenta rotating)
  const rot = globalTime * 2;
  ctx.fillStyle = '#FF66CC';
  ctx.fillRect(-6, -10, 12, 20);
  ctx.fillStyle = '#FF99DD';
  ctx.fillRect(-4, -8, 8, 16);
  // Fire on top
  ctx.fillStyle = '#FF4400';
  ctx.fillRect(-3, -14, 6, 6);
  ctx.fillStyle = '#FFAA00';
  ctx.fillRect(-2, -16, 4, 4);
  // Beam going up
  ctx.fillStyle = `rgba(255,100,200,${0.3+Math.sin(globalTime*4)*0.2})`;
  ctx.fillRect(-1, -50, 2, 40);
  ctx.restore();
}

function drawObsidianPillar(x, y, height){
  ctx.fillStyle = '#1A0A2E';
  ctx.fillRect(x-12, y-height, 24, height);
  ctx.fillStyle = '#2A1A3E';
  ctx.fillRect(x-10, y-height+4, 8, 8);
  ctx.fillRect(x+2, y-height+16, 8, 8);
}

// ===== SCENE RENDERERS =====

function renderScene(idx, t){
  dialogueQueue = [];
  switch(idx){
    case 0: renderTitle(t); break;
    case 1: renderNewWorld(t); break;
    case 2: renderFirstNight(t); break;
    case 3: renderMeetingAlex(t); break;
    case 4: renderVillage(t); break;
    case 5: renderMining(t); break;
    case 6: renderWolfCompanion(t); break;
    case 7: renderNetherPortal(t); break;
    case 8: renderNetherFortress(t); break;
    case 9: renderPiglinTrading(t); break;
    case 10: renderBackOverworld(t); break;
    case 11: renderStronghold(t); break;
    case 12: renderTheEnd(t); break;
    case 13: renderBossBattle(t); break;
    case 14: renderDarkestMoment(t); break;
    case 15: renderFinalStand(t); break;
    case 16: renderDragonDefeated(t); break;
    case 17: renderEndPoem(t); break;
    case 18: renderHome(t); break;
    case 19: renderCredits(t); break;
  }
}

// SCENE 1: TITLE
function renderTitle(t){
  playMusic('calm');
  // Dark background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0,0,W,H);

  // Terrain generating from left to right
  const genProgress = Math.min(1, t/8);
  const genW = genProgress * W;

  // Sky
  drawSky('#6BB5FF', '#87CEEB');
  ctx.fillRect(genW, 0, W-genW, H);

  // Generate terrain blocks
  const groundY = 500;
  if(genW > 0){
    // Grass and dirt
    for(let bx=0; bx<genW; bx+=16){
      const hillH = Math.sin(bx*0.01)*30 + Math.sin(bx*0.005)*20;
      ctx.fillStyle = '#5DA332';
      ctx.fillRect(bx, groundY-hillH, 16, 16);
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(bx, groundY-hillH+16, 16, H-groundY+hillH-16);
    }
    // Trees
    if(genW > 200) drawOakTree(180, groundY-10);
    if(genW > 500) drawBirchTree(460, groundY-20);
    if(genW > 800) drawOakTree(780, groundY);
    if(genW > 1100) drawOakTree(1060, groundY-15);
  }

  // Clouds
  drawBlockyClouds(t, 80);

  // Sun
  drawBlockySun(1050, 120, 50);

  // "STREAMFLIX PRESENTS"
  if(t > 2 && t < 6){
    const alpha = t < 3 ? (t-2) : (t > 5 ? (6-t) : 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#E50914';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STREAMFLIX PRESENTS', W/2, 200);
    ctx.globalAlpha = 1;
  }

  // Main title
  if(t > 5){
    const titleAlpha = Math.min(1, (t-5)/2);
    ctx.globalAlpha = titleAlpha;

    // Title shadow
    ctx.fillStyle = '#333';
    ctx.font = 'bold 56px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('MINECRAFT', W/2+3, H/2-20+3);
    ctx.font = 'bold 30px monospace';
    ctx.fillText('THE LEGEND OF THE ENDER DRAGON', W/2+2, H/2+25+2);

    // Title
    ctx.fillStyle = '#55FF55';
    ctx.font = 'bold 56px monospace';
    ctx.fillText('MINECRAFT', W/2, H/2-20);
    // Subtitle
    ctx.fillStyle = '#CC88FF';
    ctx.font = 'bold 30px monospace';
    ctx.fillText('THE LEGEND OF THE ENDER DRAGON', W/2, H/2+25);

    ctx.globalAlpha = 1;
  }

  // Creeper peeking
  if(t > 8){
    const creeperY = H/2 - 60 + Math.max(0, (10-t)*30);
    drawCreeper(W/2 + 280, creeperY, 1.2);
  }
}

// SCENE 2: A NEW WORLD
function renderNewWorld(t){
  playMusic('calm');

  // Sunrise
  const sunProgress = Math.min(1, t/6);
  const skyTop = lerpColor('#1A0A2E', '#6BB5FF', sunProgress);
  const skyBot = lerpColor('#332244', '#87CEEB', sunProgress);
  drawSky(skyTop, skyBot);

  // Sun rising
  const sunY = 400 - sunProgress * 280;
  drawBlockySun(200, sunY, 45);

  // Clouds
  drawBlockyClouds(t, 70);

  // Ground
  const groundY = 520;
  drawGrassGround(groundY);

  // Trees
  drawOakTree(100, groundY);
  drawBirchTree(350, groundY);
  drawOakTree(900, groundY);
  drawOakTree(1150, groundY);

  // Flowers
  drawFlower(200, groundY, '#FF4444');
  drawFlower(250, groundY, '#FFFF44');
  drawFlower(700, groundY, '#FF44FF');
  drawFlower(550, groundY, '#FF8844');

  // Chickens
  drawChicken(750, groundY-7, 1);
  drawChicken(800, groundY-7, 1);

  // Steve spawns in
  if(t > 2){
    const spawnAlpha = Math.min(1, (t-2)/1);
    // Spawn particles
    if(t < 4){
      for(let i=0;i<6;i++){
        ctx.fillStyle = `rgba(255,255,255,${0.6*(4-t)/2})`;
        ctx.fillRect(W/2-20+Math.sin(t*5+i)*20, groundY-50+Math.cos(t*4+i)*30, 4, 4);
      }
    }
    ctx.globalAlpha = spawnAlpha;
    const steveX = t > 6 ? W/2 + (t-6)*30 : W/2;
    const punching = t > 8 && t < 11;
    drawSteve(steveX, groundY, 1.8, {punch: punching, walk: t > 6});
    ctx.globalAlpha = 1;

    // Punching tree
    if(punching){
      // Wood blocks flying
      const blockT = t - 8;
      for(let i=0;i<3;i++){
        if(blockT > i*0.5){
          ctx.fillStyle = '#8B6914';
          const bx = steveX+40 + (blockT-i*0.5)*20;
          const by = groundY-60 - (blockT-i*0.5)*30 + (blockT-i*0.5)*(blockT-i*0.5)*20;
          ctx.fillRect(bx, by, 12, 12);
        }
      }
    }

    // Crafting pickaxe
    if(t > 11){
      ctx.fillStyle = '#8B6914';
      const cx = steveX + 30;
      ctx.fillRect(cx, groundY-40, 4, 16);
      ctx.fillRect(cx-6, groundY-44, 16, 4);
    }
  }

  // Dialogue
  queueDialogue(3, 'steve', 'A new world... Time to survive.', 3);
  queueDialogue(8, 'narrator', 'In a world made of blocks, one adventurer begins a journey that will change everything.', 5);
  checkDialogue(t, 1);
}

// SCENE 3: FIRST NIGHT
function renderFirstNight(t){
  playMusic('tense');

  // Sky darkening
  const darkProgress = Math.min(1, t/4);
  const skyTop = lerpColor('#6BB5FF', '#0A0A1E', darkProgress);
  const skyBot = lerpColor('#FF8844', '#1A1A2E', darkProgress);
  drawSky(skyTop, skyBot);

  // Stars appear
  if(darkProgress > 0.5) drawSquareStars(t);

  // Moon
  if(darkProgress > 0.7) drawSquareMoon(900, 80, 40);

  // Ground
  const groundY = 520;
  drawGrassGround(groundY);

  // Steve's dirt house (building animation)
  const houseProgress = Math.min(1, t > 2 ? (t-2)/3 : 0);
  if(houseProgress > 0){
    // Dirt walls
    const hH = houseProgress * 60;
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(W/2-40, groundY-hH, 80, hH);
    // Darker texture
    ctx.fillStyle = '#7A5C12';
    for(let by=groundY-hH; by<groundY; by+=16){
      for(let bx=W/2-40; bx<W/2+40; bx+=16){
        if((bx+by)%32===0) ctx.fillRect(bx+2, by+2, 8, 8);
      }
    }
    if(houseProgress > 0.5){
      // Door (blocked)
      ctx.fillStyle = '#6B4226';
      ctx.fillRect(W/2-8, groundY-24, 16, 24);
      // Torch inside
      if(houseProgress > 0.8){
        drawTorch(W/2-20, groundY-40, 0.8);
        drawTorch(W/2+20, groundY-40, 0.8);
        // Window glow
        ctx.fillStyle = 'rgba(255,200,50,0.3)';
        ctx.fillRect(W/2-35, groundY-50, 12, 12);
        ctx.fillRect(W/2+24, groundY-50, 12, 12);
      }
    }

    // Steve inside peeking
    if(t > 6){
      drawSteve(W/2, groundY, 1.2, {sword: true, swordColor: '#888'});
    }
  }

  // Mobs spawning
  if(t > 5){
    const mobAlpha = Math.min(1, (t-5)/2);
    ctx.globalAlpha = mobAlpha;
    drawZombie(200, groundY, 1.3);
    drawZombie(300, groundY, 1.1);
    drawSkeleton(1000, groundY, 1.2);
    drawSpider(1100, groundY+5, 1.5);

    // Creeper near house!
    if(t > 7){
      drawCreeper(W/2+80, groundY, 1.3);
    }
    ctx.globalAlpha = 1;
  }

  // Block placing particles
  if(t > 2 && t < 5){
    for(let i=0;i<3;i++){
      addParticle(W/2-30+Math.random()*60, groundY-Math.random()*50, '#8B6914',
        (Math.random()-0.5)*2, -Math.random()*2, 0.5, 4);
    }
  }

  queueDialogue(1, 'narrator', 'As the sun sets, danger emerges.', 3);
  queueDialogue(5, 'steve', 'Nope. Nope. Definitely not going out there.', 3);
  queueDialogue(10, 'narrator', 'He crafts a stone sword and waits for dawn.', 3);
  checkDialogue(t, 2);
}

// SCENE 6: MINING MONTAGE
function renderMining(t){
  playMusic('tense');

  // Cave background
  ctx.fillStyle = '#333';
  ctx.fillRect(0,0,W,H);

  // Stone textures
  for(let bx=0;bx<W;bx+=32){
    for(let by=0;by<H;by+=32){
      ctx.fillStyle = `rgb(${80+((bx*7+by*3)%30)},${80+((bx*3+by*7)%30)},${80+((bx*5+by*5)%30)})`;
      ctx.fillRect(bx, by, 32, 32);
      ctx.fillStyle = '#555';
      ctx.fillRect(bx, by, 32, 1);
      ctx.fillRect(bx, by, 1, 32);
    }
  }

  // Lava pool at bottom
  ctx.fillStyle = '#FF4400';
  ctx.fillRect(0, 620, W, 100);
  ctx.fillStyle = '#FF6600';
  for(let x=0;x<W;x+=20){
    ctx.fillRect(x, 618+Math.sin(t*2+x*0.1)*3, 16, 8);
  }

  // Torches
  drawTorch(100, 300, 1.2);
  drawTorch(600, 200, 1.2);
  drawTorch(1000, 350, 1.2);

  // Ores in walls
  if(t > 1) drawCoalOre(200, 250);
  if(t > 3) drawIronOre(400, 180);
  if(t > 5) drawGoldOre(700, 300);
  if(t > 7) drawRedstoneOre(850, 200);
  if(t > 8) drawDiamondOre(500, 400);

  // Mining progress
  const phase = Math.floor(t / 2.5);

  // Characters mining
  const groundY = 500;
  if(phase < 2){
    drawSteve(350, groundY, 1.5, {punch: true, walk: true});
    drawAlex(450, groundY, 1.5, {walk: true});
  } else if(phase < 4){
    drawSteve(550, groundY, 1.5, {punch: true});
    drawAlex(650, groundY, 1.5, {punch: false});
  } else {
    // Diamond celebration!
    drawSteve(500, groundY, 1.5, {armor: true, sword: true});
    drawAlex(600, groundY, 1.5, {armor: true});
    // Sparkle effects
    for(let i=0;i<8;i++){
      ctx.fillStyle = '#55FFFF';
      const sx = 500 + Math.sin(t*3+i)*80;
      const sy = groundY - 60 + Math.cos(t*4+i)*40;
      ctx.fillRect(sx, sy, 4+Math.sin(t*5+i)*2, 4+Math.sin(t*5+i)*2);
    }
  }

  // Lava near-miss scene
  if(t > 6 && t < 8){
    // Water bucket save
    ctx.fillStyle = '#3366FF';
    ctx.fillRect(520, 580, 40, 40);
    ctx.fillStyle = `rgba(255,100,0,${Math.max(0,7-t)*0.5})`;
    ctx.fillRect(480, 560, 80, 60);
  }

  // Finding text
  if(t > 1 && t < 3){
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Coal found!', W/2, 100);
  }
  if(t > 3 && t < 5){
    ctx.fillStyle = '#D4B896';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Iron found!', W/2, 100);
  }
  if(t > 5 && t < 7){
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Gold found!', W/2, 100);
  }
  if(t > 8 && t < 10){
    ctx.fillStyle = '#55FFFF';
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DIAMONDS!!!', W/2, 100);
    addXPOrbs(W/2, 120, 1);
  }

  queueDialogue(1, 'narrator', 'They mine deep into the earth, seeking precious resources.', 3);
  queueDialogue(6, 'steve', 'Thanks! That was close!', 2);
  queueDialogue(8.5, 'alex', 'Diamonds! This changes everything!', 3);
  checkDialogue(t, 5);
}

// SCENE 7: WOLF COMPANION

// SCENE 18: THE END POEM
function renderEndPoem(t){
  playMusic('peaceful');

  // Starfield
  ctx.fillStyle = '#000008';
  ctx.fillRect(0,0,W,H);

  // Beautiful stars
  for(let i=0;i<100;i++){
    const sx = (i*97+i*i*3)%W;
    const sy = (i*53+i*i*7)%H;
    const brightness = 0.3 + Math.sin(t*1.5+i*0.3)*0.3;
    const size = 1 + (i%3);
    ctx.fillStyle = `rgba(255,255,255,${brightness})`;
    ctx.fillRect(sx, sy, size, size);
  }

  // Swirling portal light
  if(t < 4){
    for(let i=0;i<12;i++){
      const angle = t*2 + i*Math.PI/6;
      const dist = 100 + t*30;
      ctx.fillStyle = `rgba(200,200,255,${0.3-t*0.05})`;
      ctx.fillRect(W/2+Math.cos(angle)*dist-4, H/2+Math.sin(angle)*dist*0.5-4, 8, 8);
    }
  }

  // End Poem text scrolling
  const poems = [
    "And the player dreamed of sunlight...",
    "of trees and rivers and mountains...",
    "of building and creating...",
    "of adventures with friends...",
    "And the player was happy.",
    "And the player was content.",
    "The universe said: You are the universe,",
    "experiencing itself."
  ];

  const scrollSpeed = 0.6;
  const lineHeight = 50;
  const startY = H - t * scrollSpeed * 60;

  ctx.font = '22px monospace';
  ctx.textAlign = 'center';

  for(let i=0;i<poems.length;i++){
    const py = startY + i*lineHeight;
    if(py > -50 && py < H+50){
      const dist = Math.abs(py - H/2);
      const alpha = Math.max(0, 1 - dist/(H/2));
      ctx.fillStyle = `rgba(200,220,255,${alpha})`;
      ctx.fillText(poems[i], W/2, py);
    }
  }

  queueDialogue(0.5, 'narrator', 'And the player dreamed of sunlight... of trees and rivers and mountains.', 5);
  queueDialogue(7, 'narrator', 'And the player was content. The universe said: You are the universe, experiencing itself.', 6);
  checkDialogue(t, 17);
}

      // Glow from crack
      ctx.fillStyle = `rgba(200,100,255,${0.3+Math.sin(t*3)*0.2})`;
      ctx.fillRect(W/2-2, H/2+63, 6, 10);
    }
  }

  queueDialogue(0.5, 'narrator', 'They build the most amazing castle together.', 3);
  queueDialogue(8, 'creeper', 'Sssssssss...', 2);
  queueDialogue(10, 'steve', 'Every. Single. Time.', 2.5);
  queueDialogue(12.5, 'narrator', 'The End. Thank you for watching.', 3);
  checkDialogue(t, 19);
}

// ===== COLOR HELPERS =====
function lerpColor(c1, c2, t){
  const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
  const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
  const r = Math.round(r1+(r2-r1)*t), g = Math.round(g1+(g2-g1)*t), b = Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

// ===== RESIZE =====
function resize(){
  const ratio = W/H;
  let cw = window.innerWidth, ch = window.innerHeight;
  let scale;
  if(cw/ch > ratio){
    scale = ch/H;
  } else {
    scale = cw/W;
  }
  const dw = W*scale, dh = H*scale;
  canvas.style.width = dw+'px';
  canvas.style.height = dh+'px';
  const barH = Math.max(0,(ch-dh)/2);
  document.getElementById('letterbox-top').style.height = barH+'px';
  document.getElementById('letterbox-bottom').style.height = barH+'px';
}
window.addEventListener('resize', resize);
resize();

// ===== MAIN LOOP =====
function getSceneAt(time){
  let t = 0;
  for(let i=0;i<scenes.length;i++){
    if(time < t+scenes[i].duration) return {index:i, localTime: time-t};
    t += scenes[i].duration;
  }
  return {index:scenes.length-1, localTime: scenes[scenes.length-1].duration};
}

function update(timestamp){
  requestAnimationFrame(update);

  if(!lastTimestamp) lastTimestamp = timestamp;
  const dt = (timestamp - lastTimestamp)/1000;
  lastTimestamp = timestamp;

  if(playing){
    globalTime += dt;
    if(globalTime >= totalDuration){
      globalTime = totalDuration;
      playing = false;
      playBtn.textContent = '\u25B6';
    }
  }

  const {index, localTime} = getSceneAt(globalTime);
  currentScene = index;
  sceneTime = localTime;

  // Clear
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0,0,W,H);

  // Render scene
  renderScene(index, localTime);

  // Particles
  updateParticles(dt);
  drawParticles();

  // Check dialogue
  checkDialogue(localTime, index);

  // Fade transitions
  const sceneDuration = scenes[index].duration;
  if(localTime < TRANSITION_TIME){
    const alpha = 1 - localTime/TRANSITION_TIME;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0,0,W,H);
  }
  if(localTime > sceneDuration - TRANSITION_TIME){
    const alpha = (localTime - (sceneDuration-TRANSITION_TIME))/TRANSITION_TIME;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0,0,W,H);
  }

  // UI updates
  updateUI();
}

function updateUI(){
  const progress = (globalTime/totalDuration)*100;
  progressBar.style.width = progress+'%';

  const curr = formatTime(globalTime);
  const total = formatTime(totalDuration);
  timeDisplay.textContent = `${curr} / ${total}`;

  sceneIndicator.textContent = `Scene ${currentScene+1}/${scenes.length}: ${scenes[currentScene].name}`;
}

function formatTime(s){
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

// ===== CONTROLS =====
const playBtn = document.getElementById('play-btn');
const voiceBtn = document.getElementById('voice-btn');
const fsBtn = document.getElementById('fs-btn');
const progressContainer = document.getElementById('progress-container');
const progressBar = document.getElementById('progress-bar');
const timeDisplay = document.getElementById('time-display');
const sceneIndicator = document.getElementById('scene-indicator');
const controlsEl = document.getElementById('controls');

playBtn.addEventListener('click', togglePlay);

function togglePlay(){
  initAudio();
  if(globalTime >= totalDuration){
    // Restart
    globalTime = 0;
    spokenLines.clear();
    particles = [];
    stopSpeech();
    stopMusic();
  }
  playing = !playing;
  playBtn.textContent = playing ? '\u23F8' : '\u25B6';
  if(!playing){
    stopSpeech();
  }
  controlsEl.classList.remove('show');
}

voiceBtn.addEventListener('click', ()=>{
  voiceEnabled = !voiceEnabled;
  voiceBtn.textContent = voiceEnabled ? '\uD83D\uDD0A' : '\uD83D\uDD07';
  if(!voiceEnabled) stopSpeech();
});

fsBtn.addEventListener('click', ()=>{
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
});

progressContainer.addEventListener('click', (e)=>{
  initAudio();
  const rect = progressContainer.getBoundingClientRect();
  const pct = (e.clientX - rect.left)/rect.width;
  globalTime = pct * totalDuration;
  spokenLines.clear();
  particles = [];
  stopSpeech();
  stopMusic();
  currentMusicType = '';
});

document.addEventListener('keydown', (e)=>{
  if(e.code === 'Space'){
    e.preventDefault();
    togglePlay();
  }
  if(e.code === 'ArrowRight'){
    globalTime = Math.min(totalDuration, globalTime + 5);
    spokenLines.clear();
    stopSpeech();
  }
  if(e.code === 'ArrowLeft'){
    globalTime = Math.max(0, globalTime - 5);
    spokenLines.clear();
    stopSpeech();
  }
});

// Mouse movement for controls
let hideTimeout;
document.addEventListener('mousemove', ()=>{
  controlsEl.style.opacity = '1';
  clearTimeout(hideTimeout);
  hideTimeout = setTimeout(()=>{
    if(playing) controlsEl.style.opacity = '';
  }, 3000);
});

// Start
requestAnimationFrame(update);
</script>
