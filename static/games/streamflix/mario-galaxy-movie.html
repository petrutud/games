<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario Galaxy - The Movie | StreamFlix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none}
#cinema{position:relative;width:100%;max-width:1280px;aspect-ratio:16/9;background:#000;overflow:hidden;border-radius:4px}
#movieCanvas{width:100%;height:100%;display:block}
.letterbox{position:absolute;left:0;right:0;background:#000;height:0;z-index:2;pointer-events:none}
.letterbox.top{top:0}
.letterbox.bottom{bottom:0}
#controls{position:absolute;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(transparent,rgba(0,0,0,.9));padding:12px 16px 10px;opacity:0;transition:opacity .3s}
#cinema:hover #controls,#controls.show{opacity:1}
#progressBar{width:100%;height:4px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;margin-bottom:10px;position:relative}

#progressFill{height:100%;background:linear-gradient(90deg,#e63946,#f4a261);border-radius:2px;width:0;pointer-events:none;position:relative}
#progressFill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:12px;height:12px;background:#fff;border-radius:50%;opacity:0;transition:opacity .2s}
#progressBar:hover #progressFill::after{opacity:1}
#btnRow{display:flex;align-items:center;gap:12px}
.ctrl-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:18px;padding:4px 8px;opacity:.85;transition:opacity .2s}

#timeDisplay{font-size:13px;color:#ccc;font-variant-numeric:tabular-nums}

#backBtn{position:absolute;top:12px;left:12px;z-index:15;background:rgba(0,0,0,.6);border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:14px;opacity:.7;transition:opacity .3s}

<script>
// ===================== SETUP =====================
const canvas = document.getElementById('movieCanvas');
const ctx = canvas.getContext('2d');
const cinema = document.getElementById('cinema');

function resize() {
  const rect = cinema.getBoundingClientRect();
  canvas.width = 1280;
  canvas.height = 720;
}
resize();

// ===================== MOVIE TIMING =====================
const SCENE_DEFS = [
  { name: "Title Sequence", duration: 15 },
  { name: "The Star Festival", duration: 15 },
  { name: "Peach's Letter", duration: 12 },
  { name: "Bowser's Attack", duration: 15 },

const FADE_DURATION = 1.5;

let movieTime = 0;
let playing = false;
let lastFrameTime = 0;

// ===================== AUDIO SYSTEM =====================
let audioCtx = null;
let masterGain = null;
let currentMusicNodes = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

function stopMusic() {
  currentMusicNodes.forEach(n => {
    try { n.stop(); } catch(e) {}
    try { n.disconnect(); } catch(e) {}
  });
  currentMusicNodes = [];
}

function playNote(freq, startTime, duration, type='sine', vol=0.15) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration - 0.01);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(startTime);
  osc.stop(startTime + duration);
  currentMusicNodes.push(osc);
  return osc;
}

// Musical scales
const NOTE_FREQS = {
  C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,B3:246.94,
  C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,
  C6:1046.50
};
const N = NOTE_FREQS;

function playMoodMusic(mood) {
  stopMusic();
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const bpm = 120;
  const beat = 60/bpm;
  const loopLen = 8; // seconds loop

  function scheduleLoop(notes, type, vol) {
    notes.forEach(([note, start, dur]) => {
      const freq = typeof note === 'number' ? note : N[note];
      if (freq) {
        for (let rep = 0; rep < 4; rep++) {
          playNote(freq, t + start + rep * loopLen, dur, type, vol);
        }
      }
    });
  }

  if (mood === 'title') {
    scheduleLoop([
      ['C4',0,.5],['E4',.5,.5],['G4',1,.5],['C5',1.5,1],
      ['B4',3,.5],['G4',3.5,.5],['E4',4,.5],['C4',4.5,1],
      ['D4',6,.3],['F4',6.3,.3],['A4',6.6,.3],['D5',7,1],
    ], 'triangle', 0.12);
    scheduleLoop([
      ['C3',0,2],['G3',2,2],['A3',4,2],['F3',6,2],
    ], 'sine', 0.08);
  } else if (mood === 'happy' || mood === 'festival') {
    scheduleLoop([
      ['C5',0,.25],['E5',.25,.25],['G5',.5,.25],['E5',.75,.25],
      ['C5',1,.25],['D5',1.25,.25],['E5',1.5,.5],
      ['G4',2,.25],['A4',2.25,.25],['B4',2.5,.25],['C5',2.75,.5],
      ['A4',3.5,.25],['G4',3.75,.25],
      ['F4',4,.25],['A4',4.25,.25],['C5',4.5,.5],['A4',5,.25],['F4',5.25,.25],
      ['G4',5.5,.25],['B4',5.75,.25],['D5',6,.5],['C5',6.5,.5],
      ['E5',7,.25],['D5',7.25,.25],['C5',7.5,.5],
    ], 'square', 0.06);
    scheduleLoop([
      ['C3',0,1],['G3',1,1],['F3',2,1],['C3',3,1],
      ['A3',4,1],['F3',5,1],['G3',6,1],['C3',7,1],
    ], 'triangle', 0.08);
  } else if (mood === 'dark' || mood === 'bowser') {
    scheduleLoop([
      ['C3',0,1],['C3',1.5,.5],['E3',2,.5],['F3',2.5,1.5],
      ['C3',4,1],['D3',5.5,.5],['E3',6,.25],['D3',6.5,.5],['C3',7,1],
    ], 'sawtooth', 0.07);
    scheduleLoop([
      [65.41,0,2],[65.41,2,2],[58.27,4,2],[61.74,6,2]
    ], 'sine', 0.1);
    // Percussion-like
    scheduleLoop([
      [80,0,.1],[80,1,.1],[80,2,.1],[80,3,.1],[80,4,.1],[80,5,.1],[80,6,.1],[80,7,.1],
    ], 'square', 0.04);
  } else if (mood === 'ethereal' || mood === 'space') {
    scheduleLoop([
      ['E4',0,1.5],['G4',1.5,1],['A4',2.5,1.5],['B4',4,1],
      ['A4',5,1],['G4',6,1],['E4',7,1],
    ], 'sine', 0.1);
    scheduleLoop([
      ['C3',0,4],['A3',4,4],
    ], 'sine', 0.06);
    scheduleLoop([
      ['E5',1,2],['B4',3,2],['C5',5,2],['G4',7,1],
    ], 'triangle', 0.04);
  } else if (mood === 'emotional') {
    scheduleLoop([
      ['C4',0,1],['E4',1,1],['G4',2,1],['E4',3,.5],['F4',3.5,.5],
      ['A4',4,1.5],['G4',5.5,.5],['F4',6,1],['E4',7,1],
    ], 'sine', 0.12);
    scheduleLoop([
      ['C3',0,4],['F3',4,4],
    ], 'sine', 0.07);
  } else if (mood === 'epic') {
    scheduleLoop([
      ['C4',0,.25],['C4',.25,.25],['G4',.5,.5],['E4',1,.5],
      ['G4',1.5,.25],['A4',1.75,.25],['G4',2,.5],
      ['C4',2.5,.25],['C4',2.75,.25],['A4',3,.5],['G4',3.5,.5],
      ['C5',4,1],['B4',5,.5],['A4',5.5,.5],
      ['G4',6,.25],['A4',6.25,.25],['B4',6.5,.5],['C5',7,1],
    ], 'square', 0.06);
    scheduleLoop([
      ['C3',0,.5],['G3',.5,.5],['C3',1,.5],['G3',1.5,.5],
      ['F3',2,.5],['C3',2.5,.5],['F3',3,.5],['C3',3.5,.5],
      ['A3',4,.5],['E3',4.5,.5],['A3',5,.5],['E3',5.5,.5],
      ['G3',6,.5],['D3',6.5,.5],['G3',7,.5],['D3',7.5,.5],
    ], 'sawtooth', 0.06);
  } else if (mood === 'triumphant') {
    scheduleLoop([
      ['C5',0,.5],['E5',.5,.5],['G5',1,1],['G5',2,.25],['A5',2.25,.25],['G5',2.5,.5],
      ['E5',3,.5],['C5',3.5,.5],['D5',4,1],['E5',5,.5],['F5',5.5,.5],
      ['E5',6,.5],['D5',6.5,.5],['C5',7,1],
    ], 'triangle', 0.1);
    scheduleLoop([
      ['C3',0,2],['G3',2,2],['A3',4,2],['G3',6,2],
    ], 'sine', 0.08);
  } else if (mood === 'adventure') {
    scheduleLoop([
      ['E4',0,.25],['G4',.25,.25],['B4',.5,.25],['E5',.75,.5],
      ['D5',1.5,.25],['C5',1.75,.25],['B4',2,.5],
      ['A4',2.5,.25],['B4',2.75,.25],['C5',3,.5],['A4',3.5,.5],
      ['G4',4,.25],['A4',4.25,.25],['B4',4.5,.5],['G4',5,.5],
      ['F4',5.5,.25],['G4',5.75,.25],['A4',6,.5],['E4',6.5,.25],['G4',6.75,.25],['B4',7,.5],
    ], 'square', 0.06);
    scheduleLoop([
      ['E3',0,1],['B3',1,1],['A3',2,1],['E3',3,1],
      ['G3',4,1],['D3',5,1],['F3',6,1],['G3',7,1],
    ], 'triangle', 0.07);
  } else if (mood === 'terror') {
    scheduleLoop([
      [98,0,2],[92.5,2,2],[87.3,4,2],[82.4,6,2],
    ], 'sawtooth', 0.06);
    scheduleLoop([
      [220,0,.1],[233,1,.1],[220,2,.1],[207,3,.1],[220,4,.1],[246,5,.1],[220,6,.1],[196,7,.1],
    ], 'square', 0.04);
  }
}

let currentMood = '';
function setMood(mood) {
  if (mood === currentMood) return;
  currentMood = mood;
  playMoodMusic(mood);
}

// ===================== PARTICLE SYSTEM =====================
class Particle {
  constructor(x, y, vx, vy, life, color, size) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life; this.color = color; this.size = size || 2;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= dt;
  }
  draw(ctx) {
    const a = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

let particles = [];
function addParticle(x, y, vx, vy, life, color, size) {
  particles.push(new Particle(x, y, vx, vy, life, color, size));
}
function updateParticles(dt) {
  particles = particles.filter(p => { p.update(dt); return p.life > 0; });
}
function drawParticles() {
  particles.forEach(p => p.draw(ctx));
}

// ===================== STAR FIELD =====================
const bgStars = [];
for (let i = 0; i < 200; i++) {
  bgStars.push({
    x: Math.random() * 1280,
    y: Math.random() * 720,
    size: Math.random() * 2 + 0.5,
    twinkleSpeed: Math.random() * 3 + 1,
    twinkleOffset: Math.random() * Math.PI * 2
  });
}

function drawStarfield(time, alpha = 1) {
  bgStars.forEach(s => {
    const bright = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset));
    ctx.globalAlpha = bright * alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ===================== CHARACTER DRAWING =====================

function drawMario(x, y, scale = 1, facing = 1, frame = 0) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale * facing, scale);
  const s = 1;

  // Shoes
  ctx.fillStyle = '#5C3317';
  ctx.beginPath();
  ctx.ellipse(-8 * s, 0, 7 * s, 4 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8 * s, 0, 7 * s, 4 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs (blue overalls)
  ctx.fillStyle = '#1a3ecc';
  ctx.fillRect(-10 * s, -20 * s, 8 * s, 20 * s);
  ctx.fillRect(2 * s, -20 * s, 8 * s, 20 * s);

  // Body (overalls)
  ctx.fillStyle = '#1a3ecc';
  ctx.beginPath();
  ctx.roundRect(-12 * s, -38 * s, 24 * s, 20 * s, 3 * s);
  ctx.fill();

  // Shirt (red)
  ctx.fillStyle = '#E52521';
  ctx.fillRect(-10 * s, -36 * s, 20 * s, 10 * s);

  // Arms
  const armBob = Math.sin(frame * 6) * 3;
  ctx.fillStyle = '#E52521';
  ctx.beginPath();
  ctx.ellipse(-15 * s, -30 * s + armBob, 5 * s, 8 * s, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(15 * s, -30 * s - armBob, 5 * s, 8 * s, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // Gloves
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-16 * s, -22 * s + armBob, 4 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(16 * s, -22 * s - armBob, 4 * s, 0, Math.PI * 2);
  ctx.fill();

  // Overall straps
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(-5 * s, -28 * s, 2 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(5 * s, -28 * s, 2 * s, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#FDBCB4';
  ctx.beginPath();
  ctx.arc(0, -48 * s, 12 * s, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.beginPath();
  ctx.arc(-12 * s, -48 * s, 3 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(12 * s, -48 * s, 3 * s, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-5 * s, -50 * s, 4 * s, 5 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(5 * s, -50 * s, 4 * s, 5 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#2244aa';
  ctx.beginPath();
  ctx.arc(-4 * s, -49 * s, 2.5 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6 * s, -49 * s, 2.5 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-4 * s, -49 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6 * s, -49 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#D4774B';
  ctx.beginPath();
  ctx.ellipse(2 * s, -45 * s, 5 * s, 3.5 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mustache
  ctx.fillStyle = '#3E1F00';
  ctx.beginPath();
  ctx.ellipse(-4 * s, -42 * s, 6 * s, 2.5 * s, -0.15, 0, Math.PI);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(6 * s, -42 * s, 6 * s, 2.5 * s, 0.15, 0, Math.PI);
  ctx.fill();

  // Cap
  ctx.fillStyle = '#E52521';
  ctx.beginPath();
  ctx.arc(0, -52 * s, 13 * s, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-13 * s, -52 * s, 26 * s, 3 * s);

  // Cap brim
  ctx.fillStyle = '#E52521';
  ctx.beginPath();
  ctx.ellipse(8 * s, -51 * s, 10 * s, 3 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // M logo on cap
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(2 * s, -56 * s, 5 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#E52521';
  ctx.font = `bold ${9 * s}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('M', 2 * s, -55 * s);

  ctx.restore();
}

function drawLuigi(x, y, scale = 1, facing = 1, frame = 0) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale * facing, scale);
  const s = 1;

  // Shoes
  ctx.fillStyle = '#5C3317';
  ctx.beginPath();
  ctx.ellipse(-8 * s, 0, 7 * s, 4 * s, 0, 0, Math.PI * 2);

  ctx.beginPath();
  ctx.ellipse(8 * s, 0, 7 * s, 4 * s, 0, 0, Math.PI * 2);

  // Legs (darker blue)
  ctx.fillStyle = '#112299';
  ctx.fillRect(-9 * s, -24 * s, 7 * s, 24 * s);

  // Body
  ctx.fillStyle = '#112299';
  ctx.beginPath();
  ctx.roundRect(-11 * s, -42 * s, 22 * s, 20 * s, 3 * s);
  ctx.fill();

  // Shirt (green)
  ctx.fillStyle = '#39B54A';
  ctx.fillRect(-9 * s, -40 * s, 18 * s, 10 * s);

  // Arms
  const armBob = Math.sin(frame * 6) * 3;

  ctx.ellipse(-14 * s, -34 * s + armBob, 5 * s, 8 * s, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(14 * s, -34 * s - armBob, 5 * s, 8 * s, -0.2, 0, Math.PI * 2);

  // Gloves
  ctx.fillStyle = '#fff';
  ctx.beginPath();

  ctx.fill();
  ctx.beginPath();
  ctx.arc(15 * s, -26 * s - armBob, 4 * s, 0, Math.PI * 2);
  ctx.fill();

  // Head (slightly taller)
  ctx.fillStyle = '#FDBCB4';
  ctx.beginPath();
  ctx.ellipse(0, -52 * s, 11 * s, 12 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-4 * s, -54 * s, 3.5 * s, 4.5 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(4 * s, -54 * s, 3.5 * s, 4.5 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-3 * s, -53 * s, 2 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(5 * s, -53 * s, 2 * s, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#D4774B';
  ctx.beginPath();
  ctx.ellipse(1 * s, -49 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Thinner mustache
  ctx.fillStyle = '#3E1F00';

function drawBowser(x, y, scale = 1, frame = 0) {
  ctx.save();

  // Shell
  ctx.fillStyle = '#2D8B2D';

  ctx.ellipse(0, -38, 22, 18, 0, 0, Math.PI * 2);

  ctx.beginPath();
  ctx.ellipse(22, -30 - armBob, 7, 10, -0.3, 0, Math.PI * 2);

  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, -54, 1.5, 0, Math.PI * 2);

function drawStar(cx, cy, r, points) {
  points = points || 5;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (i * Math.PI / points) - Math.PI / 2;
    const radius = i % 2 === 0 ? r : r * 0.45;
    const px = cx + Math.cos(angle) * radius;
    const py = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
}

function drawPowerStar(x, y, scale = 1, frame = 0) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(frame * 1.5);
  ctx.scale(scale, scale);

  // Glow
  ctx.globalAlpha = 0.4 + Math.sin(frame * 5) * 0.2;
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#FFD700';
  drawStar(0, 0, 15, 5);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-4, -2, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(4, -2, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Sparkles
  for (let i = 0; i < 4; i++) {
    const angle = frame * 2 + i * Math.PI / 2;
    const dist = 20 * scale + Math.sin(frame * 3 + i) * 5;
    const sx = x + Math.cos(angle) * dist;
    const sy = y + Math.sin(angle) * dist;
    ctx.globalAlpha = 0.6 + Math.sin(frame * 4 + i) * 0.3;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(sx, sy, 2 * scale, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ===================== UTILITY DRAWING =====================

function drawText(text, x, y, size, color, align, stroke) {
  ctx.font = `bold ${size}px 'Segoe UI', Arial, sans-serif`;
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  if (stroke) {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = size / 6;
    ctx.lineJoin = 'round';
    ctx.strokeText(text, x, y);
  }
  ctx.fillStyle = color || '#fff';
  ctx.fillText(text, x, y);
}

function drawDialogue(speaker, text, speakerColor, time) {
  const alpha = Math.min(1, time * 3);
  ctx.globalAlpha = alpha;

  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.beginPath();
  ctx.roundRect(80, 610, 1120, 80, 8);
  ctx.fill();

  // Speaker
  if (speaker) {
    ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = speakerColor || '#FFD700';
    ctx.fillText(speaker, 100, 635);
  }

  // Text
  ctx.font = '16px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';

  // Word wrap
  const maxW = 1060;
  const words = text.split(' ');
  let line = '';
  let ly = speaker ? 660 : 650;
  words.forEach(w => {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > maxW) {
      ctx.fillText(line.trim(), 100, ly);
      line = w + ' ';
      ly += 22;
    } else {
      line = test;
    }
  });
  ctx.fillText(line.trim(), 100, ly);
  ctx.globalAlpha = 1;
}

function drawHills(baseY, color1, color2, scroll, count, height) {
  for (let i = 0; i < count + 2; i++) {
    const hx = (i * (1400 / count) + scroll) % (1400 + 200) - 200;
    ctx.fillStyle = i % 2 === 0 ? color1 : color2;
    ctx.beginPath();
    ctx.arc(hx, baseY, height || 120, Math.PI, 0);
    ctx.fill();
  }
}

function drawCastle(x, y, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Main body
  ctx.fillStyle = '#F5DEB3';
  ctx.fillRect(-40, -60, 80, 60);

  // Door
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.arc(0, -10, 12, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-12, -10, 24, 10);

  // Windows
  ctx.fillStyle = '#4488FF';
  ctx.fillRect(-30, -45, 12, 15);
  ctx.fillRect(18, -45, 12, 15);

  // Towers
  ctx.fillStyle = '#DDD';
  ctx.fillRect(-50, -90, 20, 50);
  ctx.fillRect(30, -90, 20, 50);

  // Tower roofs
  ctx.fillStyle = '#E52521';
  ctx.beginPath();
  ctx.moveTo(-55, -90);
  ctx.lineTo(-40, -110);
  ctx.lineTo(-25, -90);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(25, -90);
  ctx.lineTo(40, -110);
  ctx.lineTo(55, -90);
  ctx.closePath();
  ctx.fill();

  // Center tower
  ctx.fillStyle = '#F5DEB3';
  ctx.fillRect(-15, -100, 30, 40);
  ctx.fillStyle = '#E52521';
  ctx.beginPath();
  ctx.moveTo(-20, -100);
  ctx.lineTo(0, -120);
  ctx.lineTo(20, -100);
  ctx.closePath();
  ctx.fill();

  // Flag
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -120);
  ctx.lineTo(0, -140);
  ctx.stroke();
  ctx.fillStyle = '#FFB7D5';
  ctx.beginPath();
  ctx.moveTo(0, -140);
  ctx.lineTo(15, -135);
  ctx.lineTo(0, -130);
  ctx.closePath();
  ctx.fill();

  // Battlements
  for (let i = -2; i <= 2; i++) {
    ctx.fillStyle = '#DDD';
    ctx.fillRect(i * 15 - 5, -68, 10, 8);
  }

  ctx.restore();
}

function drawAirship(x, y, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Hull
  ctx.fillStyle = '#4a3728';
  ctx.beginPath();
  ctx.ellipse(0, 0, 60, 20, 0, 0, Math.PI * 2);
  ctx.fill();

  // Deck
  ctx.fillStyle = '#5a4738';
  ctx.fillRect(-50, -25, 100, 10);

  // Bowser flag
  ctx.fillStyle = '#333';
  ctx.fillRect(0, -50, 3, 30);
  ctx.fillStyle = '#222';
  ctx.fillRect(3, -50, 20, 14);
  // Skull on flag
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(13, -45, 4, 0, Math.PI * 2);
  ctx.fill();

  // Cannons
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(-35, -10, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(35, -10, 8, 0, Math.PI * 2);
  ctx.fill();

  // Propeller
  ctx.fillStyle = '#666';
  ctx.save();
  ctx.translate(-55, 0);
  ctx.rotate(performance.now() / 100);
  ctx.fillRect(-2, -12, 4, 24);
  ctx.restore();

  ctx.restore();
}

function drawSmallPlanet(x, y, radius, color, hasTree) {
  ctx.save();
  ctx.translate(x, y);

  // Planet body
  const grad = ctx.createRadialGradient(-radius * 0.3, -radius * 0.3, 0, 0, 0, radius);
  grad.addColorStop(0, color);
  grad.addColorStop(1, darkenColor(color, 40));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.fill();

  if (hasTree) {
    // Tree trunk
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(-3, -radius - 20, 6, 20);
    // Tree top
    ctx.fillStyle = '#228B22';
    ctx.beginPath();
    ctx.arc(0, -radius - 25, 12, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function darkenColor(hex, amount) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, r - amount);
  g = Math.max(0, g - amount);
  b = Math.max(0, b - amount);
  return `rgb(${r},${g},${b})`;
}

function drawNebula(x, y, w, h, color, time) {
  ctx.globalAlpha = 0.15 + Math.sin(time * 0.5) * 0.05;
  const grad = ctx.createRadialGradient(x, y, 0, x, y, w);
  grad.addColorStop(0, color);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawCometObservatory(x, y, scale, time) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Glow
  ctx.globalAlpha = 0.2 + Math.sin(time * 2) * 0.05;
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 100);
  glow.addColorStop(0, '#47C8C8');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, 100, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Main dome
  ctx.fillStyle = '#1a4a6a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 60, 30, 0, 0, Math.PI * 2);
  ctx.fill();

  // Upper dome
  ctx.fillStyle = '#2a6a8a';
  ctx.beginPath();
  ctx.ellipse(0, -10, 40, 25, 0, Math.PI, 0);
  ctx.fill();

  // Beacon
  ctx.fillStyle = '#47C8C8';
  ctx.beginPath();
  ctx.arc(0, -30, 8, 0, Math.PI * 2);
  ctx.fill();
  // Beacon glow
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.arc(0, -30, 15, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Wings/platforms
  ctx.fillStyle = '#1a3a5a';
  ctx.beginPath();
  ctx.moveTo(-60, 5);
  ctx.lineTo(-90, 15);
  ctx.lineTo(-80, 0);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(60, 5);
  ctx.lineTo(90, 15);
  ctx.lineTo(80, 0);
  ctx.closePath();
  ctx.fill();

  // Windows
  ctx.fillStyle = '#FFD700';
  ctx.globalAlpha = 0.7;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.arc(i * 15, -5, 4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ===================== SCENE RENDERERS =====================

function getSceneAt(time) {
  let elapsed = 0;
  for (let i = 0; i < SCENE_DEFS.length; i++) {
    if (time < elapsed + SCENE_DEFS[i].duration) {
      return { index: i, localTime: time - elapsed, duration: SCENE_DEFS[i].duration, name: SCENE_DEFS[i].name };
    }
    elapsed += SCENE_DEFS[i].duration;
  }
  return { index: SCENE_DEFS.length - 1, localTime: SCENE_DEFS[SCENE_DEFS.length - 1].duration, duration: SCENE_DEFS[SCENE_DEFS.length - 1].duration, name: SCENE_DEFS[SCENE_DEFS.length - 1].name };
}

function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

function renderScene(sceneIndex, t, dur) {
  // t = local time in scene, dur = scene duration
  const ft = movieTime; // frame time for animations

  switch(sceneIndex) {

  // ============ SCENE 0: TITLE SEQUENCE ============
  case 0: {
    setMood('title');
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 1280, 720);

    // Stars twinkle in
    const starReveal = Math.min(1, t / 5);
    drawStarfield(ft, starReveal);

    // "STREAMFLIX PRESENTS"
    if (t > 2 && t < 7) {
      const alpha = t < 3 ? (t - 2) : t > 6 ? (7 - t) : 1;
      ctx.globalAlpha = alpha;
      drawText('STREAMFLIX PRESENTS', 640, 340, 32, '#E63946', 'center', true);
      ctx.globalAlpha = 1;
    }

    // Title zoom
    if (t > 7) {
      const titleT = Math.min(1, (t - 7) / 2.5);
      const scale = 0.3 + titleT * 0.7;
      const alpha = Math.min(1, (t - 7) / 1.5);
      ctx.globalAlpha = alpha;
      ctx.save();
      ctx.translate(640, 330);
      ctx.scale(scale, scale);

      // Golden glow
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 30;
      drawText('SUPER MARIO', 0, -30, 56, '#FFD700', 'center', true);
      drawText('GALAXY', 0, 30, 72, '#FFD700', 'center', true);
      ctx.shadowBlur = 0;

      ctx.restore();
      ctx.globalAlpha = 1;

      // Star effects radiating
      if (t > 8.5) {
        const rays = 12;
        for (let i = 0; i < rays; i++) {
          const angle = (i / rays) * Math.PI * 2 + ft * 0.3;
          const dist = 100 + (t - 8.5) * 80;
          const ex = 640 + Math.cos(angle) * dist;
          const ey = 330 + Math.sin(angle) * dist;
          ctx.globalAlpha = Math.max(0, 1 - (t - 8.5) / 4);
          ctx.fillStyle = '#FFD700';
          ctx.beginPath();
          ctx.arc(ex, ey, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // Orbiting Luma
      if (t > 9) {
        const lumaAngle = (t - 9) * 1.2;
        const lx = 640 + Math.cos(lumaAngle) * 180;
        const ly = 330 + Math.sin(lumaAngle) * 80;
        drawLuma(lx, ly, 0.8, '#FFE566', ft);
      }
    }

    // Subtitle
    if (t > 12) {
      ctx.globalAlpha = Math.min(1, (t - 12) / 1.5);
      drawText('A StreamFlix Original', 640, 440, 20, '#aaa', 'center', false);
      ctx.globalAlpha = 1;
    }
    break;
  }

  // ============ SCENE 1: THE STAR FESTIVAL ============
  case 1: {
    setMood('festival');
    // Night sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, 720);
    skyGrad.addColorStop(0, '#0a0a2e');
    skyGrad.addColorStop(0.6, '#1a1a4e');
    skyGrad.addColorStop(1, '#2a2a3e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, 1280, 720);

    drawStarfield(ft, 1);

    // Star bits raining
    for (let i = 0; i < 40; i++) {
      const bx = (i * 37 + ft * 30 * (1 + (i % 3) * 0.3)) % 1400 - 60;
      const by = (i * 53 + ft * 50 * (1 + (i % 4) * 0.2)) % 800 - 40;
      const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bd6'];
      ctx.fillStyle = colors[i % 5];
      ctx.globalAlpha = 0.7 + Math.sin(ft * 3 + i) * 0.3;
      ctx.beginPath();
      ctx.arc(bx, by, 3 + Math.sin(ft * 5 + i) * 1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Hills
    drawHills(600, '#1a5c2a', '#1a6c3a', -ft * 10, 6, 140);
    drawHills(650, '#0d4a1d', '#0d5a2d', -ft * 5, 5, 100);

    // Ground
    ctx.fillStyle = '#1a4a25';
    ctx.fillRect(0, 620, 1280, 100);

    // Grass tufts
    ctx.fillStyle = '#2a6a35';
    for (let i = 0; i < 30; i++) {
      const gx = i * 44 + 10;
      ctx.beginPath();
      ctx.moveTo(gx, 620);
      ctx.quadraticCurveTo(gx + 5, 605, gx + 10, 620);
      ctx.fill();
    }

    // Castle in background
    drawCastle(950, 580, 1.2);

    // Toads celebrating
    const toadBounce1 = Math.abs(Math.sin(ft * 4)) * 10;
    const toadBounce2 = Math.abs(Math.sin(ft * 4 + 1)) * 10;
    const toadBounce3 = Math.abs(Math.sin(ft * 4 + 2)) * 10;
    drawToad(500, 618 - toadBounce1, 0.9, '#E52521', ft);
    drawToad(600, 618 - toadBounce2, 0.8, '#4488FF', ft);
    drawToad(700, 618 - toadBounce3, 0.9, '#39B54A', ft);

    // Mario walks in from left
    const marioX = lerp(-40, 350, t / 8);
    drawMario(marioX, 618, 1, 1, ft);

    // Dialogue
    if (t < 7) {
      drawDialogue('Narrator', 'Every hundred years, a great comet passes over the Mushroom Kingdom...', '#FFD700', t);
    } else {
      drawDialogue('Narrator', '...showering the land with magical Star Bits. They call it the Star Festival.', '#FFD700', t - 7);
    }
    break;
  }

  // ============ SCENE 2: PEACH'S LETTER ============
  case 2: {
    setMood('happy');
    // Background
    ctx.fillStyle = '#1a1a3e';
    ctx.fillRect(0, 0, 1280, 720);
    drawStarfield(ft, 0.5);

    // Envelope
    const envAlpha = Math.min(1, t / 1);
    ctx.globalAlpha = envAlpha;
    ctx.save();
    ctx.translate(640, 280);

    // Envelope shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.roundRect(-152, -92, 304, 188, 8);
    ctx.fill();

    // Envelope body
    ctx.fillStyle = '#FFB7D5';
    ctx.beginPath();
    ctx.roundRect(-150, -90, 300, 185, 8);
    ctx.fill();

    // Envelope flap
    ctx.fillStyle = '#FF8EC4';
    ctx.beginPath();
    ctx.moveTo(-150, -90);
    ctx.lineTo(0, 20);
    ctx.lineTo(150, -90);
    ctx.closePath();
    ctx.fill();

    // Heart seal
    ctx.fillStyle = '#E52521';
    ctx.beginPath();
    ctx.arc(-8, -30, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(8, -30, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-18, -26);
    ctx.lineTo(0, -8);
    ctx.lineTo(18, -26);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
    ctx.globalAlpha = 1;

    // Letter text appears
    if (t > 2) {
      const lineDelay = 1.5;
      const lines = [
        'Dear Mario,',
        "I'll be waiting for you at the castle.",
        'I have something very special for you!',
        '              -Princess Peach'
      ];
      ctx.font = 'italic 22px Georgia, serif';
      ctx.fillStyle = '#FFD700';
      ctx.textAlign = 'center';
      lines.forEach((line, i) => {
        const lt = t - 2 - i * lineDelay;
        if (lt > 0) {
          ctx.globalAlpha = Math.min(1, lt / 0.5);
          ctx.fillText(line, 640, 440 + i * 32);
        }
      });
      ctx.globalAlpha = 1;
    }

    // Mario runs right
    if (t > 8) {
      const mx = lerp(300, 1350, (t - 8) / 4);
      drawMario(mx, 660, 1, 1, ft);
    }
    break;
  }

  // ============ SCENE 3: BOWSER'S ATTACK ============
  case 3: {
    setMood('dark');
    // Sky turns red
    const redProgress = Math.min(1, t / 5);
    const skyGrad = ctx.createLinearGradient(0, 0, 0, 720);
    skyGrad.addColorStop(0, lerpColor('#0a0a2e', '#3a0a0a', redProgress));
    skyGrad.addColorStop(0.5, lerpColor('#1a1a4e', '#5a1a0a', redProgress));
    skyGrad.addColorStop(1, '#2a1a0e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, 1280, 720);

    drawStarfield(ft, 1 - redProgress * 0.7);

    // Dark clouds rolling in
    ctx.fillStyle = 'rgba(30,10,10,0.6)';
    for (let i = 0; i < 8; i++) {
      const cx = 1300 - t * 80 + i * 200;
      const cy = 100 + Math.sin(i * 2) * 50;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 150 + Math.sin(ft + i) * 20, 60, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Ground
    drawHills(600, '#2a1a1a', '#3a2a1a', 0, 5, 100);
    ctx.fillStyle = '#1a1a15';
    ctx.fillRect(0, 600, 1280, 120);

    // Castle
    drawCastle(640, 560, 1.5);

    // Airships
    if (t > 2) {
      const shipX = lerp(1400, 400, (t - 2) / 5);
      drawAirship(shipX, 200, 1);
      drawAirship(shipX + 200, 150, 0.7);
      drawAirship(shipX + 350, 250, 0.6);
    }

    // Lightning
    if (Math.floor(t * 3) % 5 === 0) {
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 3;
      ctx.beginPath();
      const lx = 300 + Math.sin(t * 7) * 400;
      ctx.moveTo(lx, 0);
      for (let ly = 0; ly < 600; ly += 30) {
        ctx.lineTo(lx + (Math.random() - 0.5) * 40, ly);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Bowser appears
    if (t > 6) {
      const bowserX = lerp(1400, 640, (t - 6) / 3);
      drawBowser(bowserX, 200, 1.5, ft);
    }

    // Explosions
    if (t > 3 && Math.random() < 0.15) {
      const ex = Math.random() * 1280;
      const ey = 500 + Math.random() * 100;
      for (let i = 0; i < 5; i++) {
        addParticle(ex, ey, (Math.random() - 0.5) * 200, -Math.random() * 150, 0.8, '#FF6600', 4);
      }
    }
    drawParticles();

    // Dialogue
    if (t > 6 && t < 10.5) {
      drawDialogue('Bowser', 'Bwahahaha! The Power Stars will be MINE!', '#FF6600', t - 6);
    } else if (t >= 10.5) {
      drawDialogue('Bowser', "And I'm taking the princess too!", '#FF6600', t - 10.5);
    }
    break;
  }

  // ============ SCENE 4: INTO SPACE ============
  case 4: {
    setMood('terror');
    // Dark sky
    const skyGrad = ctx.createLinearGradient(0, 0, 0, 720);
    skyGrad.addColorStop(0, '#050520');
    skyGrad.addColorStop(1, '#1a0a0a');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, 1280, 720);
    drawStarfield(ft, 1);

    // UFO beam
    ctx.globalAlpha = 0.3 + Math.sin(ft * 5) * 0.1;
    ctx.fillStyle = '#7B68EE';
    ctx.beginPath();
    ctx.moveTo(600, 100);
    ctx.lineTo(500, 500);
    ctx.lineTo(780, 500);
    ctx.lineTo(680, 100);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;

    // Castle rising
    const castleY = lerp(500, -200, t / 8);
    drawCastle(640, castleY, 1.2);

    // Peach on balcony
    if (castleY > -100) {
      drawPeach(640, castleY - 100, 0.6, ft);
    }

    // Mario trying to hold on then falling
    if (t < 5) {
      const marioY = castleY + 30;
      drawMario(680, marioY, 0.8, 1, ft);
    } else if (t < 8) {
      // Magikoopa blast
      if (t < 6) {
        ctx.strokeStyle = '#9B59B6';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(800, 200);
        ctx.lineTo(680, castleY + 30);
        ctx.stroke();

        ctx.fillStyle = '#9B59B6';
        for (let i = 0; i < 8; i++) {
          const px = 680 + (Math.random() - 0.5) * 40;
          const py = castleY + 30 + (Math.random() - 0.5) * 40;
          ctx.beginPath();
          ctx.arc(px, py, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Mario tumbling
      const fallT = (t - 5) / 3;
      const marioFallX = 680 + fallT * 100;
      const marioFallY = lerp(castleY + 30, 400, fallT);
      ctx.save();
      ctx.translate(marioFallX, marioFallY);
      ctx.rotate(ft * 5);
      drawMario(0, 0, 0.8 - fallT * 0.3, 1, ft);
      ctx.restore();
    }

    // Mario getting smaller in starfield
    if (t > 8) {
      const shrinkT = (t - 8) / 5;
      const marioScale = Math.max(0.05, 0.5 - shrinkT * 0.5);
      ctx.save();
      ctx.translate(640 + Math.sin(ft * 3) * 20, 400 + Math.cos(ft * 2) * 15);
      ctx.rotate(ft * 4);
      drawMario(0, 0, marioScale, 1, ft);
      ctx.restore();
    }

    // Fade to black at end
    if (t > 12) {
      ctx.globalAlpha = (t - 12) / 3;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 1280, 720);
      ctx.globalAlpha = 1;
    }
    break;
  }

  // ============ SCENE 5: GATEWAY GALAXY ============
  case 5: {
    setMood('ethereal');
    // Deep space background
    ctx.fillStyle = '#050520';
    ctx.fillRect(0, 0, 1280, 720);
    drawStarfield(ft, 1);
    drawNebula(300, 200, 200, 150, '#4a0080', ft);
    drawNebula(900, 400, 180, 120, '#003080', ft);

    // Tiny planet
    drawSmallPlanet(640, 480, 120, '#3a8a3a', true);

    // Flowers on planet
    const flowerColors = ['#ff6b6b', '#ffd93d', '#ff6bd6'];
    for (let i = 0; i < 5; i++) {
      const angle = -Math.PI/2 + (i - 2) * 0.3;
      const fx = 640 + Math.cos(angle) * 110;
      const fy = 480 + Math.sin(angle) * 110;
      ctx.fillStyle = flowerColors[i % 3];
      ctx.beginPath();
      ctx.arc(fx, fy, 4, 0, Math.PI * 2);

          ctx.beginPath();
          ctx.moveTo(lx, ly);
          ctx.lineTo(lx + Math.cos(startAngle) * 20, ly + Math.sin(startAngle) * 15);
          ctx.lineWidth = 2;
          ctx.strokeStyle = colors[i % 6];
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
    }

    // Yellow Luma says goodbye
    if (t > 3 && t < 8) {
      const lumaScale = Math.max(0.3, 1 - (t - 5) * 0.2);
      drawLuma(500, 400, lumaScale, '#FFE566', ft);
      drawMario(350, 500, 0.9, 1, ft);
    }

    // MASSIVE explosion of light
    if (t > 8) {
      const expT = (t - 8) / 4;
      const expSize = expT * 800;
      const expGrad = ctx.createRadialGradient(640, 360, 0, 640, 360, expSize);
      expGrad.addColorStop(0, `rgba(255,255,255,${Math.max(0, 1 - expT * 0.5)})`);
      expGrad.addColorStop(0.3, `rgba(255,215,0,${Math.max(0, 0.8 - expT * 0.4)})`);
      expGrad.addColorStop(0.6, `rgba(255,100,200,${Math.max(0, 0.5 - expT * 0.3)})`);
      expGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = expGrad;
      ctx.beginPath();
      ctx.arc(640, 360, expSize, 0, Math.PI * 2);
      ctx.fill();

      // Color cascade - new stars being born
      if (t > 10) {
        for (let i = 0; i < 60; i++) {
          const angle = i * 0.21;
          const dist = (t - 10) * 100 + i * 10;
          const sx = 640 + Math.cos(angle) * dist;
          const sy = 360 + Math.sin(angle) * dist * 0.7;
          if (sx > 0 && sx < 1280 && sy > 0 && sy < 720) {
            const colors = ['#FFE566','#66CCFF','#FF66AA','#66FF99','#FF9966','#CC99FF','#fff'];
            ctx.fillStyle = colors[i % 7];
            ctx.globalAlpha = Math.max(0, 1 - dist / 800);
            ctx.beginPath();
            ctx.arc(sx, sy, 3, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.globalAlpha = 1;
      }
    }

    // Dialogue
    if (t > 4 && t < 8) {
      drawDialogue('Luma', "Don't be sad. We'll meet again... as a new galaxy.", '#FFE566', t - 4);
    }

    // White overlay at start
    if (whiteAlpha > 0) {
      ctx.globalAlpha = whiteAlpha;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, 1280, 720);
      ctx.globalAlpha = 1;
    }
    break;
  }

  // ============ SCENE 19: ENDING + CREDITS ============
  case 19: {
    setMood('triumphant');

    if (t < 10) {
      // Mushroom Kingdom - beautiful day
      const skyGrad = ctx.createLinearGradient(0, 0, 0, 720);
      skyGrad.addColorStop(0, '#66BBFF');
      skyGrad.addColorStop(0.6, '#AADDFF');
      skyGrad.addColorStop(1, '#CCEDFF');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, 1280, 720);

      // Sun
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(200, 120, 60, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(200, 120, 80, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Clouds
      for (let i = 0; i < 4; i++) {
        const cx = (i * 350 + ft * 10) % 1500 - 100;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(cx, 150 + i * 30, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + 35, 155 + i * 30, 35, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx - 30, 155 + i * 30, 30, 0, Math.PI * 2);
        ctx.fill();
      }

      // Hills
      drawHills(520, '#228B22', '#2EA043', -ft * 5, 6, 130);

      // Ground
      ctx.fillStyle = '#2EA043';
      ctx.fillRect(0, 540, 1280, 180);

      // Beautiful new galaxy in sky
      if (t > 3) {
        ctx.globalAlpha = Math.min(0.8, (t - 3) / 3);
        const galaxyGrad = ctx.createRadialGradient(900, 100, 0, 900, 100, 80);
        galaxyGrad.addColorStop(0, '#fff');
        galaxyGrad.addColorStop(0.3, '#FFD700');
        galaxyGrad.addColorStop(0.6, '#9B59B6');
        galaxyGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = galaxyGrad;
        ctx.beginPath();
        ctx.ellipse(900, 100, 80, 40, 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Mario wakes up
      if (t < 2) {
        // Lying down
        ctx.save();
        ctx.translate(500, 535);
        ctx.fillStyle = '#1a3ecc';
        ctx.fillRect(-25, -5, 50, 10);
        ctx.fillStyle = '#E52521';
        ctx.fillRect(-15, -10, 20, 8);
        ctx.fillStyle = '#FDBCB4';
        ctx.beginPath();
        ctx.arc(-22, -5, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else {
        drawMario(500, 538, 1, 1, ft);
      }

      // Peach smiling
      if (t > 2) {
        drawPeach(600, 538, 1, ft);
      }

      // Toads cheering
      if (t > 3) {
        for (let i = 0; i < 4; i++) {
          const tb = Math.abs(Math.sin(ft * 4 + i)) * 10;
          drawToad(300 + i * 60, 538 - tb, 0.7, ['#E52521','#4488FF','#39B54A','#FFD700'][i], ft);
        }
      }

      // Rosalina in sky
      if (t > 5) {
        ctx.globalAlpha = Math.min(0.7, (t - 5) / 2);
        drawRosalina(800, 200, 0.8, ft);
        // Waving hand
        ctx.globalAlpha = 1;
      }

      // Mario waves
      if (t > 7) {
        // (Mario is already drawn, just add the wave effect by redrawing with arm up)
      }

      // Dialogue
      if (t > 6 && t < 10) {
        drawDialogue('Rosalina', 'Thank you, Mario. The story of the universe... begins again.', '#47C8C8', t - 6);
      }
    } else {
      // Credits
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 1280, 720);
      drawStarfield(ft, 1);

      // "THE END" in gold
      if (t < 14) {
        const endAlpha = Math.min(1, (t - 10) / 2);
        ctx.globalAlpha = endAlpha;
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 20;
        drawText('THE END', 640, 250, 64, '#FFD700', 'center', true);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }

      // Credits text
      if (t > 13) {
        const credY = 720 - (t - 13) * 50;
        ctx.fillStyle = '#fff';
        ctx.font = '24px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'center';

        const credits = [
          'A StreamFlix Original',
          '',
          'Created by Petru',
          '',
          'Based on Super Mario Galaxy',
          'by Nintendo',
          '',
          'Animated with HTML5 Canvas',
          'and Web Audio API',
          '',
          'Thank you for watching!',
        ];

        credits.forEach((line, i) => {
          const cy = credY + i * 40;
          if (cy > 100 && cy < 650) {
            ctx.globalAlpha = Math.min(1, (cy - 100) / 50, (650 - cy) / 50);
            ctx.fillText(line, 640, cy);
          }
        });
        ctx.globalAlpha = 1;
      }

      // Floating Lumas around credits
      for (let i = 0; i < 8; i++) {
        const lx = 200 + Math.sin(ft * 0.5 + i * 1.5) * 400 + i * 80;
        const ly = 300 + Math.cos(ft * 0.7 + i) * 150;
        const colors = ['#FFE566','#66CCFF','#FF66AA','#66FF99','#FF9966','#CC99FF','#fff','#FFD700'];
        drawLuma(lx, ly, 0.4, colors[i], ft);
      }
    }
    break;
  }

  } // end switch
}

// ===================== HELPER CHARACTERS =====================

function drawDinoPiranha(x, y, scale, frame) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Tail with bulb
  ctx.strokeStyle = '#228B22';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(-20, -20);
  ctx.quadraticCurveTo(-60, -40, -80, -20);
  ctx.stroke();
  // Tail bulb
  ctx.fillStyle = '#9B59B6';
  ctx.beginPath();
  ctx.arc(-80, -20, 12, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#228B22';
  ctx.beginPath();
  ctx.ellipse(0, -30, 30, 25, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#AADD77';
  ctx.beginPath();
  ctx.ellipse(5, -25, 18, 15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Neck
  ctx.fillStyle = '#228B22';
  ctx.fillRect(15, -65, 12, 35);

  // Head (piranha)
  ctx.fillStyle = '#CC3333';
  ctx.beginPath();
  ctx.ellipse(20, -75, 25, 18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.fillStyle = '#660000';
  ctx.beginPath();
  ctx.ellipse(30, -72, 15, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Teeth
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(20 + i * 7, -72);
    ctx.lineTo(23 + i * 7, -65);
    ctx.lineTo(26 + i * 7, -72);
    ctx.closePath();
    ctx.fill();
  }

  // Eyes
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(15, -82, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(16, -81, 3, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.fillStyle = '#228B22';
  ctx.fillRect(-15, -10, 8, 15);
  ctx.fillRect(10, -10, 8, 15);

  ctx.restore();
}

function drawBeeMario(x, y, scale, frame) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Wings
  ctx.fillStyle = 'rgba(200,230,255,0.5)';
  const wingFlap = Math.sin(frame * 15) * 0.3;
  ctx.save();
  ctx.rotate(-0.5 + wingFlap);
  ctx.beginPath();
  ctx.ellipse(-15, -15, 15, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.rotate(0.5 - wingFlap);
  ctx.beginPath();
  ctx.ellipse(15, -15, 15, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Body (bee stripes)
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(0, 0, 15, 20, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#3a2500';
  ctx.fillRect(-15, -5, 30, 5);
  ctx.fillRect(-15, 5, 30, 5);

  // Head (Mario)
  ctx.fillStyle = '#FDBCB4';
  ctx.beginPath();
  ctx.arc(0, -25, 10, 0, Math.PI * 2);
  ctx.fill();

  // Cap
  ctx.fillStyle = '#E52521';
  ctx.beginPath();
  ctx.arc(0, -29, 10, Math.PI, 0);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-3, -26, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(3, -26, 2, 0, Math.PI * 2);
  ctx.fill();

  // Mustache
  ctx.fillStyle = '#3E1F00';
  ctx.beginPath();
  ctx.ellipse(0, -21, 6, 2, 0, 0, Math.PI);
  ctx.fill();

  ctx.restore();
}

function drawBeeMushroom(x, y, frame) {
  ctx.save();
  ctx.translate(x, y + Math.sin(frame * 3) * 5);

  // Stem
  ctx.fillStyle = '#F5DEB3';
  ctx.fillRect(-6, -5, 12, 12);

  // Cap
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(0, -8, 16, 10, 0, Math.PI, 0);
  ctx.fill();
  // Stripes
  ctx.fillStyle = '#3a2500';
  ctx.fillRect(-12, -12, 24, 3);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-3, -2, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(3, -2, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawQueenBee(x, y, scale, frame) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Large body
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(0, 0, 40, 55, 0, 0, Math.PI * 2);
  ctx.fill();
  // Stripes
  ctx.fillStyle = '#8B6914';
  for (let i = -2; i <= 2; i++) {
    ctx.fillRect(-40, i * 15 - 3, 80, 6);
  }

  // Wings
  ctx.fillStyle = 'rgba(200,230,255,0.4)';
  const wf = Math.sin(frame * 8) * 0.2;
  ctx.save();
  ctx.rotate(-0.6 + wf);
  ctx.beginPath();
  ctx.ellipse(-30, -20, 30, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.rotate(0.6 - wf);
  ctx.beginPath();
  ctx.ellipse(30, -20, 30, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Crown
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(-10, -55);
  ctx.lineTo(-12, -65);
  ctx.lineTo(-6, -60);
  ctx.lineTo(0, -68);
  ctx.lineTo(6, -60);
  ctx.lineTo(12, -65);
  ctx.lineTo(10, -55);
  ctx.closePath();
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-10, -45, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(10, -45, 4, 0, Math.PI * 2);
  ctx.fill();

  // Smile
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -38, 8, 0.2, Math.PI - 0.2);
  ctx.stroke();

  ctx.restore();
}

function drawButterfly(x, y, frame) {
  ctx.save();
  ctx.translate(x, y);
  const wingAngle = Math.sin(frame * 6) * 0.4;
  const colors = ['#FF69B4','#87CEEB','#FFD700'];
  ctx.fillStyle = colors[Math.floor(frame) % 3];

  ctx.save();
  ctx.rotate(-wingAngle);
  ctx.beginPath();
  ctx.ellipse(-6, 0, 6, 10, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.rotate(wingAngle);
  ctx.beginPath();
  ctx.ellipse(6, 0, 6, 10, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#333';
  ctx.fillRect(-1, -3, 2, 6);
  ctx.restore();
}

function drawSpiderBoss(x, y, alpha, frame) {
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = alpha;

  // Body
  ctx.fillStyle = '#2a0a4a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 40, 35, 0, 0, Math.PI * 2);
  ctx.fill();

  // Abdomen
  ctx.fillStyle = '#3a1a5a';
  ctx.beginPath();
  ctx.ellipse(0, 30, 35, 25, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.strokeStyle = '#2a0a4a';
  ctx.lineWidth = 4;
  for (let i = 0; i < 4; i++) {
    const la = -0.5 + i * 0.35;
    ctx.beginPath();
    ctx.moveTo(-30, -5 + i * 10);
    ctx.quadraticCurveTo(-60, -20 + i * 15, -70 + Math.sin(frame * 3 + i) * 5, 10 + i * 10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(30, -5 + i * 10);
    ctx.quadraticCurveTo(60, -20 + i * 15, 70 + Math.sin(frame * 3 + i + 2) * 5, 10 + i * 10);
    ctx.stroke();
  }

  // Eyes
  ctx.fillStyle = '#FF0000';
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.arc(-12 + (i % 3) * 12, -12 + Math.floor(i / 3) * 8, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawHexagon(x, y, size) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = i * Math.PI / 3 - Math.PI / 6;
    const hx = x + Math.cos(angle) * size;
    const hy = y + Math.sin(angle) * size;
    if (i === 0) ctx.moveTo(hx, hy);
    else ctx.lineTo(hx, hy);
  }
  ctx.closePath();
  ctx.fill();
}

function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
  const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
  const r = Math.round(lerp(r1, r2, t));
  const g = Math.round(lerp(g1, g2, t));
  const b = Math.round(lerp(b1, b2, t));
  return `rgb(${r},${g},${b})`;
}

// ===================== MAIN RENDER LOOP =====================

function render(timestamp) {
  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = Math.min(0.1, (timestamp - lastFrameTime) / 1000);
  lastFrameTime = timestamp;

  if (playing) {
    movieTime += dt;
    if (movieTime >= TOTAL_DURATION) {
      movieTime = TOTAL_DURATION;
      playing = false;
      updatePlayButton();
    }
  }

  updateParticles(dt);

  // Clear
  ctx.clearRect(0, 0, 1280, 720);

  // Get current scene
  const scene = getSceneAt(movieTime);

  // Render scene
  renderScene(scene.index, scene.localTime, scene.duration);

  // Scene transition fades
  const fadeIn = Math.min(1, scene.localTime / FADE_DURATION);
  const fadeOut = Math.min(1, (scene.duration - scene.localTime) / FADE_DURATION);
  const fadeAlpha = 1 - Math.min(fadeIn, fadeOut);
  if (fadeAlpha > 0) {
    ctx.globalAlpha = fadeAlpha;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 1280, 720);
    ctx.globalAlpha = 1;
  }

  // Update UI
  updateUI();

  requestAnimationFrame(render);
}

// ===================== UI CONTROLS =====================
const playPauseBtn = document.getElementById('playPauseBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const timeDisplay = document.getElementById('timeDisplay');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const sceneTitleEl = document.getElementById('sceneTitle');

function updatePlayButton() {
  playPauseBtn.innerHTML = playing ? '&#10074;&#10074;' : '&#9654;';
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec < 10 ? '0' : ''}${sec}`;
}

function updateUI() {
  const progress = movieTime / TOTAL_DURATION;
  progressFill.style.width = (progress * 100) + '%';
  timeDisplay.textContent = `${formatTime(movieTime)} / ${formatTime(TOTAL_DURATION)}`;

  const scene = getSceneAt(movieTime);
  sceneTitleEl.textContent = `Scene ${scene.index + 1}: ${scene.name}`;
}

playPauseBtn.addEventListener('click', () => {
  initAudio();
  playing = !playing;
  updatePlayButton();
  if (playing && movieTime >= TOTAL_DURATION) {
    movieTime = 0;
  }
});

progressBar.addEventListener('click', (e) => {
  const rect = progressBar.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  movieTime = x * TOTAL_DURATION;
  currentMood = ''; // Force music reload
});

fullscreenBtn.addEventListener('click', () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    cinema.requestFullscreen();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    initAudio();
    playing = !playing;
    updatePlayButton();
    if (playing && movieTime >= TOTAL_DURATION) {
      movieTime = 0;
    }
  } else if (e.code === 'ArrowRight') {
    movieTime = Math.min(TOTAL_DURATION, movieTime + 5);
    currentMood = '';
  } else if (e.code === 'ArrowLeft') {
    movieTime = Math.max(0, movieTime - 5);
    currentMood = '';
  }
});

// Auto-play
setTimeout(() => {
  initAudio();
  playing = true;
  updatePlayButton();
}, 500);

// Show controls initially, then fade after 3 seconds
setTimeout(() => {
  document.getElementById('controls').classList.remove('show');
}, 3000);

// Start render loop
requestAnimationFrame(render);
</script>
