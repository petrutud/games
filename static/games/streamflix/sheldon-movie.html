<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHELDON - A StreamFlix Original</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none}
#cinema{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#letterbox-top,#letterbox-bottom{position:absolute;left:0;width:100%;background:#000;z-index:10;pointer-events:none}
#letterbox-top{top:0;height:8vh}
#letterbox-bottom{bottom:0;height:8vh}
canvas{display:block;max-width:100vw;max-height:84vh;background:#000;z-index:1}
#subtitle-bar{position:absolute;bottom:12vh;left:50%;transform:translateX(-50%);z-index:20;text-align:center;max-width:80%;pointer-events:none}
#subtitle-speaker{font-size:clamp(12px,1.5vw,18px);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:2px;text-shadow:0 0 10px rgba(0,0,0,0.9)}
#subtitle-text{font-size:clamp(16px,2.2vw,26px);font-weight:400;text-shadow:0 2px 8px rgba(0,0,0,0.95),0 0 20px rgba(0,0,0,0.8);line-height:1.4;background:rgba(0,0,0,0.55);padding:6px 18px;border-radius:6px}
#controls{position:absolute;bottom:1.5vh;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.7);padding:8px 18px;border-radius:30px;backdrop-filter:blur(6px)}
#controls button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:background 0.2s}
#controls button:hover{background:rgba(255,255,255,0.15)}
#progress-wrap{width:clamp(200px,40vw,500px);height:6px;background:rgba(255,255,255,0.2);border-radius:3px;cursor:pointer;position:relative}
#progress-fill{height:100%;background:linear-gradient(90deg,#4fc3f7,#29b6f6);border-radius:3px;width:0%;transition:width 0.3s linear;pointer-events:none}
#time-display{font-size:12px;color:#aaa;min-width:90px;text-align:center;font-variant-numeric:tabular-nums}
#back-btn{position:absolute;top:2vh;left:2vw;z-index:30;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:16px;padding:8px 16px;border-radius:20px;cursor:pointer;backdrop-filter:blur(4px);transition:background 0.2s}
#back-btn:hover{background:rgba(255,255,255,0.15)}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;text-align:center}
#loading h2{font-size:28px;margin-bottom:10px;color:#4fc3f7}
#loading p{color:#888}
</style>
</head>
<body>
<div id="cinema">
  <div id="letterbox-top"></div>
  <canvas id="c"></canvas>
  <div id="letterbox-bottom"></div>
  <div id="subtitle-bar">
    <div id="subtitle-speaker"></div>
    <div id="subtitle-text"></div>
  </div>
  <div id="controls">
    <button id="btn-play" title="Play/Pause">&#9654;</button>
    <div id="progress-wrap"><div id="progress-fill"></div></div>
    <span id="time-display">0:00 / 0:00</span>
    <button id="btn-voice" title="Toggle Voice">&#128266;</button>
    <button id="btn-fs" title="Fullscreen">&#x26F6;</button>
  </div>
  <a id="back-btn" href="/games/streamflix/">&larr; Back</a>
  <div id="loading"><h2>Loading SHELDON...</h2><p>Preparing the movie experience</p></div>
</div>
<script>
// ============================================================
// SHELDON - A StreamFlix Original Animated Movie
// ============================================================
(function(){
"use strict";

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
canvas.width = W; canvas.height = H;

// UI elements
const btnPlay = document.getElementById('btn-play');
const btnVoice = document.getElementById('btn-voice');
const btnFs = document.getElementById('btn-fs');
const progressWrap = document.getElementById('progress-wrap');
const progressFill = document.getElementById('progress-fill');
const timeDisplay = document.getElementById('time-display');
const subtitleSpeaker = document.getElementById('subtitle-speaker');
const subtitleText = document.getElementById('subtitle-text');
const loadingEl = document.getElementById('loading');

// ---- STATE ----
let playing = false;
let voiceEnabled = true;
let currentTime = 0; // seconds elapsed
let lastTimestamp = 0;
let globalAlpha = 1;
let fadeState = null; // {type:'in'|'out', progress:0}

// ---- VOICE SYSTEM ----
const voiceConfigs = {
  Narrator: {pitch:1.0, rate:0.88},
  'Young Sheldon': {pitch:1.8, rate:1.1},
  Sheldon: {pitch:1.1, rate:1.05},
  Mary: {pitch:1.5, rate:0.9},
  George: {pitch:0.7, rate:0.85},
  Missy: {pitch:1.6, rate:1.15},
  Meemaw: {pitch:1.3, rate:0.8},
  Leonard: {pitch:1.1, rate:1.0},
  Penny: {pitch:1.5, rate:1.05},
  Howard: {pitch:1.4, rate:1.15},
  Raj: {pitch:1.2, rate:0.95},
  Amy: {pitch:1.3, rate:0.9},
  Professor: {pitch:0.9, rate:0.85},
  'Nobel Committee': {pitch:0.9, rate:0.85}
};

const speakerColors = {
  'Young Sheldon':'#4fc3f7', Sheldon:'#4fc3f7',
  Mary:'#ef5350', George:'#8d6e63', Missy:'#ff8a65',
  Meemaw:'#ce93d8', Leonard:'#66bb6a', Penny:'#f48fb1',
  Howard:'#ffa726', Raj:'#ab47bc', Amy:'#26a69a',
  Narrator:'#b0bec5', Professor:'#78909c', Teacher:'#78909c',
  'Nobel Committee':'#ffd54f'
};

let currentUtterance = null;
let englishVoice = null;

function initVoices(){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  englishVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) ||
                 voices.find(v => v.lang.startsWith('en-US')) ||
                 voices.find(v => v.lang.startsWith('en')) ||
                 voices[0] || null;
}
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = initVoices;
  initVoices();
}

function speak(character, text, onEnd){
  if(!window.speechSynthesis || !voiceEnabled){
    if(onEnd) onEnd();
    return;
  }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const cfg = voiceConfigs[character] || {pitch:1, rate:1};
  u.pitch = cfg.pitch;
  u.rate = cfg.rate;
  u.volume = 1;
  if(englishVoice) u.voice = englishVoice;
  u.onend = ()=>{ currentUtterance=null; if(onEnd) onEnd(); };
  u.onerror = ()=>{ currentUtterance=null; if(onEnd) onEnd(); };
  currentUtterance = u;
  window.speechSynthesis.speak(u);
}

function stopSpeech(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  currentUtterance = null;
}

// ---- MUSIC SYSTEM (Web Audio API) ----
let audioCtx = null;
let musicGain = null;
let currentOscillators = [];

function initAudio(){
  if(audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.06;
    musicGain.connect(audioCtx.destination);
  } catch(e){}
}

function stopMusic(){
  currentOscillators.forEach(o=>{try{o.stop();}catch(e){}});
  currentOscillators = [];
}

function playChord(freqs, duration, type='sine', vol=0.06){
  if(!audioCtx) return;
  const now = audioCtx.currentTime;
  freqs.forEach(f=>{
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = f;
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.connect(g);
    g.connect(musicGain);
    osc.start(now);
    osc.stop(now + duration);
    currentOscillators.push(osc);
  });
}

function playMood(mood){
  stopMusic();
  if(!audioCtx) return;
  const chords = {
    warm: [[261.6,329.6,392],[293.7,349.2,440],[329.6,392,523.3],[293.7,349.2,440]],
    comedic: [[329.6,415.3,523.3],[349.2,440,554.4],[392,493.9,587.3],[349.2,440,523.3]],
    emotional: [[261.6,311,392],[246.9,311,370],[220,277.2,329.6],[246.9,293.7,370]],
    triumphant: [[261.6,329.6,392,523.3],[293.7,370,440,587.3],[329.6,415.3,523.3,659.3],[392,493.9,587.3,784]],
    nostalgic: [[261.6,329.6,392],[220,277.2,329.6],[246.9,311,370],[261.6,329.6,392]],
    tense: [[246.9,293.7,370],[233.1,277.2,349.2],[220,261.6,329.6],[233.1,277.2,349.2]],
    epic: [[196,261.6,329.6,392],[220,293.7,370,440],[246.9,329.6,415.3,493.9],[261.6,349.2,440,523.3]],
    title: [[261.6,329.6,392,523.3],[329.6,415.3,523.3,659.3],[392,493.9,587.3,784],[523.3,659.3,784,1047]]
  };
  const c = chords[mood] || chords.warm;
  let t = 0;
  c.forEach((chord,i)=>{
    setTimeout(()=>{
      if(playing) playChord(chord, 3.5, 'sine', 0.04);
    }, t);
    t += 2800;
  });
}

// ---- PARTICLE SYSTEM ----
class Particle {
  constructor(x,y,vx,vy,life,color,size){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.life=life;this.maxLife=life;this.color=color;this.size=size||2;
  }
  update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.life-=dt;}
  draw(){
    const a=this.life/this.maxLife;
    ctx.globalAlpha=a*globalAlpha;
    ctx.fillStyle=this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=globalAlpha;
  }
}
let particles = [];
function addParticles(x,y,count,color,spread,life){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*spread;
    particles.push(new Particle(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,life||2,color,1+Math.random()*2));
  }
}
function updateParticles(dt){
  particles = particles.filter(p=>{p.update(dt);return p.life>0;});
}
function drawParticles(){
  particles.forEach(p=>p.draw());
}

// ---- FLOATING EQUATIONS ----
let floatingEqs = [];
const eqTexts = ['E=mc²','∫f(x)dx','ψ(x,t)','∇²φ=0','F=ma','ΔS≥0','λ=h/p','PV=nRT','σ=F/A','∂²u/∂t²','Ω(E)','H|ψ⟩=E|ψ⟩','S=kB ln W','∮B·dl=μ₀I'];
function spawnEquation(){
  floatingEqs.push({x:Math.random()*W,y:H+20,vy:-15-Math.random()*25,text:eqTexts[Math.floor(Math.random()*eqTexts.length)],alpha:0.15+Math.random()*0.2,size:12+Math.random()*14});
}
function updateEquations(dt){
  floatingEqs.forEach(e=>{e.y+=e.vy*dt;});
  floatingEqs=floatingEqs.filter(e=>e.y>-30);
}
function drawEquations(){
  floatingEqs.forEach(e=>{
    ctx.globalAlpha=e.alpha*globalAlpha;
    ctx.fillStyle='#4fc3f7';
    ctx.font=e.size+'px monospace';
    ctx.fillText(e.text,e.x,e.y);
  });
  ctx.globalAlpha=globalAlpha;
}

// ---- DRAWING HELPERS ----
function drawRect(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(x,y,w,h);}
function drawCircle(x,y,r,color){ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function drawEllipse(x,y,rx,ry,color){ctx.fillStyle=color;ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();}
function drawText(text,x,y,font,color,align){
  ctx.fillStyle=color||'#fff';
  ctx.font=font||'20px sans-serif';
  ctx.textAlign=align||'center';
  ctx.textBaseline='middle';
  ctx.fillText(text,x,y);
  ctx.textAlign='left';
}
function drawStar(cx,cy,spikes,outerR,innerR,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  let rot=Math.PI/2*3, step=Math.PI/spikes;
  ctx.moveTo(cx,cy-outerR);
  for(let i=0;i<spikes;i++){
    ctx.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR);rot+=step;
    ctx.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR);rot+=step;
  }
  ctx.closePath();ctx.fill();
}

// ---- CHARACTER DRAWING ----
function drawYoungSheldon(x,y,scale,expression){
  const s=scale||1;
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(s,s);
  // Legs
  drawRect(-12,40,10,30,'#c8b07a');
  drawRect(2,40,10,30,'#c8b07a');
  // Shoes
  drawRect(-14,68,14,6,'#4a3728');
  drawRect(0,68,14,6,'#4a3728');
  // Body - plaid shirt
  drawRect(-18,-5,36,48,'#c62828');
  // Plaid lines
  ctx.strokeStyle='#1565c0';ctx.lineWidth=2;
  for(let i=-18;i<18;i+=8){ctx.beginPath();ctx.moveTo(i,-5);ctx.lineTo(i,43);ctx.stroke();}
  for(let j=-5;j<43;j+=8){ctx.beginPath();ctx.moveTo(-18,j);ctx.lineTo(18,j);ctx.stroke();}
  // Collar
  drawRect(-8,-8,16,6,'#fff');
  // Bowtie
  ctx.fillStyle='#1a237e';
  ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(-8,-10);ctx.lineTo(-8,-2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(8,-10);ctx.lineTo(8,-2);ctx.closePath();ctx.fill();
  drawCircle(0,-6,2,'#0d47a1');
  // Head
  drawCircle(0,-24,20,'#fdd9b5');
  // Hair - brown bowl cut
  ctx.fillStyle='#5d4037';
  ctx.beginPath();
  ctx.arc(0,-24,20,Math.PI,0);
  ctx.lineTo(20,-20);
  ctx.quadraticCurveTo(22,-28,18,-36);
  ctx.quadraticCurveTo(0,-48,-18,-36);
  ctx.quadraticCurveTo(-22,-28,-20,-20);
  ctx.closePath();
  ctx.fill();
  // Bangs
  ctx.fillStyle='#4e342e';
  ctx.beginPath();
  ctx.ellipse(0,-38,16,6,0,0,Math.PI);
  ctx.fill();
  // Eyes
  const ey = expression === 'upset' ? -26 : -26;
  drawCircle(-7,ey,5,'#fff');
  drawCircle(7,ey,5,'#fff');
  drawCircle(-7,ey,2.5,'#2c1810');
  drawCircle(7,ey,2.5,'#2c1810');
  drawCircle(-6,ey-1,1,'#fff');
  drawCircle(8,ey-1,1,'#fff');
  // Eyebrows
  if(expression==='upset'){
    ctx.strokeStyle='#3e2723';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-12,-32);ctx.lineTo(-3,-34);ctx.stroke();
    ctx.beginPath();ctx.moveTo(12,-32);ctx.lineTo(3,-34);ctx.stroke();
  } else {
    ctx.strokeStyle='#3e2723';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-12,-33);ctx.lineTo(-2,-33);ctx.stroke();
    ctx.beginPath();ctx.moveTo(2,-33);ctx.lineTo(12,-33);ctx.stroke();
  }
  // Mouth
  if(expression==='happy'){
    ctx.strokeStyle='#c62828';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,-16,5,0,Math.PI);ctx.stroke();
  } else if(expression==='upset'){
    ctx.strokeStyle='#c62828';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,-12,4,Math.PI,0);ctx.stroke();
  } else {
    ctx.strokeStyle='#c62828';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-4,-17);ctx.lineTo(4,-17);ctx.stroke();
  }
  // Arms
  drawRect(-28,0,12,8,'#c62828');
  drawRect(16,0,12,8,'#c62828');
  // Hands
  drawCircle(-28,4,5,'#fdd9b5');
  drawCircle(28,4,5,'#fdd9b5');
  ctx.restore();
}

function drawAdultSheldon(x,y,scale,expression,shirtColor){
  const s=scale||1;
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(s,s);
  // Legs
  drawRect(-12,55,10,40,'#c8b07a');
  drawRect(2,55,10,40,'#c8b07a');
  // Shoes
  drawRect(-14,93,14,7,'#37474f');
  drawRect(0,93,14,7,'#37474f');
  // Body - long sleeve undershirt
  drawRect(-22,-5,44,62,'#795548');
  // T-shirt over
  drawRect(-20,-3,40,45,shirtColor||'#c62828');
  // Flash logo on shirt
  ctx.fillStyle='#ffd600';
  ctx.beginPath();
  ctx.moveTo(-3,10);ctx.lineTo(5,10);ctx.lineTo(2,20);ctx.lineTo(8,20);ctx.lineTo(-2,35);ctx.lineTo(1,24);ctx.lineTo(-5,24);
  ctx.closePath();ctx.fill();
  // Head
  drawCircle(0,-24,22,'#fdd9b5');
  // Hair
  ctx.fillStyle='#5d4037';
  ctx.beginPath();
  ctx.arc(0,-26,22,Math.PI+0.3,Math.PI*2-0.3);
  ctx.quadraticCurveTo(22,-30,20,-42);
  ctx.quadraticCurveTo(5,-52,-5,-50);
  ctx.quadraticCurveTo(-15,-48,-20,-42);
  ctx.quadraticCurveTo(-24,-30,-22,-24);
  ctx.closePath();ctx.fill();
  // Side part
  ctx.strokeStyle='#4e342e';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-8,-46);ctx.quadraticCurveTo(-5,-42,-6,-38);ctx.stroke();
  // Eyes
  drawCircle(-8,-26,5,'#fff');
  drawCircle(8,-26,5,'#fff');
  drawCircle(-8,-26,2.5,'#2c1810');
  drawCircle(8,-26,2.5,'#2c1810');
  drawCircle(-7,-27,1,'#fff');
  drawCircle(9,-27,1,'#fff');
  // Eyebrows
  ctx.strokeStyle='#3e2723';ctx.lineWidth=2;
  if(expression==='smug'){
    ctx.beginPath();ctx.moveTo(-13,-34);ctx.lineTo(-3,-36);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,-36);ctx.lineTo(13,-34);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(-13,-34);ctx.lineTo(-3,-34);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,-34);ctx.lineTo(13,-34);ctx.stroke();
  }
  // Mouth
  if(expression==='happy'||expression==='eureka'){
    ctx.strokeStyle='#c62828';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,-16,6,0.1,Math.PI-0.1);ctx.stroke();
  } else if(expression==='sad'){
    ctx.strokeStyle='#c62828';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,-12,5,Math.PI+0.3,-0.3);ctx.stroke();
  } else if(expression==='speaking'){
    drawEllipse(0,-15,4,3,'#c62828');
  } else {
    ctx.strokeStyle='#c62828';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-5,-17);ctx.lineTo(5,-17);ctx.stroke();
  }
  // Arms (long sleeves visible)
  drawRect(-34,0,14,8,'#795548');
  drawRect(20,0,14,8,'#795548');
  drawCircle(-34,4,6,'#fdd9b5');
  drawCircle(34,4,6,'#fdd9b5');
  // Eureka sparkles
  if(expression==='eureka'){
    for(let i=0;i<5;i++){
      const a=i*Math.PI*2/5+currentTime*2;
      drawStar(Math.cos(a)*35,-30+Math.sin(a)*15,4,4,2,'#ffd600');
    }
  }
  ctx.restore();
}

function drawMary(x,y,scale){
  const s=scale||1;
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  // Legs
  drawRect(-10,50,8,30,'#fdd9b5');
  drawRect(2,50,8,30,'#fdd9b5');
  // Shoes
  drawRect(-12,78,12,5,'#c62828');
  drawRect(0,78,12,5,'#c62828');
  // Dress/blouse - floral
  drawRect(-20,-5,40,58,'#e8b5ce');
  // Floral pattern
  for(let fx=-15;fx<15;fx+=10){
    for(let fy=0;fy<50;fy+=12){
      drawCircle(fx,fy,2,'#f48fb1');
      drawCircle(fx+3,fy+3,1.5,'#ce93d8');
    }
  }
  // Cross necklace
  ctx.strokeStyle='#ffd600';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(0,2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-3,-4);ctx.lineTo(3,-4);ctx.stroke();
  // Head
  drawCircle(0,-24,20,'#fdd9b5');
  // Big Texas hair
  ctx.fillStyle='#8d6e63';
  ctx.beginPath();
  ctx.ellipse(0,-35,24,18,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-12,-24,12,22,0.3,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(12,-24,12,22,-0.3,0,Math.PI*2);
  ctx.fill();
  // Eyes
  drawCircle(-7,-26,4,'#fff');
  drawCircle(7,-26,4,'#fff');
  drawCircle(-7,-26,2,'#5d4037');
  drawCircle(7,-26,2,'#5d4037');
  // Eyelashes
  ctx.strokeStyle='#3e2723';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-11,-28);ctx.lineTo(-12,-31);ctx.stroke();
  ctx.beginPath();ctx.moveTo(11,-28);ctx.lineTo(12,-31);ctx.stroke();
  // Warm smile
  ctx.strokeStyle='#e57373';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,-17,5,0.1,Math.PI-0.1);ctx.stroke();
  // Blush
  drawCircle(-12,-20,3,'rgba(244,143,177,0.3)');
  drawCircle(12,-20,3,'rgba(244,143,177,0.3)');
  // Arms

// ---- ENVIRONMENT DRAWING ----
function drawSky(topColor,bottomColor){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,topColor);
  grad.addColorStop(1,bottomColor);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);
}

function drawStars(count){
  for(let i=0;i<count;i++){
    const sx=(i*137.5)%W, sy=(i*97.3)%360;
    const twinkle = 0.5 + 0.5*Math.sin(currentTime*2+i);
    ctx.globalAlpha = twinkle * globalAlpha;
    drawCircle(sx,sy,0.5+Math.random(),`#fff`);
  }
  ctx.globalAlpha = globalAlpha;
}

function drawGround(y,color1,color2){
  const grad=ctx.createLinearGradient(0,y,0,H);
  grad.addColorStop(0,color1);
  grad.addColorStop(1,color2||color1);
  ctx.fillStyle=grad;
  ctx.fillRect(0,y,W,H-y);
}

  // Main house

  // Roof
  ctx.fillStyle='#5d4037';
  ctx.beginPath();
  ctx.moveTo(x-10,y);ctx.lineTo(x+w/2,y-40);ctx.lineTo(x+w+10,y);
  ctx.closePath();ctx.fill();
  // Door
  drawRect(x+w/2-12,y+h-40,24,40,'#795548');

function drawAtom(cx,cy,size,t){
  // Nucleus
  drawCircle(cx,cy,size*0.15,'#4fc3f7');
  // Orbits
  ctx.strokeStyle='rgba(79,195,247,0.4)';
  ctx.lineWidth=1;
  for(let i=0;i<3;i++){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(i*Math.PI/3+t*0.5);
    ctx.beginPath();
    ctx.ellipse(0,0,size,size*0.35,0,0,Math.PI*2);
    ctx.stroke();
    // Electron
    const ea = t*2+i*Math.PI*2/3;
    const ex = Math.cos(ea)*size;
    const ey = Math.sin(ea)*size*0.35;
    ctx.restore();
    drawCircle(cx+Math.cos(i*Math.PI/3+t*0.5)*ex-Math.sin(i*Math.PI/3+t*0.5)*ey,
               cy+Math.sin(i*Math.PI/3+t*0.5)*ex+Math.cos(i*Math.PI/3+t*0.5)*ey,
               size*0.08,'#e1f5fe');
  }
}

function drawPalmTree(x,y,h){
  // Trunk
  ctx.strokeStyle='#795548';ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo(x+5,y-h*0.5,x+3,y-h);ctx.stroke();
  // Leaves
  ctx.strokeStyle='#2e7d32';ctx.lineWidth=3;
  for(let la=0;la<6;la++){
    const angle = la*Math.PI/3-Math.PI/6;
    ctx.beginPath();
    ctx.moveTo(x+3,y-h);
    ctx.quadraticCurveTo(x+3+Math.cos(angle)*40,y-h+Math.sin(angle)*20-15,
                          x+3+Math.cos(angle)*55,y-h+Math.sin(angle)*35);
    ctx.stroke();
  }
}

// ---- COMPUTE TOTAL DURATION ----
let totalDuration = 0;
const sceneStarts = [];
scenes.forEach(s=>{
  sceneStarts.push(totalDuration);
  totalDuration += s.duration;
});

// ---- SUBTITLE/DIALOGUE SYSTEM ----
let currentDialogueIndex = -1;
let lastSceneIndex = -1;
let dialoguePlayed = {};

function showSubtitle(speaker, text){
  subtitleSpeaker.textContent = speaker;
  subtitleSpeaker.style.color = speakerColors[speaker] || '#b0bec5';
  subtitleText.textContent = text;
  subtitleText.style.display = text ? 'block' : 'none';
  subtitleSpeaker.style.display = speaker ? 'block' : 'none';
}

function clearSubtitle(){
  subtitleSpeaker.textContent = '';
  subtitleText.textContent = '';
  subtitleText.style.display = 'none';
  subtitleSpeaker.style.display = 'none';
}

function updateDialogue(sceneIndex, sceneTime){
  const scene = scenes[sceneIndex];
  if(!scene || !scene.dialogues) return;

  if(sceneIndex !== lastSceneIndex){
    lastSceneIndex = sceneIndex;
    currentDialogueIndex = -1;
  }

  // Find which dialogue should be active
  let activeIdx = -1;
  for(let i=scene.dialogues.length-1; i>=0; i--){
    if(sceneTime >= scene.dialogues[i].at){
      activeIdx = i;
      break;
    }
  }

  if(activeIdx >= 0 && activeIdx !== currentDialogueIndex){
    currentDialogueIndex = activeIdx;
    const d = scene.dialogues[activeIdx];
    const key = sceneIndex+'_'+activeIdx;
    if(d.text){
      showSubtitle(d.speaker, d.text);
      if(!dialoguePlayed[key]){
        dialoguePlayed[key] = true;
        speak(d.speaker, d.text);
      }
    }
  }

  // Clear subtitle if past last dialogue by enough time
  if(activeIdx >= 0){
    const d = scene.dialogues[activeIdx];
    const wordCount = d.text.split(' ').length;
    const displayTime = Math.max(3, wordCount * 0.4);
    if(sceneTime > d.at + displayTime){
      clearSubtitle();
    }
  }
}

// ---- MAIN RENDER LOOP ----
function getSceneAt(time){
  for(let i=scenes.length-1;i>=0;i--){
    if(time >= sceneStarts[i]) return i;
  }
  return 0;
}

function render(timestamp){
  if(!lastTimestamp) lastTimestamp = timestamp;
  const dt = Math.min((timestamp - lastTimestamp)/1000, 0.1);
  lastTimestamp = timestamp;

  if(playing){
    currentTime += dt;
    if(currentTime >= totalDuration){
      currentTime = totalDuration;
      playing = false;
      btnPlay.innerHTML = '&#9654;';
    }
  }

  // Clear
  ctx.clearRect(0,0,W,H);
  ctx.globalAlpha = 1;
  globalAlpha = 1;

  // Determine current scene
  const sceneIndex = getSceneAt(currentTime);
  const scene = scenes[sceneIndex];
  const sceneStart = sceneStarts[sceneIndex];
  const sceneTime = currentTime - sceneStart;

  // Fade transitions
  const fadeIn = Math.min(1, sceneTime / FADE_DUR);
  const fadeOut = Math.min(1, (scene.duration - sceneTime) / FADE_DUR);
  globalAlpha = Math.min(fadeIn, fadeOut);
  globalAlpha = Math.max(0.01, globalAlpha);
  ctx.globalAlpha = globalAlpha;

  // Render scene
  scene.render(sceneTime);

  // Particles
  updateParticles(dt);
  drawParticles();

  // Update equations
  updateEquations(dt);

  // Music trigger
  if(sceneTime < 0.1 && playing){
    playMood(scene.mood);
  }

  // Dialogue
  if(playing){
    updateDialogue(sceneIndex, sceneTime);
  }

  // Fade overlay
  if(globalAlpha < 1){
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#000';
    ctx.globalAlpha = 1 - Math.min(fadeIn, fadeOut);
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }

  // Progress bar
  const pct = (currentTime / totalDuration) * 100;
  progressFill.style.width = pct + '%';

  // Time display
  const cur = formatTime(currentTime);
  const tot = formatTime(totalDuration);
  timeDisplay.textContent = cur + ' / ' + tot;

  requestAnimationFrame(render);
}

function formatTime(s){
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return m + ':' + (sec<10?'0':'') + sec;
}

// ---- CONTROLS ----
btnPlay.addEventListener('click', togglePlay);
function togglePlay(){
  if(!playing && currentTime >= totalDuration){
    currentTime = 0;
    dialoguePlayed = {};
    clearSubtitle();
  }
  playing = !playing;
  btnPlay.innerHTML = playing ? '&#10074;&#10074;' : '&#9654;';
  if(playing){
    initAudio();
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    initVoices();
  } else {
    stopSpeech();
    stopMusic();
  }
}

document.addEventListener('keydown', e=>{
  if(e.code === 'Space'){
    e.preventDefault();
    togglePlay();
  }
});

// Progress bar seeking
progressWrap.addEventListener('click', e=>{
  const rect = progressWrap.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  currentTime = pct * totalDuration;
  dialoguePlayed = {};
  clearSubtitle();
  stopSpeech();
  stopMusic();
  particles = [];
  floatingEqs = [];
});

// Voice toggle
btnVoice.addEventListener('click', ()=>{
  voiceEnabled = !voiceEnabled;
  btnVoice.textContent = voiceEnabled ? '🔊' : '🔇';
  if(!voiceEnabled) stopSpeech();
});

// Fullscreen
btnFs.addEventListener('click', ()=>{
  if(!document.fullscreenElement){
    document.getElementById('cinema').requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
});

// ---- INIT ----
setTimeout(()=>{
  loadingEl.style.display='none';
  requestAnimationFrame(render);
},500);

})();
</script>
