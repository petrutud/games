<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under the Boardwalk - A StreamFlix Original</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;color:#fff;cursor:default;user-select:none}
#cinema{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100vw;height:100vh}
#letterbox-top,#letterbox-bottom{background:#000;width:100%;flex-shrink:0}
#screen-wrap{position:relative;width:100%;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{display:block}
#subtitle{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);text-align:center;font-size:clamp(14px,2.2vw,26px);text-shadow:2px 2px 6px rgba(0,0,0,.9),0 0 12px rgba(0,0,0,.7);padding:6px 18px;border-radius:6px;background:rgba(0,0,0,.45);max-width:80%;pointer-events:none;opacity:0;transition:opacity .3s}
#subtitle.show{opacity:1}
#controls{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:8px 16px 10px;display:flex;align-items:center;gap:10px;opacity:0;transition:opacity .3s}
#cinema:hover #controls,#controls.locked{opacity:1}
#controls button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:background .2s}
#controls button:hover{background:rgba(255,255,255,.15)}
#progress-wrap{flex:1;height:6px;background:rgba(255,255,255,.2);border-radius:3px;cursor:pointer;position:relative}
#progress-bar{height:100%;background:linear-gradient(90deg,#f7a44c,#f06292);border-radius:3px;width:0%;transition:width .1s linear;pointer-events:none}
#time{font-size:13px;color:#ccc;min-width:90px;text-align:center}
#back-btn{position:absolute;top:12px;left:16px;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:15px;padding:6px 14px;border-radius:20px;cursor:pointer;opacity:0;transition:opacity .3s;z-index:10;text-decoration:none;display:flex;align-items:center;gap:6px}
#cinema:hover #back-btn{opacity:1}
#back-btn:hover{background:rgba(255,255,255,.15)}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;color:#7ec8e3;z-index:20}
</style>
</head>
<body>
<div id="cinema">
<div id="letterbox-top"></div>
<div id="screen-wrap">
<canvas id="c"></canvas>
<div id="subtitle"></div>
<a id="back-btn" href="/games/streamflix/">&#9664; Back</a>
<div id="controls" class="locked">
<button id="btn-play" title="Play/Pause">&#9654;</button>
<div id="progress-wrap"><div id="progress-bar"></div></div>
<span id="time">0:00 / 0:00</span>
<button id="btn-voice" title="Toggle Voice">&#128266;</button>
<button id="btn-fs" title="Fullscreen">&#x26F6;</button>
</div>
<div id="loading">Loading...</div>
</div>
<div id="letterbox-bottom"></div>
</div>

<script>
// ============ CORE SETUP ============
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const sub = document.getElementById('subtitle');
const progBar = document.getElementById('progress-bar');
const progWrap = document.getElementById('progress-wrap');
const timeEl = document.getElementById('time');
const btnPlay = document.getElementById('btn-play');
const btnVoice = document.getElementById('btn-voice');
const btnFs = document.getElementById('btn-fs');
const loading = document.getElementById('loading');
const lbTop = document.getElementById('letterbox-top');
const lbBottom = document.getElementById('letterbox-bottom');

let W = 960, H = 540; // 16:9 internal resolution
let playing = false, voiceOn = true, currentTime = 0, totalDuration = 0;
let currentScene = 0, sceneTime = 0;
let fadeAlpha = 0, fadeDir = 0; // for transitions
let globalAnimFrame = 0;

// Audio context
let audioCtx = null, masterGain = null;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.25;
    masterGain.connect(audioCtx.destination);
}

// ============ RESIZE ============
function resize() {
    const ww = window.innerWidth, wh = window.innerHeight;
    const aspect = 16/9;
    let cw = ww, ch = ww / aspect;
    if (ch > wh * 0.82) { ch = wh * 0.82; cw = ch * aspect; }
    canvas.width = W; canvas.height = H;
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    const barH = (wh - ch) / 2;
    lbTop.style.height = Math.max(0, barH) + 'px';
    lbBottom.style.height = Math.max(0, barH) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ============ COLORS ============
const COLORS = {
    narrator: '#ffd700',
    shelly: '#ff8c00',
    coral: '#ff69b4',
    captain: '#dc143c',
    sandy: '#f0e68c',
    gill: '#00ced1',
    mayor: '#8b0000',
    steve: '#f0f0f0',
    pearl: '#9370db',
    turtle: '#2e8b57'
};

// ============ MUSIC SYSTEM ============
let currentMusicNodes = [];
let musicInterval = null;

function stopMusic() {
    currentMusicNodes.forEach(n => { try { n.stop(); } catch(e){} });
    currentMusicNodes = [];
    if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

function playNote(freq, time, dur, type='sine', vol=0.12) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(vol, time + 0.05);
    g.gain.linearRampToValueAtTime(vol * 0.7, time + dur * 0.7);
    g.gain.linearRampToValueAtTime(0, time + dur);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(time);
    osc.stop(time + dur);
    currentMusicNodes.push(osc);
}

function playWaveSound(time, dur) {
    if (!audioCtx) return;
    const bufSize = audioCtx.sampleRate * dur;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
        const t = i / audioCtx.sampleRate;
        data[i] = (Math.sin(t * 0.8) * 0.3 + Math.random() * 0.15) * Math.sin(Math.PI * t / dur) * 0.15;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.value = 0.3;
    src.connect(g);
    g.connect(masterGain);
    src.start(time);
    currentMusicNodes.push(src);
}

function musicTropical() {
    if (!audioCtx) return;
    stopMusic();
    const notes = [392, 440, 494, 523, 587, 659, 587, 523, 494, 440, 392, 349];
    const bass = [196, 220, 247, 262];
    let beat = 0;
    function loop() {
        if (!playing || !audioCtx) return;
        const t = audioCtx.currentTime;
        for (let i = 0; i < 4; i++) {
            const n = notes[(beat + i) % notes.length];
            playNote(n, t + i * 0.35, 0.3, 'triangle', 0.06);
        }
        playNote(bass[beat % bass.length], t, 1.2, 'sine', 0.08);
        playWaveSound(t, 1.4);
        // Ukulele-style plucks
        for (let i = 0; i < 3; i++) {
            playNote(notes[(beat+i+2) % notes.length] * 2, t + i * 0.18 + 0.05, 0.15, 'triangle', 0.04);
        }
        beat++;
    }
    loop();
    musicInterval = setInterval(loop, 1400);
}

function musicMysterious() {
    if (!audioCtx) return;
    stopMusic();
    const notes = [220, 233, 262, 277, 294, 262, 233, 220];
    let beat = 0;
    function loop() {
        if (!playing || !audioCtx) return;
        const t = audioCtx.currentTime;
        playNote(notes[beat % notes.length], t, 1.8, 'sine', 0.06);
        playNote(notes[(beat+3) % notes.length] * 0.5, t + 0.5, 1.5, 'sine', 0.05);
        playWaveSound(t, 2.0);
        // Eerie high overtone
        playNote(notes[beat % notes.length] * 3, t + 0.2, 1.0, 'sine', 0.015);
        beat++;
    }
    loop();
    musicInterval = setInterval(loop, 2000);
}

function musicTense() {
    if (!audioCtx) return;
    stopMusic();
    let beat = 0;
    function loop() {
        if (!playing || !audioCtx) return;
        const t = audioCtx.currentTime;
        playNote(110 + (beat % 3) * 10, t, 0.3, 'sawtooth', 0.04);
        playNote(165, t + 0.15, 0.15, 'square', 0.03);
        playNote(82, t, 0.6, 'sine', 0.07);
        // Percussion-like
        playNote(55, t + 0.3, 0.1, 'square', 0.05);
        beat++;
    }
    loop();
    musicInterval = setInterval(loop, 600);
}

function musicEmotional() {
    if (!audioCtx) return;
    stopMusic();
    const melody = [330, 392, 440, 494, 523, 494, 440, 392, 370, 330, 294, 330];
    let beat = 0;
    function loop() {
        if (!playing || !audioCtx) return;
        const t = audioCtx.currentTime;
        playNote(melody[beat % melody.length], t, 1.5, 'sine', 0.07);
        playNote(melody[beat % melody.length] * 0.5, t + 0.3, 1.2, 'triangle', 0.05);
        playNote(melody[(beat+4) % melody.length] * 0.75, t + 0.6, 1.0, 'sine', 0.04);
        playWaveSound(t, 1.8);
        beat++;
    }
    loop();
    musicInterval = setInterval(loop, 1800);
}

function musicTriumphant() {
    if (!audioCtx) return;
    stopMusic();
    const fanfare = [523, 587, 659, 784, 659, 784, 880, 784, 659, 587, 523, 587];
    const bass = [262, 294, 330, 349, 392, 349, 330, 294];
    let beat = 0;
    function loop() {
        if (!playing || !audioCtx) return;
        const t = audioCtx.currentTime;
        playNote(fanfare[beat % fanfare.length], t, 0.4, 'triangle', 0.07);
        playNote(fanfare[(beat+2) % fanfare.length], t + 0.2, 0.3, 'triangle', 0.05);
        playNote(bass[beat % bass.length], t, 0.8, 'sine', 0.08);
        // Celebration sparkle
        playNote(fanfare[beat % fanfare.length] * 2, t + 0.1, 0.15, 'sine', 0.025);
        beat++;
    }
    loop();
    musicInterval = setInterval(loop, 800);
}

// ============ SPEECH SYSTEM ============
let speechQueue = [];
let currentUtterance = null;

const VOICE_PROFILES = {
    narrator: { pitch: 1.0, rate: 0.88 },
    shelly: { pitch: 1.4, rate: 1.0 },
    coral: { pitch: 1.7, rate: 1.1 },
    captain: { pitch: 0.5, rate: 0.8 },
    sandy: { pitch: 1.6, rate: 0.85 },
    gill: { pitch: 1.3, rate: 1.3 },
    mayor: { pitch: 0.7, rate: 0.75 },
    steve: { pitch: 1.1, rate: 1.2 },
    pearl: { pitch: 1.5, rate: 0.9 },
    turtle: { pitch: 0.6, rate: 0.7 }
};

function speak(text, character) {
    if (!voiceOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const profile = VOICE_PROFILES[character] || VOICE_PROFILES.narrator;
    u.pitch = profile.pitch;
    u.rate = profile.rate;
    u.volume = 0.9;
    // Try to get an English voice
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en'));
    if (enVoice) u.voice = enVoice;
    window.speechSynthesis.speak(u);
    currentUtterance = u;
}

function stopSpeech() {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
}

// ============ PARTICLE SYSTEMS ============
class Particle {
    constructor(x, y, opts = {}) {
        this.x = x; this.y = y;
        this.vx = opts.vx || (Math.random() - 0.5) * 2;
        this.vy = opts.vy || -Math.random() * 2 - 0.5;
        this.life = opts.life || 60;
        this.maxLife = this.life;
        this.size = opts.size || 3;
        this.color = opts.color || '#fff';
        this.type = opts.type || 'circle'; // circle, bubble, sparkle, sand
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
        if (this.type === 'bubble') { this.vx += Math.sin(this.y * 0.05) * 0.1; this.vy -= 0.02; }
        if (this.type === 'sand') { this.vy += 0.05; this.vx *= 0.99; }
    }
    draw() {
        const alpha = Math.max(0, this.life / this.maxLife);
        ctx.globalAlpha = alpha;
        if (this.type === 'bubble') {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(this.x - this.size * 0.3, this.y - this.size * 0.3, this.size * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        } else if (this.type === 'sparkle') {
            ctx.fillStyle = this.color;
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.life * 0.1);
            for (let i = 0; i < 4; i++) {
                ctx.fillRect(-0.5, -this.size, 1, this.size * 2);
                ctx.rotate(Math.PI / 4);
            }
            ctx.restore();
        } else {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
}

let particles = [];
function emitBubbles(x, y, count = 5) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x + (Math.random()-0.5)*40, y, {
            type: 'bubble', size: 2 + Math.random()*4, life: 80 + Math.random()*40,
            vx: (Math.random()-0.5)*0.8, vy: -0.5 - Math.random()*1.5, color: 'rgba(150,220,255,0.7)'
        }));
    }
}
function emitSparkles(x, y, count = 8, color = '#ffd700') {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x + (Math.random()-0.5)*30, y + (Math.random()-0.5)*30, {
            type: 'sparkle', size: 2 + Math.random()*3, life: 40 + Math.random()*30,
            vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3, color
        }));
    }
}
function emitSand(x, y, count = 10) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x + (Math.random()-0.5)*20, y, {
            type: 'sand', size: 1 + Math.random()*2, life: 30 + Math.random()*20,
            vx: (Math.random()-0.5)*4, vy: -Math.random()*3, color: '#deb887'
        }));
    }
}
function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
}
function drawParticles() {
    particles.forEach(p => p.draw());
}

// ============ DRAWING HELPERS ============
function drawGradientRect(x, y, w, h, c1, c2, vertical = true) {
    const g = vertical ? ctx.createLinearGradient(x, y, x, y + h) : ctx.createLinearGradient(x, y, x + w, y);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
}

function drawOceanBg(t, depth = 0) {
    // depth 0 = surface, 1 = mid, 2 = deep
    const colors = [
        ['#1a8fba', '#0d5f80'],
        ['#0d5f80', '#063d52'],
        ['#041e2e', '#010d15']
    ];
    const [c1, c2] = colors[Math.min(depth, 2)];
    drawGradientRect(0, 0, W, H, c1, c2);
    // Light rays
    if (depth < 2) {
        ctx.globalAlpha = 0.06 + Math.sin(t * 0.01) * 0.02;
        for (let i = 0; i < 5; i++) {
            const x = (W * (i + 1) / 6) + Math.sin(t * 0.005 + i) * 30;
            ctx.beginPath();
            ctx.moveTo(x - 20, 0);
            ctx.lineTo(x + 40, H);
            ctx.lineTo(x - 40, H);
            ctx.closePath();
            ctx.fillStyle = '#ffffcc';
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
}

function drawWaterSurface(t, y = 30) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    for (let x = 0; x <= W; x += 5) {
        ctx.lineTo(x, y + Math.sin(x * 0.02 + t * 0.03) * 8 + Math.sin(x * 0.01 + t * 0.02) * 4);
    }
    ctx.lineTo(W, 0); ctx.lineTo(0, 0); ctx.closePath();
    ctx.fillStyle = 'rgba(135,206,235,0.3)';
    ctx.fill();
}

function drawSandFloor(y, t) {
    ctx.fillStyle = '#c2a366';
    ctx.beginPath();
    ctx.moveTo(0, y);
    for (let x = 0; x <= W; x += 10) {
        ctx.lineTo(x, y + Math.sin(x * 0.03 + t * 0.005) * 5);
    }
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    ctx.fill();
    // Sand texture dots
    ctx.fillStyle = '#b89a5a';
    for (let i = 0; i < 30; i++) {
        const sx = (i * 37 + t * 0.1) % W;
        const sy = y + 10 + (i * 13) % 40;
        ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI * 2); ctx.fill();
    }
}

function drawBoardwalkAbove(t) {
    // Wooden planks from below
    const planksY = 20;
    for (let i = 0; i < 12; i++) {
        const px = i * 85 - (t * 0.3) % 85;
        ctx.fillStyle = i % 2 === 0 ? '#5c3a1e' : '#6b4423';
        ctx.fillRect(px, planksY, 80, 25);
        // Wood grain
        ctx.strokeStyle = '#4a2e16';
        ctx.lineWidth = 0.5;
        for (let g = 0; g < 3; g++) {
            ctx.beginPath();
            ctx.moveTo(px, planksY + 5 + g * 7);
            ctx.lineTo(px + 80, planksY + 5 + g * 7 + Math.sin(g) * 2);
            ctx.stroke();
        }
        // Light through cracks
        if (i % 3 === 0) {
            ctx.fillStyle = 'rgba(255,255,220,0.4)';
            ctx.fillRect(px + 80, planksY, 5, 25);
            // Light beam
            ctx.beginPath();
            ctx.moveTo(px + 80, planksY + 25);
            ctx.lineTo(px + 60, planksY + 200);
            ctx.lineTo(px + 100, planksY + 200);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,200,0.06)';
            ctx.fill();
        }
    }
    // Boardwalk support pillars
    for (let i = 0; i < 3; i++) {
        const px = 150 + i * 300;
        ctx.fillStyle = '#4a3018';
        ctx.fillRect(px, planksY + 25, 12, H - planksY);
        ctx.fillStyle = '#3d2612';
        ctx.fillRect(px + 2, planksY + 25, 2, H - planksY);
    }
}

function drawSeaweed(x, y, h, t, color = '#2d7a3a') {
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y);
    for (let i = 0; i < h; i += 5) {
        ctx.lineTo(x + Math.sin((y - i) * 0.05 + t * 0.02) * 12, y - i);
    }
    ctx.stroke();
    // Leaves
    for (let i = 10; i < h; i += 15) {
        ctx.fillStyle = color;
        ctx.beginPath();
        const lx = x + Math.sin((y - i) * 0.05 + t * 0.02) * 12;
        ctx.ellipse(lx + 6, y - i, 8, 3, Math.sin(t * 0.02 + i) * 0.3, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawCoral_bg(x, y, t) {
    // Background coral decoration
    const colors = ['#ff6b6b', '#ff8e8e', '#e74c3c', '#ff4757'];
    for (let i = 0; i < 3; i++) {
        ctx.fillStyle = colors[i % colors.length];
        ctx.beginPath();
        const bx = x + i * 15;
        const by = y;
        ctx.moveTo(bx, by);
        for (let a = 0; a < Math.PI; a += 0.3) {
            const r = 12 + Math.sin(a * 3 + t * 0.01) * 4;
            ctx.lineTo(bx + Math.cos(a) * r * (i + 1) * 0.5, by - Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
    }
}

// ============ CHARACTER DRAWING ============
function drawShelly(x, y, scale = 1, anim = 0) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    // Body (orange)
    ctx.fillStyle = '#e67e22';
    ctx.beginPath();
    ctx.ellipse(0, 0, 16, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Shell on back (spiral)
    ctx.fillStyle = '#c19a6b';
    ctx.beginPath();
    ctx.arc(-5, -8, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#a0764a';
    ctx.beginPath();
    ctx.arc(-5, -8, 10, 0, Math.PI * 2);
    ctx.fill();
    // Spiral detail
    ctx.strokeStyle = '#8b6339';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let a = 0; a < Math.PI * 3; a += 0.2) {
        const r = 2 + a * 1.5;
        ctx.lineTo(-5 + Math.cos(a) * r, -8 + Math.sin(a) * r);
    }
    ctx.stroke();
    // Eye stalks
    const eyeAnim = Math.sin(anim * 0.1) * 2;
    ctx.strokeStyle = '#e67e22';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(6, -4); ctx.lineTo(10, -14 + eyeAnim); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, -4); ctx.lineTo(16, -14 + eyeAnim); ctx.stroke();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(10, -15 + eyeAnim, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(16, -15 + eyeAnim, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(11, -15 + eyeAnim, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(17, -15 + eyeAnim, 2, 0, Math.PI * 2); ctx.fill();
    // Claws
    ctx.fillStyle = '#d35400';
    const clawAnim = Math.sin(anim * 0.15) * 5;
    // Left claw
    ctx.beginPath();
    ctx.ellipse(-14, 6 + clawAnim, 6, 4, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-18, 3 + clawAnim, 4, 3, -0.5, 0, Math.PI * 2);
    ctx.fill();
    // Right claw
    ctx.beginPath();
    ctx.ellipse(14, 6 - clawAnim, 6, 4, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(18, 3 - clawAnim, 4, 3, 0.5, 0, Math.PI * 2);
    ctx.fill();
    // Legs
    ctx.strokeStyle = '#d35400';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
        const lx = -8 + i * 8;
        const la = Math.sin(anim * 0.2 + i) * 3;
        ctx.beginPath(); ctx.moveTo(lx, 8); ctx.lineTo(lx - 4, 14 + la); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(lx, 8); ctx.lineTo(lx + 4, 14 - la); ctx.stroke();
    }
    // Mouth
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(13, -4, 3, 0, Math.PI);

    ctx.restore();
}

function drawCoralChar(x, y, scale = 1, anim = 0) {

        ctx.lineTo(Math.cos(angle + armWiggle) * 22, Math.sin(angle + armWiggle) * 22);

function drawPearl(x, y, scale = 1, anim = 0) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    // Tentacles
    ctx.strokeStyle = '#7b4ec2';
    ctx.lineWidth = 4;
    for (let i = 0; i < 8; i++) {
        const angle = (i * Math.PI * 2) / 8 + Math.PI * 0.15;
        ctx.beginPath();
        const sx = Math.cos(angle) * 12;
        const sy = Math.sin(angle) * 12 + 8;
        ctx.moveTo(sx, sy);
        const wave = Math.sin(anim * 0.1 + i * 0.8) * 8;
        ctx.quadraticCurveTo(
            sx + Math.cos(angle) * 15 + wave,
            sy + Math.sin(angle) * 15,
            sx + Math.cos(angle) * 25 + wave * 0.5,
            sy + Math.sin(angle) * 25
        );
        ctx.stroke();
    }
    // Head/body
    ctx.fillStyle = '#9370db';
    ctx.beginPath();
    ctx.ellipse(0, -2, 18, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    // Face
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-6, -6, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(6, -6, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(-5, -6, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, -6, 2, 0, Math.PI * 2); ctx.fill();
    // Elegant smile
    ctx.strokeStyle = '#5b3a8a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0.2, Math.PI - 0.2);
    ctx.stroke();
    // Beret
    ctx.fillStyle = '#c0392b';
    ctx.beginPath();
    ctx.ellipse(2, -20, 12, 5, 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.arc(8, -22, 3, 0, Math.PI * 2);
    ctx.fill();
    // Paint splotches
    const splotchColors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71'];
    for (let i = 0; i < 4; i++) {
        ctx.fillStyle = splotchColors[i];
        ctx.beginPath();
        ctx.arc(-12 + i * 6 + Math.sin(i) * 3, 8 + Math.cos(i) * 4, 2, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

function drawTurtle(x, y, scale = 1, anim = 0) {

    ctx.beginPath(); ctx.arc(43, -8, 2.5, 0, Math.PI * 2); ctx.fill();

    ctx.beginPath(); ctx.ellipse(-25, -20 + flipAnim, 12, 5, -0.3, 0, Math.PI * 2); ctx.fill();

function drawFish(x, y, color, size, anim, dir = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(dir, 1);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(0, 0, size, size * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tail
    ctx.beginPath();
    ctx.moveTo(-size, 0);
    ctx.lineTo(-size - size * 0.5, -size * 0.4 + Math.sin(anim * 0.3) * 2);
    ctx.lineTo(-size - size * 0.5, size * 0.4 + Math.sin(anim * 0.3) * 2);
    ctx.closePath();
    ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(size * 0.4, -size * 0.15, size * 0.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(size * 0.45, -size * 0.15, size * 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

function drawAnemone(x, y, color, size, anim) {
    ctx.fillStyle = color;
    // Base
    ctx.beginPath();
    ctx.ellipse(x, y, size * 0.8, size * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tentacles
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI - Math.PI * 0.1;
        const wave = Math.sin(anim * 0.03 + i * 0.7) * 5;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(angle) * size * 0.3, y - size * 0.1);
        ctx.quadraticCurveTo(
            x + Math.cos(angle) * size * 0.6 + wave,
            y - size * 0.7,
            x + Math.cos(angle) * size * 0.5 + wave * 1.5,
            y - size
        );
        ctx.stroke();
        // Tip
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + Math.cos(angle) * size * 0.5 + wave * 1.5, y - size, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ============ SUBTITLE SYSTEM ============
let currentSub = { text: '', color: '#fff', show: false };

function showSubtitle(text, color = '#fff') {
    currentSub = { text, color, show: true };
    sub.textContent = text;
    sub.style.color = color;
    sub.classList.add('show');
}

function hideSubtitle() {
    currentSub.show = false;
    sub.classList.remove('show');
}

// ============ SCENE DEFINITIONS ============
const scenes = [];

// Helper: timing within scene
function sceneAt(elapsed, start, end) {
    return elapsed >= start && elapsed < end;
}
function sceneProg(elapsed, start, end) {
    return Math.max(0, Math.min(1, (elapsed - start) / (end - start)));
}

// SCENE 0: TITLE (15s)
scenes.push({
    duration: 15,
    musicStart: musicTropical,
    dialogues: [
        { time: 1, text: 'STREAMFLIX PRESENTS', color: COLORS.narrator, char: null },
        { time: 5, text: 'UNDER THE BOARDWALK', color: '#ffd700', char: null },
        { time: 10, text: 'A tale of courage beneath the waves...', color: COLORS.narrator, char: 'narrator', speech: 'A tale of courage beneath the waves.' }
    ],
    render(t, dt) {
        // Ocean background
        drawGradientRect(0, 0, W, H, '#0077be', '#004477');
        // Waves
        for (let w = 0; w < 3; w++) {
            ctx.fillStyle = `rgba(0,100,180,${0.2 + w * 0.1})`;
            ctx.beginPath();
            ctx.moveTo(0, H * 0.4 + w * 40);
            for (let x = 0; x <= W; x += 8) {
                ctx.lineTo(x, H * 0.4 + w * 40 + Math.sin(x * 0.015 + t * 0.03 + w) * 15);
            }
            ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
            ctx.fill();
        }
        // Sandy bottom
        drawSandFloor(H * 0.8, t);
        // Swimming fish
        for (let i = 0; i < 6; i++) {
            const fx = ((t * (0.5 + i * 0.2) + i * 200) % (W + 100)) - 50;
            const fy = H * 0.3 + i * 50 + Math.sin(t * 0.02 + i) * 20;
            drawFish(fx, fy, ['#ff6b6b','#4ecdc4','#ffe66d','#a8e6cf','#ff8b94','#6c5ce7'][i], 10 + i * 2, t, 1);
        }
        // Bubbles
        if (t % 20 === 0) emitBubbles(Math.random() * W, H * 0.7, 3);
        // Title text - "STREAMFLIX PRESENTS"
        if (sceneAt(t, 30, 240)) {
            const alpha = Math.min(1, sceneProg(t, 30, 90)) * (t < 200 ? 1 : 1 - sceneProg(t, 200, 240));
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 28px "Segoe UI", Arial';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText('STREAMFLIX PRESENTS', W / 2, H * 0.25);
            ctx.globalAlpha = 1;
        }
        // Main title
        if (t > 180) {
            const alpha = Math.min(1, sceneProg(t, 180, 300));
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 56px "Segoe UI", Arial';
            ctx.fillStyle = '#ffd700';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 15;
            const titleY = H * 0.45 + Math.sin(t * 0.02) * 5;
            ctx.fillText('UNDER THE', W / 2, titleY - 30);
            ctx.fillText('BOARDWALK', W / 2, titleY + 30);
            ctx.shadowBlur = 0;
            // Shell decorations
            for (let i = 0; i < 6; i++) {
                const sx = W * 0.25 + i * (W * 0.1);
                const sy = titleY + 55 + Math.sin(t * 0.03 + i) * 3;
                ctx.fillStyle = ['#c19a6b','#ff69b4','#ffd700','#20b2aa','#ff8c00','#9370db'][i];
                ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        drawParticles();
    }
});

// Calculate total duration
totalDuration = scenes.reduce((sum, s) => sum + s.duration, 0);

// ============ DIALOGUE SCHEDULING ============
let activeDialogues = [];
let lastDialogueIndex = -1;

function checkDialogues() {
    const scene = scenes[currentScene];
    if (!scene || !scene.dialogues) return;
    for (let i = 0; i < scene.dialogues.length; i++) {
        const d = scene.dialogues[i];
        const dTimeFrames = d.time * 60;
        const dialogueKey = currentScene * 1000 + i;
        if (sceneTime >= dTimeFrames && sceneTime < dTimeFrames + 10 && lastDialogueIndex !== dialogueKey) {
            lastDialogueIndex = dialogueKey;
            showSubtitle(d.text, d.color);
            if (d.speech && d.char) {
                speak(d.speech, d.char);
            }
        }
    }
    // Hide subtitle after last dialogue's time + some duration
    const lastD = scene.dialogues[scene.dialogues.length - 1];
    if (lastD && sceneTime > lastD.time * 60 + 240) {
        // Keep showing last subtitle until scene ends
    }
}

// ============ MAIN LOOP ============
let lastTime = 0;

function update(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min(33, timestamp - lastTime);
    lastTime = timestamp;

    if (playing) {
        globalAnimFrame++;
        sceneTime++;
        currentTime += 1/60;

        // Check scene transitions
        const scene = scenes[currentScene];
        if (scene && sceneTime >= scene.duration * 60) {
            // Transition to next scene
            if (currentScene < scenes.length - 1) {
                currentScene++;
                sceneTime = 0;
                lastDialogueIndex = -1;
                hideSubtitle();
                fadeAlpha = 1;
                particles = [];
                // Start scene music
                if (scenes[currentScene].musicStart) {
                    scenes[currentScene].musicStart();
                }
            } else {
                // Movie ended
                playing = false;
                btnPlay.innerHTML = '&#9654;';
                stopMusic();
            }
        }

        checkDialogues();
    }

    render();
    requestAnimationFrame(update);
}

function render() {
    ctx.clearRect(0, 0, W, H);

    // Render current scene
    if (scenes[currentScene]) {
        scenes[currentScene].render(sceneTime, 1);
    }

    // Fade transition
    if (fadeAlpha > 0) {
        ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`;
        ctx.fillRect(0, 0, W, H);
        fadeAlpha = Math.max(0, fadeAlpha - 0.016); // ~1.5s fade
    }

    updateParticles();

    // Update progress bar
    const elapsed = scenes.slice(0, currentScene).reduce((s, sc) => s + sc.duration, 0) + sceneTime / 60;
    const prog = Math.min(100, (elapsed / totalDuration) * 100);
    progBar.style.width = prog + '%';

    // Update time display
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60);
    const totalMins = Math.floor(totalDuration / 60);
    const totalSecs = Math.floor(totalDuration % 60);
    timeEl.textContent = `${mins}:${secs.toString().padStart(2,'0')} / ${totalMins}:${totalSecs.toString().padStart(2,'0')}`;
}

// ============ CONTROLS ============
function togglePlay() {
    initAudio();
    if (!playing) {
        playing = true;
        btnPlay.innerHTML = '&#10074;&#10074;';
        if (scenes[currentScene] && scenes[currentScene].musicStart) {
            scenes[currentScene].musicStart();
        }
        loading.style.display = 'none';
    } else {
        playing = false;
        btnPlay.innerHTML = '&#9654;';
        stopMusic();
        stopSpeech();
    }
}

btnPlay.addEventListener('click', togglePlay);

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
});

// Voice toggle
btnVoice.addEventListener('click', () => {
    voiceOn = !voiceOn;
    btnVoice.innerHTML = voiceOn ? '&#128266;' : '&#128264;';
    if (!voiceOn) stopSpeech();
});

// Fullscreen
btnFs.addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(resize).catch(()=>{});
    } else {
        document.exitFullscreen().then(resize).catch(()=>{});
    }
});

// Progress bar seeking
progWrap.addEventListener('click', e => {
    const rect = progWrap.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const targetTime = pct * totalDuration;
    // Find the right scene
    let acc = 0;
    for (let i = 0; i < scenes.length; i++) {
        if (acc + scenes[i].duration > targetTime) {
            currentScene = i;
            sceneTime = Math.floor((targetTime - acc) * 60);
            currentTime = targetTime;
            lastDialogueIndex = -1;
            hideSubtitle();
            particles = [];
            fadeAlpha = 0;
            if (playing && scenes[i].musicStart) scenes[i].musicStart();
            break;
        }
        acc += scenes[i].duration;
    }
});

// Load voices
if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
}

// Start
loading.textContent = 'Click ▶ to play';
requestAnimationFrame(update);
