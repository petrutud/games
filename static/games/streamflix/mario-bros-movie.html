<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Super Mario Bros. Movie - StreamFlix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;width:100vw;user-select:none}
#cinema{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#letterbox-top,#letterbox-bottom{position:absolute;left:0;width:100%;background:#000;z-index:10;pointer-events:none}
#letterbox-top{top:0}
#letterbox-bottom{bottom:0}
canvas{display:block;z-index:1}
#controls{position:absolute;bottom:0;left:0;right:0;z-index:20;background:linear-gradient(transparent,rgba(0,0,0,.9));padding:12px 20px 18px;display:flex;flex-direction:column;gap:8px;opacity:0;transition:opacity .3s}
#cinema:hover #controls,#controls.show{opacity:1}
#progress-container{width:100%;height:6px;background:rgba(255,255,255,.2);border-radius:3px;cursor:pointer;position:relative}
#progress-container:hover{height:10px;margin-top:-2px}
#progress-bar{height:100%;background:linear-gradient(90deg,#e52521,#fbd000);border-radius:3px;width:0%;transition:width .1s linear;pointer-events:none}
#progress-buffer{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.1);border-radius:3px;pointer-events:none}
#btn-row{display:flex;align-items:center;gap:16px}
.ctrl-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:20px;padding:4px 8px;opacity:.85;transition:opacity .2s}
.ctrl-btn:hover{opacity:1}
#time-display{font-size:13px;color:#ccc;font-variant-numeric:tabular-nums}
#title-display{flex:1;text-align:center;font-size:14px;color:#aaa;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#back-btn{position:absolute;top:20px;left:20px;z-index:30;background:rgba(0,0,0,.6);border:none;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:14px;opacity:0;transition:opacity .3s;text-decoration:none;display:flex;align-items:center;gap:6px}
#cinema:hover #back-btn{opacity:.8}
#back-btn:hover{opacity:1;background:rgba(255,255,255,.15)}
#scene-indicator{position:absolute;top:20px;right:20px;z-index:30;color:#aaa;font-size:12px;opacity:0;transition:opacity .3s}
#cinema:hover #scene-indicator{opacity:.7}
</style>
</head>
<body>
<div id="cinema">
  <div id="letterbox-top"></div>
  <canvas id="c"></canvas>
  <div id="letterbox-bottom"></div>
  <a href="/games/streamflix/" id="back-btn">&#9664; Back</a>
  <div id="scene-indicator"></div>
  <div id="controls" class="show">
    <div id="progress-container"><div id="progress-buffer"></div><div id="progress-bar"></div></div>
    <div id="btn-row">
      <button class="ctrl-btn" id="play-btn">&#9654;</button>
      <span id="time-display">0:00 / 0:00</span>
      <span id="title-display">The Super Mario Bros. Movie</span>
      <button class="ctrl-btn" id="voice-btn" title="Toggle Voice Acting">&#128266;</button>
      <button class="ctrl-btn" id="fs-btn">&#x26F6;</button>
    </div>
  </div>
</div>

<script>
// ===== MOVIE ENGINE =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
canvas.width = W; canvas.height = H;

let playing = false, globalTime = 0, lastTimestamp = 0;
let currentScene = 0, sceneTime = 0;
let fadeAlpha = 0, fadeDir = 0, fadePause = 0;
let controlsTimeout;

// Scene definitions
const scenes = [
  {name:"Title Sequence", duration:15},
  {name:"Brooklyn", duration:15},
  {name:"The Plumbing Job", duration:12},
  {name:"The Mysterious Pipe", duration:15},
  {name:"Separated", duration:15},
  {name:"Mushroom Kingdom", duration:15},
  {name:"Bowser's Dark Lands", duration:15},
  {name:"Princess Peach", duration:15},
  {name:"Training Montage", duration:15},
  {name:"Journey to Kong Kingdom", duration:12},
  {name:"Cranky Kong's Challenge", duration:15},
  {name:"Mario vs Donkey Kong", duration:18},
  {name:"Rainbow Road", duration:15},
  {name:"Rainbow Road Battle", duration:15},
  {name:"Belly of the Beast", duration:12},
  {name:"Bowser Invades", duration:15},
  {name:"Mario Returns", duration:15},
  {name:"Final Battle", duration:18},
  {name:"Victory", duration:15},
  {name:"Ending + Credits", duration:20}
];
const TRANSITION_TIME = 1.5;
const totalDuration = scenes.reduce((s,sc)=>s+sc.duration,0);

// ===== AUDIO ENGINE =====
let audioCtx, masterGain;
let currentMusicNodes = [];

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.25;
  masterGain.connect(audioCtx.destination);
}

function stopMusic(){
  currentMusicNodes.forEach(n=>{try{n.stop();n.disconnect()}catch(e){}});
  currentMusicNodes=[];
}

function playNote(freq, startTime, duration, type='square', gainVal=0.12){
  if(!audioCtx)return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(gainVal, startTime);
  g.gain.exponentialRampToValueAtTime(0.001, startTime+duration-0.01);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(startTime);
  osc.stop(startTime+duration);
  currentMusicNodes.push(osc);
  return osc;
}

function playBass(freq, startTime, duration, gainVal=0.15){
  return playNote(freq, startTime, duration, 'triangle', gainVal);
}

function playDrum(startTime, type='kick'){
  if(!audioCtx)return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  if(type==='kick'){
    osc.type='sine';
    osc.frequency.setValueAtTime(150,startTime);
    osc.frequency.exponentialRampToValueAtTime(40,startTime+0.15);
    g.gain.setValueAtTime(0.3,startTime);
    g.gain.exponentialRampToValueAtTime(0.001,startTime+0.15);
  } else {
    osc.type='square';
    osc.frequency.setValueAtTime(800,startTime);
    osc.frequency.exponentialRampToValueAtTime(200,startTime+0.05);
    g.gain.setValueAtTime(0.08,startTime);
    g.gain.exponentialRampToValueAtTime(0.001,startTime+0.06);
  }
  osc.connect(g);g.connect(masterGain);
  osc.start(startTime);osc.stop(startTime+0.2);
  currentMusicNodes.push(osc);
}

const NOTE={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,B3:246.94,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.26,F5:698.46,G5:783.99,A5:880,Bb3:233.08,Eb4:311.13,Ab3:207.65,Bb4:466.16,Db4:277.18,Gb4:369.99,Fs4:369.99,Fs3:185,Cs4:277.18};

let lastSceneMusic = -1;

function updateMusic(sceneIdx){
  if(sceneIdx === lastSceneMusic) return;
  lastSceneMusic = sceneIdx;
  stopMusic();
  if(!audioCtx) return;
  const t = audioCtx.currentTime + 0.05;
  const bpm = 140;
  const beat = 60/bpm;

  if(sceneIdx===0){ // Title - upbeat Mario theme
    const melody=[NOTE.E5,NOTE.E5,0,NOTE.E5,0,NOTE.C5,NOTE.E5,0,NOTE.G5,0,0,0,NOTE.G4,0,0,0];
    const bassLine=[NOTE.G3,0,0,NOTE.G3,0,0,NOTE.G3,0,NOTE.C3,0,0,NOTE.C3,0,0,NOTE.C3,0];
    for(let loop=0;loop<4;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.5+i*beat*0.5;
        if(melody[i])playNote(melody[i],nt,beat*0.45,'square',0.1);
        if(bassLine[i])playBass(bassLine[i],nt,beat*0.45,0.12);
        if(i%4===0)playDrum(nt,'kick');
        if(i%4===2)playDrum(nt,'snare');
      }
    }
  } else if(sceneIdx===1||sceneIdx===2){ // Brooklyn - jazzy urban
    const melody=[NOTE.C4,NOTE.E4,NOTE.G4,NOTE.A4,NOTE.G4,NOTE.E4,NOTE.C4,NOTE.D4,NOTE.F4,NOTE.A4,NOTE.G4,NOTE.F4,NOTE.E4,NOTE.D4,NOTE.C4,0];
    for(let loop=0;loop<4;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.5+i*beat*0.5;
        if(melody[i])playNote(melody[i],nt,beat*0.45,'triangle',0.1);
        if(i%4===0)playBass(NOTE.C3,nt,beat*0.9,0.1);
        if(i%8===4)playBass(NOTE.F3,nt,beat*0.9,0.1);
        if(i%4===0)playDrum(nt,'kick');
        if(i%4===2)playDrum(nt,'snare');
      }
    }
  } else if(sceneIdx===3||sceneIdx===4){ // Mysterious/tense
    const melody=[NOTE.E4,0,NOTE.G4,0,NOTE.Bb4,0,NOTE.A4,0,NOTE.E4,0,NOTE.Db4,0,NOTE.E4,0,0,0];
    for(let loop=0;loop<5;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.6+i*beat*0.6;
        if(melody[i])playNote(melody[i],nt,beat*0.55,'sine',0.08);
        if(i%8===0)playBass(NOTE.E3,nt,beat*2,0.1);
        if(i%4===0)playDrum(nt,'kick');
      }
    }
  } else if(sceneIdx===5){ // Mushroom Kingdom - magical/wonder
    const melody=[NOTE.C5,NOTE.E5,NOTE.G5,NOTE.E5,NOTE.C5,NOTE.D5,NOTE.F5,NOTE.A5,NOTE.G5,NOTE.E5,NOTE.D5,NOTE.C5,NOTE.E5,NOTE.G5,NOTE.C5,0];
    for(let loop=0;loop<4;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.45+i*beat*0.45;
        if(melody[i])playNote(melody[i],nt,beat*0.4,'square',0.07);
        if(melody[i])playNote(melody[i]*1.5,nt+0.05,beat*0.2,'sine',0.04);
        if(i%4===0)playBass(NOTE.C3,nt,beat*0.8,0.1);
        if(i%4===0)playDrum(nt,'kick');
        if(i%4===2)playDrum(nt,'snare');
      }
    }
  } else if(sceneIdx===6){ // Bowser's Dark Lands - dark/menacing
    const melody=[NOTE.E3,0,NOTE.E3,NOTE.G3,NOTE.E3,0,NOTE.Bb3,NOTE.A3,NOTE.E3,0,NOTE.E3,NOTE.G3,NOTE.Fs3,0,NOTE.E3,0];
    for(let loop=0;loop<5;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.55+i*beat*0.55;
        if(melody[i])playNote(melody[i],nt,beat*0.5,'sawtooth',0.06);
        if(i%4===0)playBass(NOTE.E3*0.5,nt,beat*1.5,0.15);
        if(i%2===0)playDrum(nt,'kick');
      }
    }
  } else if(sceneIdx===7||sceneIdx===8){ // Peach/Training - heroic/energetic
    const melody=[NOTE.G4,NOTE.A4,NOTE.B4,NOTE.D5,NOTE.B4,NOTE.A4,NOTE.G4,NOTE.A4,NOTE.G4,NOTE.E4,NOTE.D4,NOTE.E4,NOTE.G4,NOTE.A4,NOTE.B4,NOTE.D5];
    for(let loop=0;loop<4;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.4+i*beat*0.4;
        if(melody[i])playNote(melody[i],nt,beat*0.35,'square',0.08);
        if(i%4===0)playBass(NOTE.G3,nt,beat*0.75,0.12);
        if(i%8===4)playBass(NOTE.D3,nt,beat*0.75,0.12);
        if(i%4===0)playDrum(nt,'kick');
        if(i%4===2)playDrum(nt,'snare');
      }
    }
  } else if(sceneIdx===9||sceneIdx===10||sceneIdx===11){ // Kong Kingdom - tribal/battle
    const melody=[NOTE.D4,NOTE.F4,NOTE.A4,NOTE.D5,NOTE.A4,NOTE.F4,NOTE.D4,NOTE.E4,NOTE.G4,NOTE.B4,NOTE.E5,NOTE.B4,NOTE.G4,NOTE.E4,NOTE.D4,0];
    for(let loop=0;loop<4;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.4+i*beat*0.4;
        if(melody[i])playNote(melody[i],nt,beat*0.35,'square',0.08);
        if(i%2===0)playBass(NOTE.D3,nt,beat*0.35,0.12);
        playDrum(nt,i%2===0?'kick':'snare');
      }
    }
  } else if(sceneIdx===12||sceneIdx===13){ // Rainbow Road - exciting/racing
    const melody=[NOTE.C5,NOTE.D5,NOTE.E5,NOTE.G5,NOTE.E5,NOTE.D5,NOTE.C5,NOTE.G4,NOTE.A4,NOTE.B4,NOTE.D5,NOTE.E5,NOTE.D5,NOTE.B4,NOTE.A4,NOTE.G4];
    for(let loop=0;loop<4;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.35+i*beat*0.35;
        if(melody[i])playNote(melody[i],nt,beat*0.3,'square',0.07);
        if(melody[i])playNote(melody[i]*2,nt,beat*0.15,'sine',0.03);
        if(i%4===0)playBass(NOTE.C3,nt,beat*0.65,0.12);
        if(i%4===2)playBass(NOTE.G3,nt,beat*0.65,0.12);
        playDrum(nt,i%2===0?'kick':'snare');
      }
    }
  } else if(sceneIdx===14||sceneIdx===15){ // Dark/invasion - intense
    const melody=[NOTE.E4,NOTE.E4,NOTE.Bb4,NOTE.A4,NOTE.E4,NOTE.E4,NOTE.G4,NOTE.Fs4,NOTE.E4,NOTE.E4,NOTE.Bb4,NOTE.A4,NOTE.G4,NOTE.Fs4,NOTE.E4,0];
    for(let loop=0;loop<4;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.45+i*beat*0.45;
        if(melody[i])playNote(melody[i],nt,beat*0.4,'sawtooth',0.07);
        if(i%4===0)playBass(NOTE.E3*0.5,nt,beat*1.2,0.14);
        playDrum(nt,i%2===0?'kick':'snare');
      }
    }
  } else if(sceneIdx===16||sceneIdx===17){ // Epic battle - heroic/intense
    const melody=[NOTE.E5,NOTE.E5,NOTE.D5,NOTE.E5,NOTE.G5,NOTE.A5,NOTE.G5,NOTE.E5,NOTE.D5,NOTE.C5,NOTE.D5,NOTE.E5,NOTE.G5,NOTE.E5,NOTE.D5,NOTE.C5];
    for(let loop=0;loop<4;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.38+i*beat*0.38;
        if(melody[i])playNote(melody[i],nt,beat*0.33,'square',0.09);
        if(melody[i])playNote(melody[i]*0.5,nt,beat*0.33,'sawtooth',0.05);
        if(i%2===0)playBass(NOTE.C3,nt,beat*0.7,0.14);
        playDrum(nt,i%2===0?'kick':'snare');
      }
    }
  } else if(sceneIdx===18||sceneIdx===19){ // Victory/Credits - triumphant
    const melody=[NOTE.C5,NOTE.E5,NOTE.G5,NOTE.C5,NOTE.E5,NOTE.G5,NOTE.A5,NOTE.G5,NOTE.E5,NOTE.C5,NOTE.D5,NOTE.F5,NOTE.A5,NOTE.G5,NOTE.E5,NOTE.C5];
    for(let loop=0;loop<4;loop++){
      for(let i=0;i<melody.length;i++){
        const nt=t+loop*melody.length*beat*0.5+i*beat*0.5;
        if(melody[i])playNote(melody[i],nt,beat*0.45,'square',0.08);
        if(melody[i])playNote(melody[i]*1.5,nt+0.1,beat*0.25,'sine',0.04);
        if(i%4===0)playBass(NOTE.C3,nt,beat*1.5,0.12);
        if(i%4===0)playDrum(nt,'kick');
        if(i%4===2)playDrum(nt,'snare');
      }
    }
  }
}

// ===== VOICE ACTING SYSTEM =====
const voiceMgr = {
  enabled: true,
  available: !!(window.speechSynthesis),
  voices: [],
  englishVoice: null,
  lastText: '',
  lastSpeaker: '',
  charVoices: {
    'Narrator':     { pitch: 1.0, rate: 0.88, volume: 1.0 },
    'Mario':        { pitch: 1.35, rate: 1.05, volume: 1.0 },
    'Luigi':        { pitch: 1.4, rate: 0.9, volume: 0.95 },
    'Peach':        { pitch: 1.7, rate: 0.95, volume: 0.95 },
    'Bowser':       { pitch: 0.4, rate: 0.75, volume: 1.0 },
    'Toad':         { pitch: 1.9, rate: 1.25, volume: 0.9 },
    'Donkey Kong':  { pitch: 0.6, rate: 0.9, volume: 1.0 },
    'DK':           { pitch: 0.6, rate: 0.9, volume: 1.0 },
    'Cranky Kong':  { pitch: 0.7, rate: 0.8, volume: 0.95 },
    'Kamek':        { pitch: 1.5, rate: 1.1, volume: 0.9 }
  },
  init: function(){
    if(!this.available) return;
    const loadVoices = () => {
      this.voices = speechSynthesis.getVoices();
      this.englishVoice = this.voices.find(v => v.lang.startsWith('en')) || null;
    };
    loadVoices();
    if(speechSynthesis.onvoiceschanged !== undefined){
      speechSynthesis.onvoiceschanged = loadVoices;
    }
  },
  speak: function(text, speaker){
    if(!this.available || !this.enabled) return;
    if(text === this.lastText && speaker === this.lastSpeaker) return;
    this.lastText = text;
    this.lastSpeaker = speaker;
    try { speechSynthesis.cancel(); } catch(e){}
    const cleanText = text.replace(/^\*\s*/, '').replace(/\s*\*$/, '').replace(/\*/g, '');
    const utter = new SpeechSynthesisUtterance(cleanText);
    if(this.englishVoice) utter.voice = this.englishVoice;
    utter.lang = 'en-US';
    const config = this.charVoices[speaker] || this.charVoices['Narrator'];
    utter.pitch = config.pitch;
    utter.rate = config.rate;
    utter.volume = config.volume;
    try { speechSynthesis.speak(utter); } catch(e){}
  },
  stop: function(){
    this.lastText = '';
    this.lastSpeaker = '';
    if(!this.available) return;
    try { speechSynthesis.cancel(); } catch(e){}
  },
  toggle: function(){
    this.enabled = !this.enabled;
    if(!this.enabled) this.stop();
    document.getElementById('voice-btn').innerHTML = this.enabled ? '\u{1F50A}' : '\u{1F507}';
  }
};
voiceMgr.init();

// ===== DRAWING UTILITIES =====
function drawText(text, x, y, size, color='#fff', align='center', outline=true){
  ctx.save();
  ctx.font=`bold ${size}px 'Segoe UI', Arial, sans-serif`;
  ctx.textAlign=align;
  ctx.textBaseline='middle';
  if(outline){
    ctx.strokeStyle='#000';
    ctx.lineWidth=size>24?5:3;
    ctx.lineJoin='round';
    ctx.strokeText(text,x,y);
  }
  ctx.fillStyle=color;
  ctx.fillText(text,x,y);
  ctx.restore();
}

function drawDialogue(speaker, text, color='#fff'){
  const y = H - 80;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0, y-35, W, 80);
  if(speaker){
    drawText(speaker+":", 80, y-12, 18, color, 'left');
    drawText(text, 80, y+15, 20, '#fff', 'left');
  } else {
    drawText(text, W/2, y+2, 22, '#fff', 'center');
  }
  ctx.restore();
  // Trigger voice acting for this dialogue
  if(playing){
    voiceMgr.speak(text, speaker || 'Narrator');
  }
}

function easeInOut(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function easeOut(t){return 1-Math.pow(1-t,3)}
function lerp(a,b,t){return a+(b-a)*t}

// Particles
let particles = [];
function addParticle(x,y,vx,vy,life,color,size){
  particles.push({x,y,vx,vy,life,maxLife:life,color,size:size||3});
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=200*dt;
    p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  ctx.globalAlpha=1;
}

// Stars background
function drawStars(t, count=80){
  for(let i=0;i<count;i++){
    const x=(i*137.5+t*10*(i%3+1))%W;
    const y=(i*97.3+Math.sin(i+t)*20)%H;
    const brightness=0.3+0.7*Math.abs(Math.sin(t*2+i));
    ctx.globalAlpha=brightness;
    ctx.fillStyle='#fff';
    const s=1+i%3;
    ctx.fillRect(x,y,s,s);
  }
  ctx.globalAlpha=1;
}

// ===== CHARACTER DRAWING =====
function drawMario(x, y, scale=1, facing=1, frame=0){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale*facing, scale);
  const s=1; // base scale
  // Shoes
  ctx.fillStyle='#5C3317';
  ctx.fillRect(-12*s, 45*s, 11*s, 8*s);
  ctx.fillRect(2*s, 45*s, 11*s, 8*s);
  // Legs (blue overalls)
  ctx.fillStyle='#1560BD';
  ctx.fillRect(-10*s, 28*s, 9*s, 18*s);
  ctx.fillRect(2*s, 28*s, 9*s, 18*s);
  // Overall body
  ctx.fillStyle='#1560BD';
  ctx.fillRect(-12*s, 15*s, 25*s, 16*s);
  // Overall straps
  ctx.fillStyle='#FFD700';
  ctx.fillRect(-8*s, 15*s, 3*s, 3*s);
  ctx.fillRect(6*s, 15*s, 3*s, 3*s);
  // Red shirt
  ctx.fillStyle='#E52521';

function drawBowser(x, y, scale=1, invincible=false){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  const s=1;
  if(invincible){
    ctx.shadowColor=`hsl(${(globalTime*200)%360},100%,50%)`;
    ctx.shadowBlur=30;
  }
  // Shell
  ctx.fillStyle='#228B22';
  ctx.beginPath();ctx.ellipse(0,10*s,30*s,25*s,0,0,Math.PI*2);ctx.fill();
  // Shell spikes
  ctx.fillStyle='#fff';
  for(let i=-2;i<=2;i++){
    ctx.beginPath();
    const sx=i*12*s, sy=-8*s+Math.abs(i)*5*s;
    ctx.moveTo(sx-4*s,sy);ctx.lineTo(sx,sy-12*s);ctx.lineTo(sx+4*s,sy);
    ctx.closePath();ctx.fill();
  }
  // Body
  ctx.fillStyle='#F4A460';
  ctx.beginPath();ctx.ellipse(0,20*s,25*s,20*s,0,0.3,Math.PI-0.3);ctx.fill();
  // Belly
  ctx.fillStyle='#FFECD2';
  ctx.beginPath();ctx.ellipse(0,22*s,16*s,14*s,0,0.3,Math.PI-0.3);ctx.fill();
  // Legs
  ctx.fillStyle='#F4A460';
  ctx.fillRect(-20*s,35*s,14*s,15*s);
  ctx.fillRect(6*s,35*s,14*s,15*s);
  // Feet
  ctx.fillStyle='#F4A460';
  ctx.fillRect(-22*s,47*s,17*s,8*s);
  ctx.fillRect(5*s,47*s,17*s,8*s);
  // Claws
  ctx.fillStyle='#fff';
  for(let i=0;i<3;i++){
    ctx.fillRect(-22*s+i*5*s,47*s,3*s,4*s);
    ctx.fillRect(7*s+i*5*s,47*s,3*s,4*s);
  }
  // Arms
  ctx.fillStyle='#F4A460';
  ctx.fillRect(-32*s,8*s,10*s,18*s);
  ctx.fillRect(22*s,8*s,10*s,18*s);
  // Spiked arm bands
  ctx.fillStyle='#333';
  ctx.fillRect(-33*s,12*s,12*s,6*s);
  ctx.fillRect(21*s,12*s,12*s,6*s);
  ctx.fillStyle='#C0C0C0';
  for(let i=0;i<3;i++){
    ctx.beginPath();ctx.arc(-27*s+i*4*s,12*s,2*s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(24*s+i*4*s,12*s,2*s,0,Math.PI*2);ctx.fill();
  }
  // Head
  ctx.fillStyle='#F4A460';
  ctx.beginPath();ctx.ellipse(0,-18*s,22*s,18*s,0,0,Math.PI*2);ctx.fill();
  // Snout
  ctx.fillStyle='#FFECD2';
  ctx.beginPath();ctx.ellipse(8*s,-12*s,14*s,10*s,0,0,Math.PI*2);ctx.fill();
  // Nostrils
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.arc(12*s,-14*s,2*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(18*s,-14*s,2*s,0,Math.PI*2);ctx.fill();
  // Mouth/teeth
  ctx.fillStyle='#8B0000';
  ctx.beginPath();ctx.ellipse(8*s,-5*s,12*s,5*s,0,0,Math.PI);ctx.fill();
  ctx.fillStyle='#fff';
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.moveTo(-2*s+i*5*s,-5*s);
    ctx.lineTo(0.5*s+i*5*s,-1*s);
    ctx.lineTo(3*s+i*5*s,-5*s);
    ctx.fill();
  }
  // Eyes
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(-6*s,-22*s,6*s,7*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10*s,-22*s,6*s,7*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#E52521';
  ctx.beginPath();ctx.arc(-5*s,-22*s,3.5*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(11*s,-22*s,3.5*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-4*s,-22*s,2*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(12*s,-22*s,2*s,0,Math.PI*2);ctx.fill();
  // Eyebrows (angry)
  ctx.fillStyle='#D2691E';
  ctx.save();ctx.translate(-6*s,-30*s);ctx.rotate(-0.3);
  ctx.fillRect(-6*s,0,12*s,3*s);ctx.restore();
  ctx.save();ctx.translate(10*s,-30*s);ctx.rotate(0.3);
  ctx.fillRect(-6*s,0,12*s,3*s);ctx.restore();
  // Horns
  ctx.fillStyle='#FFFACD';
  ctx.beginPath();ctx.moveTo(-14*s,-30*s);ctx.lineTo(-10*s,-48*s);ctx.lineTo(-6*s,-30*s);ctx.fill();
  ctx.beginPath();ctx.moveTo(14*s,-30*s);ctx.lineTo(18*s,-48*s);ctx.lineTo(22*s,-30*s);ctx.fill();
  // Red hair
  ctx.fillStyle='#FF4500';
  ctx.beginPath();
  ctx.moveTo(-12*s,-33*s);
  for(let i=0;i<6;i++){
    ctx.lineTo(-8*s+i*5*s,-40*s-Math.sin(i*1.5+globalTime*3)*4*s);
    ctx.lineTo(-5*s+i*5*s,-33*s);
  }
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

  ctx.beginPath();ctx.arc(9*s,-14*s,2*s,0,Math.PI*2);ctx.fill();
  // Grumpy eyebrows
  ctx.fillStyle='#E8E8E8';
  ctx.fillRect(-9*s,-19*s,10*s,3*s);
  ctx.fillRect(3*s,-19*s,10*s,3*s);
  // Crown
  ctx.fillStyle='#FFD700';
  ctx.fillRect(-8*s,-28*s,16*s,5*s);
  ctx.beginPath();
  ctx.moveTo(-8*s,-28*s);ctx.lineTo(-5*s,-34*s);ctx.lineTo(-2*s,-28*s);
  ctx.moveTo(2*s,-28*s);ctx.lineTo(5*s,-34*s);ctx.lineTo(8*s,-28*s);ctx.fill();
  // Cane
  ctx.strokeStyle='#8B4513';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(18*s,0);ctx.lineTo(20*s,40*s);ctx.stroke();
  ctx.beginPath();ctx.arc(18*s,-2*s,4*s,Math.PI,0);ctx.stroke();
  ctx.restore();
}

function drawKamek(x, y, scale=1){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  const s=1;
  // Robe
  ctx.fillStyle='#1E40AF';
  ctx.beginPath();
  ctx.moveTo(-8*s,0);ctx.lineTo(-16*s,40*s);ctx.lineTo(16*s,40*s);ctx.lineTo(8*s,0);
  ctx.closePath();ctx.fill();
  // White trim
  ctx.fillStyle='#fff';
  ctx.fillRect(-6*s,0,12*s,4*s);
  // Head
  ctx.fillStyle='#9ACD32';
  ctx.beginPath();ctx.ellipse(0,-10*s,12*s,12*s,0,0,Math.PI*2);ctx.fill();
  // Snout
  ctx.fillStyle='#FFECD2';
  ctx.beginPath();ctx.ellipse(6*s,-6*s,8*s,6*s,0,0,Math.PI*2);ctx.fill();
  // Glasses
  ctx.strokeStyle='#000';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(-3*s,-12*s,5*s,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(7*s,-12*s,5*s,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(2*s,-12*s);ctx.lineTo(3*s,-12*s);ctx.stroke();
  // Eyes behind glasses
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-3*s,-12*s,2*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(7*s,-12*s,2*s,0,Math.PI*2);ctx.fill();
  // Hat
  ctx.fillStyle='#1E40AF';
  ctx.beginPath();
  ctx.moveTo(-14*s,-16*s);ctx.lineTo(0,-38*s);ctx.lineTo(14*s,-16*s);
  ctx.closePath();ctx.fill();
  // Star on hat
  ctx.fillStyle='#FFD700';
  ctx.font='bold 10px Arial';ctx.textAlign='center';
  ctx.fillText('\u2605',0,-26*s);
  // Wand
  ctx.strokeStyle='#8B4513';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(14*s,5*s);ctx.lineTo(28*s,-15*s);ctx.stroke();
  // Wand sparkle
  ctx.fillStyle='#FFD700';
  const sparkleT = globalTime*5;
  for(let i=0;i<3;i++){
    const a=sparkleT+i*2.1;
    const sx=28*s+Math.cos(a)*5*s;
    const sy=-15*s+Math.sin(a)*5*s;
    ctx.beginPath();ctx.arc(sx,sy,2*s,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawSuperStar(x, y, size=20, glow=true){
  ctx.save();
  ctx.translate(x,y);
  if(glow){
    ctx.shadowColor=`hsl(${(globalTime*100)%360},100%,70%)`;
    ctx.shadowBlur=20;
  }
  ctx.fillStyle='#FFD700';
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=i*Math.PI*2/5-Math.PI/2;
    const r=size;
    ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    const a2=a+Math.PI/5;
    ctx.lineTo(Math.cos(a2)*r*0.4,Math.sin(a2)*r*0.4);
  }
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-4,-3,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4,-3,2,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawQuestionBlock(x, y, size=30){
  ctx.fillStyle='#FFD700';
  ctx.fillRect(x-size/2,y-size/2,size,size);
  ctx.strokeStyle='#B8860B';
  ctx.lineWidth=2;
  ctx.strokeRect(x-size/2,y-size/2,size,size);
  ctx.fillStyle='#B8860B';
  ctx.font=`bold ${size*0.6}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('?',x,y+1);
}

function drawCoin(x, y, size=12, t=0){
  const sx=Math.abs(Math.sin(t*3+x*0.1))*size;
  ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.ellipse(x,y,sx,size,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#B8860B';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(x,y,sx,size,0,0,Math.PI*2);ctx.stroke();
}

function drawPipe(x, y, height=60, width=50){
  ctx.fillStyle='#049B0A';
  ctx.fillRect(x-width/2,y-height,width,height);
  ctx.fillRect(x-width/2-5,y-height,width+10,15);
  ctx.fillStyle='#06C90E';
  ctx.fillRect(x-width/2+4,y-height+15,8,height-15);
  ctx.strokeStyle='#036B03';ctx.lineWidth=2;
  ctx.strokeRect(x-width/2,y-height,width,height);
  ctx.strokeRect(x-width/2-5,y-height,width+10,15);
}

function drawBrick(x, y, w=30, h=20){
  ctx.fillStyle='#B8553A';
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#8B3A2A';ctx.lineWidth=1;
  ctx.strokeRect(x,y,w,h);
  ctx.strokeRect(x+w/2,y,0.5,h);
  ctx.strokeRect(x,y+h/2,w,0.5);
}

function drawMushroom(x, y, scale=1, color='#E52521'){
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
  ctx.fillStyle='#FFECD2';
  ctx.fillRect(-6,2,12,10);
  ctx.fillStyle=color;
  ctx.beginPath();ctx.ellipse(0,-2,14,12,0,Math.PI,0);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-6,-6,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6,-6,4,0,Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-3,4,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,4,1.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawFireball(x, y, size=8){
  ctx.fillStyle='#FF4500';
  ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.arc(x-1,y-1,size*0.6,0,Math.PI*2);ctx.fill();
}

function drawYoshiEgg(x, y, scale=1){
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
  ctx.fillStyle='#90EE90';
  ctx.beginPath();ctx.ellipse(0,0,16,20,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-5,-5,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5,-3,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(0,5,5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawYoshi(x, y, scale=1){
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
  // Body
  ctx.fillStyle='#32CD32';
  ctx.beginPath();ctx.ellipse(0,10,16,14,0,0,Math.PI*2);ctx.fill();
  // Belly
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(2,12,10,10,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#32CD32';
  ctx.beginPath();ctx.ellipse(8,-10,14,12,0.2,0,Math.PI*2);ctx.fill();
  // Nose/snout
  ctx.fillStyle='#32CD32';
  ctx.beginPath();ctx.ellipse(22,-10,8,6,0,0,Math.PI*2);ctx.fill();
  // Nostril
  ctx.fillStyle='#228B22';
  ctx.beginPath();ctx.arc(26,-10,2,0,Math.PI*2);ctx.fill();
  // Eye
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(10,-16,6,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(12,-16,3,0,Math.PI*2);ctx.fill();
  // Shell (red)
  ctx.fillStyle='#E52521';
  ctx.beginPath();ctx.ellipse(-2,4,10,8,0,0,Math.PI*2);ctx.fill();
  // Arms
  ctx.fillStyle='#32CD32';
  ctx.fillRect(-12,4,6,10);
  ctx.fillRect(10,4,6,10);
  // Shoes
  ctx.fillStyle='#FF8C00';
  ctx.fillRect(-10,22,10,5);
  ctx.fillRect(4,22,10,5);
  ctx.restore();
}

// ===== BACKGROUND DRAWING =====
function drawSky(topColor='#87CEEB',bottomColor='#B0E0E6'){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,topColor);g.addColorStop(1,bottomColor);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawSunset(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a0533');g.addColorStop(0.3,'#FF6B35');
  g.addColorStop(0.5,'#FF8C42');g.addColorStop(0.7,'#FFA07A');
  g.addColorStop(1,'#2a1a3a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawDarkLands(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a0000');g.addColorStop(0.5,'#330000');
  g.addColorStop(0.8,'#4a1500');g.addColorStop(1,'#FF4500');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawGround(y=H-60, color='#228B22', dirtColor='#8B4513'){
  ctx.fillStyle=dirtColor;ctx.fillRect(0,y,W,H-y);
  ctx.fillStyle=color;ctx.fillRect(0,y,W,15);
}

function drawHills(y, t, color1='#2E8B57', color2='#3CB371'){
  for(let i=0;i<6;i++){
    const hx = ((i*280-t*15)%1600+1600)%1600-200;
    const hh = 60+Math.sin(i*1.5)*30;
    ctx.fillStyle=i%2===0?color1:color2;
    ctx.beginPath();
    ctx.arc(hx,y,hh,Math.PI,0);
    ctx.fill();
  }
}

function drawClouds(y, t, count=5){
  ctx.fillStyle='rgba(255,255,255,0.8)';
  for(let i=0;i<count;i++){
    const cx=((i*310+t*20*(i%2+1))%1500+1500)%1500-100;
    const cy=y+Math.sin(i*2)*30;
    ctx.beginPath();
    ctx.arc(cx,cy,25,0,Math.PI*2);
    ctx.arc(cx+20,cy-10,20,0,Math.PI*2);
    ctx.arc(cx+40,cy,22,0,Math.PI*2);
    ctx.arc(cx+18,cy+5,18,0,Math.PI*2);
    ctx.fill();
  }
}

function drawBuilding(x, y, w, h, color='#444'){
  ctx.fillStyle=color;
  ctx.fillRect(x,y-h,w,h);
  // Windows
  ctx.fillStyle='#FFD700';
  const ww=6, wh=8, gap=14;
  for(let wy=y-h+15;wy<y-10;wy+=gap){
    for(let wx=x+8;wx<x+w-8;wx+=gap){
      if(Math.random()>0.2){
        ctx.fillStyle=Math.random()>0.5?'#FFD700':'#FFA500';
        ctx.fillRect(wx,wy,ww,wh);
      }
    }
  }
}

function drawBrooklynSkyline(t){
  drawSunset();
  // Sun
  ctx.fillStyle='#FF6347';
  ctx.beginPath();ctx.arc(W*0.7,H*0.35,60,0,Math.PI*2);ctx.fill();
  // Bridge silhouette
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(0,H-140,W,10);
  // Bridge towers
  ctx.fillRect(200,H-250,20,120);
  ctx.fillRect(500,H-250,20,120);
  // Bridge cables
  ctx.strokeStyle='#1a1a2e';ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(200,H-250);
  ctx.quadraticCurveTo(350,H-160,500,H-250);
  ctx.stroke();
  // Buildings
  const buildings=[
    {x:30,h:200,w:60,c:'#2a2a3e'},{x:100,h:280,w:45,c:'#333355'},
    {x:160,h:180,w:70,c:'#2d2d44'},{x:600,h:250,w:55,c:'#2a2a3e'},
    {x:670,h:320,w:50,c:'#333355'},{x:740,h:200,w:65,c:'#2d2d44'},
    {x:820,h:260,w:55,c:'#2a2a3e'},{x:900,h:190,w:70,c:'#333355'},
    {x:980,h:300,w:50,c:'#2d2d44'},{x:1050,h:220,w:60,c:'#2a2a3e'},
    {x:1130,h:270,w:55,c:'#333355'},
  ];
  buildings.forEach(b=>drawBuilding(b.x,H-60,b.w,b.h,b.c));
  // Water
  ctx.fillStyle='rgba(30,40,80,0.7)';
  ctx.fillRect(0,H-60,W,60);
  // Water reflections
  for(let i=0;i<20;i++){
    ctx.fillStyle=`rgba(255,165,0,${0.1+Math.sin(t*2+i)*0.05})`;
    ctx.fillRect(i*65+Math.sin(t+i)*10,H-55+Math.sin(t*1.5+i)*3,40,2);
  }
}

function drawMushroomKingdom(t){
  drawSky();
  drawClouds(60,t);
  // Floating ? blocks
  for(let i=0;i<4;i++){
    drawQuestionBlock(200+i*250, 200+Math.sin(t*2+i)*15);
  }
  // Hills with eyes
  drawHills(H-60,t);
  for(let i=0;i<5;i++){
    const hx=((i*280-t*15)%1600+1600)%1600-200;
    const hh=60+Math.sin(i*1.5)*30;
    // Hill eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(hx-10,H-60-hh*0.6,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+10,H-60-hh*0.6,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(hx-8,H-60-hh*0.6,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+12,H-60-hh*0.6,3,0,Math.PI*2);ctx.fill();
  }
  // Giant mushrooms
  for(let i=0;i<3;i++){
    const mx=300+i*350;
    ctx.fillStyle='#DEB887';
    ctx.fillRect(mx-8,H-140,16,80);
    ctx.fillStyle='#E52521';
    ctx.beginPath();ctx.ellipse(mx,H-140,40,25,0,Math.PI,0);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(mx-15,H-152,8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(mx+15,H-152,8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(mx,H-160,6,0,Math.PI*2);ctx.fill();
  }
  // Coins floating
  for(let i=0;i<6;i++){
    drawCoin(150+i*180, 150+Math.sin(t*3+i*1.5)*20, 10, t);
  }
  drawGround();
  // Pipes
  drawPipe(100, H-60, 50);
  drawPipe(W-100, H-60, 70);
}

// ===== SCENE RENDERERS =====
const sceneRenderers = [];

// Scene 0: Title Sequence
sceneRenderers[0] = function(t){
  // Pipe green background with pixel effect
  const pixelPhase = Math.min(1, t/4);
  ctx.fillStyle='#049B0A';
  ctx.fillRect(0,0,W,H);
  // Pixel grid effect fading out
  if(pixelPhase<1){
    const blockSize = Math.max(1, Math.floor(20*(1-pixelPhase)));
    if(blockSize>1){
      for(let py=0;py<H;py+=blockSize){
        for(let px=0;px<W;px+=blockSize){
          const shade=Math.sin(px*0.01+py*0.01)*20;
          ctx.fillStyle=`rgb(${4+shade},${155+shade},${10+shade})`;
          ctx.fillRect(px,py,blockSize,blockSize);
        }
      }
    }
  }
  // Brick pattern
  for(let by=0;by<H;by+=24){
    for(let bx=0;bx<W;bx+=34){
      const offset=(Math.floor(by/24)%2)*17;
      ctx.strokeStyle='rgba(0,80,0,0.3)';ctx.lineWidth=1;
      ctx.strokeRect(bx+offset,by,34,24);
    }
  }
  // Floating coins and mushrooms
  for(let i=0;i<10;i++){
    const cx=(i*140+50)%W;
    const cy=((i*97+t*40)%H+H)%H;
    if(i%3===0){
      drawCoin(cx,cy,8,t);
    } else if(i%3===1){
      // Mushroom icon
      ctx.fillStyle='#E52521';
      ctx.beginPath();ctx.ellipse(cx,cy-6,10,8,0,Math.PI,0);ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(cx-4,cy-9,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+4,cy-9,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#FFECD2';
      ctx.fillRect(cx-5,cy-6,10,8);
    } else {
      drawSuperStar(cx,cy,10,false);
    }
  }
  // "STREAMFLIX PRESENTS"
  if(t>1 && t<5){
    const alpha=t<2?t-1:t>4?5-t:1;
    ctx.globalAlpha=alpha;
    drawText('STREAMFLIX PRESENTS', W/2, H/2-60, 28, '#E52521');
    ctx.globalAlpha=1;
  }
  // Title
  if(t>4){
    const titleProgress = Math.min(1, (t-4)/2);
    const titleY = H/2 + 20 - (1-easeOut(titleProgress))*100;
    const alpha = Math.min(1, (t-4)/1.5);
    ctx.globalAlpha=alpha;
    // Title shadow
    drawText('THE SUPER MARIO BROS.', W/2+3, titleY-18+3, 48, '#000',  'center', false);
    drawText('MOVIE', W/2+3, titleY+38+3, 64, '#000', 'center', false);
    // Title
    drawText('THE SUPER MARIO BROS.', W/2, titleY-18, 48, '#FFD700');
    drawText('MOVIE', W/2, titleY+38, 64, '#E52521');
    ctx.globalAlpha=1;
  }
  // Pipes from bottom
  if(t>3){
    const pipeH = Math.min(80, (t-3)*60);
    drawPipe(200, H, pipeH, 40);
    drawPipe(W-200, H, pipeH, 40);
  }
};

// Scene 1: Brooklyn
sceneRenderers[1] = function(t){
  drawBrooklynSkyline(t);
  // Plumbing van
  const vanX = 400 + t*8;
  ctx.fillStyle='#fff';
  ctx.fillRect(vanX,H-120,120,50);
  ctx.fillRect(vanX+90,H-140,40,70);

  ctx.fillStyle='#333';
  ctx.beginPath();ctx.arc(vanX+25,H-65,12,0,Math.PI*2);ctx.fill();

// Scene 2: Plumbing Job
sceneRenderers[2] = function(t){
  // Fancy house interior
  ctx.fillStyle='#F5F5DC';ctx.fillRect(0,0,W,H);
  // Wallpaper pattern
  for(let py=0;py<H;py+=40){
    for(let px=0;px<W;px+=40){
      ctx.fillStyle='rgba(200,180,150,0.3)';
      ctx.beginPath();ctx.arc(px+20,py+20,8,0,Math.PI*2);ctx.fill();
    }
  }
  // Floor
  ctx.fillStyle='#DEB887';ctx.fillRect(0,H-100,W,100);
  for(let i=0;i<W;i+=60){
    ctx.strokeStyle='#C8A868';ctx.lineWidth=1;
    ctx.strokeRect(i,H-100,60,100);
  }
  // Pipes on wall
  ctx.fillStyle='#808080';
  ctx.fillRect(300,100,20,400);
  ctx.fillRect(600,80,20,420);
  ctx.fillRect(300,250,320,20);
  // Water spray!
  const sprayIntensity = Math.sin(t*5)*0.5+0.5;
  for(let i=0;i<30;i++){
    const angle = (i/30)*Math.PI*2+t*3;
    const dist = 30+Math.random()*50*sprayIntensity;
    const wx = 450+Math.cos(angle)*dist;
    const wy = 250+Math.sin(angle)*dist;
    ctx.fillStyle=`rgba(100,150,255,${0.3+Math.random()*0.4})`;
    ctx.beginPath();ctx.arc(wx,wy,2+Math.random()*3,0,Math.PI*2);ctx.fill();
  }
  // Water on floor
  ctx.fillStyle='rgba(100,150,255,0.3)';
  ctx.fillRect(200,H-100,600,100);
  // Mario with wrench
  drawMario(380, H-160, 0.9, 1);
  // Luigi getting sprayed
  drawLuigi(520, H-165, 0.9, -1, t>4&&t<8);
  // Water hitting Luigi
  if(t>3&&t<8){
    for(let i=0;i<10;i++){
      ctx.fillStyle='rgba(100,150,255,0.5)';
      ctx.beginPath();ctx.arc(520+Math.random()*30-15,H-165+Math.random()*40-20,3,0,Math.PI*2);ctx.fill();
    }
  }
  if(t<5){
    drawDialogue(null, '* Water sprays everywhere! *');

    ctx.fillRect(W/2-80,H-220,160,160);

    ctx.beginPath();ctx.moveTo(W/2-100,H-220);ctx.lineTo(W/2,H-280);ctx.lineTo(W/2+100,H-220);ctx.fill();
    // Door
    ctx.fillStyle='#8B4513';
    ctx.fillRect(W/2-15,H-120,30,60);
    // Sign
    ctx.fillStyle='#fff';
    ctx.fillRect(W/2-60,H-195,120,25);
    ctx.fillStyle='#E52521';
    ctx.font='bold 10px Arial';ctx.textAlign='center';
    ctx.fillText('SUPER MARIO BROS. PLUMBING',W/2,H-180);
    // Pipe connecting to Brooklyn
    drawPipe(W/2+120, H-60, 80, 40);
    ctx.fillStyle='#333';
    ctx.font='bold 8px Arial';
    ctx.fillText('BROOKLYN',W/2+120,H-30);
    drawMario(W/2-40, H-120, 0.8, 1);
    drawLuigi(W/2+20, H-125, 0.8, 1);
    drawDialogue(null, '* A new home connecting both worlds! *');
  } else if(t<10){
    // Flag pole
    drawSky('#87CEEB','#FFD700');
    drawGround();
    // Flag pole
    ctx.fillStyle='#888';
    ctx.fillRect(W/2,H-350,6,290);
    ctx.fillStyle='#00AA00';
    ctx.beginPath();
    ctx.moveTo(W/2+6,H-340);ctx.lineTo(W/2+50,H-320);ctx.lineTo(W/2+6,H-300);
    ctx.fill();
    // Mario sliding down
    const slideY=lerp(H-340,H-120,Math.min(1,(t-7)/2));
    drawMario(W/2+10, slideY, 0.8, -1);
    // Fireworks
    for(let i=0;i<8;i++){
      const phase=(t+i*0.8)%2;
      if(phase>0.5){
        const fx=200+i*120;
        const fy=80+i%3*60;
        for(let j=0;j<10;j++){
          const a=j*Math.PI*2/10;
          const r=(phase-0.5)*60;
          ctx.fillStyle=`hsl(${(i*45+j*36)%360},100%,60%)`;
          ctx.beginPath();ctx.arc(fx+Math.cos(a)*r,fy+Math.sin(a)*r,3,0,Math.PI*2);ctx.fill();
        }
      }
    }
    drawText('THE END', W/2, H/2-40, 64, '#FFD700');
  } else if(t<17){
    // Credits
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    drawStars(t,50);
    const scrollY = H - (t-10)*60;
    drawText('THE SUPER MARIO BROS. MOVIE', W/2, scrollY, 36, '#FFD700');
    drawText('A StreamFlix Original', W/2, scrollY+60, 24, '#E52521');
    drawText('Created by Petru', W/2, scrollY+110, 22, '#fff');
    drawText('Built with HTML5 Canvas, CSS & JavaScript', W/2, scrollY+155, 18, '#aaa');
    drawText('Characters inspired by Nintendo', W/2, scrollY+195, 18, '#aaa');
    drawText('Music: Web Audio API Chiptune', W/2, scrollY+235, 18, '#aaa');
    drawText('Thank you for watching!', W/2, scrollY+295, 26, '#FFD700');
    // Mario and friends running across bottom
    const runX=(t*60)%1400-100;
    drawMario(runX, H-60, 0.5, 1);
    drawLuigi(runX+40, H-62, 0.5, 1);
    drawToad(runX+80, H-48, 0.45, 1);
    drawPeach(runX+120, H-60, 0.48, 1);
  } else {
    // Post-credits: Yoshi egg
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    // Spotlight on egg
    const spotRadius=80+Math.sin(t*2)*10;
    const gradient=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,spotRadius*2);
    gradient.addColorStop(0,'rgba(255,255,200,0.3)');
    gradient.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gradient;
    ctx.fillRect(0,0,W,H);
    if(t<19){
      // Egg wobbling
      const wobble=Math.sin(t*8)*0.1;
      ctx.save();ctx.translate(W/2,H/2);ctx.rotate(wobble);
      drawYoshiEgg(0,0,2);
      // Cracks appearing
      ctx.strokeStyle='#333';ctx.lineWidth=2;
      const crackPhase=(t-17)/2;
      if(crackPhase>0){
        ctx.beginPath();
        ctx.moveTo(-5,-15);ctx.lineTo(-8,-5);ctx.lineTo(-2,5);
        ctx.stroke();
      }
      if(crackPhase>0.5){
        ctx.beginPath();
        ctx.moveTo(8,-10);ctx.lineTo(5,0);ctx.lineTo(10,8);
        ctx.stroke();
      }
      ctx.restore();
    } else {
      // Yoshi hatched!
      drawYoshi(W/2, H/2, 1.5);
      drawText('Yoshi!', W/2, H/2+60, 32, '#32CD32');
    }
  }
};

// ===== MAIN LOOP =====
function getSceneAtTime(time){
  let elapsed=0;
  for(let i=0;i<scenes.length;i++){
    if(time<elapsed+scenes[i].duration) return {index:i, sceneTime:time-elapsed};
    elapsed+=scenes[i].duration;
  }
  return {index:scenes.length-1, sceneTime:scenes[scenes.length-1].duration};
}

function render(timestamp){
  if(!lastTimestamp) lastTimestamp=timestamp;
  const dt=Math.min((timestamp-lastTimestamp)/1000, 0.05);
  lastTimestamp=timestamp;

  if(playing){
    globalTime+=dt;
    if(globalTime>=totalDuration){
      globalTime=totalDuration;
      playing=false;
      voiceMgr.stop();
      updatePlayBtn();
    }
  }

  const sc=getSceneAtTime(globalTime);
  sceneTime=sc.sceneTime;

  // Handle scene change for music and voice
  if(sc.index!==currentScene){
    currentScene=sc.index;
    voiceMgr.stop();
    updateMusic(currentScene);
  }
  currentScene=sc.index;

  // Calculate transition fade
  const scDur=scenes[sc.index].duration;
  fadeAlpha=0;
  if(sceneTime<TRANSITION_TIME/2){
    fadeAlpha=1-sceneTime/(TRANSITION_TIME/2);
  }
  if(sceneTime>scDur-TRANSITION_TIME/2){
    fadeAlpha=(sceneTime-(scDur-TRANSITION_TIME/2))/(TRANSITION_TIME/2);
  }
  fadeAlpha=Math.max(0,Math.min(1,fadeAlpha));

  // Clear
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  // Render scene
  ctx.save();
  if(sceneRenderers[sc.index]){
    sceneRenderers[sc.index](sceneTime);
  }
  // Draw particles
  updateParticles(dt);
  drawParticles();
  ctx.restore();

  // Fade overlay
  if(fadeAlpha>0){
    ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;
    ctx.fillRect(0,0,W,H);
  }

  // Update UI
  updateUI();

  requestAnimationFrame(render);
}

// ===== UI =====
function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=Math.floor(sec%60);
  return `${m}:${s<10?'0':''}${s}`;
}

function updateUI(){
  const pct=(globalTime/totalDuration)*100;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('time-display').textContent=`${formatTime(globalTime)} / ${formatTime(totalDuration)}`;
  document.getElementById('scene-indicator').textContent=`Scene ${currentScene+1}/20: ${scenes[currentScene].name}`;
}

function updatePlayBtn(){
  document.getElementById('play-btn').innerHTML=playing?'&#10074;&#10074;':'&#9654;';
}

function togglePlay(){
  initAudio();
  playing=!playing;
  if(playing && globalTime>=totalDuration) globalTime=0;
  if(!playing) voiceMgr.stop();
  updatePlayBtn();
  updateMusic(currentScene);
  // Show controls briefly
  const ctrl=document.getElementById('controls');
  ctrl.classList.add('show');
  clearTimeout(controlsTimeout);
  controlsTimeout=setTimeout(()=>ctrl.classList.remove('show'),3000);
}

// Resize
function resize(){
  const aspect=16/9;
  let cw=window.innerWidth;
  let ch=window.innerHeight;
  let renderW, renderH;
  if(cw/ch>aspect){
    renderH=ch;
    renderW=ch*aspect;
  } else {
    renderW=cw;
    renderH=cw/aspect;
  }
  canvas.style.width=renderW+'px';
  canvas.style.height=renderH+'px';
  // Letterbox
  const barH=(ch-renderH)/2;
  document.getElementById('letterbox-top').style.height=Math.max(0,barH)+'px';
  document.getElementById('letterbox-bottom').style.height=Math.max(0,barH)+'px';
}
window.addEventListener('resize',resize);
resize();

// Controls
document.getElementById('play-btn').addEventListener('click',togglePlay);

document.getElementById('voice-btn').addEventListener('click',function(){
  voiceMgr.toggle();
});

document.getElementById('progress-container').addEventListener('click',function(e){
  const rect=this.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  globalTime=Math.max(0,Math.min(totalDuration,pct*totalDuration));
  const sc=getSceneAtTime(globalTime);
  currentScene=sc.index;
  voiceMgr.stop();
  initAudio();
  updateMusic(currentScene);
});

document.getElementById('fs-btn').addEventListener('click',function(){
  if(!document.fullscreenElement){
    document.getElementById('cinema').requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
});

document.addEventListener('keydown',function(e){
  if(e.code==='Space'){
    e.preventDefault();
    togglePlay();
  }
  if(e.code==='ArrowRight'){
    globalTime=Math.min(totalDuration,globalTime+5);
    const sc=getSceneAtTime(globalTime);
    currentScene=sc.index;
    voiceMgr.stop();
    updateMusic(currentScene);
  }
  if(e.code==='ArrowLeft'){
    globalTime=Math.max(0,globalTime-5);
    const sc=getSceneAtTime(globalTime);
    currentScene=sc.index;
    voiceMgr.stop();
    updateMusic(currentScene);
  }
  if(e.code==='KeyF'){
    document.getElementById('fs-btn').click();
  }
});

// Auto-play on click anywhere
canvas.addEventListener('click',function(){
  if(!playing) togglePlay();
});

// Mouse hide on cinema
let mouseTimer;
document.getElementById('cinema').addEventListener('mousemove',function(){
  this.style.cursor='default';
  clearTimeout(mouseTimer);
  mouseTimer=setTimeout(()=>{
    if(playing) this.style.cursor='none';
  },3000);
});

// Start
requestAnimationFrame(render);

// Auto show controls initially, hide after 5s
setTimeout(()=>{
  if(!playing) return;
  document.getElementById('controls').classList.remove('show');
},5000);
</script>
