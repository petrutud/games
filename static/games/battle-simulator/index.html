      case 'Witch': // Polymorph — turns strongest enemy into a peasant
        { const enemies = this.units.filter(e => e.team !== u.team && e.alive);
          if (enemies.length > 0) {
            let strongest = enemies[0];
            for (const e of enemies) if (e.maxHp > strongest.maxHp) strongest = e;
            const peasantDef = UNIT_DEFS[0];
            strongest.def = { ...peasantDef };
            strongest.hp = peasantDef.hp;
            strongest.maxHp = peasantDef.hp;
            strongest.abilityUsed = true;
            for (let i = 0; i < 20; i++)
              this.particles.push({ x: strongest.x, y: strongest.y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 30, color: '#4a0e4e', size: 3 });
          }
        }
        break;
    }
  }

  applyDamage(target, dmg, fromX, fromY) {
    if (target.invincible) {
      for (let i = 0; i < 3; i++)
        this.particles.push({ x: target.x, y: target.y - 5, vx: (Math.random()-0.5)*4, vy: -Math.random()*3, life: 15, color: '#ffd93d', size: 3 });
      return;
    }
    if (target.def._stoneSkin && target.abilityActive > 0) dmg *= 0.2;
    if (target.def._shielded && target.abilityActive > 0) dmg *= 0.5;
    target.hp -= dmg;
    target.stagger = 8;
    target.hitShake = Math.min(6, dmg * 0.1);
    target.attackFlash = 0.6;
    const a = Math.atan2(target.y - fromY, target.x - fromX);
    const kb = Math.min(dmg * 0.3, 8);
    target.knockX += Math.cos(a) * kb;
    target.knockY += Math.sin(a) * kb;
    // Screen shake on big hits
    if (dmg >= 30) {
      this.screenShake = Math.min(12, dmg * 0.15);
    }
    // Blood particles
    for (let i = 0; i < 2; i++) {
      this.particles.push({
        x: target.x, y: target.y,
        vx: (Math.random() - 0.5) * 4 + Math.cos(a) * 2,
        vy: (Math.random() - 0.5) * 4 + Math.sin(a) * 2,
        life: 20 + Math.random() * 15,
        color: target.team === 'blue' ? '#4ecdc4' : '#e94560',
        size: 2 + Math.random() * 2
      });
    }
    if (target.hp <= 0) {
      const wasAlive = target.alive;
      target.alive = false;
      target.deathTimer = 60;
      if (wasAlive) {
        const opp = target.team === 'blue' ? 'red' : 'blue';
        this.killRewards[opp] += target.def.cost;
      }
      this.screenShake = Math.min(10, target.def.size * 0.5);
      // Death burst ring
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * Math.PI * 2;
        this.particles.push({
          x: target.x, y: target.y,
          vx: Math.cos(ang) * 4, vy: Math.sin(ang) * 4,
          life: 20 + Math.random() * 10,
          color: target.team === 'blue' ? '#4ecdc4' : '#e94560',
          size: 2
        });
      }
      // Gladiator Arena King — heal on kill
      for (const a of this.units) {
        if (a.team !== target.team && a.alive && a.def._arenaKing && a.abilityActive > 0) {
          a.hp = Math.min(a.maxHp, a.hp + 40);
          this.particles.push({ x: a.x, y: a.y, vx: 0, vy: -3, life: 20, color: '#d4a017', size: 3 });
        }
      }
      for (let i = 0; i < 6; i++) {
        this.particles.push({
          x: target.x, y: target.y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 25 + Math.random() * 15,
          color: target.team === 'blue' ? '#4ecdc4' : '#e94560',
          size: 3 + Math.random() * 3
        });
      }
    }
  }

  updateUnit(u) {
    if (!u.alive) return;
    u.wobble += u.wobbleSpeed;
    u.atkCooldown = Math.max(0, u.atkCooldown - 0.016 * this.speed);
    u.stagger = Math.max(0, u.stagger - 1);
    u.knockX *= 0.85;
    u.knockY *= 0.85;
    u.x += u.knockX;
    u.y += u.knockY;

    // Spawn pop-in
    if (u.spawnScale < 1) u.spawnScale = Math.min(1, u.spawnScale + 0.08);
    // Attack flash decay
    if (u.attackFlash > 0) u.attackFlash = Math.max(0, u.attackFlash - 0.1);
    // Hit shake decay
    if (u.hitShake > 0) u.hitShake = Math.max(0, u.hitShake - 0.5);

    // Walking dust particles
    if (this.phase === 'battle' && Math.abs(u.knockX) < 0.5 && Math.random() < 0.03 * u.def.speed) {
      this.particles.push({
        x: u.x + (Math.random() - 0.5) * u.def.size,
        y: u.y + u.def.size * 0.5,
        vx: (Math.random() - 0.5) * 0.5,
        vy: -Math.random() * 0.5,
        life: 15 + Math.random() * 10,
        color: '#8B7355',
        size: 2 + Math.random() * 2
      });
    }

    if (u.stagger > 0) return;

    // ABILITY TIMER — activates at 40s (2400 frames at 60fps)
    if (this.abilitiesEnabled) {
      u.abilityTimer++;
      if (u.abilityActive > 0) u.abilityActive--;

      // End buff abilities
      if (u.abilityActive === 1) {
        u.invincible = false;
      }

      if (!u.abilityUsed && u.abilityTimer >= 2400) {
        u.abilityUsed = true;
        this.triggerAbility(u);
      }
    } else {
      // Abilities disabled — cancel any active buffs
      if (u.abilityActive > 0) {
        u.abilityActive = 0;
        u.invincible = false;
      }
    }

    // Ongoing ability effects
    if (this.abilitiesEnabled && u.abilityActive > 0) {
      if (u.def._regen && u.abilityActive % 30 === 0) {
        u.hp = Math.min(u.maxHp, u.hp + u.maxHp * 0.01);
        this.particles.push({ x: u.x, y: u.y, vx: 0, vy: -2, life: 15, color: '#2ecc71', size: 2 });
      }
      if (u.def._inferno && u.abilityActive % 20 === 0) {
        for (const e of this.units) {
          if (e.team !== u.team && e.alive && Math.hypot(e.x-u.x, e.y-u.y) < 120) {
            this.applyDamage(e, 5, u.x, u.y);
          }
        }
        for (let i = 0; i < 3; i++)
          this.particles.push({ x: u.x+(Math.random()-0.5)*120, y: u.y+(Math.random()-0.5)*120, vx: 0, vy: -2, life: 20, color: '#ff4500', size: 3 });
      }
    }

    // Golem stone skin — reduce incoming damage (handled via flag)
    // Gladiator arena king — heal on kill is checked in applyDamage

    // PLAYER CONTROLLED UNIT — skip AI, use WASD
    if (u === this.controlledUnit) {
      let mx = 0, my = 0;
      if (this.keys['w'] || this.keys['arrowup']) my = -1;
      if (this.keys['s'] || this.keys['arrowdown']) my = 1;
      if (this.keys['a'] || this.keys['arrowleft']) mx = -1;
      if (this.keys['d'] || this.keys['arrowright']) mx = 1;
      if (mx || my) {
        const len = Math.hypot(mx, my);
        const spd = u.def.speed * this.speed * 1.2;
        u.x += (mx / len) * spd;
        u.y += (my / len) * spd;
        u.angle = Math.atan2(my, mx);
      }
      // Keep in bounds
      u.x = Math.max(u.def.size, Math.min(this.W - u.def.size, u.x));
      u.y = Math.max(u.def.size + 50, Math.min(this.H - u.def.size - 50, u.y));
      // If unit dies, deselect
      if (!u.alive) {
        this.controlledUnit = null;
        document.getElementById('control-hint').classList.remove('show');
      }
      return;
    }

    // Healer logic
    if (u.def.heals) {
      const ally = this.findAlly(u);
      if (ally) {
        const d = Math.hypot(ally.x - u.x, ally.y - u.y);
        if (d > u.def.range * 0.5) {
          const a = Math.atan2(ally.y - u.y, ally.x - u.x);
          u.x += Math.cos(a) * u.def.speed * this.speed;
          u.y += Math.sin(a) * u.def.speed * this.speed;
          u.angle = a;
        }
        if (d < u.def.range && u.atkCooldown <= 0) {
          ally.hp = Math.min(ally.maxHp, ally.hp + u.def.heals);
          u.atkCooldown = u.def.atkSpeed;
          // Heal particles
          for (let i = 0; i < 5; i++) {
            this.particles.push({
              x: ally.x, y: ally.y,
              vx: (Math.random() - 0.5) * 2,
              vy: -Math.random() * 3,
              life: 20,
              color: '#2ecc71',
              size: 3
            });
          }
        }
      }
      // Healer also runs from enemies
      const enemy = this.findTarget(u);
      if (enemy) {
        const ed = Math.hypot(enemy.x - u.x, enemy.y - u.y);
        if (ed < 60) {
          const a = Math.atan2(u.y - enemy.y, u.x - enemy.x);
          u.x += Math.cos(a) * u.def.speed * this.speed * 0.5;
          u.y += Math.sin(a) * u.def.speed * this.speed * 0.5;
        }
      }
      return;
    }

    // Flying unit — flies over battlefield dropping bombs
    if (u.def.flying) {
      const target = this.findTarget(u);
      if (target) {
        const a = Math.atan2(target.y - u.y, target.x - u.x);
        u.x += Math.cos(a) * u.def.speed * this.speed;
        u.y += Math.sin(a) * u.def.speed * this.speed;
        u.angle = a;
        // Drop bombs when over enemies
        if (u.atkCooldown <= 0) {
          for (const e of this.units) {
            if (e.team !== u.team && e.alive && Math.hypot(e.x - u.x, e.y - u.y) < 60) {
              u.atkCooldown = u.def.atkSpeed;
              this.projectiles.push(new Projectile(u.x, u.y, e.x, e.y, u.team, u.def.dmg, u.def.projSpeed, u.def.aoe, false));
              this.particles.push({ x: u.x, y: u.y + 5, vx: 0, vy: 2, life: 10, color: '#888', size: 3 });
              break;
            }
          }
        }
      }
      u.x = Math.max(u.def.size, Math.min(this.W - u.def.size, u.x));
      u.y = Math.max(u.def.size + 50, Math.min(this.H - u.def.size - 50, u.y));
      return;
    }

    const target = this.findTarget(u);
    if (!target) return;

    const dx = target.x - u.x;
    const dy = target.y - u.y;
    const dist = Math.hypot(dx, dy);
    u.angle = Math.atan2(dy, dx);

    if (dist > u.def.range) {
      // Move toward target with slight wobble for "totally accurate" physics
      const wobbleAngle = Math.sin(u.wobble) * 0.3;
      const a = u.angle + wobbleAngle;
      u.x += Math.cos(a) * u.def.speed * this.speed;
      u.y += Math.sin(a) * u.def.speed * this.speed;

      // Separation from allies
      for (const other of this.units) {
        if (other === u || !other.alive) continue;
        const sd = Math.hypot(other.x - u.x, other.y - u.y);
        if (sd < u.def.size + other.def.size && sd > 0) {
          const sa = Math.atan2(u.y - other.y, u.x - other.x);
          u.x += Math.cos(sa) * 0.5;
          u.y += Math.sin(sa) * 0.5;
        }
      }
    } else if (u.atkCooldown <= 0) {
      u.atkCooldown = u.def.atkSpeed;
      if (u.def.projSpeed) {
        // Ranged attack
        this.projectiles.push(new Projectile(u.x, u.y, target.x, target.y, u.team, u.def.dmg, u.def.projSpeed, u.def.aoe, u.def.magic));
        // Muzzle flash
        const fa = Math.atan2(target.y - u.y, target.x - u.x);
        for (let i = 0; i < 2; i++) {
          this.particles.push({
            x: u.x + Math.cos(fa) * u.def.size,
            y: u.y + Math.sin(fa) * u.def.size,
            vx: Math.cos(fa + (Math.random() - 0.5) * 0.8) * 3,
            vy: Math.sin(fa + (Math.random() - 0.5) * 0.8) * 3,
            life: 8 + Math.random() * 5,
            color: u.def.magic ? '#a855f7' : '#ffd93d',
            size: 3
          });
        }
      } else {
        // Melee attack — can't hit flying
        if (target.def.flying && !u.def.magic) return;
        this.applyDamage(target, u.def.dmg, u.x, u.y);
        // Melee swing arc particles
        const swingAngle = u.angle;
        for (let i = 0; i < 3; i++) {
          const a = swingAngle - 0.6 + (i / 4) * 1.2;
          const r = u.def.range * 0.8;
          this.particles.push({
            x: u.x + Math.cos(a) * r, y: u.y + Math.sin(a) * r,
            vx: Math.cos(a) * 2, vy: Math.sin(a) * 2,
            life: 8 + Math.random() * 5,
            color: '#ddd',
            size: 2
          });
        }
      }
    }

    // Keep in bounds
    u.x = Math.max(u.def.size, Math.min(this.W - u.def.size, u.x));
    u.y = Math.max(u.def.size + 50, Math.min(this.H - u.def.size - 50, u.y));
  }

  updateProjectile(p) {
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 8) p.trail.shift();
    p.x += p.vx * this.speed;
    p.y += p.vy * this.speed;
    p.life--;

    if (p.life <= 0 || p.x < 0 || p.x > this.W || p.y < 0 || p.y > this.H) return false;

    for (const u of this.units) {
      if (u.team === p.team || !u.alive) continue;
      if (u.def.flying && !p.magic) continue;
      if (Math.hypot(u.x - p.x, u.y - p.y) < u.def.size + 4) {
        if (p.aoe > 0) {
          for (const t of this.units) {
            if (t.team === p.team || !t.alive) continue;
            if (Math.hypot(t.x - p.x, t.y - p.y) < p.aoe) {
              this.applyDamage(t, p.dmg * (1 - Math.hypot(t.x - p.x, t.y - p.y) / p.aoe * 0.5), p.x, p.y);
            }
          }
          // Explosion
          this.screenShake = Math.min(10, p.aoe * 0.15);
          for (let i = 0; i < 15; i++) {
            this.particles.push({
              x: p.x, y: p.y,
              vx: (Math.random() - 0.5) * 8,
              vy: (Math.random() - 0.5) * 8,
              life: 20 + Math.random() * 15,
              color: ['#e74c3c','#f39c12','#ffd93d'][Math.floor(Math.random()*3)],
              size: 3 + Math.random() * 4
            });
          }
          // Shockwave ring
          for (let i = 0; i < 10; i++) {
            const a = (i / 10) * Math.PI * 2;
            this.particles.push({
              x: p.x, y: p.y,
              vx: Math.cos(a) * 5, vy: Math.sin(a) * 5,
              life: 12,
              color: '#ffd93d',
              size: 2
            });
          }
        } else {
          this.applyDamage(u, p.dmg, p.x - p.vx * 5, p.y - p.vy * 5);
        }
        return false;
      }
    }
    return true;
  }

  update() {
    if (this.phase !== 'battle') return;

    const savedSpeed = this.speed;
    if (this.slowMo) this.speed = this.speed * 0.2;

    for (const u of this.units) this.updateUnit(u);
    this.projectiles = this.projectiles.filter(p => this.updateProjectile(p));

    // Particles
    for (const p of this.particles) {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.1;
      p.vx *= 0.98;
      p.life--;
    }
    this.particles = this.particles.filter(p => p.life > 0);
    // Cap particles to prevent lag
    if (this.particles.length > 500) {
      this.particles = this.particles.slice(-500);
    }

    // Screen shake decay
    if (this.screenShake > 0) {
      this.shakeX = (Math.random() - 0.5) * this.screenShake * 2;
      this.shakeY = (Math.random() - 0.5) * this.screenShake * 2;
      this.screenShake *= 0.85;
      if (this.screenShake < 0.3) { this.screenShake = 0; this.shakeX = 0; this.shakeY = 0; }
    }

    // Dead unit fade
    for (const u of this.units) {
      if (!u.alive && u.deathTimer > 0) u.deathTimer--;
    }

    this.speed = savedSpeed;

    // Check victory
    if (!this.battleResult) {
      const blueAlive = this.units.some(u => u.team === 'blue' && u.alive);
      const redAlive = this.units.some(u => u.team === 'red' && u.alive);
      if (!blueAlive || !redAlive) {
        if (!blueAlive && !redAlive) this.battleResult = 'DRAW!';
        else if (blueAlive) this.battleResult = 'BLUE WINS!';
        else this.battleResult = 'RED WINS!';

        const el = document.getElementById('overlay');

        if (this.vsBot && !this.gameOver) {
          // Pay out kill rewards earned this round
          this.budgets.blue += this.killRewards.blue;
          this.budgets.red += this.killRewards.red;
          const earnedBlue = this.killRewards.blue;
          const earnedRed = this.killRewards.red;
          this.killRewards = { blue: 0, red: 0 };

          const minCost = Math.min(...UNIT_DEFS.map(d => d.cost));
          const blueDone = !blueAlive && this.budgets.blue < minCost;
          const redDone = !redAlive && this.budgets.red < minCost;

          if (blueDone && redDone) {
            el.textContent = 'DRAW — WAR OVER';
            el.style.color = '#ffd93d';
            el.style.opacity = 1;
            document.getElementById('phase-info').textContent = 'DRAW — no money, no troops';
            this.gameOver = true;
          } else if (blueDone || redDone) {
            const winner = blueDone ? 'RED' : 'BLUE';
            el.textContent = `${winner} WINS THE WAR!`;
            el.style.color = winner === 'BLUE' ? '#4ecdc4' : '#e94560';
            el.style.opacity = 1;
            document.getElementById('phase-info').textContent = `Final: ${winner} wins Round ${this.round}`;
            this.gameOver = true;
          } else {
            // Next round
            this.round++;
            this.units = this.units.filter(u => u.alive);
            for (const u of this.units) {
              u.abilityTimer = 0;
              u.abilityUsed = false;
              u.abilityActive = 0;
              u.invincible = false;
              u.target = null;
              u.atkCooldown = 0;
            }
            this.projectiles = [];
            this.phase = 'place';
            this.battleResult = null;
            this.controlledUnit = null;
            document.getElementById('control-hint').classList.remove('show');
            el.textContent = `ROUND ${this.round}`;
            el.style.color = '#ffd93d';
            el.style.opacity = 1;
            setTimeout(() => { el.style.opacity = 0; }, 1400);
            this.updateBudgetUI();
            this.botPlaceUnits();
            document.getElementById('phase-info').textContent =
              `ROUND ${this.round} — You +$${earnedBlue} · Bot +$${earnedRed} from kills`;
          }
        } else {
          el.textContent = this.battleResult;
          el.style.color = this.battleResult.includes('BLUE') ? '#4ecdc4' : this.battleResult.includes('RED') ? '#e94560' : '#ffd93d';
          el.style.opacity = 1;
          document.getElementById('phase-info').textContent = this.battleResult;
        }
      }
    }
  }

  drawUnitBody(u, ux, uy, s) {
    const dir = u.team === 'blue' ? 1 : -1;
    const walk = u.alive && this.phase === 'battle' ? Math.sin(u.wobble * 4) : 0;
    const sc = s / 14; // scale factor based on default size 14
    const tc = u.team === 'blue' ? '#4ecdc4' : '#e94560';
    const n = u.def.name;

    // Shadow
    if (!u.def.flying) {
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      ctx.ellipse(ux, uy + s * 0.9, s * 0.6, s * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // --- WAR PLANE special render ---
    if (u.def.flying) {
      // Plane body
      ctx.fillStyle = u.def.color;
      ctx.beginPath();
      ctx.ellipse(ux, uy, s * 0.9, s * 0.35, dir > 0 ? 0 : Math.PI, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = tc; ctx.lineWidth = 2; ctx.stroke();
      // Wings
      ctx.fillStyle = '#5a7a84';
      ctx.beginPath();
      ctx.moveTo(ux - 4*sc, uy);
      ctx.lineTo(ux, uy - s*0.8);
      ctx.lineTo(ux + 4*sc, uy);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ux - 4*sc, uy);
      ctx.lineTo(ux, uy + s*0.8);
      ctx.lineTo(ux + 4*sc, uy);
      ctx.fill();
      // Cockpit
      ctx.fillStyle = '#87ceeb';
      ctx.beginPath();
      ctx.arc(ux + dir * s * 0.5, uy, 3*sc, 0, Math.PI * 2);
      ctx.fill();
      // Tail
      ctx.fillStyle = '#3a5060';
      ctx.beginPath();
      ctx.moveTo(ux - dir * s * 0.7, uy - 3*sc);
      ctx.lineTo(ux - dir * s, uy - 8*sc);
      ctx.lineTo(ux - dir * s, uy + 3*sc);
      ctx.fill();
      // Exhaust
      if (this.phase === 'battle') {
        ctx.fillStyle = 'rgba(200,200,200,0.4)';
        ctx.beginPath();
        ctx.arc(ux - dir * s, uy, 2 + Math.random()*2, 0, Math.PI * 2);
        ctx.fill();
      }
      return;
    }

    // --- SKIN DEFINITIONS PER UNIT ---
    const skinColor = {
      'Peasant':'#f0d0a0','Warrior':'#dcc8a0','Knight':'#e8dcc8','Viking':'#e0b88a',
      'Samurai':'#f5e0c0','Giant':'#c8a0d0','Archer':'#d8c8a0','Musketeer':'#e0d0b8',
      'Wizard':'#e8d8f0','Catapult':'#d0c0a0','Healer':'#d0f0d0','Berserker':'#f0c0b0',
      'Shield Wall':'#d8d8d8','Cavalry':'#e0c8a0','Dark Mage':'#c0b8d0',
      'Gladiator':'#e8c888','Ninja':'#b0b0b0','Troll':'#a0c890','Pirate':'#e0c098',
      'Monk':'#f0e0c0','Spartan':'#e0c0a0','Crossbow':'#d8c0a0','Fire Mage':'#f0d0c0',
      'Ice Mage':'#d0e8f8','Cannon':'#c8c8c8','Shaman':'#d8c8e0',
      'Necromancer':'#c8b8d8','Angel':'#fff8e0','Dragon':'#e0a0a0','Bomber':'#f0c8b8',
      'King':'#f8e8c0','Golem':'#b8b8c0','Assassin':'#c0c0d0','Witch':'#d8b8e0'
    }[n] || '#ddd';

    const headR = 5 * sc;
    const bodyH = 8 * sc;
    const bodyW = 6 * sc;
    const legL = 6 * sc;
    const armL = 6 * sc;
    const headY = uy - bodyH - headR;
    const bodyTop = uy - bodyH;

    // --- LEGS ---
    const legSpread = 3 * sc;
    const lKick = walk * 3 * sc;
    ctx.strokeStyle = n === 'Golem' ? '#606870' : n === 'Troll' ? '#4a6a3a' : n === 'Dragon' ? '#8a2020' : '#555';
    ctx.lineWidth = Math.max(2, 3 * sc);
    ctx.lineCap = 'round';
    // Left leg
    ctx.beginPath();
    ctx.moveTo(ux - legSpread, uy - bodyH * 0.1);
    ctx.lineTo(ux - legSpread + lKick, uy + legL);
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(ux + legSpread, uy - bodyH * 0.1);
    ctx.lineTo(ux + legSpread - lKick, uy + legL);
    ctx.stroke();
    // Feet
    ctx.fillStyle = n === 'Knight' || n === 'Spartan' ? '#888' : n === 'Ninja' ? '#222' : '#654';
    ctx.beginPath();
    ctx.arc(ux - legSpread + lKick, uy + legL, 2*sc, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ux + legSpread - lKick, uy + legL, 2*sc, 0, Math.PI*2);
    ctx.fill();

    // --- BODY / TORSO ---
    ctx.fillStyle = u.def.color;
    if (n === 'Knight' || n === 'Spartan') {
      // Armor body
      ctx.fillRect(ux - bodyW/2, bodyTop, bodyW, bodyH);
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
      ctx.strokeRect(ux - bodyW/2, bodyTop, bodyW, bodyH);
    } else if (n === 'Giant' || n === 'Golem' || n === 'Troll' || n === 'Dragon') {
      // Big round body
      ctx.beginPath();
      ctx.ellipse(ux, uy - bodyH*0.5, bodyW*0.7, bodyH*0.6, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = tc; ctx.lineWidth = 2; ctx.stroke();
    } else if (n === 'Cavalry') {
      // Horse body below rider
      ctx.fillStyle = '#8B6914';
      ctx.beginPath();
      ctx.ellipse(ux, uy + 2*sc, bodyW*0.9, bodyH*0.3, 0, 0, Math.PI*2);
      ctx.fill();
      // Rider on top
      ctx.fillStyle = u.def.color;
      ctx.fillRect(ux - bodyW*0.35, bodyTop, bodyW*0.7, bodyH*0.7);
    } else if (n === 'Cannon' || n === 'Catapult') {
      // Barrel/machine
      ctx.fillStyle = u.def.color;
      ctx.fillRect(ux - bodyW*0.6, uy - bodyH*0.4, bodyW*1.2, bodyH*0.6);
      ctx.fillStyle = '#333';
      ctx.fillRect(ux + dir*bodyW*0.3, uy - bodyH*0.3, bodyW*0.5*dir, bodyH*0.3);
      // Wheels
      ctx.fillStyle = '#5a3a1a';
      ctx.beginPath(); ctx.arc(ux - bodyW*0.4, uy + bodyH*0.2, 3*sc, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ux + bodyW*0.4, uy + bodyH*0.2, 3*sc, 0, Math.PI*2); ctx.fill();
    } else {
      // Standard body
      ctx.beginPath();
      ctx.roundRect(ux - bodyW/2, bodyTop, bodyW, bodyH, 2*sc);
      ctx.fill();
    }

    // Team stripe on body
    if (n !== 'Cannon' && n !== 'Catapult') {
      ctx.fillStyle = tc;
      ctx.globalAlpha *= 0.4;
      ctx.fillRect(ux - bodyW/2, bodyTop + bodyH*0.3, bodyW, 3*sc);
      ctx.globalAlpha /= 0.4;
    }

    // --- ARMS + WEAPONS ---
    const armY = bodyTop + bodyH * 0.2;
    const aSwing = walk * 3 * sc;
    ctx.strokeStyle = n === 'Golem' ? '#606870' : n === 'Troll' ? '#4a6a3a' : '#555';
    ctx.lineWidth = Math.max(2, 2.5 * sc);

    if (n !== 'Cannon' && n !== 'Catapult') {
      // Left arm
      ctx.beginPath();
      ctx.moveTo(ux - bodyW/2, armY);
      ctx.lineTo(ux - bodyW/2 - armL*0.7 - aSwing, armY + armL*0.6);
      ctx.stroke();
      // Right arm
      ctx.beginPath();
      ctx.moveTo(ux + bodyW/2, armY);
      ctx.lineTo(ux + bodyW/2 + armL*0.7 + aSwing, armY + armL*0.6);
      ctx.stroke();

      // Hands
      ctx.fillStyle = skinColor;
      ctx.beginPath();
      ctx.arc(ux - bodyW/2 - armL*0.7 - aSwing, armY + armL*0.6, 2*sc, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ux + bodyW/2 + armL*0.7 + aSwing, armY + armL*0.6, 2*sc, 0, Math.PI*2);
      ctx.fill();
    }

    // WEAPON in dominant hand
    const handX = ux + dir * (bodyW/2 + armL*0.7 + aSwing);
    const handY = armY + armL*0.6;
    ctx.lineWidth = Math.max(1.5, 2*sc);
    ctx.lineCap = 'round';

    if (n === 'Peasant') {
      // Pitchfork
      ctx.strokeStyle = '#8B6914';
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX, handY - 10*sc); ctx.stroke();
      ctx.strokeStyle = '#888';
      ctx.beginPath(); ctx.moveTo(handX-2*sc, handY-10*sc); ctx.lineTo(handX+2*sc, handY-10*sc); ctx.stroke();
    } else if (n === 'Warrior' || n === 'Gladiator') {
      // Sword
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 2*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX + dir*2*sc, handY - 12*sc); ctx.stroke();
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(handX - 2*sc, handY - 1*sc, 4*sc, 2*sc);
    } else if (n === 'Knight') {
      // Sword + shield in other hand
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 2.5*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX + dir*3*sc, handY - 14*sc); ctx.stroke();
      // Shield on other arm
      const shX = ux - dir * (bodyW/2 + armL*0.7 - aSwing);
      ctx.fillStyle = '#7a7a8a';
      ctx.beginPath(); ctx.arc(shX, armY + armL*0.3, 5*sc, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = tc; ctx.lineWidth = 1; ctx.stroke();
    } else if (n === 'Viking') {
      // Axe
      ctx.strokeStyle = '#8B6914';
      ctx.lineWidth = 2*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX, handY - 12*sc); ctx.stroke();
      ctx.fillStyle = '#aaa';
      ctx.beginPath();
      ctx.moveTo(handX, handY - 10*sc);
      ctx.lineTo(handX + dir*5*sc, handY - 12*sc);
      ctx.lineTo(handX + dir*5*sc, handY - 8*sc);
      ctx.fill();
    } else if (n === 'Samurai') {
      // Katana
      ctx.strokeStyle = '#eee';
      ctx.lineWidth = 1.5*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX + dir*4*sc, handY - 16*sc); ctx.stroke();
    } else if (n === 'Archer') {
      // Bow
      ctx.strokeStyle = '#8B6914';
      ctx.lineWidth = 1.5*sc;
      ctx.beginPath();
      ctx.arc(handX + dir*3*sc, handY - 5*sc, 7*sc, -Math.PI*0.4, Math.PI*0.4);
      ctx.stroke();
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 0.5*sc;
      ctx.beginPath(); ctx.moveTo(handX+dir*3*sc, handY-5*sc-7*sc*Math.sin(0.4)); ctx.lineTo(handX+dir*3*sc, handY-5*sc+7*sc*Math.sin(0.4)); ctx.stroke();
    } else if (n === 'Musketeer') {
      // Musket
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 2*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY-2*sc); ctx.lineTo(handX + dir*14*sc, handY - 4*sc); ctx.stroke();
      ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 3*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX + dir*5*sc, handY-1*sc); ctx.stroke();
    } else if (n === 'Wizard' || n === 'Fire Mage' || n === 'Ice Mage' || n === 'Shaman' || n === 'Dark Mage' || n === 'Necromancer' || n === 'Witch') {
      // Staff
      const staffColor = n === 'Fire Mage' ? '#ff4500' : n === 'Ice Mage' ? '#00bfff' : n === 'Dark Mage' ? '#555' : n === 'Necromancer' ? '#301934' : n === 'Witch' ? '#4a0e4e' : '#8B6914';
      const orbColor = n === 'Fire Mage' ? '#ff6347' : n === 'Ice Mage' ? '#87ceeb' : n === 'Dark Mage' ? '#8e44ad' : n === 'Necromancer' ? '#9370DB' : n === 'Witch' ? '#ff69b4' : n === 'Shaman' ? '#9370DB' : '#a855f7';
      ctx.strokeStyle = staffColor;
      ctx.lineWidth = 2*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX, handY - 14*sc); ctx.stroke();
      ctx.fillStyle = orbColor;
      ctx.beginPath(); ctx.arc(handX, handY - 14*sc, 3*sc, 0, Math.PI*2); ctx.fill();
      // Glow
      ctx.fillStyle = orbColor; ctx.globalAlpha *= 0.3;
      ctx.beginPath(); ctx.arc(handX, handY - 14*sc, 5*sc, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha /= 0.3;
    } else if (n === 'Crossbow') {
      // Crossbow
      ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 2*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY-2*sc); ctx.lineTo(handX+dir*8*sc, handY-3*sc); ctx.stroke();
      ctx.strokeStyle = '#666'; ctx.lineWidth = 1.5*sc;
      ctx.beginPath(); ctx.moveTo(handX+dir*6*sc, handY-7*sc); ctx.lineTo(handX+dir*6*sc, handY+1*sc); ctx.stroke();
    } else if (n === 'Ninja') {
      // Kunai
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.moveTo(handX, handY - 2*sc);
      ctx.lineTo(handX + dir*2*sc, handY - 10*sc);
      ctx.lineTo(handX - dir*1*sc, handY - 2*sc);
      ctx.fill();
    } else if (n === 'Pirate') {
      // Cutlass
      ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX + dir*3*sc, handY - 11*sc); ctx.stroke();
      // Hand guard
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5*sc;
      ctx.beginPath(); ctx.arc(handX + dir*1*sc, handY, 3*sc, 0, Math.PI); ctx.stroke();
    } else if (n === 'Monk') {
      // Glowing fists
      ctx.fillStyle = '#DAA520'; ctx.globalAlpha *= 0.5;
      ctx.beginPath(); ctx.arc(handX, handY, 4*sc, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha /= 0.5;
    } else if (n === 'Spartan') {
      // Spear + shield
      ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 1.5*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX + dir*2*sc, handY - 18*sc); ctx.stroke();
      ctx.fillStyle = '#bbb';
      ctx.beginPath(); ctx.moveTo(handX+dir*2*sc, handY-18*sc); ctx.lineTo(handX+dir*4*sc, handY-16*sc); ctx.lineTo(handX+dir*0*sc, handY-16*sc); ctx.fill();
      const shX = ux - dir * (bodyW/2 + armL*0.5);
      ctx.fillStyle = '#8B0000';
      ctx.beginPath(); ctx.arc(shX, armY + armL*0.2, 6*sc, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1; ctx.stroke();
    } else if (n === 'Berserker') {
      // Two small axes
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX, handY-8*sc); ctx.stroke();
      ctx.fillStyle = '#ccc';
      ctx.fillRect(handX-1*sc, handY-9*sc, 4*sc*dir, 3*sc);
      const lhX = ux - dir * (bodyW/2 + armL*0.5);
      ctx.strokeStyle = '#aaa';
      ctx.beginPath(); ctx.moveTo(lhX, handY); ctx.lineTo(lhX, handY-8*sc); ctx.stroke();
      ctx.fillStyle = '#ccc';
      ctx.fillRect(lhX-1*sc, handY-9*sc, -4*sc*dir, 3*sc);
    } else if (n === 'Assassin') {
      // Daggers
      ctx.fillStyle = '#aaa';
      ctx.beginPath();
      ctx.moveTo(handX, handY); ctx.lineTo(handX+dir*1*sc, handY-9*sc); ctx.lineTo(handX+dir*3*sc, handY); ctx.fill();
    } else if (n === 'Angel') {
      // Halo + staff
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5*sc;
      ctx.beginPath(); ctx.ellipse(ux, headY - headR - 3*sc, 5*sc, 2*sc, 0, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX, handY-12*sc); ctx.stroke();
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(handX, handY-12*sc, 2.5*sc, 0, Math.PI*2); ctx.fill();
    } else if (n === 'Dragon') {
      // Claws
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX+dir*5*sc, handY-3*sc); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX+dir*5*sc, handY+1*sc); ctx.stroke();
    } else if (n === 'Bomber') {
      // Bomb in hand
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(handX, handY - 3*sc, 4*sc, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#ff6347'; ctx.lineWidth = 1*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY-7*sc); ctx.lineTo(handX+dir*2*sc, handY-10*sc); ctx.stroke();
    } else if (n === 'King') {
      // Scepter
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2.5*sc;
      ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX, handY-13*sc); ctx.stroke();
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath(); ctx.arc(handX, handY-13*sc, 3*sc, 0, Math.PI*2); ctx.fill();
    } else if (n === 'Shield Wall') {
      // Big shield
      ctx.fillStyle = '#7a7a8a';
      ctx.fillRect(ux - bodyW*0.7, bodyTop - 2*sc, bodyW*1.4, bodyH + 4*sc);
      ctx.strokeStyle = tc; ctx.lineWidth = 1.5; ctx.strokeRect(ux - bodyW*0.7, bodyTop - 2*sc, bodyW*1.4, bodyH + 4*sc);
    }

    // --- HEAD ---
    if (n !== 'Cannon' && n !== 'Catapult') {
      // Head shape
      ctx.fillStyle = skinColor;
      ctx.beginPath();
      ctx.arc(ux, headY, headR, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1; ctx.stroke();

      // Eyes
      const eyeX = ux + dir * headR * 0.35;
      const eyeY = headY - headR * 0.1;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(eyeX, eyeY, 2.2*sc, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = n === 'Dark Mage' || n === 'Necromancer' ? '#a855f7' : n === 'Dragon' ? '#ff4500' : n === 'Berserker' ? '#e74c3c' : '#222';
      ctx.beginPath(); ctx.arc(eyeX + dir*0.6*sc, eyeY, 1.2*sc, 0, Math.PI*2); ctx.fill();

      // HEADGEAR per unit
      if (n === 'Knight') {
        // Helmet
        ctx.fillStyle = '#888';
        ctx.beginPath(); ctx.arc(ux, headY, headR + 1*sc, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#666';
        ctx.fillRect(ux - headR*0.2, headY - headR*0.5, headR*0.4, headR*0.8);
      } else if (n === 'Viking') {
        // Horned helmet
        ctx.fillStyle = '#666';
        ctx.beginPath(); ctx.arc(ux, headY - 1*sc, headR, Math.PI, 0); ctx.fill();
        ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2*sc;
        ctx.beginPath(); ctx.moveTo(ux - headR, headY - 2*sc); ctx.lineTo(ux - headR - 4*sc, headY - 8*sc); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ux + headR, headY - 2*sc); ctx.lineTo(ux + headR + 4*sc, headY - 8*sc); ctx.stroke();
      } else if (n === 'Samurai') {
        // Samurai helmet
        ctx.fillStyle = '#8B0000';
        ctx.beginPath(); ctx.arc(ux, headY - 1*sc, headR + 2*sc, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#ffd700';
        ctx.beginPath(); ctx.moveTo(ux, headY - headR - 3*sc); ctx.lineTo(ux - 3*sc, headY - headR); ctx.lineTo(ux + 3*sc, headY - headR); ctx.fill();
      } else if (n === 'King') {
        // Crown
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(ux - headR, headY - headR - 2*sc, headR*2, 4*sc);
        ctx.beginPath();
        for (let i = 0; i < 3; i++) {
          const px = ux - headR + (i+0.5) * headR * 2/3;
          ctx.moveTo(px - 1.5*sc, headY - headR - 2*sc);
          ctx.lineTo(px, headY - headR - 6*sc);
          ctx.lineTo(px + 1.5*sc, headY - headR - 2*sc);
        }
        ctx.fill();
      } else if (n === 'Wizard') {
        // Wizard hat
        ctx.fillStyle = '#6a3aa2';
        ctx.beginPath(); ctx.moveTo(ux - headR - 2*sc, headY - headR*0.3); ctx.lineTo(ux, headY - headR - 12*sc); ctx.lineTo(ux + headR + 2*sc, headY - headR*0.3); ctx.fill();
        ctx.fillStyle = '#ffd93d';
        ctx.beginPath(); ctx.arc(ux, headY - headR - 12*sc, 1.5*sc, 0, Math.PI*2); ctx.fill();
      } else if (n === 'Ninja') {
        // Mask
        ctx.fillStyle = '#222';
        ctx.fillRect(ux - headR, headY - 1*sc, headR*2, headR*0.8);
      } else if (n === 'Pirate') {
        // Pirate hat
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.ellipse(ux, headY - headR*0.6, headR + 3*sc, 3*sc, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillRect(ux - headR*0.8, headY - headR - 4*sc, headR*1.6, 5*sc);
      } else if (n === 'Spartan') {
        // Spartan helmet crest
        ctx.fillStyle = '#8B0000';
        ctx.beginPath(); ctx.arc(ux, headY, headR + 1*sc, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#cc0000';
        ctx.fillRect(ux - 1*sc, headY - headR - 5*sc, 2*sc, 7*sc);
      } else if (n === 'Witch') {
        // Witch hat
        ctx.fillStyle = '#2a0a2e';
        ctx.beginPath(); ctx.moveTo(ux - headR - 3*sc, headY - headR*0.2); ctx.lineTo(ux + 2*sc, headY - headR - 14*sc); ctx.lineTo(ux + headR + 3*sc, headY - headR*0.2); ctx.fill();
      } else if (n === 'Healer') {
        // White cap
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ux, headY - 1*sc, headR + 1*sc, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(ux - 1*sc, headY - headR - 1*sc, 2*sc, 4*sc);
        ctx.fillRect(ux - 2*sc, headY - headR + 0.5*sc, 4*sc, 1.5*sc);
      } else if (n === 'Fire Mage') {
        ctx.fillStyle = '#8B0000';
        ctx.beginPath(); ctx.moveTo(ux - headR - 1*sc, headY - headR*0.3); ctx.lineTo(ux, headY - headR - 10*sc); ctx.lineTo(ux + headR + 1*sc, headY - headR*0.3); ctx.fill();
      } else if (n === 'Ice Mage') {
        ctx.fillStyle = '#1a6a8a';
        ctx.beginPath(); ctx.moveTo(ux - headR - 1*sc, headY - headR*0.3); ctx.lineTo(ux, headY - headR - 10*sc); ctx.lineTo(ux + headR + 1*sc, headY - headR*0.3); ctx.fill();
      } else if (n === 'Necromancer') {
        // Hood
        ctx.fillStyle = '#1a0a1e';
        ctx.beginPath(); ctx.arc(ux, headY, headR + 2*sc, Math.PI, 0); ctx.fill();
        ctx.fillRect(ux - headR - 2*sc, headY - 1*sc, headR*2 + 4*sc, headR);
      } else if (n === 'Dark Mage') {
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(ux, headY, headR + 2*sc, Math.PI, 0); ctx.fill();
        ctx.fillRect(ux - headR - 2*sc, headY - 1*sc, headR*2 + 4*sc, headR*0.7);
      } else if (n === 'Shaman') {
        // Feathered headband
        ctx.fillStyle = '#8B6914';
        ctx.fillRect(ux - headR, headY - headR*0.5, headR*2, 2*sc);
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.moveTo(ux + headR*0.5, headY - headR*0.5); ctx.lineTo(ux + headR*0.7, headY - headR - 5*sc); ctx.lineTo(ux + headR*0.9, headY - headR*0.5); ctx.fill();
        ctx.fillStyle = '#2ecc71';
        ctx.beginPath(); ctx.moveTo(ux + headR*0.1, headY - headR*0.5); ctx.lineTo(ux + headR*0.3, headY - headR - 4*sc); ctx.lineTo(ux + headR*0.5, headY - headR*0.5); ctx.fill();
      } else if (n === 'Monk') {
        // Bald head is default
      } else if (n === 'Troll') {
        // Wild hair
        ctx.fillStyle = '#3a5a2a';
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath(); ctx.moveTo(ux + i*2*sc, headY - headR); ctx.lineTo(ux + i*3*sc, headY - headR - 5*sc); ctx.lineTo(ux + (i+1)*2*sc, headY - headR); ctx.fill();
        }
      } else if (n === 'Golem') {
        // Rocky head — no hair, cracks
        ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(ux - 2*sc, headY - headR*0.8); ctx.lineTo(ux + 1*sc, headY); ctx.stroke();
      } else if (n === 'Dragon') {
        // Horns
        ctx.fillStyle = '#ffd700';
        ctx.beginPath(); ctx.moveTo(ux - headR*0.6, headY - headR); ctx.lineTo(ux - headR*0.3, headY - headR - 6*sc); ctx.lineTo(ux, headY - headR); ctx.fill();
        ctx.beginPath(); ctx.moveTo(ux + headR*0.6, headY - headR); ctx.lineTo(ux + headR*0.3, headY - headR - 6*sc); ctx.lineTo(ux, headY - headR); ctx.fill();
      } else if (n === 'Gladiator') {
        // Gladiator helmet
        ctx.fillStyle = '#b8860b';
        ctx.beginPath(); ctx.arc(ux, headY, headR + 1*sc, Math.PI, 0); ctx.fill();
      } else if (n === 'Giant') {
        // Messy hair
        ctx.fillStyle = '#4a3a5a';
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath(); ctx.moveTo(ux + i*3*sc, headY - headR); ctx.lineTo(ux + i*4*sc, headY - headR - 4*sc); ctx.lineTo(ux + (i+1)*3*sc, headY - headR); ctx.fill();
        }
      }

      // Mouth
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
      if (n === 'Berserker' || n === 'Dragon' || n === 'Giant' || n === 'Troll') {
        // Angry mouth
        ctx.beginPath();
        ctx.moveTo(ux + dir*headR*0.1, headY + headR*0.4);
        ctx.lineTo(ux + dir*headR*0.6, headY + headR*0.2);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(ux + dir*headR*0.2, headY + headR*0.35, 1.5*sc, 0, Math.PI);
        ctx.stroke();
      }
    }
  }

  render() {
    ctx.save();
    ctx.fillStyle = '#2d5016';
    ctx.fillRect(0, 0, this.W, this.H);
    ctx.scale(this.zoom, this.zoom);
    ctx.translate(-this.camX + this.shakeX, -this.camY + this.shakeY);

    // Grass (cached)
    if (!this.grassCache) {
      this.grassCache = document.createElement('canvas');
      this.grassCache.width = this.W;
      this.grassCache.height = this.H;
      const gc = this.grassCache.getContext('2d');
      gc.fillStyle = '#2d5016';
      gc.fillRect(0, 0, this.W, this.H);
      gc.fillStyle = '#3a6b1e';
      for (let x = 0; x < this.W; x += 40) {
        for (let y = 0; y < this.H; y += 40) {
          const ox = ((x * 7 + y * 13) % 20) - 10;
          gc.fillRect(x + ox, y, 20, 20);
        }
      }
    }
    ctx.drawImage(this.grassCache, 0, 0);

    // Dividing line during placement
    if (this.phase === 'place') {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.setLineDash([10, 10]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(this.W / 2, 0);
      ctx.lineTo(this.W / 2, this.H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Team labels
      ctx.font = 'bold 24px sans-serif';
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#4ecdc4';
      ctx.textAlign = 'center';
      ctx.fillText('BLUE TEAM', this.W * 0.25, this.H / 2);
      ctx.fillStyle = '#e94560';
      ctx.fillText('RED TEAM', this.W * 0.75, this.H / 2);
      ctx.globalAlpha = 1;

      // Highlight active placement side
      ctx.fillStyle = this.placingTeam === 'blue' ? 'rgba(78,205,196,0.05)' : 'rgba(233,69,96,0.05)';
      if (this.placingTeam === 'blue') ctx.fillRect(0, 0, this.W / 2, this.H);
      else ctx.fillRect(this.W / 2, 0, this.W / 2, this.H);
    }

    // Projectile trails
    for (const p of this.projectiles) {
      if (p.trail.length > 1) {
        ctx.strokeStyle = p.team === 'blue' ? 'rgba(78,205,196,0.4)' : 'rgba(233,69,96,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (let i = 1; i < p.trail.length; i++) ctx.lineTo(p.trail[i].x, p.trail[i].y);
        ctx.stroke();
      }
      ctx.fillStyle = p.team === 'blue' ? '#4ecdc4' : '#e94560';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Particles
    for (const p of this.particles) {
      ctx.globalAlpha = Math.min(1, p.life / 15);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Units
    for (const u of this.units) {
      if (!u.alive && u.deathTimer <= 0) continue;

      const alpha = u.alive ? 1 : u.deathTimer / 60;
      ctx.globalAlpha = alpha;

      const s = u.def.size;
      const flyOffset = u.def.flying ? 40 + Math.sin(Date.now() * 0.003) * 5 : 0;
      const wobbleX = u.alive && this.phase === 'battle' ? Math.sin(u.wobble * 3) * 2 : 0;
      const wobbleY = u.alive && this.phase === 'battle' ? Math.abs(Math.sin(u.wobble * 6)) * 2
        : u.alive ? Math.sin(Date.now() * 0.003 + u.x * 0.1) * 1.5 : 0;
      const hitShakeX = u.hitShake > 0 ? (Math.random() - 0.5) * u.hitShake * 2 : 0;
      const hitShakeY = u.hitShake > 0 ? (Math.random() - 0.5) * u.hitShake * 2 : 0;
      const ux = u.x + wobbleX + hitShakeX;
      const uy = u.y - wobbleY - flyOffset + hitShakeY;

      // Spawn pop-in scale
      const spawnScale = u.spawnScale !== undefined ? u.spawnScale : 1;
      if (spawnScale < 1) {
        // Elastic ease-out
        const t = spawnScale;
        const sc = t < 0.5 ? t * 2.5 : 1 + Math.sin((t - 0.5) * Math.PI) * 0.3;
        ctx.save();
        ctx.translate(ux, uy);
        ctx.scale(sc, sc);
        ctx.translate(-ux, -uy);
      }

      // Flying unit ground shadow
      if (u.def.flying && u.alive) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.ellipse(u.x, u.y + s * 0.7, s * 1.2, s * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        // Dashed line connecting shadow to unit
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.setLineDash([3,3]);
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(u.x, u.y);
        ctx.lineTo(u.x, uy + s);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Selection ring for controlled unit
      if (u === this.controlledUnit && u.alive) {
        ctx.strokeStyle = '#ffd93d';
        ctx.lineWidth = 3;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.arc(u.x, u.y, s + 8 + Math.sin(Date.now() * 0.005) * 2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        // Attack range circle
        ctx.strokeStyle = 'rgba(255,217,61,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(u.x, u.y, u.def.range, 0, Math.PI * 2);
        ctx.stroke();
        // Cooldown indicator
        if (u.atkCooldown > 0) {
          const cd = u.atkCooldown / u.def.atkSpeed;
          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          ctx.font = 'bold 10px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('COOLDOWN', u.x, u.y + s + 20);
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(u.x - 15, u.y + s + 23, 30, 4);
          ctx.fillStyle = '#ffd93d';
          ctx.fillRect(u.x - 15, u.y + s + 23, 30 * (1 - cd), 4);
        }
      }

      this.drawUnitBody(u, ux, uy, s);

      // Attack flash overlay (white flash when hit)
      if (u.attackFlash > 0) {
        ctx.globalAlpha = u.attackFlash * 0.6;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ux, uy, s * 1.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = alpha;
      }

      // Close spawn scale transform
      if (spawnScale < 1) {
        ctx.restore();
      }

      // HP bar
      if (u.alive && u.hp < u.maxHp) {
        const barW = s * 2;
        const barH = 3;
        const barX = ux - barW / 2;
        const barY = uy - s * 1.8;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = u.hp / u.maxHp > 0.5 ? '#2ecc71' : u.hp / u.maxHp > 0.25 ? '#f39c12' : '#e74c3c';
        ctx.fillRect(barX, barY, barW * (u.hp / u.maxHp), barH);
      }

      // Name in placement
      if (this.phase === 'place') {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(u.def.name, u.x, u.y + s + 12);
      }
    }
    ctx.globalAlpha = 1;

    // Unit counts in battle
    if (this.phase === 'battle') {
      const blueCount = this.units.filter(u => u.team === 'blue' && u.alive).length;
      const redCount = this.units.filter(u => u.team === 'red' && u.alive).length;
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillStyle = '#4ecdc4';
      ctx.fillText(`Blue: ${blueCount}`, 12, 30);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#e94560';
      ctx.fillText(`Red: ${redCount}`, this.W - 12, 30);

      // Ability timer bars on units
      for (const u of this.units) {
        if (!u.alive || !this.abilitiesEnabled) continue;
        const s = u.def.size;
        if (!u.abilityUsed) {
          // Show ability charge bar
          const progress = Math.min(1, u.abilityTimer / 2400);
          const barW = s * 2;
          const barY = u.y + s + 6;
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(u.x - barW/2, barY, barW, 3);
          ctx.fillStyle = progress >= 1 ? '#ffd93d' : '#8e44ad';
          ctx.fillRect(u.x - barW/2, barY, barW * progress, 3);
        } else if (u.abilityActive > 0) {
          // Show active buff glow
          ctx.strokeStyle = 'rgba(255,217,61,0.5)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(u.x, u.y, s + 4 + Math.sin(Date.now() * 0.01) * 2, 0, Math.PI * 2);
          ctx.stroke();
        }
        // Invincible shield effect
        if (u.invincible) {
          ctx.strokeStyle = 'rgba(255,215,0,0.7)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(u.x, u.y, s + 6, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      // Ability popups
      if (this.abilityPopups) {
        for (let i = this.abilityPopups.length - 1; i >= 0; i--) {
          const p = this.abilityPopups[i];
          p.y -= 0.5;
          p.life--;
          if (p.life <= 0) { this.abilityPopups.splice(i, 1); continue; }
          ctx.globalAlpha = Math.min(1, p.life / 30);
          ctx.fillStyle = p.color;
          ctx.font = 'bold 14px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(p.text, p.x, p.y);
          ctx.globalAlpha = 1;
        }
      }
    }

    ctx.restore();

    // Zoom indicator (drawn in screen space)
    if (this.zoom !== 1) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(this.W - 90, 30, 80, 24);
      ctx.fillStyle = '#fff';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`Zoom: ${this.zoom.toFixed(1)}x`, this.W - 50, 47);
    }
  }

  loop() {
    // Arrow keys pan camera when no unit is controlled
    const panSpeed = 5 / this.zoom;
    if (!this.controlledUnit || !this.controlledUnit.alive) {
      if (this.keys['arrowup']) this.camY -= panSpeed;
      if (this.keys['arrowdown']) this.camY += panSpeed;
      if (this.keys['arrowleft']) this.camX -= panSpeed;
      if (this.keys['arrowright']) this.camX += panSpeed;
    }
    this.update();
    this.render();
    requestAnimationFrame(() => this.loop());
  }
}

const game = new Game();
</script>
