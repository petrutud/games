<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkers — Petru Tudorica</title>
<link rel="icon" href="/favicon.svg" type="image/gif">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@500;700&family=Roboto:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #12100e;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    user-select: none;
  }

  /* Site navbar */
  .site-nav {
    background: rgba(15,15,35,0.85);
    backdrop-filter: blur(10px);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 500;
    position: relative;
  }
  .site-nav a {
    color: #ccc;
    text-decoration: none;
    font-family: 'Roboto', sans-serif;
    font-size: 14px;
    transition: color 0.2s;
  }
  .site-nav a:hover { color: #fff; }
  .site-nav .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
    font-size: 16px;
  }
  .site-nav .brand img {
    width: 28px;
    height: 28px;
  }
  .site-nav .nav-links {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .site-nav .nav-links a:hover { color: #ffd700; }

  /* Game wrapper */
  .game-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  /* Site footer */
  .site-footer {
    text-align: center;
    padding: 16px;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    font-family: 'Roboto', sans-serif;
    position: relative;
    z-index: 1;
  }
  .site-footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
  .site-footer a:hover { color: #fff; }

  #bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(200,80,20,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 60%, rgba(40,20,10,0.15) 0%, transparent 60%),
      linear-gradient(180deg, #1a1510 0%, #12100e 50%, #0e0c0a 100%);
  }

  /* Menu */
  #menu {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 50% 35%, rgba(200,100,30,0.1) 0%, transparent 60%),
      linear-gradient(180deg, #1a1510 0%, #12100e 50%, #0e0c0a 100%);
    gap: 28px;
    animation: fadeIn 0.5s ease;
  }

  #menu.hidden { display: none; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .menu-title {
    font-family: 'Cinzel', serif;
    font-size: 50px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #e8a050, #fff8e0, #c07030, #ffe0a0);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s ease infinite;
    filter: drop-shadow(0 0 25px rgba(200,120,40,0.4));
    text-align: center;
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .menu-sub {
    color: rgba(255,255,255,0.2);
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: -18px;
  }

  .menu-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .menu-section h3 {
    font-family: 'Cinzel', serif;
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .menu-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .menu-btn {
    padding: 18px 30px;
    min-width: 145px;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    background: rgba(255,255,255,0.02);
    color: #998877;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }

  .menu-btn:hover {
    border-color: rgba(220,140,50,0.35);
    color: #e8a050;
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(200,120,40,0.12);
    background: rgba(200,120,40,0.06);
  }

  .menu-btn .icon { display: block; font-size: 28px; margin-bottom: 6px; }
  .menu-btn .desc {
    display: block; font-size: 9px; font-family: 'Inter', sans-serif;
    color: rgba(255,255,255,0.2); margin-top: 5px; letter-spacing: 0; font-weight: 500;
  }

  /* Game */
  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 16px;
  }

  #app.hidden { display: none; }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, #e8a050, #fff8e0, #c07030);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease infinite;
    filter: drop-shadow(0 0 15px rgba(200,120,40,0.3));
    letter-spacing: 3px;
  }

  #status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 22px;
    border-radius: 30px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .turn-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .turn-dot.red { background: #cc3333; box-shadow: 0 0 10px rgba(200,50,50,0.5); }
  .turn-dot.black { background: #2a2a2a; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

  #turn-text {
    color: #998877;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  #thinking {
    display: none;
    align-items: center;
    gap: 8px;
    color: #887766;
    font-size: 12px;
    font-weight: 600;
  }
  #thinking.active { display: flex; }

  .dots span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #c07030;
    margin: 0 1px;
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  #piece-count {
    display: flex;
    gap: 20px;
    font-size: 13px;
    font-weight: 700;
  }
  .count-red { color: #cc4444; }
  .count-black { color: #888; }

  /* Board */
  #board-wrap {
    position: relative;
    border-radius: 12px;
    padding: 6px;
    background: linear-gradient(135deg, rgba(180,120,50,0.2), rgba(100,60,20,0.15));
    box-shadow:
      0 0 50px rgba(180,120,40,0.08),
      0 15px 50px rgba(0,0,0,0.5),
      inset 0 0 25px rgba(255,255,255,0.02);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
  }

  .sq {
    width: 68px; height: 68px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    position: relative;
    transition: background 0.15s;
  }

  .sq.light { background: #d4b896; }
  .sq.dark { background: #6b4226; }
  .sq.dark:hover { background: #7a4e2e; }

  .sq.selected { background: rgba(255,200,60,0.45) !important; }

  .sq.move-target::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    pointer-events: none;
    animation: targetPulse 1s ease-in-out infinite;
  }

  @keyframes targetPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.3); opacity: 0.8; }
  }

  .sq.capture-target {
    background: rgba(255,60,60,0.25) !important;
  }

  .sq.capture-target::after {
    content: '';
    position: absolute;
    width: 50px; height: 50px;
    border-radius: 50%;
    border: 3px solid rgba(255,80,80,0.4);
    pointer-events: none;
    animation: targetPulse 1s ease-in-out infinite;
  }

  .sq.last-from { background: rgba(200,160,80,0.2) !important; }
  .sq.last-to { background: rgba(200,160,80,0.3) !important; }

  /* Pieces */
  .piece {
    width: 52px; height: 52px;
    border-radius: 50%;
    cursor: grab;
    position: relative;
    transition: transform 0.15s;
  }

  .piece:hover { transform: scale(1.08); }
  .sq.selected .piece { transform: scale(1.12); }

  .piece.red {
    background: radial-gradient(circle at 35% 35%, #ff6655, #cc2222, #881111);
    box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 -3px 6px rgba(0,0,0,0.3), 0 0 15px rgba(200,50,50,0.2);
    border: 2px solid rgba(255,100,80,0.4);
  }

  .piece.black-p {
    background: radial-gradient(circle at 35% 35%, #555, #2a2a2a, #111);
    box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 -3px 6px rgba(0,0,0,0.4), 0 0 15px rgba(0,0,0,0.2);
    border: 2px solid rgba(100,100,100,0.3);
  }

  /* Shine */
  .piece::before {
    content: '';
    position: absolute;
    top: 6px; left: 10px;
    width: 16px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }

  /* King crown */
  .piece.king::after {
    content: '\265A';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: rgba(255,215,0,0.8);
    text-shadow: 0 0 8px rgba(255,215,0,0.5);
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
  }

  /* Controls */
  #controls {
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 9px 24px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 25px;
    background: rgba(255,255,255,0.04);
    color: #998877;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(220,140,50,0.25);
    color: #e8a050;
  }

  #mode-badge {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }

  /* Overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,8,6,0.85);
    backdrop-filter: blur(10px);
    z-index: 50;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    animation: fadeIn 0.4s ease;
  }
  .overlay.active { display: flex; }

  .overlay h2 {
    font-family: 'Cinzel', serif;
    font-size: 44px;
    font-weight: 900;
    background: linear-gradient(135deg, #e8a050, #ffe0a0, #c07030);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(200,120,40,0.4));
    margin-bottom: 10px;
  }

  .overlay p {
    color: #887766;
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .overlay .btn {
    font-size: 17px;
    padding: 13px 40px;
    margin-top: 18px;
  }

  @media (max-width: 580px) {
    .sq { width: 44px; height: 44px; }
    .piece { width: 34px; height: 34px; }
    .piece.king::after { font-size: 16px; }
    .menu-title { font-size: 32px; }
    .menu-btn { min-width: 110px; padding: 14px 18px; font-size: 13px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="/" class="brand">
    <img src="/favicon.svg" alt="Home">
    Petru Tudorica
  </a>
  <div class="nav-links">
    <a href="/#projects">Games</a>
  </div>
</nav>

<div class="game-wrapper">
<div id="bg"></div>

<div id="menu">
  <div class="menu-title">CHECKERS</div>
  <div class="menu-sub">Classic Board Game</div>

  <div class="menu-section">
    <h3>2 Players</h3>
    <div class="menu-row">
      <button class="menu-btn" onclick="startGame('pvp')">
        <span class="icon">&#9823; vs &#9817;</span>
        Local Match
        <span class="desc">Play on same screen</span>
      </button>
    </div>
  </div>

  <div class="menu-section">
    <h3>vs Computer</h3>
    <div class="menu-row">
      <button class="menu-btn" onclick="startGame('easy')">
        <span class="icon">&#9786;</span>
        Easy
        <span class="desc">Learning mode</span>
      </button>
      <button class="menu-btn" onclick="startGame('medium')">
        <span class="icon">&#9813;</span>
        Medium
        <span class="desc">A good challenge</span>
      </button>
      <button class="menu-btn" onclick="startGame('hard')">
        <span class="icon">&#9876;</span>
        Hard
        <span class="desc">Thinks ahead</span>
      </button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <h1>CHECKERS</h1>

  <div id="status-bar">
    <div class="turn-dot" id="turn-dot"></div>
    <span id="turn-text">Red's turn</span>
  </div>

  <div id="thinking">
    Thinking<span class="dots"><span></span><span></span><span></span></span>
  </div>

  <div id="piece-count">
    <span class="count-red" id="red-count">12</span>
    <span style="color:rgba(255,255,255,0.15)">vs</span>
    <span class="count-black" id="black-count">12</span>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div id="mode-badge"></div>

  <div id="controls">
    <button class="btn" onclick="undoMove()">Undo</button>
    <button class="btn" onclick="showMenu()">Menu</button>
  </div>
</div>

<div class="overlay" id="overlay-end">
  <h2 id="end-title"></h2>
  <p id="end-msg"></p>
  <button class="btn" onclick="showMenu()">New Game</button>
</div>

<script>
// CHECKERS ENGINE
const boardEl = document.getElementById('board');
let board, turn, selected, validMoves, lastMove, stateHistory;
let gameMode = 'pvp';
let gameOver = false;
let botThinking = false;
let mustJumpFrom = null;

function newBoard() {
  const b = [];
  for (let r = 0; r < 8; r++) {
    b[r] = [];
    for (let c = 0; c < 8; c++) {
      if ((r + c) % 2 === 1) {
        if (r < 3) b[r][c] = 'b';
        else if (r > 4) b[r][c] = 'r';
        else b[r][c] = '';
      } else {
        b[r][c] = '';
      }
    }
  }
  return b;
}

function cloneBoard(b) { return b.map(r => [...r]); }

function isRed(p) { return p === 'r' || p === 'R'; }
function isBlack(p) { return p === 'b' || p === 'B'; }
function isKing(p) { return p === 'R' || p === 'B'; }
function isColor(p, color) { return color === 'r' ? isRed(p) : isBlack(p); }
function opponent(c) { return c === 'r' ? 'b' : 'r'; }

function getMovesForPiece(b, row, col, onlyJumps) {
  const p = b[row][col];
  if (!p) return [];
  const color = isRed(p) ? 'r' : 'b';
  const king = isKing(p);
  const dirs = [];

  if (king || color === 'r') dirs.push([-1, -1], [-1, 1]);
  if (king || color === 'b') dirs.push([1, -1], [1, 1]);

  const moves = [];

  for (const [dr, dc] of dirs) {
    const mr = row + dr, mc = col + dc;
    if (mr < 0 || mr >= 8 || mc < 0 || mc >= 8) continue;

    if (!onlyJumps && b[mr][mc] === '') {
      moves.push({ fr: row, fc: col, tr: mr, tc: mc, jump: false, captured: null });
    }

    const jr = row + dr * 2, jc = col + dc * 2;
    if (jr < 0 || jr >= 8 || jc < 0 || jc >= 8) continue;
    if (b[mr][mc] !== '' && !isColor(b[mr][mc], color) && b[jr][jc] === '') {
      moves.push({ fr: row, fc: col, tr: jr, tc: jc, jump: true, captured: [mr, mc] });
    }
  }

  return moves;
}

function getAllMoves(b, color) {
  const jumps = [];
  const simple = [];

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (b[r][c] && isColor(b[r][c], color)) {
        const j = getMovesForPiece(b, r, c, true);
        const s = getMovesForPiece(b, r, c, false);
        jumps.push(...j);
        simple.push(...s);
      }
    }
  }

  return jumps.length > 0 ? jumps : simple;
}

function hasJumps(b, color) {
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (b[r][c] && isColor(b[r][c], color))
        if (getMovesForPiece(b, r, c, true).length > 0) return true;
  return false;
}

function getJumpsFrom(b, row, col) {
  return getMovesForPiece(b, row, col, true);
}

function countPieces(b, color) {
  let n = 0;
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (b[r][c] && isColor(b[r][c], color)) n++;
  return n;
}

// GAME STATE
function showMenu() {
  document.getElementById('overlay-end').classList.remove('active');
  document.getElementById('menu').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}

function startGame(mode) {
  gameMode = mode;
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  resetGame();
}

function resetGame() {
  board = newBoard();
  turn = 'r';
  selected = null;
  validMoves = [];
  lastMove = null;
  stateHistory = [];
  gameOver = false;
  botThinking = false;
  mustJumpFrom = null;
  document.getElementById('overlay-end').classList.remove('active');
  document.getElementById('thinking').classList.remove('active');

  const labels = { pvp: 'Player vs Player', easy: 'vs Bot \u2022 Easy', medium: 'vs Bot \u2022 Medium', hard: 'vs Bot \u2022 Hard' };
  document.getElementById('mode-badge').textContent = labels[gameMode] || '';

  render();
}

function saveState() {
  stateHistory.push({
    board: cloneBoard(board),
    turn, lastMove: lastMove ? { ...lastMove } : null,
    mustJumpFrom: mustJumpFrom ? [...mustJumpFrom] : null
  });
}

function undoMove() {
  if (stateHistory.length === 0 || gameOver || botThinking) return;
  if (gameMode !== 'pvp' && stateHistory.length >= 2) {
    stateHistory.pop();
    const s = stateHistory.pop();
    board = s.board; turn = s.turn; lastMove = s.lastMove; mustJumpFrom = s.mustJumpFrom;
  } else if (gameMode === 'pvp') {
    const s = stateHistory.pop();
    board = s.board; turn = s.turn; lastMove = s.lastMove; mustJumpFrom = s.mustJumpFrom;
  }
  selected = null; validMoves = [];
  render();
}

function doMove(move) {
  saveState();

  const { fr, fc, tr, tc, jump, captured } = move;
  board[tr][tc] = board[fr][fc];
  board[fr][fc] = '';

  if (captured) {
    board[captured[0]][captured[1]] = '';
  }

  if (board[tr][tc] === 'r' && tr === 0) board[tr][tc] = 'R';
  if (board[tr][tc] === 'b' && tr === 7) board[tr][tc] = 'B';

  lastMove = { fr, fc, tr, tc };

  if (jump) {
    const moreJumps = getJumpsFrom(board, tr, tc);
    if (moreJumps.length > 0) {
      mustJumpFrom = [tr, tc];
      selected = [tr, tc];
      validMoves = moreJumps.map(m => [m.tr, m.tc]);
      render();

      if (gameMode !== 'pvp' && turn === 'b') {
        setTimeout(() => doBotMultiJump(tr, tc), 300);
      }
      return;
    }
  }

  mustJumpFrom = null;
  turn = opponent(turn);
  selected = null;
  validMoves = [];

  const oppMoves = getAllMoves(board, turn);
  if (oppMoves.length === 0 || countPieces(board, turn) === 0) {
    gameOver = true;
    const winner = opponent(turn);
    let title, msg;
    if (gameMode === 'pvp') {
      title = (winner === 'r' ? 'Red' : 'Black') + ' Wins!';
      msg = 'No moves left for ' + (turn === 'r' ? 'Red' : 'Black');
    } else {
      title = winner === 'r' ? 'You Win!' : 'Bot Wins!';
      msg = winner === 'r' ? 'Great game!' : 'Better luck next time';
    }
    document.getElementById('end-title').textContent = title;
    document.getElementById('end-msg').textContent = msg;
    setTimeout(() => document.getElementById('overlay-end').classList.add('active'), 400);
  }

  render();

  if (!gameOver && gameMode !== 'pvp' && turn === 'b') {
    triggerBot();
  }
}

// RENDERING
function render() {
  boardEl.innerHTML = '';

  const allMoves = mustJumpFrom ? [] : getAllMoves(board, turn);

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = document.createElement('div');
      sq.className = 'sq ' + ((r + c) % 2 === 0 ? 'light' : 'dark');

      if (lastMove) {
        if (r === lastMove.fr && c === lastMove.fc) sq.classList.add('last-from');
        if (r === lastMove.tr && c === lastMove.tc) sq.classList.add('last-to');
      }

      if (selected && selected[0] === r && selected[1] === c) {
        sq.classList.add('selected');
      }

      const isTarget = validMoves.some(m => m[0] === r && m[1] === c);
      if (isTarget) {
        if (board[r][c]) sq.classList.add('capture-target');
        else {
          const isJump = mustJumpFrom || allMoves.some(m => m.jump && m.tr === r && m.tc === c);
          sq.classList.add(isJump ? 'capture-target' : 'move-target');
        }
      }

      if (board[r][c]) {
        const piece = document.createElement('div');
        piece.className = 'piece';
        if (isRed(board[r][c])) piece.classList.add('red');
        else piece.classList.add('black-p');
        if (isKing(board[r][c])) piece.classList.add('king');
        sq.appendChild(piece);
      }

      sq.addEventListener('click', () => onSquareClick(r, c));
      boardEl.appendChild(sq);
    }
  }

  const dot = document.getElementById('turn-dot');
  dot.className = 'turn-dot ' + (turn === 'r' ? 'red' : 'black');

  if (gameMode === 'pvp') {
    document.getElementById('turn-text').textContent = (turn === 'r' ? "Red" : "Black") + "'s turn";
  } else {
    document.getElementById('turn-text').textContent = turn === 'r' ? "Your turn" : "Bot's turn";
  }

  document.getElementById('red-count').textContent = countPieces(board, 'r');
  document.getElementById('black-count').textContent = countPieces(board, 'b');
}

// INPUT
function onSquareClick(r, c) {
  if (gameOver || botThinking) return;
  if (gameMode !== 'pvp' && turn === 'b') return;

  if (mustJumpFrom) {
    if (validMoves.some(m => m[0] === r && m[1] === c)) {
      const jumps = getJumpsFrom(board, mustJumpFrom[0], mustJumpFrom[1]);
      const move = jumps.find(m => m.tr === r && m.tc === c);
      if (move) doMove(move);
    }
    return;
  }

  if (selected && validMoves.some(m => m[0] === r && m[1] === c)) {
    const [fr, fc] = selected;
    const allM = getAllMoves(board, turn);
    const move = allM.find(m => m.fr === fr && m.fc === fc && m.tr === r && m.tc === c);
    if (move) doMove(move);
    return;
  }

  if (board[r][c] && isColor(board[r][c], turn)) {
    const allM = getAllMoves(board, turn);
    const pieceMoves = allM.filter(m => m.fr === r && m.fc === c);
    if (pieceMoves.length > 0) {
      selected = [r, c];
      validMoves = pieceMoves.map(m => [m.tr, m.tc]);
      render();
    }
    return;
  }

  selected = null;
  validMoves = [];
  render();
}

// BOT AI (Minimax + Alpha-Beta)
function evaluateBoard(b) {
  let score = 0;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = b[r][c];
      if (!p) continue;

      let val = 0;
      if (p === 'b') {
        val = 10 + r;
        if (c >= 2 && c <= 5) val += 1;
      } else if (p === 'B') {
        val = 25;
        if (c >= 2 && c <= 5 && r >= 2 && r <= 5) val += 3;
      } else if (p === 'r') {
        val = -(10 + (7 - r));
        if (c >= 2 && c <= 5) val -= 1;
      } else if (p === 'R') {
        val = -25;
        if (c >= 2 && c <= 5 && r >= 2 && r <= 5) val -= 3;
      }

      score += val;
    }
  }
  return score;
}

function simMove(b, move) {
  const nb = cloneBoard(b);
  nb[move.tr][move.tc] = nb[move.fr][move.fc];
  nb[move.fr][move.fc] = '';
  if (move.captured) nb[move.captured[0]][move.captured[1]] = '';
  if (nb[move.tr][move.tc] === 'r' && move.tr === 0) nb[move.tr][move.tc] = 'R';
  if (nb[move.tr][move.tc] === 'b' && move.tr === 7) nb[move.tr][move.tc] = 'B';

  if (move.jump) {
    const more = getJumpsFrom(nb, move.tr, move.tc);
    if (more.length > 0) {
      let best = more[0];
      let bestVal = -Infinity;
      for (const m of more) {
        const tb = simMove(nb, m);
        const v = evaluateBoard(tb);
        if (v > bestVal) { bestVal = v; best = m; }
      }
      return simMove(nb, best);
    }
  }

  return nb;
}

function minimax(b, depth, alpha, beta, maximizing) {
  if (depth === 0) return evaluateBoard(b);

  const color = maximizing ? 'b' : 'r';
  const moves = getAllMoves(b, color);

  if (moves.length === 0) {
    return maximizing ? -999 : 999;
  }

  if (maximizing) {
    let maxEval = -Infinity;
    for (const m of moves) {
      const nb = simMove(b, m);
      const ev = minimax(nb, depth - 1, alpha, beta, false);
      maxEval = Math.max(maxEval, ev);
      alpha = Math.max(alpha, ev);
      if (beta <= alpha) break;
    }
    return maxEval;
  } else {
    let minEval = Infinity;
    for (const m of moves) {
      const nb = simMove(b, m);
      const ev = minimax(nb, depth - 1, alpha, beta, true);
      minEval = Math.min(minEval, ev);
      beta = Math.min(beta, ev);
      if (beta <= alpha) break;
    }
    return minEval;
  }
}

function getBotMove() {
  const depthMap = { easy: 1, medium: 3, hard: 5 };
  const depth = depthMap[gameMode] || 3;

  const moves = getAllMoves(board, 'b');
  if (moves.length === 0) return null;

  if (gameMode === 'easy' && Math.random() < 0.35) {
    return moves[Math.floor(Math.random() * moves.length)];
  }

  let bestMove = moves[0];
  let bestEval = -Infinity;

  for (const m of moves) {
    const nb = simMove(board, m);
    const ev = minimax(nb, depth - 1, -Infinity, Infinity, false);
    const noise = gameMode === 'medium' ? (Math.random() - 0.5) * 3 : 0;
    if (ev + noise > bestEval) {
      bestEval = ev + noise;
      bestMove = m;
    }
  }

  return bestMove;
}

function triggerBot() {
  botThinking = true;
  document.getElementById('thinking').classList.add('active');
  render();

  setTimeout(() => {
    const move = getBotMove();
    botThinking = false;
    document.getElementById('thinking').classList.remove('active');
    if (move) doMove(move);
  }, 200);
}

function doBotMultiJump(row, col) {
  if (!mustJumpFrom) return;
  const jumps = getJumpsFrom(board, row, col);
  if (jumps.length === 0) return;

  let best = jumps[0];
  if (gameMode !== 'easy') {
    let bestVal = -Infinity;
    for (const j of jumps) {
      const nb = simMove(board, j);
      const v = evaluateBoard(nb);
      if (v > bestVal) { bestVal = v; best = j; }
    }
  } else {
    best = jumps[Math.floor(Math.random() * jumps.length)];
  }

  botThinking = true;
  setTimeout(() => {
    botThinking = false;
    doMove(best);
  }, 300);
}

// Start
showMenu();
</script>
