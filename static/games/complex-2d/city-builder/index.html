<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>City Builder</title>
<style>body{margin:0;background:#0d1218;color:#d9e4f2;font-family:system-ui}#ui{padding:10px}button{margin-right:6px}canvas{display:block;margin:0 auto;background:#141c26}</style></head>
<body><div id="ui"><b>City Builder</b> <button id="r">Residential</button><button id="i">Industrial</button><button id="p">Park</button> <span id="s"></span></div><canvas id="c" width="720" height="480"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d'),T=30,W=24,H=16,g=Array(W*H).fill(0),S=document.getElementById('s');let tool=1,pop=0,jobs=0,happy=50;
const id=(x,y)=>y*W+x; r.onclick=()=>tool=1; i.onclick=()=>tool=2; p.onclick=()=>tool=3;
c.onclick=e=>{const r=c.getBoundingClientRect(),gx=((e.clientX-r.left)/T|0),gy=((e.clientY-r.top)/T|0); if(gx>=0&&gy>=0&&gx<W&&gy<H) g[id(gx,gy)]=tool;};
setInterval(()=>{pop=g.filter(v=>v===1).length*8; jobs=g.filter(v=>v===2).length*10; happy=Math.max(0,Math.min(100,50+g.filter(v=>v===3).length*2-g.filter(v=>v===2).length)); S.textContent=`Pop ${pop} | Jobs ${jobs} | Happiness ${happy}`;},700);
function draw(){x.fillStyle='#141c26';x.fillRect(0,0,c.width,c.height); for(let y=0;y<H;y++)for(let xx=0;xx<W;xx++){const v=g[id(xx,y)];
 x.fillStyle=v===1?'#57a0ff':v===2?'#f08a5d':v===3?'#5bc27f':'#1d2736'; x.fillRect(xx*T+1,y*T+1,T-2,T-2);} requestAnimationFrame(draw);}draw();
</script></body></html>
