const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, dur, vol = 0.12) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxJump() { playSound(400, 'sine', 0.15); }
function sfxSquish() { playSound(200, 'square', 0.2, 0.08); setTimeout(() => playSound(300, 'sine', 0.1), 50); }

// ============================================================
// CAMERA SYSTEM
// The camera follows the player with smooth lerping.
// The level world is much bigger than the canvas - the camera
// defines which portion of the world is visible, offsetting
// all rendering by (camera.x, camera.y).
// ============================================================
const camera = { x: 0, y: 0 };

function updateCamera(targetX, targetY, levelW, levelH) {
    // We want the player roughly centered, with smooth follow
    const goalX = targetX - canvas.width / 2;
    const goalY = targetY - canvas.height / 2;
    camera.x += (goalX - camera.x) * 0.14;
    camera.y += (goalY - camera.y) * 0.14;
    // Clamp camera to level bounds
    camera.x = Math.max(0, Math.min(levelW - canvas.width, camera.x));
    camera.y = Math.max(0, Math.min(levelH - canvas.height, camera.y));
}

const particles = [];
function spawnParticles(x, y, color, count = 8, speed = 200) {
    for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = speed * (0.3 + Math.random() * 0.7);
        particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 80, life: 0.5 + Math.random()*0.3, max: 0.8, color, size: 2+Math.random()*3 });
    }
}

// ============================================================
// SCREEN SHAKE
// ============================================================
const screenShake = { x: 0, y: 0, intensity: 0, duration: 0 };
function triggerShake(intensity, duration) {
    screenShake.intensity = intensity;
    screenShake.duration = duration;
}
function updateShake(dt) {
    if (screenShake.duration > 0) {
        screenShake.duration -= dt;
        const t = screenShake.intensity * (screenShake.duration > 0 ? 1 : 0);
        screenShake.x = (Math.random() - 0.5) * t * 2;
        screenShake.y = (Math.random() - 0.5) * t * 2;
    } else {
        screenShake.x = 0;
        screenShake.y = 0;
    }
}

// ============================================================
// LEVEL DEFINITIONS
// Each level is a 2D grid of tile IDs. The grid is rendered
// as the game world. Enemies are defined separately with
// patrol ranges. The camera scrolls over this grid.
//
// Legend:
// 0=air, 1=ground, 2=spike, 3=coin, 4=flag, 5=grass,
// 6=wood, 7=stone, 8=star, 9=checkpoint
// 'E' in enemyDefs = square enemy with patrol range
// ============================================================

function makeLevel(strings, enemies, bg, bgFar) {
    const grid = strings.map(row => {
        const tiles = [];
        for (let i = 0; i < row.length; i++) {
            const ch = row[i];
            if (ch === '.') tiles.push(AIR);
            else if (ch === '#') tiles.push(GRASS);
            else if (ch === '=') tiles.push(GROUND);
            else if (ch === '^') tiles.push(SPIKE);
            else if (ch === 'o') tiles.push(COIN);
            else if (ch === 'F') tiles.push(FLAG);
            else if (ch === 'W') tiles.push(WOOD);
            else if (ch === 'S') tiles.push(STONE);
            else if (ch === '*') tiles.push(STAR);
            else if (ch === 'C') tiles.push(CHECKPOINT);
            else if (ch === 'E') tiles.push(ELECTRIC);
            else if (ch === 'U') tiles.push(GRAV_UP);
            else if (ch === 'D') tiles.push(GRAV_DOWN);
            else tiles.push(AIR);
        }
        return tiles;
    });
    return { grid, enemies, bg, bgFar, w: grid[0].length, h: grid.length, movPlats: [] };
}

// ============================================================
// PROCEDURAL LEVELS (5–999) + helpers
// ============================================================
const TILE_CHAR = {
    [AIR]: '.', [GROUND]: '=', [GRASS]: '#', [SPIKE]: '^', [COIN]: 'o',
    [FLAG]: 'F', [WOOD]: 'W', [STONE]: 'S', [STAR]: '*', [CHECKPOINT]: 'C',
    [ELECTRIC]: 'E', [GRAV_UP]: 'U', [GRAV_DOWN]: 'D',
};

function makeLevelFromGrid(grid, enemyList, bg, bgFar) {
    const strings = grid.map(row => row.map(t => (TILE_CHAR[t] !== undefined ? TILE_CHAR[t] : '.')).join(''));
    return makeLevel(strings, enemyList, bg, bgFar);
}

function mulberry32(seed) {
    return function() {
        let t = (seed += 0x6D2B79F5);
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

const THEME_BG = [
    ['#87CEEB', '#5ba3d9'],
    ['#f4a460', '#d4885a'],
    ['#4a4a6a', '#3a3a5a'],
    ['#2d4a2d', '#1d3a1d'],
    ['#4a1a1a', '#3a0a0a'],
    ['#6a4a8a', '#5a3a7a'],
    ['#3a5a6a', '#2a4a5a'],
    ['#5a4a3a', '#4a3a2a'],
];

function generateProceduralLevel(index) {
    const rng = mulberry32((index + 1) * 2654435761 + 104729);
    const bossLevel = (index + 1) % 20 === 0 && index >= 19;
    const [bg, bgFar] = THEME_BG[index % THEME_BG.length];
    const h = 18;
    const w = bossLevel ? 76 : 68 + (index % 8) * 2;

    const grid = [];
    for (let r = 0; r < h; r++) grid.push(new Array(w).fill(AIR));

    for (let c = 0; c < w; c++) {
        grid[h - 1][c] = GRASS;
        grid[h - 2][c] = GRASS;
    }

    const difficulty = Math.min(1, index / 250);
    const pitChance = bossLevel ? 0 : 0.03 + difficulty * 0.06;
    let c = 10;
    while (c < w - 18 && !bossLevel) {
        if (rng() < pitChance) {
            const pitW = 2 + Math.floor(rng() * 3);
            for (let pc = 0; pc < pitW && c + pc < w - 14; pc++) {
                grid[h - 1][c + pc] = AIR;
                grid[h - 2][c + pc] = AIR;
            }
            c += pitW + 5 + Math.floor(rng() * 8);
        } else c += 1;
    }

    for (let col = 0; col < 8; col++) {
        grid[h - 1][col] = GRASS;
        grid[h - 2][col] = GRASS;
    }
    for (let col = w - 10; col < w; col++) {
        grid[h - 1][col] = GRASS;
        grid[h - 2][col] = GRASS;
    }

    let flagC = w - 4;
    const flagRow = bossLevel ? h - 5 : h - 4;
    if (!bossLevel) {
        for (; flagC > 14; flagC--) {
            if (grid[h - 1][flagC] === GRASS) break;
        }
    } else {
        flagC = w - 3;
    }
    grid[flagRow][flagC] = FLAG;

    if (bossLevel) {
        for (let pc = 12; pc < w - 12; pc += 18) {
            const pr = h - 7 - Math.floor(rng() * 2);
            for (let k = 0; k < 10 && pc + k < w - 8; k++) {
                if (grid[pr][pc + k] === AIR) grid[pr][pc + k] = WOOD;
            }
        }
    } else {
        let plat = 14;
        while (plat < w - 18) {
            const len = 4 + Math.floor(rng() * 7);
            const pr = 7 + Math.floor(rng() * 6);
            const mat = rng() < 0.55 ? WOOD : STONE;
            for (let k = 0; k < len && plat + k < w - 6; k++) {
                if (grid[pr][plat + k] === AIR) grid[pr][plat + k] = mat;
            }
            plat += len + 5 + Math.floor(rng() * 12);
        }
    }

    if (!bossLevel) {
        const spikeN = 2 + Math.floor(rng() * 6) + Math.floor(index / 45);
        for (let i = 0; i < spikeN; i++) {
            const sc = 12 + Math.floor(rng() * (w - 22));
            if (grid[h - 1][sc] === GRASS) grid[h - 1][sc] = SPIKE;
        }
    } else {
        for (let sc = 8; sc < w - 8; sc += 9) {
            if (rng() < 0.4 && grid[h - 1][sc] === GRASS) grid[h - 1][sc] = SPIKE;
        }
    }

    const coinN = 4 + Math.floor(rng() * 10) + Math.floor(index / 35);
    for (let i = 0; i < coinN; i++) {
        const cc = 6 + Math.floor(rng() * (w - 12));
        const cr = h - 5 - Math.floor(rng() * 7);
        if (cr > 1 && cr < h - 2 && grid[cr][cc] === AIR) grid[cr][cc] = COIN;
    }

    if (rng() < 0.38 && !bossLevel) {
        const sx = 18 + Math.floor(rng() * (w - 32));
        const sy = h - 6 - Math.floor(rng() * 5);
        if (sy > 1 && grid[sy][sx] === AIR) grid[sy][sx] = STAR;
    }

    const enemies = [];
    if (bossLevel) {
        const bx = Math.floor(w * 0.5);
        const bossHp = 4 + Math.min(8, Math.floor(index / 25));
        enemies.push([bx, h - 3, 5, w - 5, bossHp]);
    } else {
        const nEn = Math.min(10, 2 + Math.floor(index / 18) % 6 + Math.floor(rng() * 2));
        for (let i = 0; i < nEn; i++) {
            const ex = 16 + Math.floor(rng() * (w - 38));
            const patrolL = Math.max(5, ex - 10 - Math.floor(rng() * 6));
            const patrolR = Math.min(w - 5, ex + 10 + Math.floor(rng() * 6));
            enemies.push([ex, h - 3, patrolL, patrolR]);
        }
    }

    // Electric cubes - appear from level 15+
    if (index >= 14 && !bossLevel) {
        const elecN = 1 + Math.floor(rng() * 3) + Math.floor(index / 60);
        for (let i = 0; i < elecN; i++) {
            const ec = 14 + Math.floor(rng() * (w - 28));
            const er = h - 3 - Math.floor(rng() * 2);
            if (er > 1 && grid[er][ec] === AIR && grid[er + 1] && isSolid(grid[er + 1][ec])) {
                grid[er][ec] = ELECTRIC;
            }
        }
        // Also place some electric cubes on platforms in higher levels
        if (index >= 30) {
            for (let i = 0; i < 2; i++) {
                const ec = 16 + Math.floor(rng() * (w - 32));
                for (let er = 4; er < h - 4; er++) {
                    if (grid[er][ec] === AIR && grid[er + 1] && (grid[er + 1][ec] === WOOD || grid[er + 1][ec] === STONE)) {
                        grid[er][ec] = ELECTRIC;
                        break;
                    }
                }
            }
        }
    }

    // Gravity portals - appear from level 25+, always in pairs (UP then DOWN further along)
    if (index >= 24 && !bossLevel && rng() < 0.5 + Math.min(0.4, index / 200)) {
        const portalSets = 1 + (index >= 60 ? 1 : 0);
        for (let ps = 0; ps < portalSets; ps++) {
            const upC = 15 + Math.floor(rng() * (w / 3 - 10)) + ps * Math.floor(w / 3);
            const upR = h - 3;
            const downC = Math.min(w - 8, upC + 12 + Math.floor(rng() * 15));
            const downR = h - 3;
            if (upC < w - 10 && downC < w - 4) {
                // Place up portal on ground
                if (grid[upR][upC] === AIR || grid[upR][upC] === GRASS) grid[upR][upC] = GRAV_UP;
                // Place down portal further right
                if (grid[downR][downC] === AIR || grid[downR][downC] === GRASS) grid[downR][downC] = GRAV_DOWN;
                // Add some coins/platforms in the ceiling area between portals for gravity play
                for (let gc = upC + 2; gc < downC - 1; gc += 3) {
                    if (gc < w && grid[2][gc] === AIR) grid[2][gc] = COIN;
                    if (gc + 1 < w && grid[1][gc + 1] === AIR) grid[1][gc + 1] = COIN;
                }
            }
        }
    }

    // Moving platforms - appear from level 10+
    const movPlats = [];
    if (index >= 9 && !bossLevel) {
        const nPlats = 1 + Math.floor(rng() * 2) + (index >= 40 ? 1 : 0);
        for (let i = 0; i < nPlats; i++) {
            const px = 14 + Math.floor(rng() * (w - 30));
            const py = h - 5 - Math.floor(rng() * 5);
            if (py > 3) {
                const moveH = rng() < 0.6; // horizontal vs vertical
                movPlats.push({
                    x: px, y: py, w: 3,
                    ex: moveH ? px + 5 + Math.floor(rng() * 8) : px,
                    ey: moveH ? py : py - 3 - Math.floor(rng() * 3),
                    speed: 0.3 + rng() * 0.4,
                });
            }
        }
    }

    const lvl = makeLevelFromGrid(grid, enemies, bg, bgFar);
    lvl.movPlats = movPlats;
    return lvl;
}

function getLevelData(idx) {
    if (idx < 0) idx = 0;
    if (idx < LEVELS.length) return LEVELS[idx];
    return generateProceduralLevel(idx);
}

const ENEMY_TYPES = [
    { name: 'Slime',   body: '#33aa33', stroke: '#228822', mark: 'rgba(34,136,34,0.4)',  eye: '#fff', pupil: '#111', brow: '#226622', shape: 'x' },
    { name: 'Fire',    body: '#dd5522', stroke: '#aa3311', mark: 'rgba(255,100,0,0.4)',   eye: '#ffe0a0', pupil: '#880000', brow: '#993300', shape: 'flame' },
    { name: 'Ice',     body: '#4488cc', stroke: '#336699', mark: 'rgba(100,180,255,0.4)', eye: '#ddeeff', pupil: '#113355', brow: '#335577', shape: 'crystal' },
    { name: 'Shadow',  body: '#444455', stroke: '#222233', mark: 'rgba(100,100,120,0.4)', eye: '#ff4444', pupil: '#440000', brow: '#333344', shape: 'spiral' },
    { name: 'Electric',body: '#cccc22', stroke: '#999911', mark: 'rgba(255,255,50,0.4)',  eye: '#ffffaa', pupil: '#444400', brow: '#888811', shape: 'bolt' },
    { name: 'Poison',  body: '#66aa44', stroke: '#448822', mark: 'rgba(120,220,60,0.4)',  eye: '#ccff88', pupil: '#224400', brow: '#447722', shape: 'drip' },
    { name: 'Lava',    body: '#cc4400', stroke: '#882200', mark: 'rgba(255,80,0,0.5)',    eye: '#ffcc44', pupil: '#661100', brow: '#772200', shape: 'crack' },
    { name: 'Crystal',body: '#8855cc', stroke: '#6633aa', mark: 'rgba(160,100,240,0.4)', eye: '#ddbbff', pupil: '#330066', brow: '#664499', shape: 'diamond' },
];
let lives = 5;
let score = 0;
let coinCount = 0;
let totalCoins = 0;
let deathTimer = 0;
let completeTimer = 0;
let levelData = null;

// Player ball
const ball = {
    x: 0, y: 0, vx: 0, vy: 0,
    r: 16, onGround: false,
    squishX: 1, squishY: 1,
    rollAngle: 0,
    facingRight: true,
    dead: false,
    checkpointX: 0, checkpointY: 0,
    gravFlipped: false, // true = gravity goes up
};

// Moving platforms
let movingPlatforms = [];

// Enemies (square enemies that patrol back and forth)
let enemies = [];

// Spike projectiles from spiker enemies
let spikeProjectiles = [];

// Coins alive state
let coinStates = [];
let starStates = [];

// ============================================================
// LEVEL LOADING
// ============================================================
function pickVariant(isBoss, levelIndex) {
    if (isBoss) return 'normal';
    // After level 3, start mixing in special variants
    if (levelIndex < 3) return 'normal';
    const roll = Math.random();
    if (roll < 0.25) return 'exploder';
    if (roll < 0.45) return 'spiker';
    if (roll < 0.65) return 'karate';
    return 'normal';
}

function buildEnemiesFromLevelData(data, levelIndex) {
    spikeProjectiles = [];
    return data.enemies.map(e => {
        const maxHp = e.length >= 5 && typeof e[4] === 'number' ? e[4] : 1;
        const isBoss = maxHp > 1;
        const baseSpeed = 80 + levelIndex * 9;
        const spd = isBoss ? baseSpeed * 0.42 : baseSpeed;
        const variant = pickVariant(isBoss, levelIndex);
        return {
            x: e[0] * TILE + TILE / 2,
            y: e[1] * TILE,
            w: isBoss ? 64 : (variant === 'karate' ? 34 : 32),
            h: isBoss ? 64 : (variant === 'karate' ? 34 : 32),
            patrolL: e[2] * TILE,
            patrolR: e[3] * TILE,
            vx: variant === 'karate' ? spd * 0.7 : spd,
            vy: 0,
            hp: variant === 'karate' ? 2 : maxHp,
            maxHp: variant === 'karate' ? 2 : maxHp,
            isBoss,
            alive: true,
            squish: 0,
            eyeBlink: Math.random() * 3,
            hitFlash: 0,
            rotation: 0,
            etype: ENEMY_TYPES[bossesDefeated % ENEMY_TYPES.length],
            variant,
            jumpTimer: variant === 'karate' ? 1.5 + Math.random() * 2 : 0,
            onGround: true,
        };
    });
}

function loadLevel(idx) {
    levelData = getLevelData(idx);
    coinCount = 0;
    totalCoins = 0;

    // Find player start (first open space on ground near left side)
    ball.x = 2 * TILE + TILE / 2;
    ball.y = (levelData.h - 4) * TILE;
    ball.vx = 0; ball.vy = 0;
    ball.rollAngle = 0;
    ball.onGround = false;
    ball.dead = false;
    ball.squishX = 1; ball.squishY = 1;
    ball.gravFlipped = false;
    ball.checkpointX = ball.x;
    ball.checkpointY = ball.y;

    // Find a proper start position - first column with ground beneath open air
    for (let col = 0; col < Math.min(6, levelData.w); col++) {
        for (let row = 0; row < levelData.h - 1; row++) {
            const tile = levelData.grid[row][col];
            const below = levelData.grid[row + 1] ? levelData.grid[row + 1][col] : GROUND;
            if (tile === AIR && (below === GRASS || below === GROUND)) {
                ball.x = col * TILE + TILE / 2;
                ball.y = row * TILE + TILE / 2;
                ball.checkpointX = ball.x;
                ball.checkpointY = ball.y;
                col = 999; break;
            }
        }
    }

    // Track coin/star states
    coinStates = [];
    starStates = [];
    for (let r = 0; r < levelData.h; r++) {
        for (let c = 0; c < levelData.w; c++) {
            if (levelData.grid[r][c] === COIN) {
                coinStates.push({ r, c, alive: true, glow: Math.random() * 6 });
                totalCoins++;
            }
            if (levelData.grid[r][c] === STAR) {
                starStates.push({ r, c, alive: true, glow: Math.random() * 6 });
                totalCoins += 5;
            }
        }
    }

    enemies = buildEnemiesFromLevelData(levelData, currentLevel);

    // Build moving platforms from level data
    movingPlatforms = (levelData.movPlats || []).map(p => ({
        x: p.x * TILE, y: p.y * TILE,
        w: p.w * TILE, h: TILE * 0.6,
        startX: p.x * TILE, startY: p.y * TILE,
        endX: (p.ex !== undefined ? p.ex : p.x) * TILE,
        endY: (p.ey !== undefined ? p.ey : p.y) * TILE,
        speed: p.speed || 1,
        t: 0, // 0-1 progress
    }));

    camera.x = 0;
    camera.y = 0;
}

// ============================================================
// TILE COLLISION HELPERS
// ============================================================
function isSolid(tileType) {
    return tileType === GROUND || tileType === GRASS || tileType === WOOD || tileType === STONE;
}

function getTile(col, row) {
    if (row < 0 || row >= levelData.h || col < 0 || col >= levelData.w) return GROUND;
    return levelData.grid[row][col];
}

function tileAt(px, py) {
    return getTile(Math.floor(px / TILE), Math.floor(py / TILE));
}

// ============================================================
// MOVING PLATFORMS
// ============================================================
function updateMovingPlatforms(dt) {
    movingPlatforms.forEach(mp => {
        const prevX = mp.x;
        const prevY = mp.y;
        mp.t += mp.speed * dt;
        const s = (Math.sin(mp.t * Math.PI) + 1) / 2; // smooth 0-1 ping pong
        mp.x = mp.startX + (mp.endX - mp.startX) * s;
        mp.y = mp.startY + (mp.endY - mp.startY) * s;
        mp.dx = mp.x - prevX;
        mp.dy = mp.y - prevY;
    });
}

// ============================================================
// PHYSICS & COLLISION
// ============================================================
function updateBall(dt) {
    // Horizontal input
    let moveDir = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) moveDir -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) moveDir += 1;

    if (moveDir !== 0) {
        ball.vx += moveDir * MOVE_SPEED * 5 * dt;
        ball.facingRight = moveDir > 0;
    }
    ball.vx *= Math.pow(FRICTION, dt * 60);

    // Clamp horizontal speed
    if (Math.abs(ball.vx) > MOVE_SPEED) ball.vx = Math.sign(ball.vx) * MOVE_SPEED;
    if (Math.abs(ball.vx) < 1) ball.vx = 0;

    // Jump (direction depends on gravity)
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && ball.onGround) {
        ball.vy = ball.gravFlipped ? -JUMP_FORCE : JUMP_FORCE;
        ball.onGround = false;
        ball.squishX = 1.3; ball.squishY = 0.7;
        sfxJump();
        const dustY = ball.gravFlipped ? ball.y - ball.r : ball.y + ball.r;
        spawnParticles(ball.x, dustY, 'rgba(200,200,200,0.6)', 5, 80);
    }

    // Gravity (flippable)
    const gravDir = ball.gravFlipped ? -1 : 1;
    ball.vy += GRAVITY * gravDir * dt;
    if (ball.vy > 800) ball.vy = 800;
    if (ball.vy < -800) ball.vy = -800;

    // Move horizontally and resolve collisions
    ball.x += ball.vx * dt;
    resolveHorizontal();

    // Move vertically and resolve collisions
    ball.y += ball.vy * dt;
    resolveVertical();

    // Squish animation lerp back to normal
    ball.squishX += (1 - ball.squishX) * 8 * dt;
    ball.squishY += (1 - ball.squishY) * 8 * dt;

    // Rolling visual (rotation from horizontal motion)
    ball.rollAngle += (ball.vx * dt) / ball.r;

    // Speed trail particles when moving fast
    if (Math.abs(ball.vx) > MOVE_SPEED * 0.7 && ball.onGround && Math.random() < 0.4) {
        spawnParticles(ball.x - Math.sign(ball.vx) * ball.r, ball.y + ball.r * 0.5, 'rgba(255,200,150,0.3)', 1, 30);
    }

    // Check if fallen off the bottom
    if (ball.y > levelData.h * TILE + 100) {
        killBall();
    }

    // Moving platform riding
    movingPlatforms.forEach(mp => {
        const onTop = !ball.gravFlipped
            ? (ball.y + ball.r >= mp.y - 2 && ball.y + ball.r <= mp.y + 8 && ball.vy >= 0)
            : (ball.y - ball.r <= mp.y + mp.h + 2 && ball.y - ball.r >= mp.y + mp.h - 8 && ball.vy <= 0);
        if (ball.x + ball.r > mp.x && ball.x - ball.r < mp.x + mp.w && onTop) {
            ball.x += mp.dx || 0;
            ball.y += mp.dy || 0;
            if (!ball.gravFlipped) {
                ball.y = mp.y - ball.r;
            } else {
                ball.y = mp.y + mp.h + ball.r;
            }
            ball.vy = 0;
            ball.onGround = true;
        }
    });

    // Check spike/electric collision
    const tCenter = tileAt(ball.x, ball.y);
    const tFeet = tileAt(ball.x, ball.y + ball.r - 2);
    const tHead = tileAt(ball.x, ball.y - ball.r + 2);
    const tLeft = tileAt(ball.x - ball.r + 4, ball.y);
    const tRight = tileAt(ball.x + ball.r - 4, ball.y);
    const deadly = [SPIKE, ELECTRIC];
    if (deadly.includes(tCenter) || deadly.includes(tFeet) || deadly.includes(tHead) ||
        deadly.includes(tLeft) || deadly.includes(tRight)) {
        if (tCenter === ELECTRIC || tFeet === ELECTRIC || tHead === ELECTRIC ||
            tLeft === ELECTRIC || tRight === ELECTRIC) {
            spawnParticles(ball.x, ball.y, '#44ddff', 12, 200);
            spawnParticles(ball.x, ball.y, '#ffff44', 8, 150);
            triggerShake(6, 0.2);
        }
        killBall();
    }

    // Check gravity portals
    if (tCenter === GRAV_UP || tFeet === GRAV_UP || tHead === GRAV_UP) {
        if (!ball.gravFlipped) {
            ball.gravFlipped = true;
            ball.vy = -Math.abs(ball.vy) - 100;
            spawnParticles(ball.x, ball.y, '#aa44ff', 12, 180);
            playSound(600, 'sine', 0.2, 0.1);
            setTimeout(() => playSound(900, 'sine', 0.15, 0.08), 80);
        }
    }
    if (tCenter === GRAV_DOWN || tFeet === GRAV_DOWN || tHead === GRAV_DOWN) {
        if (ball.gravFlipped) {
            ball.gravFlipped = false;
            ball.vy = Math.abs(ball.vy) + 100;
            spawnParticles(ball.x, ball.y, '#44aaff', 12, 180);
            playSound(500, 'sine', 0.2, 0.1);
            setTimeout(() => playSound(300, 'sine', 0.15, 0.08), 80);
        }
    }

    // Check flag
    if (tCenter === FLAG || tFeet === FLAG || tHead === FLAG) {
        state = 'levelComplete';
        completeTimer = 2;
        sfxFlag();
        spawnParticles(ball.x, ball.y, '#44ff88', 20, 250);
    }

    // Check checkpoint
    if (tCenter === CHECKPOINT || tFeet === CHECKPOINT || tHead === CHECKPOINT) {
        ball.checkpointX = ball.x;
        ball.checkpointY = ball.y - 10;
    }

    // Fall off top when gravity flipped
    if (ball.gravFlipped && ball.y < -100) {
        killBall();
    }
}

function resolveHorizontal() {
    const r = ball.r - 2; // slightly smaller for forgiving collision
    // Check left
    const leftCol = Math.floor((ball.x - r) / TILE);
    const topRow = Math.floor((ball.y - r + 2) / TILE);
    const botRow = Math.floor((ball.y + r - 2) / TILE);

    for (let row = topRow; row <= botRow; row++) {
        if (isSolid(getTile(leftCol, row))) {
            ball.x = (leftCol + 1) * TILE + r;
            ball.vx = 0;
            break;
        }
    }
    // Check right
    const rightCol = Math.floor((ball.x + r) / TILE);
    for (let row = topRow; row <= botRow; row++) {
        if (isSolid(getTile(rightCol, row))) {
            ball.x = rightCol * TILE - r;
            ball.vx = 0;
            break;
        }
    }
}

function resolveVertical() {
    const r = ball.r - 2;
    ball.onGround = false;

    const leftCol = Math.floor((ball.x - r + 4) / TILE);
    const rightCol = Math.floor((ball.x + r - 4) / TILE);

    // Check feet (bottom)
    const botRow = Math.floor((ball.y + r) / TILE);
    for (let col = leftCol; col <= rightCol; col++) {
        if (isSolid(getTile(col, botRow))) {
            ball.y = botRow * TILE - r;
            if (ball.vy > 100) {
                ball.squishX = 1.25; ball.squishY = 0.75;
                spawnParticles(ball.x, ball.y + ball.r, 'rgba(180,160,120,0.5)', 4, 60);
            }
            ball.vy = 0;
            if (!ball.gravFlipped) ball.onGround = true;
            break;
        }
    }

    // Check head (top)
    const topRow = Math.floor((ball.y - r) / TILE);
    for (let col = leftCol; col <= rightCol; col++) {
        if (isSolid(getTile(col, topRow))) {
            ball.y = (topRow + 1) * TILE + r;
            if (ball.vy < -100 && ball.gravFlipped) {
                ball.squishX = 1.25; ball.squishY = 0.75;
                spawnParticles(ball.x, ball.y - ball.r, 'rgba(180,160,120,0.5)', 4, 60);
            }
            ball.vy = 0;
            if (ball.gravFlipped) ball.onGround = true;
            break;
        }
    }
}

function killBall() {
    if (ball.dead) return;
    ball.dead = true;
    lives--;
    sfxDie();
    spawnParticles(ball.x, ball.y, '#ff4444', 25, 300);
    spawnParticles(ball.x, ball.y, '#ff8800', 15, 200);
    spawnParticles(ball.x, ball.y, '#ffcc00', 10, 150);
    triggerShake(8, 0.4);
    state = 'dead';
    deathTimer = 1.8;
}

// ============================================================
// ENEMY UPDATE
// ============================================================
function sfxExplode() { playSound(120, 'sawtooth', 0.35, 0.15); setTimeout(() => playSound(80, 'square', 0.3, 0.1), 80); }

function enemyDeath(e) {
    e.alive = false;
    e.squish = 0;
    score += e.isBoss ? 800 : (e.variant === 'karate' ? 200 : 100);

    if (e.variant === 'exploder') {
        // Explosion! Damages player if close
        sfxExplode();
        spawnParticles(e.x, e.y, '#ff4400', 30, 350);
        spawnParticles(e.x, e.y, '#ffcc00', 25, 280);
        spawnParticles(e.x, e.y, '#ff8800', 20, 220);
        triggerShake(10, 0.35);
        // Check if ball is in explosion radius
        if (!ball.dead) {
            const dist = Math.hypot(ball.x - e.x, ball.y - e.y);
            if (dist < 110) killBall();
        }
    } else if (e.variant === 'spiker') {
        // Shoot spike projectiles in 8 directions
        sfxExplode();
        spawnParticles(e.x, e.y, '#dd3333', 15, 200);
        triggerShake(6, 0.25);
        for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2;
            spikeProjectiles.push({
                x: e.x, y: e.y,
                vx: Math.cos(a) * 280,
                vy: Math.sin(a) * 280 - 60,
                life: 1.8,
                r: 5,
            });
        }
    } else if (e.isBoss) {
        bossesDefeated++;
        spawnParticles(e.x, e.y, '#aa44ff', 40, 320);
        spawnParticles(e.x, e.y, '#ffdd00', 30, 280);
        spawnParticles(e.x, e.y, '#ff4488', 20, 250);
        triggerShake(12, 0.6);
        sfxStar();
    }
}

function updateEnemies(dt) {
    enemies.forEach(e => {
        if (!e.alive) {
            e.squish += dt * 5;
            return;
        }
        if (e.hitFlash > 0) e.hitFlash -= dt;

        // Karate enemy: gravity + jumping
        if (e.variant === 'karate') {
            e.jumpTimer -= dt;
            if (e.jumpTimer <= 0 && e.onGround) {
                e.vy = -620; // big jump
                e.onGround = false;
                e.jumpTimer = 2 + Math.random() * 2;
                spawnParticles(e.x, e.y + e.h/2, 'rgba(255,255,255,0.5)', 4, 60);
            }
            e.vy += GRAVITY * dt;
            if (e.vy > 800) e.vy = 800;
            e.y += e.vy * dt;
            // Simple ground check
            const feetRow = Math.floor((e.y + e.h/2 + 8) / TILE);
            const col = Math.floor(e.x / TILE);
            if (feetRow >= 0 && feetRow < levelData.h && col >= 0 && col < levelData.w && isSolid(getTile(col, feetRow))) {
                e.y = feetRow * TILE - e.h/2 - 8;
                e.vy = 0;
                e.onGround = true;
            }
            // Fall off bottom
            if (e.y > levelData.h * TILE + 100) { e.alive = false; e.squish = 2; return; }
        }

        // Patrol
        e.x += e.vx * dt;
        if (e.x - e.w/2 <= e.patrolL) { e.x = e.patrolL + e.w/2; e.vx = Math.abs(e.vx); }
        if (e.x + e.w/2 >= e.patrolR) { e.x = e.patrolR - e.w/2; e.vx = -Math.abs(e.vx); }

        // Rotate while moving (like rolling along the ground)
        const rotSpeed = e.isBoss ? 1.2 : (e.variant === 'karate' ? 3.5 : 2.5);
        e.rotation += Math.sign(e.vx) * rotSpeed * dt;

        // Eye blink timer
        e.eyeBlink -= dt;
        if (e.eyeBlink <= 0) e.eyeBlink = 2 + Math.random() * 3;

        // Collision with ball
        if (!ball.dead) {
            const dx = ball.x - e.x;
            const dy = ball.y - e.y - e.h/2 + 8;
            const overlapX = ball.r + e.w / 2 - Math.abs(dx);
            const overlapY = ball.r + e.h / 2 - Math.abs(dy);

            if (overlapX > 0 && overlapY > 0) {
                if (ball.vy > 0 && ball.y + ball.r - 8 < e.y + 4) {
                    e.hp--;
                    e.hitFlash = 0.18;
                    ball.vy = ENEMY_SQUISH_BOUNCE;
                    ball.squishX = 0.7; ball.squishY = 1.4;
                    sfxSquish();
                    spawnParticles(e.x, e.y + e.h/2, e.hp > 0 ? '#ffaa44' : '#44cc44', e.isBoss ? 14 : 10, e.isBoss ? 220 : 180);
                    if (e.hp <= 0) {
                        enemyDeath(e);
                    }
                } else {
                    killBall();
                }
            }
        }
    });

    // Update spike projectiles
    for (let i = spikeProjectiles.length - 1; i >= 0; i--) {
        const s = spikeProjectiles[i];
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.vy += 200 * dt; // light gravity on spikes
        s.life -= dt;
        if (s.life <= 0) { spikeProjectiles.splice(i, 1); continue; }
        // Check collision with player
        if (!ball.dead && Math.hypot(ball.x - s.x, ball.y - s.y) < ball.r + s.r) {
            killBall();
            spikeProjectiles.splice(i, 1);
        }
    }
}

// ============================================================
// COIN / STAR COLLECTION
// ============================================================
function updateCollectibles(dt) {
    coinStates.forEach(c => {
        if (!c.alive) return;
        c.glow += dt * 3;
        const cx = c.c * TILE + TILE / 2;
        const cy = c.r * TILE + TILE / 2;
        if (Math.hypot(ball.x - cx, ball.y - cy) < ball.r + 14) {
            c.alive = false;
            coinCount++;
            score += 10;
            sfxCoin();
            spawnParticles(cx, cy, '#ffdd00', 8, 150);
        }
    });
    starStates.forEach(s => {
        if (!s.alive) return;
        s.glow += dt * 4;
        const sx = s.c * TILE + TILE / 2;
        const sy = s.r * TILE + TILE / 2;
        if (Math.hypot(ball.x - sx, ball.y - sy) < ball.r + 16) {
            s.alive = false;
            coinCount += 5;
            score += 50;
            sfxStar();
            spawnParticles(sx, sy, '#ffaa00', 14, 220);
        }
    });
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
    if (state === 'start') {
        if (!titlePreviewLevel) titlePreviewLevel = getLevelData(0);
        titleCam.x += 52 * dt;
        const pw = titlePreviewLevel.w * TILE;
        const maxX = Math.max(0, pw - canvas.width);
        if (titleCam.x > maxX + 100) titleCam.x = 0;
        titleCam.y = Math.max(0, Math.min(titlePreviewLevel.h * TILE - canvas.height, 100));
        return;
    }
    if (state === 'dead') {
        updateShake(dt);
        deathTimer -= dt;
        if (deathTimer <= 0) {
            if (lives <= 0) {
                state = 'gameOver';
                gameOverTime = 0;
            } else {
                ball.x = ball.checkpointX;
                ball.y = ball.checkpointY;
                ball.vx = 0; ball.vy = 0;
                ball.dead = false;
                ball.squishX = 1; ball.squishY = 1;
                ball.rollAngle = 0;
                ball.gravFlipped = false;
                state = 'playing';
            }
        }
        particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 400 * dt; p.life -= dt; });
        return;
    }
    if (state === 'levelComplete') {
        completeTimer -= dt;
        particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 400 * dt; p.life -= dt; });
        if (completeTimer <= 0) {
            currentLevel++;
            if (currentLevel > maxUnlockedLevel) {
                maxUnlockedLevel = currentLevel;
                saveUnlock();
            }
            if (currentLevel >= TOTAL_LEVELS) {
                state = 'victory';
            } else {
                loadLevel(currentLevel);
                state = 'playing';
            }
        }
        return;
    }
    if (state !== 'playing') return;

    updateShake(dt);
    updateMovingPlatforms(dt);
    updateBall(dt);
    updateEnemies(dt);
    updateCollectibles(dt);

    // Update camera to follow the ball across the large level
    updateCamera(ball.x, ball.y, levelData.w * TILE, levelData.h * TILE);

    // Particles
    particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 400 * dt; p.life -= dt; });
    for (let i = particles.length - 1; i >= 0; i--) {
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
}

// ============================================================
// RENDERING
// ============================================================

function drawTile(col, row, type) {
    const x = col * TILE - camera.x;
    const y = row * TILE - camera.y;

    // Cull off-screen tiles
    if (x + TILE < 0 || x > canvas.width || y + TILE < 0 || y > canvas.height) return;

    switch (type) {
        case GRASS:
            ctx.fillStyle = '#5b8c3e';
            ctx.fillRect(x, y, TILE, TILE);
            // Grass top
            ctx.fillStyle = '#7ec850';
            ctx.fillRect(x, y, TILE, 8);
            // Texture lines
            ctx.fillStyle = '#4a7a30';
            ctx.fillRect(x + 4, y + 12, 2, TILE - 14);
            ctx.fillRect(x + TILE - 8, y + 16, 2, TILE - 18);
            break;
        case GROUND:
            ctx.fillStyle = '#6b5b3e';
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = '#5a4a2e';
            ctx.fillRect(x + 2, y + 2, 8, 6);
            ctx.fillRect(x + TILE - 14, y + TILE - 12, 10, 8);
            break;
        case SPIKE:
            // Spikes - red triangles
            ctx.fillStyle = '#dd3333';
            for (let i = 0; i < 3; i++) {
                const sx = x + 4 + i * 12;
                ctx.beginPath();
                ctx.moveTo(sx, y + TILE);
                ctx.lineTo(sx + 6, y + 8);
                ctx.lineTo(sx + 12, y + TILE);
                ctx.closePath();
                ctx.fill();
            }
            ctx.fillStyle = '#ff5555';
            for (let i = 0; i < 3; i++) {
                const sx = x + 6 + i * 12;
                ctx.beginPath();
                ctx.moveTo(sx, y + TILE);
                ctx.lineTo(sx + 3, y + 14);
                ctx.lineTo(sx + 6, y + TILE);
                ctx.closePath();
                ctx.fill();
            }
            break;
        case WOOD:
            ctx.fillStyle = '#a0724e';
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = '#8a6240';
            ctx.fillRect(x, y, TILE, 4);
            ctx.fillRect(x + 8, y + 10, TILE - 16, 2);
            ctx.fillRect(x + 4, y + 22, TILE - 8, 2);
            ctx.fillRect(x + 10, y + 32, TILE - 20, 2);
            break;
        case STONE:
            ctx.fillStyle = '#808080';
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = '#707070';
            ctx.fillRect(x + 1, y + 1, TILE/2 - 1, TILE/2 - 1);
            ctx.fillRect(x + TILE/2 + 1, y + TILE/2 + 1, TILE/2 - 2, TILE/2 - 2);
            ctx.strokeStyle = '#606060';
            ctx.lineWidth = 1;
            ctx.strokeRect(x, y, TILE, TILE);
            break;
        case FLAG:
            // Flag pole
            ctx.fillStyle = '#888';
            ctx.fillRect(x + TILE/2 - 2, y, 4, TILE);
            // Flag
            ctx.fillStyle = '#44ff66';
            ctx.beginPath();
            ctx.moveTo(x + TILE/2 + 2, y + 4);
            ctx.lineTo(x + TILE/2 + 24, y + 12);
            ctx.lineTo(x + TILE/2 + 2, y + 22);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#33dd55';
            ctx.beginPath();
            ctx.moveTo(x + TILE/2 + 2, y + 4);
            ctx.lineTo(x + TILE/2 + 18, y + 10);
            ctx.lineTo(x + TILE/2 + 2, y + 16);
            ctx.closePath();
            ctx.fill();
            break;
        case CHECKPOINT:
            ctx.fillStyle = '#888';
            ctx.fillRect(x + TILE/2 - 2, y + 4, 4, TILE - 4);
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.moveTo(x + TILE/2 + 2, y + 6);
            ctx.lineTo(x + TILE/2 + 16, y + 12);
            ctx.lineTo(x + TILE/2 + 2, y + 18);
            ctx.closePath();
            ctx.fill();
            break;
        case ELECTRIC: {
            const et = performance.now() / 1000;
            const flicker = 0.7 + Math.sin(et * 20 + col * 3) * 0.3;
            // Dark cube body
            ctx.fillStyle = '#1a2a3a';
            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
            ctx.strokeStyle = `rgba(0,200,255,${flicker})`;
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
            // Electric arcs
            ctx.strokeStyle = `rgba(100,220,255,${flicker * 0.8})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(x + 4, y + TILE/2);
            ctx.lineTo(x + TILE/3, y + TILE/3 + Math.sin(et * 12) * 5);
            ctx.lineTo(x + TILE/2, y + TILE/2 + Math.cos(et * 15) * 4);
            ctx.lineTo(x + TILE*2/3, y + TILE/3 - Math.sin(et * 10) * 5);
            ctx.lineTo(x + TILE - 4, y + TILE/2);
            ctx.stroke();
            // Center glow
            ctx.fillStyle = `rgba(100,220,255,${flicker * 0.4})`;
            ctx.beginPath();
            ctx.arc(x + TILE/2, y + TILE/2, 8, 0, Math.PI * 2);
            ctx.fill();
            // Corner sparks
            ctx.fillStyle = `rgba(200,240,255,${flicker})`;
            const sp = 3 + Math.sin(et * 18) * 1.5;
            ctx.beginPath(); ctx.arc(x + 5, y + 5, sp, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + TILE - 5, y + TILE - 5, sp, 0, Math.PI * 2); ctx.fill();
            break;
        }
        case GRAV_UP: {
            const gt = performance.now() / 1000;
            // Purple portal - flips gravity UP
            const glow = 0.6 + Math.sin(gt * 4) * 0.3;
            ctx.fillStyle = `rgba(120,40,200,${glow * 0.4})`;
            ctx.fillRect(x, y, TILE, TILE);
            ctx.strokeStyle = `rgba(180,80,255,${glow})`;
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 2, y + 2, TILE - 4, TILE - 4);
            // Swirl
            ctx.save();
            ctx.translate(x + TILE/2, y + TILE/2);
            ctx.rotate(gt * 3);
            ctx.strokeStyle = `rgba(200,120,255,${glow * 0.7})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 1.5);
            ctx.stroke();
            ctx.restore();
            // Up arrow
            ctx.fillStyle = `rgba(220,150,255,${glow})`;
            ctx.beginPath();
            ctx.moveTo(x + TILE/2, y + 6);
            ctx.lineTo(x + TILE/2 + 8, y + 18);
            ctx.lineTo(x + TILE/2 - 8, y + 18);
            ctx.closePath();
            ctx.fill();
            ctx.fillRect(x + TILE/2 - 3, y + 16, 6, 14);
            break;
        }
        case GRAV_DOWN: {
            const gt = performance.now() / 1000;
            // Blue portal - resets gravity DOWN
            const glow = 0.6 + Math.sin(gt * 4 + 2) * 0.3;
            ctx.fillStyle = `rgba(30,80,200,${glow * 0.4})`;
            ctx.fillRect(x, y, TILE, TILE);
            ctx.strokeStyle = `rgba(60,140,255,${glow})`;
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 2, y + 2, TILE - 4, TILE - 4);
            // Swirl
            ctx.save();
            ctx.translate(x + TILE/2, y + TILE/2);
            ctx.rotate(-gt * 3);
            ctx.strokeStyle = `rgba(100,180,255,${glow * 0.7})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 1.5);
            ctx.stroke();
            ctx.restore();
            // Down arrow
            ctx.fillStyle = `rgba(100,180,255,${glow})`;
            ctx.beginPath();
            ctx.moveTo(x + TILE/2, y + TILE - 6);
            ctx.lineTo(x + TILE/2 + 8, y + TILE - 18);
            ctx.lineTo(x + TILE/2 - 8, y + TILE - 18);
            ctx.closePath();
            ctx.fill();
            ctx.fillRect(x + TILE/2 - 3, y + 10, 6, 14);
            break;
        }
    }
}

function drawBackground() {
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, levelData.bg);
    grad.addColorStop(1, levelData.bgFar);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Parallax background hills
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    for (let i = 0; i < 3; i++) {
        const offset = camera.x * (0.1 + i * 0.05);
        const yBase = canvas.height - 80 - i * 60;
        ctx.beginPath();
        ctx.moveTo(-20, canvas.height);
        for (let x = -20; x <= canvas.width + 40; x += 40) {
            const h = Math.sin((x + offset + i * 200) * 0.005) * (40 + i * 20) + Math.sin((x + offset) * 0.012) * 20;
            ctx.lineTo(x, yBase - h);
        }
        ctx.lineTo(canvas.width + 20, canvas.height);
        ctx.closePath();
        ctx.fill();
    }

    // Clouds (parallax)
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    for (let i = 0; i < 6; i++) {
        const cx = ((i * 350 + 100) - camera.x * 0.15) % (canvas.width + 200) - 50;
        const cy = 40 + i * 35 + Math.sin(i * 2.5) * 20;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 50 + i * 8, 18 + i * 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + 30, cy - 5, 30 + i * 5, 14 + i * 2, 0, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawLevel() {
    // Only draw visible tiles (camera culling)
    const startCol = Math.max(0, Math.floor(camera.x / TILE) - 1);
    const endCol = Math.min(levelData.w, Math.ceil((camera.x + canvas.width) / TILE) + 1);
    const startRow = Math.max(0, Math.floor(camera.y / TILE) - 1);
    const endRow = Math.min(levelData.h, Math.ceil((camera.y + canvas.height) / TILE) + 1);

    for (let r = startRow; r < endRow; r++) {
        for (let c = startCol; c < endCol; c++) {
            const t = levelData.grid[r][c];
            if (t !== AIR && t !== COIN && t !== STAR) {
                drawTile(c, r, t);
            }
        }
    }

    // Draw moving platforms
    movingPlatforms.forEach(mp => {
        const px = mp.x - camera.x;
        const py = mp.y - camera.y;
        if (px + mp.w < -10 || px > canvas.width + 10 || py + mp.h < -10 || py > canvas.height + 10) return;

        // Platform body
        const mpGrad = ctx.createLinearGradient(px, py, px, py + mp.h);
        mpGrad.addColorStop(0, '#66aadd');
        mpGrad.addColorStop(1, '#4488bb');
        ctx.fillStyle = mpGrad;
        ctx.fillRect(px, py, mp.w, mp.h);

        // Top highlight
        ctx.fillStyle = 'rgba(150,220,255,0.5)';
        ctx.fillRect(px, py, mp.w, 3);

        // Side rails
        ctx.fillStyle = '#3377aa';
        ctx.fillRect(px, py, 4, mp.h);
        ctx.fillRect(px + mp.w - 4, py, 4, mp.h);

        // Arrow indicators showing movement direction
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        const t = performance.now() / 1000;
        const arrowOff = Math.sin(t * 3) * 4;
        if (Math.abs(mp.endX - mp.startX) > 5) {
            // Horizontal arrows
            ctx.beginPath();
            ctx.moveTo(px + mp.w/2 + arrowOff, py + mp.h/2 - 4);
            ctx.lineTo(px + mp.w/2 + 8 + arrowOff, py + mp.h/2);
            ctx.lineTo(px + mp.w/2 + arrowOff, py + mp.h/2 + 4);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(px + mp.w/2 - arrowOff, py + mp.h/2 - 4);
            ctx.lineTo(px + mp.w/2 - 8 - arrowOff, py + mp.h/2);
            ctx.lineTo(px + mp.w/2 - arrowOff, py + mp.h/2 + 4);
            ctx.fill();
        }
        if (Math.abs(mp.endY - mp.startY) > 5) {
            // Vertical arrows
            ctx.beginPath();
            ctx.moveTo(px + mp.w/2 - 4, py + mp.h/2 + arrowOff);
            ctx.lineTo(px + mp.w/2, py + mp.h/2 + 8 + arrowOff);
            ctx.lineTo(px + mp.w/2 + 4, py + mp.h/2 + arrowOff);
            ctx.fill();
        }

        // Border
        ctx.strokeStyle = '#5599cc';
        ctx.lineWidth = 1;
        ctx.strokeRect(px, py, mp.w, mp.h);
    });
}

function drawCoins() {
    const t = performance.now() / 1000;
    coinStates.forEach(c => {
        if (!c.alive) return;
        const cx = c.c * TILE + TILE / 2 - camera.x;
        const cy = c.r * TILE + TILE / 2 - camera.y;
        if (cx < -30 || cx > canvas.width + 30 || cy < -30 || cy > canvas.height + 30) return;

        const bob = Math.sin(c.glow) * 3;
        const pulse = 1 + Math.sin(c.glow * 1.5) * 0.1;

        ctx.fillStyle = '#ffdd00';
        ctx.shadowColor = '#ffdd00';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(cx, cy + bob, 10 * pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fff8cc';
        ctx.beginPath();
        ctx.arc(cx - 2, cy + bob - 2, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    starStates.forEach(s => {
        if (!s.alive) return;
        const sx = s.c * TILE + TILE / 2 - camera.x;
        const sy = s.r * TILE + TILE / 2 - camera.y;
        if (sx < -30 || sx > canvas.width + 30 || sy < -30 || sy > canvas.height + 30) return;

        const bob = Math.sin(s.glow) * 4;
        const pulse = 1 + Math.sin(s.glow * 2) * 0.15;

        ctx.fillStyle = '#ffaa00';
        ctx.shadowColor = '#ffaa00';
        ctx.shadowBlur = 15;
        ctx.save();
        ctx.translate(sx, sy + bob);
        ctx.scale(pulse, pulse);
        // 5-pointed star
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            const a = (i * 2 * Math.PI / 5) - Math.PI / 2;
            const ai = a + Math.PI / 5;
            ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * 14, Math.sin(a) * 14);
            ctx.lineTo(Math.cos(ai) * 6, Math.sin(ai) * 6);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        ctx.shadowBlur = 0;
    });
}

function drawEnemyMark(shape, w, h) {
    // Different body marks per enemy type
    ctx.lineWidth = 2;
    switch (shape) {
        case 'x':
            ctx.beginPath();
            ctx.moveTo(-w/2 + 4, -h/2 + 4); ctx.lineTo(w/2 - 4, h/2 - 4);
            ctx.moveTo(w/2 - 4, -h/2 + 4); ctx.lineTo(-w/2 + 4, h/2 - 4);
            ctx.stroke(); break;
        case 'flame':
            ctx.beginPath();
            ctx.moveTo(0, -h/2 + 3); ctx.quadraticCurveTo(w/3, -h/4, w/4, 0);
            ctx.quadraticCurveTo(w/5, h/4, 0, h/2 - 3);
            ctx.quadraticCurveTo(-w/5, h/4, -w/4, 0);
            ctx.quadraticCurveTo(-w/3, -h/4, 0, -h/2 + 3);
            ctx.stroke(); break;
        case 'crystal':
            ctx.beginPath();
            ctx.moveTo(0, -h/2 + 3); ctx.lineTo(w/2 - 3, 0); ctx.lineTo(0, h/2 - 3);
            ctx.lineTo(-w/2 + 3, 0); ctx.closePath(); ctx.stroke(); break;
        case 'spiral':
            ctx.beginPath();
            for (let a = 0; a < Math.PI * 3; a += 0.2) {
                const r = a * 2.2; const sx = Math.cos(a) * r; const sy = Math.sin(a) * r;
                a === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
            } ctx.stroke(); break;
        case 'bolt':
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-3, -h/2 + 3); ctx.lineTo(4, -2); ctx.lineTo(-2, 2); ctx.lineTo(5, h/2 - 3);
            ctx.stroke(); break;
        case 'drip':
            for (let i = 0; i < 3; i++) {
                const dx = (i - 1) * 8, dy = i * 3 - 4;
                ctx.beginPath(); ctx.arc(dx, dy, 4, 0, Math.PI * 2); ctx.stroke();
            } break;
        case 'crack':
            ctx.beginPath();
            ctx.moveTo(-w/2 + 2, -2); ctx.lineTo(-4, 1); ctx.lineTo(-2, -4); ctx.lineTo(5, 2);
            ctx.lineTo(3, -1); ctx.lineTo(w/2 - 2, 3);
            ctx.stroke(); break;
        case 'diamond':
            ctx.beginPath();
            ctx.moveTo(0, -h/3); ctx.lineTo(w/3, 0); ctx.lineTo(0, h/3); ctx.lineTo(-w/3, 0); ctx.closePath();
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-w/3, 0); ctx.lineTo(0, -h/6); ctx.lineTo(w/3, 0);
            ctx.stroke(); break;
    }
}

function drawEnemies() {
    enemies.forEach(e => {
        const ex = e.x - camera.x;
        const ey = e.y - camera.y;
        if (ex < -60 || ex > canvas.width + 60 || ey < -60 || ey > canvas.height + 60) return;

        const et = e.etype;

        if (!e.alive) {
            if (e.squish < 1) {
                const flatness = e.squish;
                ctx.fillStyle = et.body;
                ctx.fillRect(ex - e.w/2 * (1 + flatness*0.5), ey + e.h/2 - 4, e.w * (1 + flatness*0.5), 4);
            }
            return;
        }

        const bodyTop = ey - e.h/2 + 8;
        const bodyCenterY = bodyTop + e.h / 2;

        // Everything rotates together (body + eyes)
        ctx.save();
        ctx.translate(ex, bodyCenterY);
        ctx.rotate(e.rotation);

        // --- BODY ---
        if (e.isBoss) {
            const flash = e.hitFlash > 0 ? 0.35 : 0;
            const g = ctx.createLinearGradient(-e.w/2, -e.h/2, e.w/2, e.h/2);
            g.addColorStop(0, `rgb(${88 + flash*100},${40 + flash*80},${140 + flash*40})`);
            g.addColorStop(1, `rgb(${50 + flash*80},${20 + flash*60},${90 + flash*30})`);
            ctx.fillStyle = g;
            ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
            ctx.strokeStyle = '#aa66ff';
            ctx.lineWidth = 3;
            ctx.strokeRect(-e.w/2, -e.h/2, e.w, e.h);
            ctx.strokeStyle = 'rgba(170,100,255,0.3)';
            drawEnemyMark(et.shape, e.w, e.h);
        } else if (e.variant === 'exploder') {
            // Orange-red body with bomb icon
            const t = performance.now() / 1000;
            const pulse = 1 + Math.sin(t * 8) * 0.06;
            ctx.save();
            ctx.scale(pulse, pulse);
            ctx.fillStyle = '#cc4400';
            ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
            ctx.strokeStyle = '#ff6600';
            ctx.lineWidth = 2;
            ctx.strokeRect(-e.w/2, -e.h/2, e.w, e.h);
            // Bomb circle
            ctx.strokeStyle = 'rgba(255,200,0,0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 2, 8, 0, Math.PI * 2);
            ctx.stroke();
            // Fuse
            ctx.strokeStyle = 'rgba(255,255,100,0.7)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(3, -6); ctx.quadraticCurveTo(7, -10, 4, -13);
            ctx.stroke();
            // Spark on fuse
            ctx.fillStyle = `rgba(255,255,100,${0.5 + Math.sin(t * 15) * 0.5})`;
            ctx.beginPath(); ctx.arc(4, -13, 3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        } else if (e.variant === 'spiker') {
            // Dark red body with spike points
            ctx.fillStyle = '#993333';
            ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
            ctx.strokeStyle = '#cc4444';
            ctx.lineWidth = 2;
            ctx.strokeRect(-e.w/2, -e.h/2, e.w, e.h);
            // Spike protrusions on corners
            ctx.fillStyle = '#dd3333';
            const sp = 6;
            [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([dx,dy]) => {
                ctx.beginPath();
                ctx.moveTo(dx * e.w/2, dy * e.h/2);
                ctx.lineTo(dx * (e.w/2 + sp), dy * (e.h/2 - 4));
                ctx.lineTo(dx * (e.w/2 - 4), dy * (e.h/2 + sp));
                ctx.closePath(); ctx.fill();
            });
            // Warning mark
            ctx.strokeStyle = 'rgba(255,100,100,0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -6); ctx.lineTo(0, 3);
            ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 7, 1.5, 0, Math.PI * 2); ctx.stroke();
        } else if (e.variant === 'karate') {
            // White body with black belt
            ctx.fillStyle = e.hp > 1 ? '#eeeeee' : '#ccaaaa';
            ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
            ctx.strokeStyle = '#999999';
            ctx.lineWidth = 2;
            ctx.strokeRect(-e.w/2, -e.h/2, e.w, e.h);
            // Black belt across middle
            ctx.fillStyle = '#222222';
            ctx.fillRect(-e.w/2, -2, e.w, 5);
            // Belt knot
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.moveTo(3, -2); ctx.lineTo(8, -6); ctx.lineTo(6, 3); ctx.closePath(); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(3, 3); ctx.lineTo(8, 8); ctx.lineTo(6, 3); ctx.closePath(); ctx.fill();
            // Headband
            ctx.fillStyle = '#dd2222';
            ctx.fillRect(-e.w/2, -e.h/2, e.w, 4);
            // HP indicator
            if (e.hp > 1) {
                ctx.fillStyle = 'rgba(255,255,0,0.3)';
                ctx.fillRect(-e.w/2 + 2, -e.h/2 + 2, e.w - 4, e.h - 4);
            }
        } else {
            ctx.fillStyle = et.body;
            ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
            ctx.strokeStyle = et.stroke;
            ctx.lineWidth = 2;
            ctx.strokeRect(-e.w/2, -e.h/2, e.w, e.h);
            ctx.strokeStyle = et.mark;
            drawEnemyMark(et.shape, e.w, e.h);
        }

        // --- EYES (rotate with body) ---
        const eyeOffY = -e.h/2 + e.h * 0.45;
        const lookDir = e.vx > 0 ? 2 : -2;
        const blinking = e.eyeBlink < 0.1;
        const eyeScale = e.isBoss ? 1.35 : 1;

        ctx.fillStyle = et.eye;
        ctx.beginPath();
        ctx.ellipse(-6 * eyeScale, eyeOffY, 6 * eyeScale, blinking ? 1 : 5 * eyeScale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(6 * eyeScale, eyeOffY, 6 * eyeScale, blinking ? 1 : 5 * eyeScale, 0, 0, Math.PI * 2);
        ctx.fill();

        if (!blinking) {
            ctx.fillStyle = et.pupil;
            ctx.beginPath();
            ctx.arc(-6 * eyeScale + lookDir, eyeOffY + 1, 2.5 * eyeScale, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(6 * eyeScale + lookDir, eyeOffY + 1, 2.5 * eyeScale, 0, Math.PI * 2);
            ctx.fill();
        }

        // Angry eyebrows
        ctx.strokeStyle = et.brow;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-11 * eyeScale, eyeOffY - 7);
        ctx.lineTo(-3 * eyeScale, eyeOffY - 5);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(11 * eyeScale, eyeOffY - 7);
        ctx.lineTo(3 * eyeScale, eyeOffY - 5);
        ctx.stroke();

        ctx.restore();

        // Boss label + HP bar (not rotated - stays above)
        if (e.isBoss) {
            ctx.fillStyle = '#ffdd66';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('BOSS', ex, bodyTop - 6);
            const barW = e.w;
            const barH = 6;
            const barY = bodyTop - 16;
            ctx.fillStyle = '#220022';
            ctx.fillRect(ex - barW/2, barY, barW, barH);
            ctx.fillStyle = '#ff3366';
            ctx.fillRect(ex - barW/2, barY, barW * (e.hp / e.maxHp), barH);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(ex - barW/2, barY, barW, barH);
        }
    });
}

function drawSpikeProjectiles() {
    const t = performance.now() / 1000;
    spikeProjectiles.forEach(s => {
        const sx = s.x - camera.x;
        const sy = s.y - camera.y;
        if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) return;

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(Math.atan2(s.vy, s.vx));

        // Spike shape - pointed triangle
        ctx.fillStyle = '#dd3333';
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.moveTo(s.r + 3, 0);
        ctx.lineTo(-s.r, -s.r * 0.7);
        ctx.lineTo(-s.r + 2, 0);
        ctx.lineTo(-s.r, s.r * 0.7);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;

        // Glint
        ctx.fillStyle = 'rgba(255,150,150,0.6)';
        ctx.beginPath();
        ctx.arc(-1, -2, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    });
}

function drawBall() {
    if (ball.dead) return;
    const bx = ball.x - camera.x;
    const by = ball.y - camera.y;

    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(bx + 2, by + ball.r + 4, ball.r * 0.85, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // translate → squish → rotate: squash in local axes, then roll (eyes + stripes share rollAngle)
    ctx.save();
    ctx.translate(bx, by);
    ctx.scale(ball.squishX, ball.squishY);
    ctx.rotate(ball.rollAngle);

    const grad = ctx.createRadialGradient(-ball.r * 0.3, -ball.r * 0.3, ball.r * 0.1, 0, 0, ball.r);
    grad.addColorStop(0, '#ff6666');
    grad.addColorStop(0.5, '#ee2222');
    grad.addColorStop(1, '#aa0000');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
    ctx.fill();

    // Clip: stripes, gloss, and eyes share one rolling surface
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
    ctx.clip();

    ctx.strokeStyle = 'rgba(160,0,0,0.45)';
    ctx.lineWidth = 2.5;
    for (let i = 0; i < 4; i++) {
        const a = (i * Math.PI / 2);
        ctx.beginPath();
        ctx.arc(0, 0, ball.r - 2, a - 0.35, a + 0.35);
        ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(140,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-ball.r, 0); ctx.lineTo(ball.r, 0);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, -ball.r); ctx.lineTo(0, ball.r);
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(-ball.r * 0.25, -ball.r * 0.38, ball.r * 0.32, ball.r * 0.16, -0.5, 0, Math.PI * 2);
    ctx.fill();

    const lookDir = ball.facingRight ? 3 : -3;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-4 + lookDir * 0.3, -3, 5.5, 6.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(5 + lookDir * 0.3, -3, 5.5, 6.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(-4 + lookDir, -2, 2.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(5 + lookDir, -2, 2.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(-5 + lookDir * 0.5, -4, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(4 + lookDir * 0.5, -4, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    ctx.restore();
}

function drawParticles() {
    particles.forEach(p => {
        if (p.life <= 0) return;
        const alpha = Math.max(0, p.life / p.max);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x - camera.x, p.y - camera.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function drawHUD() {
    // Level
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`Level ${currentLevel + 1} / ${TOTAL_LEVELS}`, canvas.width / 2, 30);

    // Score
    ctx.textAlign = 'left';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText(`Score: ${score}`, 16, 30);

    // Coins
    ctx.fillStyle = '#ffdd00';
    ctx.font = '16px sans-serif';
    ctx.fillText(`Coins: ${coinCount}`, 16, 52);

    // Lives
    ctx.textAlign = 'right';
    ctx.font = '22px sans-serif';
    ctx.fillStyle = '#ff4466';
    let hearts = '';
    for (let i = 0; i < lives; i++) hearts += '\u2764 ';
    ctx.fillText(hearts, canvas.width - 16, 30);

    // Gravity indicator
    if (ball.gravFlipped) {
        const t = performance.now() / 1000;
        const gAlpha = 0.6 + Math.sin(t * 4) * 0.3;
        ctx.fillStyle = `rgba(180,80,255,${gAlpha})`;
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('\u2191 GRAVITY FLIPPED \u2191', canvas.width / 2, 52);
    }
}

    // Main text

    ctx.translate(canvas.width / 2, bounceY);

    // Shadow under mascot
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    const shadowY = (canvas.height / 2 + 48) - bounceY + 38;
    ctx.ellipse(0, shadowY, 28 - shadowY * 0.15, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ball body

    ctx.beginPath();
    ctx.arc(0, 0, 36, 0, Math.PI * 2);

    // Rolling stripes on mascot
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, 36, 0, Math.PI * 2);
    ctx.clip();
    ctx.rotate(rollA);
    ctx.strokeStyle = 'rgba(150,0,0,0.35)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
        const a = (i * Math.PI / 2);
        ctx.beginPath();
        ctx.arc(0, 0, 34, a - 0.4, a + 0.4);
        ctx.stroke();
    }

    // Mascot eyes (stay upright)

    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(7, -5, 7, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(-5, -4, 3.5, 0, Math.PI * 2);

    ctx.beginPath();
    ctx.arc(9, -4, 3.5, 0, Math.PI * 2);

function drawLevelCompleteScreen() {
    const t = performance.now() / 1000;

    const cg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, canvas.height);
