<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper — Petru Tudorica</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Roboto:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: 'JetBrains Mono', system-ui, monospace;
    background: #1a1d24;
    color: #e0e4eb;
    display: flex;
    flex-direction: column;
  }

  .site-nav {
    background: rgba(26,29,36,0.85);
    backdrop-filter: blur(10px);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 500;
    position: relative;
    flex-shrink: 0;
  }
  .site-nav a { color: #ccc; text-decoration: none; font-family: 'Roboto', sans-serif; font-size: 14px; transition: color 0.2s; }
  .site-nav a:hover { color: #fff; }
  .site-nav .brand { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 16px; }
  .site-nav .brand img { width: 28px; height: 28px; }
  .site-nav .nav-links { display: flex; gap: 20px; align-items: center; }
  .site-nav .nav-links a:hover { color: #7cb8f0; }

  .game-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; }

  .game-wrap { text-align: center; max-width: 100%; }

  h1 { font-size: 1.8rem; margin-bottom: 1rem; color: #7cb8f0; font-weight: 700; }

  .controls { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1rem; }
  .controls select {
    padding: 0.5rem 0.75rem; font-family: inherit; font-size: 0.9rem;
    background: #252936; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: #e0e4eb; cursor: pointer;
  }
  .btn {
    padding: 0.5rem 1.25rem; font-family: inherit; font-size: 0.9rem; font-weight: 600;
    background: #3b82f6; border: none; border-radius: 6px; color: #fff; cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .btn:hover { background: #2563eb; transform: translateY(-1px); }
  .stats { display: flex; gap: 1.5rem; font-size: 0.95rem; color: #8a8f9a; }
  .stats strong { color: #7cb8f0; margin-left: 0.2rem; }

  .board-wrap {
    display: inline-block; padding: 4px; background: #2d323d; border-radius: 8px;
    box-shadow: inset 0 0 0 2px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.4);
  }
  .board { display: inline-grid; gap: 0; border-collapse: collapse; }
  .cell {
    width: 28px; height: 28px; min-width: 28px; min-height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    background: linear-gradient(145deg, #3d4554, #343b48);
    border: 1px solid #252a35; cursor: pointer; user-select: none;
    transition: background 0.1s, filter 0.1s;
  }
  .cell:hover:not(.revealed):not(.flagged) { background: linear-gradient(145deg, #4a5366, #3d4554); filter: brightness(1.1); }
  .cell.revealed { background: #2a2e38; border-color: #1e222a; cursor: default; }
  .cell.revealed.mine { background: #b91c1c; color: #fff; }
  .cell.flagged { background: linear-gradient(145deg, #6366f1, #4f46e5); color: #e0e0ff; }
  .cell.flagged::after { content: '🚩'; font-size: 14px; }
  .cell.num-1 { color: #3b82f6; } .cell.num-2 { color: #22c55e; }
  .cell.num-3 { color: #ef4444; } .cell.num-4 { color: #7c3aed; }
  .cell.num-5 { color: #ea580c; } .cell.num-6 { color: #06b6d4; }
  .cell.num-7 { color: #1f2937; } .cell.num-8 { color: #6b7280; }

  .message { margin-top: 1rem; min-height: 1.5em; font-size: 1rem; font-weight: 600; }
  .message.win { color: #22c55e; }
  .message.lose { color: #ef4444; }

  @media (max-width: 600px) {
    .cell { width: 24px; height: 24px; min-width: 24px; min-height: 24px; font-size: 12px; }
    .cell.flagged::after { font-size: 12px; }
  }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="/" class="brand"><img src="/favicon.svg" alt="Home"> Petru Tudorica</a>
  <div class="nav-links"><a href="/#projects">Games</a></div>
</nav>

<div class="game-area">
<div class="game-wrap">
  <h1>Minesweeper</h1>
  <div class="controls">
    <select id="preset">
      <option value="9,9,10">Easy (9×9, 10 mines)</option>
      <option value="16,16,40" selected>Medium (16×16, 40 mines)</option>
      <option value="30,16,99">Hard (30×16, 99 mines)</option>
    </select>
    <button type="button" class="btn" id="new-game">New Game</button>
    <span class="stats">
      <span class="mines-left">Mines: <strong id="mines-count">40</strong></span>
      <span class="timer">Time: <strong id="timer">0</strong>s</span>
    </span>
  </div>
  <div id="board-wrap" class="board-wrap"></div>
  <p id="message" class="message"></p>
</div>
</div>

<script>
(function () {
  'use strict';

  const boardWrap = document.getElementById('board-wrap');
  const minesCountEl = document.getElementById('mines-count');
  const timerEl = document.getElementById('timer');
  const messageEl = document.getElementById('message');
  const presetSelect = document.getElementById('preset');
  const newGameBtn = document.getElementById('new-game');

  let rows = 16, cols = 16, mineCount = 40;
  let grid = [], revealed = [], flagged = [];
  let gameOver = false, gameStarted = false, timerId = null, seconds = 0;

  function parsePreset(value) {
    var parts = value.split(',').map(Number);
    return { cols: parts[0], rows: parts[1], mines: parts[2] };
  }

  function initBoard() {
    var preset = parsePreset(presetSelect.value);
    cols = preset.cols; rows = preset.rows;
    mineCount = Math.min(preset.mines, cols * rows - 1);
    grid = []; revealed = []; flagged = [];
    for (var r = 0; r < rows; r++) {
      grid[r] = []; revealed[r] = []; flagged[r] = [];
      for (var c = 0; c < cols; c++) { grid[r][c] = 0; revealed[r][c] = false; flagged[r][c] = false; }
    }
    gameOver = false; gameStarted = false; seconds = 0; timerEl.textContent = '0';
    if (timerId) clearInterval(timerId); timerId = null;
    messageEl.textContent = ''; messageEl.classList.remove('win', 'lose');
    minesCountEl.textContent = mineCount; render();
  }

  function placeMines(excludeR, excludeC) {
    var placed = 0;
    while (placed < mineCount) {
      var r = Math.floor(Math.random() * rows), c = Math.floor(Math.random() * cols);
      if (grid[r][c] === -1 || (r === excludeR && c === excludeC)) continue;
      grid[r][c] = -1; placed++;
    }
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        if (grid[r][c] === -1) continue;
        var n = 0;
        for (var dr = -1; dr <= 1; dr++) for (var dc = -1; dc <= 1; dc++) {
          var nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === -1) n++;
        }
        grid[r][c] = n;
      }
    }
  }

  function startTimer() {
    if (timerId) return;
    gameStarted = true;
    timerId = setInterval(function () { seconds++; timerEl.textContent = seconds; }, 1000);
  }

  function reveal(r, c) {
    if (r < 0 || r >= rows || c < 0 || c >= cols) return;
    if (revealed[r][c] || flagged[r][c]) return;
    revealed[r][c] = true;
    if (grid[r][c] === -1) {
      gameOver = true;
      messageEl.textContent = 'Game Over \u2014 you hit a mine!';
      messageEl.classList.add('lose');
      revealAllMines();
      if (timerId) clearInterval(timerId);
      return;
    }
    if (grid[r][c] === 0) {
      for (var dr = -1; dr <= 1; dr++) for (var dc = -1; dc <= 1; dc++) {
        if (dr !== 0 || dc !== 0) reveal(r + dr, c + dc);
      }
    }
    checkWin();
  }

  function revealAllMines() {
    for (var r = 0; r < rows; r++) for (var c = 0; c < cols; c++) {
      if (grid[r][c] === -1) revealed[r][c] = true;
    }
  }

  function checkWin() {
    var revealedCount = 0;
    for (var r = 0; r < rows; r++) for (var c = 0; c < cols; c++) { if (revealed[r][c]) revealedCount++; }
    if (revealedCount === rows * cols - mineCount) {
      gameOver = true;
      messageEl.textContent = 'You win! Time: ' + seconds + 's';
      messageEl.classList.add('win');
      if (timerId) clearInterval(timerId);
    }
  }

  function toggleFlag(r, c) {
    if (gameOver || revealed[r][c]) return;
    flagged[r][c] = !flagged[r][c];
    var count = 0;
    for (var i = 0; i < rows; i++) for (var j = 0; j < cols; j++) { if (flagged[i][j]) count++; }
    minesCountEl.textContent = mineCount - count;
    render();
  }

  function handleClick(r, c) {
    if (gameOver) return;
    if (!gameStarted) { placeMines(r, c); startTimer(); }
    if (flagged[r][c]) return;
    reveal(r, c); render();
  }

  function handleRightClick(e, r, c) {
    e.preventDefault();
    if (gameOver || revealed[r][c]) return;
    toggleFlag(r, c);
  }

  function render() {
    boardWrap.innerHTML = '';
    var board = document.createElement('div');
    board.className = 'board';
    var cellSize = window.innerWidth < 600 ? 24 : 28;
    board.style.gridTemplateColumns = 'repeat(' + cols + ', ' + cellSize + 'px)';
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var cell = document.createElement('div');
        cell.className = 'cell';
        if (revealed[r][c]) {
          cell.classList.add('revealed');
          if (grid[r][c] === -1) { cell.classList.add('mine'); cell.textContent = '\uD83D\uDCA3'; }
          else if (grid[r][c] > 0) { cell.textContent = grid[r][c]; cell.classList.add('num-' + grid[r][c]); }
        } else if (flagged[r][c]) { cell.classList.add('flagged'); }
        cell.dataset.r = r; cell.dataset.c = c;
        cell.addEventListener('click', function () { handleClick(Number(this.dataset.r), Number(this.dataset.c)); });
        cell.addEventListener('contextmenu', function (e) { handleRightClick(e, Number(this.dataset.r), Number(this.dataset.c)); });
        board.appendChild(cell);
      }
    }
    boardWrap.appendChild(board);
  }

  newGameBtn.addEventListener('click', initBoard);
  presetSelect.addEventListener('change', initBoard);
  initBoard();
})();
</script>
</body>
</html>
