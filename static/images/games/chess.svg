<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg1)"/>
  <!-- Mini chessboard -->
  <g transform="translate(160, 40)">
    <rect x="0" y="0" width="80" height="80" rx="4" fill="#b58863"/>
    <rect x="0" y="0" width="20" height="20" fill="#e8d5b0"/>
    <rect x="20" y="0" width="20" height="20" fill="#b58863"/>
    <rect x="40" y="0" width="20" height="20" fill="#e8d5b0"/>
    <rect x="60" y="0" width="20" height="20" fill="#b58863"/>
    <rect x="0" y="20" width="20" height="20" fill="#b58863"/>
    <rect x="20" y="20" width="20" height="20" fill="#e8d5b0"/>
    <rect x="40" y="20" width="20" height="20" fill="#b58863"/>
    <rect x="60" y="20" width="20" height="20" fill="#e8d5b0"/>
    <rect x="0" y="40" width="20" height="20" fill="#e8d5b0"/>
    <rect x="20" y="40" width="20" height="20" fill="#b58863"/>
    <rect x="40" y="40" width="20" height="20" fill="#e8d5b0"/>
    <rect x="60" y="40" width="20" height="20" fill="#b58863"/>
    <rect x="0" y="60" width="20" height="20" fill="#b58863"/>
    <rect x="20" y="60" width="20" height="20" fill="#e8d5b0"/>
    <rect x="40" y="60" width="20" height="20" fill="#b58863"/>
    <rect x="60" y="60" width="20" height="20" fill="#e8d5b0"/>
    <!-- King piece (white) -->
    <text x="30" y="56" text-anchor="middle" font-size="28" fill="#fff" filter="drop-shadow(1px 1px 2px rgba(0,0,0,0.5))">&#9812;</text>
    <!-- Knight piece (black) -->
    <text x="55" y="36" text-anchor="middle" font-size="28" fill="#333" filter="drop-shadow(1px 1px 2px rgba(0,0,0,0.3))">&#9822;</text>
  </g>
  <!-- Gold accent glow -->
  <circle cx="200" cy="80" r="50" fill="none" stroke="rgba(255,215,0,0.12)" stroke-width="1"/>
  <text x="200" y="155" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">Chess</text>
</svg>
