<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#d4edaa"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="170" width="400" height="55" fill="#4a7c3f"/>
  <rect x="0" y="178" width="400" height="47" fill="#3d6b35"/>
  <!-- Blue stick figure (left) with sword -->
  <g stroke="#4488ff" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="150" cy="110" r="8"/>
    <line x1="150" y1="118" x2="150" y2="145"/>
    <line x1="150" y1="145" x2="140" y2="168"/>
    <line x1="150" y1="145" x2="160" y2="168"/>
    <line x1="150" y1="128" x2="165" y2="122"/>
    <line x1="150" y1="128" x2="138" y2="135"/>
  </g>
  <!-- Sword -->
  <line x1="165" y1="122" x2="182" y2="110" stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Red stick figure (right) with spear -->
  <g stroke="#ff4444" stroke-width="3" stroke-linecap="round" fill="none">
    <circle cx="250" cy="110" r="8"/>
    <line x1="250" y1="118" x2="250" y2="145"/>
    <line x1="250" y1="145" x2="240" y2="168"/>
    <line x1="250" y1="145" x2="260" y2="168"/>
    <line x1="250" y1="128" x2="235" y2="122"/>
    <line x1="250" y1="128" x2="262" y2="135"/>
  </g>
  <!-- Spear -->
  <line x1="235" y1="122" x2="215" y2="108" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="213,106 215,108 211,110" fill="#ccc"/>
  <!-- Gold coin -->
  <circle cx="200" cy="90" r="12" fill="#FFD700" stroke="#DAA520" stroke-width="1.5"/>
  <text x="200" y="95" text-anchor="middle" fill="#8B6914" font-family="sans-serif" font-size="14" font-weight="bold">$</text>
  <!-- VS spark -->
  <text x="200" y="150" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="sans-serif" font-size="20" font-weight="bold">VS</text>
  <text x="200" y="210" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">Stick War Legacy</text>
</svg>
