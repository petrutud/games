<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d29"/>
      <stop offset="100%" stop-color="#252936"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c4a030"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8fc76a"/>
      <stop offset="100%" stop-color="#5e9040"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Bar chart -->
  <rect x="40" y="120" width="22" height="40" rx="3" fill="url(#green)" opacity="0.7"/>
  <rect x="68" y="100" width="22" height="60" rx="3" fill="url(#green)" opacity="0.8"/>
  <rect x="96" y="75" width="22" height="85" rx="3" fill="url(#green)" opacity="0.9"/>
  <rect x="124" y="55" width="22" height="105" rx="3" fill="url(#green)"/>
  <!-- Trend line -->
  <polyline points="51,118 79,96 107,72 135,50" fill="none" stroke="#e8c547" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="135" cy="50" r="4" fill="#e8c547"/>
  <!-- Dollar sign -->
  <text x="155" y="52" font-family="sans-serif" font-weight="700" font-size="22" fill="#e8c547">$</text>
  <!-- Building icons -->
  <rect x="40" y="22" width="16" height="20" rx="2" fill="#6b8cce" opacity="0.6"/>
  <rect x="42" y="26" width="4" height="4" rx="1" fill="#1a1d29"/>
  <rect x="50" y="26" width="4" height="4" rx="1" fill="#1a1d29"/>
  <rect x="42" y="33" width="4" height="4" rx="1" fill="#1a1d29"/>
  <rect x="50" y="33" width="4" height="4" rx="1" fill="#1a1d29"/>
  <rect x="62" y="28" width="16" height="14" rx="2" fill="#8c6b6b" opacity="0.6"/>
  <rect x="68" y="24" width="4" height="4" rx="1" fill="#8c6b6b" opacity="0.6"/>
  <!-- Title -->
  <text x="100" y="182" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="#e8c547" letter-spacing="1.5">TYCOON</text>
</svg>
