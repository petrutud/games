<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="100%" stop-color="#0a1428"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5291ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#5291ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <circle cx="100" cy="90" r="80" fill="url(#glow)"/>
  <!-- grid -->
  <g stroke="#1f3866" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="40" x2="200" y2="40"/><line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/><line x1="0" y1="160" x2="200" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
  </g>
  <!-- path -->
  <path d="M 10 100 L 60 100 L 60 50 L 130 50 L 130 120 L 195 120" fill="none" stroke="#1f3866" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 10 100 L 60 100 L 60 50 L 130 50 L 130 120 L 195 120" fill="none" stroke="#2d5698" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- start/end -->
  <circle cx="10" cy="100" r="5" fill="#4ade80"/>
  <circle cx="195" cy="120" r="5" fill="#ef4444"/>
  <!-- towers -->
  <g>
    <circle cx="35" cy="70" r="12" fill="#0e1f3a" stroke="#5fd8ff" stroke-width="2"/>
    <rect x="35" y="68" width="20" height="4" fill="#5fd8ff" transform="rotate(20 35 70)"/>
    <circle cx="35" cy="70" r="28" fill="none" stroke="#5fd8ff" stroke-width="0.5" opacity="0.3"/>
    <text x="35" y="74" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">◆</text>
  </g>
  <g>
    <circle cx="95" cy="90" r="12" fill="#0e1f3a" stroke="#ff9340" stroke-width="2"/>
    <rect x="95" y="88" width="20" height="4" fill="#ff9340" transform="rotate(-30 95 90)"/>
    <text x="95" y="94" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">▲</text>
  </g>
  <g>
    <circle cx="160" cy="85" r="12" fill="#0e1f3a" stroke="#c88cff" stroke-width="2"/>
    <rect x="160" y="83" width="20" height="4" fill="#c88cff" transform="rotate(45 160 85)"/>
    <text x="160" y="89" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">⚡</text>
  </g>
  <!-- enemies -->
  <polygon points="78,50 70,55 70,45" fill="#ff8c6e"/>
  <polygon points="130,80 125,85 125,75" fill="#9fe8ff"/>
  <rect x="150" y="115" width="10" height="10" fill="#ffd54f" transform="rotate(45 155 120)"/>
  <!-- projectiles/effects -->
  <line x1="45" y1="65" x2="65" y2="52" stroke="#5fd8ff" stroke-width="2" opacity="0.9"/>
  <line x1="168" y1="80" x2="152" y2="117" stroke="#c88cff" stroke-width="1.5" opacity="0.8" stroke-dasharray="2,2"/>
  <!-- title -->
  <text x="100" y="170" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="#5291ff" letter-spacing="3">NEXUS DEFENSE</text>
  <text x="100" y="185" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="8" fill="#7fb5ff" letter-spacing="2">10 TOWERS · 40 WAVES · 5 MAPS</text>
</svg>
