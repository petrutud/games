<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d29"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Dungeon grid -->
  <g opacity="0.15" stroke="#555" stroke-width="0.5" fill="none">
    <rect x="30" y="40" width="140" height="120" rx="2"/>
    <line x1="50" y1="40" x2="50" y2="160"/>
    <line x1="70" y1="40" x2="70" y2="160"/>
    <line x1="90" y1="40" x2="90" y2="160"/>
    <line x1="110" y1="40" x2="110" y2="160"/>
    <line x1="130" y1="40" x2="130" y2="160"/>
    <line x1="150" y1="40" x2="150" y2="160"/>
    <line x1="30" y1="60" x2="170" y2="60"/>
    <line x1="30" y1="80" x2="170" y2="80"/>
    <line x1="30" y1="100" x2="170" y2="100"/>
    <line x1="30" y1="120" x2="170" y2="120"/>
    <line x1="30" y1="140" x2="170" y2="140"/>
  </g>
  <!-- Walls -->
  <rect x="50" y="40" width="20" height="20" fill="#3a3e48" opacity="0.6"/>
  <rect x="70" y="40" width="20" height="20" fill="#3a3e48" opacity="0.6"/>
  <rect x="30" y="60" width="20" height="20" fill="#3a3e48" opacity="0.6"/>
  <rect x="130" y="60" width="20" height="20" fill="#3a3e48" opacity="0.6"/>
  <rect x="70" y="80" width="20" height="20" fill="#3a3e48" opacity="0.6"/>
  <rect x="110" y="100" width="20" height="20" fill="#3a3e48" opacity="0.6"/>
  <rect x="50" y="120" width="20" height="20" fill="#3a3e48" opacity="0.6"/>
  <rect x="150" y="120" width="20" height="40" fill="#3a3e48" opacity="0.6"/>
  <!-- Player @ -->
  <text x="100" y="108" text-anchor="middle" font-family="monospace" font-weight="700" font-size="22" fill="#7caf5e">@</text>
  <!-- Enemies -->
  <text x="140" y="88" text-anchor="middle" font-family="monospace" font-weight="700" font-size="16" fill="#d9655c">G</text>
  <text x="60" y="148" text-anchor="middle" font-family="monospace" font-weight="700" font-size="16" fill="#d9655c">S</text>
  <!-- Items -->
  <text x="80" y="68" text-anchor="middle" font-family="monospace" font-size="14" fill="#e8c547">!</text>
  <text x="120" y="148" text-anchor="middle" font-family="monospace" font-size="14" fill="#60a5fa">]</text>
  <!-- Stairs -->
  <text x="160" y="68" text-anchor="middle" font-family="monospace" font-size="16" fill="#a78bfa">&gt;</text>
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="#7caf5e" letter-spacing="2">ROGUELIKE</text>
</svg>
