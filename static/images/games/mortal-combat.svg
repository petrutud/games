<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#1a1018"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Blood splatter bg -->
  <circle cx="60" cy="70" r="20" fill="#a02020" opacity="0.06"/>
  <circle cx="150" cy="90" r="25" fill="#a02020" opacity="0.05"/>
  <!-- Dragon emblem -->
  <circle cx="100" cy="85" r="28" fill="none" stroke="#d4a030" stroke-width="1.5" opacity="0.2"/>
  <circle cx="100" cy="85" r="15" fill="none" stroke="#d4a030" stroke-width="1" opacity="0.15"/>
  <!-- Fighter 1 (left, blue) -->
  <g>
    <rect x="52" y="80" width="14" height="26" rx="1" fill="#2080d0"/>
    <circle cx="59" cy="78" r="7" fill="#2080d0"/>
    <rect x="46" y="88" width="12" height="6" rx="2" fill="#40b0f0" opacity="0.8"/>
  </g>
  <!-- Fighter 2 (right, yellow) -->
  <g>
    <rect x="130" y="78" width="14" height="26" rx="1" fill="#d4a020"/>
    <circle cx="137" cy="76" r="7" fill="#d4a020"/>
    <rect x="138" y="86" width="12" height="6" rx="2" fill="#f0c030" opacity="0.8"/>
  </g>
  <!-- VS spark -->
  <text x="100" y="98" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="16" fill="#c83020" opacity="0.7">VS</text>
  <!-- Impact particles -->
  <circle cx="95" cy="88" r="2" fill="#f06030" opacity="0.5"/>
  <circle cx="105" cy="85" r="1.5" fill="#f0c030" opacity="0.5"/>
  <circle cx="90" cy="92" r="1" fill="#fff" opacity="0.3"/>
  <!-- Platform -->
  <rect x="35" y="110" width="130" height="5" rx="2" fill="#2a2028"/>
  <rect x="35" y="110" width="130" height="1.5" fill="#802020" opacity="0.15"/>
  <!-- Title -->
  <text x="100" y="145" text-anchor="middle" font-family="serif" font-weight="900" font-size="12" fill="#c83020" letter-spacing="1.5">MORTAL COMBAT</text>
  <text x="100" y="162" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="8" fill="#d4a030" letter-spacing="1">8 FIGHTERS</text>
  <!-- Fighter dots -->
  <g opacity="0.5">
    <circle cx="58" cy="178" r="3.5" fill="#d4a020"/>
    <circle cx="72" cy="178" r="3.5" fill="#2080d0"/>
    <circle cx="86" cy="178" r="3.5" fill="#c83020"/>
    <circle cx="100" cy="178" r="3.5" fill="#6060d0"/>
    <circle cx="114" cy="178" r="3.5" fill="#3060a0"/>
    <circle cx="128" cy="178" r="3.5" fill="#20a050"/>
    <circle cx="142" cy="178" r="3.5" fill="#2a2a3a"/>
  </g>
</svg>
