    <text x="136" y="44" text-anchor="middle" font-size="12">🚩</text>
    <!-- More rows of unrevealed -->
    <rect x="4" y="76" width="24" height="24" rx="1" fill="#3d4554" stroke="#252a35" stroke-width="0.5"/>
    <rect x="28" y="76" width="24" height="24" rx="1" fill="#3d4554" stroke="#252a35" stroke-width="0.5"/>
    <rect x="52" y="76" width="24" height="24" rx="1" fill="#3d4554" stroke="#252a35" stroke-width="0.5"/>
    <rect x="76" y="76" width="24" height="24" rx="1" fill="#3d4554" stroke="#252a35" stroke-width="0.5"/>
    <rect x="100" y="76" width="24" height="24" rx="1" fill="#3d4554" stroke="#252a35" stroke-width="0.5"/>
    <rect x="124" y="76" width="24" height="24" rx="1" fill="#3d4554" stroke="#252a35" stroke-width="0.5"/>
