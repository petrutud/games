<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1510"/>
      <stop offset="100%" style="stop-color:#12100e"/>
    </linearGradient>
    <radialGradient id="redPiece" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ff6655"/>
      <stop offset="100%" style="stop-color:#881111"/>
    </radialGradient>
    <radialGradient id="blackPiece" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#555"/>
      <stop offset="100%" style="stop-color:#111"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg1)"/>
  <!-- Mini checkerboard -->
  <g transform="translate(140, 25)">
    <!-- Row 0 -->
    <rect x="0" y="0" width="20" height="20" fill="#d4b896"/>
    <rect x="20" y="0" width="20" height="20" fill="#6b4226"/>
    <rect x="40" y="0" width="20" height="20" fill="#d4b896"/>
    <rect x="60" y="0" width="20" height="20" fill="#6b4226"/>
    <rect x="80" y="0" width="20" height="20" fill="#d4b896"/>
    <rect x="100" y="0" width="20" height="20" fill="#6b4226"/>
    <!-- Row 1 -->
    <rect x="0" y="20" width="20" height="20" fill="#6b4226"/>
    <rect x="20" y="20" width="20" height="20" fill="#d4b896"/>
    <rect x="40" y="20" width="20" height="20" fill="#6b4226"/>
    <rect x="60" y="20" width="20" height="20" fill="#d4b896"/>
    <rect x="80" y="20" width="20" height="20" fill="#6b4226"/>
    <rect x="100" y="20" width="20" height="20" fill="#d4b896"/>
    <!-- Row 2 -->
    <rect x="0" y="40" width="20" height="20" fill="#d4b896"/>
    <rect x="20" y="40" width="20" height="20" fill="#6b4226"/>
    <rect x="40" y="40" width="20" height="20" fill="#d4b896"/>
    <rect x="60" y="40" width="20" height="20" fill="#6b4226"/>
    <rect x="80" y="40" width="20" height="20" fill="#d4b896"/>
    <rect x="100" y="40" width="20" height="20" fill="#6b4226"/>
    <!-- Row 3 -->
    <rect x="0" y="60" width="20" height="20" fill="#6b4226"/>
    <rect x="20" y="60" width="20" height="20" fill="#d4b896"/>
    <rect x="40" y="60" width="20" height="20" fill="#6b4226"/>
    <rect x="60" y="60" width="20" height="20" fill="#d4b896"/>
    <rect x="80" y="60" width="20" height="20" fill="#6b4226"/>
    <rect x="100" y="60" width="20" height="20" fill="#d4b896"/>
    <!-- Row 4 -->
    <rect x="0" y="80" width="20" height="20" fill="#d4b896"/>
    <rect x="20" y="80" width="20" height="20" fill="#6b4226"/>
    <rect x="40" y="80" width="20" height="20" fill="#d4b896"/>
    <rect x="60" y="80" width="20" height="20" fill="#6b4226"/>
    <rect x="80" y="80" width="20" height="20" fill="#d4b896"/>
    <rect x="100" y="80" width="20" height="20" fill="#6b4226"/>
    <!-- Row 5 -->
    <rect x="0" y="100" width="20" height="20" fill="#6b4226"/>
    <rect x="20" y="100" width="20" height="20" fill="#d4b896"/>
    <rect x="40" y="100" width="20" height="20" fill="#6b4226"/>
    <rect x="60" y="100" width="20" height="20" fill="#d4b896"/>
    <rect x="80" y="100" width="20" height="20" fill="#6b4226"/>
    <rect x="100" y="100" width="20" height="20" fill="#d4b896"/>
    <!-- Board border -->
    <rect x="0" y="0" width="120" height="120" fill="none" stroke="rgba(180,120,50,0.3)" stroke-width="2" rx="4"/>
    <!-- Black pieces (top rows) -->
    <circle cx="30" cy="10" r="7" fill="url(#blackPiece)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
    <circle cx="70" cy="10" r="7" fill="url(#blackPiece)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
    <circle cx="110" cy="10" r="7" fill="url(#blackPiece)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
    <circle cx="10" cy="30" r="7" fill="url(#blackPiece)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
    <circle cx="50" cy="30" r="7" fill="url(#blackPiece)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
    <circle cx="90" cy="30" r="7" fill="url(#blackPiece)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
    <!-- Red pieces (bottom rows) -->
    <circle cx="10" cy="90" r="7" fill="url(#redPiece)" stroke="rgba(255,100,80,0.4)" stroke-width="1"/>
    <circle cx="50" cy="90" r="7" fill="url(#redPiece)" stroke="rgba(255,100,80,0.4)" stroke-width="1"/>
    <circle cx="90" cy="90" r="7" fill="url(#redPiece)" stroke="rgba(255,100,80,0.4)" stroke-width="1"/>
    <circle cx="30" cy="110" r="7" fill="url(#redPiece)" stroke="rgba(255,100,80,0.4)" stroke-width="1"/>
    <circle cx="70" cy="110" r="7" fill="url(#redPiece)" stroke="rgba(255,100,80,0.4)" stroke-width="1"/>
    <circle cx="110" cy="110" r="7" fill="url(#redPiece)" stroke="rgba(255,100,80,0.4)" stroke-width="1"/>
  </g>
  <!-- Warm glow -->
  <circle cx="200" cy="85" r="70" fill="none" stroke="rgba(200,120,40,0.08)" stroke-width="1"/>
  <text x="200" y="180" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">Checkers</text>
</svg>
