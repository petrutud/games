<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f7f7f7"/>

  <!-- Ground -->
  <line x1="0" y1="140" x2="200" y2="140" stroke="#999" stroke-width="3"/>

  <!-- Dinosaur -->
  <g id="dino">
    <!-- Body -->
    <rect x="40" y="100" width="40" height="35" fill="#2d2d2d" rx="3"/>
    <!-- Neck -->
    <rect x="75" y="85" width="15" height="20" fill="#2d2d2d" rx="2"/>
    <!-- Head -->
    <circle cx="90" cy="75" r="15" fill="#2d2d2d"/>
    <!-- Eye -->
    <circle cx="95" cy="70" r="4" fill="#fff"/>
    <circle cx="96" cy="70" r="2" fill="#000"/>
    <!-- Snout -->
    <rect x="100" y="73" width="12" height="7" fill="#2d2d2d" rx="2"/>
    <!-- Tail -->
    <path d="M 40 115 Q 20 110 10 95" stroke="#2d2d2d" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="50" y="135" width="8" height="25" fill="#2d2d2d" rx="2"/>
    <rect x="65" y="135" width="8" height="25" fill="#2d2d2d" rx="2"/>
  </g>

  <!-- Cacti -->
  <g id="cactus" transform="translate(140, 100)">
    <!-- Main stem -->
    <rect x="0" y="0" width="12" height="45" fill="#6b8e23" rx="2"/>
    <!-- Left arm -->
    <rect x="-15" y="15" width="15" height="8" fill="#6b8e23" rx="2"/>
    <!-- Right arm -->
    <rect x="12" y="15" width="15" height="8" fill="#6b8e23" rx="2"/>
    <!-- Spikes -->
    <g fill="#4a6b1a">
      <circle cx="0" cy="5" r="2"/>
      <circle cx="12" cy="5" r="2"/>
      <circle cx="0" cy="20" r="2"/>
      <circle cx="12" cy="20" r="2"/>
      <circle cx="0" cy="35" r="2"/>
      <circle cx="12" cy="35" r="2"/>
    </g>
  </g>
</svg>
