<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="20" fill="#1a1a2e"/>
  <!-- Grid dots -->
  <g fill="rgba(255,255,255,0.06)">
    <circle cx="20" cy="20" r="2"/><circle cx="60" cy="20" r="2"/><circle cx="100" cy="20" r="2"/><circle cx="140" cy="20" r="2"/><circle cx="180" cy="20" r="2"/>
    <circle cx="20" cy="60" r="2"/><circle cx="60" cy="60" r="2"/><circle cx="100" cy="60" r="2"/><circle cx="140" cy="60" r="2"/><circle cx="180" cy="60" r="2"/>
    <circle cx="20" cy="100" r="2"/><circle cx="60" cy="100" r="2"/><circle cx="140" cy="100" r="2"/><circle cx="180" cy="100" r="2"/>
    <circle cx="20" cy="140" r="2"/><circle cx="60" cy="140" r="2"/><circle cx="100" cy="140" r="2"/><circle cx="140" cy="140" r="2"/><circle cx="180" cy="140" r="2"/>
    <circle cx="20" cy="180" r="2"/><circle cx="60" cy="180" r="2"/><circle cx="100" cy="180" r="2"/><circle cx="140" cy="180" r="2"/><circle cx="180" cy="180" r="2"/>
  </g>
  <!-- Shadow -->
  <ellipse cx="103" cy="135" rx="30" ry="8" fill="rgba(0,0,0,0.3)"/>
  <!-- Red ball -->
  <defs>
    <radialGradient id="ball" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="50%" stop-color="#ee2222"/>
      <stop offset="100%" stop-color="#aa0000"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="40" fill="url(#ball)"/>
  <!-- Shine -->
  <ellipse cx="88" cy="86" rx="14" ry="8" fill="rgba(255,255,255,0.35)" transform="rotate(-20 88 86)"/>
  <!-- Coin -->
  <circle cx="155" cy="55" r="12" fill="#ffdd00" opacity="0.9"/>
  <circle cx="153" cy="53" r="4" fill="#fff8cc" opacity="0.7"/>
  <!-- Blue obstacle -->
  <rect x="30" y="145" width="22" height="22" rx="2" fill="#4466ff" opacity="0.8" transform="rotate(15 41 156)"/>
  <!-- Purple triangle -->
  <polygon points="165,150 180,175 150,175" fill="#9944ff" opacity="0.7"/>
</svg>
