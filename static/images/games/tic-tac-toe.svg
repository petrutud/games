<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <rect width="400" height="225" fill="#1a1d29"/>
  <!-- Grid -->
  <g transform="translate(140, 30)">
    <line x1="40" y1="0" x2="40" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="0" x2="80" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="120" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="80" x2="120" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
    <!-- X marks (green) -->
    <g stroke="#7caf5e" stroke-width="4" stroke-linecap="round">
      <line x1="8" y1="8" x2="32" y2="32"/>
      <line x1="32" y1="8" x2="8" y2="32"/>
    </g>
    <g stroke="#7caf5e" stroke-width="4" stroke-linecap="round">
      <line x1="88" y1="48" x2="112" y2="72"/>
      <line x1="112" y1="48" x2="88" y2="72"/>
    </g>
    <g stroke="#7caf5e" stroke-width="4" stroke-linecap="round">
      <line x1="8" y1="88" x2="32" y2="112"/>
      <line x1="32" y1="88" x2="8" y2="112"/>
    </g>
    <!-- O marks (yellow) -->
    <circle cx="60" cy="20" r="13" fill="none" stroke="#e8c547" stroke-width="4"/>
    <circle cx="20" cy="60" r="13" fill="none" stroke="#e8c547" stroke-width="4"/>
    <circle cx="100" cy="100" r="13" fill="none" stroke="#e8c547" stroke-width="4"/>
  </g>
  <text x="200" y="185" text-anchor="middle" fill="#9aa0a6" font-family="sans-serif" font-size="12">Tic-Tac-Toe</text>
</svg>
