      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#a8d8a0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="140" width="400" height="85" fill="#3d8b3d"/>
  <rect x="0" y="148" width="400" height="77" fill="#8B5E3C"/>
  <rect x="0" y="180" width="400" height="45" fill="#808080"/>
  <!-- Grass blades -->
  <rect x="20" y="136" width="1" height="4" fill="#66BB6A"/>
  <rect x="35" y="137" width="1" height="3" fill="#66BB6A"/>
  <rect x="55" y="135" width="1" height="5" fill="#66BB6A"/>
  <rect x="80" y="137" width="1" height="3" fill="#66BB6A"/>
  <rect x="120" y="136" width="1" height="4" fill="#66BB6A"/>
  <rect x="200" y="135" width="1" height="5" fill="#66BB6A"/>
  <rect x="280" y="137" width="1" height="3" fill="#66BB6A"/>
  <rect x="340" y="136" width="1" height="4" fill="#66BB6A"/>
  <!-- Tree -->
  <rect x="100" y="80" width="8" height="60" fill="#6B4226"/>
  <ellipse cx="104" cy="70" rx="25" ry="22" fill="#2E7D32"/>
  <ellipse cx="104" cy="62" rx="18" ry="16" fill="#388E3C"/>
  <!-- Tree 2 -->
  <rect x="300" y="90" width="8" height="50" fill="#6B4226"/>
