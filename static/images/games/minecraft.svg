  <rect x="170" y="155" width="30" height="25" rx="4" fill="#1a1a1a"/>
  <!-- Flowers -->
  <circle cx="40" cy="136" r="3" fill="#E91E63"/>
  <circle cx="40" cy="136" r="1.5" fill="#FFEB3B"/>
  <circle cx="230" cy="136" r="3" fill="#9C27B0"/>
