  <ellipse cx="304" cy="75" rx="15" ry="14" fill="#388E3C"/>
  <!-- Ores underground -->
  <rect x="60" y="190" width="6" height="6" rx="1" fill="#DAA520"/>
  <rect x="150" y="195" width="5" height="5" rx="1" fill="#A0522D"/>
  <rect x="250" y="200" width="6" height="6" rx="1" fill="#00BCD4"/>
  <rect x="330" y="188" width="5" height="5" rx="1" fill="#E67E22"/>
