<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08060e"/>
      <stop offset="100%" stop-color="#14102a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Beat ring -->
  <circle cx="100" cy="140" r="24" fill="none" stroke="rgba(240,208,48,0.2)" stroke-width="2"/>
  <circle cx="100" cy="140" r="14" fill="none" stroke="rgba(240,208,48,0.35)" stroke-width="2"/>
  <circle cx="100" cy="140" r="4" fill="#f0d030" opacity="0.6"/>
  <!-- Fighter 1 (drum, left) -->
  <g>
    <rect x="48" y="78" width="16" height="28" rx="2" fill="#a06030"/>
    <circle cx="56" cy="76" r="8" fill="#a06030"/>
    <rect x="44" y="86" width="24" height="4" rx="2" fill="#d08040"/>
    <rect x="40" y="88" width="10" height="6" rx="2" fill="#d08040" opacity="0.7"/>
  </g>
  <!-- Fighter 2 (violin, right) -->
  <g>
    <rect x="132" y="76" width="16" height="28" rx="2" fill="#8040a0"/>
    <circle cx="140" cy="74" r="8" fill="#8040a0"/>
    <rect x="128" y="84" width="24" height="4" rx="2" fill="#b060d0"/>
    <rect x="146" y="82" width="10" height="6" rx="2" fill="#b060d0" opacity="0.7"/>
  </g>
  <!-- VS sparks -->
  <text x="100" y="92" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="16" fill="#f0d030" opacity="0.6">VS</text>
  <!-- Musical notes flying -->
  <text x="72" y="68" font-size="14" fill="#f0d030" opacity="0.4">&#9834;</text>
  <text x="125" y="65" font-size="12" fill="#b060d0" opacity="0.4">&#9835;</text>
  <text x="95" y="58" font-size="10" fill="#d08040" opacity="0.3">&#9833;</text>
  <!-- Impact particles -->
  <circle cx="98" cy="84" r="2" fill="#f0d030" opacity="0.5"/>
  <circle cx="105" cy="80" r="1.5" fill="#f04040" opacity="0.4"/>
  <!-- Platform -->
  <rect x="30" y="110" width="140" height="4" rx="2" fill="#1e183a"/>
  <!-- Title -->
  <text x="100" y="170" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="14" fill="#f0d030" letter-spacing="2">CLASHENDO</text>
  <text x="100" y="186" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="7.5" fill="#8060a0" letter-spacing="1">RHYTHM FIGHTING</text>
</svg>
