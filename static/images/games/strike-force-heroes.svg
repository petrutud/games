<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1020"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c5a"/>
      <stop offset="100%" stop-color="#e85a28"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Crosshair -->
  <circle cx="100" cy="90" r="36" fill="none" stroke="#ff6b35" stroke-width="2.5" opacity="0.3"/>
  <circle cx="100" cy="90" r="18" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="52" x2="100" y2="70" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="110" x2="100" y2="128" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="90" x2="80" y2="90" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="90" x2="138" y2="90" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="90" r="3" fill="#ff6b35"/>
  <!-- Player figure -->
  <circle cx="100" cy="90" r="12" fill="url(#orange)" opacity="0.8"/>
  <rect x="100" y="83" width="20" height="5" rx="2" fill="#ff6b35" transform="rotate(-15 110 85.5)"/>
  <!-- Bullets -->
  <circle cx="140" cy="78" r="3" fill="#ff8c5a" opacity="0.9"/>
  <circle cx="152" cy="74" r="2.5" fill="#ff8c5a" opacity="0.6"/>
  <circle cx="162" cy="71" r="2" fill="#ff8c5a" opacity="0.3"/>
  <!-- Enemy indicators -->
  <circle cx="45" cy="55" r="8" fill="#c44" opacity="0.5"/>
  <circle cx="160" cy="130" r="8" fill="#c44" opacity="0.5"/>
  <circle cx="50" cy="130" r="6" fill="#c44" opacity="0.3"/>
  <!-- Wave text -->
  <text x="100" y="162" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="#ff6b35" letter-spacing="3">STRIKE FORCE</text>
  <text x="100" y="180" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="10" fill="#6a6a80" letter-spacing="2">25 WAVES</text>
</svg>
