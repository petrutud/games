<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0008"/>
      <stop offset="100%" style="stop-color:#1a0a1e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,60,60,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,60,60,0)"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg1)"/>
  <circle cx="200" cy="90" r="70" fill="url(#glow)"/>
  <!-- Boss skull icon -->
  <g transform="translate(200, 85)">
    <!-- Head -->
    <ellipse cx="0" cy="-8" rx="22" ry="26" fill="none" stroke="#f44" stroke-width="2.5"/>
    <!-- Eyes -->
    <ellipse cx="-9" cy="-12" rx="5" ry="6" fill="#f44" opacity="0.8"/>
    <ellipse cx="9" cy="-12" rx="5" ry="6" fill="#f44" opacity="0.8"/>
    <!-- Nose -->
    <path d="M-3 0 L0 4 L3 0" fill="none" stroke="#f44" stroke-width="1.5"/>
    <!-- Jaw -->
    <path d="M-14 8 Q0 22 14 8" fill="none" stroke="#f44" stroke-width="2"/>
    <!-- Teeth -->
    <line x1="-8" y1="8" x2="-6" y2="14" stroke="#f44" stroke-width="1.5"/>
    <line x1="-2" y1="10" x2="0" y2="16" stroke="#f44" stroke-width="1.5"/>
    <line x1="4" y1="10" x2="6" y2="16" stroke="#f44" stroke-width="1.5"/>
    <line x1="10" y1="8" x2="8" y2="14" stroke="#f44" stroke-width="1.5"/>
    <!-- Crown -->
    <path d="M-18 -30 L-12 -20 L-4 -32 L0 -22 L4 -32 L12 -20 L18 -30 L16 -18 L-16 -18 Z" fill="#d33" opacity="0.7"/>
  </g>
  <!-- Swords crossed -->
  <line x1="155" y1="55" x2="185" y2="120" stroke="#888" stroke-width="2" opacity="0.5"/>
  <line x1="245" y1="55" x2="215" y2="120" stroke="#888" stroke-width="2" opacity="0.5"/>
  <text x="200" y="155" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">Boss Flip</text>
</svg>
