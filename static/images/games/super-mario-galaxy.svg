<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="space" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a4a"/>
      <stop offset="100%" stop-color="#050520"/>
    </radialGradient>
    <radialGradient id="planet1" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#66cc55"/>
      <stop offset="100%" stop-color="#338833"/>
    </radialGradient>
    <radialGradient id="planet2" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#88ccff"/>
      <stop offset="100%" stop-color="#4488aa"/>
    </radialGradient>
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#space)"/>
  <!-- Stars -->
  <circle cx="30" cy="25" r="1.5" fill="#fff" opacity=".7"/>
  <circle cx="170" cy="40" r="1" fill="#fff" opacity=".5"/>
  <circle cx="55" cy="65" r="1" fill="#fff" opacity=".6"/>
  <circle cx="150" cy="20" r="1.5" fill="#fff" opacity=".8"/>
  <circle cx="20" cy="160" r="1" fill="#fff" opacity=".5"/>
  <circle cx="180" cy="130" r="1.2" fill="#fff" opacity=".6"/>
  <circle cx="90" cy="15" r="1" fill="#fff" opacity=".4"/>
  <circle cx="120" cy="175" r="1" fill="#fff" opacity=".5"/>
  <!-- Nebula -->
  <circle cx="160" cy="60" r="40" fill="#4488ff" opacity=".06"/>
  <circle cx="40" cy="150" r="35" fill="#ff4488" opacity=".05"/>
  <!-- Main planet (grass) -->
  <circle cx="90" cy="130" r="50" fill="url(#planet1)"/>
  <ellipse cx="80" cy="118" rx="15" ry="3" fill="#449944" opacity=".4"/>
  <ellipse cx="105" cy="140" rx="10" ry="2" fill="#449944" opacity=".3"/>
  <!-- Small planet (ice) -->
  <circle cx="155" cy="70" r="25" fill="url(#planet2)"/>
  <!-- Mario on main planet -->
  <!-- Shoes -->
  <rect x="80" y="78" width="6" height="4" rx="1" fill="#884400"/>
  <rect x="88" y="78" width="6" height="4" rx="1" fill="#884400"/>
  <!-- Overalls -->
  <rect x="79" y="66" width="16" height="14" rx="2" fill="#2244cc"/>
  <!-- Shirt -->
  <rect x="79" y="64" width="16" height="6" rx="2" fill="#ff2020"/>
  <!-- Arms -->
  <rect x="75" y="66" width="4" height="8" rx="2" fill="#ffcc88"/>
  <rect x="95" y="66" width="4" height="8" rx="2" fill="#ffcc88"/>
  <!-- Head -->
  <circle cx="87" cy="58" r="7" fill="#ffcc88"/>
  <!-- Hat -->
  <rect x="78" y="50" width="18" height="4" rx="1" fill="#ff2020"/>
  <rect x="81" y="47" width="12" height="5" rx="1" fill="#ff2020"/>
  <!-- Eye -->
  <rect x="89" y="56" width="3" height="3" rx="1" fill="#fff"/>
  <rect x="90" y="57" width="1.5" height="1.5" fill="#222"/>
  <!-- Mustache -->
  <rect x="87" y="61" width="6" height="2" rx="1" fill="#442200"/>
  <!-- Power Star -->
  <polygon points="155,32 158,42 169,42 160,48 163,58 155,52 147,58 150,48 141,42 152,42" fill="url(#star)"/>
  <circle cx="155" cy="45" r="18" fill="#ffd700" opacity=".1"/>
  <!-- Launch star -->
  <polygon points="40,55 42,60 48,60 43,64 45,69 40,65 35,69 37,64 32,60 38,60" fill="#ff8800" opacity=".8"/>
  <!-- Small stars scattered -->
  <polygon points="130,155 131,158 134,158 132,160 133,163 130,161 127,163 128,160 126,158 129,158" fill="#ffd700" opacity=".6"/>
  <polygon points="50,35 51,37 53,37 51.5,38.5 52,41 50,39.5 48,41 48.5,38.5 47,37 49,37" fill="#ffd700" opacity=".5"/>
</svg>
