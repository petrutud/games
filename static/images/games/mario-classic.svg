  <text x="100" y="172" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="13" fill="#fff" letter-spacing="1">SUPER MARIO</text>
  <text x="100" y="188" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#ffd700" letter-spacing="1">CLASSIC</text>
