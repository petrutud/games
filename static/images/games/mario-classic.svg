  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Clouds -->
  <ellipse cx="45" cy="45" rx="22" ry="13" fill="#fff" opacity="0.35"/>
  <ellipse cx="155" cy="35" rx="18" ry="10" fill="#fff" opacity="0.25"/>
