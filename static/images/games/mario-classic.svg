    <rect x="78" y="120" width="12" height="7" rx="2" fill="#f0b080"/>
    <rect x="80" y="122" width="2" height="2" fill="#222"/>
    <rect x="85" y="122" width="2" height="2" fill="#222"/>
    <rect x="79" y="126" width="10" height="2" rx="1" fill="#4a2a10"/>
    <rect x="78" y="128" width="12" height="6" rx="1" fill="#e02020"/>
    <rect x="80" y="130" width="8" height="4" rx="1" fill="#2060c0"/>
