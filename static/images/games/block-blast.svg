<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#111133"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg1)"/>
  <!-- Grid background -->
  <g transform="translate(130, 30)">
    <rect x="0" y="0" width="140" height="140" rx="8" fill="#111133" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Grid cells -->
    <rect x="5" y="5" width="30" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="38" y="5" width="30" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="71" y="5" width="30" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="104" y="5" width="30" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="5" y="38" width="30" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="38" y="38" width="30" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="71" y="38" width="30" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="104" y="38" width="30" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
    <!-- Filled blocks -->
    <rect x="5" y="71" width="30" height="30" rx="4" fill="#e94560"/>
    <rect x="38" y="71" width="30" height="30" rx="4" fill="#e94560"/>
    <rect x="71" y="71" width="30" height="30" rx="4" fill="#0ea5e9"/>
    <rect x="104" y="71" width="30" height="30" rx="4" fill="#0ea5e9"/>
    <rect x="5" y="104" width="30" height="30" rx="4" fill="#22c55e"/>
    <rect x="38" y="104" width="30" height="30" rx="4" fill="#a855f7"/>
    <rect x="71" y="104" width="30" height="30" rx="4" fill="#a855f7"/>
    <rect x="104" y="104" width="30" height="30" rx="4" fill="#f59e0b"/>
    <!-- Shine highlights -->
    <rect x="6" y="72" width="12" height="8" rx="2" fill="white" opacity="0.2"/>
    <rect x="72" y="72" width="12" height="8" rx="2" fill="white" opacity="0.2"/>
    <rect x="6" y="105" width="12" height="8" rx="2" fill="white" opacity="0.2"/>
    <rect x="105" y="105" width="12" height="8" rx="2" fill="white" opacity="0.2"/>
  </g>
  <!-- Glow accents -->
  <circle cx="200" cy="100" r="80" fill="none" stroke="rgba(233,69,96,0.06)" stroke-width="1"/>
  <circle cx="200" cy="100" r="60" fill="none" stroke="rgba(14,165,233,0.05)" stroke-width="1"/>
  <text x="200" y="200" text-anchor="middle" fill="#88a" font-family="sans-serif" font-size="12">Block Blast</text>
</svg>
