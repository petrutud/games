<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#10101e"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Gear decorations -->
  <circle cx="160" cy="50" r="20" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <circle cx="40" cy="150" r="16" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <!-- Echo 3 (farthest, most transparent) -->
  <g opacity="0.15">
    <rect x="72" y="88" width="14" height="22" rx="1" fill="#a78bfa"/>
    <path d="M79 78 L67 92 L91 92 Z" fill="#a78bfa"/>
  </g>
  <!-- Echo 2 -->
  <g opacity="0.25">
    <rect x="84" y="86" width="14" height="22" rx="1" fill="#a78bfa"/>
    <path d="M91 76 L79 90 L103 90 Z" fill="#a78bfa"/>
  </g>
  <!-- Echo 1 -->
  <g opacity="0.4">
    <rect x="96" y="84" width="14" height="22" rx="1" fill="#a78bfa"/>
    <path d="M103 74 L91 88 L115 88 Z" fill="#a78bfa"/>
    <circle cx="103" cy="95" r="2.5" fill="#fff" opacity="0.6"/>
  </g>
  <!-- Player (solid) -->
  <g>
    <rect x="108" y="82" width="14" height="22" rx="1" fill="#1a1a2e"/>
    <path d="M115 72 L103 86 L127 86 Z" fill="#1a1a2e"/>
    <circle cx="115" cy="93" r="3" fill="#e8c547" opacity="0.9"/>
    <circle cx="115" cy="93" r="7" fill="#e8c547" opacity="0.15"/>
  </g>
  <!-- Platform -->
  <rect x="40" y="110" width="130" height="8" rx="2" fill="#2a2a3a"/>
  <!-- Switch -->
  <rect x="55" y="106" width="24" height="5" rx="2" fill="#a78bfa" opacity="0.6"/>
  <!-- Rewind arrows -->
  <g opacity="0.2" fill="#a78bfa">
    <path d="M70 135 L60 142 L70 149 Z"/>
    <path d="M82 135 L72 142 L82 149 Z"/>
  </g>
  <!-- Title -->
  <text x="100" y="174" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="16" fill="#e0e4eb" letter-spacing="3">ECHOES</text>
  <text x="100" y="190" text-anchor="middle" font-family="sans-serif" font-weight="500" font-size="8" fill="#5a5a70" letter-spacing="1">TIME-MANIPULATION PUZZLES</text>
</svg>
