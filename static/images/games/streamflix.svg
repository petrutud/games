<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Play button triangle -->
  <polygon points="75,55 75,145 145,100" fill="url(#accent)" opacity="0.9"/>
  <!-- Film strip lines -->
  <rect x="30" y="30" width="8" height="12" rx="2" fill="#e50914" opacity="0.5"/>
  <rect x="30" y="50" width="8" height="12" rx="2" fill="#e50914" opacity="0.4"/>
  <rect x="30" y="70" width="8" height="12" rx="2" fill="#e50914" opacity="0.3"/>
  <rect x="162" y="118" width="8" height="12" rx="2" fill="#e50914" opacity="0.3"/>
  <rect x="162" y="138" width="8" height="12" rx="2" fill="#e50914" opacity="0.4"/>
  <rect x="162" y="158" width="8" height="12" rx="2" fill="#e50914" opacity="0.5"/>
  <!-- STREAMFLIX text -->
  <text x="100" y="178" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="16" font-weight="900" fill="url(#accent)">STREAMFLIX</text>
</svg>
