<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <radialGradient id="felt" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#155d15"/>
      <stop offset="70%" style="stop-color:#0b3d0b"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#felt)"/>
  <!-- Cards on table -->
  <g transform="translate(155, 55)">
    <!-- Card 1 - 7 of hearts -->
    <rect x="0" y="0" width="40" height="58" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
    <text x="8" y="18" fill="#dc2626" font-family="sans-serif" font-size="14" font-weight="bold">7</text>
    <text x="14" y="42" fill="#dc2626" font-family="sans-serif" font-size="18">♥</text>
  </g>
  <g transform="translate(200, 50) rotate(5)">
    <!-- Card 2 - 7 of spades (cutting) -->
    <rect x="0" y="0" width="40" height="58" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
    <text x="8" y="18" fill="#1a1a1a" font-family="sans-serif" font-size="14" font-weight="bold">7</text>
    <text x="14" y="42" fill="#1a1a1a" font-family="sans-serif" font-size="18">♠</text>
  </g>
  <!-- Face-down cards (opponent) -->
  <g transform="translate(130, 10)">
    <rect x="0" y="0" width="32" height="46" rx="3" fill="#1e3a5f" stroke="#1a3050" stroke-width="1"/>
    <rect x="38" y="0" width="32" height="46" rx="3" fill="#1e3a5f" stroke="#1a3050" stroke-width="1"/>
    <rect x="76" y="0" width="32" height="46" rx="3" fill="#1e3a5f" stroke="#1a3050" stroke-width="1"/>
    <rect x="114" y="0" width="32" height="46" rx="3" fill="#1e3a5f" stroke="#1a3050" stroke-width="1"/>
  </g>
  <!-- Player cards -->
  <g transform="translate(110, 140)">
    <rect x="0" y="0" width="40" height="58" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
    <text x="8" y="18" fill="#dc2626" font-family="sans-serif" font-size="14" font-weight="bold">A</text>
    <text x="14" y="42" fill="#dc2626" font-family="sans-serif" font-size="18">♦</text>
  </g>
  <g transform="translate(158, 140)">
    <rect x="0" y="0" width="40" height="58" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
    <text x="6" y="18" fill="#1a1a1a" font-family="sans-serif" font-size="14" font-weight="bold">10</text>
    <text x="14" y="42" fill="#1a1a1a" font-family="sans-serif" font-size="18">♣</text>
  </g>
  <g transform="translate(206, 140)">
    <rect x="0" y="0" width="40" height="58" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
    <text x="8" y="18" fill="#dc2626" font-family="sans-serif" font-size="14" font-weight="bold">K</text>
    <text x="14" y="42" fill="#dc2626" font-family="sans-serif" font-size="18">♥</text>
  </g>
  <g transform="translate(254, 140)">
    <rect x="0" y="0" width="40" height="58" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
    <text x="8" y="18" fill="#1a1a1a" font-family="sans-serif" font-size="14" font-weight="bold">8</text>
    <text x="14" y="42" fill="#1a1a1a" font-family="sans-serif" font-size="18">♠</text>
  </g>
  <!-- Deck -->
  <g transform="translate(320, 70)">
    <rect x="0" y="0" width="40" height="58" rx="4" fill="#1e3a5f" stroke="#1a3050" stroke-width="1.5"/>
    <rect x="2" y="2" width="36" height="54" rx="3" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="20" y="95" text-anchor="middle" fill="#a3d9a3" font-family="sans-serif" font-size="10">24</text>
  </g>
  <text x="200" y="218" text-anchor="middle" fill="#a3d9a3" font-family="sans-serif" font-size="12">Șeptică</text>
</svg>
