<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0e0c08"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Warm light pool -->
  <circle cx="100" cy="100" r="70" fill="#f0a040" opacity="0.04"/>
  <!-- Giant pencil (landscape) -->
  <rect x="30" y="105" width="140" height="8" rx="2" fill="#d4a030" opacity="0.4"/>
  <polygon points="170,105 180,109 170,113" fill="#e8c060" opacity="0.4"/>
  <!-- Giant coin -->
  <circle cx="60" cy="100" r="12" fill="#d4a030" opacity="0.25"/>
  <circle cx="60" cy="100" r="9" fill="none" stroke="#e8c060" stroke-width="1" opacity="0.3"/>
  <!-- Pip (the character) -->
  <g>
    <!-- Bottle-cap backpack -->
    <rect x="96" y="82" width="7" height="7" rx="1" fill="#808890" opacity="0.7"/>
    <!-- Body -->
    <ellipse cx="100" cy="88" rx="8" ry="6" fill="#c8a878"/>
    <!-- Head -->
    <circle cx="100" cy="79" r="6" fill="#d4b888"/>
    <!-- Big eyes -->
    <circle cx="97" cy="78" r="3" fill="#fff"/>
    <circle cx="103" cy="78" r="3" fill="#fff"/>
    <circle cx="98" cy="78" r="1.5" fill="#222"/>
    <circle cx="104" cy="78" r="1.5" fill="#222"/>
    <!-- Legs -->
    <rect x="94" y="92" width="3" height="4" rx="1" fill="#a08060"/>
    <rect x="103" y="92" width="3" height="4" rx="1" fill="#a08060"/>
  </g>
  <!-- Platform (wooden surface grain) -->
  <rect x="40" y="98" width="120" height="6" rx="2" fill="#5a4830"/>
  <rect x="40" y="98" width="120" height="1.5" fill="#c8a060" opacity="0.1"/>
  <!-- Dust mite enemy -->
  <ellipse cx="140" cy="94" rx="5" ry="3.5" fill="#6a6058" opacity="0.5"/>
  <circle cx="138" cy="92" r="1" fill="#f44" opacity="0.4"/>
  <circle cx="142" cy="92" r="1" fill="#f44" opacity="0.4"/>
  <!-- Crafting materials floating -->
  <rect x="55" y="65" width="8" height="2" rx="1" fill="#aaa" opacity="0.3" transform="rotate(-20 59 66)"/>
  <circle cx="130" cy="70" r="3" fill="#40c060" opacity="0.3"/>
  <!-- Title -->
  <text x="100" y="135" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="22" fill="#e0d0b8" letter-spacing="3">INCH</text>
  <text x="100" y="152" text-anchor="middle" font-family="sans-serif" font-weight="500" font-size="8" fill="#8a7a60" letter-spacing="1">TINY EXPLORATION</text>
  <!-- Room icons -->
  <g opacity="0.4">
    <rect x="52" y="168" width="10" height="10" rx="2" fill="#c8a060"/>
    <rect x="68" y="168" width="10" height="10" rx="2" fill="#90b8a0"/>
    <rect x="84" y="168" width="10" height="10" rx="2" fill="#6090b8"/>
    <rect x="100" y="168" width="10" height="10" rx="2" fill="#c090b8"/>
    <rect x="116" y="168" width="10" height="10" rx="2" fill="#a0a880"/>
  </g>
  <text x="57" y="190" font-size="5" fill="#888" text-anchor="middle" font-family="sans-serif">LIV</text>
  <text x="73" y="190" font-size="5" fill="#888" text-anchor="middle" font-family="sans-serif">KIT</text>
  <text x="89" y="190" font-size="5" fill="#888" text-anchor="middle" font-family="sans-serif">BTH</text>
  <text x="105" y="190" font-size="5" fill="#888" text-anchor="middle" font-family="sans-serif">BED</text>
  <text x="121" y="190" font-size="5" fill="#888" text-anchor="middle" font-family="sans-serif">GAR</text>
</svg>
